  text: 欽定四庫全書欽定國子監志卷十一
  hash: sha256:cef24ca222961c29f909ff60b198330fb7093eb106ecaf9d62588e51035146ca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_011-1a, image: WYG0600/WYG0600-0110c.png}
body:
  text: 祀位臣等謹案國學自唐開元中廟祀孔子冊贈王爵始正南面之位用宫懸之樂被衮冕之服較之晉備三牲四時致祭宋齊崇奉秩比上公典綦重矣逮宋迄明並用王者之禮嘉靖中始改廟像為木主易王爵稱先師國朝因之尊崇之典斟酌修明益臻美備至於厯代賢儒祔饗時進時退或増或减迄無定議我世宗憲皇帝特封先師五代並為王爵又命廷臣詳考賢儒行事罷者復之缺者増之皇上釐正位次復吳澄之從祀升有子於哲位誠萬年不易之隆規已謹志聖位一卷配饗從祀一卷為祀位門而以元明來尊奉之典暨諸賢儒進退沿革各附卷末云祀位一聖位先師廟大成殿中奉至聖先師孔子神位南嚮木主髙二尺五寸五分廣六寸五分厚一寸朱地金書小座髙四寸五分大座髙一尺四寸五分龕二重内龕連座髙九尺四寸廣六尺深三尺七寸外龕髙一丈七尺四寸廣一丈五尺六寸深八尺一寸均安黄琉璃大座上座髙三尺廣一丈七尺二寸深九尺七寸先謹案位聖神國初監明舊制用木主稱至聖先師孔子世祖章皇帝順治二年國子祭酒李若琳言聖人賛乾坤曰大哉乾元至哉坤元曰大成曰至聖洵非孔子之德配乾坤者莫能當之今稱法經天緯地至聖而遺大成乾坤之義未備又謚曰文聖善周聞曰宣洵非徳兼君師莫能當之今稱先師而遺謚號如英君誼辟止曰某君某王而去聖神文武之謚可乎惟稱大成至聖文宣先師庶至徳隆名倍為闡揚禮科給事中龔鼎孳是若琳言下諸臣議行加孔子謚號為大成至聖文宣先師十四年給事中張文光又言聖至孔子賛美難以形容曰至聖則無所不該曰先師則名正而實稱順治初年仍元舊謚而不稱王竊意追王固屬誣聖即加大成文宣四字亦孔不足以盡為子宜改主詔從至聖先師孔子宫遂為定制節奉之通行直省學諭㫖門俱恭載聖諭崇聖祠中奉肇聖王木金父裕聖王祈父詒聖王防叔昌聖王伯夏啓聖王叔梁紇神位皆南嚮木主髙一尺七寸寛四寸五分厚五分赤地金書正位五龕中獨座左右両龕合座龕髙七尺廣六尺一寸深三尺七寸木座髙二尺三寸五分廣七尺二寸深四尺八寸石座髙二尺六寸五分中座廣八尺五寸東西連座廣一丈四尺四寸深五尺九寸大謹案明嘉靖中張璁始請於成殿後别立啟聖祠祀公聖父叔梁世宗國朝帝雍正元年憲皇命諸臣議封世五代廷臣以應封公爵議上孔子先詔諸臣復議由是定封王木金父公為肇聖祈父公為裕聖王防叔公為詒聖王伯夏公為昌聖王合祀五代更名叔梁公為啓聖王啓聖祠為見崇聖祠詳聖諭門聖位附元大徳十一年秋七月辛巳加封至聖文宣王為大成至聖文宣王元史武宗紀孔謹案漢平帝元始元年始追諡年改諡子曰褒成宣尼公魏太和十六文聖尼父北周大象二年封鄒國公唐乾封元年贈太師天授三年封隆道公神龍元年諡曰文宣開元二十七年封年加諡文宣王宋大中祥符元元聖文宣王五年改諡始加至聖文宣王至元武宗大成之稱考是時武宗即位尚未改元祭祀志作至大元年七月者非今從元史本紀載八至順元年秋閠七月戊申加封孔子父齊國公為啟聖王母魯國太夫人為啟聖王夫人元史文宗紀聖謹案宋大中祥符中追封父為齊國公聖母為魯國太夫人至是始晉王爵從孔思晦請也至順三年春正月壬午封孔子妻鄆國夫人為大成至聖文宣王夫人仝上明正統十二年巡按直𨽻御史李奎請加封孔子不允南雍志成化十二年北監祭酒周洪謨請加孔子帝號改大成至聖為神聖廣運不允仝上嘉靖九年冬十一月大學士張璁言孔子宜稱先聖先師不稱王編修徐階力言不可帝怒謫其官乃自製正孔子祀典説大畧謂孔子以魯僭王為非寧肯自僭復為正孔子祀典申記璁因作正孔子廟祀典或問奏之帝令集議御史黎貫是階言亦禠職給事中王汝梅等極言不宜去號帝皆斥為謬論于是諸臣皆言人以聖人為至聖人以孔子為至宋眞宗稱為至聖其意已備乃更正孔子謚號曰至聖先師孔子明史世宗紀孔謹案𢎞治中翰林院檢討劉端言大成者孟子子封典尚襲元舊未能改正所謂取譬之詞所謂文宣者齊主髙洋之謚不可擬盛徳宜節去大成文宣四字别定尊榮美謚下先有司議乆不決至是帝用璁言師謚號始定嘉靖九年遵南京國子監制改製至聖先師木主髙二尺三寸七分廣四寸厚七分座髙四寸長七寸厚三寸四分朱地金書題曰至聖先師孔子去王號及大成文宣之稱明史禮志孔謹案洪武四年宋濓上主以棲神無設像之事子廟堂議云古者造木先開元禮設堂上西楹間設先師神座于東北席聖神座于皆以筦則猶掃地而祭也今因開元八年之制摶土肖像失神明之義矣議上不報至十五年始改國子監廟像為木主而天下學廟如故永樂中改北平府學為國子監廟猶塑像成化十六年監臣祝瀾請易木主為周洪謨所斥嘉靖九年張璁復言宜用木主塑像宜毁于是禮臣議用木主仍擬大小尺寸著為定式啓聖公木主髙一尺四寸廣二寸六分厚五分座髙二寸六分長四寸厚二寸赤地墨書於大成殿後别立室以祀仝上啟謹案𢎞治元年王恕請立祠祀聖王不報正統二年裴侃言聖父元已晉封請創殿于之闕里至是從張璁言大成殿西崇祀時止命行啟始建于學宫焉聖祠欽定國子監志卷十一

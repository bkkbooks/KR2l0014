front:
  text: 欽定四庫全書欽定國子監志卷二十七
  hash: sha256:f54682403642c3b3690eec7eca7a60161e582c405f2268eca722569a8c7434fa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_027-1a, image: WYG0600/WYG0600-0275a.png}
body:
  text: 監制二建葺順治元年我世祖章皇帝定鼎燕京命飭新國子監擴元明之舊左廟右署規制大備時祭酒李若琳疏言滿洲官員子弟咸肄業成均而臣衙門在城東北隅諸弟子往返晷短途紆易妨講習請于滿洲居處之地各擇空宇一區立為書院以國學二㕔六堂學官分教八旗子弟滿洲十六人䝉古八人仍設學長四人均就書院萃處朝夕訓迪月之六日師生入監考課以示勸懲下部集議順治二年得㫖允行祭酒薛所藴又請凡滿洲子弟就學者分四所以京省生員十人充伴讀十日一赴監考課春秋演射各就本處習練俾文武兼資以儲實用詔從之順治十一年命修國子監廨署謹案時工部定議委官修葺國子監署動支監中積貯銀不敷由部增給嗣後如有損壞國子詔從之監自支額設錢糧量行修葺康熙十八年命修先師廟啓聖祠至二十二年落成復命國子監廨宇次第繕葺康熙四十一年聖祖仁皇帝蕩平朔漠遣官告成發帑大修聖廟並繕葺監署以和碩理親王董其事雍正元年命修國子監講堂學舍修葺事宜均禮部㑹同工部經理計共支帑金九千兩有竒雍正五年允監臣孫嘉淦奏命八旗每旗别給官房一所各寬二十餘楹可容百人誦習者以為學舍仍飭本旗修葺完固其嚮為官學之屋宇各令交還本旗謹案時以八旗就學者衆嚮時官學屋隘不能容故也雍正六年俄羅斯國遣陪臣子弟魯喀佛多德宜畹喀喇西木等覲光國學特命即舊㑹同館設俄羅斯館教之雍正九年工部左侍郎兼理監事鄂爾竒祭酒孫嘉淦疏奏直省拔貢必須在監居住者三百餘人六堂難于棲止查國子監門外方家胡同官房一所舊有二百餘間今只存一百四十二間與國子監相去數武懇恩賞給國子監衙門臣等于每年公費銀兩內動支修葺令拔貢及助教等就近肄業詔從之乾隆二年國子監奏請修葺彝倫堂及兩序詔工部委官經理計支帑金四千八百兩制錢三千貫冇奇乾隆二十四年國子監奏請修葺特命莊親王及內務府大臣督修廨署御書樓輝煌鞏固視舊有加計支帑金二萬九千五百三十三兩有奇乾隆四十八年春二月丁亥上親詣國子監釋奠先師禮成特命尚書德保劉墉金簡侍郎德成等仿照禮經于太學門內彞倫堂前興建辟雍監臣又奏請將彝倫堂及六堂東西廂一律修葺得㫖允行四十九年冬辟雍新工告成隆規炳爍學制大備誠千古希逢盛典計支帑金三萬有奇謹案凡大修國子監廨署由監料估凡物之直銀二百兩以上工之直錢五十貫以上照例奏明交工部校辦奇零工程隨時咨部繕治嵗修南學本監派員經理于恩賞銀內支銷修理八旗官學本旗滿洲䝉古漢軍各都統㑹估派員經理于本旗房租銀內支銷特辟雍工程發帑興建簡派大臣建葺附元至元二十四年遷都北城立國子學于國城之東元史選舉志謹案志稱太祖平燕京宣撫王楫請以金樞密院為宣聖廟所謂南城國子學是也又謂太宗六年嘗設國子總教及提舉官太宗紀五年八年並修孔子廟而宋濂文集則謂太宗五年權用燕京真定厯日銀建國子學聖廟兩廡及肄業之舍與史小異總之是時國子學尚在南城與今異所世祖紀書中統三年修宣聖廟成後書至元六年立國子學又書八年設國子學紀載重叠自相抵牾要皆言南城廟學也惟世祖紀二十四年閏二月設國子監與選舉志合實今監署之權輿故首列之又案元程巨夫聖廟碑至元四年畫地為廟學基二十四年備置監學宫是二十四年以前于金之國子監規畫之而已無所興建也大德十年正月營國子監于文宣王廟西偏元史成宗紀謹案吳澄賈馴修廟學頌云至元二十四年設國子監大德十年設官教國子已二十年矣寄寓官舍不正其名丞相哈喇哈斯以為未稱興崇文教之實也乃營國學于廟之西命工部郎中賈馴董其役又案吳澄崇文閭碑云監學之建哈喇哈斯贊成之實由御史臺建白此大德中營國子監之顛末也至大元年五月丁卯御史臺臣言成宗朝建國子學迄今未成皇太子請畢其功制可元史武宗紀謹案程巨夫國學先聖廟碑云至元四年作都城畫地宫城之東為廟學基二十四年備置監學宫元貞元年詔立先聖廟久未集大德三年丞相哈喇哈遜達爾罕飭工部郎中賈馴任之十年秋廟成謀樹國子學御史臺臣復以為請制可至大元年冬學成則是時之施功實先廟後學矣皇慶二年六月建崇文閣于國子監元史仁宗紀謹案吳澄崇文閣碑云成宗時御史臺言胄子之教寄寓官舍隘陋非宜奏請于孔廟之西營建國子監學以御史府所貯公帑充其費逮至仁宗文治日隆僉謂監學櫝藏經書宜得重屋以庋有㫖復令臺臣辦集其事乃于監學之北構架書閣延祐四年夏經始六年冬績成材木瓦甓諸物之直工役飲食之費皆出御史府則爾時建閣實以藏書今之彝倫堂即閣故址也南陽富珠哩先生兼國子祭酒以中統楮泉二萬餘緡于監之隙地築屋以舍師儒陳旅安雅堂集富珠哩名翀見前卷謹案元制國子監國子學之外復有蒙古國子監國子學回回國子監國子學考元史至元八年立蒙古國子學至元十四年立䝉古國子監至元二十六年置回回國子學延祐元年復立回回國子監七年罷之史既詳載設學立監則非統于國學可知謹附識以備參考明永樂元年春二月設行部國子監明史成祖紀謹案明太祖洪武元年克燕都改元國子監為北平府學成祖由北平起兵欲定都于此升為北京復命設之至十八年遷都以京師國子監為南京國子監今所設為北京國子監正統九年春二月新建太學成明史英宗前紀謹案先是太學因元之陋吏部主事李賢上言國朝建都北京佛寺時復修建太學日就廢弛何以示法天下請以佛寺之費修舉太學從之至是落成有御製重建太學碑文景泰中御史程璥請于東長安街改創國子監不允國史唯欵宏治十四年祭酒謝鐸疏請修國子監從之明太學志嘉靖十一年祭酒林文俊疏請修國子監從之同上

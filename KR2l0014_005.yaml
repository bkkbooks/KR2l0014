body:
  text: 御製一文三皇上御製文廟易蓋黃瓦臨雍紀事碑文天生蒸民若有恆性人道立焉亶生聰明神聖作之君作之師以厚其生以正其德綱常之所以不墜倫類之所以相維相保於天地間者斯焉是賴古聖皇繼天立極君師之道兼隆敻乎尚矣繼是以來雖代有君而克盡其為君之道蓋寡若夫同天地亘今古繼往聖開來世特立為師之道於宇宙間者則惟我先師孔子一人敬惟孔子集羣聖之大成祖述憲章垂教萬世使後之帝王建極綏猷得有所遵循以求治法道法之大全由之則治悖之則亂大哉孔子功參乎覆載明並乎日月生民以來未有盛焉者也我列祖撫御寰區敘彞倫明禮樂諴民阜俗一惟孔子所傳之大經大法是矩是式微言奧義悉推闡而表章之統緒相承心源符契欽敬追崇之盛典超越往代具在彛章豫小子懋學書闈景行志切逮寅承丕緒祗奉先猷夙夜兢兢繹思聖道越乾隆三年季春上日躬釋奠於先師前期飭官庀材崇飾廟貌特命大成殿大成門覆以黃瓦崇聖祠覆緑瓦稱朕慕道崇師至意記曰禮時為大宜次之稱次之先王之制禮也順於鬼神合於人心惟其稱而已太學者帝王尊師之地盡禮備物以明尊也稱其德而不為過宜莫大焉抑非以炫耳目之觀也欽崇至道敷政教以淑羣黎法祖隆師罔敢或斁俾薄海內外無一夫不與被聖人之澤斯朕志也夫乾隆四年己未用允廷臣之請勒文紀事以垂示於奕世系以詩曰於昭道統淵源三五至聖挺生立極萬古贊修刪定為帝王師天地悠久斯文在兹惟我祖宗惇崇典禮爰謁林廟爰封祖禰豫膺鴻緒彛憲是承釋奠視學大昕鼓徵萬仞宫牆圜橋首善笙鏞斯陳爼豆斯薦耽耽翼翼鳥革翬飛制符宸居金碧流輝丕煥宏模神明所宅玉振金聲永揚教澤式視兆庶式育才賢光宣文治億萬斯年御製臨雍講義中庸首章天命之謂性率性之謂道是本一貫之理也亦猶無極而太極太極而隂陽隂陽本太極太極本無極也蓋道本乎性性本乎天至云修道之謂教則有人力之施而已非道之本原矣故論其本原無所謂離與合也至有道之可名於是乎須臾不可離且戒之曰可離非道而戒懼慎獨之功亦莫不因修道而起不知喜怒哀樂之未發即天命也謂之中即性也發而中節即率性也謂之和即道也豈非天下之大本達道乎故曰致中和天地位焉萬物育焉若曰天地自位萬物自育而已倘視喜怒哀樂未發以下為慎獨工夫殊失子思子之本旨矣尚書首節堯典紀堯之德以欽始以欽終欽明本堯之德至二女之嬪虞亦教之曰欽哉則聖人之心無時無事之不主敬可知矣夫人心惟危敬則不至於危道心惟微敬則不患其微以至精一執中舍敬其何以為功耶是故主敬為至要亦惟主敬為最難帝堯之聖猶兢業之弗遑況在常人豈可須臾去敬以自外於聖人之教哉御製平定金川告成太學碑文天畀我皇清握乾符俯坤軸函括萬邦悉主悉臣五后纘承創守佑啓亦惟是二三藎臣布德宣力豫曰有先後豫曰有禦侮用造我丕丕基罔有孽芽罔不煦嫗長養遊於大當粵有金川娑羅奔者居西蜀桃關以外界綽斯甲小金川之間向曾從征得受符檄與諸土司齒顧恃其險逺夜郎自大搆釁鄰番各土司申訴封疆吏吏曰蔓之不圖豈其視為甌脫乃請兵籌餉期掃其穴而司其事者或怯縮以老師或􅘀狡以蓄志軍無適從事用不集豫心􅍀然念邊徼之不寧或致增防置戍重勞吾民大學士忠勇公傅恆義同休戚毅然請肩斯任乃命以經略印益厚集諸路軍芻粟相繼閭閻不驚卜吉於戊辰十一月之三日禡牙以指所征朕親御武帳賜經略酒以行天日和昶陽氣宣復都人士聽覩聳躍罔不忭喜謂露布之旦暮至也乃厯燕晉驅秦隴越劍閣絶川江凌桃關之巇徑天射之峻又日討軍實而教誡拊循之均其渴飲飢食同其曉征夜眠至於密贊機務親草奏章則又經略獨勤其勞而諸武臣有所不知有弗能共者恩威既明士用益勵度番落如户庭過部伍於袵席姦酋授首軍聲大振復以巨炮擊其碉堅碉以摧將俟諸軍之集搗其中堅而番酋騤瞿駾喙稽首請降經略臣以彼罪重惡極窮而乞生久或渝且偝焉慮不允所請朕惟天地之德在好生彼蟻潰而鼠駭者毋寧赦而宥之且求降而盡殱之不可謂武矧不足以汚我斧也於是經略宣朕明旨登壇受降己巳二月之望日金川平定捷音至京是役也罙入數千里奏凱未七旬而振旅之師多有返自中途未究其用者昔之成功巴蜀如建武之定公孫江陵之降李勢皆在版圖之內無足比數廷臣舉皇祖朔漠皇考青海成例請勒碑成均以示來許夫秉丹誠而運籌決勝永靖荒徼者經略大學士之功也商可否於帷幄衝石矢於行陳者參贊大臣及諸將士力也朕何有焉惟是體乾元之德凛佳兵之戒保大定功安民和衆庶幾可以垂則乎乃系之辭曰維天生人類聚羣分凡兹林林孰非我民有羈而縻有誨而諄豈伊異視逺近殊倫守在四夷稽古名言無已用之寓義於仁蠢彼金夷恃其險阻蠶食豨張謂莫我拒不靖不庭侵厥鄰聚駭奔叫呶以干大咎匪棘匪紓玁狁之故我張我伐玁狁之故我師既集賊亦相持匪敢相持懼誅自支兩易寒暑敉功稍稽賊益以狂怒臂當車罪臣既誅以徇我師朕咨於恆汝往視之朕咨於恆惟汝同德惟我庶士亦久於役將兹旗兵羽林神策其勇熊羆其心金石何敵弗摧何攻弗克濟以汝忠奏捷頃刻恆拜稽首臣敢弗蘉既禡既宜師出于京師出于京時維一陽未逾五旬乃壓其疆前旌獵獵有節煌煌羣番乃驚謂自天降惟彼攸恃曰良爾吉以偵以諜如鬼如蜮其恃爰誅其類股栗紀律是明戎兵是詰鑄炮攻碉其守已失惟是懼誅潛弗敢出其潛弗出乃旦夕延將齊我軍披其中堅大鞣大膊期目之前彼乃窮蹙乞降悚虔惟命是從六事永遵除道築壇肉袒羊牽赳赳鍾琪乃度之訴聿抵賊巢開誠以諭擕其二酋軍門親赴悔罪歸誠車塵馬足順斯撫之昭我王度昔也雷霆今也雨露七縱諸葛單騎汾陽曰我相臣于前有光晉爵錫服黼黻龍章速歸黃閣左右贊襄休養生息惠鮮蜀邦我武既揚無疆惟慶御製平定凖噶爾告成太學碑文遼矣山戎薰粥旃裘毳幕之人界以龍沙畜其驒奚雖無恆業厥有分部蓋自元黃剖判萬物藝生東夷西夷各依其地謬舉淳維未為理據皇古莫紀其見之書史者自周宣太原之伐秦政亘海之築莫不畏其侵軼猾夏是虞自時厥後一二奮發之君慨然思挫其鋒而納之宥然事不中機材不副用加以地逺無定處故嘗勞衆費財十損一得搢紳之儒守和親介胄之士言征伐征伐則民力竭和親則國威喪於是有守在四夷羈縻不絶地不可耕民不可臣之言興矣然此以論漢唐宋明之中夏而非謂我皇清之中夏也皇清荷天之龍興東海撫華區有元之裔久屬版章歲朝貢從征狩執役惟謹凖噶爾厄魯特者本有元之臣僕叛出據海西終明世為邊患至噶爾丹而稍強吞噬鄰蕃闌入北塞我皇祖三臨朔漠用大破其師元惡伏冥誅脅從逺遁迹毋俾遺種於我喀爾喀厥姪策妄阿拉布坦收其遺孽僅保伊犂故嘗索俘取地無敢不共逮夫部落滋聚乃以計襲哈密入西藏凖夷之勢於是而復張兩朝命將問罪雖屢獲捷而庚戌之役逆子噶爾丹策凌能用其父舊人乘我師怠掠畜於巴里坤搗營於和卜多于是而凖夷之勢大張然地既險逺主客異焉此勞往而無利彼亦如之故額爾德尼招之敗彼亦以彼貪利而深入也皇考謂我武既揚不可以既允其請和以息我衆豫小子敬奉先志無越思焉既而噶爾丹策凌死子策妄多爾濟那木扎爾暴殘喇嘛達爾扎篡奪之達瓦齊又篡奪喇嘛達爾扎而酗酒虐下尤甚焉癸酉冬都爾伯特台吉策凌等率數萬人來歸越明年秋輝特台吉阿睦爾撒納和碩特台吉班珠爾又率數萬人來歸朕謂來者不可以不撫而撫之莫若因其地其俗而善循之且毋令滋方來之患於我喀爾喀也於是議進兩路之師問彼罪魁安我新附凡運餉籌馱長行利戰之事悉備議之始熟經于庚戌之艱者咸懼蹈轍惟大學士忠勇公傅恆見與朕同而新附諸台吉則求之甚力朕謂犁庭掃穴即不敢必然喀爾喀之地必不可以久居若而人毋寧用其鋒而觀厥成即不如志亦非所悔也故凡禡旗命將之典槩未舉行亦云偏師嘗試為之耳塞上用兵必以秋而阿睦爾撒納禡木特請以春月欲乘彼馬未肥則不能遁朕謂其言良當遂從之北路以二月丙辰西路以二月己巳各起行哈密瀚海向無雨今春乃大雨咸以為時雨之師入賊境凡所過之鄂拓克擕羊酒糗糒迎恐後五月乙亥至伊犁亦如之達瓦齊於格登山麓結營以待兵近萬我兩將軍議以兵取則傷彼必衆彼衆皆我衆多傷非所以體上慈也丁亥遣阿玉錫等二十五人夜斫營覘賊向賊兵大潰相蹂躪死者不可勝數來降者七千餘我二十五人無一人受傷者達瓦齊以百餘騎竄六月庚戌回人阿奇木霍集斯伯克執達瓦齊來獻軍門凖噶爾平是役也定議不過二人籌事不過一年兵行不過五月無亡矢遺鏃之費大勳以集遐壤以定豈人力哉天也然天垂佑而授之事機設不奉行之以致坐失者多矣可與樂成不可與謀始亦謂蚩蚩之衆云爾豈其卿大夫之謂既克集事則又曰苟知其易將勸為之夫明於事後者必將昧於幾先朕用是寒心且凖噶爾一小部落耳一二有能為之長而其樹也固焉一二暴失德之長而其亡也忽焉朕用是知懼武成而勒碑文廟例也禮臣以為請故據實事書之其辭曰茫茫伊犁大幹之西匪今伊昔化外羈縻條支之東大宛以南隨畜獵獸蟻聚狼貪乃世其惡乃恃其逺或激我攻而乘我緩其計在斯其長可窮止戈靖邊化日薰風不侵不距不來其那欵關求市亦不禁訶始慕希珍終居奇貨吏喜無事遷就斯愞漸不可長我豈懼其豈如宋明和市之為既知其然飭我邊吏弗縱弗嚴示之節制不仁之守再世斯斬篡奪相仍飄忽荏苒夙沙革面煎鞏披忱集泮飛梟食黮懷音錫之爵位榮以華裾膝前面請願效前驅兵分兩路雪甲霜鋒先導中堅如鼂錯攻益以後徑蒙古舊屬八旗子弟其心允篤二月卜吉牙旗飄颻我騎斯騰無待折膠泉涌於磧蕪茁於路我衆歡躍謂有天助匪啻我衆新附亦云黃髮未覩水草富春烏魯木齊波羅塔拉台吉宰桑紛紛欵納牽其肥羊及馬湩酒獻其屠耆合掌雙手豫有前諭所禁侵陵以茶交易大愈衆情衆情既愈來者日繼蠢達瓦齊擁兵自衛依山據淖惟旦夕延有近萬人其心十千勇不目逃掄二十五曰阿玉錫率往賊所銜枚夜襲直入其郛揮矛拍馬大聲疾呼彼人既離我志斯合突將無前縱橫鞺鞳案角鹿埵隴種東籠自相狼籍孰敢攖鋒狐竄鼠逃將往異域回部遮之凶渠斯得露布既至告廟受俘凡此蕆功荷天之衢在古周宣二年乙亥淮夷是平常武詩載越我皇祖征噶爾丹命將禡旗亦乙亥年既符歲德允協師貞兵不血刃漠無王庭昔時凖夷弗恭弗譓今隨師行為師候尉昔時凖夷日戰夜征今也偃卧知樂人生曰匪凖夷曰我臣僕自今伊始安爾遊牧爾牧爾耕爾長孫子曰無向非豈有今是兩朝志竟億萬基成側席不遑保泰持盈御製平定凖噶爾勒銘伊犁之碑惟天盡所覆俾我皇清罔不在宥惟清奉昊天撫薄海兆庶悉主悉臣叶太祖太宗世祖肇基宅中皇耆其武聖祖世宗覲光揚烈克臻郅隆逮豫藐躬思日孜孜期四海同風咨汝凖噶爾叶亦蒙古同類何自外擕數世梗化篡奪相仍碩仇其下厥達瓦齊甚毒於酲衆心疷疷如苗斯蟊如虺斯蟄衆口嗷嗷視爾嗷止豫焦勞止期救不崇朝止視爾疷止豫噫嘻止亟出汝塗泥止乃命新附爾為先鋒􅌻悉其路乃命徑旅擕數月糧毋或掠虜師行時雨王旅嘽嘽亦無潦阻左旋右抽王旅渾渾既暇以休烏魯木齊及五集賽度之折折台吉宰桑迎降恐後奚事斧吭波羅塔拉闥爾奇嶺險如關闔倒戈反攻達瓦齊走旦夕途窮回部遮獲彼鼠斯喙地入無隙露布飛至受俘午門爰貸其罪自今以始四部我臣伊犁我宇叶曰綽羅斯及都爾伯特和碩特輝特封四可汗衆建王公遊牧各安宰桑公臣屬我旗籍誰汝苦辛爾恭爾長爾孳爾幼徐以教養爾駝爾牛爾羊爾馬畜牧優遊分疆各守毋相侵陵以干大咎齊禦外域曰布魯特越哈薩克醉飲飽食敬興黃教福自天錫伊犁平叶矣勒貞珉矣於萬斯年矣御製謹案是碑恭勒於太學碑之隂故謹編於此外平定凖噶爾告成御製如銘凖部格登山各碑國子監未嘗刋石者不勒敢編入御製平定回部告成太學碑文建非常之功者以舉非常之事舉非常之事者以藉非常之人然亦有不藉非常之人而舉非常之事終建非常之功者則賴昊蒼篤貺神運斡旋事若禍而移福機似逆而轉順順天者昌逆天者亡故犁凖夷之庭掃回部之穴五年之間兩勳並集始遲疑猶未敢信終劼劬以底有成荷天之龍在兹畏天之鑒益在兹爰敘其事如左達瓦齊之就俘也伊犁已大定矣無何而阿睦爾撒納叛彼其志本欲藉我力以成已事時也人心未定佐饔者嘗一蜮肆狂萬狙應響蜂屯蟻雜不可爬梳畏難者羣謂不出所料凖夷終不可取並有欲棄巴里坤為退守謀然豫計其衆志不齊將有歸正倒戈者於是督策將帥之臣整師亟進既而伊犁諸台吉宰桑果悔過勤王思討逆賊以自贖此天恩助順者一也二酋大小和卓木者以回部望族久為凖噶爾所拘於阿巴噶斯鄂拓者也我師既定伊犁乃釋其囚以兵送大和卓木波羅泥都歸葉爾奇木俾統其舊屬而令小和卓木霍集占居於伊犁撫其在伊犁衆回乃小和卓木助阿逆攻勤王之台吉宰桑等阿逆賴以茍延及我師再入阿逆遂逃入哈薩克而霍集占亦即收其餘衆竄歸舊穴此天恩助順者二也凖夷之事前紀略見梗槩兹不復紀紀興師討回之由則以我將軍兆惠在伊犁時曾遣副都統阿敏道往回議事小和卓木乃以計誘阿敏道而拘之及我師抵庫車問罪彼擕阿敏道以來援至中途害之及從行者百人彼猶逞其狂悖抗我師顔且敢冒死入庫車城乃雅爾哈善略無紀律致彼出入自由然我滿洲索倫衆兵士無不念國家之恩效疆場之力故能以少勝衆逆渠懼而脫此天恩助順者三也知僨轅之無濟掄幹材之可任時將軍兆惠以搜勦凖夷餘黨至布露特部落已欵服其衆因命旋師定回部於是克庫車存沙雅爾定阿克蘇略烏什收和闐師之所至降者望風直至葉爾奇木城下而我軍人馬周行萬有餘里亦猶強弩之末矣二酋以其逸待之力統數萬人與我三千餘人戰我師之過河者才四百餘猶能斬將搴旗退而築堡黑水固守以待此天恩助順者四也萬里之外抱水救火其曷能濟乃豫以去年六月即降旨𣲖兵撥馬欲以更易久在行間者耳故兵馬率早在途一趲進而各爭前恐後人人有敵愾之憤此天恩助順者五也副將軍富德及參贊舒赫德輩率師進援以速行戈壁中馬力復疲值狂回據險坐俟頗有難進之勢夫援軍不能進則固守以待者危矣而參贊阿里衮驅後隊之馬適至夜搗賊營我師內外夾攻彼不知我軍凡有幾萬握炭流湯之徒自相蹂躪顧命不暇於是解黑水之圍鹿駭麞驚遁而保窟我之兩軍合隊全旅以回阿克蘇此天恩助順者六也既而彼料我必再入泰山之壓難當乃於我師未進之先擕其部落載其重器跳而逺去而葉爾奇木哈什哈爾二城之舊伯克等遂獻城以降參贊明瑞一邀之於霍斯庫魯克副將軍富德再陷之於阿爾楚爾於是離心者面內前途者反斾二酋惟挈其妻孥及舊僕僅三百人入拔達克山境此天恩助順者七也人迹不通之地語言不同之國既已雀驅寧不狼顧其授我與否固未可定也然一聞將軍之檄莫不援旗請奮整旅前遮遂得凶渠函首露布遙傳此天恩助順者八也夷考西師之後非豫夙願之圖何則實以國家幅員不為不廣屬國不為不多惟厪守成之志無希開創之名兼以承平日久人習於逸既無非常之人安能舉非常之事而建非常之功哉然而輾轉輻湊每以艱而獲易視若失而反得故自締始以逮定功雖豫自問亦將有所不解其故而不敢期其必然者故曰非人力也天也夫天如是顯佑國家者以祖宗之敬天愛民蒙眷顧者深也則我後世子孫其何以心上蒼之心志列祖之志勉繼繩於有永保丕基於無窮乎繫以銘曰二酋偝德始亂為賊是興王師報怨以直伊犁既平蕞爾奚屑徐議耕闢徐議戍設以噢以咻伊豫本懷豈其弗戢圖彼藐回彼回不量怒臂當車戕我王臣助彼狂狙始攻庫車僨轅敗事用人弗當至今為愧悖逆罪重我武宜揚易將整師直壓彼疆阿蘇烏什玉隴和闐傳檄以定肉袒羊牽二酋孽深知不可活狼狽相顧固守其穴桓桓我師周行萬里馬不進焉強弩末矣以四百人戰萬餘虜退猶能守黑水築堡間信達都為之傷悼所幸後軍早行在道督敕速援人同怒心曾不兩月賊境逼臨賊境逼臨彼復徼隙馬繼以進賊營夜斫出其不意賊乃大驚謂自天降孰敢鋒攖大鞣大膊如虎搏案角隴種誰敢回顧黑水圍解合軍暫旋整旅三路期並進焉賊偵軍威信不可支挈其妻孥遁投所依所依亦回豈不自謀豈伊庇猿而受林憂利厥輜重無遺盡掠遣其都丸遂來獻馘詎惟獻馘並以稱臣捧賫表章將詣都門奏凱班師前歌後舞尸逐染鍔溫禺釁鼓露布至都正逮初陽慈寧稱慶亞歲迎祥郊廟告成諸典並舉皇皇太學豐碑再樹豐碑再樹敢豫喜功用不得已天眷屢蒙始之以武終之以文戡亂惟義撫衆惟仁布惠施恩寰宇共喜古不羈縻今為臣子疆闢二萬兵出五年據實書事永矢乾乾御製重修文廟碑記舉江淮河濟以贊海吾知其不知海舉嵩岱恆華以贊地吾知其不知地然則舉道德仁義以贊孔子者其亦類於是乎夫江淮河濟豈不為海所納而不足以形海之大然海固不拒江淮河濟以為水也嵩岱恆華豈不為地所載而不足以究地之厚然地固不讓嵩岱恆華以為土也道德仁義豈不為孔子所垂而不足以盡孔子之量然孔子固不外道德仁義以為教也教之義始見於虞書而未有定所夏校殷序周庠學則三代共之是國學所昉乎夫三代既有學亦必有教而吾以為孔子立道德仁義之教者何蓋三代以前之教非孔子不明三代以後之教非孔子不立亦猶江淮河濟非海不納嵩岱恆華非地不載道德仁義非孔子不垂也國學始於元太祖置宣聖廟於燕京由元及明代有損益修葺至本朝而崇奉規模為大備列聖右文臨雍必事輪奐乾隆戊午朕詣學展儀先詔易蓋黃瓦聿昭茂典然丹艧雖致飾壯觀而上棟下宇風雨燥濕厯年既久浸欹是虞爰以歲丁亥發帑二十餘萬特簡重臣司其事越己丑仲春告蕆工朕親釋奠以落成焉先是言臣有以宜乘此時修復辟雍圜水之制為請者禮官以為三代之制弗相沿襲實政不必泥古朕以其言良是遂從之門殿諸額一凖會典皆親書各懸於其所舉大工者必勒碑以志故敘其事書之若夫述孔子之言仍以頌孔子是猶繪日月星辰以象天朕有所不能御製平定兩金川告成太學碑文太上立德其次立功又其次為立言而德與功皆賴言以傳言之無文行而不逺文之時義大矣哉然傳德之辭直而寡傳功之辭費而多直而寡者不因文而德自見二典三謨經世立教是也費而多者必因文而功乃明周誥殷盤佶屈聱牙是也吾嘗讀韓昌黎平淮西碑益悉此言之不爽何則彼其藩鎮乃家奴之類慫恿因循以致宛成敵國削而平之是宜引以為愧而不可炫以為功賴昌黎之文幾與江漢常武同稱耆定然有識者固知其辭費而多飾而未知憲宗之愧與弗愧耳今之平定金川之文不有類於斯乎解之者曰逆酋羈縻徼外非若淮蔡之居中土元濟之為世臣也吾則以為既已受職為土司則是我臣而其地近接成都逺連衛藏則是我土我土我臣而橫生逆志蠶食鄰封將欲大有所為弗勦而滅之則西川將不能安枕兹雖蕆事與平定淮蔡擒吳元濟何以異故宜引以為愧而不可炫以為功者以此金川之始見於己已告功之文兹不復記記其復叛而復征則其隂謀負恩已自戊寅年始蓋戊辰之師實緣其跳梁不靖而師既臨境彼即窮蹙乞降遂以赦罪班師甫十年而其酋郎卡即與革布什咱搆釁又四年遂與綽斯甲布及三雜谷為敵而逆子索諾木凶悖益甚自恃地廣人衆力強與各土司搆兵訖無寧歲故各土司皆畏之如虎而以勢分力散又莫能如之何余以為業已受其降不宜復加兵且蟻鬭蠻觸不足以勞王師因命地方文武大吏隨宜彈壓令弗越內地界亦足以安民而示度耳不虞地方大吏欲息事而每示寬逆酋轉以為無足懼而日益逞其小金川逆酋僧格桑者始則與索諾木水火相仇繼乃狼狽為姦於是索諾木計殺革布什咱土司色楞敦多布取其印敕以歸而僧格桑亦侵占鄂克什地界且發兵圍其土司色達拉之官寨期於必取總督阿爾泰提督董天弼知事不可掩乃有發兵之請是役也或咎阿爾泰依違誤事之過而余則以為阿爾泰之過皆余之過蓋金川因其地險衆悍久蓄異志是以有殺至維州橋之謡維州本漢徼外羌冉驢地蜀將薑維征羌駐此築壘後因名為薑維城唐武德初因其地置維州屢叛屢復廣德中陷吐蕃號為無憂城遂纍入冦擾大中時始後內附五代蜀州內徙改縣曰保寧宋景德初改曰威州元至元間以州治保寧縣并入明洪武初於州境析置保縣尚本朝雍正五年省威州入保縣屬茂州今其地有維州橋之稱而促浸番人以殺至維州橋播為謡曲似係聞吐蕃舊事妄冀效尤耳則其不忘內地情率可知戊辰之役我師罙入屢勝即不宜赦其罪而受其降此一誤也甫十年而郎卡偝恩作亂以及逆子踵其迹皆不及發兵問罪惟令地方大吏隨宜處置又屢誤也以至尾大不掉終於興師故豫不咎人之議為窮兵黷武而轉咎已之類於姑息養姦蓋中國之制外域張撻伐則彼畏而斂迹主和好則彼輕而生心漢唐宋明之覆轍率可鑒也若謂豫窮兵黷武則豫賴天恩平伊犂定回部拓疆二萬餘里豈其尚不知止足而欲滅蕞爾之金川以為揚赫濯紀勳烈之圖哉雖然平伊犂定回部其事大矣然費帑不及三千萬成功不過五年兹兩金川小冦地不逾千餘里人不滿三萬户而費帑至七千萬成功亦遲至五年則以跬步皆險番奴效命死守故能延至今日而我將軍阿桂立志堅定決機明敏兩副將軍及參贊領隊諸臣同心合力各軍士敵愾奮勇凡經大小數百餘戰而後成功視平伊犂定回部費力轉不啻倍蓰設非天恩助順衆志成城則金川未易言滅而國威或致少損矣是不可以不記觀斯文者尚諒豫懷慚悔過之不暇知非稱功詡德而為言其庶幾乎繫之以辭用志始末云爾小金首禍曰僧格桑兵救鄂什向稱沃日今定為鄂克什急呼之則鄂什也竟抗顔行僧格桑於庚寅夏與鄂克什土司搆怨稱兵阿爾泰董天弼親往誡諭奏稱逆酋遵教退歸亦遂釋而不問未數月復圍鄂克什辛卯夏阿爾泰乃遣兵護鄂克什而逆酋亦遂與官兵交戰督臣提臣每事遷就知弗勝任將軍别授阿爾泰等名為進兵仍思遷就完事因諭溫福由滇赴川經理軍務且命桂林馳往視之辛卯冬因阿爾泰始終遲疑現誤遂罷其職而以溫福代為大學士授定邊將軍由西路督兵進攻其四川總督則令桂林代之統兵攻勦南路攻破巴朗向訛為斑斕山今改直取達圍進抵資哩數月克之兩路夾擊遂得美諾鼠竄狼奔金川助惡溫福初至西路即䇿勵將士攻克巴朗拉乘勝直取達圍進攻資哩數月而克之繼命升額為副將軍同溫福進勦賊尋退還木蘭我兵進抵路頂宗桂林在南路其始顧合機宜連破約咱卡了諸寨並復革布什咱侵地尋為宋元俊所誤致有墨壟溝之失桂林匿不上聞為阿爾泰所劾因即罷斥而令阿桂為副將軍赴南路代領其兵南路自達烏至僧格宗皆峭壁懸崖碉卡林立阿桂董飭官軍勵勇摧堅入其阻乘勝進搗美諾賊巢壬辰十一月遂克之溫福亦攻克明郭宗至美諾與阿桂會復督兵攻取布朗郭宗逆酋由僻徑竄入金川擒其父澤旺解京乃傳檄撫定汗牛大板昭等寨落小金川悉平而金川逆酋索諾木復敢黨惡拒命因移兵並勦之既平趲拉小金川番語本名遂討促浸即金川番語名雪多境險奏功以沈奏功以沈賊更遮郤緑營怯懦遇戰辟易攻勦促浸之兵溫福由功噶爾拉阿桂由當噶爾拉分兩路並進功噶之前為卡撒丫口賊築碉斷徑不能進遂别由昔嶺統攻而碉堅地險兼多雨雪攻之半年雖屢得賊卡終未扼其要害緑旗兵既懦葸溫福又不善調度以二萬於餘人散布各卡防守遂以分而見單賊窺其罅隙癸巳六月遣番衆數百由間道潛出煽誘趲拉降番復叛董天弼庸懦失守為賊所戕賊益猖獗擾溫福後路直侵大營緑營兵衆先潰將領戰沒者多溫福率親兵與賊搏戰亦遇害攢拉之地復失逆酋等罪大惡極愈不可寬矣兵既無能將復失算豈如南路全師而返叶敢阿桂在當噶軍律明而士心固賊不犯然木果木有事之後當噶亦難獨駐遂整勵兵衆由南路全師而出重調徑旅吉林索倫健鋭火器其心忠純前已簡𣲖八旗兵三千令赴川助勦為溫福等奏止使木果木軍營有滿洲兵在彼則緑營得所依恃亦不致倉皇潰竄是其事仍由溫福自誤幸阿桂一路軍氣甚整即授為定西將軍並選健鋭火器營兵三千吉林索倫黑龍江兵四千迅赴軍營重籌進勦仍分兩路堂堂正正不旬日間美諾重定癸巳冬將軍阿桂統兵由西路進攻其南路則令明亮為副將軍進勦兩路並進所向克捷旬日之間即收復小金川全部谷噶既入馬尼去聲並克豢養旗兵允得其力阿桂等於甲午正月搶占谷噶丫口山梁明亮等亦于是時攻克馬尼兩路之兵皆因有八旗徑旅奮勇先登緑營觀感激勸皆效法恐後奏續甚速釃三路進一阻宜喜及彼絨布遇險而止副將軍豐升額同舒常於宜喜駐兵與阿桂明亮共成三路第宜喜之兵攻勦半載未能寸進而明亮則由馬尼攻得木溪卡卡角及抵庚額特亦阻險未能進遂駐絨布寨阿桂西路則屢建功羅博淜普逮遜克宗甲午三月阿桂攻克羅博瓦山梁六月攻克色淜普此諸寨並峯峻碉堅賊衆悉心死守官軍皆涉險鋭攻殱醜甚衆遂臨遜克爾宗喇穆山梁日則了口舉默格爾以擾其後我兵攻克色淜普後賊衆防守力阿桂偵知益喇穆迤西峯崖陡削賊備禦稍踈因分兵超越進攻盡據其碉並攻克日則了口亦六月中事其後兵進稍阻至十月初復繞道攻得默格爾山梁其榮噶爾博日爾八當噶之賊皆截於後明亮宜喜亦據嶺梁而復難進徒然望洋宜喜為賊要隘守禦極嚴豐升額舒常攻之一年未下繼而命豐升額改赴西路舒常在彼更不能進甲午夏因明亮在絨布屢攻未進不宜頓兵於無用之地令其分兵七千移攻正地明亮遣偵卒往探不見賊蹤難以輕進亦赴西路協勦阿桂札止之會綽斯甲布土司懇明亮駐宜喜并願效前驅明亮乃出其不意分兵冒兩直進遂據宜喜山梁並攻得俄坡格勒古賊因掘濠斷路明亮等復為所阻矣逮昨乙未略康薩爾木思工噶賊碉並毁阿桂自攻得默格爾欲乘勝直進賊復於康薩爾山梁抗阻兩月餘乙未正月阿桂𣲖兵分路潛進拔其鹿角連越重濠躍上碉頂遂毁其碉殱賊甚衆四月復攻得木思工噶克了口從此下壓勢益順矣明亮河西亦有所據日旁以前五十里路明亮因達爾圖之路為賊所斷商之阿桂謂當仍由宜喜一路進攻並𣲖西路兵一千令福廩安帶往攻克甲索碉卡海蘭察亦往會攻合力并擊先克撒撒谷其日旁右之沙壩山並達爾圖得楞及溝內之斯年木咱爾各賊皆紛紛案碉遁周團五十餘里寨落悉行焚燒夾河兩軍聲息可通並清後路遜克爾宗五月中明亮攻克額爾替碉卡可下至平坡六月間復攻克石真噶寨阿桂𣲖兵沿河從赤爾寨攻打隔河之沙爾尼一帶兩岸夾擊聲息可通逮阿桂攻得噶爾丹喇嘛寺等處居髙得勢以遜克爾宗在我兵之後留之非計遂𣲖兵三路分進豐升額督率攻勦或斫寨而入或梯牆而進遂得其碉殺賊無算後路益肅清矣災則大海昆色拉枯層層破要步步披嶇阿桂以昆色爾喇嘛寺在拉枯喇嘛寺之上於此路尤為扼要其災則大海亦當並勦分𣲖將領統兵同往其毗色爾山梁最險官兵皆蟻附上攻占其碉寨復縱火焚燒拉枯喇嘛寺又攻得災則大海官兵無不超越而登飛騰而入遂克勒圍紅旗飛遞而何四月大捷未至既克西里乃若建瓴科布曲索隆古不日而傾阿桂於八月十五夜攻克勒烏圍其附近碉卡木城六十餘處一夕無不摧破八日而紅旗遞至木蘭詳見聞捷凱歌及志事詩自奏捷後四閲月雖時有克獲未能罙入直至十一月初攻克西里軍聲愈壯而賊勢愈蹙尋即攻得科布曲索隆古山梁並克格隆古兜窩等要隘又掃清安布魯木一帶益據建瓴之勢矣雍中舍齊易如拉朽密圍噶喇依賊其奚走阿桂既由索隆古進攻朗阿古則朗噶克了口等處皆克之並據噶占山梁十二月十七日遂由瑪爾古當噶一帶寨落悉行掃蕩並克舍齊喇嘛寺次日復攻克雍中喇嘛寺即於十九日統兵直搗噶喇依四面圍攻水陸俱斷促浸番衆自攻克勒為圍以來大小男婦紛紛投出其大頭人布籠普阿納木達什阿庫魯等遂皆相率乞降並索諾木之母阿倉姑阿青及其姊妹亦皆投至軍營僉云索諾木莎羅奔兄弟並作惡之大頭人丹巴沃雜爾等皆在圍中此蓋逆酋賊黨等罪孽深重一處天奪其魄驅之以就擒也是時河西明亮亦入富德馬邦傳檄芥拾明亮既克阿爾古等寨克取獨古木開通乃當山梁並搗甲雜掃獨松河西一帶悉行勦洗遇河會阿桂合攻賊巢富德亦將河南北之噶咱普庚額特曾達等各寨落全行掃清直據馬爾邦亦遣兵與阿桂會富德所得之地俱不煩兵力易如拾芥設非西路圍噶喇依則其兩路亦無進期明亮富德兩路向皆艱於攻取而富德久駐絨布尤未能寸進自阿桂既克索隆古乘勝席捲已圍噶喇依各處之賊皆膽破心散望風漬降非果由力戰而得若非西路官兵直搗賊巢則明亮富德兩路仍未有進取之期也諸軍既合火攻周遭雖據三穴訖其奚逃然猶死守四十餘日計窮力竭乞命而出官兵四面合圍賊猶負嵎力抗斷用大炮環轟摧其碉卡將士等乘勢克取旁近寨落層層進逼殱賊日多逆酋惶懼遣其兄岡達克彭楚克次第詣營並即拘繫於是攻圍益急據其近碉斷其水道索諾木窘迫無計遂於二月初四日早率其兄弟莎羅奔甲爾瓦沃雜爾斯丹巴并兩土婦及黨惡大頭人丹巴沃雜爾阿木魯綽窩斯甲尼瑪噶喇克巴並兩喇嘛挈大小頭目男婦二千餘人出寨逆前跪捧印信乞免誅戮因即悉就擒獲自圍𠞰以來計四十餘日至是全境蕩年罪人斯得紅旗於二月十二日馳至桃花寺行宫適當告功敬隨東陵之期此實仰賴功將皇祖默佑益深感諭將軍阿桂等統成士擇日凱旋俟東巡回蹕至黃新莊舉行郊勞大與以昭偃武䇿勳之盛金川之功阿桂居首特恩異數加之宜厚征勦全川之役實由將軍阿桂藎誠體國不憚艱勞制勝運籌克成偉績實為此事首功特封為頭等誠謀英勇公加賞雙眼孔雀翎紅寶石帽頂四團龍補褂金黃帶紫轡以昭崇奬能出能入有權有經運長擊短後實先聲金川之功允資羣力寸步層峯氷滑石仄將軍指揮無不奮勇以此破敵鹿埵隴種金川之功非豫所期事弗可已久而得之鬭猶獸困捨懲雞肋念我衆勞至今心惻金川之功允賴上蒼靖彼蕃徼我武維揚勒碑太學用遵成例靜言思之文以志愧御製國學新建辟雍圜水工成碑記名者實之賔實者名之主為學之方應務其實以蘄循其名不可炫其名以致亡其實興學之源綦要於國學國學者天子之學也天子之學曰辟雍諸侯之學曰泮水北京之國學自元厯明以至本朝蓋五百餘年矣有國學而無辟雍名實或不相稱焉雖有建議請復以乏水而格部議至今未復癸卯春始有復建之諭甲辰冬乃觀新工之竣將於乙巳仲春行釋奠禮遂臨雍以落成焉夫北京為天下都會教化所先也大典缺如非所以崇儒重道古與稽而今與居也雖乏水然有不改之井汲以綆而用之無窮亦在人為之而已於是石之鱗次見圜斯池水之鏡澄見明斯漪殿之據中見隆其榱橋之通行見接其基上庠下庠雖難考二典之制而東序西序總不出三代之規則是工之舉也又豫知過論所謂於不可已者仍酌行之之意而物給價工給值原非勞民動衆之為若夫三老五更之説豫以為括于養老化俗之儀而非天子臨雍所必應並行而不遺者蓋弗見於詩書乃特出杜氏通典之私耳且豫向有三老五更之説已明闢其謬兹不復綴乎詞雖然豫更有懼於是舉者夫是舉豈非復古興學之懿有何懼而豫懼之者恐後之人執豫復古之説於一切衣冠典禮皆欲效漢人之制則豫為得罪祖宗之人匪教伊虐甚慮不宜也豫之子孫臣庶體豫此心於可復古者復之其不可復者斷不可泥古而復之夫徒慕復古之虛名而致有忘祖宗之實美非下愚而何豫不為也豫敬以是告子孫以保我皇清萬年之基也御製三老五更説三老五更之説不見於詩書其見於禮記者蓋出乎漢儒非孔子之言唯左傳三老凍餒之文為最古然傳謂公聚朽蠧而三老反不見養遇非與五更相提並論也注三老五更者多矣或謂上中下夀或謂工商農而不及五更出左傳孔疏或謂明天地人與五行之事出白虎通或謂取象三辰五星出後漢書禮儀志或謂知三德五事者出鄭康成禮記注各以臆度不堪僂指矣至蔡雍獨斷乃有父事之説而白虎通之謬直以老更各一人且曰父一而已不宜有三吁可怪哉天子養老即所以教孝於天下何至以父事之且即其説父一而已則天子已自有父今復事一人是非二父乎腐儒執虛文而謬大義真不值一噱耳雍復解更為叟謂豕亥之訛夫叟與老同既有老何藉叟為哉豫以為三者天地人之數養老自以三舉其數耳若夫五更則更事之説為近而五倫五常莫不具於此人數不必其備行之以敬誠愷悌則中和位育將在是矣後儒一切穿鑿之論何足數哉御製臨雍講義為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信此雖言文王之止於至善而實訓萬古五倫之要道也夫文王固身厯為君臣父子與人交而各盡其善矣試思人孰不在五倫之中而各有當止於其善之道乎是故為君者匪惟博施濟衆以為仁即疸惡弼教之義亦必當本於仁而出之所謂止也人臣之敬詎其夙夜匪懈恪恭承旨之謂即繩愆糾謬陳善間邪亦必當本於敬而出之所謂止也生事死葬祭之以禮人子之止於孝蓋終身之事非謂無父母即無子之止於善也若夫父之曰嚴似殊乎母之慈而不知父之嚴正所以行其慈也至於兄友弟恭夫唱婦隨皆與人交之義而朋友之信固該其中矣余固云此雖言文王之止於至善而實訓萬古五倫之要道也天行健君子以自強不息天一日一周是行健也然天之運行終古不息不惟不息蓋並不息亦無意於其間所謂健也此應與中庸至誠無息並觀之所謂誠者天之道也若夫法天之君子乃誠之者人之道然亦不外自強不息而已蓋天之不息無為而為人之不息則在自強自強者必本於克已復禮人十已千成已成物胥在乎是聖人之言非特為為君者言蓋人人皆有法天之道而為人君者益當夕惕朝乾孜孜亹亹不遑暇逸以是為亟耳欽定國子監志卷五

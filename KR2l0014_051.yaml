body:
  text: 經籍板片聖祖仁皇帝御製文集初集至四集板共四千三百二十六面康熙五十二年刋御纂周易折中板一千零二十一面康熙五十四年隆武英殿刋刻乾二年監臣請㫖重刋御纂性理精義板四百二十面康熙五十六年年武英殿刋刻乾隆二監臣請重刋㫖欽定春秋傳説彚纂板一千九百零六面康熙六十年武英殿刋刻乾隆二年監臣請㫖重刋月令輯要板七百二十四面康熙五十四年刋對數廣韻板一百五十面黒板七十五面紅板七十五面大數表板九百三十八面黒板四百六十九面紅板四百六十九面小數表板二百八十面黒板一百四十面紅板一百四十面欽定音韻闡微板六百七十九面雍正四年刋欽定詩經𫝊説彚纂板一千六百一十七面雍正五年武英殿刋刻乾隆二年監臣請㫖重刋子史精華板三千四百二十面雍正五年刋欽定書經𫝊説彚纂板一千一百七十六面雍正五年武英殿刋刻乾隆二年監臣請㫖重刋世宗憲皇帝御製文集板七百二十四板雍正十二年刋欽定四書文板一千五百四十二面乾隆四年刋清文八旗通志板一萬二千五百零一面乾隆四年刋漢文八旗通志板七千三百六十三面乾隆四年刋欽定授時通考板二千二百一十四面乾隆七年刋清文八旗氏族通譜板二千二百三十九面乾隆九年刋漢文八旗氏族通譜板一千七百四十面乾隆九年刋謹按以上十九種共极匹萬五千四百四十四面内四經及性理精義係監臣楊名時等請英㫖重刋餘俱存武殿刻竣送監貯周易注疏板四百七十六面尚書注疏板七百零五面詩經注疏板一千四百九十九面左傳注疏板二千零三十二面公羊注疏板八百三十二面穀梁注疏板五百一十八面周禮注疏板一千二百四十七面儀禮注疏板九百八十七面禮記注疏板一千八百三十七面論語注疏板二百九十七面孝經注疏板九十四面孟子注疏板五百二十二面爾雅注疏板三百七十五面史記板二千六百七十三面前漢書板三千二百五十六面後漢書板二千五百二十四面三國志板一千四百七十五面晉書板三千一百七十五面宋書板二千三百二十二面南齊書板九百一十九面梁書板八百一十面陳書板四百六十三面魏書板二千八百四十四面北齊書板六百一十五面周書板七百三十九面隋書板一千八百五十九面南史板一千八百二十二面北史板二千九百三十面舊唐書板五千二百八十八面唐書板五千三百三十面五代史板八百六十四面宋史板一萬一千五百五十九面遼史板一千一百二十七面金史板二千五百二十九面元史板四千三百四十八面明史板七千三百六十八面皇上謹按監中舊有明時經史板片以嵗久日漸殘闕爰勅詞臣校讐刋布並明史共板七萬八千二百六十面仍交監收貯通典板三千六百一十六面通志板一萬二千二百八十六面文獻通考板九千七百六十三面近思録板一百五十八片雙面大學衍義板七百二十四片雙面謹案以上國子監共貯板刻六十四種計十六萬零一百二十七面監中原貯皇上御製詩集板五百九十二面古文約選板一千零八十六面清文四書板四百三十五面清文小學孝經板四百五十九面漢文小學孝經板一百九十五面性理大全板一千三百九十四面清文性理精義板九百四十二面朱子全書板二千九百三十三面國學禮樂録板三百六十面共板八千三百九十六面乾隆三十四年十月接武英殿修書處來文􅌳還又仿宋板四書板一千零二十八面已於乾隆二十一年八月􅌳還謹附識於此板片書目總附明太學志載書籍板片名目經部易類有易經大全易經本義周易音訓書類有書經大全書經集注書經白文尚書㑹選詩類有詩經大全詩經集注詩樂圖譜春秋類有春秋大全春秋胡𫝊禮類有禮記大全禮記集注儀禮周禮儀禮圖解喪禮祭禮四書類有四書大全四書集注四書集義大學或問中庸或問論語集注論語小字論語白文孟子集注孟子小字孟子節文四子抄釋孝經小學類有孝經紅簽字帖白簽字帖千家文體押韻西林字書字苑撮要韻畧經解類有大學講章史部正史類有史記漢書後漢書三國志晉書宋書南齊書梁書魏書北齊書後周書南史北史五代史元史編年類有資治通鑑通鑑綱目世史正綱綱目前編通鑑正誤雜史類有漢詔蜀漢本末古史宋遼金正統故事類有大明㑹典敕諭監規國子監通志續志臨雍録監規發明春季考録㑹約申明監規臨雍録隆慶二年春季考録萬厯四年臨雍録東廂條約西廂條約辟雍紀畧儀注類有大明集禮侯伯習禮新官到任須知太學儀注禮生儀注朱子家禮刑法類有大誥大明律地理類有山海經類書類有文獻通考子部儒家類有為善陰隲孝順事實五倫書明倫大典性理大全法言太元太元索隠觀物篇進修録大學衍義小學朱子語録讀書録經世籍司馬温公心箴我箴學的官箴道家類有老子列子兵家類有尉繚子方技類有藥性珍珠囊四十氣侯圗本草幼小方雜家類有務本直言小説類有類林雜説集部别集類有楚詞東萊集臨川集出師表淮海文集樊川集孟四元賦總集類有厯代名臣奏議青雲梯賦詩苑珍珠囊唐詩又憲宗幸學儀注一卷國子監規一卷邢讓國子監志二十二卷謝鐸國子監續志十一卷崔銑國子監條例類編六卷虞上銘辟雍紀事十五卷世宗御製敬一箴一卷注程子四箴范浚心箴共二卷太學志又侯伯習禮二十五板臨雍録五十四板隆慶元年臨雍録四十九板萬厯四年臨雍録四十三板太學儀注十九板禮生儀注五板監規發明十六板春季考録三十三板㑹約十二板申明監規十二板東廂條約十板西廂條約七板隆慶二年春季考録二十三板辟雍紀畧二十板太學講章三十八板謹案以上所載書籍板片或有書無板或有板無書皆殘物也且經部缺注疏史部缺唐書及宋遼金史三種當時儲書闕畧大概可知又太學志所記极片書本或缺或重不可别白故綜御書列其目併附板片之後以僃参考至樓現貯故明舊板已附見皇朝經籍條中兹不復贅云欽定國子監志卷五十二

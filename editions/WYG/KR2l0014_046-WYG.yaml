  text: 欽定四庫全書欽定國子監志卷四十七
  hash: sha256:918ec84dfc2e9a545cc6d67c14847ecaeb5c9a38cbafa999e1d33dbd7c286285
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_046-1a, image: WYG0600/WYG0600-0481c.png}
body:
  text: 金石二御碑世祖章皇帝曉示生員卧碑淸漢文各一順治元年二月立石石横列在太學門左南向聖祖仁皇帝御製至聖先師孔子贊碑康熙二十五年七月立石在大成殿甬路東正中有亭御製四子贊碑康熙二十八年閏三月立石在大成殿甬路西正中有亭御製訓飭士子文碑康熙四十一年正月御筆鈐寳一曰康熙御筆之寳立石在敬一亭正中南碑隂刻禮部左侍郎仍兼管國子監祭酒事邵穆布禮部左侍郎仍兼管國子監祭酒事孫岳頒國子監司業滿丕黨阿賴魯援立石國子監鑲黃旗助教徳明正白旗助教巴泰國子監典簿㕔阿起納典簿㕔郝士銓監造鴻臚寺序班朱圭鐫字御製平定朔漠告成太學碑康熙四十三年三月立石淸漢文鈐寳三曰廣運之寳碑陰刻禮部左侍郎兼管國子監祭酒事邵穆布禮部右侍郎兼管國子監祭酒事孫岳頒國子監司業滿丕黨阿賴黃叔琳助教徳明佛保學正傅元甡典簿阿起納典籍王澠筆帖式勒爾圖同監造鴻臚寺序班朱圭篆額並鐫在大成殿甬路西北有亭以上各碑文俱恭載御製門御書聖經石刻康熙三十三年仲夏御書鈐雙龍乾坤圓寳一曰體元主人方寳一曰萬幾餘暇立石在􅂜倫堂正中兩柱間碑陰刻排類校對官經筵講官文華殿大學士兼禮部尚書臣張英經筵講官吏部尚書臣陳廷敬經筵講官刑部尚書臣王士禎經筵講官工部尚書臣王鴻緒都察院左副都御史臣勵杜訥禮部左侍郎仍兼管國子監祭酒事臣卲穆布兵部左侍郎臣胡會恩禮部左侍郎仍兼管國子監祭酒事臣孫岳頒日講官起居注詹事府少詹事兼翰林院侍講學士臣張廷瓚日講官起居注翰林院侍講學士臣陳元龍兵科掌印給事中臣宋駿業監造官養心殿監造六品官兼景山火器總官臣趙昌養心殿監造兼内務府廣儲司司庫臣强國忠養心殿監造兼内務府廣儲司司庫臣王道化武英殿監造内務府會稽司管理錢糧員外郎臣赫世亨武英殿監造内務府廣儲司主事臣張常住鐫刻鴻臚寺序班臣朱圭内務府序班臣梅裕鳯御筆牓書四碑一曰嵩髙峻極一曰靈瀆安瀾一曰功存河洛一曰昌明仁義牓正中各題曰康熙御筆鈐御寳四曰廣運之寳立石在敬一亭中楹左右皆南向世宗憲皇帝御製平定青海告成太學碑雍正三年五月立石在大成殿甬路東南有亭御製仲丁詣祭文廟詩碑雍正六年二月御筆鈐寳一曰御筆之寳立石在大成殿甬路西南有亭御製文廟易葢黄瓦臨雍紀事碑乾隆三年三月皇上詣學釋奠先師四年十二月立石淸漢文後刻經筵講官户部左侍郎梁詩正奉勅敬書碑陰刻御製乾隆庚申仲春釋奠詩御筆鈐寳二曰乾隆甲子仲秋釋奠詩御筆鈐寳二曰乾隆御筆曰所寳惟賢在大成殿甬路東北隅有亭御製訓飭士子文石刻乾隆五年十一月御筆鈐寳二曰乾隆御筆曰所寳惟賢立石在南學率性堂正中柱間碑陰刻總管御書處和碩和親王臣𢎞晝多羅慎郡王臣允禧排類校對官都察院左都御史兼管國子監事臣劉呉龍國子監祭酒臣敷文國子監司業臣塞爾登國子監司業臣開泰國子監司業臣多爾濟國子監司業臣徐以烜監造官御書處監造内務府廣儲司總理六庫郎中臣邁格御書處監造兼内務府廣儲司郎中臣吉葆御書處監造兼内務府掌儀司員外郎臣明月御書處監造兼内務府佐領臣豐盛額御書處監造兼内務府都虞司主事臣永泰御書處監造兼内務府掌儀司贊禮郎臣時運御書處監造臣許夢熊刻字委署催總宋璋等鐫刻御製平定金川告成太學碑乾隆十四年四月立石淸漢文後刻經筵講官太子少師協辦大學士吏部尚書梁詩正奉勅敬書碑陰刻御製乾隆癸酉仲秋釋奠詩御筆鈐寶二曰乾隆丙子仲春釋奠詩御筆鈐寳二曰乾隆御筆曰所寳惟賢在大成殿甬路西北隅有亭御製平定凖噶爾告成太學碑乾隆二十年五月御筆淸漢文鈐寳二曰惟精惟一曰乾隆宸翰立石左大成殿甬路東碑陰刻伊犂勒銘淸漢文乾隆二十三年七月御筆有亭御製古槐詩石刻有圗古槐在西講堂階下為元臣許衡手植至乾隆辛未閲嵗五百枯而復榮六館師生𫝊為瑞應越八年己卯大學士蔣溥以丁祭齋宿講堂親觀盛事繪圖呈覽皇上御製五言六韻詩一章題卷中乾隆二十四年兵部侍郎兼國子監祭酒觀保等請刻石以示久逺吏部左侍郎董邦達展為鉅幅縱五尺橫八尺前刻御筆題詩鈐寳二曰惟精惟一曰所寳惟賢下刻董邦達恭跋及觀保等請刻石疏乾隆二十四年十一月立石置西講堂正中後刻祭酒臣全魁祭酒臣陸宗楷司業臣博卿額司業臣吉泰司業臣盧㲄末署臣觀保敬書是碑跋語奏疏俱載藝文門御製平定回部告成太學碑乾隆二十四年十二月御筆淸漢文鈐寳二曰信天主人曰乾隆宸翰立石在大成殿甬路正中有亭碑陰刻御製己丑仲春釋奠詩御筆鈐寳二曰乾隆以上八碑詩文俱恭載御製門詔修國子監碑乾隆二十四年兵部侍郎兼管監務臣觀保奏修葺國子監奉㫖允行次年八月立石太學門右是碑載諭諭㫖恭㫖門奏疏載藝文門勅修御書樓碑文廟東北隅舊有樓十五楹尊藏御書乾隆二十四年四月重修衙署并加繕葺二十五年八月立石御書樓下東向碑下書經筵講官兵部左侍郎正白旗滿洲副都統兼管國子監事務教習庶吉士臣觀保祭酒臣宗室良誠祭酒臣全魁祭酒臣陸宗楷司業臣博卿額司業臣吉㤗司業臣朱璂司業臣盧㲄助教兼管繩愆典簿㕔事臣札什助教兼管繩愆典簿㕔事臣永貴助教兼管典簿㕔事臣噶爾弼善助教臣陳孝泳篆額學録臣馮秉忠書丹大修文廟碑乾隆三十二年三月二十日奉上諭清漢文立石在大成門外西南有亭上諭恭載諭㫖門御製重修文廟碑乾隆三十四年二月御筆清漢文鈐寳二曰乾隆御筆曰惟精惟一立石在大成殿甬路東北有亭碑隂刻御製乾隆癸卯仲春釋奠詩御筆鈐寶二曰古稀天子之寶曰猶日孜孜御製乙巳仲春釋奠詩御筆鈐寶二曰古稀天子之寶曰猶日孜孜詩文恭載御製門御製平定兩金川告成太學碑乾隆四十一年五月御筆鈐寶二曰乾隆立石在大成殿甬路東南碑文恭載門御製御製國學新建辟雍圜水工成碑乾隆四十九年十月御筆清漢文鈐寶二曰古稀天子之寶曰猶日孜孜立石在辟雍前甬路東西有亭碑隂刻御製三老五更説御筆清漢文鈐寶二曰古稀天子之寶曰猶日孜孜碑文恭載門御製御碑附元加封先師文宣王遣祀闕里碑大徳十一年七月立石上書皇天眷命皇帝聖㫖下書奉訓大夫國子司業臣潘迪書亞中大夫國子司業臣謝端篆臣茅紹之刻碑隂刻翰林院直學士中大夫知制誥同修國史國子祭酒臣歐陽元亞中大夫國子司業臣謝端奉訓大夫國子司業臣潘迪承徳郎國子監丞臣張􅂜承仕郎國子監典簿臣尹忠承直郎國子博士臣王昕承直郎國子博士臣黄承務郎國子助教臣將仕郎國子助教臣儒林郎國子助教臣從仕郎國子助教臣承務郎國子助教臣國子學正臣國子學正臣國子學録臣劉思國子學録臣焦思問國子司樂臣王居敬國子典籍臣王汝衡國子典籍臣劉洪廟學管勾臣秦悌國子掌儀臣張昭國子掌儀臣至元二年十月刻石在大成門外東階下南向是碑空處皆缺文加封先聖父母及聖配夫人顔曾思孟四子碑至順三年九月立石碑隂刻集賢侍講學士中奉大夫兼國子祭酒臣王思誠奉直大夫國子司業臣薛泰儒林郎國子司業臣董立承徳郎國子監丞臣毛元慶文林郎國子典簿臣李烈文林郎國子博士臣鄭鈞奉訓大夫國子博士臣張頤奉訓大夫國子助教臣劉文芳承事郎國子助教宗聖公五十六代孫臣曾堅奉訓大夫國子助教臣胡行簡從事郎國子助教臣吕寧國子助教臣張巖起國子學正臣李思誠臣于謙國子學録臣馮彦弼臣劉仲元國子司樂臣趙植國子典簿臣朱棣蕚臣孟志道廟學管勾臣劉士俊國子掌儀臣郭鵬逺臣吕天倫至正十六年六月茅紹之門人蒲水郝恭刻石在大成門外西階下南向明洪武學制碑洪武二年立石北平府學字已磨泐今在太學門左西向五朝上諭碑洪武十五年二月三十年七月宣徳三年四月正統五年六月九年三月景泰三年二月成化元年三月計上諭七道為一碑成化三年嵗次丁亥三月立下書朝列大夫祭酒邢讓等立石在太學門左南向英宗御製新建太學碑正統九年三月立石舊在大成殿東廡乾隆三十三年重修文廟移置大成門外東南南向有亭世宗御製敬一箴碑嘉靖五年六月二十日立石有亭曰敬一碑在亭正中世宗御注心箴碑御注四箴碑各一頒發五箴聖諭碑右御注五箴碑皆嘉靖丁亥勒石尚完好聖諭碑字多磨泐後刻嘉靖六年十一月敬一箴居中左為聖諭右為心箴又左為視箴又右為聴箴又再左為言箴又再右為動箴皆南向欽定國子監志卷四十七

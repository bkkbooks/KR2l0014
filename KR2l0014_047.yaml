body:
  text: 金石三題名順治三年丙戌科賜傅以漸等三百七十三名及第出身題名碑謹按明進士題名並命閣臣作記重見複出文義一律我聖朝進士題名於篆額之下刋榜首制一道於法為簡質云四年丁亥科賜吕宫等二百九十八名及第出身題名碑康熙三十一年補立六年己丑科賜劉子壯等三百九十五名及第出身題名碑康熙四十九年補立九年壬辰科賜鄒忠倚等三百九十七名及第出身題名碑又賜繙譯進士麻勒吉等五十名及第出身題名碑以上五碑在之大成門外東南向十二年乙未科賜史大成等三百九十九名及第出身題名碑又賜繙譯進士圖爾宸等五十名及第出身題名碑以上二碑在之大成門外西南向十五年戊戌科賜孫承恩等三百四十三名及第出身題名碑在門大成外之東南向十六年己亥科賜徐元文等三百三十七名及第出身題名碑十八年辛丑科賜馬世俊等三百八十三名及第出身題名碑康熙三年甲辰科賜嚴我斯等三百名及第出身題名碑以上三碑在西大成門外之南向六年丁未科賜繆彤等一百五十五名及第出身題名碑在外大成門之東南向九年庚戌科賜蔡啟僔等二百九十九名及第出身題名碑在門大成外之西南向十二年癸丑科賜韓菼等一百六十三名及第出身題名碑在外大成門之西南向十五年丙辰科賜彭定求等二百九名及第出身題名碑在之大成門外西南向十八年己未科賜歸允肅等一百五十一名及第出身題名碑在門大成外之東南向二十一年壬戌科賜蔡升元等一百七十九名及第出身題名碑在門大成外之西南向二十四年乙丑科賜陸肯堂等一百六十四名及第出身題名碑在門大成外之東南向二十七年戊辰科賜沈廷文等一百四十六名及第出身題名碑在門大成外之西南向三十年辛未科賜戴有祺等一百五十七名及第出身題名碑在門大成外之東南向三十三年甲戌科賜胡任輿等一百六十八名及第出身題名碑三十六年丁丑科賜李蟠等一百五十名及第出身題名碑三十九年庚辰科賜汪繹等三百五名及第出身題名碑四十二年癸未科賜王式丹等一百六十六名及第出身題名碑四十五年丙戌科賜王雲錦等二百九十名及第出身題名碑以上五碑在大成門外之西南向四十八年己丑科賜趙熊詔等二百九十二名及第出身題名碑在門大成外之東南向五十一年壬辰科賜王世琛等二百七十七名及第出身題名碑五十二年癸已科賜王敬銘等一百九十六名及第出身題名碑五十四年乙未科賜徐陶璋等一百九十名及第出身題名碑以上三碑在大成門外之西南向五十七年戊戌科賜汪應銓等一百六十五名及第出身題名碑六十年辛丑科賜鄧鍾岳等一百六十三名及第出身題名碑雍正元年癸夘科賜于振等二百四十六名及第出身題名碑二年甲辰科賜陳悳華等二百九十九名及第出身題名碑世宗憲謹按是年工部遵㑹典動正帑令每科按例題皇帝特諭請並補建從前遺闕由是甲第姓氏咸按碑可考云五年丁未科賜彭啟豐等二百二十六名及第出身題名碑八年庚戌科賜周􅒴等二百九十九名及第出身題名碑十一年癸丑科賜陳倓等三百二十八名及第出身題名碑乾隆元年丙辰科賜金徳瑛等三百四十四名及第出身題名碑二年丁巳科賜于敏中等三百二十四名及第出身題名碑四年己未科賜莊有恭等三百二十八名及第出身題名碑七年壬戌科賜金甡等三百十三名及第出身題名碑十年乙丑科賜錢維城等三百十三名及第出身題名碑十三年戊辰科賜梁國治等二百六十四名及第出身題名碑又賜繙譯進士武敬等二十一名題名碑十六年辛未科賜吳鴻等二百五十三名及第出身題名碑又賜繙譯進士寧武立等二十一名題名碑十七年壬申科賜秦大士等二百三十一名及第出身題名碑十九年甲戌科賜莊培因等二百四十一名及第出身題名碑二十二年丁丑科賜蔡以臺等二百四十二名及第出身題名碑二十五年庚辰科賜畢沅等一百六十四名及第出身題名碑二十六年辛巳科賜王杰等二百十七名及第出身題名碑二十八年癸未科賜秦大成等一百八十八名及第出身題名碑三十一年丙戌科賜張書勲等二百十三名及第出身題名碑三十四年己丑科賜陳初哲等一百五十一名及第出身題名碑三十六年辛夘科賜黄軒等一百六十一名及第出身題名碑三十七年壬辰科賜金榜等一百六十二名及第出身題名碑四十年乙未科賜呉錫齡等一百五十八名及第出身題名碑四十三年戊戌科賜戴衢亨等一百五十七名及第出身題名碑四十五年庚子科賜汪如洋等一百五十五名及第出身題名碑四十六年辛丑科賜錢棨等一百六十九名及第出身題名碑四十九年甲辰科賜茹棻等一百一十二名及第出身題名碑自康熙戊戌至乾隆甲辰計三十一碑俱在大成門外南向國子監祭酒司業題名碑無記無立碑年月額曰祭酒司業題名碑起順治元年祭酒固爾嘉渾李若琳訖康熙四十九年字出一手皆係一時刻石自五十二年以後祭酒三人司業五人字與四十九年以前不倫又下刻監丞等官四十七人字更不倫當是四十九五十年間立碑餘皆増入無疑也碑舊在東講堂乾隆二十四年重修國學移東廂正堂之左南向國謹案王士禎池北偶談云祭酒司業業宛平劉公初以來未有題名官祭酒時因與司芳詰議補其闕葢僅登姓氏於卷帙未遽立碑也觀士禎書所記祭酒四十一人再任重見者二實三十九人今見於碑者僅二十八餘如阿都里胡統虞髙珩李呈祥王崇簡沙澄馮溥呉偉業張士甄李中白李儀古十一人碑皆遺之又載司業六十一人補任重見者二實五十九人今見於碑者僅三十八餘如李虎河傅達禮白清額莽古圖鄥代曹爾和薛所藴羅憲汶劉肇國吕纘祖李奭棠單若魯王熙曹本榮姜允衡張永祺楊永寧陳敱永田種玉馬晉允張貞生二十一人碑皆遺之士禎所記至康熙三十四年止其自三十四年以前見於碑而士禎不載者祭酒則有傅維麟常錫布徳白色圖納哈鄂拜博濟傅繼祖尹泰八人司業則有馮杰曹溶楊義田逢吉陳洪明博濟宋古宏席爾圖薩爾圖九人是士禎所記與現存之碑可互證其闕也國子監祭酒司業題名碑乾隆三十一年立石在東廂正堂之左南向無記國子監四㕔六堂官題名碑乾隆三十一年立石在東廂正堂之左南向無記題名附元至正十一年辛卯進士題名碑右碑刻蒙古色目一甲圗烈圖二甲五人三甲二十七人漢人南人一甲文允中二甲五人三甲三十九人祭酒王思誠記至正十九年己亥四色進士題名碑右碑刻正榜蒙古烏爾等六人以下副榜人數字皆磨滅難辨有記不載名至正二十六年丙午國子監公試題名碑右碑刻正榜䝉古闕名等七人賜正六品色目闕名等六人賜從六品漢人蔡元等七人賜正七品副榜六人俱蒙古有記不載名謹案以上三碑康熙三十一年呉苑為祭酒時得於啓聖祠土中今在又考孫承澤春明夢餘録云延大成門外之西南祐二年進士題名記趙孟頫書碑立國學今無之王士禎池北偶談云明時内官既安督工建太學悉取元進士題名磨去刻字此雖與五代劉􅬸取古碑甃城稍異然古蹟湮沒亦可惜也明永樂十三年乙未科賜陳循等三百五十一名及第出身題名碑翰林學士楊榮撰文中書舎人朱暉書在東大成門外南北向十六年戊戌科賜李騏等二百五十名及第出身題名碑翰林學士楊榮撰文中書舎人朱暉書十九年辛丑科賜曽鶴齡等三百一名及第出身題名碑大學士楊榮撰文中書舎人陳景茂書以上二碑在西大成門外之南向二十二年甲辰科賜邢寛等一百五十名及第出身題名碑大學士楊士奇撰文吏部考功司郎中夏衡書宣徳九年補立宣徳二年丁未科賜馬愉等一百名及第出身題名碑大學士楊士奇撰文中書舎人程南雲書五年庚戌科賜林震等一百名及第出身題名碑大學士金幼孜撰文禮部郎中陳景茂書八年癸丑科賜曹鼐等一百名及第出身題名碑禮部尚書楊溥撰文禮部郎中王養正書以上四碑在南大成門外東北向正統元年丙辰科賜周旋等一百名及第出身題名碑少詹事王直撰文行在吏部主事夏㫤書四年己未科賜施槃等一百名及第出身題名碑翰林學士錢習禮撰文太常寺少卿程南雲書以上二碑在南大成門外之東向七年壬戌科賜劉儼等一百四十九名及第出身題名碑翰林學士陳循撰文太常寺少卿程南雲書十年乙丑科賜商輅等一百五十名及第出身題名碑翰林學士曹鼐撰文中書舎人陳學書十三年戊辰科賜彭時等一百五十名及第出身題名碑翰林學士苗衷撰文中書舎人黄采書景泰二年辛未科賜柯潛等二百十二名及第出身題名碑大學士陳循撰文太常寺少卿汪謙書大謹按是年司業趙琬奏進士題名立石國子監成門下俾諸生出入皆得瞻仰誠激勸後學之大意正統間移於淋易於損壊乞勅工部造屋覆成門外風雨飄盖以圗經久從之五年甲戌科賜孫賢等三百四十九名及第出身題名碑大學士陳循撰文吏部郎中董璵書天順元年丁丑科賜黎淳等三百名及第出身題名碑吏部尚書李賢撰文順天府府丞余謙書四年庚辰科賜王一夔等一百五十名及第出身題名碑吏部尚書李賢撰文禮部員外郎凌耀宗書八年甲申科賜彭教等二百四十七名及第出身題名碑吏部尚書李賢撰文禮部員外郎謝宇書成化二年丙戌科賜羅倫等三百五十名及第出身題名碑大學士陳文撰文禮部郎中陳綱書五年己丑科賜張昇等二百五十名及第出身題名碑大學士彭時撰文太常寺少卿林章書八年壬辰科賜吳寛等二百五十名及第出身題名碑户部尚書商輅撰文太常寺少卿謝宇書十一年乙未科賜謝遷等三百名及第出身題名碑户部尚書萬安撰文太常寺少卿謝宇書十四年戊戌科賜曾彦等三百五十名及第出身題名碑大學士劉珝撰文司經局正字凌暉書十七年辛丑科賜王華等二百九十名及第出身題名碑大學士劉吉撰文山東布政司左叅議凌暉書二十年甲辰科賜李旻等三百名及第出身題名碑大學士劉吉撰文吏部郎中姜立綱書二十三年丁未科賜費宏等三百五十一名及第出身題名碑大學士徐溥撰文太僕寺少卿姜立綱書宏治三年庚戌科賜錢福等二百九十八名及第出身題名碑大學士邱濬撰文大理寺右寺副劉棨書自正統戊戌至此計十七碑正統壬戌戊辰景泰甲戌天順庚辰成化丙戌壬辰戊戌甲辰宏治庚戌九碑俱在順大成門外之西南向正統乙丑景泰辛未天丁丑成化甲申己丑乙未辛丑丁未八碑俱在大成門外之東南向六年癸丑科賜毛澄等二百九十八名及第出身題名碑大學士劉健撰文大理寺左寺副周文通書九年丙辰科賜朱希周等三百名及第出身題名碑大學士李東陽撰文尚寳司卿劉棨書以上二碑在東大成門外之南向十二年己未科賜倫文叙等三百名及第出身題名碑大學士劉健撰文太常寺少卿周文通書十五年壬戌科賜康海等二百九十七名及第出身題名碑大學士謝遷撰文吏部郎中蔣恭書十八年乙丑科賜顧鼎臣等三百名及第出身題名碑大學士李東陽撰文吏部郎中沈冬魁書以上三碑在南大成門外之西向正徳三年戊辰科賜吕柟等三百四十九名及第出身題名碑大學士焦芳撰文太常寺少卿周文通書在之大成門外西南向六年辛未科賜楊慎等三百五十名及第出身題名碑大學士石珤撰文太常寺少
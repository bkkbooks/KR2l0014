body:
  text: 藝文一奏議二請羅欽順從祀孔廟疏雍正二年張伯行欽惟我皇上纘膺寶厯即褒崇孔子五代加封王爵隆儒重道亘古未有臣查明儒江西有羅欽順者徳備諸躬道可淑世凡天人性命之理仁義道徳之㫖靡不研究其藴其生平學術皆本躬行心得體騐親切實為後之學者所共遵守至辭免吏部尚書閉戸潜修其恬靜之風又為當時所共推服臣謹案欽順之學實得程朱正脈且有發明之功其立身髙潔年餘八十始終一節如從祀學宫洵可仰副皇上隆儒重道之至意倘臣言可採乞勅下内閣九卿詳議施行整飭八旗官學疏雍正五年孫嘉淦臣於九月十三日䝉皇上召見特諭整理國子監事務臣親至八旗官學細心查閲見助教教習各處齊集學生人等皆有功課教化之興日新月盛皆我皇上振興作育之明效也但其中尚有宜整飭者臣謹為皇上陳之一學生宜擇也古者十五而入太學皆公卿大夫之子弟與凡民之俊秀今八旗學生類多髫齡尚未識字難與講貫又多無力之家目前行走甚覺煩難不數年而告退則前功盡棄至於富貴子弟類皆嬾於行走佐領瞻徇情面草率申送教育雖勤人才不出臣查國子監行文八旗取官學生每佐領下止取一人原指明官員子弟人可造就力可行走者而佐領申文之時不能留心簡擇伏望勅諭八旗佐領嗣後送學官生務宜遵照定例取官員大族子弟年十五以上品貌端正姿性聪明者始行申送國子監祭酒司業當堂考騐可教者留之不可教者行文另換則人皆秀良而教化易興矣一學舍宜廣也臣查八旗學房每旗有滿洲䝉古漢軍三處滿洲䝉古每學四五十人漢軍學六七十人不等而每學房舍不過三四間此三四間房内助教教習學生聚處其中擁擠喧嚷難以用功據臣愚見現在房舍止可為滿洲䝉古學房至漢軍學房人數既多漢人教習亦處其中繙譯作文並宜地方寛敞始可専心誦讀伏祈皇上鴻恩每旗另給官房十餘間以為漢軍學房則肄業有所而課程自専矣一教習宜勤也八旗教習每旗五人取貢生内文理通者充之凡官學生之講書作文者師事焉此教習五人自宜朝夕在館分徒授業功専而勤庶有成效但八旗教習每月領米二斛别無錢糧一切衣服薪水之需無以供給勢必别營生理因而分班督率每日一人輪流上學教習日更則學生之功課難於稽查且責成不専并教習之賢否亦難考核臣愚以為宜照宗人府教習或景山教習之例使飯食衣服足以自贍去其分班上學之陋規使日處其中每人名下分學生若干使盡心督課即以學生之勤惰定教習之賢否則教有常法學有専業考核易施而勸導自力矣臣一介庸愚識見淺陋每䝉聖恩嘉奬常思勉竭愚衷國學之中事宜甚多謹以思慮所及條陳一二伏望皇上採擇焉整飭八旗官學議雍正五年康親王崇安八旗設立官學原欲比户皆霑教澤不必拘定門第但學滿文者可用幼稚之人其學漢文繙譯者必得十四五以上資性聪敏之人方易啟迪嗣後選官學生務令該佐領擇聪明俊秀子弟申送臣等騐看交與國子監當堂考録其年幼者令學滿文其稍長者令學漢文庶將來皆可有成再查舊例八旗滿洲䝉古漢軍每佐領下必送一人入學若拘於定例恐草率塞責若聴其缺額又恐人數太少臣等酌定每旗設額學生一百名内滿洲六十名䝉古二十名漢軍二十名其滿洲六十名内照例分三十名在滿洲書房習清字三十名在漢軍書房習漢字凡有學生缺出通在一旗選擇不必拘定佐領之數庶學生皆得秀良不致混行申送再查學舍乃諸生講誦之所今每學止三四間一旗三學共十三四間不等實屬狹隘應將現在官房交還各該旗查收每旗另給官房一所二十餘間量可容百人誦習者著本旗修理俾諸生聚處其中則學舍寛適便於誦讀矣再查官學生習漢字者每旗設教習貢生五人輪流更換功課難以稽查應令該教習每名下各派定學生若干人日處其中専心訓導則將來成否責有攸歸查景山現有漢教習十二人每名一月闗銀二兩米隨錢糧每年夏秋衣服各一奪二年皮衣服一套每日隨用肉菜煤炭等項該衙門領給今八旗教習既不許其分班更換則應足其衣食除每日薪蔬難於支給不必比照景山外其每年銀米等項似應均照景山之例則衣食充裕而課讀自勤矣至教習期滿議叙國子監舊例皆用貢生三年期滿咨部以知縣候選宗人府景山現用舉人貢生三年期滿咨部以應得之缺用臣等伏思三年之内若不問其勤惰概行咨部銓選恐有草率塞責希圖僥倖之弊嗣後八旗教習入館國子監堂官不時稽查如有懶惰者即行斥退不准議叙其勤慎無過者三年期滿照例咨部以知縣候選如有善於誨誘精勤不倦者再留教習三年俟六年期滿咨部以知縣即用如此則勤惰有分而善於誨誘者亦得久於其職至宗人府景山教習除舉人原係候選知縣應照原議外其貢生教習似應均照此例分别議叙則各處教習皆知勉勵矣再八旗官學生向來皆無錢糧以故無力之家不能行走臣等查得八旗䝉皇上鴻恩設教養兵滿洲三千六百八十名䝉古四百八十名漢軍九百六十名滿洲䝉古每名一月給銀三兩漢軍每名給銀二兩令其學習弓馬所以惠愛八旗之人典至渥也但查八旗教養兵有幼稚之人以充額數不能操弓上馬而官學生年壯者往往挑選披甲臣等伏思今官學生内有年壯而讀書遲鈍者令回旗披甲其所出之缺選年幼者補之以習滿文俟其稍長并學弓馬則彼此皆有禆益伏望聖恩飭令八旗將教養兵額數滿洲分出三十名䝉古十名漢軍十名將此五十名錢糧給官學生計滿洲䝉古每名一月給銀一兩五錢漢軍每名一兩則壯者既有錢糧以學弓馬幼者亦有錢糧以學文藝長幼皆䝉恩育文武皆得造就似應將八旗教養兵清查實數如目前現缺五十名者即照數撥給官學如缺額之數不及五十名者俟其將來缺出陸續撥給官學以漸足五十名之數如此一轉移間則錢糧不必加增而官學生皆霑聖恩鼓舞振興矣請准助教學正㑹試疏雍正五年鄂爾竒欽惟我皇上培養人材振興文教海内讀書之士無不踴躍鼓舞思自奮於聖人之世今臣監學正楊廷英等呈稱俱係舉人有志上進并求題請邀恩一體㑹試伏思廷英等被聖主之徳教際文運之昌明已叨一命之榮復切觀光之願如䝉天恩俞允准令㑹試恭候命下臣等移咨禮部可也請定八旗㧞貢疏雍正八年孫嘉淦欽惟我皇上振興學校作育人材特發帑金以為太學諸生肄業之資皇恩普被率土歡欣但漢人貢生為數甚多而旗下選拔不過數人臣前為學政考試八旗生員見其材質聪俊氣宇軒昂者實繁有人而皆溺記誦詞章之習不知返躬實踐修已治人之道似為可惜臣之愚見仰懇聖恩將旗下生員多行選拔每旗或拔八人或拔十人令其入監肄業臣等與漢人貢生一體教導學成之日恭候皇上揀用則滿漢之人材日出於吏治民生必有禆益或即以之補授助教等官使之督率生徒則八旗官學益加振興矣請設八旗額外助教疏雍正八年朱蘭泰臣仰見皇上加意人才振興官學八旗子弟無不鼓勵讀書蒸蒸向化誠為國家培植本根之至計臣查八旗官學每旗除䝉古官學外滿洲漢軍官學生共八十人分為五班每班十六人設立漢教習各一人専訓誨漢文滿助教各二員一人統領三班一人統領兩班訓誨繙譯之外凡遇冠昏告假偷安逃學等事滿助教係旗人聞見親切酌量得宜易於彈壓是滿助教一職責任最重臣衙門現今八旗滿助教内出兵者一人教訓俄羅斯學生者一人二缺空懸令人久署臣思似此出差離任或遇陞遷事故之日需次無人考選有待勢不得不委員兼理兼理他旗則或曠本旗之職兼理彼學則或分此學之功請嗣後遇選抜助教之時於應補正缺外多考取十數人一同帶領引見以備陸續補放現在所懸助教二缺専令二人署理外其餘令其在學協同助教學習行走一則接補簡便訓導不致間斷一則諳練有素實任易於見功師弟之間均收裨益矣請給官房疏雍正九年孫嘉淦竊照各省拔貢䝉皇上加恩作養雲集都門其中教書投親在外居住者固有而外無館地必須在監居住者約有三百餘人六堂之内只可誦讀難於栖止是以拔貢人等多在附近賃房居住查國子監門外方家衚衕官房一所舊有二百餘間現今只存一百四十二間屋宇墻垣亦多傾圮無人居住而與國子監甚近相去不過數步仰懇聖恩將此官房賞給國子監衙門臣等仰懇皇上每年賞給公費銀兩内動支修葺完好令拔貢及助教人等居住其中就近肄業則房屋既不致坍塌而各省士子食宿皆便益沐皇仁於無既矣請復元儒吳澄從祀疏乾隆二年甘汝來臣竊惟表章先賢乃盛世崇儒之曠舉釐正祀典尤聖王議禮之鴻模伏考元儒吳澄天姿英異少時即知用力聖賢之學致踐履之實以道自任因而著書立説師表當世其自勵則有勤謹敬和自新自修克己悔過矯輕警惰等銘其教學則有學基學統等篇又考証孝經校定易詩書春秋修正儀禮戴記各有纂言又校定皇極經世及老莊太元樂律等書皆所以啟大教之堂奥為後學之津梁者也至其徳性純粹氣象舂容言規行矩可法可𫝊施教成均則師道尊重進講經筵則誠意深摯昔人謂其進學之勇見道之真周程張朱莫或過之非虚語也明宣徳時禮部尚書胡濙等僉議吳澄為元大儒有功名教詔准從祀殆將百年及嘉靖初輔臣張璁謬引謝鐸之議以澄生宋仕元遂黜其祀不知澄之在宋雖膺鄉薦未叨一命宋制鄉薦不第者仍充生員澄並未登第固依然韋布耳及天下歸元已乆率土皆臣矣君相數聘不已乃猶十召而不起甫進而旋退官止於師儒職専於文學出處之際卓然君子璁反以是而貶之亦謬矣况元之大儒惟許衡與吳澄二人澄固宋之逸士衡亦金之遺老金之視元猶宋之視元也許衡仕元未有議之者獨苛於吳澄何耶非論之平也伏查雍正二年世宗憲皇帝諭令廷臣釐正文廟祀典經九卿諸臣議准宜復祀者六人宜増祀者二十人獨吳澄一人未經議及臣䝉皇上天恩畀以三禮館總裁伏見吳澄所著禮經諸書援据精切義理融貫闢俗學之淺陋發前聖所未發實能羽翼經𫝊昭示來兹按祀法有功於聖道者則祀之今澄著述之功彰彰具在未便置之不論兹欽逢我皇上崇儒重道正禮明禋集道統之大成晰羣疑於千古此時若不亟請復祀則澄之真儒實學終湮没而不彰矣合無仰懇勅下廷臣集議將吳澄仍准入祀廟廷不獨為先儒表揚遺徽將使正學日隆人心胥勸風聲所樹洵足開萬世太平之基矣三老五更議乾隆二年張廷玉臣伏思三老五更之名始見於禮經蓋古養老尊賢之禮也考養老之禮如王制内則所云則虞夏殷周皆然又云五帝憲三王有乞言則伏羲神農黄帝以來已然是其典為最古至所云食三老五更於太學天子袒而割牲執醬而饋執爵而酳冕而總干是其禮為最隆我皇上至道在躬式稽前典以三老五更之禮下詢甚盛心也顧禮待人行事因時起臣妄叅臆議以為未可舉行者約有數端皇上至徳淵懐聖不自聖何難屈禮臣下但天子有所施必令臣下有可受如所云袒而割牲者其始親袒衣割牲以為俎食也執醬而饋者其繼執醬以饋熟也執爵而酳冕而總干者既食畢又親執酒以酳口且又端冕舞位而以樂舞侑食也禮如是不已重乎古有斯禮而今未行似非皇上殷殷復古之意如特行此禮度臣下誰敢受者此其難行一也漢宋均曰三老乃老人知天地人之事五更乃老人知五行更代之事者各以一人為之所謂知天地人之事者盖上通天文下徹地理中察人倫三者明一亦已難矣况兼之乎所謂知五行更代之事者如伏羲以木徳王故風姓代之者火也炎帝以火徳王故曰炎帝以火紀官代之者土也黄帝以土徳王故曰黄帝之類此非洞達天人之際孰能知其所以然者惟其有如是之徳是以天子隆以賓師之禮三公九卿皆在執事之列今此禮果行必求其人以當之竊思致仕諸臣及現在居職者誰克任之恐皇上即下明詔而其人必悚惕慚惶而不敢應此事之難行二也考漢以李躬為三老桓榮為五更魏以王祥為三老鄭小同為五更周武帝以于謹為三老其時五更無人苐未審諸公如前所述之三老五更果克副其名而無愧乎圜橋觀聴漢明帝時極盛然先儒胡寅譏桓榮僅能授經章句不知仲尼修身治天下之㣲㫖故所以輔翼其君者徳業不過如是觀先儒之論是桓榮猶不免譏評下此者何足以當鉅典此其難行者三也三老五更之名雖見於樂記祭義文王世子諸篇然不言何代如以為虞夏殷周皆然則二帝三王大經大法載於尚書何二典三謨不見有老更之名如以為惟周有之則保息養老見於司徒獻鳩以養國老見於羅氏以財養死政之老見於司門三百六十如是之詳且悉何亦不載有老更之名臣愚以為養老之禮古時典制可稽至所謂三老五更者疑屬漢儒附㑹此其事未可盡信是以唐宋至今已千餘載此禮未曾舉行即本朝世祖聖祖世宗皇帝重道尊師明經造士事事度越前古而於老更之禮亦未之及盖以典至古而禮尤隆名實難副倘有幾㣲未稱必滋議論之端豈不䙝至尊而羞大典乎此事似應停止舉行不必勅下廷議臣敬陳管見伏祈聖鑒詳籌官學事宜疏乾隆三年孫嘉淦竊惟八旗官學培植人才於根本之地所係綦重現在額設助教以董其成考取教習以分其課其中又有兼習算法之人復有教弓箭之烏拉齊教䝉古話之巴克式等至於世職官員世家子弟俱令入學讀書立法可謂詳且備矣但教員多而授教無序講課雜而肄業不専學生狃於淺近而無由大成臣職思訓課謹將應行事宜悉心酌議為我皇上陳之一學生之課業宜専也查八旗官學每旗額設滿助教二人以教繙譯漢教習五人講解四書入學之期辰集酉散每日不過四時例以二時習滿文二時習漢文而又有弓箭算法等功分時教授計一學之中滿洲漢軍之子弟約有七八十人兩助教不能遍行訓誨而漢教習於二時之中亦不能多所講誦往往肄業數年而經書未周不惟博學明通之人無由槩見求其精通繙譯者亦猶難之盖學無専業故也請嗣後八旗子弟挑選入學三年之内令其専習經書朝夕講課三年之後臣等考驗擇其材質聪頴有志力學者歸漢文班分𨽻教習令其専心講誦其年齒已長願學繙譯者歸滿文班分𨽻助教使之専習繙譯其該學一應事務仍著滿助教辦理臣等不時稽查漢文之勤惰責之教習清文之勤惰責之助教如此則教者有専司學者有専業庶隨其材質之髙下可以有所成就矣一人材之造就宜大也查官學舊例其學繙譯者考筆帖式而已間有粗通文藝者考文武生員而已原以明經治事之實學非旦夕可致之功修是以未敢専定其章程查國子監拔貢人等現䝉皇上天恩月給廩餼講求明經治事之學現今頗有端緒臣請將八旗官學生之歸漢文班者不必専讀四書亦使之講求經史為有用之學每三年一次臣等録其可以應考者奏請皇上欽㸃大臣來監考騐取其明通者授為監生由官學而升之太學使與拔貢人等明經治事期滿之日擇其尤異者一體保舉考選録用如此則旗人子弟必多篤志好學之士異日服官莅政必收通經博學之效此亦樂育人才以襄治理之一端也一算法教習宜停止也查雍正十二年果親王允禮奏請八旗官學添設算法教習十六員教授官學生算法太僕寺少卿成徳縂管其事每旗官學擇資質明敏者三十餘名定以未時起至申時止此一時中學習算法其教習因各有職守間日來學一次至今三年有餘伏思皇上設立官學慎選師儒教養八旗子弟専以讀書繙譯為業以備將來録用至於算法一藝理數精㣲非童稚所能驟通况以一時之頃教授三十餘人勢亦不能遍及既分讀書繙譯之功而算法又無成效臣等伏查算法係欽天監衙門事務其如何教習録取之處應交與縂理算學太僕寺少卿成徳㑹同欽天監酌量辦理其臣衙門官學生學習算法之處請行停止使得専功讀書繙譯則功課不致兩誤而學業可成矣一䝉古喇嘛宜撤回也雍正十年果親王奏請八旗䝉古學添設喇嘛八名俱由理藩院行文於甘朱爾巴諾悶䍐處移取繙譯經文熟練者揀選補用伏思䝉古學生䝉皇上天恩薫陶已乆實與滿洲無異學習䝉古繙譯専以清書為程式務在發明理藴始於政事有資其教習䝉古話並繙譯之處自有䝉古助教巴克式専司其事無煩添設喇嘛况今喇嘛等交冬來京入夏即告假回伊本處既不能常行督課且縻費錢糧供給實屬無益臣等請將喇嘛收回凡一應䝉古繙譯䝉古話専責成於䝉古助教巴克式等用心教習務使著有成效可也以上各條謹就官學應行事冝悉心調劑期於學校實有裨益是否有當伏乞皇上睿鑒施行請裁外肄業生疏乾隆三年趙國麟竊照太學肄業貢監生額設三百名在内肄業一百八十名在外肄業一百二十名但在外者多係覔館授徒不能實心應課學業不専在内者因有在外亦可肄業一途未免擇便而趨以至去來無定伏念太學為育賢籲俊之地貴務實學以儲真才而不在額數之多與其兼設内外兩缺而學業無所成就不如單設在内一缺使其専心致志以務實學請將在外肄業額數裁去止留在内肄業一百八十名缺詳慎考取嚴加督課每名月費二兩之外增給銀五錢則膏火益加寛裕諸生得以安心肄業無自便之途免荒怠之習似於造就人才之道不無裨益請甄别期滿貢生疏乾隆四年趙國麟竊查貢監生並係陸續到監肄業是以期滿之後參差不齊兼或以事故請假甲去乙來新舊遞易現在肄業諸生除挑選佐貳並考補教習及告假回籍外尚有一百四十八名其中期滿者止有二十餘名若槩行請㫖引見則與原議之例未符若止就此二十餘名内擇其人品學問稍有可觀者奏請引見亦非核實慎重之意臣伏思恩拔嵗副等貢生在監肄業除期滿照例咨部聴其考職及銓選教職外又有考補八旗教習並挑選佐貳等例是其出身之途已為通廣我皇上樂育養士之恩亦云厚矣若非人品學問實在超越出衆之士臣等徒以循例保薦塞責於心實有未安且恐希圖躁進者皆得生心徼幸殊非所以養士品重名器也請嗣後太學課士之法宜照陞任縂理國子監事孫嘉淦所奏分經義治事將諸生撥堂肄業嵗終仍照前任兼管國子監祭酒卲基所奏除挑選佐貳考補教習外其肄業期滿者照例咨部銓選教職其未滿之貢生詳加揀選如有人品端謹學問通順者准其留監肄業其餘照例咨回本籍其有實在資斧不足難於回籍者照孫嘉淦原奏内賙助之例量加資給令其回籍嵗終照例舉行一次如此則肄業諸生既有出身之地而來嵗係直省舉行選拔之年將來貢入成均有志肄業者又不致有壅阻無缺可補之患至現在肄業之監生應照例一體揀擇分别去留其留監肄業者俟伊等期滿後臣等照例咨送吏部其應作何録用之處統聴部裁至嗣後肄業貢監期滿之數果多其中如有實係才品卓越學識醇正者臣等仰體皇上加意人才之盛意仍照原議核實保薦以示鼓勵再查南學學規向來並未奏明誠恐日乆漸弛以致諸生罔知遵率謹將擬定學規另繕清單恭呈御覽伏候睿㫖遵行謹按南學學規詳載生徒門請復外肄業生疏乾隆六年劉吳龍竊查太學肄業貢監生從前額設三百名在内肄業一百八十名每月每名各給膏火銀二兩在外肆業一百二十名每月每名各給銀五錢續於乾隆三年十二月内兼管監務趙國麟等奏准在外者多係覔館授徒不能實心應課請將外肄業額數裁出止留在内一百八十缺每月每名二兩之外增給銀五錢但查本年係直省拔貢之期例應赴部考騐劄監肄業將來陸續到京不下千有餘人臣等即慎加遴選亦必有數百名之多若拘於現在定額恐其材質可造之士不無遺棄殊為可惜且諸生所處豐儉各有不同查從前在外肄業者特以迫於家計覔館授徒良非得已原議每月給銀五錢供其赴監飯食之用其按旬應課與在内無異實無掛名曠業情弊今臣等公同酌量不必另増額數請即於一百八十缺之内揆出二十四名作在外肄業之缺計其公費可給百二十人臣等仍詳加考騐分𨽻六堂倘月課季考應行齊集之期有曠怠不到者即行扣除如此畧為變通凡材質可造之士悉收之太學之中我皇上作育盛心普被無疆矣請令拔貢生考到考驗疏乾隆十一年宗室徳沛竊照禮部來文奏請通變拔貢廷試一摺内開嗣後凡有到部拔貢經部驗到即劄國子監㑹同臣部堂官嚴行考試如果文理通者准為拔貢留監肄業是考取一二三等准貢之人俱歸臣監肄業伏查臣監肄業生徒定有額數除拔貢之外尚有各項貢監生理宜慎加遴選以仰副皇上作養人才之至意向例凡貢監生到監先行考到列一二等之人再行考驗貢生考列一二等監生考列一等者方准留監肄業餘俱不録是以向來原有缺額今禮部㑹同臣監考取准貢之人若一概留監肄業恐將來各省拔貢陸續到監未免人浮於額請照臣監現行之例准作貢生之人仍與各項貢監生一體赴監考到考驗録取肄業不得過於額數即額數之内亦寧缺勿濫庶甄别既嚴而流品不雜矣請增派分獻官疏乾隆十一年鄒一桂竊照聖門弟子父子同列配享者分位於前後殿兩廡周程張朱蔡之父列位於後殿之兩廡同一義也每年春秋二祭前後殿四配自應均行獻禮乃後殿自詔封五王以來四配位前雖有陳設而無進獻反不同先儒之父尚有助教人員為之分獻於禮殊為缺失揆厥所由盖因舊止啟聖王位前上香獻帛進爵後即旁及四配嗣五王神位各行三獻禮已紛繁人亦勞瘁遂畧去四配獻儀父既不獻何以安前殿四子之心本月丁祭臣於後殿監禮與主獻之臣酌定於五王行獻之後即獻四配但禮已畢而後殿三獻未完且將來主獻之人亦有髙年不能勞頓者臣請嗣後令國子監堂官於助教内増派分獻官二員臣寺亦增派贊引官二員分行後殿四配獻禮則事不勞而禮無失矣再後殿四配前陳設雖有四案而帛止兩端亦應添補祀典攸闗未敢因循擅便伏乞皇上訓示遵行請頒發三禮疏乾隆二十年觀保竊惟五經皆載道之文而三禮為經世之典國家重道崇儒敦尚經術易詩書春秋厯䝉聖祖世宗欽定折中𫝊説刋刻頒行臣監奉到頒給各經分給六堂令助教等官與諸生講貫每月考課挑問經疑其有成誦在心條對無誤者拔置優等量給奬賞以期仰副國家造就人材之意伏遇我皇上道隆作述學有緝熈特命儒臣纂修三禮進呈御覽恭䝉欽定兹已刋校成書頒發直省成均士子傾心積願欲覩全經環籲陳請為此繕摺恭奏仰懇聖恩賜給三禮六部分發六堂俾諸生以時講貫則五經全具文教之光炳於日月矣請刻御製古槐詩疏乾隆二十四年觀保竊惟孝治推恩庶徴協乎草木文明敷教盛事播於宫牆覘育物之深仁慶作人之雅化查太學西講堂前古槐一本考之帝京景物畧為元臣許衡手植年湮代逺節斷心空稽諸故老𫝊聞未覩發榮滋長乾隆辛未年恭遇皇太后六旬萬夀普天共慶四海同春起視斯槐欣逢是嵗始而萌芽驟出繼而枝葉交舒涵濡倍㨗於土膏鬱葱遂甲於槐市菁莪棫樸無以喻其發生朱草華平未足方斯符騐是盖彰一人之孝感沐聖母之春暉用以錫繁禧而光文運者也大學士臣蔣溥以丁祭奉命行禮齋宿講堂察重榮之日月摩古幹於風雲繪以成圖恭呈御覽䝉皇上御製五言六韻排律一章紀瑞則讓善璇宫敷藻則騰輝璧水爛漫星雲之彩鏗鏘金玉之音𫝊誦已徧於圜橋篆刻宜垂諸珉石伏睹聖祖仁皇帝御書大學聖經刻石於彛倫堂我皇上御製訓飭士子文刻石於率性堂並皆照耀黌宫流𫝊璧府臣等擬遵此式敬刋御製詩於西講堂正中靣臨古槐以彰協應仰懇萬幾餘暇煌煌宸翰親揮庶令首善觀瞻奕奕天章逺耀則赤文緑字燦若琳琅鐵畫銀鈎光於琬琰壯儒林之勝概地靈將物産俱華集盛世之休徴天瑞與人文並麗矣臣等謹繕摺請㫖如䝉俞允並請將臣等奏摺附刻下方以悉原委俟臣監石工告竣之日懇皇上飭交御書處遴選工匠敬事雕鐫𫝊之萬䙫永永無極請修御書樓疏乾隆二十五年觀保竊臣等前因國子監衙門年乆傾圯奏請修理欽奉諭㫖交莊親王等派員興修現在估計開工兹准該處移咨樓房十五間應行拆缷臣伏查樓房乃尊藏御書之所乆為觀瞻所係况直省府州縣文廟俱建有尊經文昌等閣成均首善之地規制更宜詳備且此樓近接文廟尤當慎重謹㑹同欽天監常日暄悉心相度據稱係文廟後䕶於方向屬艮於五行屬火文明之象必不宜拆再此樓牆垣磚瓦雖有殘缺而木植尚屬堅固似可母庸拆毁仰懇聖恩仍舊存留稍加修葺即可一律整齊謹據實具奏議劉天成請定成均大課奏乾隆二十九年永貴等臣等伏思學校為長育人材之地考課不厭其詳但查國子監祭酒司業以至六堂助教等官按時各有課程立法本為嚴宻其肄業各項貢生上之應試入彀不難自奮功名次之考充教習果能化導有方年滿帶領引見分别録用其又次者隨衆肄業雖無過人之文行而老成可為師範三年滿日亦准以教職銓補至於衰庸頺廢之輩必不能逺赴成均是各項貢生在監其能考取教習及三年報滿例銓教職者均係有志向上並非委靡不振茍且姑容可知該御史乃以此等貢生僅予隨時分課於立學成材之意尚有未盡請另増春秋大課每嵗二八月請㫖特派大臣考試三年報滿合計等第録用查國家取士大比尚待以三年而貢生考課轉於一嵗之中兩經特簡大臣考試其輕重未免失宜且如該御史所稱必俟三年六考而後縂核等第則此三年中如有中式而去者或有充補教習者是前此屢居一等徒為虚設而欽㸃大臣之衡鑒亦屬具文况現在科甲選班守部需次者尚多若又増貢生一項咨送吏部帶領引見録用是為仕途開一㨗徑竊恐考課之時無識者妄思倖進適起奔競之端於學校抑浮崇實之方殊無裨益應將該御史所請均無庸議其現在肄業各生國子監堂官按季考課立有課程應請責成該堂官嚴加考試分别等次倘有如該御史所指怠於學業者應令該監堂官遵守教規嚴核文品隨時區别以示懲儆恭候命下遵奉施行議曹學閔請建璧池奏乾隆三十三年觀保等臣等議得古帝王立學之制不同六經所載儒者之説亦復互異惟敦典立教建學興賢之道則百世聖人莫不符合是以王者惟當審其道之同而不必强合其制之異恭惟皇上立極建中垂教天下所以明倫興學典章制度之大固已憲章前王折衷睿慮實兼聖作明述之美若乃宫舍形制古今異宜其與古合者不足以増益熈明其不必與古合者亦無闗於治化今御史曹學閔陳奏以三代所共者學而辟廱之制著於詩禮國朝立制並則古昔獨辟廱之制缺然未舉請増建太學璧池臣等伏考辟廱之名始見於靈臺之詩其指為天子之學則始見於王制先儒並以為周文王始作辟廱原非三代所共之學毛萇詩𫝊曰水旋邱如璧曰辟廱以節觀者鄭元詩箋曰築土壅水之外圓如璧四方來觀者均也據毛之説則因自然之邱而引水環注據鄭之説則因自然之水而外束以圓隄為説已自不同然總為行禮之時慮觀者擁遝而設與明倫設教之意本不相闗盖古者太學在郊故孔頴達正義云辟廱内有館舍外無牆院後漢書稱圜橋門而觀聴者蓋億萬計是由外無牆院故得圜橋門而觀之也今太學在都城之内立廟以奉至聖分舍以館諸生堂宇深嚴較之引水以遏人行更為周宻何必執泥古法疏鑿無用之溝渠我皇上重道崇儒尊飾聖廟棟宇階陛以至屋瓦皆依王者之禮已足愜四方觀瞻之願勵多士景仰之心其引水旋邱乃周人一朝之制非千古必不可廢之經茍或禮當建設又豈礙于更張况膠庠瞽宗代各異名何曾沿襲帝王建學自有教養之實政而必拘泥形制以復古為名亦何禆于學校應將該御史所奏請增建太學璧池之處毋庸議臣等未敢擅便謹題請㫖詔建辟雍工程估計錢糧數目奏乾隆四十八年徳保等臣等欽奉諭㫖稽古國學之制天子曰辟廱所以行禮樂宣徳化昭文明而流教澤典至鉅也朕此次釋奠禮成念國學為人文薈萃之地規制宜隆而辟廱之立自元明以來典尚闕如自應増建以臻美備派禮部尚書徳保工部尚書兼國子監事務劉墉侍郎徳成敬謹前往閲視度地鳩工諏吉興建落成之日朕將舉行臨雍典禮以昭久道化成之盛欽此欽遵臣等遵即揀派禮部郎中巴彦寳南苑郎中董楷工部員外郎富森阿主事恭安和琳委署主事福興率同前往敬謹詳細逐一查勘得國子監恭建辟廱重簷大殿一座下簷見方六丈五尺柱髙一丈五尺方臺一座見方十一丈二尺髙一丈五尺圓河一座裡口徑過十九丈二尺深一丈平橋四座各長四丈寛二丈二尺丹陛二道凑長二十一丈九尺寛二丈二尺殿座前海墁二塊凑長十丈彝倫堂月臺前海墁二塊凑長十六丈俱寛四丈八尺五寸太學門外東西井各一座挑砌進水暗溝二道併六堂後簷外東西各有井一座亦應挑砌進水暗溝各一道以資灌注共凑長九十七丈出水暗溝二道自圓河至集賢門外凑長九十四丈自集賢門外挑砌洩水大溝一道至東大街官溝止長八十一丈以及添安䃰海墁散水拆砌月臺併紅銅簷幪銅鍍金看葉瓦㡌見廣識大鍍銀槽活等工臣等按例詳加核算共估需物料工價銀十一萬三千四百九十八兩七錢九分七釐所需架木毡簾雨搭等項行文工部在于製造庫辦造木倉取用顔料等項行文户部取用其鋪墁地面二尺金磚二千五百八十七塊現在工部存貯僅止五百餘塊不敷應用行文江蘇巡撫燒造于明嵗秋前尅期運送到工至所需柁樑椽柱各項木值共估銀一萬五千五百二十三兩四錢二分六釐查此項木值向市購買徑寸不能相符查賢良祠官厰亦無存貯長徑丈尺合式之件相應將前項木值開列清單奏請勅交熱河副都統照依單開丈尺徑寸數目敬謹採辦于本年冬月䟎運到工以便興做所估木值銀兩扣留户部庫内無須支領外其餘浄估需物料工價銀九萬七千九百七十五兩三錢七分一釐請在户部庫内動支謹將約估物料工價銀兩數目另繕清單恭呈御覽俟命下之日臣等行文各該處支領取用即令派出之員等及時購辦物料并行文欽天監于今嵗冬初擇吉破土興工臣等仍不時前往督率稽查指示敬謹辦理務期堅固妥協以昭盛典而垂永久統俟工竣將用過工料錢糧據實奏銷謹奏請㫖詔建辟雍添造牌樓碑亭鐘鼓廳估需錢糧數目奏劉墉等竊臣等于本年五月初六日經臣金簡將國子監新建辟廱殿前擬添四柱三樓木牌樓一座兩旁各添建碑亭一座又查彝倫堂前舊有鐘鼔廳二座今在辟廱殿後于禮制不合擬于牌亭之南添建鐘鼓廳二座畫樣一張并國子監全圖一張恭呈御覽奉㫖辟廱殿前著照海寧海神廟石牌樓式樣建石牌樓一座碑亭鐘鼔廳著在石牌樓四角前後對中建造欽此又于初七日經臣金簡面奏如遵㫖辟廱殿前建石牌樓一座所需石料較多恐于明春趕造不及等因奉㫖著照大西天琉璃牌樓式樣建造琉璃牌樓一座欽此隨于是日將燙得辟雍殿前建琉璃牌樓一座琉璃牌樓東南西南角各建鐘鼓廳一座東北西北角各建碑亭一座燙樣恭呈御覽奉㫖俱照樣准做欽此欽遵臣等查得大西天舊有琉璃牌樓一座計三間通面闊七丈四尺髙四丈現在辟廱殿連擎簷廊通面闊七丈五尺髙三丈四尺五寸即照此様尺寸建造庶覺配合適觀又牌樓東北西北角添建重簷琉璃碑亭二座每座四面各顯三間内明間面闊八尺二寸次間各面闊六尺柱髙一丈四尺五寸上簷斗口单昂溜金下簷斗口重昂斗科内裡隔井天花上下簷七檁歇山成造裝修四面明間安柵欄四槽簷牆八堵青白石碑二統通髙二丈寛五尺四寸厚二尺六寸又東南西南角添建鐘鼓廳二座每座一間各見方一丈四尺柱髙一丈六檩棬棚歇山斗口麻葉斗科成造裝修前後簷安六抹槅扇二槽兩山安四抹杴牕二槽臺基露明髙五尺並鋪墁地面油飾彩畫搭做圏厰拉運木值並架木車脚等工除所需顔料桐油架木照例由户工二部取用又松橔木值按照原估根件料數由官木厰領用核值銀三千九百七十九兩八錢三分六釐暫行存庫不領倘該厰有長徑丈尺不敷之件仍令該監督等呈明領項及時購辦合對應用外所有辦買各項物料並各作工價運價共估需銀三萬三千七百七十兩六錢五分四釐請按銀七錢三之例由户部支領臣等揀派妥員先行趂時趕辦各項物料上緊修做務于明春聖駕臨廱之前一律告成無誤統俟工竣另行分晰各欵據實查銷謹將估需工料銀兩細數另繕清單一併恭呈御覽謹奏詔建辟雍請修葺彞倫堂及六堂等奏蔡新等臣等恭照本年二月奉特㫖仿照禮經舊制創建辟雍落成之日舉行臨雍典禮現在董事諸臣飭工庀材敬謹辦理凡大小臣工執經髦士靡不欣躍騰歡快覩千載難逢之盛典臣等敬查辟雍在彞倫堂之前六學講堂及繩愆博士等廳俱分列左右乾隆二十四年䝉恩發帑修理國子監堂廡及東西兩廂迄今已二十五年木植磚瓦間有糟壊油漆彩畫漸多剥落恭逢鉅典新建辟雍其前後左右似當一體整新同彰赫奕則鑾輅親臨之際益足崇體制而壯觀瞻可否仰懇皇上天恩勅交工部料估興修抑或即交辟雍工程處増估兼修一體報銷以昭美備為此具奏請㫖文廟工成聖駕親詣釋奠恭進詩冊表乾隆三十四年陸宗楷伏以光榮璧沼三雍垂乾象之模禮重膠宫五宿燦天庭之色峻典日臻乎美備祀事休昭鴻儀倍極乎周詳文明大啟肅千秋之俎豆犧尊與龍勺増輝煥萬仞之宫牆朱栱與丹楹並麗興秩節而儒宗丕振自古云然隆學斆而師道昭宣於今為烈原夫斑麟吐紱瑞應星芒赤雀銜書符徴斗矅擅首出於天開地闢集大成而玉振金聲惟聖人為百世之師若孔子則生民未有是以三千弟子宗洙泗而心儀厯代帝王祠黌宫而展禮粤自太牢肇祀沛功成逐鹿之年王禮隆封唐運啟躍龍之日先聖稱於武徳太師贈自乾封秩重經師陳二十一賢之灌獻爵隆髙弟繪七十二子之冕旈杜之偉樂府新詞登歌作譜裴世期元嘉舊議佾舞𫝊儀厯考曩編代多隆禮然而一十四君之釋菜儀文畧具當年二千餘載之𫝊薪妙契正逢今日欽惟皇帝陛下道統君師功光天地因心作則接堯舜禹湯文武之𫝊吐詞為經闡詩書易象春秋之藴念終始典於學褒顯儒風於緝熙單厥心宣揚聖教閎文隆道訏謨逺軼前王法祖尊師盛業祗承列聖溯鴻圖之締造正文運之初開東土肇基首示崇儒之典萬邦底定宏興立學之謨諡刋千載之誣禮晉五王之秩増常員於博士沛異數於上公十一頃國賦新蠲五百户土田載錫留紫垣之華蓋輝耀奎躔分黄闥之崇儀制隆魯殿闕里之庭楹疊煥成均之廡序頒新御贊五篇寶翰燦蛟龍之色璇題四字雲楣懸日月之光是蓋規模經久而日宏益知典禮至今而大備洪惟聖王繼統景運重新方當御宇之初已肇崇師之秩隆一人之敬事特沛温綸撰二月之良辰躬親釋奠詔易三重門宇羣看龍鳯飛翔黄鋪六樣琉璃頓見鴛鴦燦爛盛烈垂諸宇宙昭勒貞珉宸題炳若日星髙懸綵殿夾鍾南吕均調韶樂之詞爵篚登鉶盡屬尚方之式固已道超古哲徳𢡟先型邁漢觀之宏儀休風尚矣樹虞庠之極則懿典昭焉乃今者龍飛三十二年念國學實觀瞻之地帑發二十餘萬勅廷臣興繕葺之功涓日而上應星躔晷臨營室飭匠而廣收地利材庀嵩衡惟萬民共仰師資斯百工咸趨父事由是虹梁畫棟日麗丹黄松桷蘭椽霞浮金碧十二㦸應天之數羅星象於朱門六十楹擬帝之模縵雲容於紫殿華廡之瓊簷翼翼焜煌卓越前模崇祠之碧宇層層輪奐備増昔日嵗越匝周功方告蕆刋明臣之陋議頌文廟之新題綜羣聖而集成睿徳顯徴諸三字彚六經而垂訓宸謨昭掲於兩楹况復御撰雲章躬揮奎畫荷琳琅之屢錫勒琬琰以垂休文成鶴翥龍盤陋英宗之作記筆似鸞騫鳯舞羞元帝之書碑矧頒内府之珍藏又屬姬朝之儀器豈曰圖誇博古侈張漢室雲雷實云志慰從先用錫周家簠簋當斯時也廟貌惟新皇儀備舉落成而肅親臨之典千年長此明禋釋奠而嚴展謁之文萬方於焉觀聼駐玉輅而橋門生色樂和與禮備咸臻酌金罍而籩豆靜嘉潔藻與芳芹並薦三獻之儀䆳穆九成之奏鏗鏘千官鵠立鵷行盡入聖人之域多士鳬趨雀躍親依天子之光此皆熙朝建崇道之猷鴻規翊振聖世擴右文之量盛治駢宣是以徳教覃敷文思廣被紹心𫝊於十六字道炳中天布聲教於千萬年化成率土曳青蕉而鼓篋豈徒東海波臣裹黄幞而横經匪直中山胄子臣等職分璧館寵籍環林學媿懸鐘竊光耀於文昌之宿材慚砥劍宣徳澤於教化之宫嘗稽漢祖臨雍亦且明堂作頌寧際周王建學肯令樸棫無歌矧蘭臺著作之才冀儲黌舎則槐市頌揚之雅敢上彤廷爰采諸生葑菲之詞敬作盛世芻蕘之獻彚成百冊裝潢十函干冒宸嚴恭呈御覽詔建辟雍聖駕親詣釋奠講學禮成恭進詩冊表乾隆五十年蔡新伏以熙朝慶洽敷天徴聲教之覃茂典光昭總宙仰文章之煥制作百卌年而大備雅化聿興國家億萬載之丕基鴻規悉裕於論於樂酌古仍準乎今是訓是行稱名必衡其實欽惟皇帝陛下乾符久照泰運時雍徳者福基大衍啟升恒之祚禮為教本中天揚格被之庥君道師道交隆用式文王之典國學鄉學異制欣依天子之光允矣化成烝哉澤普蓋豐鎬之人材為最盛而辟雍實教化所由施自漢晉僅襲靡文規模已隘逮元明罔修軼典禮樂未遑恭逢盛世右文宸衷稽古功崇獨斷歡愜羣情地營講舎之前榮躔卜文昌之上位建其有極邁明堂五色之文禮貴從宜陋往牒三雍之説肉倍好之謂璧義兼乎象海象天水旋邱而為池形合乎中規中矩疇曰土深泉逺川固晝夜如斯第須綆汲筒輸井之時義大矣仰承指授寛予嵗時幸工蕆之届期喜子來之奏效爰卜上丁之吉剛逢書亥之辰翠輦揚和青旗應候㦸門由右表帝徳之淵沖幄次在東展天儀之肅穆蕭􅌊映尊彝之色十器璘㻞堂階奏韶濩之音九成諧暢極幣帛牲牷之盛崇拜登灌獻之文惟帝能自得師羮牆如見化民其必由學耳目方新乃莅澤宫御講座虬鐘徐動鼉鼔載鳴句臚於以𫝊呼衆籟於焉屏息鵷班六拜臣子容修弟子之儀雁翼兩行執經許就談經之席測蠡而陳管見才愧戴憑伏地而凛天威悚踰王導竊喜徳音之宣播咸聞聖藴之宏敷學莫大乎敦倫提要道以為型笵功莫深于行健舉至誠以示津涯在顓蒙詎識夫髙深而啟迪自神其鼓舞維時環橋觀聼溢字懽愉備三千七十之徒數與孔門適合萃南北東西之衆教踰周室而遥齒列達尊乃有百齡上夀圖兼王㑹不遺小國陪臣至於鄒魯儒生聖賢世系膺上公之爵守博士之員莫不鵠立鳬趨挹文漪於學海雲蒸霞蔚振修翼於天衢隆禮既成湛恩大沛尚方文綺光騰五色之雲内府瓊膏香汎三巡之琖捧朱提之璀燦品重雙金増丹桂之連蜷價同片玉雖湛露蓼蕭之什無由方聖主之鴻施即菁莪芃樸諸詩詎足擬昌辰之醲化况祀舉夾鍾之月正雨占潤礎之時穗預兆乎兩岐花乃飛其六出澤下尺即生上尺斯民久騐嘉符農有年而士逢年是日尤昭景貺誠孚至聖祥霙表積玉之華徳廣大生時雨啟芳春之澤絲綸叠被俯矜立雪之愚忱錫賚優加益遂瞻天之至願若夫豐碑琬琰奎藻琳瑯記昭萬世之模説證諸儒之誤所以正人心而崇實學務勉為有用之儒宣祖徳而裕貽謀彌長保無疆之福臣等職司蛾術詞類蠅鳴摹日月之光華惟慙謭陋比巷衢之歌舞勉効頌揚爰合諸生鼓篋之謡敬陳化日舒葵之志裒成二百八冊裝潢二十六函干冐宸嚴恭呈御覽欽定國子監志卷五十四

丁遣大臣祀先師則祭酒司業總其禮儀車駕幸太學則執經講義新進士釋褐則坐而受拜續文獻通考國子監司業二員分為左右各提調三堂明史選舉志謹案此洪武十六年所定亦見明太學志成化七年令本監錢糧兼委博士助教㢘謹者公同収支以防奸弊辟雍紀事自博士而下毎月正堂帖委一員守廟兼同典簿支放各項錢糧凡聖廟一應禮器樂器雜物皆交盤封固提督廟户看守春秋丁祭及朔望則督地方及廟户打掃潔浄六月六日同太常寺遣官開曬樂器放過錢糧則與典簿公同具數呈東廂毎日升堂同廵風廵倉庫官報云守廟無事又自博士而下日輪一員廵風該日號長將廵風簿送本官並廵倉庫官畫知本夜提督各該堂長號長及皂𨽻人役環監號廵視次日報廵風無事或生員出號在號飲酒生事並一應偷竊鬭毆事闗本監則次日禀廂裁處又委六堂一員兼管號舍凡生員住號修號貼號立簿稽查號舍損壊及監生撥號不住者呈堂裁處又選委六堂一員同典簿収支錢糧一應出納無小大俱公同照數登簿呈堂以憑查考明太學志國子監銅印方二寸五分厚五分繩愆㕔博士典簿㕔銅印方二寸厚二分二釐典籍㕔銅印方一寸九分厚二分二釐明史職官志洪武十五年二月頒定監規本監正官職専總理一應事務須整飭威儀嚴立規矩表率屬官模範後進不可尸位素餐因而怠惰監丞之職所以參領監事凡教官怠於師訓生員有戻規矩并課業不精廪膳不潔並從糾舉懲治務要夙夜盡公嚴行約束毋得瞻狥以致廢弛博士助教學正學録等官職専教誨務嚴立工程用心講解以臻成效如或怠惰不能自立以致生員有戾規矩者覺舉到官各有責罰掌饌職備廪食供給師生務要恪恭乃事飭令豐潔毋得通同膳夫㕑役使人等因而尅减以致不充違者依律問罪典簿職掌文案凡一應學務並支銷錢糧季報課業文冊等項皆須明白稽考毋得通同吏典人等侵損漏落作弊違者並依律處治明太祖實録洪武十五年五月禮部尚書劉仲質等奏定監規各堂教官毎班選厚重勤敏生員一名以充齋長堂宇宿舍俱各整飭應用什物皆已備具務在潔浄閒雜人等不許輒入其在學人員敢有毁汚作踐者從繩愆㕔糾舉治罪本監官員及官民生並不許將帶家人僮僕擅入紛擾汚雜違者從繩愆㕔糾治掌膳専供飲食務要恪恭乃事毋得簡慢師生病不能行履者許令膳夫供送若無病不行隨衆㑹食者不與當日飲食除三飯之後不許别與茶飯横索者繩愆㕔糾治乃録於集愆冊監丞置集愆冊一本各堂生員凡有不遵學規即便糾治仍將所犯附冩文冊以憑通考初犯記録再三犯决竹笓有差四犯發遣安置師生所用飯食物料一一備具若掌管之官不將官貯物料放支别差市夫㕑役人等日逐補辦諸食物者許生員面奏從之同上洪武十六年正月又定監規正官嚴立學規察六堂講誦課業定生員三等髙下六堂師範髙下博士五員雖分五經共扵彛倫堂西設坐教訓六堂依本經考課同上洪武三十年又定監規各堂教官所以表儀諸生必當躬修禮節正其衣冠率先勤謹使其有所瞻觀庶㡬模範後學今後故作闒茸有失威儀者許監丞糾舉以憑區處若監丞故不覺察及懐私糾舉不當者從監官奏聞區處同上謹案太學志云近日修志前賢建白及逐年事例多無可考以不立案故也故北雍規制前史闕如然大約遵洪武初制盖明代監規自洪武以後冇廢弛而無更易故備録之以存一代之典與他篇斷自永樂者稍殊焉附吏役國子監當該典吏四名外兩廂辦事吏隨吏部撥送無定數内吏二名専守兩廂火房書手博士㕔冩課一名典簿㕔一名廟户舊十名後十三名毎日輪守廟二名直堂及守各堂器用一名把大門一名東西廂各三名繩愆㕔一名博士㕔一名直堂皂𨽻十名把大門二名看朝房二名東廂八名後分僱十名西廂六名後分僱八名東㕔直㕔皂𨽻三名後分僱四名典簿㕔直㕔二名看倉斗級二名後分僱八名庫子二名掌饌㕔一名分僱二名膳夫八十一名本民僉百名係順天保定河間永平四府所屬遞年僉替内改撥廟户十名庫子一名逃亡八名存八十一名宏治十五年祭酒謝鐸題凖本監屬官員給一名使用其餘収僱直銀毎名十兩以充公用徒充膳夫一百五十名刑部例行禮部轉送後嵗送不過二三十名分撥堂㕔皆年老貧病不堪實用刷印匠四名宛大二縣分撥水夫二名東西廂各一人朝房一人歇家十名答應収糧小脚十二名搬送糧米仍充本監一應公使明太學志附稽驗簿冊國子監所設簿冊曰公座簿毎月一扇毎日未升監前各屬官以次畫訖兩廂公座當該吏先送司業次送祭酒畫訖判日祭酒有故不至則司業代判曰實歴簿兩廂東㕔俱設官生舉人一冊嵗貢一冊援例生一冊毎名下冩係某處人由官舉嵗例於某年月日入某堂某班例生并冩由廩増附青俊秀各脚色由原籍起文部劄送監則為實歴尚須行查者則為暫収凡本生出差給假復班皆填註簿曰班簿分三十二班毎班不論官舉貢例但依入監月日冩姓名籍貫及差假等字以便查閲亦曰㸃名簿曰監規簿東廂給本生監規登簿訖禮生引赴西廂兩㕔登記限一月内熟背背訖西廂西㕔查驗判銷再引赴東廂及東㕔判銷曰集愆冊設扵東㕔分三十二班逐嵗月書各生名下或橔鎖㡬日壓撥㡬次罰曠若干日有因病久曠者亦附書曰舉善簿本生在監有善行闗風教者本生師及友長同鄉生從實呈報書簿量加奨勸曰東廂堂稿簿凡師生各事與錢糧行各衙門事宜詳具縁由逐日書簿判行備考曰號簿凡本監各事務収發各衙門文書用印掛號以防欺偽曰印簿凡遇用印備書某日用印若干曰撥歴簿凡監生撥正雜歴名數若干各以官舉貢例扣足年月照撥單填注曰撥差簿應撥長短差者明開坐班月日所撥某差某時復班曰禮器樂器簿凡諸器各登總數毎月守廟官交代查㸃責廟户看守丁祭照數驗發洗滌祭畢查収曰器用簿凡公堂兩廊五㕔六堂一應公用器物照所在多寡數目開載用堂印鈐記一存東廂一存典簿㕔曰官廨簿凡本監官房若干坐落何地頽圯修整一一登記鈐印存東廂曰内外號舍簿照例註明委屬官督同號長巡守倒塌呈明查修曰經簿書板簿典籍㕔逐一登載損缺查明修補各堂取閲備載曰徒役簿典簿㕔查明登冊曰錢糧簿俱典簿掌管収放登記遇月終季終年終交盤照簿查算曰卷簿凡各部公務或題覆本監奏請或奏擬本監事宜到監俱立簿備查曰供事簿凡文廟兩廂兩㕔各班禮生講章禮生六堂堂長友長各舍號長俱登載㡬人某姓某名曰巡風簿凡二凡㕔堂官毎日輪值巡守内號封鎖外門掌饌官毎日輪值巡守倉庫皆先日堂長各持所記之簿畫知次日送堂判日曰序任簿凡本監官員到任即登記姓名字號籍貫出身到任年月陞遷亦如之曰習禮公侯伯卯簿凡已襲未襲應習讀者列名毎日畫卯曰丁祭訪官簿曰集禧簿派各生訪明各官寓所祭畢查各獻官陪祭官及六品以下先日拜廟官頒胙曰背書簿堂上掣籖先赴博士㕔背訖再揭試生熟送西廂試背生者或罰曠皆書曰講書簿㑹講先日開題送西廂裁㸃具稿送改正發西㕔録簿曰查課簿監生毎月作課六篇送本堂看訖彚送西㕔詳定等第掲送西廂列等勸懲凡篇數不完字畫潦草者計篇罰責悉載曰查倣簿監生每日冩倣一幅送本堂圏改月終送西廂查驗責者悉注曰六堂通知簿天順二年奏准以備撥歴者曰各堂勘合文簿舊定監規凡積紅圏七百以上者升率性堂曰六堂卯簿毎生二行行十五日毎日到堂畫卯不到者本堂判不到呈廂究治曰嵗報冊自去年十二月十六日起至本年十二月十五日止一應官恩舉貢例監凡舊管新收開除實在各若干查開呈堂奏進仍具清冊送禮科同上嵗報監生冊即周人學士之版也毎嵗終總一嵗諸生之數分舉貢官例舊管新収開除實在之日以獻於天府人材興替於是驗焉續文獻通考欽定國子監志卷二十九

  text: 欽定四庫全書欽定國子監志卷四十五
  hash: sha256:046850fa8ef09c53ae87afdd1fafc2550b00de8e78dc1e1154ba67b2e759a740
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_044-1a, image: WYG0600/WYG0600-0469a.png}
body:
  text: 經費四廩給國子監內肄業生每名月給膏火銀二兩五錢十一月十二月加煤炭銀五錢外肄業生每名月給衣服銀五錢六堂官按名分析於每月之十五日公堂㸃名給發無故不到扣除大課則官給膳食四人一筵筵四簋發銀二錢堂上官委員驗其豐薄失飪不潔將厨役懲治均於恩賞銀內支銷其支領稽核之法詳見恩賚門八旗官學漢教習每月人給銀二兩折制錢一千八百米一石稄米五斗小米二斗六升五合均由户部關領每嵗人給夏秋衣各一襲凉帽一二嵗人給冬裘一襲暖帽一由工部關領滿教習䝉古教習騎射教習並給原秩錢米如由閒散補者視漢教習例支給滿洲䝉古八旗官學生每名月給銀一兩五錢漢軍每名月給銀一兩並由本旗關領有疾及告假逾一月者不給其包衣學生無錢糧算學教習衣服銀米視八旗官學教習漢算學生每名月給銀一兩五錢折制錢一千三百五十由國子監行文户部關領滿洲䝉古漢軍算學生月銀視八旗官學生由本旗關領琉球學教習衣服銀米視八旗官學教習琉球官學生日給視進貢都通事從者日給視進貢陪臣之從者均由禮部給發又官學生及從者衣服官學生紙筆墨銀並所用器皿煤炭均由工部給發俄羅斯學官學生每人日給銀一錢從者日給銀五分由理藩院給發先師廟樂舞生每名月給銀六錢厨役每名給米五斗每斗折銀一錢三分均由太常寺咨户部關領皂役廟户每名案季給米九斗閏則增加共四十七名每季應給共米四十二石三斗折領銀五十四兩九錢九分由戶部關領其每月掃除監署及南學司閽量給賞錢於恩賞銀內支銷謹案國子監各生等廩給均照現行事例詳録所有更定章程附載於後順治二年定教習八旗子弟之生員每名月給米二斛九年定國子監肄業監生每名月給米三斗康熙二十七年定給琉球學生廩餼衣服雍正二年定琉球學教習衣服銀米照官學教習例五年祭酒孫嘉淦奏八旗官學向無錢糧查八旗所設教養兵滿洲三千六百八十名蒙古四百八十名漢軍九百六十名滿洲䝉古月給銀三兩漢軍月給銀二兩令其肄習弓馬但其中亦有幼稚充額不能騎射而官學生年壯者往往挑選披甲請嗣後官學生有年壯而讀書遲鈍者令還旗披甲别選八旗子弟年幼者補其缺俾習清文俟稍長再學弓馬仍於八旗教養兵額內滿洲分出三十名䝉古漢軍各分出十名錢糧給官學生滿洲䝉古每名月一兩五錢漢軍每名月一兩彼此各有禆益隨經王大臣等議如所請詔從之又定八旗官學漢教習每月人給銀二兩米二斛在户部支領每嵗人給夏秋衣一襲二嵗人給冬衣一襲在工部支領八年命嵗賞國子監銀六千兩為講課飯食之費肄業諸生並視內教習例給衣服銀所餘以賙助諸生有事故者乾隆二年定國子監肄業生以三百人為額在內肄業者一百八十人每名嵗支膏火銀二十四兩在外肄業者一百二十人每名嵗支銀六兩三年裁國子監外肄業生止留內肄業生一百八十人嵗加膏火銀六兩又定算學教習月廩視八旗官學漢教習又定滿洲䝉古漢軍算學生月給膏火銀視八旗官學生在本旗支領其漢算學生較漢軍算學生旅食維艱加銀五錢由國子監於户部支領四年定算學教習之月廩衣服由國子監行文支給六年兼管監事尚書劉吳龍疏請於內肄業生一百八十名中撥出二十四名作外肄業計其膏火可給一百二十人即以此定為額缺考課不赴者例不給豫詔從之十年定欽天監撥歸算學之肄業生無庸别給膏火選學業有成之算學生協同教習分教算法已補教習者食本俸未補者仍領學生膏火三十一年祭酒宗室良誠奏設八旗官學滿洲教習並請照宗學覺羅學滿教習例有原秩者在旗支領由閒散補者照漢教習例支給銀米部議如所請詔從之三十二年兼管監事尚書陸宗楷奏准下五旗包衣子弟請附入官學讀書不必給與錢糧廩給附元至元二十四年詔國子監生員官給飲食元史世祖紀謹業明宋濓文集載元太宗五年宣諭二通其一云肄業子弟早給米麵各一升肉一斤晚同酒一缶家糧之給亦一升土著者皆不與蓋太宗時已有廩餼至世祖遷學北城遂仍是制元統二年詔國子學膳學錢糧悉依纍朝舊制元史順帝紀明永樂二年令北京國子監日行㑹饌明太學志謹案明太學志又云國子監有倉以貯俸祿饌米錢鈔則貯掌饌㕔户部額𣲖國子監錢糧有白糧有糙米有小麥有菉豆有黃豆有錢有鈔每年支收原無定數惟隨監生之多寡預為㑹計行部𣲖輸若監生數多嵗收不敷則將上年餘剩支給監生數少則將本年餘賸存貯其錢鈔以給師生㑹饌又南雍志云洪武中定官吏師生㑹饌之制饌米三月至十月終日食三餐每人日支米一升十一月至次年二月終日食二餐每人日支米八合五勺其他物料按日支給惟朔望不支備録於此永樂中命翰林院録㑹試下第舉人之優者入學以俟後科給以教諭之俸是時㑹試有副榜大抵署教官故令入監者亦食其祿也明史選舉志宣德中以缺薪停止㑹饌乃以饌米等物計日而均分之各官及習禮公侯駙馬伯及吏員監生無家者三月至十月日給饌米一升每月除朔望該二斗八升十一月至二月給米八合五勺每月除朔望該二斗三升八合他物料亦然初仍支本色後照時估折支鈔貫明太學志成化十九年詔納粟監生年二十四嵗以下者自備柴米寄監讀書扣年二十五嵗以上方准食糧收撥南雍志宏治元年禮部奏國子監監生不分科貢納粟各項一體坐班兩月方凖支給饌米從之明太學志嘉靖六年定各途監生到監之日即凖支給饌米同上監生有家人者三月至十月日支米二升二合六勺十一月至二月日支米一升九合二勺三杪七撮同上書手工食銀四兩五錢廟户工食六兩八兩九兩十兩有差或廟户向宛平等縣自支或該縣解送給發皂𨽻工食每名十兩於兵部關支刷印匠工食每名十二兩給與小票執送二縣寄籍匠民家自支水夫量與工食看朝房歇家小腳俱無工食同上國子監有民僉膳夫百名専給飲食㑹饌停止改為雇後每名完解銀十兩收充公用嘉靖六年奏凖以十分為率存一分備公用餘九分則分給師生焉同上謹案㑹饌既罷膳夫自應裁革乃復令民解銀充公分潤師生失政體矣欽定國子監志卷四十五

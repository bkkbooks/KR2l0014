  text: 欽定四庫全書欽定國子監志卷五十
  hash: sha256:a1f663e1c51c1fae474a401af5492a230fb441abda0d866772fdc806a0d5faae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_049-1a, image: WYG0600/WYG0600-0509c.png}
body:
  text: 金石五石鼓石鼓在國子監文廟㦸門内左右分列其數凡十其形似鼓而頂㣲圓元大徳間虞集得之大都移置於此又元潘廸石鼓音訓碑一並列於左謹案石鼓文字謹就今十鼓完缺備橅以紀其實其音訓則潘迪碑現列學宫故並存之而厯嵗益久剥泐愈甚潘氏音訓已多闕文以今鼓文校之又缺潘訓四之一攷明楊慎有摹蘇軾十鼓全文論者謂出臆撰至朱彝尊石鼓考及所採諸家議論互有異同兹擇其與現存文字有發明者加案改証餘已纂入欽定日下舊閴考兹不復贅云第一鼓潘廸音訓􅏶車旣工􅏶馬旣同􅏶薛氏音我工籀文攻字蘇氏石鼔詩亦作攻按詩車攻𫝊攻堅緻也同齊也物馬齊其力􅏶馬旣好􅏶馬旣􅥹􅥹从馬缶聲疑與阜音義同詩車攻田車旣好四牡孔阜說者謂阜盛大也君子員邋員斿員作鼎籀文也說文員音云益也有重文君子指從獵諸臣員員衆多也邋邋旌旗揺動貌斿旌之末垂者鹿速君子之求牝鹿速有重文速速疾行貌或曰鹿之足跡􅓒􅃓兹㠯寺􅓒郭氏云恐當作鹵鹵弓即庾弓也周禮庾弓利射侯與弋今按鼓文作􅓒㠯古以字下同寺詩家皆音時然下文别有時字或音侍􅏶敺其時其來趩趩丑亦反有重文說文行聲也一曰不行貌􅞚􅞚音憲作矣皆有重文其義未詳或曰􅞚走意衆多也即䢩即時鹿䢩冀小異疑非我字或音禦子亦反鄭氏云直離反有重文其來大即我􅇌其樸其缺䢱射其蜀䢱徒鹿反續也或作􅢢或音豚蜀恐犢字盖蜀有獨音右一薛氏次居八鄭氏次居三施氏次居一今按古文苑其序姑從施氏然舊說第五鼓言漁狩而歸第六鼔言治道涂似失先後序若左右相易始於西北以第六為第一第五為第十則先後之序得矣然亦未可必也可讀者十有六句餘未詳凡六十四宇此鼔舊墨本鹵上有孫字䢱上有來字今澷㓕謹案君子員邋員斿二句潘訓重文讀明楊慎本讀作君子員邋員邋員斿說似較長又角弓角字鼔文完好潘訓引郭氏作鹵非是亦當從楊讀又寺字鼓文亦完好並無日旁朱􅂜尊考作時字誤又􅏶敺其時時字楊讀作畤今鼔文畤字甚完訓作時亦誤第二鼓潘迪音訓汧殹沔王氏云汧音牽水名出扶風汧縣西北入渭殹即也見詛楚文及秦斤鄭樵因此指為秦物今按醫繄皆从殹已見古書非始于秦也郭氏曰讀如繄語助沔籀作泛有重文鄭氏云沔讀作綿盖用平聲卟韻㞼淖淵㞼見秦權有重文與烝通詩南有嘉魚烝然罩罩王肅云烝衆也籀文皮字或音彼淖淵水之深處鯉處之君子之鯉皆魚名鄭氏音鰋鮎也處鄭讀作居盖取叶韻籀文漁从寸今闕澫又其斿鄭氏云澫即漫从萬通作曼疑有重文漫漫水之瀰茫處又通作有籀文省下同見詛楚文仝作鯊魚名所加反薛氏作散即字有重文或音汕叶平聲相干反帛魚􅛼其氐鮮鄭氏云􅛼音洛集韻云白色也鄭氏云亦作菹讀與俎同施氏云按說文側余反醢也氐典禮反今按􅛼字音皪白貌帛即白字言白魚皪皪然潔白登之於俎豆甚鮮也黄帛其又又􅤺鄭氏云即鯁字卑連反或音醨今作鮒音附􅤺舊音白今按叶韻音綿其孔􅞈羉之施氏作豆今作䏠乞及反傳雅謂之䏠鄭氏作豆羉籀文臠字或作䌛丑若反相如大人賦休奔走或音使有重文郭云籀文洋字鄭氏音汗今作澣有重文郭氏音博或云遄字其魚佳可佳鱮佳鯉可㠯缺之佳楊及杛佳通作維可通作何㯱舊作㯱說文符宵反鄭氏云與標同愚謂从缶从櫜省聲也包裹承藉之義非謂穿之也蘇氏詩作何以貫之恐誤右二薛氏次居五鄭氏次居一十鼔中唯此完好然宇多假借故義有難通今雖字全磨㓕成文者十有七句凡六十字謹案沔字鼔有重文潘楊本同朱云騐鼓文無之誤也澫澫楊朱二本俱作重文今考鼓明有二文而潘訓註云疑有重文似亦未見鼔也第三鼔潘迪音訓田車既安鋚勒馬按詩傳輶車田獵驅逆之車取其輕㨗也鋚郭氏云大幺反轡首銅也廣韻音條紖頭銅餙今按馬字非全文但偏旁从馬闕左邊當有重文或作䢩衆既簡簡選也左驂旛右驂騝詩騧驪是驂𫝊驂兩騑也車駕四馬内兩馬謂之服外兩馬謂之騑郭氏云旛妨圓反旌旗總名旛取其輕舉貌騝居言反爾雅騝駵馬黄脊或云紀偃反壯健貌䢩㠯隮于邍隮升也邍古原字下同䢩舊有戎字止疑作陸宫車其寫秀弓寺射宫車輦車也周禮輦車用於宫中秀與綉同綉弓戎弓也穀梁傳弓綉質質靶也戎弓綉其質示武中有文言田狩之時宫車寫而不用戎弓用之於射也寫讀如卸麋豕孔庻麀鹿雉兔言所獲多品其邍又未詳其鄭氏云今作奔或作走大出各亞亞古孝經作惡盖二字通用旲旲未詳薛氏作卑字鄭氏云疑即思字碧落碑思作郭氏云恐是㚖字古老反大白澤也白澤獸名執而勿射多􅞈䟏說文䟏郎擊反動也走也鄭氏云與轢同或云郎谷反君子逌樂逌薛氏作迺鄭氏作攸所也按漢書地理志酆水逌同五行志􅂜倫逌叙皆古攸字右三薛氏施氏次居三鄭氏次居四可讀者十有五句餘不成文凡六十三字謹案孔安孔字鼓文子旁尚可辨楊讀孔潘本及朱考俱作既誤也師字潘訓及朱考俱作衆考篆文衆字下應從今鼔文下半存是篆文師字之半當從楊讀第四鼓潘廸音訓鑾車郭氏云人君乗車四馬鑣八鸞鈴象鸞聲按經史多作鸞左傳鍚鸞和鈴詩八鸞瑲瑲欶眞施氏呼骨反疾也薛氏作華字鄭氏云即拜字並見義雲章眞鄭氏云即填字亦作鎮說文欶即策字或音速弓孔碩彤矢按彤弓彤矢天子以錫有功諸侯詩彤弓弨兮書文侯之命及春秋傳彤弓一彤矢百是也說者謂彤弓朱弓碩大也四馬其寫六轡驁鄭氏云驁五到反􅞁孔􅞈摶􅞁即徒字鄭氏云音馭或云即廓字薛郭作廓鄭氏作鄠見詛楚文今作宣車載衍鄭氏云即酋字詩輶車鸞鑣田狩之車也籀文載字即道字戎􅞁如章邍溼隂陽溼鄭氏云今作濕通作隰􅞁徒也如章言戎徒整布如文章然邍髙陸也隰卑濕也言髙卑向背皆有隂陽詩公劉相其隂陽度其隰原趍六馬射之鄭氏云趍即趣字有重文七步反詩蹶維趣馬趣趣調和閑習也六馬天子所駕也籀文族有重文疑借作鏃如虎獸鹿如多賢鄭氏云今作徇禽允異右四薛氏施氏次居四鄭氏次居五其文可讀者僅七句言田獵之事凡五十三字薛氏曰允異之上舊有禽䢩三字今按禽字下闕四字第五鼔潘廸音訓霝雨鄭氏云霝亦作零詩東山零雨其濛今省作流下同見說文皆磨㓕不可辨唯字今僅存其半此上二十餘字剝落不可考自􅞁佳舟以衍或隂或陽水北為陽南為隂或從水之隂或從水之陽皆可歸也或字下今闕隂或二字陽字僅存其半余家藏墨本尚有之极深㠯于水一方极薛氏作枝鄭氏云即楫字其奔叓施氏云叓古文事字見說文今僅存下數畫右五薛氏次居九鄭氏次居八舊說言漁狩而歸可讀者僅三句餘皆磨㓕不成文凡二十六字墨本舊有迄湧盈濟君子即涉流汧殹洎洎舫舟西䢜湯湯户二十餘字今皆不存第六鼓潘廸音訓猷乍邍乍籀文乍與作通即道字遄我除氏鄭云遄字今作治字施氏云按古文孝經治作與此小異帥彼􅧦舊音序或曰阪字薛氏作莽字郭氏云恐是䒪䒪草之相紏者居蚪反鄭氏作莫未詳孰是為丗里丗三十也文曰為三十里以三十為丗書家謂之㑹意蘇合反非世字也微薛氏作徼鄭氏云未詳音義罟薛氏作栗尚書栗作與此相類說文省作㮚柞棫柞棫皆木名詩柞棫其拔其鄭氏云作槃或作棴疑古椶字椶皆木名音咎又音舊薛氏作庸鄭氏云未詳音義或云遘字鳴亞箬鄭籀文若字氏作箬其􅒧薛氏作華又音夫為所斿薛氏作憂鄭氏云今作䕫盩郭氏作鄭氏云疑即畣字鼔文作恐晤字古从五从日右六薛氏次居七鄭氏次居二舊說言治道涂也凡四十一字每行僅存四字而上皆闕二三字盖五代之亂散落民間穴中以為臼故今所存皆斷續不成文鄭氏乃以猷作原作導遄遄治除帥莫為丗里十六字為成辭盖鄭氏所見不過墨本摹刻者而不知每行之上有闕文也謹案徴字鼓文完好可辨並無重文潘訓引鄭氏作而云未詳音義楊本摹作亦重文而改山從土朱考與潘同皆與鼔文不合似當闕疑又末句吾字鼓文甚明潘訓摹作字而引鄭云疑即畣字又云恐是晤字皆謬惟楊本與上句字皆訓作二日五日兩字謂為古篆合字如牧敦中字是三所二字卭仲中字是八月二字之類此則確有依據非同臆説矣第七鼓潘廸音訓而以文理推之而字上當有闕文師滔滔下有重文是戴施氏云按說文古熾字與此相類具奪磨㓕不可辨後具肝氏薛氏作肝鄭作肝音吁來樂天子皆不可辨右七薛氏次居一鄭氏次居九舊有弓矢孔􅞈左驂不其寫矢具來子來嗣王始古我來二十字今剥落僅存十有四字皆不成文第八鼓潘廸音訓放說文與微同右八薛氏次居六鄭氏次居七按施氏墨本所錄有走䮺䮺馬晢若雉立其一之心十四字余家藏舊本止微字存今漸剥落矣第九鼔潘迪音訓䢩水既衟既平䢩既止嘉樹則里天子永寧日佳丙申施氏云丙申下二字尚可辨䢩其用衟馬既申敕康駕申重也敕戒也左驂䮯䮯有重文施氏云五到反馬怒也識如有重文鄭氏音遫不鄭氏云籀文翰从飛薛氏作郭氏云恐是籀文霾字公謂天子余及如如通作汝害不余及右九薛氏次居二鄭氏次居十舊說言除道今皆剥落不成文可讀者唯七句凡五十二字謹案下一字潘訓作識楊本作棨鼓文雖不全而上半字似與棨字相合與識字則全不相類當從楊讀又女不女字潘訓讀如今考鼓文無口旁楊朱本皆讀為汝潘訓誤也第十鼓潘廸音訓吳人亟王氏云吳通作虞鄭氏云汧水出于吳山故漁于汧而狩于吳也愚按二說王為優施氏云亦作憐載􅒾載北􅒾即西字鄭氏云見曾矦彞北字今磨㓕而用亯寍薛氏作埶字說文云埶與㙯同鄭氏云即社字寍寧同或作厲逢中孔籀文囿作見說文或云即田字鹿䢩其鄭氏云即疃字見􅌏敦厖敦有重文大求又是右十薛氏次居十鄭氏次居六今僅存二十三字唯吳人亟載西載北二句成文餘皆殘缺不可讀墨本舊有勿奄勿伏而出用大祝獻十一字今皆不存謹案字潘訓引薛氏作埶與藝同楊音孰二訓不同未知孰是欽定國子監志卷五十

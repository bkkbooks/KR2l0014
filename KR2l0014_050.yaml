front:
  text: 欽定四庫全書欽定國子監志卷五十一
  hash: sha256:365d25f6df84c7d0cba7152146905c8067e14dbbcc752ad834188cdf06b306cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_050-1a, image: WYG0600/WYG0600-0522a.png}
body:
  text: 經籍臣等謹案教胄以通經致用經者羣籍之權輿由經而史子集皆以發明經傳國家崇尚經術易書詩春秋三禮以及日講解義四書五經俱經御批敕纂折𠂻至當載籍精博振古未有刋於武英殿者謂之殿本刋於國學者謂之監本謹列書目備載於篇其鏤板所存别序於後為經籍門經籍一賜書御製資政要覽三卷世祖章皇帝御製日講四書解義二十六卷聖祖仁皇帝命儒臣纂輯翰林院掌院學士喇沙里陳廷敬等校刋御選古文淵鑑六十四卷聖祖仁皇帝御選御製孝經衍義一百卷世祖章皇帝命諸臣纂修書成於康熙二十九年欽定大清律三十卷總類六卷大學士對哈納奉敕編輯御批資治通鑑綱目前編正編續編共一百四卷聖祖仁皇帝御批御選全唐詩不分卷聖祖仁皇帝御選通政使司通政使曺寅等奉敕校閲刋刻欽定佩文韻府一百六卷大學士張玉書等奉敕纂修御選唐詩三十六卷聖世仁皇帝御選御纂朱子全書六十六卷聖祖仁皇帝御纂大學士熊賜履李光地等編校御製文初集四十卷二集五十卷三集五十卷四集三十六卷總一百七十六卷聖祖仁皇帝御製翰林院編修蔣漣奉敕校刋御纂周易折中二十二卷大學士李光地奉敕纂修欽定康熙字典以十二支為次每支各分上中下三集合三十六集南書房侍直大學士陳廷敬等奉敕編輯御纂性理精義十二卷大學李光地奉敕詮次欽定韻府拾遺一百六卷大學士王掞等奉敕纂輯欽定春秋傳説彚纂三十八卷大學士王掞等奉敕纂輯欽定分類字錦六十四卷編修何焯陳鵬年等奉敕編纂欽定音韻闡微十八卷大學士李光地尚書徐元夢諸生王蘭生等纂輯書成於雍正四年欽定詩經傳説彚纂二十一卷尚書王鴻緒等奉敕纂輯書成於雍正五年欽定子史精華一百六十卷分部三十為目二百七十有九聖祖仁皇帝命儒臣纂輯書成於雍正五年欽定書經傳説彚纂二十一卷大學士王頊齡張廷玉等纂輯書成於雍正大清會典二百五十卷世宗憲皇帝命諸臣重修硃批諭旨一百二十册不分卷世宗憲皇帝御批內外諸臣奏摺薈萃刋刻上諭八旗起康熙六十一年止雍正十三年不分卷上諭旗務議覆起康熙六十一年止雍正十三年不分卷諭行旗務奏議起雍正元年止十三年御製文集前二十卷為文集後十卷為詩總三十卷世宗憲皇帝御製御製曰知薈説四卷皇上御製日講春秋解義六十四卷世宗憲皇帝命果親王允禮大學士張廷玉內閣學士方苞詳細校訂書成於乾隆二年欽定八旗通志二百五十卷世宗憲皇帝命諸臣纂輯書成於乾隆四年欽定四書文不分卷凡前明文四百八十六篇國朝文二百九十七篇內閣學士方苞等奉敕選定御製盛京賦一卷皇上御製大學士鄂爾泰張廷玉等輯注欽定八旗氏族通譜八十卷世宗憲皇帝敕滿洲大學士會同福敏徐元夢纂輯書成於乾隆九年欽定三禮義疏卷首上下周官四十八卷儀禮四十八卷禮記八十卷大學士鄂爾泰等奉敕纂輯欽定大清會典一百卷則例一百八十卷皇上命王大臣等纂輯皇朝禮器圖式十八卷莊親王允祿等奉敕纂輯尚書福隆安等校勘御製文集三十卷皇上御製起丙辰訖甲申大學士于敏中敬刋御製詩初集四十四卷皇上御製起丙辰訖丁卯大學士蔣溥敬刋御製詩二集九十卷皇上御製起戊辰訖己卯大學士蔣溥敬刋欽定滿洲蒙古合璧清文鑑二十卷欽定清文鑑二十卷欽定清字古文淵鑑六十四卷欽定增訂清文鑑三十二卷總綱八卷補編四卷總綱一卷清字大清律三十卷總類六卷清字通鑑前編十八卷綱目五十九卷綱目續編二十七卷清漢對音字式一卷欽定淳化閣法帖十卷列聖暨謹按以上各書均出皇上頒賜國子監存貯敬查頒賜先後次第恭載其奉敕纂輯臣名及書成年月俱詳查偹列於左國子監舊存各書附後周易注疏十三卷尚書注疏十九卷詩經注疏三十卷春秋左傳注疏六十卷春秋公羊傳注疏二十八卷春秋穀梁傳注疏二十卷周禮注疏四十二卷儀禮注疏十七卷禮記注疏六十三卷論語注疏二十卷孝經注疏九卷孟子注疏十四卷爾雅注疏十一卷易經大全二十卷書經大全十卷詩經大全二十卷春秋大全三十七卷禮記大全三十卷以上五經大全皆胡廣等撰輯四書大全三十六卷朱熹撰四書大全三十六卷陸隴其撰儀禮經傳通解二十九卷朱子遺書性理大全會通七十卷續四十二卷胡廣等輯禮記會元四卷葉時撰禮記裒言十六卷李天植等撰禮記新義三十卷湯三才撰禮記敬業八卷楊鼎熙撰朱子禮纂五卷李光地撰四書解義上下二册李光地撰解義三種一卷李光地撰家語十卷王肅注正蒙上下二卷張載著山海經圖五卷廣注十八卷吳任臣輯史記一百三十卷司馬遷撰漢書一百卷班固撰後漢書一百三十卷范蔚宗撰三國志六十五卷陳夀撰裴松之注晉書一百三十卷唐太宗御撰宋書一百卷沈約撰齊書五十九卷蕭子顯撰梁書五十六卷姚思廉撰陳書三十六卷姚思廉撰魏書一百十四卷魏收撰北齊書五十卷李百藥撰周書五十卷令狐德棻撰隋書八十四卷魏徴等撰南史八十卷李延夀撰北史一百卷李延夀撰舊唐書二百卷劉昫撰唐書二百二十五卷歐陽修等撰五代史七十四卷歐陽修撰宋史四百九十六卷托克托修遼史一百十六卷托克托修金史一百三十五卷托克托修元史二百十卷宋濂撰明史三百三十二卷張廷玉等奉敕修通典二百卷杜佑撰通志二百卷鄭樵撰文獻通考三百四十卷馬貴與撰唐鑑二十卷范祖禹撰吕祖謙注通鑑紀事本末二百三十九卷袁樞編宋元紀事本末一百九卷馮琦等編繹史一百六十卷馬驌撰明太學志十二卷郭鎜等撰南雍志二十四卷黃佐撰楚詞燈四卷林雲銘注韓非子二十卷韓非著韓管合刋二卷張榜輯韓子粹言五十七卷李光地纂淵明集四卷陶潛著附東坡和陶一卷蘇軾著王思任集刋昌黎集四十卷韓愈著蘇老泉嘉祐集十四卷蘇洵著東坡全集七十五卷蘇軾著南豐集五十卷曾鞏著范文正集四十八卷范仲淹著趙清獻集十卷趙忭著楊龜山集四十二卷楊時著李忠定集四十四卷李綱著胡子知言六卷胡宏著韋齊集十二卷朱松著南軒文集四十卷張栻著王雙溪集十二卷王炎著文山集二十卷文天祥著陳定宇集十六卷陳櫟著宋文憲集三十三卷宋濓著于肅愍奏議十卷于謙撰商文毅集十卷商輅著薛敬軒文集十卷薛瑄著白沙集九卷陳獻章著林次崖集十八卷林希元著荆川全集十二卷唐順之著周恭肅集十六卷周用著歸震川全集十卷别集十卷歸有光著周忠毅奏議四卷周宗建撰榕村全集四十卷别集五卷李光地著歷代名臣奏議三百十九卷黃淮等撰三儒言行要録十二卷薛瑄等撰字學三正四册郭一經輯古文雅正十四卷蔡世逺選榕村詩所八卷李光地撰榕村詩選八卷李光地選名文前選不分卷李光地選程墨前選不分卷李光地選易義前選不分卷李光地選榕村藏稿四卷李光地著八旗官學書籍曰講四書解義御製古文淵鑑御製孝經衍義平定朔漠方略清漢文御批資治通鑑綱目全書清文御選全唐詩欽定佩文韻府御製文集初集至三集御選唐詩御纂朱子全書御纂周易折中欽定康熙字典御纂性理精義欽定韻府拾遺欽定春秋傳説彚纂欽定分類字錦聖諭廣訓清漢文欽定大清律集解清漢文欽定詩經傳説彚纂大清會典御製文集御製日知薈説欽定四書文御製盛京賦清字四書清文鑑滿洲蒙古文鑑蒙古字綱仿宋版四書四書大全四書正文四書集注大學衍義周易本義尚書集注詩經集注春秋胡傳禮記集注古文約選古文雅正謹按八旗官學書籍皆各助教司之附算學館書籍御製數理精藴上下二編聖祖仁皇帝命莊親王等纂輯書成於雍正九年賜書附明宏治十五年頒大誥厯代名臣奏議於國子監大誥一卷大誥續編一卷大誥三編一卷大誥武臣一卷皆太祖御製厯代名臣奏議永樂中黃淮等奉敕纂輯凡三百五十卷明史嘉靖七年頒明倫大典於國子監同上九年頒大明集禮於國子監洪武中梁寅等奉敕纂修凡五十卷同上謹案明監中藏書自賜書外據明太學志云宏治十四年始置五厨於載道所中藏制書而以四部别庋之至嘉靖三十六年重修五厨復增置五架始無散逸之虞然所編卷次顛倒門類參差大率殘缺不全無可分析紀載故併附後卷板片中兹不贅列欽定國子監志卷五十一

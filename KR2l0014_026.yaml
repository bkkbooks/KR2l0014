  text: 欽定四庫全書欽定國子監志卷二十六
  hash: sha256:74970bc13afcdee9589974ea642b124332a6837d055ccbdd1fb3d7f746a03afa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_026-1a, image: WYG0600/WYG0600-0258a.png}
body:
  text: 監制臣等謹案成周四學並設制度綦備兩漢太學之外又有辟雍講堂順帝修葺黌宇規模益廓晉武帝咸康二年始立國子學至隋改為國子監監署之名實昉於兹唐以國子監統六學太宗増創學舍一千二百楹至徳以還寖以頽廢宋初國子監止二百楹神宗以錫慶院改建太學而後齋舍直廬規模粗具尋復行三舍法置八十齋蓋王者建國君民莫不以建學為先也自有元都燕始于南城立學逮世祖至元二十四年而國子監始遷今地前明永樂徙都燕仍元舊三𫝊至英宗始營建焉洪惟世祖章皇帝建極宅京宏宣文治膠雍之制監二代而彌隆又命創設八旗官學為俊秀儲材之地嗣是聖祖仁皇帝特賜御書彞倫堂額世宗憲皇帝復頒御書文行忠信扁額又特賜官宅為學舎皇上廸光纘緒復命大修監署鳩材庀工發帑鉅萬俾海内髦彦觀光堂廡蹈詠於論於樂之盛侯其禕矣謹志圖説一卷建葺一卷各以元明舊制附載其末為監制門監制一圖說國子監在都城東北隅崇仁里成賢街南向繚以周垣大門凡三中榜曰集賢門左右樹坊各一榜曰國子監坊左右又樹坊各一曰成賢街西第二坊在先師廟西前屏以垣自集賢門入為太學門門凡三中榜曰太學中門常時皆不啟車駕詣學乃啟之自太學門入為新建辟雍乾隆四十八年詔建殿通方九室重簷周廊覆琉璃黄瓦楹柱門扉皆丹飾樑棟施五采殿前恭懸御書辟雍額殿中恭懸御書額一曰雅涵於樂御製聯一曰金元明宅於兹天邑萬年今大備虞夏殷闕有間周京四學古堪循方臺外圜以璧池前後左右平橋四座池内外甃白石欄地髙乏水則引以四井前二井在太學門外其二井一在池東率性堂後簷牆外一在池西修道堂後簷牆外俱砌暗溝汲水注入池中前樹琉璃牌樓一座中設劵門三南向恭勒御書圜橋教澤坊額北向恭勒御書學海節觀坊額牌樓東北西北角各建碑亭一座恭勒御製國學新建辟雍圜水工成碑記御製三老五更説恭載卷五門御製文牌樓東南西南角各建鐘鼔樓一座辟雍殿後為彞倫堂堂七楹中壁恭勒聖祖仁皇帝御書聖經堂中恭懸聖祖仁皇帝御書彞倫堂額康熙四十五年頒揭世祖憲皇帝御書文行忠信匾額額首御製題辭曰學者文行並重尤以忠信為本故孔子垂為四教成均進士之法無踰於此賜國子監雍正四年給頒列聖勅諭三道皇上勅諭一道乾隆三年頒給皇上御書福疇攸叙匾額乾隆五十年新建辟雍工成頒捐堂前有露臺西置日晷堂北有後堂三楹有門通敬一亭堂左右東西講堂各三楹南向旁各一門通敬一亭西講堂前有元臣許衡手植古槐一株乾隆十六年皇太后七旬萬夀古槐重榮御製詩六韻紀之恭載卷六門御製詩東講堂之東轉而南廊房三楹屬于東廡西亦如之東廡近北為繩愆㕔㕔三楹監丞莅之典簿典籍亦于此治事其南鼔房一間庋鼓次為率性誠心崇志三堂其助教學正學録莅之堂各十一楹西向西廡近北為博士㕔亦三楹與繩愆㕔相直其南鐘房一間庋鐘次為修道正誼廣業三堂其助教學正學録莅之堂各十一楹東向東西廡之盡折而南東西隅廊房各九楹北向與太學門並後堂之北為敬一亭亭五楹奉聖祖仁皇帝御碑五通碑後附置明碑前有門曰敬一之門旁啟小門各一東為東廂祭酒于此治事前為大門中㕔三楹祭酒孫岳頒題額曰進徳修業東西房各一楹後軒五楹俱南向軒前廂房各二楹東曰崇實軒西曰振雅軒俱祭酒李周望重建周望作記勒壁大門外西向屋五楹為書吏辦事所左折而南有門通儲材門亭西為西廂司業于此治事大門中㕔及㕔左右房如東廂之制㕔前東西各廂房二楹㕔後軒五楹南向無廂房大門外東向屋五楹亦書吏辦事所右折而南有門通廣居門署西為射圃隙地平敞周垣繞之亭三楹南向八旗諸生以時較射於此署東毗連屋宇二百餘楹書吏隸役廟户居之統屬于監謹案監署左右前後冇號舎環之延袤共五百餘楹久為民居乾隆三十四年工部議侍郎兼管監務臣徳保所奏監東屋宇二百一楹出入必由署門不通衢路請以居本監吏隸廟户其監西屋宇三百八楹向本有門逕通衢路者築垣隔出署外付内務府經理並繪圖造冊一存工部一存國子監其餘閒曠屋宇俱相度情形準此辦理詔從之御書樓在廨舎東北南向五楹東西廂樓各五楹恭貯欽頒經史書籍前為二門門西小屋數椽前為大門欽賜學舎在成賢街南方家衚衕一百四十餘楹亦稱南學雍正九年恩賞門南向額曰欽賜學舎門西耳房一楹東六楹北為率性堂堂三楹南向中壁勒乾隆五年御製訓飭士子文東西序各三楹耳房各一楹號舎東五楹西四楹皆東西向堂南有門在大門稍東不相直門東西耳房各一楹其南即大門堂北曰東宅祭酒公所也堂三楹堂東西房各二楹俱南向東西序各三楹耳房各一楹堂後軒五楹東西房各二楹亦南向東序三楹西序四楹堂前有垂花門通率性堂祭酒公所西曰西宅與東宅毗連而不相通司業公所也堂三楹堂後軒三楹並南向前有垂花門出門折而西有複道直貫學舎之南北率性廣業二堂祭酒司業公所在道東誠心正誼崇志堂並在道西祭酒司業公所之北為廣業堂門一楹在複道東西向堂三楹堂東西房各四楹俱南向東號舎七楹西五楹入大門折而西為修道堂之門轉而北堂三楹南向東西序各三楹堂南號舎六楹庭有古井庭西北隅有門北向門外即複道西南隅有門西向門内北向號舎七楹東向號舎三楹修道堂號舎之北有垂花門入門為誠心堂堂三楹南向東西序各三楹耳房各一楹東序之南别啟一門東向以屬于複道正誼堂在誠心堂北自複道入門一楹東向堂五楹南向東序二楹西序四楹堂後號舎東西各七楹正誼堂北為崇志堂亦自複道入門一楹東向堂三楹南向堂東號舎六楹西九楹堂後號舎五楹其西耳房二楹凡各堂正屋助教學正學録居之東西序及號舎肄業諸生居之直北隙地一區東西廣二十餘丈南北長三丈許又北為後總門門側房一楹門者處之周繚以垣門與公廨周垣相對鑲黄旗官學在安定門内崇教坊大門南向門旁屋一楹入門西折而北為儀門門左右屋各三楹又北堂五楹南向堂之前東西序各三楹耳房各二楹堂之後正軒九楹正黄旗官學在西直門内鳴玉坊大門三楹南向門左右各屋二楹北為儀門門左右各屋三楹又北堂五楹堂後有門門内後堂五楹後堂之前東西序各三楹耳房各一楹後堂之北有講室左右各五楹屬於兩序正白旗官學在思誠坊大門北向門東屋三楹西四楹南為堂堂五楹堂東西講室各一楹又南後堂五楹後堂之北東廂三楹後堂南左右耳房共五楹又講室三楹在後堂之西墻外正紅旗官學在阜城門内日忠坊大門南向門旁屋九楹北為儀門門左右屋各三楹又北堂三楹東西廂各三楹東廂之北南向屋二楹西廂之北東向屋四楹堂北講室八楹又北為複道道左屋再重各三楹道右屋三楹鑲白旗官學在明時坊大門三楹南向右屋七楹北堂五楹堂北室三重各五楹又北屋八楹鑲紅旗官學在宣武門内阜財坊大門南向門左右屋共十三楹北為儀門又北堂五楹東西序各三楹北屋二楹堂西屋三楹堂東屋再重南向二楹北向一楹又南為講室三楹西牆外羣舎十三楹正藍旗官學在黄華坊大門南向門西屋八楹北為儀門門外左右廂各一楹又北堂五楹東西序各三楹堂之旁各有講室三楹東西相向堂後樓五楹左右各翼以樓並二楹皆南向鑲藍旗官學在甘石橋大門西向學堂南向入大門南折至儀門門左右屋共七楹其北堂三楹西廂三楹東向堂之左屋再重各三楹其南有西向屋三楹又南有北向屋二楹堂北講室九楹圖說附元國子學在先聖廟西地遜於廟者十之二中為國子監東西六館自堂徂門環列鱗比通教養之區為百六十有七程鉅夫雪樓集國學中之堂為監前以公聚後以燕處旁有東西夾夾之東西各一堂以居博士東堂之東西堂之西有室東室之東西室之西有庫庫之前為六館東西向以居弟子員一館七室助教居中以涖之館南而東而西為兩塾以屬於門屋四周通百間元吴澄文正公集謹案元太祖平燕京從王檝之請設國子學于金樞密院故署至元二十四年乃遷今地迄武宗至大元年監署始成其堂宇制度略具於此至順三年富珠哩先生兼國子祭酒國子監有隙地在居賢坊大徳中有司議以建學餘力築屋以舎師儒不果明年五月筮日籌工除地坊北畫為四區區各立屋五間中三間為居室旁兩間為肅官具饗之所宅之門以東西門之衖以南北衖北距通衢立大門衖南羨壤可藝蔬東浚井西置屋以居𨽻者使掌大門之管元陳旅安雅堂集謹案是時兼祭酒者富珠哩翀也監學櫝藏經書宜得重屋以庋乃于監學之北搆架書閣閣四阿檐三重度以工師之引其崇四常有一尺南北之深六尋有竒東西之廣倍差其深延祐四年夏經始六年冬績成元吴澄文正公集仁宗延祐二年用趙孟頫元明善議定陞齋等第六齋東西相向下兩齋左曰游藝右曰依仁凡誦書講說屬對者𨽻焉中兩齋左曰據徳右曰志道講說四書課肄詩律者𨽻焉上兩齋左曰時習右曰日新講說易書詩春秋科習明經義程文者𨽻焉元史選舉志明國子監在城東北正堂七間曰彞倫堂元之崇文閣也中一間車駕幸學設座於此上懸勅諭五通東一間祭酒公座面南司業面西堂前為露臺臺南中為甬路前至太學門長四十三丈車駕臨幸由之東西為墀諸生列班于此後堂三間東講堂三間西講堂三間藥房三間折而東為繩愆㕔三間鼓房一間率性堂誠心堂崇志堂各十一間西為博士㕔三間鐘房一間修道堂正誼堂廣業堂率如率性堂六堂乃諸生肄業之所東折而南為廊房九間門一間西亦如之太學門三間外東井亭一又東為持敬門以入廟自東少北為儲才門以通啟聖祠土地祠及典簿典籍掌饌㕔倉庫之路祭酒東廂亦由此入西井亭一又西為退省號門自西少北為廣居門以為司業入廂諸生入號之路墀内雜植槐柏共二十株前為集賢門三間門前為通衢東西牌坊各一題曰國子監衢牌坊各一題曰成賢街彞倫堂後齋明所九間格致誠正號毎號計三十七間嘉靖七年即其地改作敬一亭前為大門題曰敬一之門祭酒廂房在敬一亭東司業廂房在敬一亭西㑹饌堂一所在監東北典籍㕔五間在饌堂門左典簿㕔三間掌饌㕔三間退省號及廣居門之西為天地人智仁勇文行忠信規矩準繩紀綱法度凡一十八號并退省房三連湢厠各一所春明夢餘録欽定國子監志卷二十六

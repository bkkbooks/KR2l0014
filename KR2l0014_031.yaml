  text: 欽定四庫全書欽定國子監志卷三十一
  hash: sha256:c839091a882e691c6a999f9a1b104d8f52842f8561ecf95e54aa7e1cfa219df7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_031-1a, image: WYG0600/WYG0600-0317a.png}
body:
  text: 官師四銓除國子監兼管監事滿漢大臣雍正三年始命康親王果郡王兼領監事嗣後以大學士尚書侍郎內閣學士等官兼管皆特簡無定員兼管國子監蒙古事乾隆三十年命侍郎悟勒穆濟兼管三十七年以郎中法福里兼管蒙古司業事亦特簡無定員滿祭酒由滿洲蒙古科甲出身之詹事府庶子司經局洗馬翰林院侍讀侍講國子監司業帶領引見補授應行升轉內閣學士詹事府詹事太常寺卿光祿寺卿太僕寺卿等官謹案本監各官補授升轉俱遵現行品級考開載其隨時更定條例及格外遷擢不拘成格者並按年分識於後順治十七年定國子監滿祭酒缺出於應升各官內遴選通曉清文及人品學問可為師範者推用滿司業亦準此例乾隆十一年奉諭旨滿祭酒出缺仍照向例由科甲出身人員開列請旨簡用十九年吏部議準從前翻譯進士初次引見時因奉有歸進士班銓用之諭旨是以遇有翰詹缺出遂將翻譯出身之人一體升用今翻譯鄉會試既經議停而翻譯進士與文進士舉人究屬有間其升轉翰詹祭酒司業等官之處請一并停止三十四年吏部奏準滿漢祭酒均有司鐸成均造就人材之任應一體遵旨帶領引見補授以歸畫一漢祭酒由詹事府庶子司經局洗馬翰林院侍讀侍講詹事府中允國子監司業詹事府贊善引見補授應行升轉內閣學士詹事府詹事少詹事等官乾隆五年祭酒謝道承升任內閣學士大學士兼管監事趙國麟奏稱謝道承在祭酒任內訓導有方國學諸生因其升任具呈懇留上以內閣學士職非繁劇仍令兼祭酒任不開缺乾隆十一年漢祭酒崔紀出缺諭祭酒為成均司鐸之長有造就人材之責著吏部將應行開列及其次應升人員一併引見嗣後漢祭酒出缺吏部俱遵諭行滿司業由滿洲蒙古科甲出身之翰林院編修檢討欽天監監正宗人府副理官各部院員外郎內閣侍讀詹事府中允九卿檢選四五人引見補授應行升轉通政司左通政大理寺少卿詹事府少詹事內閣侍讀學士翰林院侍讀學士侍講學士國子監祭酒詹事府庶子等官乾隆三十三年司業博卿額升授詹事府左庶子奉旨仍兼司業不必開缺是年博卿額又升翰林院侍講學士吏部奏請應否開缺奉旨不必開缺蒙古司業由吏部傳集各部院蒙古郎中員外郎會同理藩院遴選能翻譯蒙古文義通曉清文蒙古字語者四五人引見補授升轉與滿司業同漢司業由翰林院修撰編修檢討論資開列二十人引見補授應行升轉翰林院侍讀侍講司經局洗馬等官雍正九年漢司業缺出祭酒鄂爾竒孫嘉淦奏請現任編修胡宗緒學有本原人尤端謹堪以勝任奉旨依擬用乾隆十四年命大學士九卿督撫保舉經學陸續保薦共四十人十六年經大學士等核定陳祖范吳鼎梁錫璵顧棟髙四人奉旨吳鼎梁錫璵俱以國子監司業用吳鼎即行補授梁錫璵亦著一體食俸辦事其陳祖范顧棟髙年老不能來京奉旨加司業銜十七年恭遇皇太后六旬萬夀恩科現任學正王延年年逾七十禮部帶領引見奉旨授為額外司業十八年奉旨國子監助教曹洛禋年逾大耋精力康強分教成均蔚為耆宿著加恩授為國子監司業額外行走滿監丞由滿洲蒙古文舉人挨科分名次擬定正陪引見補授應行升轉太常寺寺丞宗人府經歷各部院堂司主事都察院都事經歷大理寺寺丞詹事府贊善光祿寺署正等官又有各省理事同知通判撫民同知通判京畿四路捕盜同知八旗遊牧員外郎户部三庫司庫太常寺漢所牧盛京刑部蒙古主事奉天州縣等官並由本衙門遴選咨送帶領引見録用雍正七年定國子監屬員舉人出身者準會試監丞以下滿漢各官並同乾隆七年定七品以下小京官中式進士歸班選用者仍留原任接俸推升停其以知縣候選監丞以下滿漢各官並同又定滿洲蒙古文進士翻譯進士及文舉人等於未用之先定期考試引見除奉旨外用外其餘以小京官十三缺用本監監丞博士典簿與焉八年吏部議準滿洲蒙古科目人員已就知縣等官自揣不宜外任者準其於臨選之時呈明不論雙單月遇有國子監監丞等十三缺先儘補用其有已經銓選而不宜外任人尚謹慎者該督撫具本聲明送部引見欽定即以監丞等十三缺不論雙單月通較奉旨日期與現在文舉人等輪流間用漢監丞由守部進士舉人銓選引見補授應行升轉六部主事都察院都事等官謹案會典則例各部主事員缺於應升應選人員輪班升選其應升班次將漢小京官與在外知縣各升一次又都察院都事入干主事班內其吏禮兩部則專用進士出身之員雍正元年定國子監監丞博士助教等官停止捐納専用正途出身之教授學正教諭升授其不係正途之候選候補者改補本監典簿及鴻臚寺主簿又定宗人府主事員缺由進士出身之小京官遴選引見補授本監監丞博士助教與焉十二年吏部議準祭酒覺羅吳拜疏稱直省教授學正教諭等官升任監丞典簿者俱衰邁不堪供職請於守部進士舉人及學習期滿舉人內㨂選引見補授乾隆三十四年吏部奏準監丞等項缺出㨂選時赴挑者率多年力衰庸不堪應選請嗣後監丞典簿缺出除應補人員先儘補用外餘即以守部之進士舉人不論雙單月一併歸入月選遇有缺出每月掣簽之期將擬選知縣之科甲班內先掣京缺再掣外缺若遇知縣月選缺少科甲不能到班即將名次在前頂選之進士舉人選用其銓選班次舉人較進士為多酌擬進士一人舉人二人與捐納之員輪流間用仍隨月官考試驗看如果人實衰邁不堪外任即於擬備之進士舉人內挑取補缺一體帶領引見恭候簡用滿博士由滿洲蒙古文舉人按科分名次擬定正陪引見補授其升轉與滿監丞同乾隆三十四年兼管監事侍郎德保奏滿漢博士助教除京察應留應去嚴加釐定外臣等隨時驗看滿漢博士助教等官如有文理生疏年力精壯尚能辦事者即照例咨行吏部對品補用經部議準滿博士助教以詹事府主簿光祿寺署丞典簿三項改補其非科甲出身者専以光祿寺典簿用漢博士助教以鑾儀衛經歷中書科中書詹事府主簿光祿寺典簿京府經歷等項改補得旨允行漢博士由京府教授四氏學教授鹽運司教授外府衛教授升任其升轉與漢監丞同滿助教由舉人貢生除授又由宗人府各部院衙門筆帖式升任並歸本監考選咨送其升轉與滿監丞博士同順治元年國子監設滿助教二員教習清書後經設立官學令二廳六堂分教十五年議準撤回另設八旗官學滿助教十七年翰林學士折庫納奏準官學助教宜選滿漢文義兼通德行純正者以為教官康熙二十三年命國子監助教諸員吏部於銓補時試取文義優通者用之雍正四年部臣議準國子監八旗漢文助教員缺請案科分咨取舉人副榜十人及由舉人副榜出身之俸深筆帖式每旗五人翻譯助教員缺于翻譯俸深之筆帖式內每旗咨送十人考試繕寫録取依次補用不限旗分是年十月世宗憲皇帝以助教専司訓課如僅試繕寫則淺學習書皆可入選命各部院將滿洲筆帖式老成敦行者保舉引見其翻譯仍如例考試五年命翻譯舉人考補八旗助教八年司業朱蘭泰奏準八旗助教遇出差離任升遷事故需次無人委員兼理别旗未免曠本旗之職請嗣後於考選助教時多取十數人令其協同學習行走庶接補簡便訓課不致間斷乾隆二年部臣議準盛京禮部助教六年期滿該堂官出具考語送部注册仍在原任行走俟國子監助教缺出先將考取人員補一缺次將盛京禮部助教調取一員補授十三年準內翻書房咨稱國子監助教明德兼翻書房行走本監咨覆助教一官有督率一學之責若兼兩處行走必不能専於官學嗣後本監助教不便令兼各處行走四十二年兼管監事尚書蔡新奏準向例八旗官學滿助教滿教習缺出俱由本監奏請欽派大臣考試今滿教習已議準由禮部于奏請考取人員內補用嗣後滿助教缺出應由吏部奏請考試以歸畫一蒙古助教與滿助教一體考選其升轉皆同漢助教由本監學正學録㨂選擬定正陪引見補授其升轉與漢監丞博士同康熙二十三年吏部議奏助教各官職掌教導應選優於文字者補用奉旨著吏部考取將試卷送內閣閲看具奏二十六年定助教學正學録等官吏部將考取人員咨補四缺後以正途出身之現任官推升一缺雍正五年部議助教等缺由各省教授正諭論俸推升者到任羈遲每致懸缺今各省生員經學政奉命薦舉于助教等官相宜應以助教學正學録補用八年祭酒孫嘉淦疏請甄别助教年力衰邁者以原品休致學問平常年力尚壯者以應得之缺另補並令九卿於進士舉人內擇其文行兼優者各舉所知保送吏部引見補授其外省教官升授助教之例永行停止乾隆二年兼管監事楊名時保舉進士莊亨陽舉人潘永季蔡德峻秦蕙田吳拔拔貢生官獻瑶監生夏宗瀾等七人皆留心經學可備録用奉旨著該部調取引見以為該監屬員聽楊名時等分委辦事又尚書徐元夢奏保拔貢生王文震潛心經學於禮記講習尤精請給與助教職銜遇缺題補兼令在三禮館纂修上行走四年兼管監事趙國麟奏保進士鍾晼舉人孫用果副榜現任教諭王之鋭學問人品可為師範請委以訓士之責奉旨允行六年山西平陽府知府暨絳州隰州直𨽻州知州各員缺奉旨命九卿保舉屬員本監將率性堂助教王文震保送咨部帶領引見奉旨發往山西以知州題補十三年部臣議準向例助教學正學録員缺令九卿于進士舉人內保舉每一缺保舉者不下十數人請將此次保送之舉人十四人引見補授一缺外其餘各員視其人材可用者量豫記名交部遇缺挨補十七年祭酒臣觀保陸宗楷奏準臣監助教秩從七品學正學録秩正八品請嗣後助教缺出如無應補應用人員並由學正學録選擇正陪引見請旨升授三十一年奉特旨國子監助教陳孝泳在內廷行走有年著加恩以户部主事用算學助教由欽天監博士及算學教習考選補用應升欽天監五官正俄羅斯學助教一滿一漢不常設由本監于滿漢助教內㨂派二人兼理學正學録俱漢缺由考取進士舉人及會試落卷中録取記名引見補授應行升轉本監助教鑾儀衛經歷部寺司務太常寺典簿等官雍正十三年學正何名世推升兵部司務引見奉旨何名世人年老不宜兵部司務著留原任乾隆十九年御史陳大化奏準學正學録一項請欽簡大臣考試取用停止九卿保舉之例二十六年御史范棫士奏準學正學録請與內閣中書一例從會試取中餘卷選取得缺補用三十一年兼管監事陸宗楷奏學正學録員缺需次乏人部議仍派大臣考試奉旨允行三十四年奉旨派總裁等官於會試落卷中量取幾名引見以中書學正學録分别記名又兼管監事德保奏準學正學録向有推升别衙門經歷典簿司務之例如其中有文學優裕訓課有方者應奏明請旨留於本監遇有助教缺出照例題補滿典簿由滿洲蒙古進士舉人按科分名次擬定正陪引見補授其升轉與滿監丞博士助教同漢典簿由守部進士舉人銓選引見補授應行升轉鑾儀衛經歷詹事府主簿等官典籍漢缺由翰林院孔目州學正縣教諭直𨽻州州判升授應行升轉部寺司務鑾儀衛經歷等官筆帖式由滿洲蒙古漢軍舉人恩拔嵗副貢生考取者秩七品應行升轉各部院堂司主事都察院都事大理寺寺丞太常寺博士內閣撰文辦事中書外縣知縣等官由生員監生考取者秩八品應行升轉各部院堂司主事都察院都事大理寺寺丞太常寺博士內閣撰文辦事中書通判等官由官學義學生間散及親軍護軍領催庫使驍騎校考取者秩九品應行升轉內閣撰文辦事中書州同州判縣丞等官國謹案祭酒以下等官恭遇由繕書修書處行走家慶典或由經學保舉或特旨奉賞職銜者除在監額外辦事之員載入外餘恩恩賞俱詳題名表職銜銓除附元世祖至元十三年博果密為諸生上疏請於大都宏闡國學選德業充備足為師表者充司業博士助教元史列傳至元二十三年程巨夫為翰林集賢學士首陳興建國學乞遣使江南搜訪俊逸帝納之同上至元二十四年置國子祭酒司業皆以德尊望重者為之時許衡以集賢院大學士兼國子祭酒元史百官志成宗大德七年詔以師儒之官難同常調國子學宜選年髙德劭能文辭者須求資格相應之人不得預保布衣之士若果才能素著合不次超擢者别行具聞學典學正學録司樂典籍管勾舊制舉積分生員充之後以積分既革於上齋舉年三十以上學行堪範後學者為正録通曉音律學業優贍者為司樂幹局通敏者為典籍管勾元史選舉志明明初國子祭酒司業擇有學行者任之後皆由翰林院遷轉明史百官志洪武初司教之官必選耆宿宋訥吳顒等俱由儒士為祭酒明史選舉志洪武三年命擇文儒性行端潔者充學官從典簿周循理之請也明太祖實録十六年諭國學為育才之地公卿子弟咸在特命威望重臣兼領其事時曹國公李文忠兼領國子監洪熙元年諭吏部引選國子監官率循資格不聞舉一有道德老成之士自今宜慎重其選辟雍紀事宣德四年詔自今國子監博士助教考滿稱職即擢用從助教王仙之請也明宣宗實録宣德五年吏部言舊例國子監官九載考滿復職增俸博士汪奉許子謨已經三考應復職帝諭之曰國子監官有例復職固是優待儒者但官九載俱升職學官獨不升乎乃以奉子謨為翰林院檢討仍理博士事學典正統元年令禮部尚書及祭酒司業公同考察監官如無學行者送部别用續文獻通考景泰三年令祭酒保舉教官文學優長才行超卓者擢用辟雍紀事成化五年定國子監屬官曽經考滿果才堪政事者量升長史知州同知以示激勸同上嘉靖二年定考選御史國子監官一體考選不必拘定進士出身兩朝典故又命禮部各省鄉試主考舉京官進士出身者二人次年鄉試命博士王庭典試山西同上十年禁進士外選者求改監職同上又命國子監官屬吏部簡别賢否開奏同上十六年吏部覆奏司業童承敘陳請博士助教等官學識醇正訓迪勤懇者先年率多假以翰林職銜仍管教事比來遷轉不一自今各官給由到部果係才堪政務者即與序遷才堪風憲者行取考選才堪别用者開升部屬及府佐等官若有志甘恬淡學稱師模者仍令再歷九年滿日照例加以清階責其成效從之學典二十三年令學臣於見任教官有學行者量升兩京國子監學正等官從給事陳棐之請也同上崇禎六年令國子監博士并外特薦教官一體考選分别等第補翰林員缺次補科道以及部寺又次者補同知通判從吏部尚書李長庚之請也同上欽定國子監志卷三十一

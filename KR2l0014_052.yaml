body:
  text: 藝文國家尊聖典學禮制隆盛超邁前古臣等編緝監志首冠綸言揆符先聖化美作人至於在監緒臣仰承德意獻納論思考正典禮之宜講求教飬之法章疏具在用備參稽以及緒臣歌詠太平雍容揄揚之什覽之可想見於樂辟雍之盛圜橋觀聽之儀别擇成編謹緝奏議三卷論著四卷詩賦五卷為藝文藝文一奏議一論教學事宜疏順治元年李若琳近奉聖旨滿洲官員子弟咸就成均肄業仰見朝廷作人盛典臣竊咨詢滿洲教規最為嚴密諸生晨興入監日暮返舍而國學僻在城東北隅諸子弟往返近者數里逺者二三十里晷短途遙工夫耗於奔走諸生勞苦固不敢自惜但有就學之名無進業之實在諸生亦相聚向臣頗稱不便謹議得滿洲八旗各覔空房一所立為書院將國學二廳六堂教官分教八旗子弟各旗仍設學長四人俱就各旗書院居住朝夕誨迪臣等不時親詣各書院稽察勤惰每月逄六日各師長率衆子弟同進衙門臣等當堂考課或作文或講書或背書或習字一一分别較試各師徒工夫疏密與藝業進退以定諸生勸懲之規即以存各師陟降之案庶學教不為虛文而人才於是植立矣請正先師神牌諡號疏順治二年李若琳臣聞之記曰凡始立學必釋奠於先聖先師自漢以來代以孔子為先師蓋以孔子刪述六經垂憲萬世人倫之所以常明道統之所以不墜孔子之力也是以後世帝王莫不尊崇諡號嚴重祀典聖朝承帝王正統垂意文教重道崇儒中外悅服春秋二仲丁祭率由舊典視昔加毖於本月二十日太常寺奉禮部傳諭新製孔子牌位兼書清漢字臣竊有請焉夫孔子牌位奉安文廟孔子在天之靈所慿依者臣愚以為宜令禮工二部委官匠於本監製造新牌俟新牌告竣令臣等恭安文廟然後撤舊牌焚之瘞所庶典制聿隆禮儀有序於以妥先師之靈愜奉祀之忱為攸當矣臣愚又有説者今文廟現奉牌位稱至聖先師孔子之位此明嘉靖九年大學士張璁建議所改置者也質之前代追尊諡號竊有未當查自漢以來諡號不一至唐元宗始追諡為文宣王宋真宗加諡至聖文宣王元成宗復加諡大成至聖文宣王明朝自洪武至正德所稱先師諡號一如元成宗舊制未之有改臣聞備古今之至德者宜享古今之隆稱昔孔子之贊乾坤曰大哉乾元至哉坤元曰大成曰至聖洵非孔子之德配乾坤者莫能當之今稱至聖而遺大成得毋乾坤之義未備乎至曰文曰宣按之諡法經緯天地曰文聖善周聞曰宣又洵非孔子之德兼君師者莫能當之今止稱先師而遺諡號然則古之英君明辟可止曰某君某王而去聖神文武之諡可乎張璁欲去封爵而并除諡號非確論也臣愚以為當今更新之會宜追復舊諡仍稱大成至聖文宣先師孔子之位庶至德鴻名昭代倍為闡揚祀典於焉有光矣臣忝列儒臣職司教典事關學宫直攄所見其有當與否未敢必也伏乞敕下禮工二部速議施行請儲養太學人材疏順治二年楊檟臣惟士子霧隱之初作養教育在內則全在司成在外則全藉提學今聖主御極首重人材自一品至七品官員子弟皆收入成均甚盛典也惟是士習日趨浮薄宜導之以敦厚伏望聖明飭行各衙門力挽古俗嚴斥澆風讀佛老隱僻之書者罰穿紅紫靡麗之服者罰糾衆結黨把持官府者罰呼朋引類武斷鄉曲者罰敦孝弟忠信之風抑怪誕輕佻之習已成材者試以經濟謀猷未成材者誨以小學六藝中有出類拔萃文理通逹者則拔其尤咨送禮部復加考校果係真材實學即準擢用如是而青襟不喁喁向風文教不彬彬振起者未之有也論教學未便事宜疏順治二年薛所藴臣伏見皇上開國之初首崇文教允前祭酒臣李若琳請清漢子弟肄業成均甚盛舉也臣所藴以庸陋下品前任司業碌碌因人猶可覆短今蒙聖恩拔為祭酒受命欽承負乘滋懼因念聖朝新政事事從實況教飬人材何等關係而敢以虛文塞責乎竊見滿洲學生皆沈毅聰俊之質志趨向上但國學僻處城東北隅八旗子弟逺者十五六里近亦十數里奔馳道路辰巳之間始得到監申刻回家就食一日之中工課只有午未二刻耳從來讀書早乘清明之氣晚親燈火之光日中人倦非其時也況加之往米勞頓精神昏惰是有讀書之名而無其實豈不負朝廷棫朴作人之盛意哉臣再四思維比照盛京例分旗就學既慮不便約束無已惟晝夜在監誦讀朝夕提誨庶有實益臣所藴已移住公署矣而諸子弟號舍供給未有定議又似不能即令棲止學宫也伏乞敕下內院會同禮臣酌議或令工部少修學舍至於飲饌之需敕戶部酌量資給日就月將得人之效可拭目俟之而臣等瘝曠之罪亦庶幾或免矣酌定伴讀監生疏順治二年薛所藴竊見滿洲子弟濟濟嚮學將來股肱心膂於是焉出臣等與六館屬官督課於上至於耳提靣命必得學行諸生為之分教前監臣於順天府丞咨送府學生員中收録徐可行等五十名一向在監伴讀但諸生多係貧寒平日以舌耕為業今倉庾未充勿敢請給廪餼而各生輪流授書不免推諉曠業今臣等於各旗下子弟分别粗知文義者令文義優長者教之初習講解者令通曉講解者教之誦讀寫倣者令書傳習熟字畫端楷者教之初學句讀未嫻漢語者令齒牙便利聲音宏亮者教之每旗約得四五人又有滿洲子弟志切上進力學攻苦者十餘人拔置兩廂日夕訓迪亦每廂以二三學問該博監生相為師友以資切磋苐各生既無資給難以責成合無開以功名之路俾鼓舞相成臣監造花名册二本一送內院一送禮部存照怠惰廢教即行黜革若勤敏端良生徒進益或一年之外三年之內咨送吏部考授州縣正佐教諭訓導等官庶諸生樂於趨事禆益人材非淺鮮矣薦賢疏順治二年薛所藴竊惟國學為教胄之司傳經育才領袖儒林職甚重也茍非其人鮮克勝任厯代開國之初肇啓辟雍必慎選碩儒或厚德堪樹儀型或博學可備問難良以成均義重師資道尊前人於斯凛凛慎之逺不具論元用許衡吳澄輩為祭酒一代文教嫓美古昔有由然也皇上創業之初即選清漢子弟弦誦澤宫作人之化度越往代而以臣謭陋濫竽司成心竊愧之訪得保定府容城縣舉人孫竒逢以庚子賢書隱居教授四十餘年學深稽古志切希賢淡泊寧靜絶意仕進逺邇之人聞風矜式伏求特下弓旌徴聘出山以長成均師道立而善人多其庶幾乎至於六館分教亦須老成淹雅之士又察山西襄陵縣舉人李推河南濟源縣舉人吳舉皓首窮經舌耕自給布袍蔬食泊如也一為臣舊治一為臣同里知之最悉均應敕部録用以充六堂之選敷教東序流訓上庠人文丕變必有蒸蒸蔚起者矣江南新定經述之士不乏鴻碩然而近取目前臣竊敢附於舉知之義伏祈聖鑒施行請作養在監生員疏順治二年薛所藴竊惟新朝啓運文教肇興如清漢官子弟嚮學事宜臣皆有疏請旨遵行矣惟有前監臣李若琳當滿洲子弟初入成均之日因分教乏人移文順天府考取府學生員以充伴讀該府咨送生員文士英等一百零四名除八旗分用伴讀四十名外尚餘六十四名前監臣念太學空虛留監肄業誠事理之宜然者但此項諸生未經奏聞該學既已除名辟雍尚無定議非庠非監將來何以為出身地乎况各生數月以來在監誦習儘有德造之彥而秋闈伊邇應試之額寥寥未充合無即與各學臣考送諸生一體督課目前備棘闈之試將來儲思皇之選於作養人材之意未必無小補也除造清册二本一送內院一送禮部備照外伏祈聖鑒施行請定監規疏順治三年薛所藴伏蒙皇上允前祭酒臣李若琳請官員子弟許入監讀書又準禮臣覆議直省學臣各學選取生員一二名以充貢監並送成均肄業此一代文治肇興之始萬年鼎運宏開之基也數月以來嚮學諸生亦既濟濟而監規未頒教習年限及出身條例未定臣愚隕越滋懼竊恐無以為多士勸也考太學之規厯代隆重元朝尤為詳密明初踵而行之得人為盛在監生徒多者至一萬四五千少亦不下數千其間教有條學有法選用有格故人材輩出而積薪無嘆非偶然耳臣謹凖往酌今定為四條一積分積分之法元許衡行之最為得力明亦倣其意而用之今供給未備士之貧無資斧者更多似難概責之各生也中有資分敏逹願考積分者除常課外每月一試一年以十二次一等為及格免其撥厯徑送內院廷試與恩貢一體考職選授或於本經之外别兼一經通曉大義準作三分五經兼貫雖文不及格準作八分精熟通鑑全部準作五分每試考首一次準作二分一監期考舊例舉官恩生坐監六個月滿歲貢八個月舊附十箇月新附二十四箇月今舉人無坐監者且罷援納之例則無所謂新舊附之别但各學臣送考者謂之貢監生品官子弟謂之官監生二者而已貢監多拔自優等且在原學食餼距貢期逼近今既乏廪餼又杳無出身之期不幾以優之者困之歟謹議貢監原係廪生者立限十四月增附十六月至官員子弟資給少裕兼多青年志學立限二十四月務期學問精進然後撥各衙門厯練政務其有願留應試者聽一厯事學者博通書史猶必練習時務然後服官分政可見施行舊例監生監滿撥厯即新進士分撥各衙門觀政之意也昔人教法寓指深逺但沿習既久虛文塞責厯事歲月雖多大抵徒挂空名今須著實舉行讀書期滿仍照舊規分派各衙門厯事以一年為期但務使實實練習通曉政體然後送內院廷試與恩歲貢一體考職選授一補曠諸生家鄉逺近不同貧富互異或肄業成均資斧不繼則回籍湊取或各官子弟送親赴任以及寒暑疾病不得不量準給假然非預定補曠之規則優遊逸豫竟作實歷何以課進修之功效乎今議凡告假日期俱作曠候補過限不到計日倍罰有不請假而徑自曠學者即行黜革庶人知䇿勵而進取日益以上四條伏候聖裁以便遵行請復貢生坐監之例疏順治十年孫柏齡臣惟國學之設原以陶育人才風示四方取前代廣厲學官之意首善自京師始故每歲各省貢士無論恩拔副榜皆入成均此定例也逮我朝開闢之初一時地方需才故不待教育許其即赴廷試授以州縣佐二等官原係一時權宜之計非云經久不變者也今行之既久每歲廷試多人吏部不能即選率多壅滯之嘆且貢生既不入國學國學益寥寥無人不及外省州縣之半甚非所以尊京師風示四方也又士之初離草茅者無論賢愚皆得捷取功名僥幸既多冒濫益甚臣愚以為自今歲以後各省貢監皆當仍遵舊例赴國子監讀書並敕令國子監諸臣嚴加考核汰其不肖待其學業習成咨部廷試所遲不過歲餘一以疏銓曹積薪之弊一以杜人心幸進之端其於風化非小補矣請增滿洲肄業疏順治十七年孫廷銓臣聞古語曰十年樹木百年樹人言儲材當豫也今滿洲子弟俊秀者正不乏人科甲既停學問益寡殊為可惜稽之漢代期門羽林之士皆誦孝經誠以經學為人才之本教化之源也目今從龍之彥固自多人深恐後學不繼致令有乏材之嘆今查國學內每佐領下止有一人肄業似屬太少今酌量每佐領下再各添一人更選老成敦大通治體明經術之臣以為之師務俾曉暢大義以備國家之用數年以後將見人才濟濟而文武之選皆得其人矣請嚴國學官學疏康熙六年王熙竊惟朝廷興學右文既以鄉會試收羅天下之人才國子監教養各途之英俊而於八旗官學諸生復選滿漢分旗教習其於儲才育士之道可謂詳且備矣近者欽奉恩詔一時滿漢官廕監生入國學者倍多於前又見部覆議定各旗滿洲漢軍與漢人一體復行鄉試會試業奉諭旨則八旗官廕監生應照漢軍廕監生之例從國子監應試其八旗官學生亦應照漢人考取應試矣臣愚以為使之應試者朝廷鼓舞人才之盛心而求其有以仰副國家作人大典者師儒教導之實事也查漢監生入監必分堂撥班先以月課繼以季考教法可謂詳備其八旗官廕監生習滿書者原有滿官稽考教訓其習漢書者似應一體分派漢博士助教等官設立課程定期稽查必使各習一經兼習史鑑詳為講解俾令貫通務期成材以收實用至於八旗官學諸生定例每佐領各有二人而考取録用之時少有學問優長者則漢教習監生誤之也查教習一項向於恩拔歲副各監生中考取教習近年恩拔歲副乏人而旁及於納銀準例經御史傅感丁條奏部議以恩拔歲副無人仍由納銀準例此等當教習入監之時既不由於考取及充教習之日自難責其優通伊身學業尚當在質疑問難之時為人師範豈能有成德逹材之益不遇虛縻歲月覬補一官無怪乎徒存官學之名而生徒無勤學之實也竊念納銀準例既不堪用恩拔歲副人數又少何若於舉人中願就教習者與恩拔歲副相兼考充教習此皆屢經考試之人較之納銀準例自不相同且舉人一項今既準其考授教授等官矣未有為漢生員師則有餘為官學生師則不足者也至於考取教習之法則應查照順治十五年以前之例禮部會同該監嚴加考選毋止委之該監視為具文其八旗官學習滿書諸生原有滿洲助教等官分旗教習滿官司業分翼稽查習漢書者亦應分派漢人助教等官不時親到官學稽查教習之勤惰稱否以及諸生之學業課程庶諸生教習各有責成而在國學者既善其法在官學者復得其人將見文治聿興英才蔚起於朝廷儲才育士之盛典或少有禆也請正從祀諸賢位號疏康熙二十二年王士禎竊惟文廟之祀從以四配十哲兩廡諸賢凡以紹述心傳功在萬世也臣詳閲會典諸書竊見從祀諸賢諸儒名號位次尚有未當有宜一併釐正者敬為我皇上陳之十哲之位不稱名而稱子是已但自明嘉靖間議去封爵之後四科之內稱冉子者凡三殊難辨識兩廡諸賢諸儒則直書其名而不稱子視十子何遽懸殊臣愚以為宜將神位俱稱先賢先儒某子之位而以諱注其旁以昭尊崇之意者也至宋代周敦頥程皓程頥邵雍張載朱熹六子闡明絶學逺紹洙泗之傳實超前代諸儒明崇禎間遂將六子改稱先賢臣等竊以躬及聖門者概稱先賢私淑者概稱先儒此以時代論非以造詣論也今既改稱先賢未敢輕議但位諸漢唐諸儒之上於世次殊有未安又諸賢諸儒位次會典闕里志諸書所載與今太學神位互有不同並宜詳議妥確通行天下學宫著之本朝會典以垂永久者也伏乞睿鑒敕下禮部議覆施行請增從祀理學真儒疏康熙二十二年王士禎竊惟至聖之道萬古為昭兩漢以來諸儒凡發明經傳踐履純正者皆得從祀兩廡俎豆千秋典至隆也臣查現在從事先儒外厯代諸儒有功聖門尚有當酌議增祀者敬為我皇上陳之漢儒功在經傳如詩書春秋三禮授經諸儒皆已從祀而易獨無之按田何當漢初授易實為聖門商瞿嫡系此漢儒之當補祀者也鄭康成博稽六藝所注詩禮諸經百餘萬言史稱純儒唐宋以來皆列從祀明嘉靖間始以張孚敬之議改祀於鄉公論久鬱此漢儒之當復祀者也程門弟子首推尹燉先儒稱其學窮根本德備中和考其出處本末毫無可議朱子之後推何基為正傳其學以立志為先居敬為要於大學中庸太極通書西銘皆有發揮此宋儒之當從祀者也至於明代理學實肇於霍州曹端其學以誠敬為主力闢邪説薛瑄稱其質純氣粹理明心定為有明理學之冠禮部尚書章懋由博返約斂華就實其學粹然一出於正難進易退天下仰之國子監祭酒蔡清學以六經為正宗以四書為嫡傳所著蒙引尤見窮理之功禮部侍即吕柟篤志聖賢之道其講學之要曰文以載道行必顧言左春坊贊善羅洪先以躬行之實學闡良知之真傳安貧樂道有簞瓢陋巷之風刑部侍即吕坤以理學為經濟有體有用所著諸書皆鑿鑿可見施行以上六人操履篤實咸有著書發明聖道此明儒之當從祀者也又絳州貢生辛全生值明末力以正學為己任著書甚富以代稍近未敢輕議合無敕下該地方官徴其遺書備乙夜觀覽或亦可仰禆聖學之萬一也伏乞睿鑒敕下禮部議覆施行請修經史刻版疏康熙二十二年王士禎竊惟列聖道法之傳莫備於經厯代治亂之迹莫詳於史古帝王內聖外王之學不外經史而畢具矣我皇上聰明天縱宵旰不遑猶日御講筵研精經史又以刋刻經書講義頒賜諸臣典學之勤二帝三王蔑以尚矣查明代南北兩雍皆有十三經注疏二十一史刻板今南監版存否完缺久不可知惟國學所藏原版庋置御書樓此版一修於前朝萬厯二十三年再修於崇禎十二年自本朝定鼎迄今四十餘載漫漶殘缺殆不可讀所宜及時修補庶幾事省功倍伏乞敕下部議查其急宜修補者早為鳩工俾刓缺悉為完書亦仰禆聖朝文教之一端也至南監經史舊版併請敕下江南督撫查明如未經散軼即行該省學臣收貯儒學尊經閣中儲為副本於以嘉惠來學未必無補也監生回籍議康熙二十五年韓菼太學之設三代共之王制羣后之子卿大夫元士之嫡子國之俊選諸侯之貢士皆造焉漢時東京太學之盛至圜橋門而觀聼者以萬計外國侍子亦來就學宋時亦有三舍之法以教育多士我皇上稽古右文崇儒重道今正當逺人嚮化聞風慕義之時京師首善之地國學所以培養人材今歲貢例監俊秀而外間舉選拔盛典皆聖朝菁莪棫朴作人之盛德至意若因冒籍之弊而盡驅南北之人各歸其鄉必至太學一空即令其在監考試於鄉試之年各回原籍現在者必不肯安心肄業在籍者必至裹足不前又八旗教習皆拔其尤者方得與選此皆寒苦之士以館糊口仍兾就試京闈今若驅令回籍不惟曠其教習之職亦苦跋涉無資伏查定例京闈鄉試原分南北皿字號嚴禁其不相冒則可矣今以南人之冒北皿而驅之則北皿廢乎留乎留則太學皆北人廢則北人何罪而驅之出太學乎臣以為欲禁冒籍如生員則自廪生教官縣官上至提調官而止令其嚴加體訪違者照例處分學臣亦無預焉如監生則責之祭酒司業然今之監生多有不入太學肄業者請自今捐納監生在吏禮兩部考試入場者悉令其歸監考試詳取本籍地方官印結則頂冒之弊亦可以少息矣至若主考之罪當罪之以不公不明不應罪之以取中冒籍聖明洞鑒不俟瀆陳欲清不公不明之弊仰祈我皇上臨時簡用或令九卿選擇不論已未差遣務求得人如所舉失當衆論喧譁舉者豈無聞見即應參奏自效如被科道糾參得實一併擬罪而公明彰著者量豫旌擢庶考官鼓舞畏懼而弊又可少息矣從古來有治人無治法今日科場之弊乃人弊非法弊也御史條陳弊端固其職掌然疏中欲排羣議斥之為鄉人壟斷臣南人也不敢避嫌附和謹據實另議監生回籍再議康熙二十五年韓菼王制諸侯貢士皆入太學即鎬京辟雍所謂東西南北者是也無思不服先儒以為來觀者皆悅服豈有諸侯所貢而其人不來之理漢永平中臨雍之盛圜橋門觀聽者蓋億萬人司馬光通鑑朱熹綱目皆書之以為實録為盛事並非誇張至唐時士子有關節之弊宋時太學有橫議之風故明順天科場亦屢經情弊發覺從無有議及驅回本省就試者豈見不到此蓋勢不可行今臺臣言監生場前有串通鄉人之弊場後有無賴煽惑之弊然此等多不過什伯中之一二餘何與焉是即所謂孤寒者也我皇上至公至明方令議官員子弟另編字號是聖心憐憫孤寒特為開其進身之路諸臣方會議遵行而忽欲盡逐之使奔走失業近省已屬難堪閩粵湖南雲貴之人豈不更加失所且另編字號復試何人是適與聖意相左也夫以一二不肖之徒而輒致數千百人之驅除以暫行兩科之説而輕改四十餘年之制度似非國體亦拂人情惟有恪遵聖諭分别官皿號令兩不妨礙人情既平譁囂自息弊竇亦清至公至便可以永行相應將臺臣鄭惟孜所奏仍無庸議請告平厄魯特之捷於太學疏康熙三十五年孫嶽頒竊惟自古帝王恭行天討殷宗克鬼方周宣伐玁狁未有親統大軍出險陟逺不數十日大功告成廓清沙漠乂安邉境如我皇上之神武首出敻逺百王者也皇上自御極以來削平三逆掃蕩臺灣南朔東西並奉正朔乃有厄魯特噶爾丹者狡謀出沒擾亂邉陲逆天虐民罪在不赦皇上念逆冦一日不靖邉民一日不安睿謀獨斷衆論不撓且軍儲皆出天庾轉餉數十萬石以安四海生靈之命綿國家無疆之休天人叶應自興師以迄大捷僅七十日從此永無烽火之警是從來未有之大仁也師出之日水凍草枯及御蹕經臨掘地則泉湧牧馬則草肥蓋天時地脈已早決於宸算之中且分布諸軍調度規畫並出皇上之指授噶爾丹棄而宵遁自謂可以兔脫不知神䇿預定於前諸軍會合環擊擒斬殆盡餘黨就降俘獲無算是從來未有之大智也地最險逺皇上親舉玉趾日進一餐率數十萬衆踰天山渡瀚海如履平地而走康莊莫不忠義激發驍騰百倍是從來未有之大勇也凡屬臣民舉翹首皇上回鑾告成功以彰顯烈臣一介腐儒荷蒙聖恩簡擢不獲效力塞外伏查禮記王制曰天子出征執有罪反釋奠於學以訊馘告即魯頌泮水之詩亦曰矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚是三代時皆告捷於學也皇上建千古未有之功則漢唐未舉行之盛事請自皇上始之即不必有事於訊馘而專行釋奠昭告文廟爰勒石太學原本六經非由臆説不妨與祭告闕里並行則文治與武功永昭垂於千秋矣欽定國子監志卷五十三

body:
  text: 生徒二考課肄業各生國子監貢監生分六堂肄業每月中旬兼管監事大臣祭酒司業輪課是曰大課課以四書文一篇五言八韻詩一首經文經解䇿論並間試之委員司巡場監試供給收卷諸務大昕齊集薄暮交卷優通者列一等奬賞有差其次為二等惟第一名有賞又次為三等俱無賞最劣者為附三等是月不入監期積算亦不與膏火三考附三等者斥退其等第甲乙繩愆㕔出榜曉示𫝊諭諸生發試卷於堂上𫝊閲兼管監事大臣祭酒司業面加訓示閲畢貯於博士㕔每月上旬助教分課既望學正學録分課是曰堂課發題如大課及期內班諸生晨集面試即日交卷評定甲乙移博士㕔呈兼管監事大臣祭酒司業曠者記通外班諸生則于望日面領課題三日內交卷三月不應大課不應堂課者除名又內班諸生各立冊記所習之業旬日一送本堂官稽核朔望博士㕔查驗每日赴值日官公所畫到月休假三日違者記過凡遇講期內外班諸生齊集聽講並覆講謹案貢監生考校之法謹遵現行則例開載其歷年增設規條時有更定附載于後順治元年定國子監條規朔望日祭酒司業率屬員諸生拜謁聖廟行釋菜禮後升堂講書祭酒司業及六堂講四書性理通鑑博士講五經諸生聽講後習讀講章有未能通曉者即請本堂助教等官講解㦯質問祭酒司業毋得憚煩蓄疑其上書覆背諸課一旬而遍月三行之又課楷書六百字以上必端楷有體有不到或倩代及潦草者皆罰諸生到監日本堂官嚴核年貌籍貫經書必具連名保結以杜冒名倩代之弊犯者照例斥責其肄業之期祭酒三月一季考司業每月一月課不得托故規避滿洲䝉古漢軍䕃監生十嵗以上者到監讀書滿十八嵗考試咨部例監生坐監以二十四月為滿漢人恤䕃生難䕃生考滿䕃生以六閲月為滿恩詔廕生官生以二十四月為滿恩貢生恩拔貢生以六閲月為滿嵗貢生以八閲月為滿選拔貢生由廪膳者以十四月由增附者以十六月為滿副榜准貢生以三閲月為滿例監生由廪膳者以十四月由增附者以十六月為滿俊秀監生以二十四月為滿諸生有毁辱師長及生事告訐者即為干犯名義有傷風化並依律治罪一應事務先禀本堂官俟本堂官率之禀祭酒司業毋得徑行煩紊違者决責例監生以文到日為始即赴監肄業其有丁憂親老患病者由本籍官申報如無故不到監者照例處治丁憂先呈本堂轉呈堂上官批准回籍守制如在籍丁憂者有司隨申文以憑稽考如不申文報明於起復日始具文書到監者壓罰八旗各途監生請假俟本旗都統印文到時查核酌量給假漢監生入監後遇有省親成婚隨任依親告病及聞同居伯叔兄長喪而無子者許告假歸里仍立限給以假票違限遲曠國子監行文督責復班日計日倍罰其有嗜酒放縱不守監規及挾制師長者問發充吏有挾妓賭博出入各衙門起滅詞訟說事過錢包納錢糧者視罪輕重按律究治二年以銓選需人命趣各省貢生赴部免其坐監定以每年四月十五日廷試分别等第定銜授職嗣經禮部具奏各省咨送恩拔嵗貢生甚多若拘四月定期守候為艱請將先到者即行考試得㫖于三月十五日舉行吏禮二部同翰林院官赴內院閲卷又祭酒薛所蘊疏稱入監生徒多有曠業偷安借端請假者請嚴行申飭詔從之又禮部議准薛所藴疏奏漢監生于坐監期滿分撥部院衙門歷事一年期滿准送廷試又議准漢監生除常課外每月一試經書義策論各一道經書義必達義理策論必通古今合程式者拔置一等通計一年內考一等十二次者為及格免其撥歷即送廷試超選又議准副榜准作貢生由廪生中式者照恩貢生以六閲月為滿由增附生中式者照嵗貢例以八閲月為滿三年禮部議准監生肄業㦯資斧不繼回籍取資或各官子弟送親隨任及寒暑疾病量給假期仍俱作曠學俟補四年禮部議准現在肄業貢監生由禮部㑹同內院嚴加考試除選取存監外其餘發還原學肄業及行學黜名有差八年恩詔國子監積分監生已經考定者即與選授撥出歷事者免歷一月其餘監生俱免坐監一月恩詔之謹案嗣是凡遇因停止積分止免坐監焉年並依此例後又禮部議准廷試貢生由禮部㑹同內院吏部於考試日赴天安門外橋南行禮考試畢㑹同閲卷定甲乙送吏部出榜十四年禮部議准于每月十五日祭酒司業大課先二日繩愆㕔彌封編號届期繩愆㕔發東文場卷博士㕔發西文場卷繳卷後𣲖四㕔六堂官坐堂上用藍筆分閲俟祭酒司業裁定祭酒司業用墨筆覆閲課後三日諸生領卷詳閲閲畢繳進存貯十五年祭酒固爾嘉渾奏准監生考到之日拔其尤者許以積分積分之法以一年為限除常課外每月一試考列一等與一分二等與半分以下無分有熟精經史及字跡善摹鍾王者雖文不及格亦准與一分前後積滿八分為及格約一嵗不過十餘人俱咨送吏部厯滿考職許與貢生一體廷試其不與積分之列者照例期滿咨部厯事㦯一年後積分不滿數願咨部者仍照常出咨不准優選再願肄業滿分者聽十七年禮部議准監生未經准假遽自私歸者黜革是年罷行漢貢監生積分法康熙元年罷漢監生撥厯法十年禮部議准滿洲監生并漢軍兼識清漢文監生坐監年滿者定期於二月八月咨部三月九月考試照考定名次銓補其漢軍止識漢字監生與漢人一體於四月十五日考試二十四年禮部議准諸生有素行不端賤流濫厠武斷鄉曲怠惰廢學者令國子監參革處治又議准監生犯事經督撫咨報國子監者如係廕生及恩拔嵗副貢生仍行題參如係例監生國子監徑行黜革發本省督撫究問又議准諸生自季考月課外每月朔望𫝊題二次一六日親繳委六堂官收卷轉呈祭酒司業查閲定其髙下二十六年禮部議准嵗貢生聽學臣考准挨次咨補訓導捐納嵗貢亦聽學臣考選補授不必來京廷試三十一年禮部議准國子監季考月課雖有成例恐日久廢弛嗣後祭酒司業務躬為督課分别奬勵每月朔望令滿漢監生齊集講書如視為具文不實心奉行者從重議處三十九年禮部議准監生考課不缺者准其應試若臨期始到不准入場又議准監生或有借國學之名遇試期則鑽營滋弊者令祭酒司業助教等官檢舉究治雍正八年禮部議准各省恩拔嵗副貢生每旬以二五八日三六九日為期分為兩班按期赴監考課不得托故不到十一年祭酒邵基奏准凡嵗終必奏明肄業各生名數除肄業已滿當咨部選用及桃選佐二考補教習外其肄業未滿之生擇才質可造者留監肄業餘並咨回本籍乾隆二年尚書兼管監事孫嘉淦奏稱祭酒等應倣宋儒胡瑗經義治事兩齊之法嚴課諸生三年期滿即所學分别等第以示勸懲果有經義治事精通練達人品卓越學識醇正者許祭酒等秉公保薦經王大臣等議如所請得㫖允行又孫嘉淦奏准坐監期滿之貢生鄒儒暴煜莊權品學兼優頗有可觀請留監肄業如果經明事治再行請㫖引見又孫嘉淦奏定國子監規條一愼收録凡貢監生考到後繩愆㕔率領考驗務擇文優年壯人品可觀者方準肄業若年力衰邁文理荒踈者不得收録亦不准其覆考至考驗貢監作文時如有夾帶𫝊遞不在公所面試諸弊察出除名嚴罰考曰仍𣲖監屬官一員稽查一稽去來凡諸生復班告假皆應具呈繩愆㕔按月呈堂上官查驗則給散月費既無冒濫而肄業日期亦易於稽察嗣後諸生復班如不呈明繩愆㕔籍記呈堂上官者不給月銀至不行告假私自回籍者將來不許復班一定課程凡諸生除課文外以明經為要內班肄業者每人就所治之經各給御纂欽定經書一部按日研習注明課單有心得或疑難處條為劄記三日一呈本堂官批晰朔望呈總理大臣祭酒司業分别優劣其隨時質問者聽至治事法俟一年後舉行應將治事所需書籍先為儲購各堂官得預為討論諸生所領經書遇告假事故回籍者仍繳本堂外班肄業除季考月課外各就所治之經劄記所得朔望繳本堂官批晰次期朔望呈堂上官核驗一核勤惰凡內班諸生以恪守規條日在號舍讀書勤于劄記問難拜廟講課必集者為勤以屢次告假怠于劄記雷同勦襲茍且塞責及無故不拜廟應課者為惰月終本堂官核實移繩愆㕔籍記一嚴考課凡諸生逢季考月課其實有疾病者先期呈明本堂官移繩愆㕔籍記仍與本月銀若無故缺課則不與銀至本堂官月課內班必本日交卷外班必三日交卷逾期即不復收定案後移博士㕔張榜無故不應課者並移㕔呈明堂上官不與次月月銀一定勸懲凡諸生恪守禮節及考課屢居前列劄記經義果有發明者本堂官於月終核明功課籍記移繩愆㕔繩愆㕔三月一呈堂上官堂上官親署其籍記功以為將來覆實保題之地其不守規條屢行記過三月不悛者繩愆㕔據實呈堂令其回籍不許肄業至有酗酒喧爭造言生事抵忤師長諸大過者不論平日有無功過本堂官立即移繩愆㕔呈堂究治四年大學士兼管監事趙國麟奏定南學條規一肄業諸生出入宜嚴也請立檔冊每日輪委助教等官一人稽查諸生出入書明事由方許出學月終移送監丞呈總理大臣祭酒司業查核其有不遵約束恣行出入屢至曠功者勒令出學本堂官容隱者紀一大過一教課宜以實行為先也肄業諸生有剽獵浮華不修實行者本堂官即行紏舉勒令出學容隱者記一大過一諸生告假宜嚴也諸生向因肄業之期可以前後積算間有托故告假者請嗣後除丁憂事故許得積算餘以細故告假必肄業已滿一年者始得積算不及一年者不復計未假前肄業月日一收録宜加詳慎也向例諸生考到後復加考驗貢生取列一二等監生取列一等者方許肄業請嗣後考驗合例者國子監堂上官詳加閲視必品貌端謹年力壯盛者始許入監其年少佻達年老衰邁者槩不收録一考課宜有定則也向例祭酒季考司業月課皆試四書五經時藝而已今行經義治事之法請嗣後季考月課出四書題一道五經講義題各一道治事策問一條以覘諸生實學六堂每月分課亦如之一考試等第宜分别優劣也向來考試諸生文理優通者列為一等平通者二等粗通者三等疵謬者亦列三等之末請嗣後分别三等外疵謬者别列為附三等兩考附三等者咨回本籍開缺别補經部議俱如所請惟諸生告假一條部議嗣後告假諸生應量其事故度其程途酌豫定限有逾限復班者令本生呈明本籍有司官具文送監查核惟無故違限者不得積算若如限到監不論肄業久暫仍許前後通算又收録肄業一條部議選擇諸生要以文行定衡不以年貌取斷若將年老年少槩行擯斤殊非樂育人材之意又考試等第一條部議考試一事文字有一日短長尚非行誼不檢者比嗣後如有屢考附三等者請開缺别補或偶考劣等愧悔振拔後復考優等者猶當曲為成就未可輕棄詔從之又趙國麟奏准本年肄業期滿者止二十餘人若就其中品學稍可觀者奏請引見殊非慎重之意請將保薦引見之例暫停嗣後如有實係才品學識卓越醇茂者仍請核實保薦五年禮部議准諸生在監肄業一年以上者令監臣嵗終甄别揀選其材可造就者准留監餘即咨回本籍有願留京應試者聽又大學士兼管監事趙國麟議准各省選拔貢生及選舉優生不無冒濫應令直省嚴加考試務拔真材八年祭酒鄂容安等奏准將期滿貢生施萬玉留監肄業如乾隆二年奏定例九年禮部奏准直省拔貢生無論考試居一二三等均歸國子監肄業請嗣後凡拔貢到部由部驗到即劄監㑹同考試文義優長者准為拔貢入監肄業荒謬者褫革疵纍者發回原籍肄業本省學臣分别議處十一年侍郎兼管監事德沛等奏准將期滿監生蔣炳留監肄業如乾隆二年例又德沛奏准各省拔貢應照現行之例與各途貢監生一體考到考驗録取方准入監肄業十六年大學士九卿議准直省拔貢生由學政㑹同督撫府尹掄選給咨赴部四川廣東廣西雲南貴州甘肅以八閲月為限江西福建浙江湖北湖南陜西以六閲月為限直𨽻奉天河南山東山西江南以四閲月為限並于本省掄選之年十月起限有事不能赴者許呈明申部以便補考其到部者分三次考試皆禮部奏請欽命大臣於午門內試之試卷分三等進呈取列一二等者九卿簡選引見候㫖分别録用試居三等及引見未用者並劄監肄業荒謬者斥革疵纍者發回原學學臣及㑹驗之督撫府尹分别議處又侍郎總理監事觀保奏准將期滿監生章紹七留監肄業如乾隆二年例十七年江蘇學政雷鋐奏稱祭酒等官於肄業生無保薦之人則平日董勸無實可知應加議處部議謂如是恐開濫保塞責之漸請令監臣於三年期滿時將無可保薦之實自行奏明著為例二十二年禮部議准鄉㑹試及學政嵗科兩試拔貢生廷試並試五言長律詩一首國子監季考月課亦如之二十三年禮部議准優生到部驗到即㑹同國子監試以書藝一詩一分别等第進呈其文理明通者照例劄監肄業若荒疏者發回原學并將該學政議處又侍郎兼管監事觀保奏准各省優生到京有守候日久艱於旅食者請照考試續到拔貢不拘人數之例一體辦理或遇有拔貢續到亦可一同考試三十一年禮部議准祭酒良誠奏稱近年嵗貢肄業者多屬精神衰邁文理荒謬將來出司學校豈能振作人才嗣後各該州縣須看其精力未衰方准申送如濫行給文該州縣照例處分三十三年尚書兼管監事陸宗楷等奏准肄業期滿諸生果有經明事治堪膺保薦者即隨時奏聞如無可保薦之人而拘定原議屢將無所薦原委陳奏未免瑣瀆請罷行其例八旗官學生國子監八旗官學八旗子弟選取入學由助教量才分撥每日到學先於考勤簿畫到授書背書講書覆講習字㸃書習射日有課程三八課期習清文者課翻譯習漢文者課文藝批閲畢該館教習面加訓示一切功課俱教習令學生隨日填冊彚交助教按季呈堂上官助教月一㑹課漢館試文藝䝉童背書滿洲䝉古館試翻譯又通演步騎二射一次考其學業隨時甄别凡春秋季考助教先期𫝊知學生八學分兩班試東四學漢文翻譯之日兼試西四學步騎二射試西四學漢文翻譯之日亦如之其試漢文翻譯者晨集彛倫堂月臺上各助教率領唱名給卷歸號堂上官委員司巡場監試供給諸事習漢文者試以四書文一篇五言長律六韻詩一首習翻譯者試以論一篇翻譯一道皆薄暮交卷毋許給燭滿洲䝉古堂上官閲翻譯漢堂上官閲漢文評定等第優者量豫奬賞劣者面加訓示試步騎二射者晨集射圃俟漢文翻譯唱名畢堂上官親臨考試各助教率領唱名以次考試步射再試騎射堂上官評定優劣賞罰有差凡季考毋許托故不到實病者助教先期呈明病痊補試每日官學生俱於辰刻到學申刻散學如有請假先赴教習禀明再禀助教病一月者停止錢糧三月者開缺别補其在學十年不能造就者咨回本旗聽撥差使凡教習期滿之日率領本館學生赴監呈繳功課堂上官親加考試定書考語焉謹按官學生考校之法謹遵現行則例開載其歷年增設規條附載于後順治元年祭酒李若琳奏准祭酒等不時親詣八旗官學稽察勤惰月之六日師生至監考課以示勸懲二年祭酒薛所蘊奏准凡八旗官學設伴讀十人以京省生員充補十日一赴監考課春秋則五日一習射即於學肄之俾文武兼資以儲實用十一年禮部議准每佐領下留官學生一人由部㑹同國子監詳加察驗學業無成者咨回本旗仍於本佐領下選擇補缺嗣後每三年一察驗著為例十二年定監生考取八旗教習罷取生員為伴讀十七年禮部議准掌翰林院折庫納奏稱官學生宜選滿漢文藝優長德行純正者教之凡滿洲䝉古漢軍學生俱兼讀清漢書令國子監按季考試禮部年終考課務在分别勸懲以勵實學康熙元年定八旗官學生月一赴監講書試翻譯五日一習射雍正二年禮部議准令國子監滿漢祭酒司業轉飭助教教習等官每日親臨官學習清文者教以書寫本摺字畫習漢文者講論聖賢經𫝊習翻譯者熟翻古文淵鑑大學衍義諸書祭酒司業仍不時巡察勸勤警惰每月令赴監考試以分别優劣明示懲勸俾有實效毋存虛名五年王大臣等議准漢教習每員各分定學生若干人専心訓課以重責成國子監堂官不時稽察分别勤惰示以勸懲三年期滿咨部照例銓用十年禮部議准八旗漢軍記名舊家子弟各就本旗官學肄業請令助教教習課讀清漢書再於兩翼滿洲內選騎射教習各一人間日赴學教馬步射及國語乾隆三年尚書兼管監事孫嘉淦奏准八旗官學事宜云一學生課業宜専官學中滿助教課翻譯漢教習課四書每日辰集酉散在學者四時而已例以二時習清文二時習漢文又有弓箭算法相間教授學無専業成就斯艱嗣後八旗子弟入學者三年內令専誦經書三年後國子監堂上官考驗擇材質聰頴有志力學者歸漢文班令専心課誦年長願學翻譯者歸滿文班令専心翻譯官學中一切公事仍統于助教而漢文之勤惰専責之教習俾之各督課程一人材造就宜大舊例學清文者只考筆帖式學漢文者只考文武生員而已嗣後歸漢文班之官學生亦使講求經史擴其學識三年則録其可以應考者奏請欽𣲖大臣考試優者拔作監生與漢貢監一體肄業講求明經治事之學尤異者得同保薦六年尚書兼管監事劉吳龍奏准官學生歸漢文班者邇來頗知奮勉但諸生年幼度其資力止能于四書外専治一經史冊浩繁驟難責其研究請于明年八九月間試以經文一篇論一道文理順者酌量拔作監生八年禮部議准八旗官學漢教習各給印冊二本令教習將三年所教官學生若干人其學業功課詳細書明期滿時一冊送新教習照例填注一冊呈國子監察核三十一年禮部議准祭酒良誠奏稱官學每旗學生百數習翻譯清書者頗多以助教二員教之恐不能遍請每學添設滿教習一員協同滿助教専教翻譯清書以官學生之勤惰定助教教習之賢否漢教習名下既已撥出翻譯學生則每人所教不過十餘人自應裁減一缺嗣後學生有文理不通經書不熟者責成漢教習翻譯清書平常責成滿助教及滿教習又禮部議准凡選取官學生統以十八嵗以下為率在學年限統以十年為率如在學已滿十年而習漢文者不能進學習翻譯及清文者不能考取中書筆帖式庫使及無志向學難以造就者槩令咨回本旗現在在學諸生責令國子監查明實滿十年而未考進者即令咨回本旗考課附元至元二十四年立國子學而定其制博士通掌學事分教三齊生員講授經㫖是正音訓上嚴教導之術下考肄習之業助教同掌學事而専守一齊正録申明規短督習課業凡讀書必先孝經小學論語孟子大學中庸次及詩書禮記周禮春秋易博士助教親授句讀音訓正録伴讀以次𫝊習之講說則依所讀之序正録伴讀亦以次𫝊習之次日抽籖令諸生復說其功課對屬詩章經解史評則博士出題生員具稿先呈助教俟博士既完始録附課簿以憑考校元史選舉志至元十三年博果密為諸生上疏云教必本于人倫明于物理請于大都宏闡國學選德業充偹足為師表者充司業博士助教為之講解經𫝊授以修身齊家治國平天下之道其下復立數科如小學科則令通讀經書教以應對進退事長之節律科則令通曉吏治書科則令曉習字畫算科則令嫻熟算數或一藝通然後改授或一日之間更次為之俾國子學官常加勘㸃務要俱通仍以義理為主有餘力者聽令學作文字日月嵗時隨其利鈍各責所就功課程其勤惰而賞罰之勤者升之上舍惰者降之下舍暇日則令學射無故不令出學數年以後學業有成者乃聽學官保舉未成者仍學習其中不可教者三年聽令出學帝覽之喜元史布呼密𫝊至大四年復立國子學試貢法試䝉古生則法從寬色目生稍加密漢人生則全用科場之制同上皇慶元年平章李孟領國子監帝諭之曰學校人才所出卿宜數詣國學課試諸生勉其德業續文獻通考延祐元年以齊履謙為司業乃酌舊制議定升齊積分之法每季考其學行以次第升既升上齊踰再嵗始與私試辭理俱優者一分辭平理優者為半分嵗終積至八分者為髙等禮部集賢院嵗選六人以貢帝從之續通鑑集賢學士趙孟俯禮部尚書元明善等議定國子學貢試之法一曰升齊等第六齊東西相向下兩齊左曰遊藝右曰依仁凡誦書講說小學屬對者𨽻焉中兩齊左曰據德右曰志道講說四書課肄詩律者𨽻焉上兩齊左曰時習右曰日新講說易書詩春秋習經義程文者𨽻焉每季考其所習經書課藝及不違規矩者以次遞升二曰私試規短漢人驗日新時習兩齊䝉古色目驗志道據德兩齊本學舉實歷坐齊二周嵗以上未嘗犯過者許令充試限實歷坐齊三周嵗以上許充貢舉漢人私試孟月試經疑一道仲月試經義一道季月試䇿問表章詔誥科一道䝉古色目人孟仲月各試明經一道季月試策問一道辭理俱優者為上等准一分理優辭平者為中等准半分每嵗終統計其年積分至八分以上者升充髙等生員以四十名為額䝉古色目各十名漢人二十名嵗終試貢員不必偹惟取實材有分同闕少者以坐齊月日先後多少為定其未及等并雖及等無闕未補者其年積分並不為用下年再行積算每月初二日早旦圓揖後本學博士助教升公座面引應試諸生各給印紙依式出題考試不許懷挾代筆各用印紙真楷書寫本學正録彌封謄録餘並依科舉式助教博士以次考定次日監官覆考于名簿內籍記各得分數本學收掌以俟嵗終通考三曰黜罰科條應私試積分生員其有不事課業及一切違戾規矩者初犯罰一分再犯罰二分三犯除名從學正録糾舉正録知見而不糾舉者從本監議罰之應已補髙等生員其有違戾規矩者初犯殿試一年再犯除名從學正録糾舉正録知見而不糾舉者亦從本監議罰應在學生員嵗終實歷坐齊不滿半嵗者並行除名除月假外其餘告假並不准算學正録嵗終通行考校應在學生員除䝉古色目别議外其餘漢人生員三年不能通一經及不肯勤學者勒令出學元史選舉志泰定三年更積分而為貢舉並依世祖舊制其貢試之法從監學所擬大概與前法略同而防間少加嚴密焉同上至正六年詔國子監積分生員三年一次依科舉例㑹試續文獻通考明入國學者通謂之監生其教之之法嚴立規條每旦祭酒司業坐堂上屬官自監丞以下以次序立諸生揖畢質問經史拱立聽命惟朔望給假餘日升堂㑹講復講背書輪課以為常所習自四子本經外兼及劉向說苑及律令書數御製大誥每月試經書各一道詔誥表策論判內科二道每日習書二百餘字以二王智永歐虞禇薛顔栁諸帖為法明史選舉志洪武初設祭酒等官掌教設六堂曰率性修道誠心正義崇志廣業六堂諸生積分之法司業二員分為左右各提調三堂凡通四書未通經者居正義崇志廣業一年半以上文理條暢者升修道誠心又一年半經史兼通文理俱優者乃升率性升至率性乃積分其法孟月試本經義一道仲月試論一道詔誥表內科一道季月試經史策一道判語二條每試文理俱優者與一分理優文劣者與半分紕繆者無分嵗內積八分者為及格與出身不及者仍坐堂肄業如有才學超異者奏請上裁同上十五年命禮部頒學規于國子監云一生員在學讀書務期明體適用以須仕進各宜遵承師訓循規蹈矩凡出入起居升堂㑹饌毋得有犯學規違者懲治一背講日期初一假初二初三㑹講初四背書初五初六復講初七背書初八㑹講初九初十背書十一復講十二十三背書十四㑹講十五假十六十七背書十八復講十九二十背書二十一㑹講二十二二十三背書二十四復講二十五㑹講二十六背書二十七二十八復講二十九背書三十日㑹講又續定學規云一學校之所禮義為先各堂生員每日誦受書史並在師前立聽解講有疑而問者跪聽毋得傲慢不恭有乖禮法一在學生員當以孝弟忠信禮義亷恥為先隆師親友飬成忠厚之心為他日之用敢有毁辱師長生事告訐者即係干犯名義有傷風化犯此者杖一百發雲南地面充軍一開設太學教育諸生所以講學性理務在明體適用今後諸生止許在本堂講明肄業専於為已日就月將毋得到别堂往來相引議論他人長短因而交結為非違者從繩愆㕔糾察嚴加治罪一在學生員如有無行之士不専心學問恃頑生事者奏聞法司枷鐐禁錮終身在學役使以供生徒十六年續定學規云一六堂各置勘合簿上半橫列生員姓名下界畫十方每坐堂一日印一紅圈如有事故用墨圈記每名坐堂七百圈之上方許升率性堂一各堂置講誦簿每日各生于已名之下書所誦所習所講功課以慿稽考一生員請假須呈明祭酒批限六堂官不許擅准離堂又三十年續定學規云一三日一次背書每次讀大誥本經四書各一百字熟記文詞通曉義理㦯有疑難則謙恭質問務求明晰若疑問未通闕疑勿辨一每月課本經義二道四書義二道詔誥表判策二道不足者限補作一每日習倣書一幅幅十六行行十六字必端楷合書法就六堂官呈改以圈改字少者為最一諸生講解疑難即當請問毋得蓄疑不問一諸生凡有事故先於六堂官處禀明令齊長率領告於祭酒不許徑行煩紊一每班給出恭入敬二牌直日司之凡諸生出入必以牌不得遺忘或藏匿一生員有疾無室家者許于飬病房調治有室家者還家調治不得托疾游佚一生員在各衙門辦事者暮必回監不得畫酉及㸃閘不到一升堂背書務照班序立抽簽背誦不許攙越一內外號房俱編定號數不許私下那借一凡于各衙門辦事畢即回本監號房不許在外生事以上諸條違者務責不恕一凡選人除授及官差辦事有畏避不赴堂聽選者奏聞區處一生員省親挈家已有定例有不行遵守輒自奏啓者治罪一生員丁憂成婚許于本監告知具呈禮部假托依律加罪一生員有事先于本監告知具呈禮部定奪奏聞區處本監不准方許越禮部呈告毋得隔越一生員違犯學規決畢即送繩愆㕔記過纍犯不悛者奏聞區處明太祖實録謹案以上皆洪武年所定之制訖明之世遵行之故具列于篇宣德十年北京國子監簡選監生汰去二百三十六人辟雍紀事正統初禮部奏天下嵗貢生員例從行在翰林院考試中式者送南北國子監讀書初試不中者仍發原籍住廪肄業以便復試再不中發充吏役提調官教官如例責狀犯在赦前者免責狀從之學典謹案明史選舉志太祖因諫官關賢奏設為定例府州縣學嵗貢生員翰林考試經書義各一道判語一條辟雍紀事載洪武十六年定生員考試嵗貢不中式罰例明太祖實録又載洪武二十四年更定生員考嵗貢不中式例已廪食五年者為吏不及五年者遣還讀書次年試復不中式雖未及五年亦為吏冇司官任及五年者停其俸任止二年一年者量減有差教官無分久近悉停俸正統初所行蓋本此而損益也正統五年禮部尚書胡濙等疏奏洪武永樂間天下府州縣學試貢生員不分道里逺近俱以本年正月至部聽候考試近年各府州縣提調官罔守成規不依限促其赴京聽考以致各生遷延過期間有不當應貢生徒畏懼學校考試混行應貢請飭府州縣轉行各屬提調官及教官今後起送應貢生員自正統七年為始先將本生姓名年甲食糧月日預申禮部知㑹俱限正月內到部聽考有故違舊制者究問如律從之明英宗實録成化二年今兩京監生聽禮部都察院堂上官公同祭酒考選老疾庸猥者給冠帶原籍閒住辟雍紀事成化三年詔令監生願就教職者必嚴試三場始準其納馬納粟其未經科舉者不得濫收同上成化十一年以監生丁憂月日既為虛曠服滿復班每坐堂三日加一日謂之加丁以杜告擾著為例同上成化十四年尚寶司卿李木上陳監生舉人坐監之苦禮部覆奏請移文國子監以舉人年淺者放回許提學等官時常考校如遇所司迎詔拜表須令巾服如儀平日嚴禁其逰說干謁如復班愆期兩月雖有病帖亦罪之并停其次科㑹試從之監生仍依舊制不聼依親明憲宗實録萬厯二年給事中劉鉉奏監生常課外冝講讀律令下所司議行同上崇禎二年從司業倪嘉善言復行積分法明史選舉志崇禎八年從祭酒倪元璐言貢選不限撥期以積分嵗滿為率援納則依原定撥厯為率而厯事不分正雜以考定等第為厯期多寡諸司教之政事滿日校其勤惰開報吏部不率者回監讀書同上欽定國子監志卷三十六

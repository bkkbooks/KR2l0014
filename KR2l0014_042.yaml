  text: 欽定四庫全書欽定國子監志卷四十三
  hash: sha256:a247a58c9c8c9be4bff44f58257de9031e16b10f07f8f969282920ecd3ebe5fa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_042-1a, image: WYG0600/WYG0600-0462a.png}
body:
  text: 經費二嵗支國子監春秋丁祭品物有由太常寺隨時購買於寺庫存帑支銷者有由太常寺行文各衙門取用者均前期一月行文於祀事前二日送太常寺月朔釋菜望日行禮香燭品物均由國子監前期數日行文太常寺取用國子監支領錢糧有於每月十一日支領者曰各官公費曰教習算學生月銀有每嵗三次支領者曰教習月米有兩季支領者曰漢官俸祿有四季支領者曰皂役口糧並由典簿廳具稿呈堂行文户部陕西司應領之銀給於銀庫米給於各倉國子監支領官物有曰教習衣服由繩愆廳具稿呈堂行文工部製造庫給發曰紙由典簿廳具稿呈堂行文戶部顔料庫給發曰冰行文工部都水司給發曰炭行文工部屯田司給發其紙嵗領綿榜紙三百七十給堂案房四十繩愆廳八十典簿廳一百檔子房七十八旗八十剛連紙五百五十全給檔子房冰每年自五月初一日至七月三十日止遇閏自五月十六日至七月十五日止日領窖冰七方堂上一四廳一六堂四檔子房一炭每年自十一月初一日至正月三十日止月領烤炭四百九十斤約計日用十六斤堂上四斤四廳四斤六堂六斤檔子房二斤支用恩賞銀有月一支領者曰諸生膏火衣服銀以內外班為差曰堂期公膳曰考課供給曰諸生前列奬賞以名次前後為差有季一支領者曰講課膳食有隨時支領者曰諸生事故賙恤以丁憂身故道里逺近為差曰嵗修南學曰購買書籍器物鄉試之嵗支領者曰增修考試桌凳並由錢糧處具稿呈堂核發其公膳銀兩厨役具領發給書籍器用及考試桌凳均縷識於册以備查核每月終則將支用所餘核數呈堂存案嵗終則將一嵗支用之數詳悉核算國子監堂上官具摺奏銷其所餘者并入次嵗積算謹案國子監歲支各項俱就現行則例開載所有歷年更定章程附識於後順治元年以膳夫銀七百餘兩歸户部謹案膳夫銀始自明代歲有定額令直𨽻州縣辦解以充國子監公用本朝因之旋改歸戶部凡供給給賞心紅紙劄之先師廟祭祀及諸生考課費俱移文户部酌給每年約給三百八十六兩有竒後膳夫銀裁去先師廟祭祀改歸太常寺經理諸生供給奬賞則於恩賞銀內支銷康熙二十五年定先師廟祭祀所需物價太常寺於祭祀帑金內支用奏銷雍正元年命國子監支領户部紙張於年終彚奏乾隆八年定各部院大小衙門夏三月需用冰冬三月需用薪炭均按經制定數支給九年定各衙門取冰供用每嵗自五月朔至七月底止各按應用之數具印文支領於工部嵗支附元至元二十四年詔國子監生員官給紙劄元史世祖紀謹案此給集賢院所𨽻之國子監蓋建立監學時所定也明監生紙劄於順天府官錢給辦須知紙劄用手本赴祠祭司行移順天府轉屬收買徑送國子監印造公用紙劄共九千六百張春秋二季四千八百張於刑部山西清吏司關支冬夏二季四千八百張於都察院經歷司關支祭酒司業每月心紅三兩筆四枝墨一丸大呈文紙三十張封皮小呈文紙三十張毛邉紙三十張竹板一片各該銀四錢四分繩愆廳每月心紅三兩筆四枝墨一丸大呈文紙八十張封皮小呈文紙三十張毛邊紙三十張連七紙一百張竹板二片該銀六錢四分西廳六堂典籍掌饌每季心紅二兩五錢筆六枝墨二九毛邊紙四十張竹板二片該銀三錢典簿廳每月硃墨紙筆共該銀四錢七分堂上吏每月紙筆墨銀一錢典簿廳吏每月紙筆墨銀一錢四分明太學志嘉靖七年祭酒陸深具題秋祭宜用冰乃行工部造牲盤置冰以禦熱同上謹案志又謂是時丁祭牲牷太常多以瘠瘯備數頒胙不敷監中公買以補之則國學之廢弛大致可見矣欽定國子監志卷四十三

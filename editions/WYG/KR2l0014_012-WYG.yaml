body:
  text: 祀位二配饗從祀大成殿四配位木主髙一尺七寸寛四寸五分厚五分赤地金書小座髙三寸五分大座髙一尺五分東西連二龕合座龕髙六尺五寸廣七尺一寸深四尺三寸五分木座髙一尺九寸廣一丈四尺八寸深五尺五寸五分緑琉璃座髙二尺三寸廣一丈六尺五寸深七尺復聖顔子漢永平十五年祠七十二弟子顔子位第一後世因之魏正始二年晉配饗位唐貞觀二年稱先師縂章元年贈太子少師太極元年贈太子太師開元二十七年封兖公宋大中祥符二年封兖國公元至順元年贈兖國復聖公述聖子思子宋崇寜元年封沂水侯大觀二年從祀于左邱眀二十一賢之間端平二年升列十哲咸淳三年封沂國公晉配饗位元至順元年贈沂國述聖公並西面北上宗聖曽子唐總章元年贈太子少保太極元年贈太子太保開元八年以曽子受孝經特為塑像坐于十哲之次二十七年贈成伯宋大中祥符二年封瑕邱侯政和元年改封武城侯淳祐二年晉配享位封郕國公元至順元年贈郕國宗聖公亞聖孟子宋元豐六年封鄒國公七年晉配享位元至順元年贈鄒國亞聖公並東面北上大成殿十二哲位木主髙一尺四寸廣三寸五分厚五分赤地金書小座髙二寸五分大座髙一尺東西各連六龕合座龕髙六尺二寸廣三尺九寸五分深二尺八寸木座髙一尺八寸廣二丈三尺七寸深三尺九寸綠琉璃座髙一尺八寸五分廣二丈五尺五寸深五尺先賢閔子唐開元八年從祀二十七年封費侯宋大中祥符二年封瑯琊公先賢冉子唐開元八年從祀二十七年封薛侯宋大中祥符二年封下邳公先賢端木子唐開元八年從祀二十七年封黎侯宋大中祥符二年封黎陽公咸淳三年改黎公先賢仲子唐開元八年從祀二十七年封衛侯宋大中祥符二年封河内公成淳三年改衛公先賢卜子唐貞觀二十一年與左邱明等二十一人以經師從祀開元八年始以十哲從祀二十七年封魏侯宋大中祥符二年封河東公咸淳三年改魏公先賢有子唐開元八年從祀二十七年封卞伯宋大中祥符二年封平隂侯咸淳三年子思升四配衆議升有子為十哲不果明洪武二年崇仁訓導羅恢請升有子而黜宰我不報隆國朝初祀子東廡乾三年升十二哲並西面北上先賢冉子唐開元八年從祀二十七年封鄆侯宋大中祥符二年封東平公咸淳三年改鄆公先賢宰子唐開元八年從祀二十七年封齊侯宋大中祥符二年封臨淄公咸淳三年改齊公先賢冉子唐開元八年從祀二十七年封徐侯宋大中祥符二年封任城公咸淳三年改徐公先賢言子唐開元八年從祀二十七年封吳侯宋大中祥符二年封丹陽公咸淳三年改吳公先賢顓孫子唐開元八年從祀二十七年封陳伯宋大中祥符二年封宛邱侯政和元年改頴川侯咸淳三年封陳公升十哲先賢朱子宋淳祐元年從祀元至元二十二年封齊國公明崇禎十五年稱為先賢位在七十子之下漢唐諸儒之上國朝康熈五十一年升為十一哲並西序東嚮謹案顔曽思孟四配定位始于宋咸淳三年蓋前此止以顔子配也十哲之稱則始見于唐開元八年命改十哲為坐像自唐以後皆沿舊制宋端平二年以顔子既配祀孔子不當復在十哲之列乃升子思子于哲位咸淳三年子思于升列四配復升顓孫子於哲位朝我聖祖仁皇帝以朱子註釋羣經闡發道理五十一年孔孟之後有禆斯文功為宏鉅康熈命廷臣詳議尊崇之典大學士遵議朱子配饗孔廟本在東廡先賢之列應請升於詔從大成殿東序位次先賢卜子下徐元夢言之是為十一哲乾隆三年尚書孔子偶思與難之賢記者誌之因號十哲宋代升配子張本朝又躋朱子是十哲名数並非其舊似可無拘有子氣象大似聖人諸弟子常欲以事孔子者事之有子宜升哲位時元夢并欲退冉有宰我從祀兩廡而升南宫适子賤于堂上哲位聖大學士鄂爾泰等議以冉宰兩賢子為游夏諸門髙第佑饗千秋豈容輕議惟有賢所服孟子亦稱智足知聖從前未躋十哲似為缺典應如所請南宫适子賤升哲之説似不上納可從于是移朱子神位于西序先賢顓孫子之其言大次而升有子神位於之次是為十二哲云成殿東序先賢卜子大成殿兩廡從祀先賢先儒神位木主髙一尺三寸六分廣三寸五分厚六分赤地墨書小座髙二寸大座髙七寸五分東廡連四龕十六座龕髙五尺八寸廣二尺八寸深三尺木座髙二尺六寸廣共一丈二尺深四尺一寸磚座髙一尺二寸通廣二十丈一尺六寸深六尺五寸西廡連四龕十五座又獨龕一座廣二尺八寸深二尺二寸木座廣四尺深三尺二寸餘同東廡先賢蘧子瑗唐開元二十七年從祀封衛伯宋大中祥符二年加内黄侯明嘉靖九年改祀于鄉廡國朝雍正二年復祀為東先賢之首先賢澹䑓子滅眀唐開元二十七年從祀封江伯宋大中祥符二年加金鄉侯先賢原子憲唐開元二十七年從祀封原伯宋大中祥符二年加任城侯先賢南宫子适唐開元二十七年從祀封郯伯宋大中祥符二年加襲邱侯政和元年改汶陽侯先賢啇子瞿唐開元二十七年從祀封䝉伯宋大中祥符二年加湏昌侯先賢司馬子耕唐開元二十七年從祀封向伯宋大中祥符二年加楚邱侯政和元年改睢陽侯先賢梁子鱣唐開元二十七年從祀封趙伯宋大中祥符二年加千乘侯先賢冉子儒唐開元二十七年從祀封祀伯宋大中祥符二年加臨沂侯先賢伯子䖍唐開元二十七年從祀封聊伯宋大中祥符二年加沐陽侯先賢冉子季唐開元二十七年從祀封東平伯宋大中祥符二年加諸城侯先賢漆雕子徒父唐開元二十七年從祀封須句伯宋大中祥符二年加髙苑侯先賢漆雕子哆唐開元二十七年從祀封武城伯宋大中祥符二年加濮陽侯先賢公西子赤唐開元二十七年從祀封郜伯宋
body:
  text: 生徒六甄用各途貢監生在監貢監生肄業三年期滿有經明行修者得應薦舉留監三年奏請考試引見以知縣擢用其餘滿洲䝉古恩㧞副貢生咨部以七品筆帖式用例免考試漢恩㧞副貢生咨部以復設教諭用漢嵗貢生咨部以復設訓導用並得於雙月先用如本生有由本班應即選者仍歸即選之班銓用優貢廩貢均入嵗貢班捐納貢監不咨部漢軍貢生肄業期滿許簡選雲貴川廣州縣佐貳官餘並同漢貢監生滿洲䝉古各途貢監生許考選八旗七品八品筆帖式内閣貼冩中書䝉古新設外郎太常寺讀祝官贊禮郎鴻臚寺鳴贊各館繙譯清字謄録五年期滿議叙各照品級以筆帖式用漢各途貢監生許考選各館謄録五年期滿議叙恩㧞副貢生已就職或考職者以本職即用未經考職就職者以州同州判縣丞掣用肄業咨部之正途貢生仍以教職用嵗貢優貢捐納貢監生以主簿吏目用於期滿之前中式舉人者以知縣用滿洲䝉古正途貢生恩㧞副嵗優各貢生並為正途許考選順天府學滿訓導由禮部考取分别正陪引見補授各官學滿教習由所司大臣奏請考取善繙譯者充補三年期滿引見咨部以應補之缺補用漢正途貢生許考選翰林院孔目由吏部奏請考試試題用論一篇欽派大臣閱卷進呈欽定補用景山覺羅及八旗官學漢教習均由禮部奏請考試試題用四書文一篇五言八韵詩一首並欽派大臣閱卷進呈欽定按次補用三年期滿由所司大臣按其勤惰定書考語引見請㫖以知縣教職分别銓選其任教習後中式舉人若進士者銓注尤速其以教職用者恩㧞副貢生均選復設教諭嵗貢生選復設訓導武英殿録書由吏部奏請考取六年期滿議叙武英殿校録由辦理四庫全書處咨取監臣録送亦六年期滿議叙均照所得職銜先用恩㧞副貢生願就直𨽻州州判及教職者漢人由督撫驗看漢軍由都統驗看均咨吏部通較年嵗先後循次銓用其嵗貢生之願就訓導者亦如之漢軍漢人各途貢監生均許考授職銜由國子監咨送例於子午夘酉郷試之嵗五月試之凡例貢例監生俱取本籍文結限三月内到監并取同郷六品以上京官印結二一存監一送部恩㧞副嵗優貢生及由廪增附捐貢監生者與在監肄業諸生止取同郷六品以上京官印結二繩愆㕔查驗執照文結相符呈堂上官冊送各貢監生俱扣滿年限方准收考吏部奏請欽派大臣試以四書文一篇判一道入選者恩㧞副貢生一等以州同用二等以州判用三等以縣丞用嵗貢優貢例貢例監生一等以主簿用二等以吏目用均歸雙月選用其已經就職及肄業期滿咨部者不得與焉謹按國子監貢監生甄用各途均就現行則例開載其歴年增定章程附載於後順治二年以銓選需人命各省貢生免其赴監肄業於毎年四月十五日廷試後即行授職上卷以知州用上次卷以推官知縣用中卷以州判縣丞教職用十年定貢監生願考中書者國子監列名送吏部彚考十一年科臣孫柏齡疏請復貢生坐監之制部議遴貢生中英年者送監肄業滿日撥厯聽吏部㑹同内院禮部公同考試以定職銜其嵗貢願就教職者咨送吏部㑹同内院廷試得㫖允行是為考職之始十三年定吏部彚考中書於舉人貢生内擇文優學博者補撰文中書貢監生員内擇辭達字工者補辦事中書十四年定貢監生廷試上卷以知縣用中卷以州同州判縣丞用十五年祭酒固爾嘉渾奏准積分法以一年為限恩㧞嵗副貢生積分及格者咨送吏部厯滿考職照教習貢監生例上上卷以通判用上卷以知縣用例監積分及格咨部厯滿考職許與不積分貢生一體廷試每百名取正印官八名餘俱以州縣佐貳官用又定副榜貢生三科不第後方准考職十六年定厯事肄業諸生送考辦事中書舎人十七年定八旗教習止用恩㧞嵗副貢生考補官生廕生例監例貢生均不許考選是年停止積分法貢監俱不撥厯康熙元年定貢監生肄業期滿國子監咨部考職以州同州判縣丞用二年定内閣撰文辦事中書遇有缺出國子監咨送貢監生中英年端品文優字工者八名吏部考取正副二卷題請欽定三年定内閣中書缺出於未考職之貢監生内考選字畫端楷者録用凡在監肄業者均得遴選不復限以考試人數又定正途貢監生考職専以州同用例監生考職以州同州判縣丞分别用又定肄業恩㧞嵗副貢生補八旗官學教習期滿者以知縣州同用四年罷恩㧞嵗副貢生補用八旗教習以官廕准例監生未經考職者考補六年詔八旗教習有缺於恩㧞嵗副官廕生内考取數未足者准取准例監生又都察院左都御史王熙奏准舉人願就教習者請與貢監生一體考試試題論二首䇿一道彌封試卷即日取定文理荒踈者不得濫取又御史李棠奏准監生考補中書三年後即升部郎遷陟太優請罷其例八年詔各省鹽場大使有缺令祭酒等保舉在京㧞貢生送部揀選九年命選國子監㧞貢生三十員同庶吉士赴陜西宣諭化導又定例貢例監生充教習期滿者兼除布政司經厯理問轉運判官十年開館纂修世祖章皇帝實録需用漢字謄録令國子監遴善書監生送部考選轉送内閣又令禮部選滿漢貢監善書者送翰林院考取具奏所取不拘真草何家亦不論多寡選取彚送是為貢監生考選謄録之始十二年罷舉人官生廕生准例監生考取八旗官學教習仍以恩㧞嵗副貢生考補二十年命考取善書監生㳟繕太宗文皇帝實録二十三年定八旗監生得考取清漢文筆帖式二十六年罷嵗貢生廷試之例令各省學政循次考准咨部補授訓導捐納嵗貢生亦聽考送補授尋又定捐納嵗貢生以復設訓導用五十七年定各省貢監生赴京考職取地方官印結及各生里隣結狀撫臣給咨送部惟在監肄業者得由國子監取本生親供加以同郷京官印結保送赴部九卿公同考試如試卷與親供字迹不同者察出治罪凡由恩貢及廩生中式副榜者滿六月得與考職由増附中式副榜及嵗貢生滿八月得與由廪生㧞貢及由廪生捐貢者滿十四月得與由增附抜貢及由増附捐貢者滿十六月得與由俊秀捐貢及四品廕監生滿二十四月得與俊秀監生自捐監月日為始滿三十六月得與俱得計閏餘不得送試五十九年定八旗監生能書清文者簡選清字中書舎人雍正元年命考取善書監生十二人㳟繕聖祖仁皇帝實録又命各司月摺俱兼漢字具奏選八旗佐領下貢監生能書漢字者補内務府漢字筆帖式總管等議准俟其任職五年後貢生授七品筆帖式者以知縣用監生授八品筆帖式者以通判用又定滿洲䝉古漢軍貢監生俱許考取筆帖式又吏部議准貢監生考職請詳列九卿翰林等官職名奏請欽㸃閱卷官出題考試吏部司員按名察對如字跡不符聲音不合者卷不送閱必實係本生應試者始將試卷封送試官較閱各照其應得職銜取定甲乙吏部先期行文國子監並各省督撫嚴核給咨令各生親賫赴部投文驗到方准考試八旗貢監生由都統咨送如有假冐代替諸弊本籍出結官暨加結轉申給咨等官並議罰有差出結之同郷京官咨送肄業生之國子監官咨送八旗貢監生之都統叅領佐領罰亦如之其貢監生考定職銜即給與執照吏部行文各直省令州縣有司籍記之俟截取時地方官取諸生執照與部咨核對符合者給咨聽選稍有不符及審有假冐代替諸弊咨部斥革治罪又定漢軍貢生由本旗都統漢人由本省督撫選年力强盛者造冊送部以直𨽻州州判缺掣籖選用並令其赴京引見與學止教諭較俸升轉又定各省教職由生員捐納貢生者教諭改以縣丞用訓導改以主簿用三年定舉人選㧞副榜貢生考補景山教習三年期滿引見送部分班銓選景謹按康熙二十五年始設是始以舉人貢生考山官學専用進士教習至補甄用又定覺羅學漢教習於舉人貢生内考補又定由廩生捐納之貢生仍照捐納日期先後按次以復設訓導用不必以主簿改授四年増設順天府滿訓導一員由恩㧞嵗副貢生赴禮部具呈考取正陪送吏部引見補用又定雲南貴州四川廣東廣西福建等省教職途逺艱於赴部應將進士舉人恩㧞副嵗貢生及捐貢生照科分名次及所捐雙單月先後日期開列選法截定人數填給執照教職有缺令各省督撫以次升選仍照例考試令其到任月一奏之並將各員履厯到任日期原發執照按季彚冊送部察核又定八旗漢文助教員缺以閒散文舉人及副榜中式久者毎旗咨取十人由文舉人及副榜出身之俸深筆帖式每旗𫝊取五人清文助教員缺於清文俸深筆帖式内每旗𫝊取十人令國子監㑹同翰林院㳟請欽定題目閱取文理繙譯字跡優者進呈御覽吏部照例注冊遇缺擬正陪引見仍不限旗分惟按考取名次補用照例論俸陞轉又定各省恩㧞副貢生已就教職者令學臣於嵗科兩試事竣㑹同督撫與嵗貢生一例驗看造冊送部銓選年老者以原品休致五年定八旗教習報滿除去肄業之期以莅教習任三十六月為滿又定欽天監滿洲漢軍天文生缺歸入月選令考取之繙譯監生等與筆帖式缺一例掣補六年吏部議准刑部尚書勵廷儀奏向例考職國子監止據直省地方官文結轉行咨送其賫文赴考本生實難辨識嗣後考職並令投具親供取同郷六品以上京官識認印結同郷同考五人連名互結書明並無假冐頂替重考字様有犯此者許出結互結之人首告治罪知情不舉者並請嚴治考試之日編次字號列坐代作者御史察出叅處又定䝉古貢監生能繙譯滿洲䝉古字語者由部㑹同理藩院考試理藩院䝉古筆帖式按期補用七年詔舉人教習係應選知縣之人照常銓選外其貢生等長於訓課未必嫻於吏治若概用為知縣不但吏治無益而各生不能任職致干叅劾亦非成全之道嗣後各處教習貢生期滿著所司衙門帶領引見或用為知縣或用為教職並候㫖因材器使著為例又定八旗監生考試隨印筆帖式補用又定八旗䝉古新設外郎准令漢軍監生通清漢文者選補十三年詔肄業期滿監生二十四人以教職發直省任用乾隆元年祭酒國璉等奏准八旗助教有缺向例咨取各部院精通繙譯之筆帖式及繙譯舉人考試補授今八旗㧞貢生到監肄業與漢貢生學習漢文未嘗専心繙譯未可即以助教補授請嗣後肄業期滿者咨部以筆帖式分班銓選助教有缺准與各部院咨送人員一體考取漢軍㧞貢生仍准簡選雲貴川廣州縣佐貳官又定八旗貢監生官學生考筆帖式題於内閣新到通本内酌取一道又定八旗貢監生考試各館繙譯謄録取清文熟精者數十人註冊按名補用用畢再請考試又定各省㧞貢生廷試列一等二等者九卿㑹同揀選由部引見簡用三等者劄監肄業其考取宗學等教習者三年期滿以知縣銓用其餘肄業期滿者吏部照例銓選又定未經就職之恩㧞副貢生考授佐貳一等選州同二等選州判三等選縣丞未經就職之嵗貢生考授佐貳一等選主簿二等選吏目並入於雙月班銓用聽其在籍候選未銓時仍得應郷試有願就教職者聽其已就教職及直𨽻州州判者不與焉捐納貢監生亦照嵗貢之例考取主簿吏目漢軍與漢人同是年㧞貢生引見奉㫖交吏部以知縣用者十八人願就佐貳教職用者五十人其餘歸國子監准作貢生二年恩詔貢生監生每年仍派大臣考定職銜照舊例送吏部銓選又定㧞貢初到部者概停簡選俱于考試後劄監肄業荒謬者議處其肄業期滿之㧞貢生有品學兼優者祭酒核實保薦引見簡用餘皆遵例銓補教職又定諸生肄業期滿國子監官擇學醇品卓者核實保薦留監三年引見請㫖是年本監官奏留期滿貢生暴煜鄒儒莊權三人又定太常寺暨陵寢讀祝官贊禮郎鴻臚寺鳴贊等有缺凡滿洲副貢監生並得遴選太常寺鴻臚寺堂上官主之選定引見補授三年尚書張照奏准令國子監選肄業正途貢生善書者十人送武英殿録書數年後酌量議叙又定貢監生於郷試年五月内考職文結務於三月到部又定鹽場藩庫大使有缺恩㧞副榜貢生得與舉人候選知縣考授州同州判縣丞候選直𨽻州州判等一體赴部遴選引見簡用嗣以舉人需次者多罷貢生鹽場藩庫之選又尚書兼管監事孫嘉淦奏准於八旗官學生中考其優者㧞為監生令入監肄業與㧞貢生同習明經治事期滿擇尤異者一體保舉引見四年大學士兼管監事趙國麟奏准本年肄業期滿者止二十餘人若概行引見則與原議不符就其中品學稍可觀者奏請亦非慎重之意請暫停引見之例嗣後如有才品學識迥異恒常者仍照原議核實保薦又定八旗肄業期滿㧞貢生奉㫖以筆帖式用者如不能繙譯准其但試清字考取者以各部繕本筆帖式用五年監臣以肄業期滿又留監三年之貢生鄒儒引見奉㫖以知縣用時莊權告假回籍暴煜考充教習後期滿引見亦以知縣用又定肄業監生期滿者國子監咨送吏部以主簿吏目分别考定職銜照考職年資名次挨選又定繙譯貢監生准考内閣貼冩中書舎人照筆帖式例給俸又定在各館修書暨在監肄業之漢恩㧞副貢生准考翰林院孔目八年尚書兼管監事劉吳龍等奏准八旗官學教習期滿請於引見時分别等第以實心訓課著有成效者列為一等請㫖以知縣用仍留官學教習三年期滿准其即用訓課勤謹稍有成效者請㫖或用知縣或用教職仍歸原班銓選又定各館謄録照考試滿洲繙譯謄録之例貢監生均得與試吏部行文禮部國子監核明繕冊取具同郷京官印結送吏部俟欽簡大臣在午門内考試遴取者按名補用六年期滿或全書告成奏請議叙其例在一等者就職考職人員准以應得之缺即用其未經就職考職者恩㧞副貢生以州同州判縣丞掣用嵗貢優貢生以主簿吏目掣用肄業已滿咨部候選教職者准輪班選用未議叙以前由諸生中式舉人者議叙以知縣用捐納貢監生以主簿吏目掣用其議叙在二等者銓用各酌减有差九年御史錢度奏准向來貢監生考職止分别等第凡成篇者盡行録取未免濫收請勅考試大臣務擇優通者酌取寧少毋多其餘概置不録又定各途考試除郷㑹生童考試在貢院外其餘俱在午門諸處派䕶軍人等監視并於考取後嚴行覆試午謹按向例貢監生考職在院是年十月門乾隆七年以後改入貢詔各途考試俱在三十四年禮部議准御史五章阿午門諸處嗣於朝奏一切人數在五十名以内仍照舊例在内考試午門内考試遇五十名以外請照吏部考試候補筆帖式之例於貢院聚奎堂考試仍請簡派滿漢御史各一員以資彈壓十年定武英殿録書貢生照各館例六年議叙十四年監臣以肄業期滿奏請留監之監生蔣炳引見奉㫖以知縣用十六年御史楊勲奏准官學漢教習員缺向例祗由國子監堂官將現在肄業之恩㧞副優嵗貢生考取充補請嗣後照吏部揀選之例先期命大臣至監㑹同考取并將試卷彌封詳閲又定選㧞貢生由學政考取令㑹同督撫秉公掄選順天學政選㧞滿洲䝉古漢軍欽派大臣㑹同看驗奉天由府丞選㧞㑹同府尹看驗臺灣府由臺灣道選㧞移送福建學政㑹同督撫看驗給照赴部以應朝考列在優等者照舊例簡選引見候㫖分别録用未入簡選及引見未用者俱劄監肄業並令直省督撫澄汰年力就衰教職以簡選引見之㧞貢生補其缺十七年江蘇學政雷鋐奏祭酒官於肄業諸生無保薦之人則平日董勸無實應加議處部議恐開臨期濫保塞責之漸令監臣於三年期滿時將無可保薦之處自行奏明著為例又雷鋐奏准國子監保薦留監期滿貢監生請欽派大臣試以經解䇿問始得引見十八年定考職就職貢監生得與守部候銓各員及未經截取之進士舉人同遴發河工効力又吏部議准逺省教職向令在外督撫按月具題選授毎多錯悞駁回更多遲滯請仍歸部選又議准二等教習歸班後例得挑選較一等留學人員轉得先膺錄用未為平允嗣後以知縣用之留學教習遇有揀發一體報名遴選二十年監臣以期滿留監之監生章紹七奏請欽派大臣於午門内試以經解策問並將試卷進呈御覽監臣帶領引見奉㫖以知縣用二十六年命八旗官學教習期滿引見候㫖錄用毋庸預列等次並罷教習留學三年之例二十八年御史王紱奏准凡貢監生考試八旗教習請照咸安宫諸處教習例欽派大臣在午門内考試毋庸至國子監㑹同監臣閱卷二十九年監臣以琉球學教習期滿之進士潘相引見奉㫖以知縣用謹按潘相以㧞貢生選補琉球學教習後成進士至是年期滿三十一年祭酒良誠奏稱國子監官學與景山覺羅三處貢生教習毎年奉㫖以知縣用者不下十餘人而向例于雙月三班五十一缺之後選用一人計一嵗中合三處所選不過一人應量為疏通以示鼔舞經部議淮於雙月三班五十一缺之後選用二人又奏請八旗官學設滿洲教習毎學一名經部議准照考取覺羅學滿教習之例由監臣奏請考試凡八旗進士舉人貢生生員等並得與選三十三年尚書兼管監事陸宗楷等奏准肄業期滿諸生果有經明事治者即隨時保奏若諸生無可薦亦不必𤨏凟陳奏三十四年大學士等議准侍郎王際華奏以武英殿錄書貢生前經國子監所送未稱任使嗣後缺出改用吏部考取正途出身之謄錄又尚書兼管監事蔡新等奏准八旗官學滿教習八員嗣後缺出行文禮部於考取人員内補用不由本監奏考三十八年尚書永貴奏准咸安宫官學及覺羅學滿教習許恩監例監一體考試又奉㫖繕寫四庫全書總裁大學士劉統勲等奏准在京貢監生内有曾經學字情願自備資斧効力行走人員内擇其字畫端正酌取三十名令其在館行走以供繕錄五年報滿准其議叙尋又奏添取三十名一體在館効力又劉統勲等奏准四庫全書卷帙浩瀚非多派謄錄不能如期蕆役應令現在提調纂修各員於在京之舉人及貢監各生内擇字畫工緻者各舉數人共定四百人之數令其充為謄錄自備資斧効力仍核定字數毎人毎日寫一千字五年期滿照各館議叙再書内有應繪圖様另選通暁畫法之貢監生十員作為謄錄一體効力又是年皇上廵幸天津召試獻賦貢監生員奉上諭此次考列二等有願在四庫全書處効力者准其在謄録上行走又奉㫖繕寫四庫全書薈要總裁大學士于敏中等奏准另選謄録二百名繪圖四名仍照現在謄録寫書之例自備資斧期滿議叙又九卿等㑹議准御史胡翹元條奏停止提調纂修保舉謄録之例三十九年奉㫖辦理四庫全書並薈要二處所用謄録莫若於郷試發榜後即在落卷内擇其字畫匀净可供抄録者酌取備用著交曹秀先嵩貴同派出之同考官竇光鼐吳玉綸周於禮趙佑戈源善聰留住貢院將未經取中之南北中皿彌封墨卷公同繙閱挑取五六百名交與吏部按照名次拆卷填註此内如有本係謄錄即行扣除餘俟出榜暁示註冊挨補四十一年皇上廵幸山東天津兩處召試獻賦舉人貢監生員奉上諭所有考取二等各生著照上屆廵幸天津之例有願在四庫全書處効力者准其在謄錄上行走四十二年禮部議准各館現充謄錄人員嗣後遇考試漢教習之時俱不准其考試並查明現在如有謄錄教習兩處兼走之員係先補謄録者即將教習撤回係先補教習者即將謄録撤回如係肄業外班於依限寫書之外仍可自理本業無庸扣除以昭平允又奉㫖繙譯郷㑹試停止已二十餘年近日滿洲學習清文善繙譯者益少著加恩以乾隆戊戌年八月考試繙譯舉人己亥年三月考試繙譯進士嗣於四十三年禮部議准繙譯郷試應考之繙譯生員文生員貢監生天文生中書七八品筆帖式小京官等應照舊例由欽派考試繙譯生員之大臣先期考試列在一二三等者准與新進生員一體入場又奉㫖辦理四庫全書並薈要二處謄錄仍著於郷試發榜後將未經取中之南北中皿及貝字號墨卷彌封詳慎繙閲皿字號挑取八百卷貝字號挑取六百卷交與吏部照例辦理至應派之閱卷官俟臨時再降諭㫖八旗官學生八旗官學生考選之制滿洲䝉古漢軍各有區别其滿洲官學生准考而䝉古漢軍不與者則有各部寺庫使由吏部奏請欽派大臣於貢院内考試試題於通本内擬用一道録取者付吏部書於冊遇缺按旗分名次補用其䝉古學生准遴選而滿洲漢軍不與者則有唐古忒學生經咒館校録唐古忒學生由理藩院遴補以唐古忒中書筆帖式補用經咒館校錄由八旗遴選三年期滿給與筆帖式品級其漢軍官學生准考而滿洲䝉古不與者則有八旗外郎滿洲䝉古漢軍舊各一缺由吏部行文國子監於漢軍年久官學生内揀選一名咨送吏部考試繙譯補用又䝉古新設外郎毎旗一缺由吏部行文本旗漢軍旗分將監生官學生等挑選正陪咨送考補期滿仍送吏部考授州同州判縣丞職銜於貢監生考職選用七人之後選用一人其滿洲䝉古同准考而漢軍不與者則有内閣貼寫中書由貢監官學生考取按旗分名次補用考試之制與庫使同其滿洲䝉古漢軍同得考選不復分别者則有各館繙譯謄錄九品筆帖式太常寺讀祝官贊禮郎鴻臚寺鳴贊繙譯生員咸安宫官學生恩監生諸途各館繙譯謄錄由貢監生官學生考補九品筆帖式由官學生考授太常寺讀祝官贊禮郎由太常寺官簡選八旗貢監生官學生補授鴻臚寺鳴賛由鴻臚寺官簡選補授繙譯生員三年一考錄取者冊送禮部仍准考選筆帖式咸安宫官學生由國子監遴送考選與八旗官學同恩監生由八旗漢文班官學生考補自官學而升太學有優異者並得薦舉謹按官學生甄用各途謹就現行則例開載其厯年増定章程附載于後順治十三年以八旗官學生不習武事敕部酌定讀滿漢書額數並諭凡應試及各衙門取用均在此定數之内其定數外讀書子弟毋得取用亦不許應試十四年定各部院筆帖式有缺止用官學生補授謹按筆帖式舊例由官學生庫使補授九年定舉人生員亦得選補至是年題准止用官學生康熙元年定八旗漢軍官學生考選印房外郎三年定清漢文筆帖式有缺每旗咨取官學生三人清文筆帖式有缺本旗咨取五人令其掣籖補授又定各部院筆帖式有缺官學生與舉人蔭監生間補四年定官學生補授筆帖式取年久者補用六年定官學生除國子監照常考試外毎年禮部嚴考一次分别等第送部錄用如肄業怠廢者劾治助教等官議處八年定各部院筆帖式有缺用廕監生十人官學一人庫使領催一人循次間補九年定筆帖式有缺凡候補筆帖式與廕監生照文到之先後共用十人然後用庫使領催二人官學生二人如清漢文筆帖式有缺係庫使領催應補而無識漢文者許以官學生擬用官學生遇應補時行文國子監考補又定庫使領催有缺行文國子監考試官學生毎館咨送五人掣籖除授又定滿洲督撫藩臬筆帖式半於各部院筆帖式内選補半以廕監生官學生考取考取之制國子監于八旗各擇官學生一人與廕監生候補筆帖式同試十二年定八旗漢軍官學生或通清文或通清漢文願於部院衙門録用者令國子監於䇿論判語内酌試之並令繙譯清漢文一篇嚴加闗防彌封各卷擇文理優通者送吏部銓用未取者還官學讀書其滿洲通漢文之官學生不與試至十三年即罷行此例十五年罷官學生考補領催其考補庫使如舊制是年罷官學生考試滿洲督撫藩臬筆帖式例十六年定外省將軍漢總督城守尉邉門筆帖式員缺將俊秀生員庫使官學生間補謹按舊例將軍等衙門筆帖式俱以官學生補授八年期滿還京候補嗣又以庫使領催官學生考補十五年議停考試至是復行更定焉又定盛京各部筆帖式有缺由盛京三四品官廕監生庫使除授若無其人亦准以在京廕監生庫使官學生補用二十年定各部院筆帖式有缺國子監於滿洲習漢文之官學生及漢軍官學生内毎旗考送二人掣籖補授未授者書於􅁽以次銓用二十二年定各部院筆帖式有缺國子監於官學生内考試清文優通者毎一缺取五名送部掣補二十三年定八旗未出征監生及官學生得考補清漢文筆帖式二十五年定索倫地方筆帖式由理藩院遴選兼通清字蒙古字之官學生考送補授五年期滿所司大臣咨送還京遇京師本旗有缺許得先用五十六年定蒙古官學生得選取理藩院委署筆帖式五十九年定官學生及候補筆帖式之監生毎旗擇能寫清文大字者一人能寫細字者二人令其學習俟肄習有成奏請補用謹按八旗官學生向例得除内閣辦事中書自康熙十年後中書皆由考授官學生不復與選至是復定簡選學習補用之例六十年吏部題准官學生銓補各部院筆帖式八旗各為一班循次逓補毎班補用二人自康熙二十二年後止用一人計毎旗官學生八十餘人閱五六年始得補用不無壅滯請仍照舊例毎班各用二人六十一年定各部院銓補滿洲蒙古漢軍筆帖式繙譯繕寫各為一班凡官學生應銓者遇繙譯筆帖式班次吏部以繙譯試之而後補遇清文筆帖式班次以繕寫清文試之而後補劣者駁還以其次應銓者考補駁還者給假一年令其肄習遇缺仍得考補如國子􅁥咨送官學生適與捐納筆帖式同日則考其能繙譯繕寫者補用雍正元年定考試筆帖式先期奏請欽㸃大臣閱卷御史監試試畢擬甲乙進呈恭候欽定俟奉㫖後出榜註冊按名補用又定凡銓補内外各衙門筆帖式均于每月十五日截限二十日掣簽將考取人員除未滿十八嵗者停其補用外餘各按旗分依考取名次擬補舉人貢生授為七品筆帖式監生生員授為八品筆帖式官學生義學生驍騎校閒散人等均授為九品筆帖式如任筆帖式後中式舉人准改予舉人應得品級食俸任後捐監生者改予八品職銜仍食九品俸又定䝉古官學生准以䝉古筆帖式補用三年定八旗漢軍筆帖式貢監生員官學生與滿洲䝉古一體考試繙譯於三年内考取秀才舉人進士各一次至乾隆十九年罷試繙譯舉人進士五年定欽天監滿洲漢軍天文生缺歸入月選令考試繙譯甄取之監生生員官學生義學生掣補六年定䝉古舉人貢監生生員官學生義學生能繙譯滿洲䝉古語者得考試理藩院䝉古筆帖式試時吏部理藩院㑹考取者按旗循次補用又吏部議准舊例䝉古官學生得以中書補用似屬太優請罷其例又䝉古官學生有願試滿洲䝉古繙譯者令其與考以各部院衙門䝉古筆帖式用又定遴官學生俊秀者為咸安宫學生十一年定八旗生員監生官學生俱准考試隨印筆帖式錄取者授為九品筆帖式三年期滿咨部註􅁽考試仍留隨印効力俟其銓補所陞缺後始别行考取又定八旗蒙古新設外郎八名令于漢軍生員􅁥生官學生内遴清漢文藝優者二人擬正陪咨部考試充補乾隆元年定官學生考充各館繙譯謄錄四年定各部寺庫使有缺吏部行文國子􅁥每一缺考選本旗官學生四人仍將試巻送部覆核擇其佳者補用五年定滿洲蒙古官學生准考内閣貼寫中書十六年御史恒光奏准部寺庫使有缺令國子􅁥咨送八旗官學生三人與覺羅官學生二人均聽吏部考用二十一年定官學生得簡選太常寺讀祝官贊禮郎鴻臚寺鳴贊一體引見補授二十五年定考補部寺庫使令覺羅官學生八旗官學生均得與試先期奏請欽㸃大臣閱巻酌取吏部書之於􅁽有缺則按旗循名補用三十一年定官學生之兼前鋒䕶軍領催披甲者准考試貼寫中書甄用附元至大四年定國子學試貢法蒙古授官六品色目正七品漢人從七品元史選舉志謹按是時未行科目故試貢銓注品秩之優與進士相埒本學正録司樂典籍管勾侍儀舎人舊例舉積分生員充之泰定三年更積分而行貢舉定於上齋舉年三十以上學行堪範後學者為正錄通曉音律學業優贍者為司樂幹局通敏者為典籍管勾其侍儀舎人於上中齋舉禮儀習熟音吐洪暢曽掌春秋釋奠每月告朔鳴贊衆與其能者充之同上天厯二年於國子生員内舉充郊壇庫藏都監元史選舉志定國子學伴讀嵗貢八人内充部令史者四人路教授者四人同上至順元年詔國子生積分及等者省臺集賢院奎章閣官同考試中式者以等第試官不中者還學肄業續文獻通考至正間教官悉用下第進士及郷試備榜七年以監察御史成遵等言試國子監㑹食弟子員選補路府及各衛學正元史順帝紀明外官推官知縣及學官由舉人貢生選京官五府六部首領官州縣佐貳都布按三司首領官由監生選明史選舉志太祖雖間行科舉而監生與薦舉人才叅用故其時布列中外者太學為最盛一再𫝊之後進士日益重薦舉遂廢而舉貢日益輕雖積分歴事不改初法南北祭酒陳敬宗李時勉等加意振飭已漸不如其始衆所趨向専在科甲宦途升沉定於謁選之日監生不獲上第雖奮自鏃厲不能有成積重之勢然也迨開納粟之例庶民皆得援例入監謂之民生亦謂之俊秀而監生益輕于是同處太學而舉貢得為府佐貳及州縣正官尚為正途而援例監生僅得選州縣佐貳及府首領官其授京職者乃光禄寺上林苑之屬其願就逺方者則以雲貴廣西及各邊省軍衛有司首領及衛學王府教授之缺用而終身遂為異途矣同上謹按明太祖洪武元年即選國學生侍太子讀書五年命諸生先于諸司習吏事謂之歴事監生取其中尤英敏者李擴等入文華武英殿説書後俱擢御史給事中又擢監生劉政龍鐔等為行省布政按察使諸官盖内而臺諫外而藩臬並由太學其常調者乃為府州縣六品以下官又命諸生稽覈黄冊督修水利其委任甚重永樂以後雖歴事之額逓増出使之軺間命而按循資格無復不次用之者矣凡監生歴事吏部四十一名户部五十三名禮部十三名大理寺二十八名通政司五名行人司四名五軍都督府五十名謂之正歴三月上選滿日增減不定又有諸司寫本户部十名禮部十八名兵部二十名刑部十四名工部八名都察院十四名大理寺通政司俱四名隨御史出廵四十二名謂之雜歴一年滿日上選又有諸色辦事清黄一百名寫誥四十名續黄五十名清軍四十名天財庫十名初以三年謂之長差後改一年上選承運庫十五名司禮監十六名尚寳司六名六科四十名初作短差後亦定一年上選又有隨御史刷卷一百七十八名工部清匠六十名俱事完日上選又有禮部寫民情條例七十二名光禄寺刷卷四名修齋八名叅表二十名報訃二十名齎俸十二名錦衣衛四名兵部查馬冊三十名工部大木厰二十名後府磨算十名御馬監四名天財庫四名正陽門四名崇文宣武朝陽東直俱三名阜城西直安定徳勝俱二名以半年滿日回監同上建文時定歴事期滿監生考核之法分上中下三等上等選用中下等仍歴一年再考上等者亦選用中等者不拘品級隨才任用下等者回監讀書凡歴事吏部四十一名永樂元年奏請増額十五名從之是時吏部又請取通經監生三百名送翰林院考試選用教職他若齎勅諭中外頒詔各王府以及訪求髙皇帝御製文宸翰皆令監生奉命以行南雍志謹按此條雖見南雍志然厯事之法訖明世遵行之且永樂時已設行部國子監規制應同後凡京師國子監通行之制而紀於南雍志者亦載焉先是監生辦事内府半年即選及吏部以五府六部等衙門歴事者所闗較重而選用反遲非所以勸士為言因命内府辦事者一年乃許就選永樂二年尚書蹇義又以内官監奏准一年授官而諸司歴事監生例應三月授官因缺少有遲至一年未授者請令所司于内府辦事監生月日滿日定例賞給仍令回監依歴事出身著為令同上永樂五年選監生三十八人𨽻翰林院習四裔譯書九年辛夘習譯書監生鍾英等五人成進士俱改庶吉士壬辰乙未以後譯書中㑹試者甚多皆改庶吉士以為常明史選舉志謹按永樂時又取善書監生繕寫實録永樂大典五經大全諸書書成之日或授御史中書或賚銀鈔絹米皆隨時酌定不為定例永樂八年定歴事監生三試俱殿者以未入流首領官叙用南雍志永樂十一年定取撥歴監生必循資次同上永樂二十二年簡監生二十八人分六科隨朝歴事兩朝典故仁宗初歴事者多不願還監通政司引奏六科辦事監生二十人滿日例應還監仍願就科辦事帝不許復召二十人者諭令進學盖是時六科給事中多缺諸生覬得之帝察知其意故不授官也明史選舉志宣宗以教官多缺選監生三百八十人又監生程富等以都御史顧佐之薦使於各道歴政三月選擇任之謂之試御史同上内府收鈔者辦事以三年為限英宗即位遣歸歴事差使監生俱令在家聽候選用惟清理文職貼黄監生及清理軍職者入監十年以上歴事照例考覈南雍志宣徳十年從祭酒貝泰疏奏候選監生皆撥歴年逺銓除之日大半齒衰宜選取盛年堪任者充儒學教官于是㑹官簡選通經監生除授教職同上宣徳時取副榜舉人年二十五以上者授教職明史選舉志又兵部奏請選取能書監生八十人送中書科書寫武職誥命三年滿日照厯事出身撥補南雍志又從南陵教諭任綸請命舉人除教職者寄監以待再試如三試不第者照嵗貢出身選官同上正統四年集諸生一千九百人合試於大成門之丹墀試法一如棘闈故事取監生三百人送吏部選用教職後復以教職多缺選監生能作三場文字者考選充之辟雍紀事正統五年奏准三法司寫本分廵一年出身者以監生當厯事者充之兵部户部清軍寫誥天財庫辦事三年出身者以監生入監五年者充之印綬監清黄續黄三年仍厯事二年共五年出身者以監生入監三年者充之南雍志正統六年吏部以雲貴兩廣廵檢吏目倉官驛丞有缺先年有監生願出仕逺方事例請以就職監生年四十七八以上者銓補從之同上正統七年中書宋懐等以年深監生寫字麤拙請不拘資次選用旋經祭酒李時勉請仍遵前例并令寫誥已滿監生授之職事専一寫誥從之兩朝典故又查理黄冊取撥監生一千二百名同上又祭酒陳敬宗奏命入監十年以上者准照厯事例出身同上景泰八年令監生坐堂五年者辦事厯事二年出身三年者四年出身一年二年者止令辦事不許厯事出身又令監生正厯一年三閱月寫本一年長差三年用祭酒王恂言也南雍志九年取撥監生八百名查理黄冊時在監坐堂人少移文取依親監生以足之同上天順二年兵部奏撥清黄監生一百名厯事三年送吏部選用又奏清理軍伍撥取監生四百名兩朝典故天順三年令依親監生復班後坐堂及辦事半年方准撥厯南雍志天順五年詔坐堂厯事聽選記名等監生有願告歸者俱與在外九品職名冠帶閒住同上舊例監生厯事三月考勤後移吏部取用景泰以來三月考勤畢重厯一年天順六年減作九月送吏部銓用後復改諸司厯事考最勤謹者再厯三閱月送部聽選其有願就教職及雜職者聽不能出仕願告回家者俱與冠帶閒住尋定正厯六閱月寫本八閱月長差一年半明太學志成化元年令納粟監生坐堂十年循次撥厯若中郷試者通計先年坐監日月撥厯南雍志成化二年令禮部都察院堂上官嵗與祭酒考選監生一次老疾不堪作養者給冠帶閒住後又申明監生母得告就雜職至于願就教職必嚴試三場始准若納馬納粟等項暨未經科舉者俱不准濫與同上監生撥厯初以入監年月為先後丁憂省祭有在家延留七八年者比至入監即得取撥陳敬宗李時勉先後題請一以坐監年月為淺深其後又以存省京儲依親就學在家年月亦作坐堂之數其患病及他事故始以虚曠論諸生互争年月資次各援科條成化五年祭酒陳鑑以兩詞具聞乞勅禮部酌中定制為禮科所駁鑑復奏争之乃下部覆議請一一精覈仍計地理逺近水程日月以為凖然文移往來紛錯繁揉上下伸縮弊端甚多卒不能畫一也明史選舉志成化七年令監生重厯九閱月者又減兩月南雍志先是天下教官多缺而舉人厭其卑冷多不願就成化十三年御史胡璘疏言教官率多嵗貢言行文章不足為人師範請以舉人選用而罷貢生勿選部議嵗貢如其舊而舉人教官仍許㑹試自是就教者亦漸多矣明史選舉志成化十五年詔監生厯事有不願出仕者授以正七品有司職名依親坐堂授以正八品職名冠帶閒住南雍志成化二十二年吏禮兩部議生員由科貢入監乃先朝舊制納粟准充監生係一時權宜若循次撥厯滿日入選則納粟者比之科貢數多未為平允宜分為兩途酌量相兼撥厯俟納粟監生撥厯已盡科貢之士可以復舊循次出身矣於是各置精微文簿臨時復計兩途人數多寡量撥同上宏治元年吏科給事中林廷玉上言納粟監生臨選吏部嚴加考試分為三等上中二等與科貢一體選用下等填注衙門職名令其官帶閒住從之同上宏治三年從尚書王㒜請増撥吏禮二部寫本監生各二名兵部一名同上宏治三年定四譯館繙譯選取監生二十名子弟一百名習畨語畨文厯三年一考九年考中優等者子弟授以雜職監生授以從八品官兩朝典故先是納粟監生多于科貢故分為兩途相兼撥厯其後科貢多于納粟宏治四年從祭酒謝鐸請更定撥厯人數科貢十居六七納粟十居三四云南雍志明初令監生由廣業升率性堂始得出身天順以前在監十餘年然後撥厯諸司厯事三月仍留一年送吏部銓選其兵部清黄及隨御史出廵者則以三年為率其後以監生積滯者多頻減撥厯嵗月以疏通之毎嵗揀選優者輒與撥厯孝宗時監生在監者少而吏部聽選至萬餘人有十餘年不得官者祭酒林瀚以坐班人少不敷撥厯請開科貢禮部尚書倪岳覆奏科舉不可再增惟增嵗貢人數而定諸司厯事必須日月滿後方與更替諸生坐監稍久選人亦無壅滯焉明史選舉志宏治十四年定嵗貢生願授教職者先送翰林院國子監按月考試期年後選取陛考授職南雍志宏治十五年定監生正厯一年三月者減三月長差三年者減一年同上宏治十七年從祭酒謝鐸言嵗貢生願就教職者附監肄業一年附選同上又南祭酒章懋疏奏嵗貢諸生先令督學憲臣嚴試再命大臣簡選謁選之日吏部就行考定髙下或錫冠帶或授合得品級散官使之待選于家而行文各處廵撫廵按分廵分守及司府正官凡有公事委之幹辦驗其能否嵗終第其髙下造冊奏聞其材識優長即行取選年老不堪用者就令致仕從之同上正徳五年令正厯減四月雜厯減兩月長差減六月明太學志正徳八年祭酒石珤疏請照先年事例厯滿方與起送撥補部議撥厯事宜因時增減不常請照宏治十五年正厯寫本各一年之例從之同上正徳十四年贑州府嵗貢生周尚文以擒斬賊徒報功命免其坐監即與附選續文獻通考謹按明制諸生擒賊報功者得為功生例免坐監厯事即與銓叙亦見辟雍紀事嘉靖十年監生在監者不及四百人諸司厯事嵗額以千計禮部尚書李時以國學缺人視宏治間更甚乃引倪岳前議權宜之法定諸司厯事三月考勤後仍厯一年寫本一年清黄寫誥清軍清匠三年出廵等項俱如舊例日月從之明史選舉志先是減去雜厯缺一百五十六名嘉靖十五年以在監人多遂依舊額後生徒日盛更請增額遂定查各衙門正雜厯共九百三十八名外又增一百四十一名明太學志嘉靖三十一年令舉人上選二年嵗貢三年援例監生六年赴部選補邊方府州縣官兩朝典故嘉靖四十五年給事中張純等奏請舉人年四十以上者俱銓授教職嵗貢衰耄不得收選從之同上嘉靖間議濟大工許監生入貲授冠帶謁選又准援納布按二司首領隆慶五年又令監生納銀得授都司經厯斷事等官并開遙授官帶例辟雍紀事舊例舉人就教多授府州縣訓導萬歴初槩授學政教諭不及三年即陞知縣由是舉人遂不復坐監大學士張居正奏請酌議釐正將考取上卷中卷十卷以前俱授學正中卷二百名前俱授縣教諭餘俱授訓導兩朝典故萬厯十四年吏部尚書楊巍祭酒張位各陳選法請擇文義精通之納粟監生視嵗貢監生例選授府佐縣正辟雍紀事萬厯三十一年令監生入貲授文華武英二殿中書同上天啟三年户部奉㫖行監撥監生三百五十名清理黄冊同上欽定國子監志卷四十

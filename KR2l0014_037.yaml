body:
  text: 生徒四勳廕國子監肄業廕生有三曰恩廕凡職官恭遇覃恩特詔廕子文職在京四品以上官在外三品以上官武職二品以上官並送一子入監讀書三年期滿聽銓曰特廕凡內外大臣宣力有年特邀寵命廕一子入監讀書六月期滿聽銓曰難廕凡職官殁于王事者按所任應升品級加贈並廕一子入監讀書六月期滿聽銓定例三品以上子孫為廕生三品以下子孫為廕監生世爵與宗室覺羅一體與廕凡廕生承廕必以適長子孫適長子孫已仕或有故始廕適次子孫無適始廕庶長子孫嫡庶皆無始廕弟及兄弟之子應繼其祀者凡子孫在恩詔後始生及緣事治罪者均不得承廕順治元年定漢人恤廕生難廕生考滿廕生坐監以六閲月為滿恩廕生官生以二十四月為滿又滿洲蒙古漢軍廕監生十嵗以上入監讀書俟至十八嵗考試咨部三年定官員殉難者俱照本官應升品級酌加贈廕委署者不議恤八年定職官不論現任及丁憂給假候補者俱照職銜豫廕九年定內外滿漢三品以上官三年任滿勤事以死者俱準贈銜廕子十一年祭酒固爾嘉渾奏準覺羅廕生廕監生視各官恩廕生例送監讀書期滿送宗人府按品銓授十六年恩詔凡護軍統領副都統侍郎以上之子俱為廕生其餘各官之子俱為廕監生又定各官非現任者不廕包衣佐領下官員不與廕又定八旗當承廕之子孫未承廕之先曽緣事鞭責者不得廕康熙三年定滿漢各官緣事革職其廕子未仕者停廕已仕者照舊供職降調之員即未仕者亦不停廕又定三品以上病故官不贈廕又定滿漢各官廕生廕監生已得官職及科目中式者不得補廕四年定恩詔得承廕者先送國子監讀書後授官職旨滿洲謹案順治元年奉清書或讀漢書及漢官子弟官員子弟有願讀願讀清漢書者俱送入國子監嗣後十三年停止四品以上官送子弟入監十六年停止四品以下命廕生官生入監至是始方得入監焉六年定各官不論加級及宫保各銜俱照實俸廕子又定各官廕生廕監生俱核明豫廕以後稱遺忘請補廕者不準給十年定官員文職既革尚餘武職者仍得留廕十二年定以原品解任食俸官員各視其品秩廕子又定凡八旗漢軍廕生廕監生或通清文或兼通清漢文願于部院衙門録用者移送國子監考試于䇿論判語酌量出題並令翻譯清漢文一篇嚴加關防彌封各卷擇文理優通者送吏部銓用未取者還官學讀書其滿洲通漢文廕監生不與試至十三年停止考試策判十三年定漢軍漢人各官廕監生俱聽國子監考試文理優通者咨部銓用其吏部考試之例停止二十二年定覺羅廕生監生由國子監考試移送吏部銓用三十九年定各廕生廕監生由直省督撫及所司衙門題奏送監讀書年滿咨部銓用雍正元年定廕生廕監生內除願就武職行走者照所得品級隨旗行走外其現在通曉文義者交與吏部分給各部院試驗行走其未能通曉而學習文義者將十五嵗以上送國子監讀書年滿學成移咨吏部彚齊十人奏聞依次均分各部院學習行走按班銓用有幹練者堂官即行具題照品即用尋又諭大臣等所得廕生廕監生內二十嵗以上者分給各部院學習行走外省大臣各官得廕之廕生廕監生有願在家讀書者以聞又定廕生廕監生俱于到部時考試翻譯寫字再行分部其世襲官員所得三品廕生內考試有列優等者賜以所應得原品二年以廕生廕監生缺少壅滯不得補用命查明年二十以上者題請考試其在外省有願來京考試者聽又命世職一品二品者俱視三品職官例豫廕七年定各項廕生廕監生有二三人到部即考試履厯進呈引見乾隆元年令八旗世職年二十以上者分撥各旗官學讀書每學增設漢教習一人並各撥教射教習一人教之三年定八旗世職入官學讀書者三年期滿引見録用其有雖滿三年而年未及二十者仍留學讀書四年定文武官廕生廕監生未嘗出仕中式而病故及以病殘廢者均許别將詔前所生子孫由部核明奏聞補廕仍計原廕廕生豫廕之年月選授其承廕監生已得官職及科目已中式者不得補廕已補而又病故殘廢者不得復行請補再文武官廕生廕監生肄業期滿由監咨部除已經補用外其注册而未授者得廕之官革職則子孫奪廕其左遷而尚餘微職者所廕免革若得廕之官革職復還原職或還職後别緣事左遷及革職後奉特旨起用品與原秩相當或在原品上者均許其將原廕之子孫咨部奏聞還其原廕倘原廕之人殘廢病故或于奪廕後業經出仕中式者聽其别將詔前所生子孫咨部具題補還原廕仍照先時豫廕年月注册銓用十一年定廕生到部試以古論及時務䇿奏請欽派大臣閲卷恭呈御覽其文理優通議論明暢者照例辦理荒謬者發回讀書三年後再行考試閲卷大臣即于摺內聲明停其引見十二年定廕生到部守候已逾三月尚無續至者即奏請考試引見十七年定八旗世職既于兩翼設官學以訓之應將現在于國子監所屬之官學肄業者咨回各旗並裁八旗官學增設之漢教習其弓箭教習亦令回本旗别用三十四年奉上諭內外文武大臣皆分職任事為國宣力分應豫廕世爵公侯伯等祖父勛庸懋著錫慶承家即照一品豫廕亦與延賞之義相符若子爵男爵之一品二品或先世績本稍微或承襲久而遞減平日並無職任不過朝期上班及本旗應差不應與內外大臣公侯伯等一體豫廕著照雍正二年諭旨子爵視三品官男爵視四品官下部議行勳廕附元至元二十五年修國子監以居胄子續文獻通考謹案元史選舉志太宗六年命侍臣子弟十八人入學世祖至元七年命侍臣子弟十有一人入學八年選胄子托克托穆爾等十人肄業國學俱在二十四年未修國子監以前附識于此至元二十七年敕從臣子弟入國子學同上大德八年增置國子生選宿衛大臣子弟充之同上至大二年擇衛士子弟充國子學生同上至治元年命世家子弟成童者入國學同上謹案元史世祖至元八年始立蒙古國子學于隨朝百官及集賽台官員選子弟俊秀者入學大抵元之世胄俱入此學而不在集賢院所屬之國子學也故稍載崖略以存一代規制明明初因前代任子之制文官一品至七品皆得廕一子以世其祿後乃漸為限制在京三品以上方得請廕謂之官生出自特恩者不限官品謂之恩生或即與職事或送監讀書既從廕敘由提學官考送部試如貢生例送入國子監明史選舉志成化三年令大臣三品以上子孫許一人送監照監例出身從助教李坤請也給事中李森以為不可帝諭責其刻薄第令非厯任年久政績顯著者毋得濫敘續文獻通考謹案明自宏治以後凡京官三品以上已經考滿許一子廕敘免考送監惟未及一考及有過劾退或年逺而由雜流出身者乃不許廕其廕子未仕物故許其補廕無子者許廕繼嗣之子若例得廕子而先沒者許其子孫陳乞其中亦有有子而願廕其姪者或有以廕而舉于鄉復以其次子補廕者有以嫡子之子補敘至孫曽者凡登極册立邊功加恩及常典之外私情陳乞皆得豫廕世祿之子由此冒濫梯榮其卓然有勳業可紀者蓋什不一二焉成化十年令公侯伯初襲授者送監讀書祭酒循學規以教之惰不率者以聞辟雍紀事謹案明太祖洪武元年命品官子弟充國子生三年命功臣子弟悉入監五年命年幼勳臣及武官子弟初襲爵者悉入監辟雍紀事所載蓋循舊例而復加申明也成化十八年禮部奏請廕生入監必先試經書大義非優通者勿許續文獻通考宏治十八年定例東宫侍從官講讀年久輔導有功者殁後子孫乞恩禮部奏請上裁明史選舉志正德元年定東宫侍從官年勞已及三年者一子即授試中書舍人習字未及三年者一子送監讀書同上正德八年定東宫侍班官三年者一子入監同上正德十六年定例文武官死于忠諌者一子入監同上謹案建文元年以吳雲死節雲南録其子為國子生是為恩生之始後守土官死節皆得廕子嘉靖元年令公侯伯未經任事年三十以下者送監讀書尋令已仕者亦送監同上萬厯十二年定例三品日講官雖未考滿一子入監欽定國子監志卷三十八

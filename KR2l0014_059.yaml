body:
  text: 藝文四詩賦初拜國子祭酒釋奠太學作王士禎雍雍禮樂地肅肅堂廡深皚皚素雪零鬱鬱青松隂堂上鐘虡懸壁中絲竹音末學愧承師撫躬實難任文學盛鄒魯流風感至今早入矍相圃夙侍緇帷林未能習禮器遂以玷華簪聖朝敷文徳憬彼胥獻琛岧嶤白虎觀諸儒粲璆琳議郎悉承制更老多横襟低徊宫牆下如聽師襄琴丁香花詩并序謝履忠太學東序相傳有丁香一株前明大司成龍石許公復領成均因出為南京少宰感維今昔對花寄興形之於詩自後同聲仰步者有司成張水南司業王前峰諸公備鐫於石歴世久逺詩石尚在詢其丁香遂不復識其處矣夫萬物興替何常揚之則顯匿之則晦千古靈區異境前人開之後人忽而不理歸於煙飛雲滅者豈可勝道及今得睹斯石猶見古人味其遺言惟恐墜地乃與大司成華西坡李南屏司業登宣之諸先生探究是事循圖相基重起室宇三間更植丁香數本時當春莫花開素苞繁萼騰彩敷華自公之暇羣賢濟濟撫景言懷曠如奥如致足樂也闡昔聞而啟將來獨非流風相續之一機乎忠夙窺翰墨之林兹以教導為業思步先達之清塵冀増學宫之雅趣爰綜聖教序半截碑字集為五言古詩并引其端以記日月謬典國子教宏道慙明時石室契前哲往跡勞夢思名花植幽境風月朗四垂遐哉歴百年獲覩翰墨遺懷賢引同志鑑古尋髙基排日剪荒穢庭宇曠東維非無衆卉麗丁香夙所期一朝復清觀心儀良在兹餐霞仙侣接問業諸生隨早春見苞茂還憑化雨滋勝事常不朽遊息端有資願言躡軌躅將使來者知石鼓歌陳廷敬石鼓歌者韓與蘇我今捉筆捋虎鬚蚍蜉撼樹何為乎推尋鳥跡閒自娛皇頡古愁凝斯須浮雲變化萬事徂斗宿下天羣靈趨羲娥掩苒焚劫餘陳倉之野纍纍俱髙穹如屋厚土鋪古物敢侮明神扶博士西顧空嗟吁偉哉餘慶亦一夫鳳翔廟置煩枝梧是時十鼓一鼓殊偽有作者其誰與傳師向氏何雅儒殷勤求訪鼓不孤辟雍保和皆埤汙大觀靖康尾畢逋東遷北徙鳳在笯王宣撫宅湮榛蕪虞集矯矯真吾徒羅列國子森津途安頓妥帖星當樞聖道無害兹無虞天作石鼓宣籀書歐陽雖疑理不誣獻襄宇文宣所奴寳玉詎可方碔砆嗚呼石鼓窮鎪鏤流浪豈憚馳與驅艱難歴盡形糢糊鱗甲剗落中不枯人生誰能汝鼓如時哉不遇生良虚我歌石鼔排鬱紆韓蘇歌後補所無古栢行吳苑夫子廟栢數十株托根自與尋常殊霜實時時垂玉琲風枝往往鳴笙竽含貞挺節亭亭竦儼如冠劍森相拱小者猶留十數圍交柯屈鐡煙濤湧一株參天勢更竒鬱蟠元氣何淋漓摩挲嵗月猶可識許公手植非𫝊疑蛟龍攫拏雷雨作黛色翻從半空落斑鱗㸃盡秋後霜百片青銅光灼爍新甫山頭樵徑封武侯祠堂碧草叢西川東魯逺莫致何由突兀撑晴空當年元儒推第一遺經辛苦窮編葺嘉樹栽培用意深周模孔楷千秋則至今偃蓋拂雲端雍容子弟趨盤桓豈徒材大資梁棟直欲香清集鳳鸞君不見上林崇臺千尺髙青棠赤椑皆凌霄若論嵗寒卓堅骨坐使萬木慚丰標雝池管領真遭際南榮歳嵗涵葱翠蒼軒櫺門映日寒素華璧水縈波細攀枝摘葉有所思六館三舍應爾師豫章七年人始知不然丹漆將安施石鼓歌吳苑辟雍鐘鼓羅俊竒忝臨六館重皋比廟楹掃塵釋菜畢顧視石鼔環廡墀彭亨菌蠢數盈十刻畫文字符鼎彛文百二行字五百從甲至癸完無遺始終紀述漁狩事中載䇿命諸臣詞細文淺刻堅且好閱三千載光娥羲曽經缺齧受風雨豈用蟠負承鼇螭韋韓二蘇染大筆助流寳氣長赫曦周宣王時史籀作車攻吉日堪肩隨篇章排比類吉甫體源質古超相斯誰何小儒恣評駁不究根本多然疑先秦西魏駕空說嗤㸃欲使成瘢疵自來神物多𨼆見晚出往往千秋垂周官左氏右六籍夘金專門叢詆諆至今首冠甲乙庫儒生穮蓘如畬菑撫兹鼓質最龎厚琱琢山骨窮㕒厜雍城城南久托迹蛟鼉鸞鳳藏瓌姿辭嚴義密難諷讀句奇語重誰思維鴻生鉅學茫不識任春日炙秋風吹縱敲牧火礪牛角却免摹搨傷皮肌譬如深山石犖确歳月久逺無成虧文王紐在禹追蝕其豈屬屬聲音為自唐訖今始的皪日星雲漢光天逵髙駝巨艦凡四徙終然碁置文宣祠百靈呵䕶神作合𫝊萬萬世遐無期方今天子闡絶學玉函金版皆繙披詎惟瑰辭追雅頌直使鐡畫伴繇芝黼帷丹扆多制作慶雲五色紛葳㽔黄支烏弋逺受吏海外來學航於兹峩峩髦士拂芹茆軌度肅整趨委蛇聖謨文治四洋溢浩蕩匝匼無津涯講蒐前制載編牒或按周典揚戈麾威靈宣暢讋函夏秀弓彤矢斑陸離從臣才藝敢誇詡稽首拜獻成功詩天球琳琅刻金石潤色鴻業攀姚媯炳麟煌煒照六合卓然此事有職司研搜故實要參考名為石鼓良乖宜建康天發石三截暨禹岣嶁堪旁推石形似鼓制非鼓徇迹忘本差毫釐摩挲彷髴古人意定作閱武岐陽碑石鼓歌王原我謁太學嵗丙寅九秋既雨天氣新廟貌肅穆迥絶塵右平左墄通堂陳㦸門森立髙嶙峋内塾十鼓碁布匀周宣垂今二千春三代法物希世珍文謨武烈墜復振烝民韓奕學士呻方叔召虎儕鳳麟尹氏仍氏詞絶倫大小二正存其醇大蒐岐陽韎韐親迺命譔列示無垠編詩不入昧所因翻幸虐燄逃暴秦陳倉滅没同泗淪李唐獲九竒不純其一刳中投杵頻皇祐得之田野民呵䕶浩刼宜鬼神鋄之黄金錯白銀金人剔取馳北輪宣撫宅廢薶管榛虞公請置功不泯朅來摩挲餘百廵史籀不作難考詢手畫生胝吟燥脣心重古器詞罔伸斑斑駁駁星向晨三百廿五龍蛻鱗九未全蝕亡一辛耳目荒忽雲雷屯鳥跡蝌蚪辨莫真蛟蟠鸞翥勢未馴韓蘇鉅公生不辰强尋難讀淚墮巾矧當愚䝉識如燐邈從天漢窺涯津麋鹿連連驂騝駪維鱮維鯉以栁緡約畧大義車攻鄰難以意解取笑嗔我聞彛鼎銘至仁武功勒銘則鼓錞合江鐘石紀禹禋厥制最古聖所循之罘詛楚焉與鈞麗牲沿俗羞彬彬崇尺有咫徑度逡銳上廣下妥帖蹲臼仰虚受鼓覆均圍圓質厚膚理皴緬懷上古風何淳封山禪亭空積薪大書特書摩貞珉髙陵􅿺陊邃谷湮其蹟盡逐雲煙湮惟聖有作無緇磷縱亡其器詞在紳授受箋釋窮白申况𫝊此鼓士響臻絶勝熹平觀經人怳與楊解揖讓賓幾忘渺末蟣蝨臣生逢冀充介僎澘然後百六紀身讀王令貽石鼓歌追和子瞻韻張尚瑗嗚呼古來人物顯晦不可常軼事難從訊遺叟掩抑千年忽昭掲蛟龍撝䕶五丁走魯宫魏冡竹素書祇今一一誦人口烟銷煤燼行復著何疑獵碣初唐後爾曰陳倉披草看十亡其一唯存九剜刮土荂拭苔繡琅琅炳若天星栁遂令流𫝊編好事周廟錞于甄墓斗韓公蘇公詩繼作淋漓大筆字運肘聚觀日多口日衆瘡痏彈射爭好莠由來名盛百毁生疑信喧騰供惡友此鼓自唐流至今子復生孫雛哺㝅立乎哀定指𨼆桓零編斷字皆蝌蚪就令餘慶偽手造已堪閱世稱耆耉何况宇文與嬴政羣言示吽一夫嗾聖朝崇儒興禮樂峩峩泮璧新鬯卣虎觀還聞聚學徒鹿鳴曽説歌矇瞍十碣依然盡無恙靈文翕赩齊岣嶁圜橋受學肩相差古物摩挲手胝厚韋帶摳衣階下誰江表鯫生名氏某觀碑亦厠羣英後俯仰從前難希有司空解辨桐魚鼓中壘能知貳負杻搜求茫昧須博物奚懼墳羊與土狗所嗟歴劫仍至此劉蹶嬴顛視若偶邱墟已聴幾鵑聲輦載頻回萬牛首向使仍前尚淪汨牧兒蹴蹋蕘童掊直置金鐘大吕間陸離光彩人爭取自古成名在得地清水難同濁泥垢要之至寳不終棄自分球圖堪世守琉璃質脆櫧葉輕斯須悅目旋彫朽嗚呼君不見方召功勲樊尹才文字模粘石猶壽石鼓歌用蘇子瞻原韻和王令貽張宏蘧宋犖我髪未燥心好竒周宣獵碣詢遺叟執經曽為國子生屢肅衣冠㦸門走嶙峋驚覩石鼓文欲讀牴牾難上口累朝考究窘鉅公矧我生當千載後樸質輪囷列仍十古蹟剝蝕載維九臨池書學眇蟣蝨筋骨徒教誇顔栁嗒然對此喪所懷昂首髙天爛箕斗我車我馬辨不易畫肚移時動右肘繽紛光景浮雲敲𨽻楷俗書埽稂莠强尋邉旁鬱深衷乍測奥義呼良友卧度夘酉推索艱如趙武靈探鷇㝅憶昔中興蒐岐陽紀績銘功勒蝌蚪歌辭烜赫躋雅頌從臣撰述定耆耉或云嬴氏或字文異議相沿誰所嗾天留重器登成均壓倒犧尊與鬯卣趨蹌上舍勤俊髦想像歌工煩矇瞍金石刻畫蛟鼉盤聖作巋然並岣嶁朅來摩挲儼落星元氣淋漓蘚荂厚昌黎子瞻遞咏歎音訓豐碑表某某蹉跎三紀緬神物光怪羅胸詫希有厭親簿領謝文翰忍見庭除設械杻拓本寓目心一洗斯邈以還等瓦狗陳倉淪棄鳳翔遷日炙火燒存亦偶流𫝊奕􅑤位置妥蹲䲭排比齊其首臼窠曽憐任舂揄牧豎幾遭來擊掊縱經鄭重金玉􅦒播蕩戈鋋旋剔取嗟哉顯晦固有時至寳終難辱埃垢出之泥草獻清廟祭酒先生昭世守江右兩生韓蘇才鞭撻風騷若拉朽石鼓之歌欲和難應附此物千萬夀仲秋釋奠湯右曽海甸同文日橋門釋奠時牲牢遵舊典肸蠁肅神儀道統三才合儒宗百世師器猶存俎豆祀已重壇壝律應清商管齊先上戊期侵階開紫陛列仗擁黄麾韻欲流金石尊看潔象犧璆懸存虡業瑤篚薦堂基素壁留香久靈風卷幔遲僾如函丈接炳若日星垂醴酌思遺版車攻有舊碑槐隂當殿合松蓋拂雲欹仙草依幽砌文芹漾碧漪清時修禮樂上相主盤􅓢調變勲方大精䖍意不疲丹楹浮翡翠碧瓦䕶琉璃瑞氣澄清靄祥光接曙曦淵源繼顔閔名徳重臯䕫璧水羣賢在蘭臺百籍披宗風𫝊絳帳家法守皋比吾道今安仰斯文總在兹青衿諸弟子聨袂獻新詩太學紀事十首彭會淇謁廟夙昔蓬山展拜䖍移官喜近聖人前雍容導引羅衿佩親切趨承到几筵末學愧分新絳座儒臣榮溢舊青氊回思釋褐春風日叨被恩光十七年釋菜曈曨殿角啟朝暾月吉親師古禮存肅若朝儀齊虎拜頒來法醖獻犧尊教先鼓篋歌鳴鹿潔薦溪毛效采蘩樺燭影搖羣吏散緑隂深鎖映朱垣齋宿初擕襆被入西廂半榻琴書靜夜張聖主齋宫親祝册小臣清署自焚香鈐聲到枕風吹閣栢影横階月轉廊𨼆𨼆晨雞纔動聴橋門劍履已成行陪祀春秋秩祀重雍宫庭燎光齊鹵簿同鵷鷺隨班光九列牲牢將事盡三公欣從俎豆趨承下得厠衣冠拜舞中分胙擕歸叨聖澤也登鼎實薦宗工觀樂釋奠工歌雅奏揚先期陳設兩楹旁賁鏞駕刻螭頭重簫鼓形摹鳳咮長譜出元音風渾穆𫝊將法器日輝煌聖人自建中和極豈獨司存有奉常會講夜燃藜火一燈青曉起攤書向廣庭談引清風傾滿座坐移晴日上疏櫺噌吰鐘鼓齊觀聽想像羮牆見典型自是熈朝文教洽期門子弟盡横經校課廊廡隂森樹影髙每擕多士競濡毫當年問字惟寒畯此日程材盡譽髦淬厲秋風誰奮翮吚唔午夜尚焚膏國恩思報慙無補次第鉛黄敢憚勞習射矍圃風流在澤宫不徒男子事桑蓬即今禦侮歸樽俎大抵竒英讓沛豐决拾既調年正少鞬櫜纔解賦還工太平天子勤蒐狩好侍長楊與射熊檢書太學書樓儼石渠登樓猶見有藏書棗梨充棟沈蛛網篇帙盈箱走蠧魚檢㸃不辭臣職在捜羅應念國恩餘我皇著述髙千古好待新頒内府儲修碑牆隂石碣幾縱横土蝕苔侵草自生剩有姓名𫝊甲第尚將年號認元明虎闈標榜承新寵雁塔留題感舊情幸際昇平文物備殘碑拂拭若為榮遊國學摩挲石刻恭賦二律劉凝雲烟滿目結交神樂石於今始得親瞻聖雁行如弟子聳霄虯幹遜先秦殿前老栢六十一株䕃蔽數畝肅人心目其巨者合抱右旁一株輪囷離竒尤為古物産岐遊汴老燕邸辱臼榮金續火薪暮雨朝風悲嗼桐魚考伐和鳴錞幾家箋注幾家詳史籀當年義類長並建兩都通臂指特咨分陜重封疆石鼓詩言言乂安要道至於兩都與分陜尤為西周一大闗鍵采詩原不編金石孔子西行不到秦此韓昌黎謬解汲古寧堪比衛王篇什固多知者少寒山共語歎岐陽太學白丁香詩雍試作周清原翠靄輕籠靚素籹枝頭㸃㸃綴寒光月明有水皆為影風靜無塵别遞香一自宫牆容弱質漫隨桃李鬬穠芳獨憐澹冶當春暮應許栽培向玉堂文廟釋褐數仞宫牆霄漢連兩楹俎豆故依然曽陪鼓篋三千士重到橋門二十年末學豈増科目重菲才特荷聖人憐較他儕輩䝉恩早獨在青衫未換前石鼓歌沈徳潛九天星精化為石墜落平地三千霜纍纍十鼓重琬琰迄今太學生寒芒籀文蝌蚪形髣髴强尋跟肘推偏旁車攻馬同建旄旐東都氣象何焜煌蛟龍觺觺牙角厲羣靈荒忽驂鸞凰字𫝊三百三十四其餘齾缺難推詳始從陳倉歴鳳翔輦來燕京由靖康飄零遷徙閱兵火石刻直欲關興亡周秦真蹟多漫滅穆滿馬磴𫝊荒唐嶧山之碑遭野火之罘片石付渺茫中興獵碣獨無恙成周昭代遙相望神明鬼物永呵䕶天應眷念岐西王聖賢法物理不朽豈以世逺淪滄桑傳聞禹碑在岣嶁紅文緑字垂琳琅昌黎搜索不相遇咨嗟涕淚流滂滂後人尋山得蹤跡恍惚雲際摩青蒼安得移載置一處臯益申甫陪同堂方今聖皇崇道術辟雍鐘鼓紛趨蹌圜橋聴講日千計何止觀者如堵牆討搜遺文補殘缺驂騝趩􅞚煩校量長楊從獵撰詞賦敷陳功徳追岐陽自慚貧賤伏草莽仰望無路排天閶成均古槐歌張若霍洙泗微言啟靈鑰一燈未墜承伊洛宋元之際許懷州間起相師返衰弱當時講習擁臯比胄子侁侁聞木鐸一勺難窮學海瀾三雍敬奉人師約雲蒸雨降名嶽尊芒寒色正秋星作東西兩序集儒紳地靈一氣相迴薄西山蒼翠落庭除璧水澄波下寥濶講堂髙踞西北隅鼉鼓鯨鐘振絶漠是時樹人等樹木梁棟名材入斤削有槐成市古所云拱把微生手親度不知樹閱幾滄桑成毁曽誰考崖略天禧古栢慈仁松僵立青冥煙雨合腹垂癭疣穴螻蟻巢怯童髠翻鸛鶴巋然獨剩魯靈光五百流年箭雜彍我朝文教遍遐陬萬里如呼順風納執經負笈逮諸蕃侍子冠巾雀魚躍四海謳歌答管絃兩宫温清聞韶濩長樂筵陳萬夀觴天酒春生聖人酢丹鳳門前字十行詔曰求賢兼賜爵壽母推恩及泮芹文思肄雅賡場藿懽聲雷動九衢人六館生徒躡芒屩此槐冬枿忽春榮生意婆娑頓如昨槎枒老榦出勾尖張王新枝翻笋篛虬鬚徐展碧氍毺兔目紛翻緑瓔珞鳴風不改舊笙竽作勢仍為古拏攫金絲殷壁衆音和石鼓搜竒千手拓堵牆觀者歎且詫漢栢秦松皆退却産祥當與孔檜俱論年何不莊椿若一物能迴造化慈千秋不受風霜虐澤及太清下太寧芝草葳㽔醴垂酪淑氣先徵首善區光風早扇幽人壑小臣額手誦薪槱願植巖廊光五柞太學十詠王雲廷周宣石鼓頫首謁橋門蒼然獵碣存籀書三古逺法物百王尊繡幕金華殿沙流石鼓村何如托韓筆長此老乾坤元代老槐堂右孤槐在留𫝊說魯齋春風今已邈手澤尚堪懐雨色蒼皮溜苔痕朽骨埋鼓鐘誰繼響寂寞伴空階栢庭翠䕃鬱鬱復葱葱參天黛色同染袍分栁翠照案映藜紅晝靜常疑雨庭閒自嘯風斜陽銜殿角金碧聳層空石井甘泉丹墀檜影森下有寒泉冽未辨活水源頗憂脩綆折一泓鑒鬚眉古甃藏冰雪應為苦吟人酌兹消煩熱兩序書聲書聲喧兩廡無復辨琅琅疎宻參簷溜悠揚徹院牆閉門山共靜抱膝興偏長何處遙相和新蟬噪晚涼六堂燈火傳柝三更靜挑燈六館明參差螢案亂掩映月忩横風露空堂迥凄其夜氣清懸知太學客不羨照長檠長廊步雨積雨長廊寂跫然聴足音入簾多草色環戸半槐隂好鳥時三哢幽蛩更一吟不須深谷去自少軟塵侵射圃歸鴉一望蒼茫裏閒登矍相㕔歸鴉寒樹集落日逺山𠖇過此懷觀徳何人繼勒銘寧須盡投筆編簡始垂青輦道月明皓月紛紛白彝倫堂外多長衢光瀉水夾徑露穿莎涼意生衣袂秋聲入院柯倚簷還展卷莫問夜如何橋門雪霽雪後望宫牆粲然出紛繪鏗鏘墜簷簪瓔珞挂庭檜拂石有古碑踏冰挹晨靄豈惟耳目清悠悠與神會詩賦附元石鼓賦有序周伯温予嘗考古石刻而岐陽石鼓為第一每讀韋韓蘇三君子之歌心蓋竒之訪諸士大夫具在京師欲往一觀而無由也皇上踐祚之始年有詔置石鼓太學遂列於宣聖廟之兩塾尊之也明年改元皇慶余列國子生撫玩之獲償所願夫以三代遺物置庠序中盛典也韓詩有云聖恩若許留太學諸生講解得切磋蓋欲而不得故冀之於乎韓公不得見於昔時而吾輩得見於今日何幸如之輒為賦曰周有石鼓今在辟雍列橋門而甲乙相輝暎於西東紛質理之泐蝕偉形制之穹崇有文秩秩有詞渢渢法皇頡之妙畫續小雅之變風蔚兮九天之儀鳳蜿兮六合之神龍欣獸魚之物庶嘉車馬之攻同歴歴兮瓊株森竦於元圃依依兮神雲𨼆見於蒼穹嗟追琢之渾厚或制作於天工於維宣王宏振頺綱四國既遂百職既張兹農暇載飭戎行踵武前人蒐於岐陽史籀才藝當時俊良播之聲詩勒之琳琅其形之不一者因樸質之自然其數盡於十者表治極而功揚在戰國暴秦而韜晦者抑貞介逺其汚辱歴兩漢六朝而不泯没者必神物為之䕶防嵗紀茫茫顯於李唐韋韓歌之藹其有芳迄宋宣和斯遷於梁金人襲没遂歸朔方維天子之龍飛當文運之日昌誕降徳音輦登上庠文石重藉用衛兩旁六經彛訓因時表章大比曠典同曰舉揚遐邇縱觀陳迹復彰嗟夫九州之鼎已沈淪而不可得岣嶁之石又漫滅而不復有惟斯文為至寳實終古之罕偶惜捃摭之有遺不見稱於魯叟何人之蚩蚩窪一為臼質損文存庸詔永久後乎此者豈無祖龍之頌功茂陵之封禪亦皆埋仆於榛莽雖萬一之或𫝊適足以著其君之無取然則石鼓之周流於世者天非徒夀之蓋以寄古文於不朽也乃作詩曰刻石鼓兮周賢王置之學兮自我皇紛胄子兮樂未央曰詠歌兮揚揚維大道兮無疆齊地久兮天長維斯鼓兮作配勿壞兮勿傷保億齡兮於耿光賦彚送國子伴讀倪行簡赴京吳澄瀲灧離杯泛九霞還家未久便辭家出門惻惻重闈逺前路漫漫萬里賖不怕狂風妨去鷁偏愁寒月照棲鴉諸生凝望須君至共贈新詩賞雪花草廬集書上京國子監壁虞集神京極髙寒幽居了晨夜雷風無時發零雨每飄灑炎光不到地蕭爽度長夏大化漠無宰豈必事陶冶揚雄不曉事守道栖栖者元經百無徵白髪謾盈把道園學古録次韻國子監同官二首虞集坐𨼆烏皮髀肉消諸生應笑嬾邊韶階前老馬隨秋草袖裏遺編俟早朝乞米西鄰晨有粥思家南國暑無綃經明亦是歸耕好清夢無時萬里橋學宫南直禁垣隂假寓惟愁兩壁沈一曲鏡湖遺老事三年經幄小臣心銀河囘夜天逾近草徑迎秋露轉深珍重鄉人居巷北時能來往和烏琴同上辟雍賦楊宗瑞聖元誕膺天命徳洽仁浹三陲晏然萬國臣妾神聖代作武功赫然天啟聖皇乘龍御天登三邁五繼後光前斂五福以錫庶民橎仁風而胞八埏厭吏治而樂士賤逺物而寳賢乃尚文徳韜武功一制度作辟雍聲教被乎遐邇隆運軼乎時雍其為制也璧月印海洄風舞漪方壺屹兮中峙長虹爛兮四垂黌序秩兮奐輪簷甍翊兮翬飛産三秀兮殿楹羅石鼓兮庭闈八户闔闢兮乾坤九楹儼雅兮壁奎鼓鐘頌其於樂振鐸宣其教辭翫芹藻兮澄碧俯菁莪兮中坻澹文魚兮遊戲肅威鳳兮來儀乃有髦士碩儒咸集於兹馴良喻兮徳驥朋來况兮總龜紛冠蓋兮後先翳裾佩兮陸離建嘉猷兮二典擬鴻休兮六詩並追芳兮伊周齊接武兮咎䕫含咀繽天之葩欬唾明月之珠是皆素邱園之賁而來賓上國之輝者也至若萬乘戾止六龍馳馭日表肅穆天顔沖邃百王駿奔千官肅懿以祀以饗禮嚴物備飲食三老釋奠素王洞洞屬屬濟濟蹌蹌耄倪仰聴而咨嗟億兆嚮風而樂康在泮宫而宴樂陋魯侯而不齒圜橋門而觀聴視漢世其孰昌乃進諸生論經史研治否推今古色笑以教匪狎匪怒聖敬曰躋恩渥時澍頌聲嫓乎韶夏慚徳薄夫湯武於是益窮致治爰發徳音誕告多方簡擢士林思臻霖雨之佐以協宵旰之心集天下之英才軌行藝於京國鵾鵬奮兮南溟驊騮空兮冀北捫膺拊心揮雲吐虹來遊來歌載歌辟雍歌曰環璧水兮作辟雍建文治兮啟淳風進多士兮表至公翳令徳兮垂無窮恢宏庠序之制作兮酌凖成均之遺蹤固非後世之所擬倫兮宜與唐虞成周而等隆不然何以表皇元萬億年太平之成功賦彚石鼓掲徯斯孔廟頽垣下周家石鼓眠苔分敲火跡雨洗篆蝸涎野老偷為臼居人打賣錢有形終一盡流落漫堪憐秋宜集陳彦理昨以漢石經見遺今承寄詩索石鼓文答以此作吳萊横山先生多古玩太學石經分我半魏公世藏資州本金石録中還散亂當時愛竒巧收拾筆畫昭回映雲漢流𫝊到我乃不逺虬甲鳳毛真可惋自從得此未有報岐陽石鼓天下觀昔則敲火今斵臼駱駝載歸石盡爛倉沮以後即史籀先代遺寳列圭瓚中郎變篆生八分二者不敵何足算先生嗜書出法帖青銅堊壁手脫擥漆書科斗不通俗蛇蚓蟠結强塗竄先生博學抱聖經焚膏繼晷日躭翫韋編鐵擿只紙傳鄒魯精髓合淹貫國子門開塵没城蓬萊閣廢草堆岸春秋徒聞璧可假道德詎信鵝能換古今所重在周典周史面目極聖心不死不在石日月行天旦復旦吾家故紙本不惜驪頷有珠吾欲鍛向來見辱亦云然焦尾之餘爭免爨先生安坐幸勿躁歲晚相逢笑拍案屏除許事不須說好與吾儒峙楨榦吳淵潁集贈陳九成遊國學李存黄雲潭潭天欲雪陳子初來即言别值吾築室正狼籍為煑春茶供再啜子宗九江稱義門明年挾策遊成均奎章先生賦詩贈秋波一幅清無塵竊聞國初許祭酒正義堂堂古希有諸王駙馬皆敬憚帳下公卿列先後即今規矩猶當時肥羊大餅午不飢願君努力積分數他日錦衣當晝歸元文類明石鼓詩有序唐之淳洪武丁卯秋九月余在燕城觀石鼓因賦四十韻己巳三月鄉友趙撝謙氏持墨本來京師俾余録諸卷尾郡學舊辟雍中有岐陽鼓古今所聞十左右各惟五離離大星隕兀兀壞雲補纍纍營竈減落落陳沙聚質若切元玉制若覆氣釜精若鎔五金文若斷釵股孤峯割秋瘦千葩耀春嫵森嚴列戈矛爾雅冠章甫厓冰溜靜懸海暖浪掀舞推輈半折軸敗舫或遺艣小龍彭蠡歸大鵬扶揺舉斷苔明碎錦古墨漬潤礎思昔委秦郊雷電驚草莽耒牛礪其角鑿臼加以杵幸今依黌宫星日照廊廡圭璧遜其儀俎豆與之伍脫非天意憐或是神明祐深檐白晝永老屋翔鸞翥晴連晝㦸隂冷濕宫牆雨諸生獲講解髦士資訓詁啟鑰煩豎閽搨本利商賈韋辭表姫周韓語懷李杜雄章迭鏗鍧遺恨寄酸楚紛紜歐蘇作詰屈薛鄭譜稱評雖靡定仿像詎非古鯫生千載下匏繫三江滸神徒馳周南足不出城府適從遼碣役遂作幽燕旅平生慕竒聞一日獲嘉覩初臨色愈莊欲狎氣斯沮如親至東都揖讓申與甫如親與田獵搏攫兕與虎如虚藜莧腹烹太牢肥羜如洗蜩蟬耳聆笙磬柷敔羇愁破昏懵喜氣浹眉宇時維躔夀星嵗甲在疆圉天寒號䲭梟城荒茂禾黍宗周本余懷覽古亦天與摩挲重圖訓䠞蹜媿庠序聊陳曹檜風式繼韓韋武萍居稿登崇文閣陳璉巍乎髙哉崇文之閣兮吾不知其幾百尺突兀直倚蒼㝠中雕簷髙飛近曉日瓊牕洞啟來清風前瞻兮帝闕下顧兮辟雍京畿鬱兮千里五雲近兮九重太行西來兮迤邐居庸北拱兮巃嵸峯巒逺近共環峙削出朶朶金芙蓉是中竒勝甲天下何况此地名儒宗圖書浩瀚紛莫數文光夜吐猶晴虹漢家天禄之不可復見兮幸喜斯閣之髙崇值校文之多暇日徙倚而從容愛扶輿磅礴之竒秀兮呼吸盡使歸心胸闌干笑拍飛鳥上豪氣不減陳元龍俯視十二衢車馬塵濛濛欲招李謫仙更拉東坡翁長此共笑傲不使心忡忡葡萄酒傾瑪瑙甕日醉三百玻璃鍾人間亦是有勝境何必逺度扶桑東願裁上雲樂進入蓬萊宫上將萬夀祝天子文風聖化永與天地長無窮文翰類選石鼓歌李東陽昔聞石鼓在太學鼓形穹窿石犖礜髫年釋褐隨班行未識研覃與揚㩁始官翰林嵗分獻晚以代祀觀尤數我思古人不可見健筆雄詞兩超卓宣王謨烈繼成康况有文章存古朴是時風俗蓋渾灝其臣拜頌俱堅確勒功太廟告中興講武岐陽猶獵較于時旋凱奏鐃歌于時揚言播聲樂靈祗地不愛圖書引石天然謝雕琢垂垂股折屋漏痕𨼆𨼆昏星露芒角初如淮徐振師旅壯士當場鳴劍槊又如申甫端冠紳擯相聨階舞干箾年深嵗長世運改誰向鴻荒究緜邈嬴劉以後無此文直與混沌分清濁驟看筆勢尋風骨細剔苔痕認斑駁原抛野擲墮榛菅冬經霜雪夏冰雹疑隳大鼎存銘識似毁明堂露榱桷當時十鼓一為臼猶幸農家事舂㪬愛惜應勞神䕶訶搜尋不厭山磽确暗中摸索亦可知辨口尚煩泣楚璞聖朝天子方好儒森列㦸門䕶重幄聞之興慕且興敬以手摩挲防擊撲我生學篆希前蹤下視俗書羞齷齪家藏舊本出梨棗楮墨輕虚不盈握行年七十始研求老臂支撑目昏眊拾殘補缺能幾何以一涓埃禆海嶽太原宋生生好竒鐡筆為予親刻斵吁嗟往者不復還庶免方來盡漫剥請從祭酒告諸生誦此衣冠日薰濯懷麓堂集三月八日扈從視學聽講說命文言有作程敏政萬乘隆師禮不煩上庠開講重淵源朝衣絢日金緋匝御幟迎風錦繡翻相業古來存說命從龍今日感文言鳳團分賜叨陪坐願續聲詩紀治元篁墩集彭祖觀井圖吳寛賈客適江海洪濤渺無津忽然颶風作舟楫竟漂淪蜑叟川上浴何殊白鷗馴寧知有飢鰐俟汝水之濱履危信多險處坦終無屯所有下堂戒名言推子春鬱然大樹下誰寫彭祖真飄蕭白髪叟千年貌如新草間者塪井蛙股諒可伸保身乃至此夀合希莊椿古人不可作故事從誰論此老飲水活應仗汲井人彼欲一往觀人當置車輪中心宜怵惕豈徒保吾身聊成一轉語圖畫固有因兹事有與無不須吾重陳紛紛奉遺體足以驚凡民匏庵集謁孔廟李夢陽端笏陪朝列時禋謁聖林㦸門留石鼓春殿靜珠琴奎府星連切璧池龍躍深詵詵趨國子早晚翠華臨空同集觀石鼓歌何景明我來太學謁孔廟下觀㦸門石鼓陳之罘詛楚已薶没此石照燿垂千春苔昬蘚澀讀難下蟲彫鳥剥細不分古畫詰曲蛟龍𨼆石氣慘澹烟霧紛周王功勲史籀筆數石散落岐陽濱中興氣象豈復覩大篆意格誰曽聞先秦文字稍近古兩漢摹搨多失真六朝以來尚靡麗鍾王往往稱通神唐愈宋軾遞歌歎長篇險韻句悲辛大觀之間入汴國君王好藝崇斯文髙駝巨艦逺載致金填玉嵌𫝊相珍靖康乘輿忽播蕩保和玩物隨烟塵神驅鬼守散復聚至寳豈得空沈淪文皇北來定燕鼎不置太廟留成均博士無煩上書請諸生頗得親講詢虚廊畫壁安置穏大厦長檐覆蓋新不隨鐘鼎怨磨滅已與琬琰爭嶙峋平生博覽愛古蹟世上墨本徒紛紜此雖殘缺嵗已久尚覺隻字輕千緡璧池日月動華衮奎閣星斗羅貞珉嗚呼孔廟在萬世此石與廟長無湮大復集署後丁香爛開有感有序王同祖大司成公廨後有丁香一株閱嵗已久龍石許公再莅辟雍不踰年擢南少宰因俯仰今昔嬰情去來對花賦詩興懷髙逺今大司成水南張公覽而和之金石並奏雅音舂容不可及已祖忝先後佐二公周旋輒次韻并手書登石以識一時盛事不見花開已六年重來相對更相憐花應笑我今仍去我獨㸔花一莞然疎影澹籠春檻月暖香晴拂禁城煙浮生蹤跡原無定海鶴江鴻萬里騫原倡仙卉栽培自昔年上林芳色轉堪憐不愁花樹常為主但寄萍蹤亦偶然春晚軒牕㸔爛漫晝長亭館起雲煙我來公去遙相憶天漢雲槎獨望騫和韻東華塵土漫經年坐對名花靜可憐細雨一庭香自發春風三月興悠然時飄璧水流丹藻更倚蓬山生紫煙最羨羽儀雙彩鳳每從霄漢想髙騫和韻秋祀先師恭述王慎中維馨歆嵗事有侐恭明神豐功報宜重孔祀典攸敦明明天子命宣哲協欽文咨惟百工長曰予克宅臣攝祀昭我將奏假具惟寅庶僚既濟濟多士亦振振肆佾表殷薦大烹羞明禋格思儼無斁仰止儀自遵大哉聖人徳展為帝者賓遵巖集次丁香花韻有序李元春東廂舊有丁香花大司成龍石許水南張二公相繼倡和少司成王公次韻手書登石萬厯癸酉春以司計從事成均依韻賦和興仰止之思耳名花培植始何年玉署相㸔倍可憐不與國色爭竒麗自爾天香出澹然疎影騰霞横絳帳緑隂浮座散青煙倚闌斜日烏啼靜仙籞鶴鳴遶夢騫石鼓歌朱國祚橋門左右獵碣十形如古礎相排連窪中或與虀臼似抱質可敵瑤琨堅𫝊書昔自太史籀比於大篆尤瑰姸其辭典奥儷二雅髣髴吉日車攻篇周京遺製衆所信疑義莫定文成宣紛綸雖滋翟鄭議審視終異秦斤權下逮宇文豈能爾虀堂所見毋乃偏嗚呼人物不易覩三代舊跡希流傳巫咸告辭熊相詛裕陵寳惜今棄捐比干銘折衛州壤穆滿書徙壇山巔㑹稽窆石字茫昧岣嶁祕跡文紏纒掎摭非乏好竒士千搜萬索無真詮詎若十鼓離復合陳倉入汴還留燕氊包席裹槖駝背塵䝉露濯蝸牛涎置諸太學始皇慶於今又歴二百年深檐五丈密蓋䕶不受長雨闌風顛我來摩挲輒終日證以郭薛施潘箋凝思斵桐來自蜀叩之定有聲淵淵文殘非因硬黄搨劃缺反憾鈎金填長廊無人起題壁回視落景棠梨懸介石齋集石鼓郭天中鼓非石霣者星文非鼓勒者銘焚外書刪外經經雅頌書典刑𨽻秦漢徑睒庭篆龍鳥藍溲青臼謝杵舂戮停嵌辭金波畫零我拜手以誦兮神之聴賦彝倫堂前石晷袁廷玉流沙迢迢隔溟渤不取昆吾鑄竒物杏壇花開春晝遲帝遣良工琢山骨圓如蒲璧巨如輪三尺瑤臺髙捧雲子午南北已定位䖍數安用羅星辰六堂深沈更漏早旭日扶桑照林杪一絲影射白玉盤萬井鐘聲報清曉先生盛服坐皋比獨記華磚催直時寅賓出納著二典赤心祇許羲和知爰則晨昏造小子寸隂自昔勤終始期在涓埃答主恩大明教化同一晷栁莊集欽定國子監志卷六十

body:
  text: 識餘臣等竊惟史有外傳子有外篇採摭遺事以廣見聞亦著述家所不廢也矧成均為首善之區我國家隆師典學造士育才之規自祖宗以來勤勤懇懇有加無已筆不勝書言不盡意既分類志之兹復攟摭遺美凡有闗太學典制足以備考証資談柄者事必徵信聞或存疑分紀事綴聞各一卷為識餘門識餘一紀事諸生肄業太學恭遇聖駕臨雍得以瞻覲天顔其他皆不與惟乾隆甲子駕幸貢院諸生與禮部會試舉人在貢院磚門跪迎聖駕各䝉賜六經一部又乾隆辛未辛巳辛夘三逢聖母皇太后萬夀諸臣於西直門至西安門祗候皇上奉皇太后安輿由圓明園還宫諸臣各按分定處所跪迎國子監祭酒司業并合屬官員於西直門通衢之西率領諸生具公服跪於道左辛巳適琉球官生在監肄業情殷瞻仰呈請代奏荷䝉俞允亦得與焉國家有大慶典六館諸生沐浴膏澤往往作為詩歌頌美太平監臣為之􅋔潢成册進呈御覽乾隆辛未辛巳辛夘三逢慈夀己丑文廟落成庚寅皇上六旬萬夀臣監自祭酒以下迄諸生恭獻詩册黌序歡騰士林抃舞洵稱太平盛事凡遇臨雍禮成監臣及諸生先荷賞賚當即具表謝恩衍聖公謝表例由臣監撰擬乾隆三年聖駕臨雍臣監具表謝恩三十四年文廟工成祭酒司業率滿漢屬員八旗教習内外班肄業諸生官學生等赴圓明園宫門具摺謝恩又乾隆元年十七年二十六年三十五年特㫖開科國子監率領諸生及監丞等官之與會試者恭赴天安門謝恩凡修文廟先期遣官告祭敬移神牌國子監派員率教習肄業諸生官學生恭謹手奉不假手吏役以昭誠敬乾隆三十二年重修文廟遣大學士尹繼善告祭本監派助教博士等十六員以八員手奉至聖先師神牌於􅂜倫堂正中安置再備八員更代四配毎位各用教習貢生四人十二哲毎位各用肄業諸生四人手奉安置彞倫堂左右如文廟正殿位次兩廡毎位各用官學生二人手奉率性修道兩堂安置悉如東西廡位次崇聖祠五王祗請御書樓安置正殿毎位用官四員配哲廡毎位各用肄業諸生二人悉如崇聖祠位次三十三年文廟工成祗請還位如前儀凡春秋二丁分胙遣官應分猪首連肩牛首羊腿羊尾鹿脯和羮饌盤飲福受胙牛塊煑羮牛猪一羊一豚膊如遣親王則應分全牛一分獻翰林官二員猪蹄各一羊腿各一監察監宰監禮御史共六員各猪胙二斤羊胙一斤禮部提調猪胙二斤羊胙二斤宗人府猪一内閣猪二羊一吏部猪一羊半户部猪胙十二斤羊胙五斤禮部猪胙十二斤羊胙五斤兵部猪胙六斤羊胙五斤刑部猪胙十二斤羊胙五斤工部猪胙六斤羊胙五斤理籓院猪胙六斤都察院猪胙十五斤羊胙十斤六科猪胙各五斤通政司猪胙三斤羊胙二斤大理寺猪胙三斤羊胙二斤太常寺猪一羊一起居注猪胙三斤羊胙二斤翰林院猪胙十八斤詹事府猪胙三斤羊胙二斤光祿寺猪胙五斤羊胙四斤大僕寺猪蹄二個羊胙二斤順天府猪胙二斤羊胙二斤鴻臚寺猪胙六斤欽天監猪胙二斤太醫院猪胙二斤鑾儀衛猪胙六斤羊胙三斤本監堂屬官員教習肄業諸生執事各生并吏役兵丁人等統俟各處分訖按等次酌量匀分皆典簿㕔掌之即於是日禮畢後具文沠役分送不得遲至次日以䙝神恵貢監生公服冠頂鏤花銀座上銜金雀公服袍青紬為之藍縁披領如袍飾俱與舉人同貢生吉服冠頂銀坐上銜花金監生吉服冠頂用素銀皇謹案諸生冠服恭遵朝禮器圖式纂入翰詹科道衙門堂屬官員俱於堂上設座各部則無之惟臣監祭酒正坐司業僉坐監丞助教等官旁坐如係兩廂講課六堂諸生皆坐而聽講凡六堂諸生遇封印開印兩廂官到任及充補教習辭堂行四起四拜禮其餘上堂只三揖雖有禀請不下跪國子監祭酒司業各就翰林院衙門前後輩相稱呼其與大學士尚書侍郎各照京堂之例具帖監丞以下等官與祭酒司業俱用官衘帖祭酒用呈字上衘司業用正字下衘與大學士尚書吏禮二部侍郎用官衘帖與四部侍郎及四品各京堂用晩生帖五品京堂用侍生帖王士禎池北偶談云祭酒四品與講讀學士較俸陞遷朝班則坐學士下兩坊庶子上康熙二十年正月賜宴乾清宫坐次在東面西與朝班同二十年七月賜宴瀛臺在南面北則序坐於太常卿僉都御史之下太僕卿光祿卿之上凡恩賜書籍或合監數部或毎堂數部或毎旗學數部俱交各所司收貯聽生取閲惟乾隆八年皇上恭謁三陵御製盛京賦刋刻成卷賜國子監肄業諸生人各一部則出自特恩焉乾隆壬申年詔以下第舉人現任學正王延年年在七十以上准為額外司業次年癸酉又以現任助教曹洛禋年在八十以上並為額外司業三十五年庚寅浙江原任訓導恩賞六品頂帶王世芳年一百十二嵗來京恭祝萬夀恩賞司業職銜在籍食俸三十六年辛卯江西㑹試舉人李煒年百嵗恭逢皇太后八旬萬夀恩賞司業職銜四十九年甲辰福建欽賜進士郭鍾岳年一百四嵗聖駕南巡來浙迎鑾恩賞司業職銜皆出優老特恩不為常例太學鐘鼓之名由來舊矣國子監有鐘一鼓一鼓房在東㕔之南鐘房在西㕔之南乾隆三十年重修文廟移庫又得銅鐘一銘文皆道家語非太學所用之物移交内務府存貯彞倫堂月臺東南立日晷一座考明代文廟國子監創建記已載有此今八旗官學亦各立之蓋講學問業考課俱有一定時候憑此以知早暮焉國子監東西牌坊題曰成賢街大門之外兩牌坊題曰國子監大門題曰集賢門儀門豎書太學二字大堂後篆君親師三字字盈四尺君字居中東㕔題曰繩愆㕔西㕔題曰博士㕔東一堂題曰率性堂次題誠心堂次題崇志堂西一堂題曰修道堂次題正義堂次題廣業堂乾隆五十年詔建辟雍繩愆博士兩㕔及六堂並易清漢文豎額敬一亭大門刻石曰敬一之門亭有豎額曰敬一亭東廂正堂匾曰進徳修業康熙丁丑祭酒孫岳頒題土地祠即昌黎祠聯曰進學解成閒官一席曾三任起衰力任鉅學千秋本六經康熙戊辰司業彭定求題又匾曰泰山北斗聯曰貫日矢天正氣衍千秋之俎豆驅邪闢異精英振八代之文章俱康熙戊辰典簿張璿題又匾曰浩氣獨存聯曰道統接鄒魯而後功在千秋儒修開濂洛之先澤流多士皆康熙丙戌祭酒孫岳頒書大成門外神㕑神庫宰牲所致齋所持敬門崇聖祠啟聖門皆有題額南學大門豎書欽賜學舎六堂六匾各書堂名文謹案額對聯凡廟匾聖祖仁皇帝世祖憲皇帝皇上御筆俱恭載廟制門紀事附元太宗即位之五年新建國子學於燕京御製宣諭二通其一通諭多羅岱等及十投管象等官方是時遣䝉古子弟一十八人來習漢人語言文字復掄漢人子弟一十二人習蒙古語言弓箭命提領陳時可擇二名儒管勾并主守孔子廟道人馮志亨選秀士二人通儒道人二人分作四牌子教讀不率教者以簡子量箠之更權用燕京真定厯日銀建立夫子廟兩廡及肄業之舎其子弟日給米一升麵如之肉一觔晚間給酒一缶家糧之給亦一升土著者皆不與又於降户毎人撥小倉頭一名以奉使令此蛇兒年六月初九日所頒也其一通諭受學子弟員習漢人文書之外兼諳匠藝事及藥材所用彩色所出地理州郡所紀下至酒醴麯糵水銀之造飲食烹飪之制皆欲周覽旁通仍戒飲酒不可有違恒度而於習講尤諄諄也所頒之年月與前同不書何日意稍後於前耳後十六年己酉十月望日夫子廟住持賜紫知觀李知元始礱石令重元子葛志仙刋置學中其左方序列四教讀弟子名䝉古筆且齊自札固喇沁以下凡十九人漢人筆且齊自文宣努而下凡二十八人所為筆且齊者譯言書生也其數比舊有所加者續有慕效而來者耳又列羅劉二通事不著其名又列宣授䝉古筆且齊四牌子總教馮志亨宣授金牌提舉國子學事中書楊惟中御前宣議國子學事賽音衮巴克實李志常三人銜名所謂巴克實譯言師傅也惟中郎楊文肅公從事征行勞烈甚著餘若志元志先志常則皆黄冠師當時制尚淳質混儒道為一有合於老易同用之㫖厥後元勲碩輔頗有為道家所薦而起者濂謹案蛇兒年六月九日正金哀宗天興二年癸巳六月壬午也金自宣宗以貞祐二年五月壬午遷汴三年五月庚申燕京入我職方至是垂二十載立學以教胄子固惟其時然竊獨怪是年王師南征圍汴蹴蔡决䇿制勝日不暇給而太宗乃以教育英才為先務為不可及已列聖有作益修成均養士之制百年以來遂用人文化成天下兹蓋其權輿者歟石刻今藏京師與御賜宣聖玉斚皆提舉學事者司之每當代去出以相𫝊且繋其名於籍非惟不忘其本先蓋亦慎之至也濓因得而備述俾覽者知祖宗垂意學校文運之興殆非一日而纂修史臣或得以參考焉宋潛溪集京都未有孔子廟而國學寓他署丞相興元忠憲王完澤喟然曰首善之地風化攸出不可怠乃奏營廟學元名臣事畧至正八年許衡授集賢大學士國子祭酒即南城之舊樞密院設學奏召舊弟子散居四方者王梓韓思永蘇郁耶律有尚孫安髙凝姚燧及其弟燉劉季偉吕端善劉安中白棟皆驛致館下為伴讀國學事跡至正元年大興國子監蒙古囘囘漢人三監生員凡千餘然祭酒司業博士多非其人惟粉飾章句補苴時務以應故事而已諸生日啖籠炊粉羮一人之食為鈔五兩君子以監學為作養人材之地而千百為羣恣縱恬嬉以嫚侮嘲謔為賢行加屏風以障市人入茶酒肆不償直掉臂而出是壞天下人材何作養之有庚申外史明洪武初太祖親定士子巾服生員襕衫貢舉入監者不變所服後許戴遮陽㡌而監生衣藍色洪熙中帝問衣藍者何人左右以監生對帝曰著青衣較好乃易青圓領嘉靖二十二年禮部言士子冠服詭異有凌雲等巾甚乖禮制詔所司禁之萬厯二年禁舉人監生生員儒士僭用忠靜冠巾錦綺鑲履及張繖蓋戴煖耳違者五城御史送問明史輿服志新舉人朝見著青衫不著藍衫者聞始於宣廟欲其異於嵗貢生耳及其下第送國子監仍著襕衫蓋國學自有成規也賢奕永樂間翰林院進所纂録韻書賜名文獻大成以其未備遂命重修以祭酒胡儼兼翰林院侍講及學士王景等為總裁開館於文淵閣禮部簡能書監生繕寫辛酉命北京國子監㑹繕照本監定例南雍志辛未廷試賜許觀及第上以連科狀元出太學召祭酒宋訥面褒諭焉鳯洲雜編正統十年㑹試時中副榜不就與諸副榜并下第者九百餘人俱入太學是時李先生時勉為祭酒趙先生琬為司業李先生極意造就人才初至令坐堂一月後乃散處於廂房列格致誠正四號號房中有家室者居外晨入饌堂讀書俱朔望升堂其於四號督勵尤切夜讀務盡二更將五更復令膳夫提鈴循號門催喚起讀書或自潛行以察勤惰無燈者令人暗記明示之責罰自是燈光達旦書聲不絶學者競相勸勉李公多宿廂房每隔三五夜必召余同鄉三二人侍坐談講李公端坐儼然或説鄉曲舊事或論詩文言簡而確婉而有味聴者忘倦每至更深乃已别時必曰語久誤工夫自當退補且曰三更是隂陽交代時讀書宜二更即止不可過過則次早無精神其愛人多類此彭文憲筆記正統十一年太師英國公暨侯伯二十餘人早朝畢奏曰臣等皆武夫不諳經典願賜一日假詣國子監聴講上命以三月三日往於是太師率諸侯伯至日到監各攜茶湯果餅之類甚豐祭酒李先生時勉命諸生立講五經各一章講罷設酒饌奉欵諸侯伯讓曰受教之地皆就列坐惟太師與先生抗禮飲甚懽太師屢辭先生曰秀才家飯不易措置願太師少寛復命諸生歌鹿鳴之詩賔主雍雍抵暮而散此亦太平盛事也寓圃雜記閻禹錫以國子學正為同考鳯洲雜編南昌張直閣在翰苑嘗上疏請令史官行人奉使四方各求遺書一部送國學翰林收藏業已允行而久之竟無應者都下所當積書者有五其一内府監局當儲其全以備御覽其一内閣秘書當儲其全以備顧問其一翰林院庫當儲其全以備考訂其一兩京太學當儲其全以備頒行其一禮部庫房當儲其全以備參核五者即不能兼得一二焉可矣而今皆無之徒使坊肆訛刻日滋月盛毁瓦畫墁寖失舊本矣于文定筆麈景泰四年祭酒王恂卒監丞安貴言太子少師侍郎學士蕭鎡任祭酒諸生悦服乞照胡儼例不妨内閣職務時來提督儀型後學上不許以太常少卿陳詢代之永樂中儼實出為祭酒不復入内閣也今言景泰中劉鉉為祭酒易儲議起諸司無大小皆勸進司業言於鉉曰百司皆勸進國子監獨無乎鉉曰國子監諫止則可勸進則不可遂止後英宗復辟閲諸疏皆勸進無國子監名問徐有貞曰祭酒何人官㡬年矣有貞以鉉對上曰吾欲一識之乃召對於文華殿擢少詹事守溪筆記天順四年盛自兩廣入議八月某日上有事西壇忝扈從衆皆盛服候駕劉祭酒崇益倐就前班偶閣老李公語退而見告曰太學有前元時加封孔子制碑卧草間欲具奏重立門下適請於李公公言此立則可耳何用奏崇益故有僚舊之好盛因復之曰此前代所立若建學時因而不改可也今國子監建自我朝已有御製碑矣一旦遽立前代詔㫖未宜若具奏重立恐亦未當况加封諸制已有史𫝊聖道輕重初不繫此須更商量其事遂寢水東日記崇仁洪鐘生四嵗為神童隨父以訓導考滿至京憲宗聞之召見命翰林給廩讀書陞其父國子助教以便其子治世餘闓成化十八年太常寺卿掌監事劉宣以琉球官生蔡賔等束修有白金一斤辭不受後四年賔等復申請前事以聞上命宣受之明太學志萬厯十六年重書寶訓實録校對官於翰林院差委圈書監生於國子監收管吏役於吏部取發見聞録國家度越前代者有數事前代文廟用塑像本朝初建國學改用木主前朝太學生皆上書我朝獨生監不許陳民間利弊宋制臺省六品諸司五品一郊而任一人兩制以上一嵗而任一人子又任其孫孫又任其子任姪任甥亦有之今三品以上才得廕子入監紈袴子弟所以不濫朝籍正秘笈欽定國子監志卷六十一

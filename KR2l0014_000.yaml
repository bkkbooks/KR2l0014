front:
  text: 欽定國子監志目錄史部十二
  hash: sha256:ab3828cc64911d016df4c62092b891f0f65accdd7f47912c710b728bb1290d91
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_000-1a, image: WYG0600/WYG0600-0001a.png}
body:
  text: 卷首職官類一官制之屬表卷之一聖諭一褒崇卷之二聖諭二訓示卷之三御製一文一卷之四御製一文二卷之五御製一文三卷之六御製二詩卷之七詣學一親祀卷之八詣學二臨雍卷之九廟制一圖説卷之十廟制二建葺卷之十一祀位一聖位卷之十二祀位二配饗從祀卷之十三禮一釋奠卷之十四禮二釋菜卷之十五禮三釋褐卷之十六禮四獻功卷之十七禮五告祭卷之十八禮六祭品圖説卷之十九禮七祭器圖説卷之二十樂一樂制卷之二十一樂二樂章卷之二十二樂三樂器圖説卷之二十三樂四律吕表卷之二十四樂五舞器圖説卷之二十五樂六舞節表卷之二十六監制一圖説卷之二十七監制二建葺卷之二十八官師一設官卷之二十九官師二典守卷之三十官師三儀制卷之三十一官師四銓除卷之三十二官師五題名表一卷之三十三官師五題名表二卷之三十四官師五題名表三卷之三十五生徒一員額卷之三十六生徒二考校卷之三十七生徒三算學卷之三十八生徒四勲䕃卷之三十九生徒五鄉試卷之四十生徒六甄用卷之四十一生徒七外藩入學卷之四十二經費一恩賚卷之四十三經費二嵗支卷之四十四經費三俸祿卷之四十五經費四廪給卷之四十六金石一欽頒彝器圖説卷之四十七金石二御碑卷之四十八金石三題名卷之四十九金石四諸碑卷之五十金石五石鼓圖説卷之五十一經籍一賜書卷之五十二經籍二板刻卷之五十三藝文一奏議一卷之五十四藝文一奏議二卷之五十五藝文一奏議三卷之五十六藝文二應制一卷之五十七藝文二應制二卷之五十八藝文二應制三卷之五十九藝文三論著卷之六十藝文四詩賦卷之六十一識餘一紀事卷之六十二識餘二綴聞臣等謹按欽定國子監志六十二卷乾隆四十三年户部尚書臣梁國治等奉勅修纂先是監臣輯有太學志而援及唐宋以前故實殊失限斷乃詔重為改定所誌縁起斷自元明蓋本朝國子監及文廟皆因前代遺址其締搆實始於元初也是編所載聖諭二卷以紀褒崇先聖訓示儒林之大法御製詩文七卷備録列朝聖文皇上宸翰詣學二卷紀親祀臨雍之禮廟制二卷前列圖說後誌建葺年月規制祀位二卷詳載殿廡及崇聖祠諸位號禮七卷分記釋奠釋菜釋褐獻功告祭諸儀及祭器圖說樂六卷分記樂制樂章律吕舞節二表及禮樂諸器圖說監制一卷子目與廟制同官師五卷載設官典守儀制銓除題名表生徒七卷員額考校甄用及外藩入學者具見焉經費四卷恩賚嵗支俸給備載焉金石五卷首以欽頒彛器圖說御碑次及每科題名古今碑刻而殿以石鼓圖說經籍二卷具載賜書及板刻之目藝文二卷則列諸臣章奏應制詩文及諸論著詩賦識餘二卷曰紀事曰綴聞於是識大識小罔不備賅而我朝重道崇文作人訓俗之盛臚實誌美足以彪炳萬古矣乾隆四十六年閏五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀經筵講官户部尚書臣梁國治等謹奏竊臣等奉勅纂輯國子監志陸續呈請欽定成書兹已竣事恭呈御覽臣等謹奉表恭進者臣聞學則三代與共所以明倫聖為百世之師是焉求道以清以和以任必素王乃集大成曰校曰序曰庠惟辟雍克兼衆制故王者化民成俗必教學為先圖而多士成德育材以京師為首善欽惟我列祖締造鴻圖聿開文運倫軌既同於萬國規模丕煥於三雍監二代而郁郁乎文崇四術而彬彬益盛我世祖定先師之位號舍菜禮成葺萬仭之宫牆賜金儀渥樂舞六羽箾韶九成立條教於成均頒卧碑於鄉校特設滿洲司業俾教胄子國書十八年景運維新千萬世文明大啓我聖祖道隆三古仁覆萬邦循舊典以臨雍俾任子而入監嚴助教之選頒訓飭之文宫懸之業簴増新屬國之衣冠来學定羣賢之祀位升朱子於殿廷􅘧御賛於豐碑書聖經於貞石王師之興如雨再告武成大勇所至若神益昭文教盖兼容并包業隆於三五故道洽政治澤潤乎寰瀛我世宗範圍曲成知周道濟溯傳心於惟精惟一爰釋奠於先聖先師廣達孝之思於五王躋崇聖之稱於列爵詣學則文更臨幸從祀則享列廡庭謙尊而光定跪獻上香之禮益動而巽沛置員廣額之恩分燈火於六堂列臯比於八學進士重題名之碣信立賢之無方選材開拔萃之科慶同升之逾格而且黌宮増舍鱣席同歡青海獻功龍章載錫闢俄羅斯之館蕃夷盡仰同文迎化導使之驄秦隴遥呼萬嵗盖撫辰凝績紹列聖而頌重華握範膺圖兼三才而敷五福是以德昭干羽格獸舞於堯階因而瑞應卿雲靉祥氛於闕里洪惟我皇上繼聖君而六七作祖述憲章頌天子於億萬年顯謨承烈存神過化上下天地同流懐德畏威南北東西咸服詔易三層門宇黄鋪六樣琉璃粢盛潔而犧牲成禮器是故大備宗廟美而百官富至聖足以有臨定親祭三獻之儀論彛章六佾之禮列其琴瑟管磬鐘鼓實其簠簋籩豆鉶羮仿古製而鑄鎛鐘琢新璧而成特磬定春秋二仲之律賜尊彛十器之陳既屢新夫廟堂復廣増其楹舍金聲玉振疊垂訓誡之文複廟重簷親榜門庭之額光騰宸翰同欽藻鳳髙翔春靄慈雲復見槐龍交翠百職咸􅌽恩倖盡飽霑濡諸生共讀賜書更叨賙䘏秩褒經學禄逮耆年禮闈添中正之官賢無家食算學重璣衡之政士許窺天惟作君而作師克引恬而引養洵樹虞庠之極則益隆漢觀之宏儀至於四征不庭八荒在宥載纘累朝之緒粤成邁古之功當萬幾典學之餘紀昭代宏文之盛欽裁舊志紛更刪唐宋以前御定新編縁起自元明之制十五門敷文序事燦如星日之陳廿二史重道崇儒莫罄名言之妙生民未有惟條理貫其始終来許昭兹斯同揆賢於堯舜從此仰徳音而欽聖訓聽聳橋門求掌故以凜神謨文髙籀鼓臣等職慙典樂學媿通經乏蘭臺著作之才效槐市頌揚之雅竭編摩於冊府庶幾興親炙之思懐鉛槧於直廬竊幸際右文之世由太學来者見知逺勝於聞知得聖人師之文運益宏其廣運臣等謹編成志書奉表恭進以聞

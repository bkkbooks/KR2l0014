front:
  text: 欽定四庫全書欽定國子監志卷九
  hash: sha256:2dbf4e2da43656e905a72b38625507be0cd1bc54487e44e5087065cd9adb7ce1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_009-1a, image: WYG0600/WYG0600-0096a.png}
body:
  text: 廟制臣等謹案學校祀孔子西漢以前未有著令後漢明帝永平二年始臨辟雍帥郡國行鄉飲酒禮於學校皆祀周公孔子為先聖先師而國學廟祀無明文惟歐陽修集古録載魯相置卒史碑云故事辟雍祠先聖盖國學祀孔子始見於此迨魏正始以太牢祀孔子為先聖配以顔子為先師晉宋及隋遵循弗改而廟制未詳唐武徳初命於國子學立周公孔子廟各一所至貞觀中停祭周公始専立孔子廟於國學自是遂為定制元都燕京建廟城東北隅營國子學於廟西明初改為北平府學永樂中仍改國子監立廟故址體制猶未壯也我朝列聖相承尊師重道廟制増崇皇上御極之初隆禮先師易盖黄瓦鴻規炳爍超越前代三十二年大發帑金二十餘萬特命廷臣鼎新殿宇大工告蕆釐正廟額御製碑文宸翰天章光榮楹桷洵亘古未逢之盛典也謹志圖説一卷建葺一卷各以元明舊制附載其末為廟制門廟制一圖説先師廟在都城東北安定門内成賢街國子監之左南向前為大門恭懸御書先師廟額門凡三楹髙三丈中廣一丈三尺七寸左右各廣一丈一尺七寸深一丈九尺基髙二尺四寸覆黄琉璃瓦牆飾紅黄色楹柱門扉皆丹飾梁棟施五采大門外東西立下馬牌各一樹坊各二門南屏垣一髙一丈一尺五寸廣四丈六尺深四尺石座髙三尺五寸八字垣二髙九尺一寸廣二丈四尺深三尺二寸石座髙三尺上覆黄琉璃瓦垂柱等飾以緑琉璃東西柵欄二道又屏垣左右垣各一袤長三十一丈髙六尺七寸外圍垣袤長九十五丈髙六尺五寸均覆以版瓦垣皆丹飾大門内碑亭二左為明英宗新建太學碑右為乾隆三十二年重修先師廟諭㫖碑門垣左右分列前明碑七進士題名碑四十六皆北向詳見金石門内為大成門恭懸御書大成門額門凡五楹髙四丈九寸中廣一丈五尺七寸左右各廣一丈五尺深三丈二尺基髙六尺五寸覆黄琉璃瓦週以石闌中三門前後三出陛階各十有四級門左右翼以牆飾紅黄色左右門各一門外迤東為神厨五楹西向髙二丈八尺中廣一丈三尺左右各廣一丈二尺深二丈神厨南為井亭井甃以石亭髙一丈六尺六寸深廣一丈二尺又南為宰牲所三楹西向髙二丈四尺八寸中廣一丈一尺左右各廣五尺深二丈均覆綠琉璃瓦又南為更房西向髙一丈七尺六寸廣一丈二尺深一丈五尺覆以版瓦門外迤西為神庫五楹東向髙二丈八尺中廣一丈三尺左右各廣一丈二尺神庫南為持敬門西向髙二丈三尺七寸廣一丈八尺深二丈又南為承祭官致齋所三楹東向髙二丈八寸中廣一丈一尺五寸左右各廣一丈五寸深二丈均覆綠琉璃瓦又南屋一楹即更衣亭舊址東向髙一丈七尺六寸廣一丈二尺深一丈五尺覆以版瓦門外階以下為外墀左右分列國朝歴科進士題名碑五十有二元碑二元進士題名碑三明進士題名碑三十一皆南向詳見金石門門内左右列㦸二十有四石鼓十石鼓音訓碣一詳見金石門中為大成殿恭懸御書大成殿額殿凡七楹髙七丈六尺三寸中廣一丈八尺五寸次二楹各廣一丈六尺又次四楹各廣一丈五尺深八丈基髙七尺圍廊重簷覆黄琉璃瓦殿中恭懸聖祖仁皇帝御書額一曰萬世師表康熈二十四年頒掲世宗憲皇帝御書額一曰生民未有雍正三年掲頒皇上御書額一曰與天地參御製聫一曰氣備四時與天地鬼神日月合其徳教垂萬世繼堯舜禹湯文武作之師乾隆三年奠上親釋製頒御掲又御製聨一曰齊家治國平天下信斯言也布在方策率性修道致中和得其門者譬之宫墻乾隆三年先師廟工成掲御製頒殿前月臺一髙六尺五寸廣八丈四尺一寸深四丈三尺九寸週以石闌三出陛前及左右各一階十有七級月臺前為甬路東西分列碑亭十一座俱覆以黄琉璃瓦恭勒聖祖仁皇帝御製至聖先師孔子贊康熙二十五年御製顔曾思孟四子贊康熙二十八年御製平定朔漠碑康熙四十三年世宗憲皇帝御製平定青海碑雍正三年御製仲丁親祭詩雍正六年皇上御製臨雍紀事碑乾隆三年御製平定金川碑乾隆十四年御製平定準噶爾碑乾隆二十年御製平定囘部碑乾隆二十四年御製重修文廟碑乾隆三十三年御製平定兩金川碑乾隆四十一年御碑文俱恭載製門殿東西掖各十楹南向髙二丈五尺一寸中一楹廣一丈九尺五寸深如之餘各廣一丈二尺七寸深一丈九尺五寸東西廡各十九楹髙三丈一尺八寸各廣一丈二尺五寸深二丈九尺兩廡之南東西列舍各十二楹北向東為祭器庫西為樂器庫中一楹廣一丈九尺五寸餘各廣一丈二尺二寸深如之均覆綠琉璃瓦西廡南燎爐一西北瘞坎一殿後長垣一有門在西掖後北向通崇聖祠大謹案向稱成殿先師廟二門統稱廟門盖始于明臣張璁非禮也乾隆三十三年皇上因飭工修廟之時特頒明詔増廟門額曰先師廟改殿額曰大成殿二門額曰大成門云崇聖祠在大成殿後正殿五楹髙三丈一尺八寸五分中廣一丈六尺五寸左右各廣一丈三尺三寸深二丈六尺基髙五尺七寸前有月臺一髙五尺五寸廣四丈九尺深二丈五尺三寸三出陛前及左右各一階十有一級東西廡各三楹髙二丈四尺四寸中一楹廣一丈三尺五寸次二楹各廣一丈一尺五寸深二丈五尺五寸東南燎爐一周繚以垣中為門三楹髙二丈六尺八寸中廣一丈三尺五寸左右各廣一丈一尺五寸深一丈八尺左右門各一門外西折有門一楹西向正殿正門均覆綠琉璃瓦兩廡㼧瓦門楹丹艧崇謹案本名聖祠啟聖祠明嘉靖九年建國朝雍正元年加封勅易先師五代並為王爵合祀祠中奉名皇崇聖祠之三年上御極特命聖祠易盖緑琉璃瓦三十二年崇大發帑金與事鼎新焉先師廟並土地祠在崇聖祠後迤西正祠三楹南向髙一丈七尺五寸廣一丈一尺深一丈八尺左右掖房各一楹髙一丈四尺一寸廣九尺深一丈四尺前抱厦一楹髙一丈一尺三寸又前左右廂房各二楹髙一丈三尺九寸廣一丈八尺四寸深一丈二尺均覆以版瓦周繚以垣前為大門髙七尺九寸廣一丈深五尺左右小門各一謹案祠之始立無考明太學志云土地祠五間在饌堂門之右疑即此也國朝康熙戊辰丙戌乾隆己巳甲申節經丹艧三十二年附先師廟大工一體庀材加焕飾焉圖說附元文宣王廟在東北緯塗之南北東經塗之東殿四阿崇十有七仭南北五尋東西十筵者三左右翼之廣亦如之衡達於兩廡兩廡自北而南七十步中門崇七仞有四尺修半之廣十有一步門東門西之廡各廣五十有二步外門左右為齋宿之室以間計各十有五神厨神庫南直殿之左右翼以間計各七殿而廡廡而門外至於外門内至於厨庫凡四百七十八楹吳澄文正公集先謹案此即今國子監廟學燬于兵宣撫王檝請師廟址也元初都城宣以金樞宻院地創之于是置學城南並建立學聖廟世祖至元四年遷都北城以南城國子為大都路學廟為大都路學廟廷議營立廟學久而未成至成宗大徳間始克集事前代殿宇之制可考見者盖始於此云明先師廟正殿七間初稱大成殿後題曰先師廟髙三丈六尺廣十三丈一尺深七丈一尺露臺東西八丈八尺南北四丈五尺基髙六尺上有石闌前有石階級左右石階級各一殿之東掖為祭器庫十一間髙一丈五尺每間廣一丈三尺深一丈三尺基髙一尺八寸西掖為樂器庫十一間髙廣深入與祭器庫同東西廡各十九間髙一丈六尺每間廣一丈三尺深一丈八尺基髙二尺當廡門之中有小階級内墀東碑亭一座正統新建太學碑樹焉西井一口石甃兩墀雜植松桂槐栢共六十一株兩廡之南折而北向為東西序各十一間門各一髙一丈五尺每間廣一丈三尺深一丈三寸基髙一尺八寸兩序之中為大成門後題曰廟門五間中門三東西各列㦸十二門髙二丈六尺廣七丈九尺前後深四丈八尺基髙五尺周環石闌前後各石階級三門内石鼓各五西石鼓文音訓碑一通門外東神厨五間宰牲亭三間井亭一座井一口石甃西神庫五間持敬門一間致齋所一間外墀東元加封聖號詔書碑一通大徳十一年七月建西元加封先聖父母妻并顔曾思孟制祠碑一通至順二年九月建東西各有南北對廊樹歴科進士題名碑雜植松栢共五十七株櫺星門三間隔衢為屏墻外地一方東西廣七丈五尺深四尺為木欄以䕶焉明太學志謹案此即元大徳時所建廟址也明正統間以故學卑隘命有司撤而修之左廟右學于是始備矣啟聖祠南向正堂五間髙三丈廣七丈八尺深二大五尺前有露臺髙五尺五寸長二丈五尺廣五丈前有石階級東西従祀堂各三間髙二丈廣三丈七尺深一丈三尺祠門三間髙二丈廣三丈深二丈六尺基髙一尺五寸前有石階級兩旁為周垣各有門以通拜謁外由西出大門一間髙二丈六尺廣一丈八尺深二丈八尺門外即廣儲門之通路同上土地祠五間在饌堂門之右繚以垣中為門折而西一門即由廣儲門之路而入者舊名小廣儲門同上欽定國子監志卷九

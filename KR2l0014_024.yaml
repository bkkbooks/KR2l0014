  text: 欽定四庫全書欽定國子監志卷二十四
  hash: sha256:6e493e8fad9560cb2c7b90c47edf822092ee35f73b3778e2e22759534fd3eada
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_024-1a, image: WYG0600/WYG0600-0249a.png}
body:
  text: 樂五舞器節二羽三十六籥三十六謹案釋奠用舞肇始劉宋逮及隋唐相沿為制宋金元三代釋奠止用登歌不設佾舞于是升朝降綴兆缺略無聞明初始用文舞制未詳備我考定樂章于佾舞尤協今古之宜康熙五十四敕頒太年樂舞器春秋釋奠司之太常肄習有索節奏學文嫻雅聲容之盛逈越前代兹敬繪廟舞器各自為圖並為說如左節二結旄為之朱杠長七尺二寸九分圍三寸二分七釐上曲為塗金龍首長九寸七分二釐銜旄九重各六寸四分八釐蓋以金葉束以緑皮繫長五寸七分六釐緌長七寸二分九釐司樂執以居前羽三十六木柄植雉羽長二尺九寸一分六釐銜以塗金龍首四寸八分六釐柄髤朱長一尺九寸四分四釐圍九分七釐執以右手籥三十六截竹為之長一尺七寸五分一釐徑四分六釐八毫六孔髤朱執以左手舞器附明文舞士左籥右翟舞師二人執翿以引之明史樂志籥長一尺朱紅漆笙竹為之上開三竅翟長三尺五寸朱紅漆柄金龍吞口上綴雉羽五層翿長七尺五寸朱紅漆柄金龍吞口懸白鷺羽九層續文獻通考謹案洪武六年定釋奠用文德舞本六佾也成化十二年增為八佾嘉靖八年仍改六佾詳見樂制欽定國子監志卷二十四

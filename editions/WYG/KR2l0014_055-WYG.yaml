body:
  text: 藝文應制一聖駕詣學盛典慶成頌謹序王頊齡稽古庠序學校之設皆所以教人倫育人才而學尤重蓋京師首善之地太學賢士之關四方觀瞻攸繫是以三代共之以迄於今鼓篋肄業禮樂詩書之彦彬彬極盛焉記曰天子視學大昕鼓徵衆既至乃釋奠於先師漢唐以來每遇視學既釋奠令講官敷論經義其制更備然則釋奠以重道講經以勸學誠風化之本太平之原也我皇上御極之初萬國咸寧德洋恩溥察吏安民蠲賑肆赦之令屢行於天下崇報闕里廣勵學校開科廣額之恩有加而無已猶復宵旰懋勤兢兢業業遵成憲舉鴻儀天人協應上下懽忻唐虞時雍之治化成周太和之氣象未有盛於此時者矣雍正二年春二月躬耕耤田既示敬重民依之至意旋奉德音以三月吉朔親詣太學行釋奠禮於是聖賢後裔國子師生在朝王公卿尹文學侍從之列期門羽林之選莫不恪共臣職以候聖天子法駕之至既而陳籩獻爵樂舞升歌維馨之德孚格於素王乃御彛倫堂設經案特舉大學聖經與虞書之十六字命祭酒司業諸生坐講焉蓋修已治人之道執中精一之蘊皆我皇上躬行心得全體大用統具於斯因而推求義奥綜析毫芒使聽者曉然知天德王道即在民生日用彛倫之中益信聖人教天下之仁心如是其深切著明也及乎禮成賜宴賞賚便蕃觀禮之儔咸叨隆恩異數士心大悦復頒諭㫖宣示成均敦實行勵實學洋洋聖謨與七曜齊光與六經同揆周禮三德三行之教王制六禮七教八政之修提綱挈要一以貫之宜乎大小臣工章縫髦士悚聽服膺踴躍相慶曰我皇上一舉一動美善備焉典則昭焉辭臨幸之名致展謁之敬謙德光也溯孔曾之學統接堯舜之心𫝊經術昌也訓士習之端方期英才之實效人文蔚也廣聖裔之恩榮厚諸生之勸賞惠澤周也光天之下至於海隅蒼生孰不愛戴誠悦祝我皇上文德誕敷受億萬年景福無疆也哉臣忝厠綸扉恭逢盛典幸被璧廱鐘鼓之淳風謹獻頌一篇極知文辭蕪陋不足仰塵睿覽曷任悚惶其辭曰帝膺大寶怙冐萬方奉若天道率由舊章懋勤仁政禮樂農桑養民於井造士於庠泱泱璧水奕奕宮牆車服禮器入室升堂帝尊師表源逺流長崇報功德膠序為光月令季春合樂釋奠怳見於羮藴藻可薦爰詔禮臣式循成憲齊祓寅清吉蠲朔旦閶闔晨開卿雲燦爛鸞輅時行龍旗高建葱珮千官青衿六館鵠立鳬趨觀禮榮忭崇牙簴業玉振金聲爵陳芳醴樂奏咸平禮容莊敬睿念精誠爰御黄幄百爾屏營講堂春盎几案香凝瑶籖甲乙芸帙丹青右文聖教如日昭明講官就席展卷談經道啟唐虞學宗洙泗至善同歸執中而治精一明新體用全備範圍古今經緯天地詣極高深理原簡易瞻仰我皇聰明睿智特為顓䝉闡幽宣秘共喻微言羣曉大義橋門環聽鏞鼓既諧宸𠂻怡悦扈蹕徐回鴻恩大沛嘉宴榮開濟濟鵷鷺懽聲動雷復䝉綸綍丹闕頒來濯磨士行陶淑人才典謨訓誥王言大哉芃芃棫樸咸沐栽培瑞靄絪緼甘霖淅􅄋静驗天和實應主德於樂璧廱霑濡皇澤奉運常新彛倫修飭作君作師會極歸極南朔東西向風順則盛典龐洪輝煌簡策福禄萬年􅄎天敷錫聖駕親詣太學大禮慶成頌謹序勵廷儀臣聞易書所載道統相𫝊庖羲神農黄帝開於前堯舜禹湯文武昌於繼迨於孔子集厥大成與天地相參自生民未有漢唐俎豆已肇千秋崇祀之儀濓洛師承愈昭萬古斯文之盛若乃道統治統仔肩一身作君作師牖迪百世宏兹文教端在盛朝我皇上禀聰明睿知之資具文武聖神之德裕忠厚寛仁之性流剛健篤實之輝禮樂政刑歸本於外王内聖文章性道推行於老安少懷其道孔子之道其治五帝三王之治也迺以不自聖之虚衷肇舉自得師之曠典雍正二年三月初吉考臨雍之禮更詣學之稱志切景行禮從卑牧大哉王言宜世為天下法者也於是六龍雷動萬乗星陳豹尾龍旂向澤宮而夙駕金根玉輦憩璧水而停騑王公儼恪以爭先卿尹肅將而恐後隨鑾侍從踴躍鳬趨教胄儒官䖍共鵠立執禮典書之士環槐市以仰清塵離經辨志之徒列杏壇而迎警蹕時則陽和淑氣舒上日之春風霄漢文光動晨曦之麗彩東序之宫牆洞啟徯律度於夏王上庠之鐘鼓高懸挹山龍於虞帝我皇乃親勞玉趾緩步丹墀周旋自中乎采齊歴級漸登於文石禮徐行於拜獻樂具奏乎寧平體不憚勞協乾行於至健心惟主敬申奏假於無言豐盛逓及乎四科明享兼通於兩廡已竣廟祀旋涖經帷俾授几於司成命開函而進講堂上設具寮之席拱環紫極星躔階前排内翰之班儼侍玉皇香案三千弟子欽御座以仰瞻億萬都人擁橋門而觀聽析修齊治平之義挈領提綱闡危微精一之辭探源遡本天顔有喜恩榮遍及千官帝澤無私賞賚尤先五氏咫尺近光之俊彦策名即荷於春闈三餘勤學之經生試額永加於秋賦廣泮水采芹之樂育自西雍釋菜以推慈迨旋軫於闕廷悉歡歌於逵路聖德修而萬民化開千葉之太平師道立而善人多定八方之會極臣廷儀叨膺分獻謬厠列卿依函丈於几筵寡聞學謭奉九重之訓誨弼教情深欣盛事之躬逢竭鄙忱而口誦謹拜手稽首而作頌曰惟天誕聖惟聖希天道統相承垂千萬年上下古今先師至聖惟我哲皇希風絜盛心源仰接道脉遥通濬兹治本歸於性功鴻業所基存誠主敬庶績咸熙萬邦表正太平有象教養兼資躬耕訖事典重親師季春元辰先期吉卜齊飭嚴恭聖心之肅曰臨曰幸崇高自嫌更稱定式聖度之謙殷禮縟儀折旋奠獻協矩符規聖德之健圜橋萬計瞻雲講堂既溫且厲聖容之莊多士蒸蒸湛恩􅄎受一體同仁聖恩之厚育才增額丕煥綸音學徒競勸聖澤之深六合一家萬幾一日首務崇儒聖修之密學要至善道在執中皇極歛敷聖治之隆一事舉行兼該衆美史册大書流芬億紀覆幬持載祖述憲章聖功益懋帝道光昌聖駕親詣太學大禮慶成頌謹序張廷玉欽惟我皇上聰明睿知文武聖神作君作師統臨萬國以繼天立極之功興道致治以躬行實踐之德覺世牖民寶厯初元首頒諭㫖崇奉先聖追封五代王爵曠典聿新振古未有更念太學為王化之原釋奠尊經臨雍講道虞夏商周之制詳見於戴記周官五帝三王所以茂登上理人才盛而風俗同者胥由於此爰勅禮臣稽考典制諏日具儀於雍正二年春三月乙亥之朔皇帝整法駕從百官駐輦橋門躬親展祀慤誠昭格禮備樂和乃御彛倫堂命儒臣進講大學虞書復宣聖訓崇奬儒先嘉惠多士恩施􅄎博文命覃敷一時扈從諸臣以暨四氏子孫六館學徒凡與觀聽靡弗鼓舞懽忭竊惟鎬京辟雍魯侯泮水皆揚之風雅焜燿簡編聖天子道德高深大禮光著是宜紀述美盛昭示無窮臣叨列六卿兼掌翰苑駕詣成均恭與分獻職當率先作為歌詩揚厲萬一况臣䝉被殊遇日侍内廷伏覩皇上宵旰勤勞勵精庶政孜孜典學日新又新無念不誠無事不敬聖功之密聖德之純實有以接精一之傳握明新之要用建作君作師之極而綿國家文明之運於億萬斯年臣不勝踴躍抃舞之至謹拜手稽首獻頌曰繄古聖神首出庶物開天明道聿彰治術三五相承是繼是述千載心𫝊其源則一亹亹我皇紹膺寶命治協勲華道符孔孟勸學隆師褒崇先聖風教之行一人表正王封晉錫祀事孔明大昕鼓衆殷禮肇稱有穆聖容端拜於庭百官宗廟玉振金聲黼座載升經筵已備明新之學精一所寄匪口斯陳惟心是契闡厥微言以宏至治羽翼聖道代不數賢從祀録後母缺母偏宏敷經義是習是傳廣勵孝秀是陶是甄侁侁胄子藹藹儒林母或自棄聖凡同心母或自恣聖罔不欽帝有明訓日月照臨惟我聖皇以身作則夙夜緝熙克明峻德聖敬日躋至誠無息蕩蕩平平永建皇極薄海向風多士濟濟郁郁彬彬雲蒸霞起景運有融太和在宇於萬斯年教澤斯􅄎聖主親詣太學禮成詩謹序朱軾皇帝御極之二年太和翔洽四方風動凡諸大典次第舉行先以元辰躬耕耤田復於三月朔日駕詣太學釋奠禮成迺御彛倫堂命司成進講大學尚書經義隨頒諭㫖釐正兩廡祀典録先賢後裔並廣生童試額殊榮異數亘古未有圜橋門而觀聽者萬人無不懽呼動地易曰飛龍在天利見大人又曰雲從龍風從虎聖人作而萬物覩書曰命汝典樂教胄子八音克諧無相奪倫神人以和又曰予擊石拊石百獸率舞詩曰於論鼓鐘於樂辟廱又曰自西自東自南自北無思不服禮曰君子化民成俗其必由學又曰近者悦服而逺者懷之皆言聖德之章以身示教斯聖化之盛不介而孚也我皇上治協唐虞道隆洙泗於臨御之初即追封孔子五代並賜王爵興賢籲俊之典連茹彚征臨雍講學盡誠盡敬以皇躬為天下先崇儒右文無以復加薄海内外翕然從風猗歟休哉何遇之隆也臣軾忝列侍從瞻仰盛禮欣榮無極恭賦五言十律進呈御覽臣軾無任懽忭之至天肇文明運堯年化日舒時當三月朔載駕六龍輿禮肅躬耕後心嚴釋奠初臨廱彰至教八表會車書其一鐘動曉星闌宸居闢九關旌旗森豹仗冠帶矗鴛班麗日輝龍衮春風識聖顔諸生迎法駕嵩祝杏林間其二天容嚴肅穆駐輦入膠宮籩豆羅瓊席簫韶震碧空道原千古合聖自兩心通芹藻馨無極誠餘祼獻中其三睿識逾千聖恩綸賁九重尼山推祖德闕里並王封銘鼎膺珪瓚麟書錫衮龍乍㸔歆俎豆百世耀儒宗其四命講欣前席儒臣傍衮衣明新叅本末精一辨危微大道如天濶傳心並日輝君師皆一貫學統倍增輝其五先儒從廟祀厯世鮮平衡此日承天語千秋有定評經壇春雨潤道岸曉雲明得借恩光賁遲登萬倍榮其六上公膺禮重五代沭恩深詔復求賢裔官仍入翰林先疇均世禄舊德煥華簪萬古誰能並崇儒無限心其七多士得觀光青衿肅拜颺特寛三選格尤重五經箱宿學資淹雅童年擢茂良萬方霑聖澤雲漢倬天章其八日侍鸞坡下欣承化雨偏聖慈垂博約愚昧仰高堅洙泗文章備虞周禮樂全小臣欽睿學多愧管窺天其九至德並洪鈞絪緼見化醇用中歸有極以道覺斯民俗善胥還古風和總是春從今千萬載聖教逈無垠其十聖主詣學大禮慶成詩謹序史貽直竊聞惟皇建極敷彛訓於寰區惟聖作人煥天章於雲漢繼樹藝而立教學校初開資典胄以永言成均肇啟上庠東序虞夏同符右學膠宮殷周合轍詩書禮樂四術四教所由興仁義中和三行三德所由著上丁習舞爰修釋菜之文重席横經乃展隆儒之禮崇百王之軌範彛倫叙而民俗加淳表萬國之觀瞻德化宣而士風益茂欽惟我皇上乾元合德離照升輝祖述憲章文思廣運顯謨承烈聲教誕敷當膺圖秉籙之初振緯地經天之業為教為養幬載萬方作君作師帡幪六合崇報特加於闕里湛恩大沛於制科猶復上厪宸衷式遵成憲京師首善之地宜肅規模太學賢士之關亟須鼓舞聖不自聖昭精神之見於羮牆謙以益謙辭臨幸之名於璧沼季春令序月朔昌辰鳯盖高飛祥曦照耀龍旗遥涖瑞露湑瀼重道宏規丕煥成賢之里咸平嘉樂升歌習禮之庭既釋奠於先師遂鼓徵乎多士時則千官鵠立百爾鳬趨宗伯𫝊制以屏營司成執經而儼恪焜煌講案奎垣璧府之輝璀璨瑶函日珥星鉤之采闡内聖外王之妙藴擴堯咨舜儆之淵懷修齊治平綱領總歸於至善危微精一心𫝊契合於執中就日瞻雲莫非有造聲金振玉允集大成教嚴而觀聽圜橋慶成而光華載道巍班聖裔邀寵賚之便蕃五氏子孫叨榮施之優渥鴻都虎觀咸鼓篋以霑恩期門羽林亦歌風而沐澤於是綸音申勵玉律昭宣五典五惇務潛修而實踐十經十緯期幼學而壯行大哉王言莫罄臯夔之颺拜凜然聖訓奚容游夏之贊辭南朔東西悦服於三廱鐘鼓文章性道肅聞於萬仭宫牆臣等技拙雕蟲識慙窺豹乏班固摛華之賦染翰逡巡遜桓榮講藝之長編蒲黽勉隆儀幸覩攬芹藻以知榮盛典欣逢隨章縫而溢喜敬攄微悃恭紀鴻猷乃拜手稽首而獻詩曰聖主當陽典禮新東郊耕後涖成均青壇澤遍深如海璧水歡騰盎似春諏日又看逢吉亥啟行恰喜占芳辰集賢門外三千士紅燭光中望紫宸其一雲開閶闔珮聲長僊仗爭遊曉日光虎旅雍容嫻禮樂鸞旗縹緲暎文章青袍道左瞻天近碧藻池邊傍輦香自是聖朝修盛舉千秋晤對儼同堂其二笙鏞迭奏叶金絲正是升堂展禮時百職階前依豹尾九重天上進雞彛蒼麟毓秀留符瑞白馬𫝊家遡本支五代王封崇德逺一番俎豆煥新祠其三祀事初成瑞氣和鑾輿又向講堂過談經舊列東西案傾聽新添甲乙科日繞龍鱗天肅穆風清槐䕃影婆娑橋門環視知何限不數當年億萬多其四道從堯舜洎文宣如日光輝正麗天格致修齊端治本危微精一契心源學分綱目功原備業在勲華藴已全綈几從容聽講畢恩綸早見出經筵其五教養恩深未有涯官階特向聖門加諸生飽啖宫厨餅侍從香分上品茶東觀崇經開蘂榜西雝選俊啟仙槎無邊化雨天人洽三日甘霖遍萬家其六聖主親詣太學禮成賦謹序汪漋欽惟皇上奉天道以出治作君作師觀人文以化成既富既教周情孔思千秋接統緒之𫝊玉振金聲一人建中和之極天根月窟探理學之精微雲爛日華啟文明之運會由是梯山航海咸游禮樂之塲極之東鰈西鶼盡入詩書之府勞來輔翼如親教澤於伊耆寛栗直温儼荷甄陶於溈水追封素王五代本聖主重道之心昭掲孝經一篇洽宇内同風之化既已果行育德盡牖迪之良規猶思講學崇師示振興之至意爰於寎月之元辰肇舉臨雍之盛典升崇階而展禮雲繞緇帷涖講席以談經光生縹帙臣珥筆西清扈游東序乏掞天之麗藻鼓吹休明竭向日之葵忱導揚盛美竊取六義而為賦用敢九拜以陳辭曰古聖王之御宇也咸以文治而致昇平故頌放勲曰文思稱重華曰文明馴六服於禮讓靖四海之兵刑厥猷敷於五典其道備乎六經列聖傳而弗替孔子集其大成耀千年之朗炬垂百世之儀型歴漢唐而尊奉究至德之難名若麗天之二曜譬懸象之五星闢賢關而躋聖域建學校而設庠黌斯化民之道大而造士之功宏維我皇之膺圖邁周文之郁郁暉八紘之金鏡撫五辰於玉燭迪九徳而翕受敷施闢四門而達聰明目誠不息而乾乾敬緝熙而穆穆順休命則象為大有懿文德則取諸小畜念崇儒斯六合歸仁惟典學乃萬方錫福俾是訓而是行遂爰究而爰度上之率乎下也桴鼓之㨗下之化於上也風草之速諏吉日而詣辟雍興秩節而開講幄非徒侈圜橋之觀聽蓋將以移風而易俗是日也祥雲靉靆旭日曈曨萬象映朝華之鏡九旗飄明庶之風璧沼澄泓繞勾陳之羽衛槐街清䕃列上舍之章縫虎闈晨啟講肆春融鳴鸞和之噦噦奏鼉鼓之逢逢樂人宿懸於階下舞師振萬於庭中設崇牙而樹羽發鯨魚而鏗鐘皇躬親而薦獻洵德盛而禮恭奠蘋蘩之修潔備儀度之雍容式鴻規於多士率祗敬於羣工祀事竣講筵啟禮官進簡近侍授几宣第一章之聖籍廓治平之宏模衍十六字之心傳闡危微之宗㫖正心誠意皇猷必本於聖功精一執中達用莫先於明體開丹書於瓊笈道擬傳薪酌翠茗於銀甖恩踰賜醴儒臣師師俊髦濟濟委珮垂紳彯纓戴縰奕奕增輝彬彬有斐莫不聽彛訓而神悚瞻隆儀而心企逮鑾輿之返蹕遂濊澤之覃敷既􅄎恩於俊造更加意於先儒稽宜配而已祧復祀典之如初或酌定於新增務名實之允符凡後裔之未恤補博士於石渠廣采芹以游泮俾思奮於天衢擴士路之進階益蘂榜於賢書凡此菁莪之化悉仰薪槱之儲爾乃宴以示惠下之慈賚以展育賢之分寵降匪頒昭垂典訓大禮告成儒風丕振制軼殷周道同堯舜訖聲教於遐陬返敦龎於先進朝布嘉猷野無遺儁躋斯世於郅隆播休風而大順臣仰覩乾行恭逢泰運聆雅奏之九成循宮牆之數仭聖人之道可得而聞天子之光於斯為近敬載筆而摛文信揄揚之莫盡聖駕親詣太學大禮慶成詩謹序覺羅逢泰欽惟我皇上心涵覆載道繼顯承作君作師自生民而未有建極錫極與天地以相參洵哉集羣聖之大成允矣邁百王而首出顧以言六藝者必折衷於孔子行九經者必取法乎先師爰命秩宗考臨雍之舊典先𫝊詔㫖更詣學之謙稱序屬春三時維月朔備森嚴之法駕羽衛星陳跂巍峻之宮牆璧池日耀芝蓋飛而采霞起鑾輿度而清風翔禮終三獻肸蠁俱歆樂奏九成駿奔皆肅已竣廟禮爰涖講堂首列聖經次陳舜命蓋億萬年之學術不越修齊治平而十六字之心傳惟此危微精一敷陳曉暢宣布光昭帝澤無私􅄎錫官厨之珍味天顔有喜旋頒闈額之渙綸士仰九重樂育之恩道開萬世太平之治臣幸參法從欣大禮之告成叨列講幄慶隆儀之得與敬陳俚句少展葵忱道法綜千聖君師統萬方臨雍傳巽命詣學表謙光鐘鼓陳東序松槐夾上庠秩宗司典禮樂正考彛章鳯輦移丹陛鸞聲下紫閶四門邀法駕數仭望宫牆天步規衡叶臣寮劍珮鏘恪恭三獻凛肅穆一誠將盥享孚禋祀經幃設廟堂太和形色笑篤敬表顒卭當扆横綈几開函拭縹囊治源通泗水心學溯陶唐萬象歸皇極千官捧御床微言宣底藴大㫖闢康莊簡易公卿坐趨蹌弟子行共承天視聽密邇帝衣裳大訓䝉宣讀竒珍獲拜嘗已叨君貺厚益感聖謨洋墨榜寛登進青衿擴選良肯容杗桷棄遍用網羅張文教漸沙塞儒風被海疆育才騰渙汗重道挈乾綱虞舜聰方達周文食不遑小臣遭盛典拜手效賡颺聖主親詣太學頌謹序蔡世逺粤若我昭代誕膺天命撫臨萬方垂光錫祚右文典學炤灼涵煦東西朔南罔不暨訖皇帝纘承鴻庥明哲作則帝王師儒之道萃之一身天下懷德秉義博聞有道術者莫不近文章砥厲亷隅爭自奮於聖人之世皇哉中天之景象也皇帝重念尊師講道謁聖崇儒風示天下莫急於此雍正二年春三月乙亥朔天子乃盛法服建龍斿蹕清路噦和鸞躬詣太學大昕鼓徵淵淵皇皇釋奠於先師禮成御彛倫堂講明德新民之經精一執中之㫖厥彰厥微既繹既闡王公卿尹侍從之臣聖孫賢裔暨厥肄業成均之士合二千有餘人咸侍日月之旁飫聞至德天子乃頒綸綍廣崇聖之配隆褒德之典𫝊經之彦衛道之儒孰已退而宜祀孰未入而宜增昇平日久向學蔚蒸擴博士弟子員之額加五經孝秀之升德化洋溥教澤大洽近光之士八表之遥龎眉童稚莫不延頸企踵鼓舞懽愉曰聖人首出天下文明此其時也粤稽唐虞典樂有教米廩有庠五典有惇直溫寛栗剛簡迪於厥中時則四方風動萬世永賴亦越周文亹亹翼翼雝雝肅肅靈臺辟雍其典則隆其意備美故其詩曰肆成人有德小子有造古之人無斁譽髦斯士惟無斁然後能使斯士奮興故其詩曰文王有聲遹駿有聲又曰濟濟多士文王以寧言文王作人之效而賢才之為國家寶也爰及武王陳書敬勝訪範叙倫師氏以德教國子保氏養國子以道大司樂以成均之法治建國之學政曰中和祗庸孝友故其詩曰鎬京辟雍自西自東自南自北無思不服無思不服者服之至也長育有法王心有加故服之者亦報以心也我皇上孝以事親誠以馭物仁以恤下推心以用賢多方以訓士所以豫養奬勸漸摩成就之者靡不曲盡故能使近悦逺懷奔走忭躍一至於此駕成周而軼有虞漢帝圜橋之聽唐宗建學之盛宋代三舍之規史氏所誇又烏足云哉臣世逺備員講讀躬逢盛事揚扢有懷忘其鄙謭謹再拜稽首而獻頌曰帝德廣運表正萬邦文同有截化􅄎無疆金樞丹穴若木扶桑光華所爥錫極陳常聲靈炳彪於斯尤盛五緯集祥九州無競迺稽古制迺溯道宗斆學之本伊維辟雍騶孟有言後先一揆夫子之道我皇齊軌如月印川圓暉不滓如日中天萬世同晷體厥大成誕敷寓縣息息相符羮牆若見二載季春朔日既練遂詣寢楹舍菜初奠笙頌兩磬其鐘在南樂具奏止事以在三尊師訪道磬折是甘皇之沖德海負淵涵迺御彛倫横經講義菽栗為膏布帛為賁曰維太學曰明曰新克止至善天下平均曰維聖心𫝊十六字危微之幾誠則無事皇建厥中一而不二錫厥庶民惟中是視臣工生徒百千其偶亦有聖嗣率彼賢後圜橋聽觀有孚盈缶渙若氷釋肅若拱斗􅃡從洙泗粤若放勲聖聖則同治教攸分肆我皇上為師為君丕光厥緒咸秩其文既祠崇聖錫厥王封兩廡羣儒亦折其中如衡之平得禮之義升進廣崇毋失其類煥我宮牆教道扶樹朝陽升梧南山騰霧弟子議增經生復故翕其從風九閶湛露皇矣帝德於穆昭融跨虞軼周巍巍崇崇天降時雨滂沛浺瀜化澤所協以兆年豐威加鹿塞玉門韜弓止戈為武在泮之功小臣多幸際兹昌辰而目斯擊而身斯親懿我皇上受福無垠於萬斯年保佑天申聖駕親詣太學大禮慶成詩謹序彭維新臣聞作君作師盛德建中和之極是則是傚秀民被陶淑之風溯道統之端倪天開一畫衍心傳之蘊奥功在六經惟聖人垂教化於來兹惟聖人契淵源於徃哲蓋尼山振鐸克集唐虞夏商之大成而璧水停鑾丕昭禮樂詩書之至治儒風振奮景運焜煌大道愈極昌隆典禮實為超軼橋門慶洽化日舒長膠序光揺天文輝映欽惟我皇上德全仁智學徹天人本中正以經綸懋敬勤於宥密明新至善王道原於聖功精一執中心法彰為治統萬幾總攬甫御極而愷澤殷流庶績咸熙方踰年而大禮遞舉尤昭乾坤之覆育造士即踵於勸農炳日月之照臨崇經正所以宗聖天懷謙抑釐更詣學之名帝道光明備展先師之禮宫牆徧煥籩俎聿新玉珮垂垂千官扈從青衿濟濟多士趨蹌感百獸舞而肅拜廣庭無思不服值四門闢而仰瞻天表有喜皆知大布絲綸覃敷濊澤應試者纎長獲採修德者片善必彰賜食徧及於單寒銜恩羣矢於夙夜聖人作而萬物睹就日爭先賢才出而百度昭輸忠恐後和風淡蕩縹緲鑪煙麗日融熙晶熒仙仗盛事永光夫史策殊恩迥邁乎漢唐臣草木無知遭逢有幸獲備員於趨走叨逾分之光榮仰覲天顔瞻依咫尺欽承聖教啟牖顓䝉宸衷闡析精微均發簡編之所未發御筆增刪辭義獲聞疇昔之所未聞悚懼執經兢惶拜賜敬陳歌詠思紀典制之崇閎愧乏文辭莫罄頌揚於毫末惟勵傾葵之素謹凛虞庠之訓辭其鼓篋之儔沭浴堯天之雨露云爾日華雲爛水朝宗弦誦文儒萃辟廱千古素王翔綵鳯九霄青帝駕蒼龍宸心黙契通洙泗至道滋榮視檜松芹藻芳芬牲幣肅儒林雨露勝春濃其一高棟飛甍數仭牆良辰衮黻薦馨香性天一貫心源合睿聖齋誠學統光冠佩盈庭觀禮樂旌旗夾道煥文章從知奎壁頻呈象率土咸歌景運長其二御座垂衣六合清太平洋溢奏咸英煌煌扈聖中朝士濟濟瞻天太學生巽命重申綿泰運乾行值甲煥離明泮池此日恩波濶文德宏敷雨洗兵其三三春萬物向榮時更荷高穹雨露滋初覲天顔霑渥澤恭聆聖誨釋繁疑雲霄幸傍鑪烟近拜舞頻瞻睿藻垂自顧愚庸無報稱惟抒精白答昌期其四聖駕親詣太學大禮慶成頌謹序俞兆晟臣聞乾坤定位參之者人也流品異質成之者聖也聖人既生欲天下之民咸親其親長其長資忠而履信敦本而務實於是立學校聨師儒使翺翔於詩書禮樂之途以復其仁義禮智之性光天之下郁郁彬彬始於一家達於四海推之後世而不可紀極蓋唐虞三代羣聖繼作及於孔子而為集大成也孔子至今又二千餘年矣林林總總之儔日用飲食而不知所以進德天於此篤生我聖主以接堯舜之心傳闡洙泗之秘奥聖與聖相繼為萬世正學術為羣生發顓䝉煌哉煒哉固統高卑亘古今而莫嫓者矣乃我皇上德韞苞符心涵太極文明麗乎日月聲教訖於垓埏而猶惟幾惟康以勅天命曰明曰旦以慎身修政治浹於寅朝丹黄勤於丙夜蓋聖心所厪念者民也所隆禮者士也正月之吉祈穀於上帝仲春行耕耤禮玉輅青旗朱紘黛耜皆為民而出也農政既修文教斯舉我皇若曰士之力學猶農之力田必修禮以耕之陳義以種之講學以耨之顧風行而草斯偃上率而下斯從欲欽崇至聖以樹之型而立之範其在太學乎先是皇上以至孝錫類立崇聖祠祀叔梁氏以上五代隆以王爵春秋俎豆有加禮焉漢唐以來未之前聞也至是復詔冬官飭名材丹艧塈茨以新聖域燏煌巨麗告厥成功太史揆日禮臣具儀天子將備法駕臨雍講學進天下於文治焉季春之初日在大梁九重致齋極誠極敬迺建霓旌張羽蓋雲䍐日斿繽繽紛紛千官忭集多士景從銀潢蘭渚之𣲖重金兼紫之老鳴玉珥彤之彦翔鸞翥鳯之英莫不雍雍濟濟魚魚雅雅望屬車而至止焉皇上却輦勿御入廟益䖍既盥既薦韶韺間作奏咸和之樂擊大昕之鼓蕭薌炳天雲成五采奎璧煥其光華芹藻漾其麗澤迺移清蹕迺御講筵開彛倫之堂命講官列坐發危微精一之傳明修齊治平之要主極於是乎端師教於是乎切抉幽洞微為世凖的時則圜橋門而觀聽者咸差肩而鵠立心開而目明欣欣然蒸蒸然不知其幾千萬人也恩綸聿宣中外慶幸羽翼經𫝊者光前而裕後醖釀道德者拾級而梯榮蓋將盡喬松為棟梁而不令遺幽蘭於巗谷也皇仁如天并包無外皇心如日照燭靡遺大禮之成如此汪澤之加如彼洵乎稽史冊而獨盛溯鴻濛而卓絶者也小臣䝉恩分校鄉闈既竣事獲聞鉅典肇舉私心慕悦竊觀春秋而降自漢高以太牢祀孔子而天下始知有尊崇聖人之道厥後英君誼辟代有盛儀若夫幸太學御講堂命師儒陳説經義則唐之貞觀開元宋之端拱咸寧天聖元祐稱為最著然或實意未盡孚德澤不下䆒非當時之君之不計及此也蓋天未嘗以道統之𫝊屬之一人則亦規規於故事而已詎若我皇上貫三才統百王備四德而乗乾敬五事而作聖今之堯舜即今之孔子也是則皇上之推崇孔子固發乎誠通乎微自有黙契焉者夫豈可以迹求而臆測也哉故聖教修明至盛也典禮畢備至隆也先後一揆至神也湛恩厖鴻至渥也敷天之下率土之濵懷文抱質之士如被陽和於嚴冬潤甘雨於槁葉莫不含英咀華思欲宣揚聖德臣備員禁近何敢以弇陋辭謹拜手稽首而獻頌曰惟天生物惟聖承天惇庸秩叙五教敷宣誰其修明素王出焉青麟繡紱泗水尼山自漢欽褒厯唐與宋哲后叠興師儒首重九獻八佾虹梁螭栱雅化流行津津絃誦我皇受命天亶聰明學綜千聖道集大成包涵六籍教育羣生履仁蹈義玉振金聲宣聖心𫝊我皇専屬錫類尋源追維公族五代賜封賔王如續二千餘年殊恩稱獨乃命匠石載葺成均楶栭棟牖丹艧鱗皴宮牆萬仞檜栢千尋巍峩焜燿勢接青旻維暮之春日月會朔天子乃齋有事太學曰誠與敬上通遼廓入廟而趨翠華前却鐘懸具設俎豆維馨穆穆在上濟濟在庭進退作止䖍恪和寧我皇盛德至聖格歆既灌秬鬯爰敷講席天顔霽温左右儼翼道闡明新理研精一橋門衣冠圜聽屏息煌煌鉅典浩浩新恩儒林苖裔賢哲本根苹笙絡繹芹藻紛繁皆經睿慮宣暢王綸自此廣輪人材㧞萃舟楫棟梁昌時大備陶之淑之我皇之惠四海同風詩書足貴迺知天意重念人羣賢愚異轍至理常存聖人首出重煥斯文崇儒講學名教永敦於鑠我皇超前軼後作君作師光昭宇宙皥皥熙熙風恬俗厚亶卑景福天子萬夀聖駕親詣太學大禮慶成詩錢陳羣皇帝御極之二載大禮畢舉何煌煌天不愛道地呈瑞卿雲糺縵羅文昌農嬉於野勤率作多士濟濟來膠庠仲春二月祀先嗇躬耕玉耤禮則臧勾龍司權布德澤立沛膏雨沾八荒帝曰教養其並重養先於教亦有常江河行地道不息千載契合遥相望心𫝊至理藴精一上溯堯舜中禹湯歴文繼武道益顯金聲玉振毓素王後來賢哲代不乏盈廷議論多表章或隆名號或逮後追尊所自或未詳我皇崇聖聖崇祖祀事備展烝與嘗王以五代邁蒲穀木金父下及叔梁爰諏月吉視太學精神直證羮與牆禮臣盥手陳舊制帝曰臨幸非所當易幸為詣著為令聖德以謙而彌光金根映日天衢淨魚鬚豹尾紛翺翔蒼螭白虎引兩導彩霞五色䕶中央百辟卿士各儼列一人穆穆祗肅將工奏九獻就黄幄大昕伐鼓集講堂諸生跪起鱗次立經筵唱徹捧天章曰聖有經帝有典提樞挈要謨洋洋橋門得瞻雲日表共傳朝旭升當陽惟天不言聖恭黙時行物生何可量恩流臣下渥湛露以次拜受大官漿禮成鸞輅迴閶闔復頒上食及秀良來朝蒲伏謝闕下天子端拱垂衣裳太平坐致道乆長神芝煜煜生齋房譽髦斯士禮樂塲菁莪棫樸金玉相我文誕敷我武揚玉帛恐後來萬方聖駕親詣太學大禮慶成恭紀徐本聖主垂裳日崇儒禮最先敷文光􅄎被建極道無偏泗水源流逺尼山統緒綿褒封隆爵秩追祀備紘綖首善風聲樹成均雅化宣尊師勞法駕視學列班聨東魯諸生集陽春吉日蠲瑞徵蓂一葉暖趁柳初眠銀闕千門曉璿霄萬騎闐卿雲晴䕶輦朝旭彩浮旃丹鳯城迢遞青槐市鬰芊上公隨振鷺扈從冕高蟬簪佩迎鑾肅圭璋執事䖍兩楹陳法器八佾應宫懸緹盎金莖露瓊鑪寶篆煙焫蕭通肸蠁酹鬯達淵泉盥薦孚顒若羮牆恍見焉講堂黄幄啟御座紫微連咫尺垂清問敷揚闡妙銓儀曹持案進祭酒執經前縹笈緗文錦瑶函白玉編治平功有序精一理徐研德是新民本中為作聖𫝊庶僚咸陛立羣俊盡橋圜士氣懽無地温綸降自天大官𫝊賜食太府出頒錢俎豆升前哲冠裳逮後賢賔興歌簉跡論秀慶隨肩兩序增唐舍三雍廣漢員羣倫䝉雨露舉世荷陶甄帝範丹青炳皇言琬琰鐫儒風宏海宇德教浹垓埏衆協三階正時成六位全璣衡調鳯厯奎璧映龍躔拜舞陪鴛列賡揚拂彩箋攄辭忱莫罄惟頌萬斯年聖駕親詣太學大禮慶成詩勵宗萬觀光先上國首善自京師設教由來重斯文儼在兹我皇躬聖德稽古及昌期既舉親耕禮旋修視學儀大昕暄戒鼓清道肅揚旗噦噦鸞聲動莘莘胄子隨松楹瞻美奐栢寢望葳􅅋玉趾登堦墄香芹薦鼎彛專誠初奠幣分獻各陳巵籥舞徵周佾笙歌叶后夔景行紆紫紱咫尺近緇帷移輦儒臣從升堂講幄披明新揚妙理精一闡微辭恍聽虞廷石疑聞孔璧絲鱣㕔齊拜手虎旅並揚眉更播如綸語均霑湛露滋鹿鳴添雅吹􅉇化溢天池典訓星辰燦宸章日月垂金鏞宣未已木鐸盛於斯南北東西化詩書禮樂規洵同豐鎬日全勝永平時性命通三極聲明浹四陲大成今克紹正學自無岐忝預圜橋列恭吟棫樸詩聖駕親詣太學大禮慶成頌謹序楊椿上御極之二年三月乙亥朔親詣太學行禮命祭酒司業坐講大學尚書於彛倫堂上親臨聽焉既講進諸生而諭之明道術崇化源也臣伏思詩大雅文王有聲之六章曰鎬京辟廱自西自東自南自北無思不服二章云文王受命有此武功魯頌泮水曰既作泮宫淮夷攸服矯矯虎臣在泮獻馘今上禮成太學而西戎羅卜藏丹金阿拉布坦之屬相次削平㨗書數日之間踵至此誠惟德動天無逺弗届之明應也臣謹倣古為四言詩一章拜手稽首以獻曰於皇聖清受兹景命建國君民教學尊聖我皇登阼二載之春爰詔大昕大常是陳迺涖於學迺登於堂迺鼓迺萬迺祼迺將迺進諸生立於階下論道横經聽無譁者既講而退諭以化源黜浮敦實亹亹諄諄念昔先儒六經羽翼祀典無文咸秩無忒載祠其先載爵其子祠有崇聖爵以博士侁侁諸生孔庶孔繁歛厥才藝進其德言歛之進之惟其以之藹藹吉人惟其使之人既庸止風俗成止先哲崇止大道行止西被東漸朔南暨訖日下大䝉空桐丹穴幅員萬里感化一心奔走偕來納贄獻琛爰有西戎未即于叙負其遐險敢于予距帥臣將威敗之漠北絶塞而還以㨗音告㨗音來告文命正敷文命正敷如鼓與桴小臣作頌上擬有周億萬千年對揚皇猷聖駕親詣太學大禮慶成詩帥念祖水𣲖宗星海山源起岱陽薪傳恢聖緒道脉付皇王極建君師統天懸日月光車書齊甸服禮樂燦冠裳六合資陶鑄羣猷入紀綱厚生旋正德立教首陳常治象符乾運文芒烱震方記年維析木吉朔屬青章宸慮勤興學鸞旂涖上庠雲霞澄璧沼檜栢䕃宮牆律暖簫韶曲班聨鵷鷺行至尊䖍釋菜百辟肅承筐敬致通深契心凝結異芳螭頭蟠靉靆龍衮拜輝煌厯歴槐隂砌峩峩虎觀堂柳風環館舍花雨潤縹緗誦習猶鄒魯樽彛溯夏商司成邀輦輅多士效趨蹌黼座瞻華蓋長垣耿玉牀筵開東璧府坐暎紫薇郎蕙帳披牙軸芸編啟繡囊明新該本末精一晰微茫大義宣鐘鼓圜橋喜覲揚金盤分御果瑶醆沃仙漿湛湛春膏被霏霏帝澤香儒林才益茂蘂榜氣彌昌美器呈瑚璉殊姿逞棟梁祥麟遊廣藪鳴鳯在高岡雅頌敷詞藻勲庸著廟廊小臣逢盛典珥筆繼賡颺聖駕親詣太學大禮慶成詩尹繼善帝業文明盛皇猷德教先崇儒恩正渥釋菜典尤䖍道接尼山統心符泗水傳瑶圅呈瑞彩石鼓篆祥烟栢老明霞麗松虬積翠妍一人昭對越百爾列班聨肅穆陳圭瓚趨蹌執豆籩雷彛横几上玉磬振堂前聖智分條理中和按節宣馨香通奏格敬謹仰周旋式重尊師禮躬親御講筵明新經學㫖精一禹謨篇觀聽環橋立敷陳綴席連三公同搢笏多士並隨肩虞典申功叙箕疇化黨偏聖衷誠蕩蕩王道自平平辰極光雲漢奎星燭斗躔九歌存亮采四術早興賢訓諭咸遵守詩書足細研層階齊錦座香茗間龍涎俊乂榮施遍邦家景福延裁成欣遇泰保合快乗乾盛世常升秀微臣實備員薰陶依舜日樂育戴堯天人被春風暖花因㴻雨鮮昇平無以報繁祉祝年年聖主親詣太學頌謹序方苞臣聞天佑下民作之君作之師二帝三王所以隂隲下民而使各得其恒性者以能兼立乎君師之極也虞廷教胄直温寛栗帝親命之在周文武之興辟雍鐘鼓並見於雅歌詩人推原以為東西南北無思不服實由於此記曰天子視學大昕鼓徵興秩節以事先師而春秋簡不帥教者亦親涖焉蓋以至尊而盡禮於先師所以見尊德樂道之誠以一士之不帥教而天子乃親聽之所以使震動恪恭而不敢茍以自棄也我皇上涖政之初即詔崇至聖先師祖考五世並加王爵兹以三月朔日躬臨太學特諭大小諸司凡公牒祝詞並稱詣學不得言幸大哉綸音誠前古所未有也釋菜禮成乃御經筵宣恩㫖越日復頒聖訓誨誘諄諄庶官庶士罔不感勵臣竊惟天道至教聖人至德我皇上至敬至誠凡郊廟典祀必躬親薦饗終日乾乾皆所以教羣士使知持身守道之則也躬秉庶政日昃不遑宵旰餘閒猶披文史皆所以教羣士使知治業赴功之凖也激濁揚清閑邪褒正使有司絶苞苴之徑諸生杜干謁之私又所以教羣士使出入於太學者必思無愧於孔子之門牆也蓋我皇上常以身教而董之以實政誠兼盡乎作君作師之道而揆之重華之教胄文武之作人有若合符契者豈特躬親毖祀合樂稽經為臨雍盛典歟臣昧學少文不足以敷揚閎休然葵藿之微不能不向太陽而傾心者物性之自然也敬撰頌言用附於巷舞衢歌之末云爾其辭曰惟天牖民建極有常作君與師人紀是張煌煌辟雍四方之綱天子照臨人文其昌五帝建德成均是崇三代之化於論鼓鐘我皇敬學表正自躬先聖後聖其揆則同九有乂安萬官承則政教既行典文可式率民以耕南郊之耤範士以禮澤宫是即優崇先聖王及高曾視學曰詣義以正名乃親釋菜典禮攸行乃布經筵大義是宏明新共貫治平馴致聖有微言皇成至治精一執中心傳無二皇實操此以制萬事禮樂政刑罔非至教况睹天顔近光有耀嘉奬儒先是崇是報廣開賢路是來是勞宫懸具奏雅聲洋洋我皇端拱顒顒昻昻三階肅肅圜橋蹌蹌被此休烈羣思奮揚干羽之舞苖頑效誠在泮獻馘淮夷是懲文德誕敷武威益行開我明堂四荒來庭聖駕親詣太學大禮慶成詩謹序汪由敦皇帝親詣太學釋奠於先師殷禮肇稱先期致戒厥明行事登拜奠獻嚴敬有加翟籥笙鏞既和且備乃御彛倫之堂正坐進講扈從大臣稽首賜坐諸生環拱而聽宣揚聖訓大􅄎德施翼辰復頒上諭一章懸揭中庭勉諭諄至洋洋焉濟濟焉曠世之盛典也洪惟我國家文明之運景爍無疆列聖開基右文稽古聖祖仁皇帝夀考作人超軼百代皇上握符建極適當重熙累洽之時樂育賢才振興儒術御門之始首沛德音尊崇先聖加封五代王爵兹者涓期視學復勅臣工勿稱臨幸所以致敬於先師者至隆講筵甫竣即命廷臣集議先賢從祀之典子孫增置博士所以加禮於儒先者至優元年特開鄉會恩科至是復增國子生解額十八名復五經試額廣學官弟子員所以教勵人才嘉惠士子者至深且厚大小臣庶親被道德之光華懽忭鼓舞僉拜手言曰皇上大德純孝躬聖人之行以啟牖斯民舉凡興道致治立政用人無一不本於聖人之道而於教化本原尤加意焉唐虞三代之隆復見今日史冊所傳建武中元之世方領矩步委蛇三雍冠帶搢紳圜橋億萬者抑云末矣臣以太學諸生幸與觀聽不揣固陋謹依古體作頌十有二章章八句恭紀盛事進呈御覽臣曷任踴躍忭舞之至詩曰皇矣聖皇丕承景命黎民時雍萬邦表正世德作求緝熙執競建元凝道以聖契聖一章仰惟先師至教斯􅄎日月同明天地同古遐溯靈源曰高曾祖晉封肇祀曠典具舉二章煌煌辟雍王化之基神聖首出作君作師爰咨禮臣爰秩禮儀爰餙丹艧宮牆禕而三章維莫之春月吉辰良和鸞鏘鏘太常央央大昕鼓衆集於虞庠天子穆穆芹藻有芳四章黼座載升㦸門載啟胄子侁侁多士濟濟旅進於廷肅展其禮有晬天顔嘉樂豈弟五章咨爾儒臣肅事法筵笙簧六藝羽翼羣賢道源聖海義藴敷宣陋彼東觀訓詁是研六章洋洋聖謨詔爾多士希聖希賢自孝弟始毋華其言而棄厥美如津有梁如塗有軌七章惟聖作則以身立教惟士克敏劬學嚮道以率蒸民是則是傚修厥天彛順彼先覺八章繄惟列祖仁漸義摩我皇紹休德洽太和麟遊郊陬鳯噦卷阿惟元與凱疇足云多九章肆惟元祀英賢彚升媚於天子霞蔚雲蒸俊乂飭職棄瑕録能惟帝時舉郁郁其興十章敦崇四術慎徽五典懿彼賢關倡於首善文命覃敷皇猷載闡盛治彌隆教澤彌逺十一章鬰鬰泮林青青子衿承風仰化懷之好音帝德廣運春盎淵深萬年景祚伊始自今十二章欽定國子監志卷五十六

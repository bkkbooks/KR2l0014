front:
  text: 欽定四庫全書欽定國子監志卷十六
  hash: sha256:b7201b70c5097a5e95e06e8354b7b5a945d061c719fa0bec0491065b409da2a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_016-1a, image: WYG0600/WYG0600-0154a.png}
body:
  text: 禮四獻功康熙三十五年聖祖仁皇帝親征厄魯特噶爾丹朔漠蕩平禮部奏請舉行慶典特遣官釋奠先師孔子四十三年御製平定朔漠碑文勒石國學雍正二年大兵西征羅卜藏丹津青海底定凱還世宗憲皇帝御午門受俘遣官釋奠先師孔子御製平定青海碑文勒石國學乾隆十四年大兵征金川酋長娑羅奔窮蹙乞降皇上憐而宥之金川底定凱旋廷臣請循聖祖仁皇帝平定朔漠世宗憲皇帝平定青海例告成于學詔從之遣官釋奠先師孔子御製平定金川碑文勒石國學二十年大兵平定準噶爾俘達瓦齊伊犁底定大功告成遣官釋奠先師孔子御製平定準噶爾碑文勒石國學二十四年回部全境蕩平天威逺播拓地二萬餘里大功告成遣官釋奠先師孔子御製平定回部碑文勒石國學四十二年大兵進克噶喇依獲促侵土司索諾木及其頭人等兩金川全境蕩平大功告成遣官釋奠先師孔子御製平定兩金川碑文勒石太學謹按獻功之典僅見于魯頌王制二篇三代以降獻俘受降率皆行于太廟社稷而釋奠朝函于學之典闕而不舉我悉臣偶有小醜陸梁一區宇薄海內外悉主天威赫怒自作弗靖命將遣師莫不犁庭掃穴克奏蕩平至于振旅言旋大功既蕆遣官虔告儀視春秋釋奠而且樹豐碑于國學以紀成先師文德功猗歟休哉武功真度越前古萬萬矣欽定國子監志卷十六
  hash: sha256:500e563615e44048d4b6020b6bfd92632e3b6d07fef157f1be80822334bde024

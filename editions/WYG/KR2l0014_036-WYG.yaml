  text: 欽定四庫全書欽定國子監志卷三十七
  hash: sha256:9703e13cb8a7f6ea1530839d4b666d5b8911936f637c3a59a06266705a748f31
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_036-1a, image: WYG0600/WYG0600-0403a.png}
body:
  text: 生徒三算學國子監算學生滿洲十二名䝉古漢軍各六名漢人十二名又欽天監附學肄業生二十四名共六十名凡滿洲䝉古漢軍算學生俱于八旗官學生中考取漢人算學生無論舉人貢生生員童生由監㑹同算學考取欽天監肄業生由該衙門奏撥算學肄業謹案算學向例止附八旗官學乾隆三年始令欽天監另立算學四年始以算學𨽻國子監兹謹就現行則例開載其厯年增定章程附誌于後康熙九年聖祖仁皇帝以天文所繫極大必選擇得人令其専心肄習方能通暁精㣲詔選取滿洲官學生六人漢軍官學生四人令欽天監分科教肄五十二年設算學館于暢春園之䝉飬齋簡大臣官員精于數學者司其事特命皇子親王董之選八旗世家子弟學習算法雍正十二年果親王奏准八旗官學増設算學教習十六員每旗擇學生資質明敏者三十餘人定于每日未申兩時教以算法乾隆三年尚書兼管監事孫嘉淦奏准官學之設専為教飬八旗子弟以讀書繙譯為業算學理數精㣲非童稚所能驟通况以一時之暫教授三十餘人勢難遍及算法乃欽天監専司令其酌量辦理所有官學生學習算法之例槩行停止又禮部議准欽天監附近處専立算學一所額設教習二人滿漢學生各十二人䝉古漢軍學生各六人算學教習即以奏停八旗官學内教習算學之人充補五年期滿訓課著有成效者交部議叙舉人筆帖式充補者以靈臺郎用貢監生員充補者以挈壺正用官學生算學生充補者以博士用其奏停教習補竣之日即於學生中擇習業有成者考選充補滿洲䝉古漢軍算學生即於八旗官學生内擇其從前曾學算法資性相近而願學者不拘旗分選取漢人無論舉貢生童或世業子弟願入學者取同鄉京官印結具呈國子監㑹同管理算學大臣考試録用五年期滿學有成效者滿洲漢軍學生由該管大員㑹同欽天監秉公考取擬定名次咨吏部注冊遇本旗天文生員闕挨補天文生每旗滿洲二人漢軍一人向無䝉古今算學生既有䝉古六人為數無多應與滿洲算學生一同考送吏部按定名次歸本旗補用漢學生期滿並得考取舉人引見以博士用貢監生童以天文生用又議准算學生功課以御製數理精藴分為線靣體三部每部各限一年通暁七政共限二年其初學者由線部按次肄習填註課簿期于精熟月有課春秋有季考嵗終則算學㑹同欽天監大試分别勤惰去留四年命以算學𨽻國子監自是文移吏牘俱以監印鈐之稱國子監算學六年管理算學太僕寺少卿成徳等奏准滿洲䝉古漢軍算學生俱與八旗官學生一體考試恩監又漢算學生中有由舉貢生員考取者得應鄉㑹試惟由童生考取者籍非順天則無考試之例但既在學肄業不能囬籍考試應照八旗官學生之例亦准其考試恩監十年欽天監奏准將肄業天文生二十四名交與算學館附學肄業又選學業有成之算學生協同教習分教一應訓課應試考取天文生均與算學生同十二年定算學額設教習二人外添設協同分教三人教習未滿五年分教未經實授遇有升任仍留教習令滿五年奏准議叙謹按元明二代不立算學惟元世祖至元六年令䝉古子弟習算見於續文獻通考明太祖洪武二十五年令國子生習算見於明太學志又宣宗實録載宣徳四年曾令國子監諸生習算而考厥由来止以歴事諸生不通算數俾之畧為肄業足以清釐公牘而已教之不専課之無法與今國子監算學設官専習者逈不相涉故㮣從刪削云欽定國子監志卷三十七

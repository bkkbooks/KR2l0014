body:
  text: 藝文二應制二聖主臨雍頌謹序鄂爾泰皇帝既藉千畝越三日詔詣太學所以明教養相維用究道化也質明行釋奠禮禮成御彛倫堂進儒臣闡揚堯典及中庸首章之旨大哉皇言確然示人易矣伏惟皇上聖資天縱聖學淵懋緝熙光明統於一敬天文丕煥作述兼該類皆攄寫性真昭宣道妙至是親發德音甄陶譽髦蓋本夙夜宥密以覺世牖民觀聽者萬數靡不中心誠服曠若發矇信乎君師之極軌已臣恭際盛典睹穆穆於上明明於下於以導揚聖德助流教化其何敢後爰忭舞而系之以頌伏候採覽其辭曰皇帝御寓疊聖重光秉沖思默惻惻星霜維時三祀格祖垂裳總章覲牧東田訓氓風宣緯序乃紀乃綱自天攸縱帝謙未遑澄神宙始遐晞周行建官班政掌􅍇詔王仰惟三后講德明堂宅京時乂詒翼丕臧爰命太史蠲日位常朕入太學覿於羮牆萬世之師迪豫用匡大昕行事其日少陽雨霽風止雲縵星芒華蓋駐影列缺超驤龍樓早闢絳幄遙張旗分栁色輦過芹香樂陳武德斗運文昌羽林夾侍蟬冕相望畫栱鬱起銀鋪略當據圖懸極徹瓦流黃藜耀太乙璧散明璫宗彛儼雅宸衷倣徨規重矩疊執玉捧璋既陳犧象迭奏竾簧金絲繹繹栒簴趪趪天顔有穆哲嗣來慶奠楹屏惕入室濟蹌禮備物志詔幸膠庠國老胄子東序西房三雍跨漢六館邁唐乃藉綈几載啓青箱更端問難秉尺裁量講壇鼓鐸道岸梯航橋門擁聽玉振訇鏘性發孔藴欽闡堯章曰中曰敬盛德詡揚功參元造心納八荒永思金鑑時啓縹囊六經日月百氏粃粳登山走岱觀水滙滄王在在鎬嘉言孔彰汰華選實擷秀滋芳環中騰躍露下清瀼乾端坤倪魚泳禽翔天眷彌極青祗效祥煙籠柏翠羲停晷長神歡人聚軼景凌蒼匪惟鳴鶴叶彼􅔘凰匪惟遜敏緝熙就將宫廟臨保雅頌成康吉士藹藹教澤洋洋維道尊聖維聖翼皇億萬斯載立極無強竊比吉甫頌以言揚聖主臨雍禮成頌謹序福敏臣聞至治之世必重親師大化之行端由教學於論於樂著美聲詩上丁仲丁具詳禮制顧道統自羲軒而後至孔子而集厥大成亦尊崇由漢唐以來惟本朝乃極其明備蓋先聖賴後聖而益顯君道因師道而彌光也欽惟我皇上德由天縱學懋敏求內聖外王直抉尼山之藴上律下襲遙承泗水之宗既默契其心傳亦躬行其要道猶且親揮翰墨銀鈎表天地之功整飭殿廷黃瓦煥雲霞之色敻哉尚矣蔑以加焉乃帝德逾光宸衷倍切先庚釋萊既勤清蹕以躬行大昕鼓徵復考鴻章而蕆事時則歲行當午沐教已逮於三年月令季春合樂宜諏於初吉泠風載道方旋軫於天田朱旭啓晨聿陳儀於日馭華鐘徐動玉輅遙臨翼翼生徒迎鸞廣術蹡蹡法從弭節櫺星皇上乃歷東階修北面展牲獻帛儼珠庭日角之式憑秉籥升歌恍玉振金聲之在列苾芬既薦墳籍斯陳爰御經幃宏敷講席中和位育探性道之淵微恭讓欽明仰文思之光被精研奧義親示睿裁瞻近龍顔如躬際帝廷之揚拜恭聆天語共率循聖域之階梯隨輦千官慶升堂而就日圜橋多士班夾陛以如雲親肅肅之盛儀沛洋洋之德意殊恩覃布樂育推先聖之心曠典頻霑垂裕遍羣賢之裔信二帝三王之德體全備於一人歷千秋百世而遙疇潔隆於今日臣恭逢盛事不揣蕪陋謹拜手稽首獻頌曰皇哉聖皇膺圖御宇聖敬日躋左規右矩雨布雲浮德洋恩漙薄海光天式歌且舞一章乃稽聖籍於赫三宮合衆興德實先辟雍乃諏吉日乃考鼓鐘大昕是徵先聖是崇二章龍旗載揚鸞車載行制侔宸居數仭宮牆停鸞矩步入室升堂仰瞻天表穆穆皇皇三章柷敔笙鏞籩鉶簠簋盛服齊明禮班弟子如見羮牆如親杖几重道尊師振古莫比四章蕭光既升雅歌既陳天臨講座咨爾儒臣敷論性道發故啓新稽古有訓示我通津五章濟濟諸生侁侁胄子外薄四海雕題鑿齒皇極敷言凖平車指大哉文明蒸我髦士六章維帝之德與兩大通維帝之心與千聖同恢張至教丕振儒風無思不服南北西東七章文教覃敷淳風布濩蕩蕩平平遵我王度鳯􅔘麟逰卿雲甘露億萬斯年受天之祜八章聖主臨雍禮成頌謹序張廷玉欽惟我皇上以天亶之姿懋日新之學興道致治文教覃敷東西朔南罔不暨訖乾隆三年春三月甲寅躬行視學之典釋奠於先師先日致齋百禮咸秩大昕鼓衆環集于橋門皇帝整法駕從百官言詣辟雍自大成門降輦而入升階就位儼恪有加奠獻既行乃御彛倫堂命儒臣進講經書王言昭示廣大精微自王公卿尹以及六館生徒四氏十哲子孫環列拱聽莫不愈懌鼓舞思自振勵以近天子之光而沐聖人之教煌煌盛典千載一時臣謹案紀云古者建國君民教學為先言人君致治之本必由於學也書云學古入官議事以制言人臣輔治之術必由於學也故説命之辭曰念終始典于學又曰學于古訓乃有獲孔子生知之聖不廢敏求用能兼綜百王師表萬世我皇上聰明睿知文武聖神薄海內外無不知聖天子道德高深超越隆古而臣叨被殊遇日侍禁廷當深宮育德之年即已備員講讀親睹我皇上懋勉功深基命宥密敬體世宗憲皇帝明理立誠之寶訓敦行不怠日就月將以徇齊敦敏之質而宥密單心有非承學之士所能及其萬一者是以御極以來敷政寧民無非本天德而行王道作君作師一以貫之實有以接洙泗之心傳而臻二帝三王之治兹當臨雍釋菜大典丕昭臣幸得親隨灌獻之末恭承聖誨用敢質言所見作為歌詩紀述美盛非徒襲揚扢之具文實將以昭式多士流示無窮臣不勝踴躍歡忭之至謹拜手稽首而獻頌曰惟皇敬學表正自躬文思光被化理聿隆風教之本厥由性功緬企先師心源則同其一至矣素王規天矩地受命端門斯文是寄列聖相承欽崇弗替帝德重光禮明樂備其二峩峩廟貌翬革聿新宸翰高懸輝映星辰肅將祀事維莫之春鸞旗戾止言詣成均其三鸞旗央央戟門斯啓拜獻登階特牢備禮有睟其容有秩其禮百爾趨蹌師師濟濟其四祀事既備乃開講筵聖謨洋洋如日麗天詔爾儒臣是究是研俾爾庶士是陶是甄其五皇帝曰都後先一揆入聖之階如塗如軌講學敷行遹觀厥美凡此秀民咸喻朕旨其六亹亹吾皇繼天立極位育其功欽明其德成性存存小心翼翼發為訓辭為萬古式其七太和翔洽賢俊彚升薪之槱之髦士用蒸文治亶敷隆隆其興億萬斯年百祿是承其八聖主臨雍禮成頌謹序方苞蓋聞孔子為萬世帝王師以能開萬世之屯蒙而道濟天下也自秦以後一姓代興規模草創必先尊禮至聖以繫天下之人心繼世賢君莫不臨雍講學憲老乞言蓋天下之民知孔子之道伸則萬事皆得其理而太平之澤將目見而身被之也臣竊惟尊禮至聖之實在信其言而行其道孔子所以告君者具在中庸問政之篇我皇上御極以來修德體道於九經之宏綱要旨無一不實踐焉故能以浹嵗之間使四海蒸黎慕義懷仁之心勃然而興起蓋由聖資敦敏好古典學幾二十年於孔子之道求之切而信之深故本於皇躬達於政教者如是其誠且篤也用此質諸先師實在天之靈所深嘉而厚望者豈特大昕鼓徵為圜橋所觀聽哉乾隆三年季春朔後一日皇帝躬詣太學釋奠禮成親講中庸之首章堯典之首節蓋自邃古以來盡性命之理建中和之極行於當時而位天地育萬物者功莫盛於堯垂於萬世而明大道彰至教者德莫盛於孔子是乃我皇上夙心所祈嚮自志學之初以及御天之日戒慎奉持惟恐有須臾之離用以上格天心而下通民志者故嘉與天下臣民會歸於有極也兹與孔子所傳體達德致達道以行九經而一本於誠者實相表裏臣伏念臨雍之禮舊史所書典文俱備詞人所述體製各殊炳炳乎無以尚矣臣學蕪年耄語不能文謹據所見敷陳質言特著其信而有徵者頌曰昔在孔子賢於堯舜匪德能優惟功之盛堯仁如天一世之幸尼山木鐸千秋金鏡天祐下民我皇篤生夫子之道逮我皇而大亨至仁肫肫學與性成秉持六經踐以躬行智以成仁善繼善述大孝之光治殊道一仁以生勇心純事實以道成身久而不失敬禮師傅收恤耆儒一言片善采納無虛若逢顔孟次或程朱尊德樂道當更何如敦敘懿親德心普被蕩滌宿愆坦然無忌羣公三事凡百有位推誠備禮豈惟祿賜惠保蒸黎子寒子飢憂民如疾愛之如私德以撫順信以招擕窮荒僻徼覆幬無遺九經三德先師所傳我皇得之時乘御天先師有志皇實成焉以考以質宜無間然月吉辰良皇親釋奠惟秉德馨肅將嘉薦先聖之揆後聖時憲精意所通羮牆如見聖言深閎教思孔誠四表上下格以欽明中和之致位育之徵原於性命戒懼所成庶官庶士敬而聽之惟皇之極即自得師是訓是行先師鑒兹勉為貞臣毋負昌期聖主臨雍禮成頌謹序陳大受皇帝誕膺景命統臨萬國作之君師以為民極御宇之三年既擇元辰藉於千畝其三月二日乃詣辟雍以表彛倫宣教化皇哉甚盛典也臣竊惟至聖之道光昭宇宙內聖外王渾全純備依古以來所為一道德同風俗措天下於蕩平正直之歸者胥由乎此我國家列聖相承右文敷教超軼千古皇上以天縱之資懋修典學闡洙泗之淵源紹尼山之統緒先聖後聖契若合符前年既頒特旨增修文廟易蓋黃瓦今春上丁展祀備舉三獻之禮復親灑宸翰昭揭大成殿用示欽崇令典隆儀有加無已乃者大昕鼓徵躬釋奠於先師俾儒臣進講中庸堯典聖訓精詳天恩髙厚所以嘉惠多士者甚至自王公卿尹聖裔賢嗣垂紳峩辨之儒期門羽林之士莫不鼓舞歡忭仰見皇上崇儒重道廣勵學官而益以知道洽政治之原也臣聞古者建國君民教學為先唐虞上庠下庠之規直溫剛簡之訓載在遺編亦越姬周鼓鐘辟雍訖乃聲教時則成人有德小子有造其極至於東西南北無思不服蓋聖天子道積厥躬而作人之效如是其逺且大也我皇上備欽明恭遜之德握性天道教之原既以聖人之修已者本諸身即以聖人之教人者廣諸世故自臨御以來恩普德洋教行化洽山陬海澨淪浹靡遺天下之士將必有懷德秉義近文章砥亷隅以光輔太平者蓋陶淑人才即所以茂登上理豈僅如史册所傳圜橋之衆三舍之規循故事美觀聽而已哉臣幸際聖明不勝踴躍歡欣之至謹拜手稽首而獻頌曰天亶聖哲扶樹人綱金聲玉振性道文章孰窺美富數仭宮牆百王繼武俎豆芬芳繄惟聖王誕敷文德於月之􅒸於日之域緬兹典型遵乎憲則璧沼圜流萬邦矜式閟宮業業黃屋是崇宸章炳煥騫若虯龍與天地參樞機化工下蟠上際道妙允充風氣之開神京伊始霞蔚雲蒸蟬聨鵲起濟濟儒生侁侁胄子近天子光訓行惟是華鐘既鏗鼉鼓斯響天步肅臨寰瀛欽仰元纁以薦太牢以享禮成樂備德音載廣有堂翼然人倫攸敘蒸我髦士亦集爰處皇帝曰俞式聞聖語宏教宣風基於庠序民有秉彛本乎天命道立教行生安謂聖欽明文思平章百姓放勳重華後先輝映巍然隆範欽哉訓辭一人作則為萬世師既富方穀躬實導之同文共軌六合雍熙聖主臨雍禮成恭紀謹序蔣溥臣聞建國君民教學為先虞夏殷周以來膠庠既備典制聿詳至於大昕視學於樂辟雍詩禮之舊聞尤盛事也仰惟孔子立師表之極擅參贊之功纍代尊崇加以隆禮然而禮不虛行必有其合惟王者躬有聖德直契心源於是制作休明舉行曠典使天下嚮風而慕義則惟聖朝為極盛我皇上承乾御宇錫類推恩大孝格於高穹至仁周於薄海加以聖學宏深亶聰天縱所著樂善堂全集日知薈説二書海涵地負茹古納今乃以君師之合統昭先後聖之同符稽典方新即修視學之禮釋奠既畢講席斯開合萬國之生儒親一人之提訓煌煌乎郁郁乎洵所謂被堯文光舜孝軼周雍而邁魯泮者矣臣職叨侍從珥筆禁林不揣弇陋恭紀詩篇以志訓行近光之慕不徒敷揚美盛云鑾輿曉度傍櫺星統合君師式典型萬仭宮牆輝釋奠九天雲日照橫經先登道岸尊前聖獨契心源示在廷樂備禮明恩浩蕩春流芹藻有餘馨其一坦坦賢街接禮門升堂展敬帝容溫虬松舞翠枝逾古鴛瓦流黃制倍尊物備兩楹車服盛爵陳三獻禮儀敦無言自有羮牆契北面親師對越存其二鸞旗翠葆映霄雯午夜生徒佇大昕香靄氤氲披御座霞光燦爛仰天文敷揚性命傳洙泗尚論欽明重典墳名理會心期共喻圜橋冠帶蔚如雲其三聖朝文治洽膠庠更企宸修卜運昌三殿瑶籖垂制作六堂寶架煥文章淵源早識傳心法俎豆重看發道光今日講帷沾教澤無私化雨遍遐方其四聖主臨雍禮成恭紀謹序張若靄欽惟聖天子功隆位育統備君師先知覺為聖人亶聰明作元后大猷格被覩諴民阜物之能文命覃敷昭緯地經天之業乾行不息日進無疆於緝熙單厥心念終始典於學丹書緑字每陳往訓于湯盤縹帙青緗時考遺文於孔壁宸章璀璨彩爛雲霞御集琳琅光昭日月先萬方而表則統六合以同文念京師為首善之區太學實儲材之藪鼓鐘羽籥道備三雍禮樂詩書教崇四術將化民而成俗必釋奠以親師特敕禮臣載新文廟雕甍翼翼鋪來一色泥金文瓦鱗鱗望去千重赤赭爰諏吉日肇舉隆儀嚴先事之致齋定從臣之陪列朱旗繪日仗列螭坳黼幄連雲班分豹尾候鯨鐘之初動晨霞偕璧彩齊輝瞻鳯蓋之遄飛瑞靄與奎光並煥千官扈蹕爰來習禮之宮六館歡迎共侍成賢之里望星門而降輦臨大次以更衣拾級升階登堂就位輝煌燎炬近接文光馥郁爐煙遙通道氣夏瑚周簋覩法物之駢羅舜瑟軒琴聽韶音之迭奏舞成八佾歌備三終圭瓚方陳特下冕旒之拜衣冠畢集咸勤紱舄之趨對越維誠焄蒿畢達乃陳法駕言涖黌宫開御幄於鱣堂進瑶編於鶴案遡欽明之統緒直契心源探性命之精微宏宣道藴王言丕著如聞聲振之音帝語親傳恍發疇圖之祕褒衣博帶羣瞻有道之天顔鼓篋橫經共沐無私之聖化爰頒寶訓疊降綸言恩榮遍及於臣鄰宴賚尤加於聖裔濟濟鴻都之彥聞鳯詔而傾心雍雍虎觀之儔向龍墀而拜手儒林志喜藝圃沾榮臣學愧面牆心希入室夙典文章之事稱職為難欣依侍從之班觀光是幸敬呈歌詠式效對揚聖德修而萬民化知四海之從風師道立而善人多見八方之歸極詩曰黃幄新開萬仭崇鑾輿視學出齋宮祗因百代心源合愈覺三雍典制隆鳯幄翠分庭柏影鸞旗香滿沼芹風青袍道左爭迎拜一體君師教育同其一爐煙漠漠靄彤墀翔步升堂盥獻時已向兩楹陳俎豆如聞四壁應金絲留連車服看猶昔對越羮牆儼在兹紅燎光中親展禮天顔肅穆侍臣知其二合樂聲終扇影回儒臣先侍講堂來繡袍黃繖從天下綈几牙籖對御開共覩欽明光格被久知位育道全該尼山宗法唐虞治並列瑶編仰睿裁其三銅街簇仗駕飛黃仙蹕才移晝漏長萬國共欣瞻鳯藻諸生新得覲龍光統開八百車書會人在三千弟子行遙見金根隨化雨殿槐壇杏一時芳其四聖主臨雍禮成恭紀尹繼善章天雲漢燦奎光門啓櫺星俎豆香夾道松隂新鬱翠重簷鴛瓦煥離黃其一才見明禋格上丁更諏吉旦薦惟馨禮修釋奠虔三獻教在親師闡六經其二噦噦鏘鳴建羽儀翠旗迎處見恬熙欣傳聖道昌明日正是光華格被時其三宸章絢爛麗銀鈎贊化功能洵莫儔不是心源相契合焉知天地與同流其四無言盥獻達精誠玉豆雕籩設兩楹大樂從知臻善美始終條理太和聲其五數仭宫牆入望中教垂萬世仰崇隆欲觀美富門難得特許儒臣助祭同其六黼座親翻玉笈開一時雲物睹昭回睿思包盡圖書祕不藉崆洞訪道來其七駿奔執豆荷恩榮濟濟雲礽取次行錫賚有加踰往制歡聲傳遍魯諸生其八聖主臨雍禮成頌謹序汪由敦欽惟我皇上神明天縱聖敬日躋煥乎文章光被四表海內承學之士延頸企踵喁喁向風文治彰明敻哉尚矣猶念太學為賢才之關教化所自粵乾隆三年春三月躬釋奠於先師禮成御彛倫堂儒臣進講皇上親渙玉音闡明大義維時公卿侍從之臣以及聖賢胄裔太學生徒環侍竦聽者凡數千人咸得仰瞻天表親被道德之光華郁郁乎煌煌乎前史所云辨折異同正坐自講章句質疑稱制臨決方斯蔑如矣臣竊惟太學之制肇於有虞盛於成周而大備於昭代我列祖化成久道夀考作人教澤涵濡至深且厚而我皇上躬聖人之德明聖人之道修聖人之教舉有造有德之士鼓舞而作新之在詩大雅曰古之人無斁譽髦斯士而其頌文王也曰於論鼓鐘於樂辟雍其頌武王則又曰鎬京辟雍蓋周先王之德澤相繼久長而於辟雍教學之地復加之意如此棫朴作人卷阿多士德化之成其所由來若斯之逺也且夫堯兢兢日行其道舜業業日致其孝古聖人德加四海未嘗不由於身教我皇上緝熙光明終始典學羲軒以來之統孔子所謂集大成者既迪知之復允蹈之藴之為盛德施之為大業純亦不已道積於聖躬教思無窮蒸我髦士於是恢熙朝之隆緒修虞庠之上儀德意龎鴻恩施溥博傳曰天子建中和之極金聲而玉振之昭景爍揚洪休逖考曩編實惟今日臣幸覩斯盛敬隨諸臣之後作為頌歌拜手稽首以獻其詞曰天佑下民若有恆性克綏厥猷惟后作聖亹亹聖王顧諟明命聖德之純立誠居敬一章粵若先師道德之宗昭揭日月覺悟羣蒙于羮于牆心源相通有赫其儀式是辟雍二章於樂辟雍四方之極式擴舊章是崇是飾宮牆翼如黃中正色軒楹煥如榜題御墨三章仲月上丁灌獻既親載稽令典載卜良辰載涖橋門俎豆莘莘服膺至道執禮斯頻四章秩秩講筵煌煌大義探本天道稽古帝治位育中和欽明文思我皇有之後先一致五章至教彰矣至道光矣濟濟多士示周行矣覃被四海澤無疆矣勉勉我皇文德翔矣六章於爍列祖德洽九宇倬彼雲漢萬物斯覩煦之和氣膏之甘雨觀文化成超軼隆古七章隆古之治我皇承之蹈德咏仁髦士攸宜身示之教從欲以治於萬斯年作君作師八章聖主臨雍禮成頌謹序趙大鯨欽惟皇上膺圖御宇協和萬邦教化覃敷懋致文明之治紹承列聖心法敬事先師孔子特命大成殿易蓋黃瓦親灑宸翰表揚至德乾隆三年二月上丁既躬親釋奠復於季春行視學禮展祀先師肅將三獻乃御彛倫堂命儒臣進講中庸虞書皇上宣玉音析道要一時王公卿尹侍從之臣聖裔賢孫暨肄業成均之士環橋門而觀聽者四千有餘人咸仰聖天子重道崇儒鼓舞譽髦之至意莫不感激奮興頌揚盛典臣惟上天隂隲下民若有恆性必作之君師治而教之俾復其性要其治之之道惟本乎人主之一心虞書頌放勳之德首言欽明中庸詳中和位育之功由於戒懼慎獨惟能夙夜宥密以單厥心始能盡其性以盡人之性也夫堯舜禹湯文武之道集大成於孔子孔子之道與天地參不因時運為隆替而惟尊其道者乃有以致太平之治我皇上天亶聰明功深典學於孔子之道聖性得之加聖功焉默契於心而推之以治天下使君子得聞大道之要小人得蒙至治之澤天下皆在光華格被之中各率其性之本然而不自知用使道德一風俗同承纍洽重熙之運以洪億萬年丕丕基其由是道歟臣謹拜手稽首獻頌曰聖皇建極統先億兆示周行兮右文稽古尊崇聖道切羮牆兮諏日具儀釋菜行禮巨典光兮圭幣肅陳金絲迭奏凛對越兮以聖契聖精誠孚合儼昭格兮大昕警衆敷陳奧義親講席兮思樂泮水於論鼓鐘小大從兮恩覃樂育賢關廣闢首辟雍兮溥天率土文命誕敷暢淳風兮中和合德金和玉節宏綱紀兮文思廣運天章炳煥昭光被兮鼓篋孫業觀摩陶淑沭至治兮紹述先猷覲光揚烈接心傳兮宸修懋勤聖敬日躋惕乾乾兮人文化成誕膺寶命萬斯年兮聖主臨雍禮成賦嵇璜維我皇之建極當九五之鴻禧齊文章於七曜等制作於兩儀包君師之統緒涵道妙之淵微其闡揚夫聖德者鳯翥鸞翔之額也其默契於宸衷者素符玉册之辭也猶念瞽宗有制釋奠有規考圜橋於史册追頖璧於雅詩必躬臨夫太學而祗見夫先師於是吉日維占隆儀式備雲輅鳴鑾春旗揚斾金根照灼以炯晃龍驥騰驤而沛艾太乙執節以先驅虹霓修竿而繁會晞陽交映於寰中灝氣震越乎區外初雷動以星馳既淵淳而嶽萃萬國之冠紱來同九天之神明翼衛蓋秀髦之迎百辟之俟者莫不翹首而瞻天趨蹌而就位也是時天子粹然玉潤穆然天運望宮牆以致欽循櫺星而徐進既升堂而入室與素王而相覲乃擊鼉鼓鏗鯨鐘建樹羽發笙鏞千燎具舉萬炬畢融宿懸階下振樂庭中八佾舞朝華之鏡九歌揚閶闔之風寶鼎轉祥煙之鬱律玉巵凝甘露之殷濃明禋昭格瞻拜從容志和氣肅德盛禮恭信乎三爵特獻萬瓦流黃始足以表其崇隆也爾乃啓綘幄登講堂張檢牒發縹緗金泥泄祕石鼓騰光位育中和首參性命欽明文思直接陶唐共識聖功之浩浩遙聞天語之洋洋已進儒臣之奏還抒心得之章闡苞符於窈眇析柢藴於微茫粲金玉於綸綍麗日月於中央蓋上以繼三古之道法而下以開萬代之津梁於是典禮告成鸞輿返蹕九重之慶惠齊頒四海之恩榮並錫褒賢推及乎雲礽享祀維馨其黍稷或博士之增置或神田之增設與聖證其心與賢敷其澤為民復其性為士興其德既皇皇矞矞海運而天聲復倭倭遲遲風和而露溢紫微下屬於橋門勾陳錯施於圜璧三才容與於元胎萬象環拱夫皇極協氣上布祥雲下積音為樂和形為人悅雕題鑿齒額首而來賔赤鳯白麟應奏而舞節猗歟曠世之鴻典大聖之盛業豈漢唐令辟所能倣佛其萬一也哉臣性道初聞精微若揭祗切訓行敢忘揚扢頌曰太素氤氲兆龎鴻兮先聖立極並蒼穹兮穆穆我后道揆同兮祀事孔明精誠通兮宏開講幄發羣蒙兮爾卿爾士盡孝忠兮敷文四國教術崇兮景運萬年昭淳風兮欽定國子監志卷五十七

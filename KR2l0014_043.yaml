  text: 欽定四庫全書欽定國子監志卷四十四
  hash: sha256:0704a8cadeffe47770809d2d553757457055f2841dfa0ab4b14aae338e033c8c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_043-1a, image: WYG0600/WYG0600-0465a.png}
body:
  text: 經費三俸秩國子監職官祭酒俸支銀一百五兩司業六十兩監丞博士助教四十五兩學正學録典簿四十兩典籍三十一兩筆帖式七品者二十三兩八品者三十八兩九品者二十一兩恩俸各視其正俸之數祿米亦各視正俸為差正俸若干兩則祿米若干斛滿官俸祿由各旗行文漢官俸祿由監行文並先期將應領之數詳書於册春季於前一嵗十二月十五日以前秋季於六月十五日以前咨送吏部稽俸㕔稽俸㕔查核有無升遷降罰事故應行增减除銷詳書於原送冊內然後移送户部滿官以正月七月三十日為限漢官以二月八月初七日為限限以前遇有除授升遷凖其補領各官祿米春秋兩季於戶部劄付之倉關領逾期不赴領者由倉場衙門報部注銷間嵗或發賣料豆國子監於户部文到日將承買各員繕册送部户部於下季發俸銀時除去豆價以其餘給本員國子監職官公費祭酒月支銀三兩折制錢二千七百司業月支銀二兩二錢折制錢一千九百八十監丞博士助教典簿月支銀一兩五錢折制錢一千三百五十學正學録典簿筆帖式月支銀一兩折制錢九百均由監行文户部支領有奉差離署者按日扣除謹案國子監滿漢各官俸祿公費均照現行則例開載所有節年更定章程詳識於後順治元年定國子監漢官於俸銀之外嵗給柴薪銀二年定職官月給公費銀有差十年定滿官俸銀若干兩給祿米若干斛漢官不論品級俱嵗支米十有二石十三年定官員俸銀不論滿漢一例照品支給罷給漢官柴薪銀康熙十年定在京漢官俸祿各衙門總領分給例新除升轉之官遇領俸時吏部已咨送户部者始凖給發過期者不補給雍正三年命在京漢官俸米斛數均視俸銀之兩數分别給豫五年定在京各衙門官員奉差離署按日扣除公費十一年定在京漢官於領俸前一月各衙門將應領銀米之數總繕二册咨送吏部稽俸㕔稽察有無升遷降罰事故詳書於原送册內以印鈴之一册存案備稽一册送户部給發至領俸之期春季以二月秋季以八月各始於初一日止於初七日凡初七日以前除授升遷者許得一例關領過此不凖補支十二年定在京各官支俸春季於前一嵗十二月十五日以前秋季於六月十五日以前繕册送吏部考核移咨户部倘所送原册遺漏舛錯照例參處吏部稽察未清者亦如之在京漢官春以二月初七日為限秋以八月初七日為限開復在定限以前者凖其補領在定限以後則不得補領亦不裁扣凡老病告休革退物故者悉行裁扣滿官則以册籍過部為定限餘與漢官同乾隆元年命在京大小文職官悉於正俸外加給恩俸其數與正俸同又定滿官支俸例在俸册過户部後補授者如有原任俸餉即不凖其補領其無原任俸餉可支春季正月三十日以前秋季七月三十日以前奉㫖除授者凖其造册送部補領過期則否其緣事開復者亦如之十三年定京官俸銀祿米已經支領而降革者毋庸追繳十四年定議八旗滿洲䝉古官學生月支銀一兩五錢漢軍官學生月支銀一兩原係膏火之資與俸餉不同向例官學生在俸册過部後授官者仍支官學生廩餼並不補領新任俸祿辦理未能畫一請視無原任俸餉可支之員給與新任俸祿詔從之十八年定議京官補領俸米春季者不得過秋季秋季者不得過次年春季有踰此者倉埸侍郎報户部注銷詔從之二十一年定在京大小衙門公費銀改給以錢每銀一兩給制錢九百俸秩附元國子監祭酒俸五十九貫三錢三分米六石司業俸三十九貫三錢三分米三石五斗監丞俸三十貫三錢三分米三石典簿俸一十五貫三錢三分米二石博士俸二十六貫六錢六分米二石五斗助教俸二十二貫米二石學録俸一十一貫三錢三分米五石元史食貨志明祭酒月支本色俸七石八斗內食米一石折銀絹米六石八斗折色俸折蘇木胡椒布匹一十三石二斗共二十一石司業月支本色俸五石五斗內食米一石折銀絹米四石五斗折色俸折蘇木胡椒布匹四石五斗共一十石監丞月支本色俸四石一斗內食米一石折銀絹米三石一斗折色俸折蘇木胡椒布匹二石四斗共六石五斗博士助教典簿月支本色俸三石九斗內食米一石折銀絹米二石九石折色俸折蘇木胡椒布匹二石一斗共六石學正月支本色俸三石七斗內食米一石折銀絹米二石七斗折色俸折蘇木胡椒布匹一石八斗共五石五斗學録典籍月支本色俸三石五斗內食米一石折銀絹米二石五斗折色俸折蘇木胡椒布匹一石五斗共五石掌饌月支本色食米一石二斗折蘇木胡椒布匹一石八斗共三石凡各官食米一石舊於監中支給嘉靖四十二年始定月支俸米於每月十八日赴祿米倉關領其折色銀兩則於户部太倉庫關領焉明太學志謹案明史食貨志洪武二十五年更定百官俸祿從四品月俸米二十一石正六品十石正八品六石五斗下至徙九品遞减五斗至五石而止遂為永制今考明制祿米之數洪武時錢鈔與米兼支永樂初去錢而兼支米鈔所給固折色多而本色少其後鈔價益賤甚至米一石折鈔十貫僅直二三十錢成化時改以布折鈔布一匹直二三百錢而折米二十石又時以絹折鈔以胡椒蘇木折鈔大率有名無實最後分本色折色為二折色之項二曰本色鈔以鈔十貫折米一石曰絹布折鈔絹每匹折米二十石布每匹折米十石本色之項三曰月米不問官大小皆給米一石曰折絹米絹一匹當銀六錢曰折銀米銀六錢五分當米一石其實自月米一石外皆折色也國子監柴薪皂𨽻每名編銀一十二兩逢閏各加一兩祭酒下六名司業下四名監丞博士助教學正學録下各二名帶翰林職者三名典簿典籍下各二名明太學志謹案明制大小臣僚並有柴薪皂𨽻由各州縣徴收罪𨽻所輸之值每年完解兵部各衙門按季於武庫司關領永樂二年命兩京官吏按口納鈔支鹽國子監由典簿㕔造冊送户部納鈔畢差吏於長蘆運司關支著為例明太學志欽定國子監志卷四十四

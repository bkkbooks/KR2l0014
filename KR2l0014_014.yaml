  text: 欽定四庫全書欽定國子監志卷十四
  hash: sha256:9e29d40c8983fb6955f208aa241babbc6edb184bdda7109e5f0b960ea14d5a9f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_014-1a, image: WYG0600/WYG0600-0148a.png}
body:
  text: 禮二釋菜順治元年定月朔行釋菜禮設酒芹棗栗祭酒於先師位及四配位前三獻東西哲廡位前以監丞博士等官分獻次詣啟聖祠今改祠崇聖行禮分獻官亦隨行禮十五日司業上香行禮與朔日同謹案舊制毎月朔朢堂上官率屬赴後殿及土地祠行禮今惟正月行之餘俱沠監丞博崇聖士助教等員於員於土地祠行禮又東西哲祠行禮助教一向以監丞博士分獻今六堂助教等官輪𣲖釋菜儀注是日清晨主獻祭酒及隨班行禮之祭酒司業俱詣致齋所更朝服贊引導由東角門入監丞博士八旗官學助教六堂助教學正學錄等官八旗官學教習暨肄業貢監生皆從詣階下通贊贊排班班齊贊跪叩興行三跪九叩禮畢贊引導詣盥洗所盥手帨手再詣酒罇所司罇者舉羃酌酒執爵者由中道上贊引導祭酒由東階升從殿左門入贊引贊詣至聖先師神位前一跪一叩興獻三爵一跪三叩興階下俱隨班行禮贊引贊詣復聖顔子宗聖曾子述聖子思子亞聖孟子位前各行三獻禮如正位儀十二哲兩廡分獻官俱俟祭酒詣亞聖位前時各贊引引詣神位前行禮如四配儀畢贊引導各官由殿右門北面揖出下西階復位通贊贊跪叩興祭酒及各官行三跪九叩禮興贊禮畢導由西角門出崇聖祠主獻分獻與前殿儀同朢日上香司業詣致齋所更朝服儀如月朔不獻爵朝賀謹案元旦各官朔朢如遇次日釋菜餘月壇大祀堂上官均與陪祀則派監丞等率領八旗廟教習六堂諸生在階下行三跪九叩禮不獻爵不上香釋菜執事員數朔朢行禮大成殿崇聖祠糾儀官二員博士助教等官充朔日釋菜大成殿侍班二名通贊四名正引哲引廡引各四名正位司罇一名東西哲司罇二名東西廡司罇二名正位司爵三名四配司爵八名東西哲司爵六名崇聖祠侍班二名通贊正引廡引各二名正位司罇一名東西廡司罇各一名正位司爵五名配位司爵二名東西廡司爵各一名朢日上香無司爵改司罇為司香文廟謹案康熙二十四年議准毎月朔朢端莊聲行釋菜禮于各項監生内選取容止音清亮者十名充禮生祼獻贊禮二十九年停止以教習帶管今用本監内班肄業生釋菜事宜朔日釋菜應用香蠟酒果朢日上香應用香蠟等項均前期行文太常寺給發闗領至期陳設屆期清晨由神庫㸃取應用獻爵等噐敬謹洗淨備用朔朢日均於大成殿階墀下甬道中鋪設棕毯分五班前祭酒司業次分獻官次隨班行禮官次八旗教習次六堂肄業生崇聖祠亦鋪設階墀之下不分班以上典簿承辦其執事各生由六堂先期揀選開送照例分派立執事名册一本拜廟名册一本令諸生各赴持敬門畫到不到者查明記過以上監丞承辦國子監則例釋菜附元中統二年詔宣聖廟月朔釋奠元史世祖紀先師謹案月朔釋奠即釋菜也攷今國子監城國廟成于成宗大徳十年則此事應在南子學有元詳于釋奠而釋菜無聞故錄此以備一代之制又案元史選舉志侍儀舍人于上中齋舉禮儀習熟曾掌春秋釋奠毎月告朔明贊衆與其能者充之盖今所為月朔釋菜者元時又謂之告朔也明成化二十二年二月朔當釋菜值上丁令以次日釋菜明會典嘉靖九年釐正祀典罷内臣降香仝上先師謹案明初毎月朔朢遣内臣于廟降香至是始罷萬厯二十三年定每月朔行釋菜禮明史禮志又公侯駙馬伯及戚畹子弟初入監之日謁先師廟行釋菜禮用兔醢果酒香燭陳設如常儀各爵列班于廟墀禮生贊行四拜禮班首上殿獻爵如常儀復位又行四拜禮監生初入監赴先師廟報名廟中禮生贊謁先師行四拜明太學志謹案以上二條别於朔日釋菜即古始入學釋菜之意也附識以備㕘考明朔日釋菜儀每月朔祭酒率分獻官暨各屬官監生行禮分獻官以監丞博士助教學正學錄為之前期一日遣屬官一員率廟户赴太常寺闗領祭品其日清晨執事者各司其事分獻官各官分列于大成門内監生排班俟獻官至通贊唱排班獻官以下各就位通贊唱班齊鞠躬拜興拜興平身引贊詣獻官前唱詣盥洗所獻官盥手帨手訖引贊唱詣酒罇所司罇者舉羃酌酒訖引贊唱詣至聖先師孔子前跪獻爵俯伏興平身執事者並同引贊唱詣復聖顔子宗聖曾子述聖子思子亞聖孟子前儀並同十哲兩廡分獻官一同行禮畢引贊同唱復位導獻官分獻官至原拜位立通贊唱鞠躬拜興拜興平身禮畢明太學志明朢日行香儀是日清晨監丞率闔屬官分列于􅎉星門内監生排班于廟門内候祭酒司業至通贊唱排班班齊闢户唱鞠躬拜興拜興平身闔户唱禮畢退明太學志欽定國子監志卷十四

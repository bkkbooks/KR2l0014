  text: 欽定四庫全書欽定國子監志卷四十九
  hash: sha256:a5a00e27bbf565e7582649b420b12b4b365230b4da5baf7d5007b7de80f2b6c8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_048-1a, image: WYG0600/WYG0600-0506c.png}
body:
  text: 金石四諸碑謝履忠集王羲之書石刻詩康熙五十七年司業謝履忠集羲之聖教序興福寺二碑字詠丁香五言古詩二章十二韻并序刻石兩面在御書樓下詩序俱載藝文門崇實振雅二軒壁記康熙五十七年十月祭酒李周望撰并書凡二石在東廂左房鑿置壁間西向記載藝文門諸碑附蘭亭石刻右蘭亭帖相𫝊為定武本或云周伯琦摹或云薛紹彭刻未知孰是背面刻樂毅論末署孟俯二字無嵗月題跋石今在御書樓下謹案此石一云元順帝北還重氊裹載棄之於路徐中山取置國學一云明初出天師庵土中送置國學一云萬厯乙酉丙戌間北雍治地得之其說不一附識於此顔真卿爭坐位石刻右爭坐位帖計二石分為四段石各兩面一石刻首尾兩段一石刻中兩段今首段缺八行後段缺九行刻石原委無考孫承澤朱彛尊以為趙孟俯臨云石今在御書樓下明文廟國子監全圗碑右廟學全圗正統十二年十一月立石在太學門右東向上為圗下為記記二十五行磨泐難辨首行題文廟國子監創建記次行三行曰文廟國子監在皇城東北崇教坊以下先記殿宇內外次及御碑即英宗御製新建太學碑次聖像一百二十四位次彝倫堂以下字缺疑即東西講堂繩愆博士二㕔率性修道各堂鼓房鐘房齊房典簿㕔碑載典簿㕔十五間春明夢餘録作三間蓋據明太學志嘉靖十年改建之後而言也典籍㕔碑載三十九間春明夢餘録作五間㑹饌堂公廨房厨井倉庫各房無不備載又記東西牌樓四座舊碑十通未詳及號房二十二號五百二十一間後記器用末署年月謹案號房有天地人知仁勇文行忠信規矩準繩紀綱法度格致誠正二十二號春明夢餘録云彝倫堂後齊明所九間格致誠正號每號三十七間嘉靖七年改為敬一亭餘十八號今觀全圖衙署之西有房六列東向各分三段正合十八之數南連退省號北至箭亭以西皆是也王同祖詩石刻右嘉靖壬寅刻石司業王同祖書并題其後曰大司成公廨後有丁香一株閲嵗已久龍石許公再涖辟雍不踰年擢南少宰俯仰今昔嬰情去來對花賦詩今大司成水南張公覽而和之祖忝先後佐二公周旋輒次韻并手書登石置之壁間背刻萬厯癸丑李元春追和詩題云以司計從事成均蓋典簿也龍石水南名皆未詳石今在御書樓下詩載藝文門老彭觀井圖右圗繪老彭臨井而觀繫身大樹童子扶持寓臨深履薄意也有宋陳靖四言銘一章𨽻書題曰皇明萬厯丁丑秋刻石在東廂後堂壁間南向謹案觀井處在今徐州為古彭城地古文孝經石刻前刻明左春坊諭德掌國子監司業事蔡毅中集注後刻唐著作郎太子中書舍人虞世南書疑取石經摹勒而另書集注於各章之下也又刻天啓三年嵗在癸丑孟冬之吉國子監監丞金維基博士張鳳竒徐牧門洞開助教董天允姚世儒孫世恪黨修吉學正顧民碞蔣尚茂典簿王象艮典籍闕烈同勒石禮部儒士吳郡吳尚端集鐫石二鑿置西廂正堂壁間欽定國子監志卷四十九

body:
  text: 藝文二應制三聖主臨雍禮成恭紀于枋列聖尊師崇典禮我皇重道啓文明鸞輿遙駐先猷渥鴛瓦新加廟貌嶸逺溯隆規從闕里特敷曠典自神京地當首善風聲近璧應中圜氣象宏詔敕司空勤朴斫帑頌內府備經營黃雲遍布連天峻金掌平鋪映日晶殿上琉璃光錯落池中芹藻影縱橫素王宫並宸居麗風伯塵從輦道清三月春光當上已十行溫語布先庚德參天地超千古道協君師集大成珠榜雙懸輝鳯翥璇題回揭耀鯨鏗扇移雉尾雲中出樂奏中天仗外鳴班列趨蹌多聖裔道傍瞻拜有諸生九衢鵠立聽傳箭五夜雞人早報更閶闔初看陳玉輅宮牆已見蒞青旌禮虔登薦殷三獻道契精微貫一誠殿廡乍傳嚴祀享橋門恰喜彚簮纓青襟爭識天顔近縹帙齊翻講席盈天命源流研似髮放勳事業見於羮理從無極推尋細德本生安剖析精更聽王言宣妙藴共嘗君賜愜羣情裹封黃帕煩中使餅餤紅綾比大烹砥礪生徒先器識選升俊造廣科名聖明繼述光前史不數貞觀暨永平聖主臨雍禮成恭紀汪士鍠御宇綏猷撫萬方風行首善蒞宫牆經筵早探文章府璧水新隆禮樂場甫厯疆原躬耒耜更期絃誦集膠庠稽疑卜吉咨宗伯奠幣鳴球詔太常湛露桐花迎仗發春深芹葉薦筵芳鸞旗映翠臨東序雲罕搖青出建章門闢櫺星金碧煥庭陳石鼓鼎彞光天書璀璨題銀榜殿瓦琉璃照畫廊俎豆明馨誠意格笙歌備奏德容彰三階登降瞻龍衮兩翼簪紳儼雁行黛柏連雲祥靄護皇輿載道惠風揚莘莘國子隨仙蹕濟濟儒林侍講堂綷䌨巾裾循律度葳𬎼劍珮謹趨蹌雲屯鱗萃班初定星共辰居幄正張御几平移丹地近琅函旋展緑綈裝微文闡發霞敷采大義宣昭斗耀芒研討千秋傳玉檢談論六藝啓珠囊諄諄帝訓敷言逺赫赫皇謨施教詳性道淵源符往哲勳猷格被駕前王瞽宗惇祀幽光表側席旁求俊乂翔庶彚甄陶歸典則姱修調燮協柔剛圜橋觀聽槐街合夾道歡呼羽葆揚多士依依魚在藻羣英􅔘􅔘鳯鳴岡欣逢盛典鍧鐘鼓文物昭回泰運昌聖主臨雍禮成恭紀孫灝敷天聲教際崇文視學昌期凖大昕膠序典追三代逺咸韶音向九成聞春旗日暖排仙仗寶幄香霏護紫雲觀聽橋門齊拜慶翠華翹首瑞氤氲其一丹桷翬飛釋奠新宮牆美富百無倫參天道與星辰炳肅廟躬將禮樂陳衮冕齊瞻森六館豆籩重薦接三旬心源直溯尼山峻禋祀馨香格有神其二璧沼春深翠荇長鵷鸞夾道迓龍光九天奎藻輝東序五色綸章賁上庠玉案乍飄香暗靄牙籖徐拂軸琳琅垂衣郅治崇儒術聖學千秋頌就將其三槐階上舍居聯席虎觀諸儒聚析疑思近聖人聞性道生逢元后作君師青襟賚溥垂宸春紫綍宣稠煥盛儀文物周京豐鎬舊辟雍鼉鼓被聲詩其四聖主臨雍禮成恭紀于敏中振興治化重師儒前烈昭垂禮更殊駕幸尼防傳盛典敕新殿廡擬皇都兩朝宸翰天文煥五代王封神意孚今日聖明光繼述先從首善肇鴻模其一於論鐘鼓盛喤喤詔以三年幸講堂預勑冬官勤朴斫還同闕里煥宫牆橋門池沼連天碧殿上琉璃映日黃恰喜功成當釋菜青旗早已出明光其二風和春仲上丁時萬乘初行三獻儀禮器輝煌陳俎豆宸章璀璨護雲螭德參天地功同撰道繼勳華統作師才聽九成天外奏圜橋又見飭諸司其三聖主垂裳教養新東郊耕後蒞成均天田好雨真如露璧水和風正及春黃幄殿頭輝彩壁青袍道左傍簮紳諸家博士兼言冉觀禮新恩覲紫宸其四穀雨欣當上已前龍旗豹尾擁爐煙九重天上雞彝肅百辟班中虎拜虔底用芹香歌魯頌漫將石鼓紀周宣盛朝典禮輝千載冠蓋紛迎弟子員其五祀事初成瑞氣開鑾輿早向講帷來縹函珍重東西列聖裔從容次第陪槐蔭兩行沾化雨梨香一片淨纎埃雍雍學舍瞻天處甲乙諸科領茂才其六道隆堯舜洎尼山斷自唐虞始不刪率性欽明原共貫放勳位育本相關儒臣進講昭彝典天語丕宣振懦頑觀聽一時沾雅化紅綾餅餤特分頒其七到處儒生忭舞聲文宣後裔樂陶成郎官光應星辰燦州牧恩兼金紫榮藻耀黌宫添鼓篋蘋開鹿野廣吹笙微臣珥筆叨佳宴竊附風謡紀太平其八聖主臨雍禮成恭紀齊召南顯謨承烈際重熙聖主端居講藝時禮樂百年光舊典文明千載啓昌期心源自與唐虞接道脈遙從洙泗垂視學季春依月令於論鐘鼓譜歌詩其一詔下冬官庀桂梁功成不日待登堂櫺星彩煥幾重戟璧水光新數仞牆矗漢干霄峩册府蟠龍翥鳯麗天章眼看鴛樣琉璃瓦并與宫雲一片黃其二虎闈燈燭集儒官聲報靈鼉夜色寒博士四門齊鼓篋諸生六館盡彈冠濃濃露待霑槐市縵縵雲先護杏壇漏刻漸催天半曙分班鵠立候鳴鸞其三太平天子涖芹宫夾道旌旗映日紅正是芳時逢穀兩共欣清蹕引薰風典文稽古三雍備家法尊師六拜崇不盡髙山瞻仰意精禋直自比升中其四彝倫堂繞玉爐煙論説司成賜坐氊占得飛龍乾五位肄來鳴鹿雅三篇賓興更展春官額俊造同分太府錢率海譽髦觀盛德恩波還勝永平年其五衣冠萬國萃圜橋化日光天覲聖朝侍子早聞來百濟舞干端已格三苗期門脫劍通經盛絶域銷烽受節遙試望泮林棲錦翼好音俱學鳯皇調其六聖主臨雍禮成歌辭謹序張鵬翀天子藉于天田又三日有事於辟雍玉輅親臨羣工祗肅維時太學橫經絃誦之士三千餘人咸得拜迎道左仰瞻聖天子穆穆之容踴躍下風欽承至教我皇上纘成丕緒正當百年禮樂之期德盛化神嫓隆三五天章炳煥與舊六為七釋奠講學崇儒重道千載一時小臣備員侍從幸獲躬逢聖期沾被飫賜欣忭感激輒形歌咏詞義淺陋愧列承明制作之林竊希附日月之末光揚懿美於萬一其辭曰聖王躬詣太學尊師典禮攸崇夙夜心傳宥密旦明契合昭融六經與天無極大道如日正中講筵大昕警衆觀聽曠若發蒙其一伊古教為治本興朝建學親師有熊成均是基虞氏米廩昭垂成周制兼四代三雍典備上儀我皇憲章祖述顯爍用光前規其二三月晨昕暉麗和風初動鳴鑾天子尊師北靣相儀祗肅千官上公紱組陪祀多士蹌濟峩冠降輦天容穆穆圜橋衆庶騰歡其三黃屋宸居並麗翠華法駕親臨車服兩階粲列金絲九奏揚音三獻上丁載肅五雲太甲蕭森幸備明廷侍從聖涯涵泳泓深其四禮既成兮樂備儒臣趨侍執經墳典披陳治要性天剖析流形聖學浩如河海綸言炳若日星宛同制作定世早符五老降庭其五列祖德輝廣被我皇道岸先登六藝折衷有素五經纂述相仍文教譽髦無斁賢關連茹同升濟濟三千拜舞仰瞻丕顯丕承其六陟降崇階殿阿俯看樂育菁莪槐市街連玉軫成賢里接鳴珂峻德嫓隆三古元氣鼓蕩太和慶成鑾輿弭節穰穰降福孔多其七大矣聖人臨御優優崇德尚賢王者仁期必世禮樂興在百年稽古榮光舄奕殊恩飫賜駢聯共際光天化日宛然風月無邊其八以上六言八章章八句廟庭金爵鬱觚稜古柏森森翠靄凝遙見柘枝親降輦櫺星門外日初升其一鸞旗乘曉拂春星先甲精禋接上丁陪祀千官皆屏息一人齋祓薦芳馨其二臨雍典禮爍重光聖裔賢孫肅祼將三獻上儀仍翼翼兩階萬舞更洋洋其三祀事將成禮更殷齋心萬古接斯文兩楹夢奠精英在福祿如天答聖君其四黌宮肅列候鑾輿春氣融和化日舒六館諸生齊拜舞儒臣齋夙進經書其五尼山道脈聖心傳講座微言徹性天功效自然符位育一時化雨被三千其六平生誦讀企都俞愧乏賡揚繼典謨此日欽明親聽覩信知身世是唐虞其七慶成聖駕六龍飛多士榮沾飫賜歸近識天顔知有喜侍臣長得被恩輝其八以上七言八章章四句聖主臨雍禮成頌謹序秦蕙田皇上握符出治建極綏猷體剛健之乾行煥文明之離照牖民覺世殫濬哲於生知稽古尊經懋緝熙於典學聖製昭乎象緯日麗星輝道範契於羮牆金聲玉振黃瓦壯翬飛之宇制擬闕廷璇題標鳯翥之章光騰雲漢廣開膠序遍春弦夏誦之英特賜瑶編示月窟天根之學學術總該乎四代俊髦逺集乎九瀛道德一而風俗同聲教宣而彝倫敘聿舉臨雍之典祗行釋菜之儀翠華捧日以雲移法駕乘春而電轉天香飄乎義路龍軫駐乎禮門睹奧升堂修筵飭几皇心載肅祀事維虔雞彝與瓊斚交陳象管並金鏞迭奏既禮成於文廟遂親蒞乎講筵紫案橫經闡三才之柢藴縹囊啓鑰抉萬彚之精華中和著位育之功欽明表聖神之德笙簧六籍冠冕百王車服雍容備觀黼黻珩璜之美宮牆巍煥恍聞金石絲竹之音轉陶冶於鴻鈞作新有象運樞機於圓軸樂育無私化雨旁流泮水蔚菁莪之色文風普扇珠林呈棫朴之華廣賢裔之觀光數倍加乎五氏擴賓興之解額澤覃被乎八紘洙泗增光章縫胥慶臣身遊藝圃志切經畬丹地雲髙仰天文之炳耀芹池晝永欣盛典之遭逢敬播頌聲兾揚休烈謹拜手稽首以獻詞曰聖皇撫運如日正中化成光被德盛業崇惟三載春親詣辟雍典宗百代輦馭六龍道由揆一聖以天通虔陳籩豆肅肅雍雍乃臨講席旭旦曈曨談經論道綏厥降衷中庸戒懼堯典欽恭會其有極允迪羣蒙圜橋觀聽億萬喁喁祓濯興起勵志飭躬匪文伊實以篤淳風雅頌之腴禮樂之容自南自北自西自東江河浸潤洋溢豐融惟帝廣運文思明聰作君作師聲施無窮聖主臨雍禮成頌謹序劉綸欽惟我皇上右文稽古重道崇儒乃御極之三年春既躬詣太學行上丁釋奠禮三月癸丑朔越二日甲寅遂親率羣臣及國胄庶俊大合樂講經於彞倫之堂所司以成禮告伏念我國家化成久道纍洽重熙皇上統備君師以聖契聖定素王之制崇黃屋之規重以睿藻矞皇表彰至道天地清泰日月昭回堯舜勳華文武謨烈一以貫之先是二年冬御製樂善堂全集成以學官請特允頒賜俾廣牖迪凡預環橋鼓篋者蒸蒸喁喁陶陶遂遂皆得進而頌天子之髙深學問焉兹當大禮慶成都人士式霑濃化允宜抒之觀聽被以絃歌謹拜手稽首而獻頌曰翼翼橋門巍巍道存大君之臨道立師尊乃時惟大昕有闐鼖鼓有習鸞旗有翔鷺羽櫺星曙開德風化雨言從之于邁于堂于廡既登萬舞亦奏三終祝贊曰具儀昭哉有融羮歟牆歟心印脈通遂周乎翼序自我西東有嶻聖宫式增式擴甃碧以黃塗丹于艧講席在堂莞筵帟羃偉知覺之先千秋鐘鐸用闡性府用宣道藏德明而峻勳被而光一人鼎吕多士笙簧猗歟宸翰為雲漢章猗歟聖製為金玉相帝曰俞哉自今以始奕爾上公蒸爾博士爾冠爾裳五十其氏爾俎爾豆萬億其祀先民有乞言書于惇史矧爾在泮載壬載林載赤其芾載青其襟載錫之命無俾爾弗任茵以黼純爰坐爰宴甌以金莖爰酌爰薦曰廩之餼之樂此畿甸曰茅之茹之惟德之遍以廣于德心以嗣于德音小臣作頌以獻于司針聖主臨雍禮成頌謹序杭世駿皇帝御極之三年嵗在著雍月維柔兆詔有事於太學先期下所司各庀職以上考國程秉經義用丕集於禮甚盛典也於是日官吉蠲禮官具儀大胥簡徒司樂授器乃陳法駕詣辟雍躬釋奠大臣陪位小臣就列六軍七校既匡既肅禮成上御彝倫堂進師儒等官敷闡經術生徒萬人圜橋瞻企咸稽首願化仰奉聖天子盛德作人至意臣謹按古學之制自五帝始有虞夏商各建名義姬氏受籙兼用四學設教之方於斯為備是以於論鼓鐘鎬京辟雍諸什咸見採於詠歌宣於金石傳之一時千古雒誦我朝統一區夏大啓儒風文德錫極茂典有加皇上以生知之質肇執中之傳典謨總於一心聲教訖於四海國有嘉禮次第舉行兹乃親臨學宫修明大紀煌煌焉秩秩焉自古文治之隆未有如今日之盛者也小臣幸際昌期與觀明備敢以淺鄙妄擬穆如然自臣子近光之願下士鳬藻之情誠有不容以已者謹獻頌一篇頌曰天生蒸民有物有則克綏惟后曰攸好德戢戢有衆其羣千億翼翼秀良萃此皇國國之所儲下土所諝禮容樂服稱是令譽若彼良畝惟勤災畬若彼純璞琢為珩琚珩琚鏘鏘多士濟濟我皇顧之嘉樂豈弟乃詔太常乃命司綮青陽之吉式昭典禮典禮戒備司贊攸行物瑞雲照神協氣昌玉振金聲而道大光前聖後聖合德一堂堂皇嶪嶪上棟下宇銀榜環林重簷夾廡犧尊青黃冠裳黻黼樹羽崇牙象簫鼉鼓列辟左右奉璋贊卣敷席振采有孚盈缶青煙縈槐緑霧拂栁凡此羣材為薪為槱帝有恩言如春斯暄帝有恩植如卉斯蕃陳詩論藝勿告勿諼航浮沂泗緒引羲軒明明列祖教澤孔淵皇上善述野無伏賢儒風浹宇文思啓天百物熙皥展唐虞年朂哉多士敬修厥詣或德而材或道而藝庶幾大成以承帝筮小臣矢音用告世世聖主臨雍禮成賦董邦達維乾隆之三載兮至治煥乎寰瀛昭緝熙之敬德兮發二氣之淳精紹心傳於千聖兮訖聲教於八紘然猶念典學致純誠下明詔樹風聲將臨雍以訪道開六學而進儒生於時律吹姑洗日喜載陽戟門槐緑璧水芹香乃新廟貌丹艧煌煌乃灑宸藻日麗星芒黃瓦晶瑩彩煥琉璃之色銀泥璀璨榜開雲漢之光禮器斯陳備千秋之法物笙鏞在列啓萬仞之宮牆天子於是即齋宫乘玉輅羽衛屯雲爐煙凝霧望頖璧以前驅閲橋門而徐度多士集而趨鳬上公戾而振鷺肅肅雍雍降輦以步禮隆三獻中階瞻龍衮之升序列千官陪位盡鵷鸞之數爾乃一人穆穆萬舞洋洋神人胥悅志氣肅張樂奏九成儼聽魯宫絲竹羽陳八佾如親泗水文章諒前聖與後聖默契合於一堂禮成而退講幄髙褰儀曹捧案祭酒趨筵藝編既設妙義斯宣精研奧旨不落言詮性由天命道以教傳中和是致戒慎維虔載稽古帝齊聖廣淵恭安實備光被無邊一得罄儒臣之奏九重示心印之全必功先乎謹獨斯學足以達天雖欽明之帝德祗不越乎敬焉蓋聖功實王道之本而作君裕作師之權由是臣鄰忭舞士子騰騫飫聞緒論曲受陶甄乃溥教澤於千八百國而宏道統於億萬斯年既備上儀重申巽命沃瀛海兮瓊為漿沛澤宫兮膏流潤雷動兮歡迎嵩呼兮齊進回璿車兮栁拂清塵轉和鑾兮花縈綵紖益嘉惠於遐荒更闢門而選俊喜曠典之親逢知敷天之同慶如震瞶而發聾聆金聲與玉振慙弇陋之愚衷贊髙深而莫竟竊握管以揮毫獻蕪詞而紀盛聖主臨雍禮成頌謹序陳兆崙臣聞引年肇自虞庠視學詳於姬籙文物聲容散見詩禮遐哉尚矣厥後令辟迭興時循掌故圜橋觀聽以為美談顧或質異徇齊文慙述作業業之旨罕窺郁郁之觀未逮洪惟我皇上所其無逸煥乎有文集羣聖之成貫萬殊於一言成綸綍動合典謨是我皇之明德先師其馨享之重以揚風扢雅剔冗搜巖家有賜書户多挾册天下之士于于而來闕下者蓋以萬數是我皇之道化先師其式憑之乃者三雍丕煥六館濟蹌綺簇清漪雲連黃屋猶復綷以金榜麗以龍文出入如臨左右如在是我皇之崇禮先師其降鑒之由斯以談道合者神謀德均者禮肅非徒以崇侈虛文勉遵故典而已也乾隆三年三月爰有事於太學時則端策諏辰大昕警列儒寮展采禮臣相儀鐘鏞振於序籥翟陳於階皇上於是式灌獻之節儼緝熙之容聖敬日躋道心淵映禮成御彞倫堂萃羣士以陳謨按六經而校德探奧窔揭神筌規勳華示簡易蓋罔不拜手稽首欽承我后之明訓易曰觀乎人文以化成天下詎不信歟臣備員侍從謹獻頌一篇以比於擊壤之體詞曰於鑠皇清丕顯文德我皇繼之式承前烈百辟其型四方順則倬哉先聖萬世所宗人倫之至俎豆斯崇翼翼宫廟載見辟雍維此辟雍萬國之視方春和時我皇蒞止端服正辨鉶羮列簋列簋既奠典禮攸行爵具三獻詩歌六成神之格思終和且平乃命仍筵乃設玉坫疑丞奉書侍言懷槧期門受讀虎賁脫劍堂階之側羣宷雍雍逖矣四裔咸從於公懷仁仰化藴智欽風奕奕諸生實間且敬青槐如煙圓海若鏡兼明作覩一人有慶慶譽一人瓊琚玉珩思皇多士皇國克生帝曰俞哉勉爾令名方帝之來都莊雲動逮帝之還馗路飈送言觀國光萃此有衆古云文章揚厲豐美詩歌於論書載喜起以臣之愚未暢厥旨於萬斯年敬告惇史乾隆五十年皇帝舉行三大禮恭賦謹序彭元瑞臣元瑞言右臣伏以皇帝陛下大德久道輯釐偹福酌三古之令典肇萬世之上儀乃旃蒙已盛王正丙辰詔開千叟宴越月丁亥以辟雍告成釋奠講學越月辛亥親耕于藉田是嵗也福紀協五皇春登三一時而三大禮行焉人歡欣洽天瑞景從自軒轅甲子以來四千四百八十二年未之有也臣嘗讀唐杜甫所為三大禮賦古奧瑰博史家艷之顧其所陳朝獻太清宫事既不典若郊廟則王者所宜嵗有事也又多述武德貞觀之烈舊儀故實所傳於當世無稱焉以甫之才仕不遇時德薄化淺不足以發其文臣生郅隆之世事古稀之君親見一時行三大禮幸趨蹌執事其間思欲有所敷陳而殖庳詞陋萬萬不及甫良用恧縮然而訂古創今昭德紀實文雖不逮事則何唐之足云蹈泳奮汴遂忘其愚敬作三大禮賦以獻千叟宴賦古稀天子維凝承昊縡佑錫純嘏俾單厚燾九有以元氣躋八方於仁夀少有所長老有所養下逮蠕翹跂息咸若成象遊乎清寧之宇娭乎懷葛以上通邑大都遐陬僻澨方瞳碧鮐背犂眉之人徴年於冥靈大椿觀太平而倚杖於是皇帝御極五十年矣珠囊開萬寶紀周旬三微肇阼四序履端驣龍樓之鸞誥揭鳯闕之雞竿嘉子薄海咸普湛恩先期詔下將以正月日吉舉千叟之宴焉時維丙丁見弧角亢同夀蓂奮茁以六葉草勾萌乎三秀先七人與八穀叶辰良於珠宿闕外初鉦壺中遲漏入葭律以東風回黍谷於晴書引雲路於東華啓天閶於乾清春臺四達泰階三平紫微帝座都福之庭午陛瓊扣辰居玉繩設清聲於闑內懸韶樂於南榮爐煙芬其裊裊黃繖植而亭亭法天道之下濟位黼座於前楹填庭溢闕軒舞鼚鼓奔走偕來以燕譽處問其年則算周甲子生首丙午四豆五豆六豆之倫杖國杖學杖朝之侣升平人瑞盈百畸五蓋其衆三千人綜之得二十一萬有奇而莫窮其數也其人則天潢之𣲖若木之英四相文昌三台平衡二陜之伯九寺之卿御史為中執法郎官應乎列星貂蟬兜鍪之帥羽林佽飛之營江湖魏闕之心子孫萬石之號士誦農耕商遷工巧北漠賔客西瀛宿衛朝使浿水之東土目桃關之外服從土宜人襲冠帶蟠地際天日􅙡月竁以為安羡之勝遊籛佺之嘉會帝乃蒞乎丹扆鸞扇開鯨鐘啓有位咸膝席元臣奉觴鞠􅎽前致詞曰願以臣𨽻三千人積算合上一人夀鱗集鳬藻九拜即席康衢置尊舉觴行炙出堯厨之萐莆寫舜榼之璚液雕菰之香雲母之白篆三品之精鏐賁三服之珍帛江研宣毫楮生子墨如意開年荷囊佩夕智珠百八靈夀九節黃封重疊雕盤牣積天上携歸人間賜得其有九帙崇年一品髙位尚齒尚爵老老貴貴宣之席前手以觴賜需蒲栁以吉雲漉桑榆以寶露宴以示慈禮不愆度天題唱羣什賡金石諧婉渢渢乎和聲天子乃懌乎怡愈動乎淵漠謂是舉也伊述匪作溯盛典於壬寅六十年其如昨昔依膝於含飴今厪心於調幕三征朔漠維時其剷削之六巡吳越維時其荒度之聖有惠心今普蠲者五度聖有典學今觀文者四閣蓋五十年日慎一日朝乾夕惕若宣重光衍五代繼序皇前猷廓至今而可與宗族懿親子孫臣庶同舉斯爵也且夫繼志述事至孝也儲祉襲祥百順也引年隆齒大道也其斯以為養老歟彼夫唐宴洛陽之離都漢饗南陽之故宅濫或登之版授隘僅及乎宫側班鄭所述服杜所詮人殘義鑿如聚訟然始著説以息衆糾再抒記以定一尊數典乎鄒邑徴實乎岐山斟酌六籍折衷羣言又如羅鳩執爵之供袒割醬饋之恭深元縞燕之容掇拾糟粕各各異同豈足語今之養老矧其支離傅會於辟雍也哉辟雍講學賦辟雍天子之學也自放勳以上未之前聞虞有西膠之庠夏有兩序之造殷有瞽宗之文亦越周穆考圜辟雍以靈沼武王考卜自豐宅鎬備四學之制以為有天下之號王制云天子曰辟雍諸侯曰頖宫如樂之宫懸軒懸圭之前詘後直其示别蓋可從焉後儒之説紛兢起取義則辟者明而雍者和象形則辟璧圓而雍壅水九室十二室四窗八窗太廟清廟世室明堂名異地同大射大饗大祀行其中以神道之清靜天子之尊崇混神人而無異宫毋乃迂且侗乎我國家德教熙洽文治駿鴻皇帝以上聖之資身為之律道積厥躬詩超雅頌文軼典誥萃四庫以右文廣諸科以蒸髦蔭黃瓦於華榱榮緑槐之嘉隂頒周笵之十器瞻車服於孔林立學崑濛建廟興桓靡不崇飭修舉詎首善之地而辟雍顧自元中統以來五百年闕焉未完也乃命禮官俾相度召司空庀將作伐石穹嵁刊材巨壑任楩柟以梁棟區椅桐以杗桷施以斧藻彰以丹雘圓蓋穹聳象天行也鱗渠之而環重瀛也瓊陛對出四門闢也朱牖洞敞四目明也井可用汲左右逢原也風行其上觀水觀其瀾也帝位乎中聖杏壇也奎文黼扆聖人之言也翼以六堂士誦弦也其北則髙堂豁閜連楹八柱席間函丈講肄所聚璇榜揭日福疇攸敘其南則寶坊翹瞻屹峙若闕教澤以圜學海以節植豐碑之隆隆蔭層亭之嶪嶪維皇極之敷訓紀肇造之嵗月實主名賔循嵞守轍朂爾多士進德修業大哉聖人備德位時治觀成而勿亟事有待而非遲復古者盛泥古者蚩推而言之井田不可以治地封建不可以司牧三年里選不可以得士五品不遜不可以善俗決不可治水車不可教戰泉府不可易圜而刀賦稅不可易粟而絹矧我朝大經大法祖述憲章將萬萬年守之而不愆不忘者哉經營不日乃二月上丁舉釋奠之儀以落其成萬仞宫墻六拜殿墀奠爵薦幣屬屬祗祗合先聖之揆雖天子必有師德馨諴感神之格思禮既成乃臨辟雍王者視學自北門入天度穆清如雲如日升者鵷翼仰者鵠立班者鴻漸聼者麇集黌席之老百五橋門之士三千命公圭搢博士襼聨四氏五子東野西姬演疇舊封暨髙句驪靡不拭目傾耳虔悚以徯儒宰陳書祭酒執經捧撮土以附嶽掬涓流以益溟丕著御論誕告汝自西自東自南自北維天順至誠之動惟聖立人倫之極仁敬慈孝以達於信交潛見躍飛必本乎乾惕天垂其則聖合其德賢入其域人荷其責百姓與能君子不息髙矣美矣茂矣大矣聖之徹上下貫精一而自道所得也于是驚者嬌舌悅者服膺道氣之所布濩元化之所醖蒸感以符節之合動以志氣之一誠之至者如神天垂象而見吉始散稷於觀旗乍成圭於拜席香升而雲同律和而風習釀三冬之和渥一日之澤宵雅昌穀於禹甸春秋紀瑞於周尺化為雨之時被為風之春積為道岸之登融為聖涯之淵士尚其禮耕義種而講學以耨占者曰天道地寶而人情為田親耕藉田賦有預宴老農被黃襏扶賜杖造手成均髦士曰側聞古稀天子將舉典循理順東作以勸穡躬帝藉乎千畝有諸曰有之有司既戒事矣京尹既宿肄矣三月吉亥天倉辰叶先日則胃宿合朔翌旦則上已靈節積雪融塍天田含津協風告夙瓜見土發新肅勾陳以屆青郊之南歌載芟以享先農之神三推重典一墢輕塵龍犂行直青箱種勻從耕偹乎五九終畝藉乎庶人此我朝劭農之舊儀吾皇勸相之先務自辛丑迄乎壬寅躬行者二十一度矣叟何若驚若疑若有餘慕也老農曰蒙有説焉願罄其愚織當問婢耕當問奴古者二十授田六十歸田一夫百畝尚限以年是以有侯強侯以侯亞侯旅所以職服勞而代作苦也五十不從力役頒白不負戴諒貴賤之有殊匪筋力之異態今皇帝春秋髙七十有五矣雖莊敬日強健行不息而往復於繡錯綺分之間張弛乎紺轅黛耜之側其毋乃聖躬勞而勤帝力乎且藉田之法見諸戴記詳於國語代相沿而禮相踵不皆上夀之主以蒙所聞六帝者漢武征和巨定是卜梁宗普通望臺以築唐開元之載草三宋紹興之嵗十六至元肇乎七年洪武訖乎六旬鴻儀寥濶盛事因循皆古稀未登耄期先倦孰若今者萬夀上臺萊之祝六穀猶穜稑之獻自周武始藉以來史册之所未見也髦士曰叟獨不聞聖主之勤農事乎何獨藉田哉籌海觀河災蠲歉借省嵗暮之穀數計日中之米價演耕儀於豐澤興弄田於泉宗預望雨而龍見先卜雪於柏冬問一天之雲氣徹五夜之宵鐘逺驛詢於方伯近蹕省乎甸封喜伊犂二麥之熟慶山田千畝之豐圖早題於貴織詩多寓乎憫農稔占宫樹之濕霖候山桃之紅民但喜乎甑溢帝先憂乎釜供兆姓曰衣我食我一心以風人雨人豈僅手足之為烈而自謂便民也大哉時憲者天廣運者聖日月旋而光明春秋序而順正志為氣之帥心為形之君不測在誠不匱在勤我聖人遊神乎沖淡宅心乎穆清以劼毖為調燮以宵旰為康寧萬幾兢業八方在宥動乎自然不假乎堯步舜趨湯馳禹驟用致貞一純固與天同夀又何艱於一青耒之秉一洪縻之授此供盛勤已班固頌而難詳固本致孝潘嶽賦之未就也遂告大有協農祥既富方穀民樂且康青史登三皇之牒黃髮上萬年之觴斯真皇風之隆軌夀世之嘉祥也哉説雍吳省欽乾隆五十年春二月丁亥皇帝飭法從服禮服祇事於文廟六奏備作神人豫和遂詣彛倫堂更衮服實乾隆三年臨講處也當三十四年上釋奠太學言臣以建置辟雍請格部議未舉四十七年上臨度靣勢命給少府錢率作興事鑿池璧圓中麗穹宇有門有橋古槐後蔭役蕆上冬禮簭茲日越王公百執事聖賢裔姓逮六館生徒軒鼚翔濟迾序於辟雍之南候駕臨講敬止健行揆符合一稽唐虞三代而下人主歷年七十上者紀年至五十者上下千百年間世一遇至如五世一廷愈愈緝緝昔孔子集羣聖之成為生民未有皇帝以帝王未有之聖賢集帝王未有之福之成惟是建國君民教學首善古辟雍之制與夫臨雍講學之典有是名當有是實即一端而我皇上紀綱法度禮樂政刑之全胥凖此已以臣弇昧利觀國光不揆不文謹撰説雍一篇拜手稽首而獻曰古無辟雍之名至周始置王制天子曰辟雍雍通作雍辟雍者天子之學於虞上庠於夏東序於殷右學即瞽宗周立四代之學合太學為五學太學在東東膠又在辟雍之東辟雍環水天子承師問道行禮樂宣德化多就此行之其餘國子之學學禮就瞽宗學書就上庠學舞干戈羽籥就東序學樂德樂舞樂語就成均此以知太學非清廟成均非辟雍韓詩説辟者辟取有德蓋讀若闢鄭康成禮注以辟訓明以雍訓和使天下之人皆明達和諧其箋靈臺詩亦言在辟雍中感中和之氣而大戴禮曰明堂外水曰辟雍是妄以明堂辟雍為一蔡雍月令論曰取其宗廟之清貌則曰清廟取其正室之貌則曰太廟取其堂則曰明堂取其四門之學則曰太學取其周水圓如璧則曰辟雍是妄以廟學明堂辟雍為一潁子容春秋釋例曰肅然清靜謂之清廟行禘祫序昭穆謂之太廟告朔行政謂之明堂行饗射養國老謂之辟雍占雲物望氛祥謂之靈臺其四門之學謂之太學總謂之宫是妄以廟學明堂辟雍靈臺為一魯詩説文王作靈臺以齊七政奏辟雍是妄以淮南子文王有辟雍之樂指辟雍為樂名陋儒皆信之皆從而述之要之殷太學在郊故文王辟雍在郊周太學在國故武王辟雍在國在郊故曰振鷺于飛于彼西雍在國故曰鎬京辟雍自西自東自南自北無思不服雍或作雍朱子曰雍澤也説文無雍有雍從廣讀若儼象對刺髙屋之形四方有水曰雍故從川毛傳曰辟雍水旋邱如璧以節觀者孔頴達疏曰璧體圓而內有孔此水亦圓而內有地猶如璧然此水內之地未必髙於水外正謂水下地髙故以邱言以水繞邱所以節約觀者臣竊以以水繞邱則必以邱起宫天子有辟雍諸侯有泮宫泮宫半於天子之宫也泮亦作頖頖池象璜圜池象璧池之上皆當有宫西漢末治明堂辟雍光武中元立明堂辟雍靈臺三雍班固詩有辟雍湯湯之語而大戴禮固云明堂外水公玉帶所獻明堂圖亦環有水以雍訓和本融而為川之義詩來雍論語作雍意漢時靈臺亦壅水故曰三雍若雍雍皆從川以水而言當從雍以宫殿而言當從雍楊慎引水經泮水一名雩水在靈光殿東南即魯泮宫故址泮乃水名不得以泮林為半林豈得以泮宫為半宫不知古天子諸侯有澤宫今府州縣衛學之廟曰泮宫宫前有池而京師有廟有學無池皇上君師統合議禮制度考文作辟雍作辟雍殿殿之制既立故其文從雍不從雍池圓象德圓殿方象行方規矩之象昭焉天地之撰合焉良以釋奠之典數舉臨雍之典載舉而彛倫之堂可謂之學不可謂之辟雍今有橋有門有池與詩注王雍水之外圓如璧者合有殿與記所稱澤宫者合講闡經訓丕變觀聼與白虎通所稱行禮樂宣德化者合先舉釋奠與記所稱天子視學祭先師先聖遂適東序者合詩曰於論鼓鐘於樂辟雍大昕鼓徴臣庶感化彼綴文牽義之徒或曰辟之為言積也積天下之道德雍之為言壅也壅天下之殘賊或曰辟者法之所自出本之以為禮雍者和之所自生本之以為樂附會穿鑿本義愈晦惟禮統謂辟雍內如覆外如偃盤禮書謂辟雍圜而函方隂陽之義與圓璧之義不背然言辟雍不言辟雍有殿我皇上因心作則所傳者唐虞三代聖人之心所行者唐虞三代聖人之政所議者唐虞三代聖人之禮創建非常洋洋堂堂懋敷聲教仁敬孝慈信倫之所以敘也天行健君子以自強不息德之所以純亦不已也雍雍乎議道自已隆禮由禮不特視漢唐陋儒専以辟雍為習射養老處者意量固已霄壤即文王在郊之辟雍武王在國之辟雍其淺深廣隘夫豈可同日語哉是故元明以來數百年未舉之典至皇上而興實則唐虞三代以來盡美未盡善之制至皇上臨雍講學將事豫備作辟雍即旋璧之邱作辟雍殿而天下萬世始以知彛倫堂為國學太學辟雍殿為天子之學殿取諸廣故詩禮並從雍漢書從雍作説雍應制附明駕幸太學詩吳溥九重傳詔幸成均王氣浮空淑景新寶厯萬年開至治文風千古復真淳聿觀瑞慶來當寧肇建基圖啓後人日表文章明衮繡雲間聲樂合韶鈞西周在鎬寧須數東漢臨雍豈足倫寵錫自天春浩蕩穹碑插地碧嶙峋來遊璧水登髦士紀載詞垣屬史臣仰祝聖明千萬夀普天率土載皇仁文翰類選辟雍六章李夢陽天子至止于彼辟雍和鸞央央其來雍雍象輅金衡有蒼其龍光于聖廟是依是崇吉日維申修我元祀皇祝設樂鏞鼓萬舞有筐有篚以享以祀羣執肅肅秉德弗渝誰其觀者三氏孫子其冠峩峩來欣來止翩彼鳯鳥集於東林繹其觀者其瀾如雲自門徂基辟嚴若思青襟濟濟以辟以師爰命祭酒司業拜手訏哉嘉謀作民元后帝若曰都大言式宏匪道何程匪猷曷承載弼元理維協乃有衆拜稽首天子萬夀旟旐斾斾淵淵代鼓皇發辟雍用惠下土自天降休豐年穰穰藹藹王多吉人四國用康空同集駕幸太學恭述王稚登璧水鈞天樂橋門鹵簿車秋風清道早朝雨灑塵踈檢禮惟行菜談經亦墜魚不知稽古士獻納更何如列朝詩集臨雍賦陳經邦維聖皇之御鴻寶兮遘禮樂之昌期陋叔季而不踐兮索隆世而是追斥八九之荒談兮慕三五之令規歌伊教於魯頌兮詠於樂於周詩朗超覽而凝思兮悟理道之所宜曰徂昔王風之休暢兮咸首勸學與崇師乃咨羣僚乃謀故實命春卿兮述典召星史兮練日既禮陳而辰戒爰辟雍之是即斯時也太皥司令勾芒宣職淑氣煙煴柔風翕習虎賁曶霍以畢從兮象衛葳蕤而焕飾千官趨蹌於帝輦兮萬靈奔扈於天蹕前元冥使灑塗兮豐隆又為之驅役六連蜷之翠蚪兮駕遺風於玉勒鳴八鸞之啁啾兮鳯蓋髙飛而翼翼龍蜿蜒其承旗兮矯若扶桑之拂日揚畫斗之朱幡兮夾明月之玉戚皇路肅以清夷兮儼萬乘乎天行輷輷轔轔兮磤磤砰砰如風如濤兮如雷如霆忽按節以徐回兮屆賢關而至止靄瑞氛於虎闈兮浮清暉夫璧水雲輿俄次兮虹旌暫委太學之央央兮敻靚深而閎侈辨冕之所遊翔兮章縫之所迤邐談周孔而吟詩書之士縝紛雜襲肩麗武接兮咸集乎成賢之里佇矯首而望幸兮覩屬車而蹈喜皇帝乃穆爾斂容沖然式禮瞻素王而展謁兮曾不吝於卑已詘宸旒以對越兮恍音容於筵几於是采五學之文崇三老之齒饋既清於俎爵兮祝亦兼夫鯁爰問道而憲言兮即授策以顧史若乃鼓鐘作管磬鳴樹崇牙之三組奏鈞樂之六莖羣髦露擁庶尹雲臻或瞻依乎臨扆或論難而執經驚睿思之逸發倐泉涌而飊生説詩者失解頤之譽談易者慚折角之名下至鶡冠虎韜之倫逺及雕題鳥言之長圜橋門兮動色望宫牆兮飛爽有芹兮池之湄率青襟兮采之鼓篋兮登歌天朗兮風熙在藻兮有魚若振翼兮軒鰭虞庠曾不足以擅美兮周雍相倣佛其如斯逮百禮之既洽兮景翳翳其寖移悵盤桓以返駕兮信樂只而忘罷聞昔赤帝子之重道兮僅過魯之一祠武王起太學與明堂兮紛文物以何為獨永平之拜老兮千世為之豔慕而嗟咨豈若我皇之隆軌兮直與虞周乎並馳謇小臣之承學兮何幸際此明時峩余冠之切雲兮長余佩之陸離從六飛之清塵兮與髦士而胥依想繫壤之謳吟兮感棫朴而興詩遂歌之曰稽古有虞肇上庠兮鎬京辟雍亦繼昌兮疇其似之猗我皇兮儒館親臨奕有光兮文教旁流洽四方兮敷天薄海絃誦洋洋兮天眷我皇夀考無疆兮千秋萬嵗來此堂兮作君作師其永有慶兮賦纍臨雍賦戴洵粵我祖宗之立國也恭天命以秉鉞順人心而御宇思皇極之敷錫在彛倫之攸敘爰韜弓而戢戈創辟雍而講藝稽四代之遐規酌一中而定制於是負以崇城靣以離明垣牆繚繞松柏縱橫左殿庭之赫奕右堂舍之深閎崇先師之嚴祀集海內之髦英人文朗王教明仁風洽民俗成厯八聖之授受莫不躬親乎幸臨蓋所以重風化之先務示倡道於青襟逮我皇上寶位初履承帝命之方凝懷永圖於慎始側席以思賢每宵衣而求理考先后之令圖將次第而修舉御文華而延訪進輔臣而咨汝僉曰教為治本賢為國基求賢在於豫飬宣教在於隆儒維太學之穆清當神都之北隅固賢士之所關亦彛訓之所儲欲勸學而造士將舍此其焉如帝曰俞哉乃降德音考禮書飭玉駕張金輿命列缺而清道走豐隆而先驅鳯旌蔽日龍旗拂雲副車翼翼從騎紛紛和鸞動地以蹌鏘天香載路而絪緼翠華逶迤於康衢六龍蜿蜒於橋門遂登元堂啓丹扄禮先聖瞻遺靈陳爼豆羞粢盛萬舞翕赩八音鏗鍧陋太牢之簡略躬下拜之精誠蓋所以崇百王之軌範表百世之儀型若乃周旋太室釋奠既畢爰御左個於焉少息然後明養老之義講乞言之術於是進三老登五更醬酳饋筐筐承祝哽噎於前後奉几杖於公卿親執經而問道求示我之周行斯時也考鼖鼓鏗華鐘撫清瑟吹和笙咏南山賡鹿鳴俊乂趨蹌而悅懌蒸黎觀德以歡欣有一儒生歷階而升載歌聖德作為頌聲歌曰穆穆我后臨萬邦兮勤勤圖治先綱常兮蕩蕩文教沛遐方兮皇猷帝範超虞唐兮又歌曰翼翼成均萃羣英兮勉勉我皇躬作興兮濟濟多士邦之楨兮千秋萬嵗皇心寧兮歌誦既竟皇乃嘉德知衆志之既孚識士風之丕應遂回鑾而入紫清開明堂以觀太平之盛同上臨雍賦許國天牖民之孔易寵君師於四方厥綏猷其維后洽時夏而陳常於我明之十葉戢干戈而矢德建首善自神京中四方而作則惟聖皇之嗣服紹列祖而崇文席久道之遺化徽五典而作新既建極以敷錫復隆樹其風聲嵗初元之丁卯月載紀乎王春皇諏吉而釋奠應天地之文明於是宗伯草儀金吾除道青襟望幸喜色相告天子乃服皮辨乘玉輿駕翠蚪驂文螭鏗和鸞之鳴樹日月之旗虎賁後翼龍驤前驅都民擁道而夾觀紛總總其承暉司成悉率六館髦士公卿世胄逺藩侍子舉踵喁喁望風迎拜聆警蹕之嚴聲睇棽離之華蓋從簮笏以周旋間俎豆而萃縩蒸蒸皇皇躋躋蹌蹌北靣肅揖祇謁素王戟門動色芹藻薦芳霓旌羽葆容與登堂五更三老饋珍酳觴博士橫經鱗次雁行天顔穆穆襟珮鏘鏘燦如星麗照若春㿩於論鼓鐘於樂宫牆環橋門而觀聼者以億萬計莫不舉手加額祝皇夀以無疆猗歟休哉昔在三五重道崇儒粵我祖宗文教緝熙喜曠典之復覯見從官之威儀章縫增氣自上作之忭舞敬應風行化馳始自畿甸達於四陲朱崖鐡勒負笈如歸譬彼設的射者競趨卑漢帝與唐宗空拜老而增舍猗璧水之湯湯照鸞旗之于邁俊乂咸造謨訓遹新僉曰休哉天子作人巨禮告竣綸音申勵六龍旋軫千騎回斾遵輦道以言復垂衣裳而致治迄四時之弦誦挹五雲之瑞氣家禮樂而户詩書掞煙霞而偃烽燧抽毫作賦光於萬祀辭曰璧流縈回環宫牆兮棫朴敷文育羣良兮翠華蒞止師道光兮肅雍展謁黃幄張兮聖有謨訓炳琳琅兮昭回雲漢為天章兮青襟咸奮佩無疆兮載戢載櫜肆陳常兮沛然德教軼陶唐兮同上欽定國子監志卷五十八

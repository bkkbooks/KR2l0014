body:
  text: 禮臣等謹案司馬遷言適魯觀廟堂車服禮器諸生以時習禮低佪留之不能去云蓋宗廟百官之美富萬世言禮者折衷焉我國家典制崇隆臨雍親祀而外官師有事於廟中其禮有五曰釋奠曰釋菜曰釋褐曰告功曰告祭記云禮時為大稱次之宜次之五者之禮亦各從其時也至於祭器祭品所以交於神明致其蠲潔惟稱與宜爾矣稽古釋奠有始立學之奠有四時常奠而上丁行禮在仲春之月漢以來祠孔子於曲阜而釋奠辟雍自魏始晉則四時皆祭北齊用春秋二仲隋復改用上丁增為四仲至唐始定為二仲宋明因之釋菜禮簡於釋奠無牲幣樂奏古人用之有三春合舞也始立學也始入學也北齊始以朔日行禮宋太宗制朔望行香禮其後或於四孟或於元日明始定月朔釋菜望日行香之儀釋褐禮始於唐開元間鄉貢進士以初冬就國子監謁先師宋改用仲冬明制定期放榜後五日至於告功之典蓋魯頌所謂在泮獻功者歟而陟降在庭有舉必告之儀自明以前無聞焉我列聖右文憲章作述禮儀明備所謂道隆則從而隆固千載一時也若夫豐功偉烈之垂拓地犂庭之績顯融懿爍邁古超前而凡鼎彛籩豆之嘉粢盛牲醴之薦莫不彬彬焉秩秩焉事有宜適物有節文猗歟盛哉謹輯釋奠釋菜釋褐告功告祭各一卷祭器三卷祭品一卷繪圖著説為禮志其元明舊制可考者並附卷末無則闕之云禮一釋奠國朝崇德元年太宗文皇帝遣官致奠先師五年定釋奠之禮盛謹案是時創業以開我京首崇祀事所朝隆儒重道之模為萬世勸學興賢之法謹恭載篇首順治二年定春秋丁祭遣大學士一人行禮翰林官二員分獻國子監監丞博士分獻兩廡祭酒祀啓聖公于後殿均以先賢先儒配享從祀遇有他事改次丁或下丁日先謹案定制釋奠序在厯代帝王之次師孔子為中祀遣官事宜初由禮部題請後歸太常寺遇有他事如乾隆十二年仲秋上丁值太宗文皇帝忌辰改用次丁是也順治四年定致祭先師孔子遣滿官贊禮祝詞兼用滿文康熙二十三年祭酒王士禎等請定先師祀典樂舞籩豆酌用成化𢎞治年間儀制詔從之康熙二十五年令春秋釋奠武官二品以上並入陪祭康熙二十六年令春秋釋奠國子監用籩十豆十舞用六佾雍正十一年增釋奠上香儀乾隆元年令祭文廟前一日陳設飭太常寺如羣廟儀治之祭畢交國子監分胙謹案釋奠祭品向由太常寺移交國子監官前期一日陳設至是禮部以不與羣廟之例畫一議交太常寺官陳設如儀乾隆十一年增崇聖祠配位分獻官二員其陳設四案增帛二爵六謹案向例配位奠獻俱承祭官行禮孔氏孟氏二位前無帛止獻爵至是更定乾隆十八年禮部奏言兩廡位次皆東西向先賢先儒南北分列向於中間空處設案分獻官各一人奠獻於禮未協應請兩廡各用分獻官二人增香帛一案就位行禮以嚴昭格至十二哲兩廡向皆於各位前豫奠一爵其分獻官行三獻禮則統奠三爵于香案以太常寺執事人不充數故也嗣後丁祭十二哲兩廡三獻請均令肄業諸生奉爵令東西分獻翰林官各奠三爵兩廡分獻國子監官各統奠三爵詔從之又會典館奏言兩序兩廡以國子生執事而殿內正位配位及崇聖祠殿廡仍用樂舞生揆諸典禮實有未協請嗣後遣官釋奠司香司帛司爵大成殿正位配位用國子官兩哲兩廡暨崇聖祠殿廡均以國子生充賜福胙受福胙各用國子生二人詔從之釋奠儀注正祭日五鼓各赴廟齊集分獻陪祀各官由鴻臚寺官引至兩旁門排班立承祭官由左旁門入於階下行禮太常寺贊引官對引官導承祭官至盥洗處贊引官贊盥洗承祭官盥洗畢引至階下立陪祀各官由鴻臚寺官引至行禮處立典儀官唱樂舞生就位執事官各司其事陪祀分獻官各就位文舞生執羽籥引進贊引官贊就位承祭官就拜位立分獻陪祀各官亦隨後立典儀官唱迎神司香官各奉香盤進協律郎唱迎神樂奏昭平之章樂作贊引官贊就上香位司香官各就案旁立贊引官導承祭官由東階上進殿左門贊詣至聖先師孔子位前承祭官至香案前立贊引官贊跪承祭官跪行一叩禮興不贊司香官跪進香贊引官贊上香承祭官立上柱香三上瓣香畢復一跪一叩興不贊贊引官贊詣復聖顔子位前跪叩上香如正位儀次贊詣宗聖曾子位前次贊詣述聖子思子位前次贊詣亞聖孟子位前跪叩上香均如前儀其十二哲分獻官俟承祭官詣亞聖案時引至哲位前跪叩上香如承祭官儀贊引官贊旋位引承祭官分獻官至殿門北面一揖出復位立兩廡分獻官如十二哲分獻官儀齊至各位前上香畢復位立贊跪叩興承祭分獻陪祀各官俱行三跪九叩禮興樂止典儀唱奠帛爵行初獻禮司帛官奉篚司爵官奉爵進協律郎唱初獻樂奏宣平之章樂作贊引官贊就奠獻位司帛爵各就案旁立贊引官導承祭官由東階上進殿左門贊詣至聖先師孔子位前承祭官至案前立贊引官贊跪承祭官跪行一叩禮興不贊贊引官贊奠帛司帛官奉帛跪進承祭官受帛拱舉立獻畢贊引官贊獻爵司爵官奉爵跪進承祭官受爵拱舉立獻奠于正中行一跪一叩禮興不贊贊引官贊赴讀祝位引承祭官就讀祝位立讀祝官至祝案前一跪三叩捧祝版立于案左樂止贊引官贊跪承祭官讀祝官分獻官陪祀官俱跪贊引官贊讀祝讀祝官讀畢捧祝版至正位帛案前跪安帛篚內三叩退樂作贊引官贊跪叩興承祭分獻陪祀官俱行三叩禮興贊引官贊詣復聖顔子位前奠帛獻爵如正位儀次贊詣宗聖曾子位前次贊詣述聖子思子位前次贊詣亞聖孟子位前奠帛獻爵均如前儀其十二哲分獻官俟承祭官詣亞聖位時引至哲位前奠帛獻爵如承祭官儀贊引官贊旋位引承祭官分獻官至殿門北面揖出復位立兩廡分獻官如十二哲分獻官儀齊
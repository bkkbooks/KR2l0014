body:
  text: 生徒臣等謹案周禮鄉學教庶人國學教國子及庶人之俊鄉學秀者之升曰選士國學秀者之升曰進士自漢設博士弟子唐則六館生徒宋之三舍生元明之陪堂伴讀官民監生雖銓綜代異而損益因時載在史書班班可考洪惟我朝列聖相承教澤深厚百餘年來鼓舞振興條目簡嚴負笈來逰者肩駢趾錯世宗憲皇帝勅賜學舍於太學之南俾諸生肄業其中皇上復親製訓飭士子文勒之講堂垂教萬世自國初迄今由成均肄業掇科目膺辟舉者英才輩出至於八旗子弟之肄監者分置學舍校字工書藝能畢録他如算學生勲䕃子弟各攻術業造就成材以至逺人慕化並遣侍子就學選賢簡藝同軌同文之盛超軼前古謹志員額一卷考校一卷算學一卷勲䕃一卷鄉試一卷甄用一卷外藩入學一卷各以元明舊制附載其末為生徒門生徒一員額肄業各生國子監肄業有貢生有監生貢生凡六曰嵗貢由直省府州縣學廪生年深者挨次升貢起送曰恩貢凡遇恩詔以正貢為恩貢次貢為嵗貢起送曰㧞貢由直省學臣選㧞與督撫彚考覆核升貢廷試三等及一二等之引見未授官者禮部劄送曰優貢由直省各府州縣學廪増生教官申報學臣與督撫核定禮部㑹本監考試准貢劄送曰副貢由直省鄉試副榜准作貢生曰例貢由廪増附生報捐者並取本籍文或同鄉京官結送由俊秀監生報捐者取本籍文結送監生凡四曰恩監由八旗漢文官學生算學館滿漢肄業各生考取曰䕃監由各䕃生咨送曰優監由各直省府州縣學附生武生教官申報學臣核定部監彚考與優貢同曰例監與例貢同凡貢監生赴監考到考驗後應大課一次補班内班定額一百五十名並在監居住外班定額一百二十名在外僦寓每月赴監應課内外班共計二百七十名分六堂肄業内班每堂二十五名外班每堂二十名自補班後連閏扣算三年期滿遇有告假復班等事本堂學官移付繩愆㕔辦理世宗憲謹案本監肄業生向無員額亦無内外班自外皇帝恩賞銀嵗六千兩給與膏火始設有内班額今謹遵現行則例開載其厯年添設貢監生名目及増減肄業人數附載于後順治元年恩詔直省府州縣學以本年正貢為恩貢次貢為正貢是為恩貢之始又諭舉選貢生為掄才大典准先行嵗考補足廪生以拔其尤直省府學各貢二名州縣學各貢一名時禮部定議在外府州縣學廪生赴學臣考試選貢來京以學達經濟行合規矩為及格是為拔貢之始二年禮部奏准直省府州縣學不拘廪増附生每學將文行兼優者大學二名小學一名起送入監聽監臣自行考課仍以貢監名色彚送應試謹案此例至康熈二十四年始復舉行餘不數舉盖特典也又命直省嵗貢士於京師府學每年一名州學三年二名縣學二年一名是為嵗貢之始謹案各省厯年更定貢額詳載㑹典兹不具録又命順天鄉試副榜入監由增附中式者准作貢監廪生及恩拔嵗貢貢監中式者免其坐監即與廷試是為副榜准貢之始又順天學臣御史曹溶疏奏奉天十五學隨遷入闗僑居失業學問久荒今逢考監請寛取百人就近教育仍勅監臣從優考課減月積分為天下勸經部議於十五學内取三十人入監得㫖允行五年詔本年鄉試副榜由廪生中式者准貢増附中式者准入監又詔直省府州縣學各拔貢一名先儘本年科舉首卷如首卷中式或有事故即以次卷挨補又部臣定議生員俊秀援例入監由各該部題准遵行或入監或在籍肄業俱准作監生謹案例監生得在籍讀書不必赴監肄業自是年始又定議奉天生員每嵗三貢八年世祖章皇帝臨雍禮成以五氏子孫觀禮生員十五人入監是為聖賢後裔入監之始九年定漢軍廪増生員每年出貢二名十一年定隨征生員有軍功二等准作監生更有軍功二等准作貢生謹案此例至順治十三年部議停止又科臣孫柏齡疏奏直省貢生廷試後即授官需次多人選途壅滯請仍舊例送監肄業俟學成再送廷試經部議於廷試後選英年者送監得㫖允行十三年定嵗貢生於到部時詳㸔年力强壯者送監又科臣王命岳奏准貢途壅滯請暫停恩㧞嵗貢生惟副榜貢生仍舊康熈元年命停止直省鄉試副榜准貢例八年聖祖仁皇帝臨雍禮成以五氏子孫觀禮生員十五人入監十年定八旗嵗貢生額滿洲䝉古漢軍每年各二名又祭酒查禄奏准命直省學臣選拔一二等生員文行兼優者府學二名州縣學一名送監又命直省鄉試副榜仍准貢監十一年命選㧞八旗生員文行兼優者與漢生員一體入監每旗滿洲䝉古二名漢軍一名寧缺毋濫二十四年禮部議准監生止有輸納一途貧寠之士無由觀光請將各儒學生員選其文行兼優者府學二名州縣學一名起送准其貢監寧缺母濫二十六年禮部議准請停止直省嵗貢廷試之例聽學臣考准挨序咨補捐納貢生亦聽考選補授願入監肄業者學政給文送部劄監三十三年聖祖仁皇帝東廵躬詣闕里以五氏生員入監三十六年定直省嵗貢入監由本府州縣起送停止學臣起送之例三十七年祭酒特黙徳孫岳頒等面試山東㧞貢張漢翀等六名陜西㧞貢吕爾恒等四名文理不堪照例駁囬三十八年面試廣東㧞貢陳其瑋等三名文理不堪字畫舛謬抄卷駁回明年奉命停止直省選㧞貢生雍正元年禮部尚書陳元龍奏請國子監生皆由捐納入監能文之士稀少應令各省學臣查明往例於各學廪膳生員秉公考試送監肄業尋議准仍照康熈三十六年例府學選㧞二名州縣等學每學一名每旗滿洲䝉古共二名漢軍一名寧缺毋濫如有文理荒踈者將該學臣照溺職例處分又禮部議准生員有孝弟端方實行尤著者許學臣列薦入監以示優勵是為優貢之始二年世宗憲皇帝臨雍禮成以五氏子孫觀禮生員十五人入監五年命直省選㧞貢生六年舉行一次不必拘定正考等第又命各省學臣於三年任滿後舉報生員人品端方有猷有守者大省四五人小省二三人送部引見録用嗣因各省並不舉報部議令于三年任滿時具疏彚題送監肄業得㫖允行八年禮部議准各省造報優生少者僅二三名多者至八九十名不等其請升入太學者並無優行實蹟亦有未經聲明應否升入太學應令該學政確訪實蹟取具地方官印結出具考語照原議升入太學給與印結彚送清冊報部其武生中如果文行騎射兼優者亦照文主之例升入太學又監臣孫嘉淦奏准請將八旗生員多行選㧞每旗拔八人或拔十人入監與各省貢生一體教導俟其學成再行采用或即以之補授助教等官使之督率生徒則八旗官學益加振興明年考試八旗生員選拔九十四人送監十一年禮部奏稱各省優生由學政出具考語具題送部從前祇議升入太學並未分晰貢監名色以致一切考試録用無從分别今議優生由廪増升入太學者准作貢生由附生武生者准作監生皆由部換給執照劄監肄業奉㫖武生到部着禮部考試文藝兵部考試騎射以聞乾隆元年定直省拔貢生廷試三等者停其簡選劄監肄業三年上臨雍禮成以聖賢後裔來京觀禮者三十一人入監又兼管監事尚書孫嘉淦奏准肄業貢監生每堂在内三十名在外二十名六堂共三百名又孫嘉淦奏准八旗官學生當使之講求經史為有用之才每三年一次録取請㫖欽㸃大臣來監考試擇其明通者授為監生是為恩監之始又兼管監事尚書趙國麟奏准請將外班一百二十名額數裁去止留内班一百八十名俾諸生安心肄業三年命監臣選取肄業貢生十名送武英殿充校對官四年兼管監事大學士趙國麟奏准肄業額數現定一百八十名而選拔之年貢入者不下千餘人請嗣後肄業期滿者即行咨部出缺另補又禮部議准各省學政嗣後舉報優生除確訪實行考試經義外並限以大省五六名中省三四名小省一二名令該學政詳慎舉報寧缺毋濫仍於任滿日彚題由部核實具奏再㑹同國子監考試劄送肄業六年兼管監事尚書劉吳龍奏准本年係直省拔貢之期例應赴部考騐劄監肄業不下千餘人請於内肄業一百八十缺之内撥出二十四名作外肄業缺計其公費可給百二十人臣等仍詳加考騐分撥六堂又命直省學臣拔貢毎十二年一舉十三年上東廵以十三氏子孫逺承世緒濟濟膠庠其中當有文行兼優者特命學臣甄拔數人咨送禮部貢入太學以示鼓勵十六年禮部議准直省拔貢生引見未授官者俱劄監肄業三十四年禮部侍郎王際華奏准武英殿繕寫人員即於吏部考取謄録内遴選正途出身書法端楷者咨送停止本監咨送之例三十九年四庫全書館總裁質郡王等奏准永樂大典内採輯散篇彚輯成部者頗有堪以刋行之書應行刋刻此項書籍非另辦副本不可擬於國子監揀𣲖内肄業貢生十名到武英殿照現在行走貢生例専供校録刋本之用八旗官學生國子監官學生由八旗選擇俊秀子弟咨送監臣當堂挑取十八嵗以下者記名挨補每旗額設學生一百名滿洲六十名䝉古二十名漢軍二十名又鑲白等下五旗每旗額設包衣學生十名滿洲六名䝉古二名漢軍二名八旗各分五館漢文四館滿文一館館無定額䝉古别為一館有習漢文者歸漢館謹案官學生員額謹就現行則例開載其厯年増定章程附志于後順治二年禮部奏前此八旗官學生每佐領止取一名以十名習漢書餘習滿書得就學者無多請増廣額數因命每佐領増取一名於原額習漢書十名外加増十名餘俱習滿書不論文武官員子弟由各佐領選擇移送國子監十三年世祖章皇帝以八旗子弟不習武事悉令入官學讀書此等習尚殊違我朝以武定天下之意特諭禮部酌量每佐領下應幾名讀滿漢書更定具奏尋議定滿洲䝉古學生每佐領止留一人漢軍學生每佐領一人外應添一人至十四年禮部覆准䝉古學生應令兩佐領出一人漢軍學生或仍舊制每佐領出二人或視滿洲例每佐領止出一人奉㫖漢軍學生每佐領止出一人十八年部臣議准滿洲漢軍加増官學生額數每佐領各舉二名一習滿書一習漢書止於武員及甲兵等子弟開送文員不與康熈九年命八旗文員子弟仍得充官學生十一年命酌減八旗官學生額數禮部議准滿洲漢軍學生每佐領下存一人䝉古學生出缺甚難又有廕生監生間補應每二佐領存一人十六年部臣議准八旗官學生以生員選補如本佐領下無生員准補閒散五十年部臣議准八旗官學生隨貢監生分撥各堂鑲黄旗在東講堂正黄旗在西講堂正白旗在率性堂正紅旗在修道堂鑲白旗在誠心堂鑲紅旗在正誼堂正藍旗在崇志堂鑲藍旗在廣業堂令八旗助教設立公座每逢進署之日季考月課之期先赴本堂謁見使坐立有所且杜頂冐之弊雍正元年司業博禮奏稱官學生不可濫取應於該佐領下無論官兵子弟不許瞻狥情面擇其資性穎秀可以讀書上進者一人該叅領佐領保送該都統等騐㸔移送國子監肄業部議如所請奉㫖允行五年命八旗官員子弟十八嵗以下者入學讀書時部議八旗子弟不能習文者令其披甲學習騎射向來帶赴外任之處永行停止又王大臣等定議凡選擇官學生不拘門第務擇聰明俊秀子弟年㓜者令學滿文稍長者令學漢文向例八旗每佐領必選一人今酌定一旗額設官學生一百名分𣲖滿洲六十名以三十名習滿文三十名習漢文䝉古二十名漢軍二十名缺出通在一旗選擇不拘佐領申送本旗都統騐㸔交國子監當堂挑取六年部臣議准國子監八旗並有䝉古官學其内䝉古學實屬多設應將内䝉古學裁去其裁退學生歸國子監官學遇缺即補又命國子監八旗每旗各立一學其二十嵗以下十嵗以上俱准入學謹案向來兩旗共立一學八旗㪚處值天寒隂雨多不能到學至是始増設云十年命八旗漢軍記名舊家子弟無力延師者得入官學謹案時八旗漢軍記名子弟左翼二十一人右翼十一人令各就本旗官學肄業乾隆三十三年兼管監事尚書陸宗楷奏准查咸安宫官學八旗子弟及上三旗包衣子弟均得選補八旗官學専補八旗子弟景山官學専補上三旗包衣子弟俱有定缺禮部八旗義學無定額聽有志讀書無力延師者投呈充補下五旗包衣得入此學自乾隆二十三年部議裁去禮部義學各學生俱有可歸之學惟下五旗包衣無學可歸請嗣後每旗各設官學生十名滿洲六缺䝉古二缺漢軍二缺附入國子監八旗官學三十四年兼管監事侍郎徳保奏准八旗官學生考取中書筆帖式庫使等官未經得缺之前向來俱准在學候補但伊等既獲寸進若仍留在學候補恐讀書未必専心反屬有名無實請嗣後八旗官學生有候補各官者即令出學另行挑取本謹案養人材之法貢監肄業之外特設八旗官朝育學専課清漢文葢即古者教胄遺意較元明立法更為詳備云員額附元至元二十四年立國子學而定其制三齋生員之數定二百人先令一百人及伴讀二十人入學其百人之内䝉古半之色目漢人半之元史選舉志謹案志又稱太宗六年命侍臣子弟十八人入學世祖至元七年命侍臣子弟十一人入學世祖紀又稱至元八年選胄子托克托穆爾等十人肄業國學均在二十四年立學以前故附著於此二十七年勅從臣子弟入國子學績文獻通考大徳八年增置國子生初増䝉古生百員至是増二百員選宿衛大臣子孫充之同上大徳十年國子學増定䝉古色目漢人生員二百人三年各貢二人元史選舉志至大二年擇衛士子弟充國子學生續文獻通考至大二年定伴讀員四十人四年定國子學生員額二百人元史選舉志謹案續文獻通考作三百人又云増陪堂生二十人通一經者以次補伴讀與史不同延祐二年増置國子生百人陪堂生二十人嵗貢伴讀四員又以所設生員百人䝉古五十人色目二十人漢人三十人而百官子弟之就學者常不下二三百人宜増其廪餼乃减去庶民子弟一百一十四員聽陪堂學業於見供生員一百名外量増五十名先置䝉古二十人漢人三十人同上至治元年命世家子弟成童者入國學續文獻通考泰定帝四年勅國子監嵗貢生員業成者六人同上天厯二年勅増伴讀員數同上謹案元代尚有䝉古國子學及囬囬國子學其員額亦備見選舉志以與集賢院所屬之國子學無渉槩不載入明入國學者通謂之監生舉人曰舉監生員曰貢監有嵗貢選貢恩貢納貢之别品官子弟曰䕃監有官生恩生之别捐貲曰例監謂之民生亦謂之俊秀每班選一人充齋長每嵗天下按察司選生員年二十以上厚重端秀者送監考留㑹試下第舉人入監卒業又因諌官閔賢奏設為定例府州縣學嵗貢生員各一人翰林考試中式一等者入國子監其後例亦屢更孔顔孟三氏及京學衛學都司土官川雲貴諸逺省其按年充貢之法亦間有増减云恩貢者國家有慶典或登極詔書以當貢者充之而其次即為嵗貢納貢視例監稍優其實相彷也明史選舉志謹案明制又有生員檎斬叛賊題奏入監者謂之功生見辟雍紀事史未之載永樂元年令順天府大興宛平二縣通經能文者充北京國子監生明成祖實録謹案時設北京國子監以舊國子監為南京國子監而太學生有南北之分矣永樂二年禮部奏言監生太少請自明年為始依洪武二十五年嵗貢例從之辟雍紀事永樂八年定州縣戸不及五里者州嵗一人縣間嵗一人十九年令嵗貢照洪武二十一年例明史選舉志謹按選舉志洪武二十一年定府州縣學嵗貢以一二年為差二十五年改令府學嵗貢二人州學二嵗貢三人縣學嵗貢一人終明之世所仍者此二例也永樂中舉人會試下第輙令翰林院録其優者俾入學以俟後科給以教諭之俸同上謹按舉人入監雖始于洪武然不過偶一行之至是著為例云宣徳六年禮部奏言比因監生衆多令天下學校悉依洪武三十年貢額府學一年貢一人州學二年貢一人縣學三年貢一人今監生出仕者多在監者少兼有差遣請仍照洪武三十年以前例自宣徳七年為始府學每年貢二人州學二年貢三人縣學一年貢一人庶足任使從之明宣宗實録謹按此所云洪武三十年貢額即明史二十一年所定之例也而年嵗互異宣徳時去洪武未久不應舛錯或洪武三十年仍改從二十一年貢額而史不載歟宣徳八年命禮部尚書胡濙大學士楊士竒楊榮選副榜舉人龍文等二十四人送監進學三月一考其文頗示優異後不復另試惟取副榜年二十五以上者授教職年未及者或依親或入監讀書既而不拘年齒依親入監者皆聽依親者回籍讀書依親肄業也明史選舉志宣徳八年詔天下州不及二十里者嵗貢生員一人過二十里者貢如舊例縣不及五里者二嵗貢一人不及十里者三嵗貢二人過十里者貢如舊例明宣宗實録宣徳八年令天下生員年四十五以上者考送國子監辟雍紀事謹按時言者以士子在學多衰老不得進用故有是命盖此即選貢法而意主於限年所以重老成也正統六年更定府學嵗貢一人州學三嵗二人縣學間嵗一人明史選舉志正統十三年御史萬節請勅禮部多取舉人副榜以就教職禮部以舉人願依親入監者十之七願就教職者僅十之三但宜各隨所欲却其請不行同上景泰元年以邊事孔棘令天下納粟納馬者入監讀書是為例監之始限千人而止行四年罷之同上天順元年令年淺監生及副榜舉人嵗貢生初入監者悉放還依親以俟取用又禮部議今後在京三品以上官員之子奏願入監讀書者務要科目出身其非三品子孫不得乞恩入監著為令辟雍紀事天順五年令天下生員考選送國子監肄業續文獻通考成化二年南京大饑守臣建議欲令官員軍民子孫納粟送監禮部尚書姚䕫言太學育才之地近者直省起送四十嵗生員及納草納馬者動以萬計不勝其濫且使天下以貨為賢士風日陋帝以為然為却守臣之議然其後或遇嵗荒或因邊警或大興工作率援往例行之訖不能止明史選舉志宏治五年吏部尚書王恕奏銓法壅滯詔停止生員納粟事例辟雍紀事宏治八年定府學嵗貢二人州學二嵗三人縣學嵗一人時祭酒林潮以坐班人少不敷撥歴請開科貢舉禮部尚書倪岳覆奏科舉已有定額不可再増惟請増嵗貢人數從之行四嵗而止明史選舉志嵗貢之始必考學行端荘文理優長者充之其後但取食廪年深者宏治中南京祭酒章懋言嵗貢挨次而升衰遲不振舉人坐監差撥不敷教養罕效近年有増貢之舉而所拔亦挨次之人資格所拘英才多滯乞于常貢外令提學行選貢之法不分廪膳増廣生員通行考選務求學行兼優年富力强累試優等者乃以充貢通計天下之廣約取五六百人以後三五年一行則人才可漸及往年矣乃下部議行之此選貢所由始也謹按行選貢法明史不載年分辟雍紀事云係宏治十七年事正徳十二年㑹昌縣生員文泮擒斬大㡌山賊五人送監叙用續文獻通考正徳十四年復開上粟入監之例收生員五百七十人十六年停止辟雍紀事謹按先是正徳四年十二年並開納粟事例辟雍紀事未載人數嘉靖十年監生在監者不及四百人諸司厯事嵗額以千計禮部尚書李時引宏治八年倪岳議請増嵗額以足坐班生徒行之四嵗而止今國學闕人更甚請叅前例舉行不從未幾復以祭酒許誥提學御史胡時善之請詔増貢額如岳時前議永為定額明史選舉志嘉靖二十七年時嵗貢多頽老惟願就教而不願入監祭酒程文徳請將廷試嵗貢惟留即選者於部而其餘盡使入監報可嵗貢諸生合疏言家貧親老不願入監禮部復請從其所願而盡使舉人入監又從之舉人入監不能如期南京祭酒潘晟請設重罰以趣其必赴然其不願入監者卒不能力强也同上嘉靖三十四年廣寧衛學生員唐能以斬獲賊首照例題准入監續文獻通考嘉靖三十九年議濟大工許監生入貲又推廣事例以佐國計辟雍紀事萬厯三年祭酒孫應鰲奏乞督送天下舉人入監違者不准㑹試從之同上萬厯四年掌監事禮部侍郎孫應鰲疏言國家設立太學非舉貢勲䕃不許濫入自事例一開廪増附不已遂濫及青衣發社及斥退者至民間俊秀大半富商大賈之子但入微貲皆占成均之籍夫郡縣之士必試以經術始入黌宫今身未成童目不識丁者皆可驟躐賢闗是虎闈重地反不如黨庠術序之有選擇也請嗣後停廪停増降附者暫許充納此外一切罷之疏下部議報可同上萬厯十九年祭酒劉元震疏請於常貢外間行選貢禮部議覆于四畨常貢之中間以一畨選貢府學五年一選州學七年縣學十年京府學五年例選二名使選貢之士得拔于十年五年之間而挨貢之人止遲於一年二年之内從之同上萬厯中工科給事中郭如心奏言選貢非祖制其始欲以補嵗貢之乏其後遂妨嵗貢之途請停其選帝然之明史選舉志謹按辟雍紀事罷選貢係萬厯二十五年以後事又按選舉志崇禎中又曽行選貢天啓三年定恩例副榜每生員中百名截二十名監生五十名截十名為副榜不得溢額辟雍紀事崇禎八年從祭酒倪元璐言以貢選為正流援納為閏流改定積分撥厯法明史選舉志欽定國子監志卷三十五

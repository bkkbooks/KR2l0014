body:
  text: 順治九年秋九月辛卯世祖章皇帝詣國子監釋奠先師御彛倫堂命祭酒臣固爾嘉渾臣李奭棠進講用易司業臣傅達禮臣馮杰進講尚書禮成翼日衍聖公臣孔興燮祭酒臣固爾嘉渾等率五經博士五氏後裔及國子監官生等表謝命頒敕諭勉勵師生賜衍聖公內院翰林官國子監祭酒司業等官五經博士五氏後裔及禮部太常光祿鴻臚三寺執事羣臣宴于禮部越日賜衍聖公貂冠一朝服一祭酒司業錦緣領袖紵絲袍服各一監丞博士助教學正學録典簿五經博士筆帖式孔氏顔曾孟仲四氏生員紵絲袍服各一六堂諸生及各學教習師生並賚白金有差准觀禮五氏裔十五人入監肄業廣國子監鄉試中額十五名謹案是年禮部奏准先期行取衍聖公五經博士及孔顔曾孟仲五氏後裔陪祀觀禮康熙八年夏四月辛丑聖祖仁皇帝詣國子監釋奠先師御彛倫堂命祭酒臣賈祿臣宋德宜進講中庸司業臣博濟臣陳廷敬進講尚書既畢聖祖親授經義翼日衍聖公臣孔育圻祭酒臣賈祿等率官生表謝命頒敕諭勉勵師生賜羣臣宴于禮部賜衍聖公冠服國子監官及五經博士等袍服諸生白金有差准觀禮五氏裔十五人入監肄業廣國子監鄉試中額八名雍正二年春三月乙亥朔世宗憲皇帝詣國子監釋奠先師御彛倫堂命祭酒臣塞楞額臣王傅進講大學司業臣博禮臣彭維新進講尚書既畢世宗親授經義特諭增復先師廟崇聖祠祔饗賢儒增置先賢先儒裔五經博士復諭廣直省入學額數其人文最盛州縣小學改中學中學改大學大學如府學又命監臣及直省學政録科時察實能貫通五經諸生仍聽以五經應試廣國子監鄉試中額十八名是日值祀歷代帝王廟齊期駕還宫不作樂翼日衍聖公次子五經博士臣孔繼溥祭酒臣塞楞額等率官生表謝命頒敕諭勉勵師生賜聖裔監臣執事諸臣宴于禮部又賜聖裔冠服監臣等袍服諸生白金有差觀禮進士九十五人舉人二百七十五人廕貢監生八旗官學生千六百八十五人並䝉恩賚謹案是年禮部行取衍聖公臣孔傅鐸有疾奏以次子候襲五經博士臣孔繼溥敬代世宗憲皇帝命班次視衍聖公惟所服仍其官又命增閔氏後裔陪祀觀禮乾隆三年春三月甲寅皇上親詣國子監釋奠先師御彛倫堂命祭酒臣國璉臣李鳳翥進講中庸第一章司業臣塞爾登署司業贊善臣李文鋭進講尚書堯典既畢上親講諭經藴諸王公卿以下暨多士圜伏聽講翼日衍聖公臣孔廣棨領監事尚書臣孫嘉淦等率官生表謝上復頒敕諭訓勵師生賜衍聖公國子監官及執事諸臣宴于禮部賜衍聖公臣孔廣棨御製樂善堂文集一部墨二奩貂四貂冠一朝服一領監事尚書臣孫嘉淦祭酒臣國璉等各錦緣領袖紵絲袍服一聖裔五人各紵絲袍服一貂四五經博士各紵絲袍服一貂二國子監官及孔顔諸氏生員各紵絲袍服一賜觀禮五氏後裔九十二人進士舉人貢監諸生二千三百餘人諸學教習師生千七百餘人白金有差准十三氏後裔三十一人入監肄業廣國子監鄉試中額十八名謹案是年增冉言卜顓孫端木五經博士及諸氏後裔各二人又增元聖後裔東野五經博士並其族二人赴京陪祀乾隆五十年春二月丁亥詔建辟雍工成皇上親詣國子監釋奠先師御新建辟雍講學命大學士臣伍彌泰大學士管理國子監事臣蔡新進講大學為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信祭酒臣覺羅吉善祭酒臣鄒奕孝進講易經天行健君子以自强不息既畢上親發御論諸王公卿以下暨多士朝鮮國使臣圜伏聽講翼日衍聖公臣孔憲培大學士管理國子監事臣蔡新等率官生表謝監臣敬刋御論二篇通行頒發在京各該衙門官學及直省學政轉發各儒學師生咸資誦習以廣教思賜衍聖公國子監官及執事諸臣宴於禮部賜衍聖公臣孔憲培貂冠朝服頒發刋刻御論二篇加賞徽墨二匣貂皮四張賜至聖後裔七人五經博士二十人各氏後裔三十八人八絲縀各一卷頒發刋刻御論二篇加賞徽墨二匣貂皮各二張賜進講大學士臣伍彌泰臣蔡新八絲縀各二卷滿漢祭酒司業臣覺羅吉善等八絲縀袍褂各二卷監丞博士助教筆帖式等官每人八絲縀各一卷賜肄業諸生及在京觀禮進士貢監生廕生八旗官學教習及官學生銀各一兩各氏後裔送監讀書又欽奉諭㫖於乾隆五十一年丙午科順天鄉試皿字號卷內廣額十五名是日聖駕詣學適值慶雪大霈上念隨從執事諸臣及觀禮多士衣履沾濕所有執事扈從王公大臣衍聖公及文武官員俱紀録一次並加恩賜觀禮聖賢後裔縀各一卷進士舉人貢監生官學生等紡絲各一匹朝鮮國使臣大縀各一卷乾隆三年奏定臨雍謹案是年先經禮部陳奏查向例三日後內閣撰擬敕諭一道刋刻頒行今奉有頒國子監御諭二篇于立極垂訓之道尤為深切粹精各衙門禮成後由國子監敬謹刋刻通行頒發在京恩賜及直省學政轉行頒發各儒學又查向例絲袍五經博士聖賢後裔及國子監官俱係紵賜八縀袍今並改絲縀有差特派出進講之大學士二人亦與祭酒等一體賞賜視學儀注凡視學之日皇帝禮服乘輿詣學法駕鹵簿前導引扈如常儀王公百官俱齊集國子監祭酒司業率所屬官暨進士舉人朝服諸生公服跪迎于成賢街道右皇帝至廟門外降輿入太常寺卿二人恭導詣大成殿釋奠于先師孔子上香奠帛爵一獻樂三奏不讀祝禮畢出大成門入大次更衮服王以下咸更采服王公序立于大次之南各官均先詣彝倫堂庭中按朝班東西序立衍聖公在東班之首五經博士各氏後裔在班末均東西面北上記注官四人立西階下東面糾儀給事中御史各二人鴻臚寺鳴贊二人立東西階下均東西面北上宣制官一人立東檐下西面祭酒司業率所屬官暨進士舉人肄業諸生序立太學門首東西面南上禮部尚書奏請行講學禮國子監鳴鐘鼓皇帝出大次至門外乘輿導迎樂作由國子監中門入王公等隨入祭酒以下跪候駕過興咸隨入皇帝至彞倫堂降輿御講幄升座記注官升西階入立堂內右楹之西糾儀官升東西階立東西檐下第三柱鳴贊升立第二柱王公立階上各官立階下均東西面鳴贊贊排班衍聖公率五經博士各氏後裔祭酒司業率所屬官及進士舉人諸生咸就拜位北面立班齊贊進衆進贊跪叩興衆行三跪九叩禮畢賜王公暨衍聖公大學士九卿坐鴻臚官引由左右門入堂內咸跪行一叩禮坐翰詹四品以下官國子監官六堂各學師儒五經博士各氏後裔進士舉人肄業諸生皆立東西階下圜堂下聽講鳴贊贊進講祭酒二人由左門入司業二人由右門入均北面立贊舉案執事官舉御案至御座前賜進講官坐祭酒就東案西面司業就西案東面各行一叩禮坐祭酒二人以次講四子書司業講經亦如之講畢贊舉案執事官舉御案置原位王公以下起立祭酒司業出率所屬官暨進士舉人諸生就拜位北面立禮部尚書奏𫝊制鳴贊贊有制祭酒以下皆跪宣制官進至中門左宣制曰聖人之道如日中天講究服膺用資治理爾諸生其勉之宣訖贊跪叩興祭酒率衆行三跪九叩禮先退至成賢街恭俟賜王公大臣茶跪受坐飲各行一叩禮畢由左右門出就階下序立禮部尚書奏禮成駕興升輿出太學門導迎樂作祭酒以下跪送如初迎儀皇帝還宫乾隆五十年詔建辟雍視學儀注視學之日工部官設更衣御幄於大成殿階下之東南向樂部和聲署設中和韶樂於辟雍殿階下設丹陛大樂於太學門內武備院設寶座鋪陳鴻臚寺設經書案一於寶座前又設講案二於寶座下稍南東西向祭酒恭捧御覽講章陳於案上書左經右捧進講副本陳書于左案陳經於右案進講滿漢大學士二人位左案西面滿漢祭酒二人位右案東面左翼王公四人衍聖公內閣大學士及吏部户部禮部通政司詹事府堂官滿漢各一人位進講大學士之後西面右翼王公四人兵部刑部工部都察院大理寺堂官滿漢各一人位進講祭酒之後東面起居注官四人位西南隅亦東面侍儀給事中御史各二人位東西檐柱內聽講各官位橋南甬道東西六堂師生各序立堂階下朝鮮國使臣立甬道西班各官之末鴻臚寺鳴贊二人立東西檐柱外鳴贊官二人立于階下又鴻臚寺官四人分立辟雍橋南左右鴻臚寺官四人分立太學門外左右皆東西面届時太常寺卿奏請皇上具禮服乘輿出宫午門鳴鐘鼓不齊戒王以下文武各官於東華門外分翼排立候駕過跪送法駕鹵簿前導不作樂駕出東華門至成賢街國子監祭酒司業率所屬官俱朝服諸生俱公服于街在跪迎陪祀王公大臣百官俱朝服先至大成門外祇候隨駕入皇上至更衣幄次降輿贊引對引官二員恭導皇上釋奠於先師禮畢乘輿御彝倫堂更衮服各官咸更蟒袍補服王公大學士以下各官衍聖公率五經博士各氏後裔祭酒司業率所屬官及肄業諸生各學教習進士舉人貢生監生官學生均先至辟雍南分東西班序立朝鮮國使臣立西班各官之末起居注官侍儀給事中御史各按位立届時臣部堂官奏請皇上臨辟雍行講學禮太學鳴鐘鼓臣部堂官恭導前引後扈如儀皇上御辟雍殿升寶座中和韶樂作奏盛平之章對引禮部堂官前引內大臣趨至前廊下立侍衛于階下東西翼立樂止鳴贊官贊齊班丹陛大樂作鴻臚寺官分引衍聖公進講大學士五經博士各氏後裔在東班祭酒以下各官在西班肄業諸生各隨東西班末聽鳴贊官贊行二跪六叩禮畢退復原位立樂止鴻臚寺堂官二員分引進講官四人由南橋升階鴻臚寺官二員分引王公衍聖公大學士九卿詹事由東西橋升階俱入左右門各就位立鴻臚寺堂官退就東西檐下立皇上賜派出之講官坐講官就位一叩坐王公大臣咸按班立鳴贊官贊進講滿漢進講大學士以次講四書皇上闡發書義宣示臣工王公衍聖公大學士以下及諸生并朝鮮使臣跪聆畢王公等及圜橋各官師生朝鮮使臣俱興滿漢祭酒以次講經皇上闡發經義各官及諸生朝鮮使臣跪聆亦如之畢王公及各官師生朝鮮使臣俱興進講官退就橋南偕司業以下各就拜位北面立丹陛大樂作鳴贊官贊跪叩興行三跪九叩禮以次退樂止國子監師生先至成賢街序立祇候御前進茶清樂作奏仰君師之章皇上賜王公衍聖公大學士九卿詹事茶俱行一跪一叩禮坐賜茶畢樂止鴻臚寺堂官引王公大學士以下各官自左右門出至橋南東西序立臣部堂官奏禮成中和韶樂作奏道平之章皇上起座乘輿出太學門樂止祭酒司業率所屬官暨進士舉人諸生跪送候駕過興各官及朝鮮使臣咸退各衙門承辦視學事宜凡恭遇皇帝視學工部設大次于大成殿東又恭設黃幄御座于彝倫堂正中鴻臚寺于御座之前稍東恭設御案南之東設祭酒講書案南之西設司業講經案內閣先期恭擬經書題進呈欽定祭酒撰四書講章司業撰五經講章均繕清漢文進呈御覽是日陳設講案王公百官一體齊集國子監其觀禮之五經博士各氏後裔以衍聖公領之守部進士以監丞領之舉人以博士領之六堂肄業生以六堂助教學正學録領之八旗官學生以八旗助教教習領之各學學生以各學副管教長教習領之均先期到監演習禮儀詔建辟雍各衙門承辦臨雍事宜皇帝視學工部設更衣御幄於大成殿階下東南向武備院設寶座於辟雍殿內務府將文華殿預備經筵講案案衣敬謹挪往並先期預備講官之講案案衣届期鴻臚寺陳設軍機大臣先期恭擬經書題進呈欽定大學士撰四書講章祭酒撰五經講章均繕清漢文進呈御覽届期陳設講案於辟雍殿內
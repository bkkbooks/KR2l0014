body:
  text: 官師二典守兼管國子監事大臣總理本監一切事務祭酒總司監事董率其屬以教貢監官學生凡六堂八學教學之勤惰隨時稽核凡貢監入監者分内外班肄業以經義治事之法教之立課程以董之朔望講書而啟迪之以考驗定去取以季考較課業以賙助恤事故嵗終而甄别之肄業期滿經明事治品學兼優者特舉其次咨部銓選將行鄉試則與兼管大臣輪遞録科合格者送順天府與試凡貢監考職及應考各途均為之咨送官學生亦如之三年京察則書各屬之考第其優劣六堂助教有缺以學正學録資滿者題陞學正學録有應陞部院經歴司務等官而司迪素優者保留以助教陞用滿員應送倉差同知通判等官則遴選而保送之滿洲八旗及算學生當考恩監者三年一舉奏請考試八旗官學生有缺遴取挨補教習期滿帶領引見凡奏事循其班稽核本監錢糧之出入嵗終奏銷聖廟丁祭則遴派執事官凡月朔主行釋菜禮滿洲漢人職掌同司業職貳祭酒凡兼管大臣祭酒所統者皆佐之貢監生入監以考到驗之朔望與祭酒講四書性理諸書以迪多士匝月而課之凡稽核六堂八學之功課及一切題奏行移俱贊行之有戒約規條則商兼管大臣祭酒行之亦滿漢職掌同惟蒙古司業専司八學蒙古師生教學之事稽核其功課蒙古官學生有缺則同祭酒遴補不與八學滿洲學務及六堂課試之政凡月朔主行崇聖祠釋菜禮月望主行拜聖廟上香禮皆各司業遞司之監丞掌學規以督教課察勤惰核支銷凡貢監生到監經司業考到甄取者次月朔日呈兼管大臣祭酒考驗考驗復取則分撥六堂以教之廼循大課之甲乙補内外班肄業諸生願就内班或外班者各聼其自行填冩稽其曠怠者申飭之失儀者糾正之不率者懲戒之書於集愆冊凡給假者書其月日並籍貫年甲所肄經書銷假則查核冊籍而分别使之復班大課録科則監試肄業期滿者咨部銓選應考職者咨部請考八旗漢教習有缺循其考取之先後而補用之期滿則第其功課而呈於堂上官祭酒涖任則呈送儀注各官涖任則引叅堂上官凡丁祭先期開具人數移咨太常寺習儀祭時分獻大成殿兩廡及崇聖祠四配兩廡朔望拜廟先期率各執事習儀拜廟時分獻東哲凡本監師生暨人役咸聼糾察滿漢職掌同有缺而新任者未受事則博士助教攝之凡監丞以下各屬官並聼堂上官差委監用堂印博士掌明經説以助啟迪朔望㑹講諸經並令諸生背誦所肄之經驗其生熟月以經義經解試之凡聖諭及御製詩文頒於監者㳟繕冊而藏之諸生領讀御書樓書籍則識之於簿讀畢取貯大課録科則巡場琉球官生入學則董率教習課之與六堂分日稽察南學司業涖任呈送儀注朔望拜廟分獻西哲丁祭分獻同監丞亦滿漢職掌同有缺而新任者未受事則監丞助教攝之助教六堂漢助教各涖事於本堂掌分教直省貢監生諸生歸堂肄業則以經義治事立課程限日計功劄記所疑而請益者條分辨析之稽其勤惰别其功過移繩愆㕔籍記不率者面訓之不悛者白堂上官以俟懲辦諸生領讀本堂書籍則識之於簿立限呈繳毎五日一講書月上旬而課之肄業滿一年則第其文行書之於冊月稽内外班人數移繩愆㕔發膏火衣服銀内班給膏火銀外班給衣服銀凡諸生有疾請假暨他事故則呈之堂上官移繩愆㕔籍記報滿亦如之銷假復班或有故改補内班改外班外班改内班則核實移繩愆㕔辦理凡將鄉試則籍本堂諸生送典簿㕔記冊以待録科毎月公查内班肄業則統六堂而稽之飭曠怠者分日稽察南學整肅學規凡本堂書籍器物皆籍記之去任則授代者大課則巡場考到考騐録科則監試朔望聖廟分獻又於土地祠主行上香禮丁祭分獻同監丞有缺而新任者未受事則同堂學正學録攝之八學滿助教掌教本旗滿洲漢軍之子弟滿文班肄清書繙譯滿洲教習一人課之漢文班肄經書文藝漢教習四人課之均兼歩射騎射則弓箭教習一人課之咸統於助教凡學生宜滿文宜漢文量材分撥督率諸教習各勤所職日有課程不率者懲戒之重則呈斥浹月一合課一演騎蒙童使背書以觀教習勤惰春秋彚呈其冊於監以聼兼管大臣祭酒季考嵗終統稽一嵗之課回堂甄别學生有缺咨旗遴補滿十年無成者退回本旗皆呈明堂上官以俟辦理凡教習及學生領讀本學書籍並識之於簿立限呈繳凡書皆籍記之去任以授代者朔望拜廟分獻哲廡又獻崇聖祠正位暨四配兩廡丁祭分獻兩廡或執事大成殿有缺而新任者未受事則同學助教攝之蒙古助教掌教八旗蒙古子弟董率蒙古教習一人課學生以蒙古語言文字繙譯學生願習漢文者撥歸漢館其蒙古弓箭教習課歩射騎射者與滿洲助教同董之考稽職掌並同滿洲助教有缺而新任者未受事則附近助教兼理算學助教掌分教算學生課以天文算法凡肄習算法中線面體三部各以一年為程通曉七政共以二年為程毎季小試嵗終大試俄羅斯學助教掌分教俄羅斯來學子弟不常設滿漢職掌同率性修道誠心正誼四堂學正崇志廣業兩堂學録職掌與本堂漢助教同毎月下旬則課本堂貢監生丁祭執事大成殿有缺而新任者未受事則同堂助教兼理典簿為本監首領掌簿書以稽文移之出入凡本監事務當咨各衙門者曰月報以咨欽奉上諭處内閣稽察房吏部起居注曰季報以咨户部湖廣道曰年報以咨都察院凡錢糧之咨領於户部者曰本監堂屬俸銀俸米曰本監堂屬公費曰八旗算學教習銀米曰算學生月銀曰中式舉人旗匾銀曰皂𨽻口糧曰年例公用物件凡聖廟廨舍之筦鑰咸謹掌之屋宇當修則咨部繕葺器用亦如之籍記祭器樂器敬儲於庫他器物均書於冊去任以授代者凡貢監生入監詳稽其印票部照文結乃呈司業考到凡將鄉試查核内外班諸生及各處貢監之應赴試者具冊呈兼管大臣祭酒録科其直省特來鄉試者均驗明呈司業考到凡本監各官陞調及他事故皆具稿咨部丁祭則先期陳設監視宰牲分胙瘞埋諸典禮祗肅將事監造進士題名碑辦理釋褐花紅約束本監書𨽻兵役有缺而新任者未受事則六堂攝之典籍掌本監書籍板刻凡頒賜御製書欽定書欽定墨刻及經史子集各種存貯御書樓俱以類分櫝而謹藏之凡頒賜之年月日書若干部部若干卷並冊記之本監堂屬取讀皆謹書於簿讀畢取貯諸生取讀則立限呈繳失者責償本監板刻暨武英殿寄監存貯板刻均立冊詳識數目凡書籍板刻之冊皆鈐以監印新舊交代則詳驗而悉數之夏月督率匠役開曬印刷各書嚴防損壊嵗終則查報無缺存案備稽或嵗久書蠧板泐隨時修補考課掌収試卷丁祭執事大成殿有缺而新任者未受事則博士攝之筆帖式掌文移繙譯滿洲蒙古漢軍職掌同錢糧處由堂上官遴委本監官二員兼理掌支領恩賞銀兩以給嵗支凡定例得支者曰内外班諸生膏火衣服銀曰前列奬賞曰事故賙助曰學舍嵗修曰大課及六堂講課公膳曰修理考課及公用器物咸經理之按季呈堂上官核算嵗終咨部奏銷照房亦由本監堂上官遴委本監官滿漢各四員兼理浹嵗而易之掌給貢監生印票即監照凡貢監請給印票者核户部執照暨户部各省之來冊而後給之立冊記之鈐以監印凡諸生舉鄉試或斥革事故均追繳印票驗銷當月處本監滿漢各官遞司之掌𫝊抄諭㫖凡各衙門文移収而識之號簿次日呈堂上官以發所司者經理檔子房滿洲助教筆帖式理之掌繙譯繕冩清文奏摺及各衙門文移辦理京察冊籍其行咨各衙門者曰咨送倉差税差闗差曰考補滿洲助教教習曰滿洲䝉古漢軍官員揀選部院堂主事部寺司庫各衙門筆帖式外省同知通判知縣等官曰八旗官學各官告假曰蒙古教習遴選補缺期滿出缺曰選取八旗官學生曰八旗官學生考試庫使曰漢軍官學生遴選外郎曰奏考八旗恩監生均行文經理凡朝㑹大典先期𫝊知本監各官教習掌分課八旗官學本館學生統於助教凡官學滿洲蒙古教習各一人漢教習四人蒙古弓箭教習一人滿洲教習掌滿洲學生清書繙譯蒙古教習掌教蒙古學生蒙古語言文字繙譯漢教習掌教經書文藝蒙古弓箭教習掌教合學騎射凡滿洲學生宜習清文若漢文均由助教量材分撥蒙古學生習蒙古文或願習漢文者聼凡滿洲漢人教習之職學生毎日到學各令畫到授書背書講書覆講習字黙冩經書日有課程有不率者責懲之旬之三八日習滿文者課清書繙譯習漢文者課文藝一切功課並督學生隨日籍記彚交助教按季呈本監堂上官查核春秋赴監聼堂上官㑹考凡官學生肄業以十年為限期滿者報監開缺教習朔望赴監隨本監官拜聖廟蒙古教習課程與滿漢教習同蒙古弓箭教習日教一館學生騎射一學六館凡六日而遍八旗官學各滿洲館一蒙古館一漢館四浹月則率學生出城校射以為常課蒙古教習朔望不赴監拜廟謹案國子監堂屬各官典守事宜謹遵乾隆十二年欽定㑹典則例三十七年欽定㑹典欽定國子監則例分晰開載至前此屢有更定現在俱仍遵奉施行當敬録以備參考者並識於後順治元年定國子監條規祭酒司業職在總理監務嚴立規矩表率屬員模範後進監丞職在繩愆凡教官怠於師訓監生有戾規矩並課業不精悉從糾舉懲治立集愆冊登記備考博士助教學正學録職在教誨務須嚴立課程用心講解如或怠惰致監生有戾學規者堂官舉覺罰治典簿職在明立文案并支銷錢糧季報文冊典籍職在収掌御書樓一應經史書籍板刻滿洲䝉古漢軍監生責成八旗助教漢監生責成漢助教學正學録等官務在嚴加訓誨不得怠惰狥情以致廢弛康熈二十四年申嚴監規御書樓書籍板片不時查閱如有刷印方開不許印匠損壊火燭尤宜小心檔子房各項文案官吏小心収貯不許帶歸私寓凡有查閱即時呈覽康熈二十七年議准琉球國陪臣子弟入監讀書由監於附近房屋撥給十餘間為住居之所取貢生一人令其教習博士一人専管董率祭酒司業等不時稽察俾講解經書學習道藝康熈三十一年覆准國子監季考月課雖有成例恐日久廢弛嗣後考試務親身督課分别奬勵毎月朔望令滿漢肄業生齊集講書如視為具文不實心奉行從重議處雍正二年覆准令祭酒司業𫝊助教教習等毎月親臨官學不時廵察奬勤儆惰毎月𫝊至監考試一次又議准琉球國陪臣子弟入監讀書照康熈二十七年例遴選文行兼優貢生盡心訓迪委博士一人董率本監堂官不時稽察其教習生廪糧咨部考職等項照官學教習之例其子弟住房食用四時衣服亦統令稽察務令得所是年博士適缺員詔從監臣之請派學正一員董率之又議准祭酒季考司業月課出四子書題一道五經講義各一道治事䇿問各一條至六堂助教等官毎月按堂考課亦照此例乾隆元年議准御史毛之玉奏國子監祭酒司業所管貢監生為數繁多耳目難周其助教等員分司訓課派撥入堂各有専屬稽查便易應將貢監生責成助教等留心體察有不安本分實跡可據者申報祭酒司業查究若瞻狥姑容不行舉報發覺一併處分乾隆二年議准御史薛馧奏國子監責成祭酒司業董率屬員以道誼經術造士其不肖者指實叅糾若查有訓士實跡即行議叙至品端學正師道尊嚴者隨時薦舉陞用又總理監務尚書孫嘉淦奏准國子監監丞堂期到㕔辦事外朔望日稽查拜廟諸生有無齊集凡執事不謹班次參差俱應查察毎旬查堂一二次遇堂上官講課整肅堂規分别功過秉公核實不得偏狥六堂助教學正學録毎逢講課之期務湏早集辦事朔望各詣本
body:
  text: 藝文一奏議附元論建學校疏博果宻臣等聞之學記曰君子如欲化民成俗其必由學乎玉不琢不成器人不學不知道故古之王者建國君民教學為先蓋自堯舜禹湯文武之世莫不有學故其治隆於上俗美於下而為後世所法降至漢朝亦建學校詔諸生課試補官魏道武帝起自北方既定中原增置生員三千儒學以興此厯代皆有學校之證也臣等今復取平南之君建置學校者為陛下陳之晉武帝嘗平吳矣始起國子學隋文帝嘗滅陳矣俾國子寺不𨽻太常唐髙祖嘗滅梁矣詔諸州縣及鄉並令置學及至太宗數幸國學增築學舎至千二百間國學太學四門學亦増生員其書算各置博士乃至髙麗百濟新羅髙昌吐蕃諸國君長亦遣子弟入學國學之内至八千餘人髙宗因之遂令國子監領六學一曰國子學二曰太學三曰四門學四曰律學五曰書學六曰算學各置生徒有差皆承髙祖之意也然晉之平吳得户五十二萬而已隋之滅陳得郡縣五百而已唐之滅梁得户六十餘萬而已而其崇重學校已如此況我堂堂大國奄有江嶺之地計亡宋之户不下千萬陛下神功自古未有而非晉隋唐之所敢比也然學校之政尚未全舉臣竊惜之臣等嚮被聖恩俾習儒學欽惟聖意豈不以諸色人仕宦者常多䝉古人仕宦者常少而欲臣等曉識世務以任陛下之使令乎然以學制未定朋從數少譬猶責嘉禾於數苗求良驥於數馬臣等恐其不易得也為今之計如欲人材衆多通習漢法必如古昔編立學校然後可若曰未暇宜且於大都宏闡國學擇䝉古人年十五以上十嵗以下質美者百人百官子弟與凡民俊秀者百人俾廪給各有定制選徳業充備足為師表者充司業博士助教而教育之使其教必本于人倫明乎物理為之講解經𫝊授以修身齊家治國平天下之道其下復立數科如小學律書算之類每科設之教授各令以本業訓導小學科則令讀誦經書教以應對進退事長之節律科則専令通曉吏事書科則専令曉習字畫算科則専令熟嫻算數或一藝通然後改授或一日之間更次為之俾國子學官總領其事常加㸃勘務要俱通仍以義理為主有餘力者聴令學作文字日月嵗時隨其利鈍各責所就功課程其勤惰而賞罰之勤者則升之上舎惰者則降之下舎待其改過則復升之假日則聴令學射自非假日無故不令出學數年以後上舎學生業有成就者乃聴學官保舉䝉古人若何品級諸色人若何仕進其未成就者且令依舊學習俟其可以從政然後嵗聴學官舉其賢者能者使之依例入仕其終不可教者三年聴令出學凡學政因革生員增減若得不時奏聞則學無弊政而天下之材亦皆觀感而興起矣然後續立郡縣之學求以化民成俗無不可者臣等愚幼見於書聞於師者如此未敢必可行伏望聖慈下臣此章令諸老先生與左丞王贊善等商議條奏施行臣等不勝至願元史本𫝊國學議袁桷成周國學之制畧見于大司樂其遺禮可法者見于文王世子三代而上詳莫得聞焉漢武表章六經興太學至後漢為尤盛唐制微附益之而其制愈加詳宻今可考也宋朝承唐之舊而國學之制日隳至于紹興國學愈廢雖名三學而國學非真國子矣夫所謂三舎法者崇寧宣和之弊也至秦檜而復増之月書季考又甚于唐明經帖括之弊唐楊綰嘗曰進士誦當代之文而不通經史明經但記帖括或投牒自舉非側席待賢之意宋之末造類不出此今科舉既廢而國朝國學定制深有典學教胄子之古意倘得如唐制五經各立博士俾之専治一經互為問難以盡其義至于當世之要務則畧如宋胡瑗立湖學之法如禮樂刑政兵農漕運河渠等事亦朝夕誦習庻足以見經濟之實徃者朱子議貢舉法亦欲以經説㑹萃如詩則鄭氏歐陽氏王氏吕氏書則孔氏蘇氏吳氏葉氏之類先儒用心實欲見之行事自宋末年尊朱子之學唇腐舌敝止於四書之註凡刑獄簿書金穀戸口靡宻出入皆以為俗吏而爭鄙斥清談危坐卒至國亡而莫可救近者江南學校教法止於四書髫齔諸生相師成風字義精熟蔑有遺忘一有詰難則茫然不能以對又近於宋世之末尚甚者知其學之不能通也於是大言以葢之議禮止於誠敬言樂止於中和其不渉史者謂自漢而下皆霸道其能詞章也謂之玩物䘮志又以昔之大臣見於行事者皆本於節用而愛人之一語功業之盛何所不可殊不知通達之深者必悉天下之利害灌膏養根非終於六經之格言不可也又古者教法春夏學干戈秋冬學羽籥若射御書數皆得謂之學非若今所謂而止儒者博而寡要故世嘗以儒詬誚由國學而化成於天下将見儒者之用不可勝盡儒何能以病於世哉清容居士集請作養人材以宏治道疏葉李臣欽覩先帝詔書當創業時軍務繁夥尚招致士類今陛下混一區宇偃武修文可不作養人材以宏治道各道儒學提舉及郡教授實風化所係不宜罷請復立提舉司専提調學官課諸生講明治道而上其成才者於太學以備録用凡儒户傜役乞一切蠲免元史本𫝊乞増廣國學生員狀畧蘇天爵昔者世祖既定中原肇新百度知為治必資於賢者養賢必本於學宫至元七年初命中書左丞許衡為國子祭酒以教公卿大夫之子弟是時學徒未有定額其後政教既修學者寖廣迨至仁宗増多至四百員然而近嵗以來員額已滿至使胄子無從進學殊非祖宗開設學校廣育羣材之美意蘇天爵集明論太學疏李賢竊惟太學者天下貢士所萃乃育賢成材之地故天下之士所以賢所以材胥此焉出所以盛所以衰胥此焉係然則生民之休戚風俗之美惡國家之安危豈不皆闗于此哉洪惟太祖髙皇帝聖神文武平定天下定鼎金陵首崇是道方是之時宫殿城池未盡完也百府諸司未盡創也佛寺僧道未盡舉也乃建太學於國宏其規模極其壯麗凡所以教士之法戒士之條居士之所養士之具無不詳審周宻完備又慮表率之職實難其人務選天下學明行修望重海内所向慕士大夫所依歸足以師表一代名葢一時者然後命為祭酒崇以師道以振文風以増士氣其愛諸生如慈母之顧嬰兒貴之若席上之珍恩惠極隆無以加尚於是天下之士入太學者居無不正習無不端衣無不具食無不足無饑寒之亂心無邪僻之墮行其所事者治禮義明人倫窮修已治人之方務致君澤民之術故當時賢才俊傑之士濟濟輩出布列中外大綱一正萬目畢張自古太平之盛未能或之先也易曰聖養賢以及萬民其斯之謂與永樂初年駕臨北京太學之設因元之舊凡百規制未暇増新洪熙宣徳以來因仍未舉至其教戒居養之道頺然廢弛不遑介意師儒之職率皆庸常學行荒疎無從矜式雖有遺規不過承虚名為具文踵因循應故事而已於是天下之士入太學者蔑教戒之嚴無居養之正置禮義為外物輕亷恥如錙銖使其人居官不過志于富貴而已尚何望其尊主庇民建功立業乎夫近朱者赤近墨者黒居處所致無怪其然也嗚呼天下之士修之于庠序壞之于太學賈誼所謂可為太息者也今陛下春秋鼎盛纘成大統凡一舉措不可不慎舉所當舉則天下之人莫不懽心措所不當措則天下之人莫不解體可不慎哉我國家建都北京以來有廢弛而不舉有創新而不措者所廢弛者莫甚于太學所創新者莫多于佛寺舉措如是臣以為舛矣然成事不説廢者當舉若重修太學極壯麗不過一佛寺之所費況佛寺無益于朝廷而太學實闗于治體伏願皇上興廢舉墜乞勅該部計料興工一新太學作養人才重選師儒厚加眷注果能此道將見數年之後賢才濟濟文風大振生民於是乎安天下於是乎治我太祖養賢及民之效復見于今日太平之盛不期自至而國家社稷永享無窮之福矣臣性質凡陋無所知識偶有所見豈敢隠黙冐干天聴不勝惶汗之至古禳録請廣儲書籍議邱濬臣按宋朝以文為治而於書籍一事尤切用心厯世相承率皆崇尚屢下詔書捜訪遺書或給以賞或賜以官凡可以得書者無不留意然猶慮其或有非常之變每卷皆有副本分貯各所是以真宗時崇文秘閣災而猶存太清樓之儲徽宗設官提舉募工繕寫一置宣和殿一置太清樓一置秘閣其寓意深矣我朝不専設管閣官凡前代所謂省監皆歸于翰林院専設官以司經籍圖書名曰典籍國家所有古今載籍皆在所掌又於國子監設典籍一員司太學所有經籍及板本之屬臣攷唐人謂人之博學曰行秘書而宋之評詩者亦曰胸中無國子監不可讀杜詩凡書史之有訛舛者必校正之以監本則此二者乃自古貯經籍之所我朝館閣之職凡前代所謂集賢院崇文院秘書省秘閣皆不復置惟於翰林太學置此二員今翰林院祕藏皆在文淵閣其典籍固有所職掌惟兩京太學典籍㡬於虚設臣聞永樂中太宗皇帝肇建北京勅翰林院凡南京文淵閣所貯古今書籍自一部至百部以上各取一部送京餘悉封識收貯如故則是兩京皆有貯書也夫天下書盡歸内府人家所有者蓋亦無多其間多有人家所無者今幸猶存萬一有所疎失則永絶矣今國家無事正天子崇儒右文之時忍使古聖賢垂世立教之言載道為治之具𫝊之千百年者一旦有意外之變或至今而盡冺豈不貽千古之永嘆哉臣請勅内閣儒臣將兩京文淵閣書籍凡有副本于南京内閣及南北兩監各分貯一本其無副本者將本書發下兩監勅祭酒司業行取監生鈔録給與人匠紙筆責令各堂教官校對不限年月陸續付本監典籍掌管如此則一書而有數本藏貯又各異所永無疎失之虞矣文莊集維持風教疏謝鐸竊惟人倫風教所先人倫不可以不明也臣願正祀典以究明倫之實仕途風教所繫仕途不可以不清也臣願重科貢以清入仕之途冗員風教之濫冗員不可以不革也臣願革冗員以重京府之制捷徑風教之羞捷徑不可以不塞也臣願塞捷徑以澄國學之源臣愚近覩禮部尚書傅瀚等為地震事題准各該衙門條陳所見臣知天下之事所當言者不止於此蓋凡政本之蠧蝕官師之黷濫生民之困苦軍士之疲困災異之迭見邊境之失寧是皆宗社安危之所闗而朝廷宵旰所急者顧以啟沃論諫各有攸司而出位言髙尤在所諱惟是四者闗風教學校之務也臣雖不才職專學校又豈容終于隠黙而不一言之哉用是條列所見輒敢冐昧以陳惟聖明加之意焉天下幸甚斯文幸甚臣不勝戰慄待罪之至一日正祀典以究明倫之實臣愚竊惟學校之設皆所以明人倫也人倫莫先于父子子雖齊聖不先父食奈何承訛襲故以顏曽思三子配饗於上而其父則皆列祀廡下冠履倒置有是理哉為今之計莫若于闕里立廟祀叔梁紇而配以顏路曽晳孔鯉諸賢如先儒熊去非之説庻㡬各全其尊而神靈安妥矣人倫莫大于君臣殷之頑民猶不忍忘紂奈何忘君事讐若吳澄者親為有宋之遺臣􅌤然前元之官禄名節掃地何復言哉宜律以春秋大義罷黜從祀以從莽大夫之列庻㡬不掩其惡而人心愜服也此前一事人雖屢言而未見施行此後一事臣亦嘗言而未䝉俞允臣非不知重復覼縷言之誠為可恨特以每當奉祀對越之際輒起頻蹙不安之心心所不安又不得不發之言耳如䝉聖鍳乞勅禮部翰林院重加考定使祀典以正人倫以明則所以維持風教者不淺二曰重科貢以清入仕之途臣愚竊惟科貢之設皆所以羅天下之賢才而用之也科舉一途雖稱得人奈何考試等官類皆御史方面之所辟召職分既卑學亦與稱恩之所加勢亦隨之於是又以外簾之官預定去取或者多為防閑而實則闗節内外相應悉慿指麾而科舉之法日壞矣臣愚乞勅兩京大臣各舉部屬等官素有文行者取自上裁每布政司特差二員以為主考如往嵗諸臣之所建白者庻㡬前弊稍革而真才亦可以漸得矣嵗貢一途雖近有之但近來提學等官類從姑息試廩之初不以勢聴則以賄行不以濟貧則以優老及其來貢之際又聴其自乞願為教職往往名為陛考而實則虚文上下相䝉迄無可否而嵗貢之法益壞矣臣愚乞勅禮部將嵗貢願授教職者先送翰林院國子監按月考試期年之間擇其果通三塲者方許陛考授以職事庻㡬前弊稍革而教官亦不至于甚濫矣凡此二者揆之人情格例未免窒碍難行臣竊反覆思之積弊之深如此必得出自宸㫁力加斡旋然後科貢可重仕途可清而所以維持風教者不外是矣三曰革冗員以從京府之制臣愚竊惟京國四方之極天下所視以為凖則者也竊見順天應天實為京府大興宛平江寧上元四縣皆為附郭見今學校之設惟二府有之而四縣皆未嘗有蓋雖統於所屬轄實以府學之生徒悉皆四縣之俊秀與其儲養之濫不若選擇之精之為愈也不然豈以京國首善之地而惜此一學校之官哉今天下附郡縣分不拘多寡俱各有學其視京府實為冗濫臣愚請從順天應天之制凡附郭一縣例増廩膳十名隨其縣之多寡以為增益上以府縣教授兼領其事生員雖益而官不多庻㡬冗員稍革而風教之責亦稍重矣臣亦熟知今之為官者類喜添設而難于裁減殊不知増一官則増一官之費寛一分則民受一分之賜天下冗員之可減者寧止是哉四曰塞捷徑以澄國學之源臣愚竊惟國學聚天下之英才而教育之皆所以備國家他日之任使也選之科貢猶恐未精近年以來大開捷徑如納馬納粟之徒皆為其有資國用之缺殊不知得其利者未什一而受其害者已千百此豈盛世所宜有哉往年為因此輩不諳文理凡撥各衙門寫本者俱以僱人艱難為辭日前流害其極如此如䝉省納乞勅内府等衙門事例許令年月相應者送科寫本亦令掛選出身庻㡬怨嗟少息而風教之地亦稍清矣臣固知國家養士不厭其多但𦂳要所在恩倖之濫進昏曉之雜處殊亦可憂然則捷徑之當塞者又寧止是哉桃溪净稿孔廟從祀疏程敏政臣聞古聖王之治天下必以祀典為重所以崇徳報功而垂世教淑人心也故有功徳於一時者一時祀之更代則已有功德於一方者一方祀之踰境則已然猶欲勸一時範一方而不敢輕議焉況先師孔子有功徳於天下萬世天下祀之萬世祀之則其廟庭之間侑食之人豈可茍焉而已必得文與行兼名與實副有功于聖門而無疵於公議者庻足以稱崇徳報功之意若非其人豈惟先師臨之神不願歆將使典模範者莫知所教為弟子者莫知所學世教不明人心不淑通于天下而施及後世其為闗係豈特一時一方之可比哉邇者言官欲出文廟從祀諸賢之有罪者詔禮部集議臣愚亦在預議之列疑其所言尚有未盡而議者相持憚於改作臣考之於書揆之于心不敢妄為異同謹畫一條陳上凟聖覽伏乞皇上丕顯文謨主張斯道仍下集議采而行之一洗前代相沿之陋習永為百世可遵之典使世教有興起之益人心得趨向之公其於治道未為無補一唐貞觀三十一年始以左邱明等二十二人從祀孔子廟庭蓋當時聖學不明議者無識謂釋奠先師如詩有毛公禮有髙堂生書有伏生之類遂為専門訓詁之學為得聖道之𫝊而併及馬融等行之至今誠不可不考其行之得失與義之可否而釐正於大明有道之世也臣考厯代正史馬融初應鄧隲之召為祕書厯官南郡太守以貪濁免官髠徒朔方自刺不殊又不拘儒者之節前授生徒後列女樂為梁冀草奏殺忠臣李固作西第頌以美冀為正直所羞即是觀之則衆醜備於一身五經為之掃地後世乃以其空言目為經師使侑坐于孔子之庭臣不知其何說也劉向初以獻賦進喜誦神仙方術嘗上言黄金可成鑄作不騐下吏當死其兄陽城侯救之獲免所著洪範五行𫝊最為舛駁使箕子經世之微言流為隂陽術家之小技賈逵以獻頌為郎不修小節專一附㑹圖䜟以致貴顯蓋左道亂政之人也王弼與何宴倡為清談所註易專祖老莊而范寗追究晉室之亂以為王何之罪深于桀紂何休則止有春秋解詁一書黜周王魯又註風角等書班之於孝經論語蓋異端邪説之流也戴聖為九江太守治行多不法懼何武劾之而自免後為博士毁武于朝及子賓客為盜繫獄而武平心決之得免則又造謝不慙先儒謂聖禮家之宗而身為贓吏子為賊徒可為世鍳王肅在魏以女適司馬昭是時昭簒魏之勢已成肅為世臣封蘭陵侯官至中領軍乃坐觀成敗及母邱儉起兵討賊又為司馬師畫䇿以濟其惡若好佞已乃其過之小者杜預所著止有左氏經𫝊集解其大節亦無可稱如守襄陽則數饋遺洛中貴要紿人曰懼其為害耳非以求益也伐吳之際因斫癭之譏盡殺江陵之人以吏則不亷以將則不義凡此諸人其於名教得罪非小而議者謂能守其遺經轉相授受以待後學不為無功臣竊以為不然夫守其遺經若左邱明公羊髙穀梁赤之于春秋伏生孔安國之於書毛萇之于詩髙堂生之于儀禮后蒼之於禮記杜子春之于周禮可以當之蓋秦火之後惟易以卜筮僅存而餘經非此九人則㡬乎熄此其功之不可冺者以之從祀可也若融等不過訓詁此九人所傳者耳況其書行于唐唐姑以備經師之數祀之今當理學大明之後易用程朱詩用朱子書用蔡氏春秋用胡氏又何取于漢魏以來駁而不正之人使安享天下之祀哉夫所以祀之者非徒使學者誦其詩讀其書將識其人而使之尚友也臣恐學者習其訓詁之文于身心未必有補而考其奸謟淫邪貪墨怪妄之迹將自甘於效尤之地曰先賢亦若此哉其禍儒害道將有不可勝言者矣至于鄭衆盧植鄭元服䖍范寗五人雖若無過然其所行亦未能以窺聖門所著亦未能以發聖學若五人者得預從祀則漢唐以來當預者尚多臣愚乞將戴聖劉向賈逵馬融何休王肅王弼杜預八人裭爵罷祀鄭衆盧植鄭元服䖍范寗五人各祀于其鄉后蒼在漢初説禮數萬言號后氏曲臺記戴聖等皆受其業蓋今禮記之書非后氏則不傳于世矣乞加封爵與左邱明等一體從祀則偽儒免欺世之名賢者受專門之祀而情文兩得矣一孔子弟子見于家語自顔回而下七十六人家語之書出於孔氏當得其實而司馬遷史記所載多公伯寮秦冉顔何三人文翁成都廟壁所畫又多蘧瑗林放申棖三人先儒謂後人以所見増益殆未可據臣考宋邢昺論語注疏申棖孔子弟子在家語作申續史記作申黨其實一人也今廟庭從祀封文登侯在東廡申黨封臨川侯在西廡重複無稽一至于此且公伯寮愬子路以阻孔子乃聖門之蟊螣而孔子稱瑗為夫子決非及門之士林放雖嘗問禮然家語史記邢昺注疏朱子集註俱不載諸弟子之列秦冉顔何疑亦為字畫相近之訛如申棖申黨者但不可考耳臣愚以為申棖申黨位號宜存其一公伯寮秦冉顔何蘧瑗林放五人既不載於家語七十子之數宜罷其祀若瑗放二人不可無祀則乞祀瑗於衛祀放于魯或附祭于本處鄉賢祠仍其舊爵以見優崇賢者之意亦庻乎其名實相符而不舛于禮也一洪武二十九年行人司司副楊砥建議請黜揚雄追崇仲舒太祖髙皇帝嘉納其言而行之主張斯道以淑人心可謂大矣然荀況揚雄實相伯仲而況以性為惡以禮為偽以子思孟子為亂天下以子張子夏子㳺為賤儒故程子有荀卿過多揚雄過少之説今言者欲併黜況之祀宜也然臣竊以為漢儒莫若董仲舒唐儒莫若韓退之而尚有可議者王通是也通之言行先儒之論已多大約以為僣經而不得比于董韓云爾臣請㫁之以程朱之説程子曰王通隠徳君子也論其粹處殆非荀揚所及若續經之類皆非其作然則程子豈私于通哉正因其言之粹而知其非僣經之人耳朱子曰文中子論治體處髙似仲舒而本領不及爽似仲舒而純不及又曰韓子原道諸篇若非通所及者然不免文士之習利達之求若覧古今之變措諸事業恐未若通之精到懇惻而有條理也至于河汾師道之立出於魏晉佛老之餘迨今人以為盛則固豪傑之士也今董韓並列從祀而通不預疑為闕典臣又按宋儒自周子以下九人同列從祀而尚有可疑者胡瑗是也瑗之言行先儒之論甚詳大約以為少著述而不得比于濓洛云爾臣亦㫁之以程朱之説程子看詳學記曰宜建尊賢堂以延天下道徳之士如胡瑗張載卲雍使學者得以矜式朱子小學書亦備載瑗事以為百世之法臣以為自秦漢以來師道之立未有過瑗者矧程子於瑗之生也欲致之與張卲並居于聖賢之堂其沒也乃不得與張卲並侑於宣聖之廟其為闕典甚矣況宋端平二年議増十賢從祀以瑗與焉若謂瑗無著述之功則元之許衡亦無著述但以身教之懿與瑗相望誠有不可偏廢者考之禮有道有徳施教于學者死則為樂祖祭于瞽宗鄉先生歿則祭于社若通瑗兩人師道百世如新得加封爵使與衡同列祀于學宫最得禮意一自唐宋以來以顔子曽子子思孟子配享坐堂上而顔子之父無繇曽子之父㸃子思之父鯉皆坐廡下考之禮子雖齊聖不先父食而三代之學皆所以明人倫也夫孔子之所為教與諸弟子之所以為學者不過明此而已今乃使子坐於上父坐於下豈禮也哉若以為此乃論𫝊道之功則自古及今未有外人倫而言道者縱出於後世之尊崇非諸賢之本意臣恐諸賢於㝠㝠之中必有不安於心而不敢享非禮之祀者臣考之元至順三年嘗封顔無繇杞國公謚文裕孟子之父孟孫氏亦嘗封邾國公臣愚乞下有司於各處廟學如鄉賢祠之制别立一祠中祀啟聖王以杞國公顔無繇萊蕪侯曽㸃泗水侯孔鯉邾國公孟孫氏配享庶不失以禮尊奉聖賢之意臣又竊觀聖學失𫝊千五百年至程朱出而後孟氏之統始續則程朱之先亦不可缺况程子之父大中大夫封永年伯程珦首識濂溪周子於屬掾之中薦以自代而又使二子從游朱子之父韋齋先生追謚獻靖公朱松臨沒之時以朱子託其友籍溪胡氏而得程氏之學珦以不附王安石新法退居於洛松以不附秦檜和議奉祠於閩其厯官行已俱有稱述臣愚乞將永年伯程珦獻靖公朱松從祀啟聖王使學者知道學之𫝊有開必先明倫之義不為虚文矣篁墩集龜山先生從祀議程敏政謹案諸儒從祀于孔門者非有功于斯道不可然道非後學所易知也必取證于大儒之説斯可以合人心之公竊考程氏遺書及朱子伊洛淵源録所載龜山楊氏行狀墓誌碑文俱稱其造養深逺踐履純固温然無疾言遽色與明道程子相似方其學成而歸程子目送之曰吾道南矣然則是道也豈易言哉自兩程子嗣孔孟不𫝊之統及門之士得以道見許者龜山一人而已蓋龜山一傳為豫章羅氏再𫝊為延平李氏以授朱子號為正宗文定胡氏親承指授而春秋之傳作南軒張氏上泝淵源而太極之義闡心學所𫝊悉本伊洛使天下之人曉然知虚寂之非道訓詁之非學詞華之非藝龜山𫝊道之功不可誣矣崇宣之世京黼柄國躋王安石於配享位次孟子而頒其新經以取士士尊王安石為聖人不復知有孔子誦新經為聖言不復知有古訓僭聖叛經凡數十年龜山入朝首請黜其配享不令厠宣聖之廟廷廢其新經不令蠧學者之心術又請罷綱運以收人心斥和議以張國勢竄權臣以正邦憲培主徳以崇治本竑議讜言雖不盡用然使天下之人知邪説之當息詖行之當距淫詞之當放則龜山衛道之功亦不可掩或有疑其出處之際而少其著述之功則亦有可言者朱子謂龜山之出惟胡文定公之言最公曰當時若聴用決須救得一半而文定亦曰蔡氏焉能凂之然則以出處見疑者未考之故也龜山值洛學黨禁之餘指示學者以大本所在體驗之功轉相授受而朱子得聞其指訣則見于何鎬之書朱子于理一分殊之論稱其年髙徳盛而所見益精則見于西銘之跋要之無龜山則無朱子而龜山之道非知徳者殆未可輕議然則以著述見少者亦未考之過也又按元史至正二十一年因杭州路照磨胡瑜建言已將龜山與延平李氏文定胡氏九峯蔡氏西山真氏俱加封爵列從祀以世變不及遍行天下此殆近于禮所謂有其舉之莫敢廢者然則親講于龜山若文定私淑于龜山若朱張咸在侑食而近私淑于朱子若蔡真逺私淑于朱子若許吳亦在侑食獨其師有𫝊道衛道之功可以繼往開來抑邪興正者反不與焉揆之人心誠為闕典考大儒之定論㕘前代之過失實伸弟子從師之義慰後學向道之心以龜山躋于從祀直合公言謹議同上聖駕臨幸太學謝表林文俊伏以典禮更新百代仰大君之有作辟雍臨幸四方占泰運之方隆載舉曠儀聿光舊典懽均朝野慶洽天人兹蓋伏遇皇帝陛下聖由天縱徳與日新􅂜倫叙而五典以惇禮樂興而百度咸正況兹首善尤在留神黙契聖心大袪俗見謂孔子稱王本非禮宜正先師之名陋元人塑像為不經特遵皇祖之制别祠啟聖聿明父子之倫配食先賢盡去公侯之號禮無僭凟道益尊崇顧兹典之鼎新煩至尊以賁重當薄海同文之日適踐祚一紀之初乃涓令辰爰修盛事六龍捧御逺戾止于膠庠萬乗執圭親奠釋于先聖崇儒重道稽古諏經喜溢章縫光流簡冊執豆籩以奔走乃有三氏之子孫圜橋門而聴觀奚止六館之英俊瞻威顔于咫尺奉法語之丁寧建皇極以敷言斯其至矣觀人文以成化是之謂乎臣等職忝師儒躬逢盛美幸覩大人之虎變願先多士以駿奔賜坐而講易書覺叨榮之已過教人必先忠孝誓圖報於將來伏願配乎天配乎地皇朝綿一統之圖作之君作之師天子介萬年之壽途中申明學規事湛若水臣惟太學賢闗之地祭酒風教之首茍非徳行道藝卓為儒宗則無以造就人才以輔聖治顧臣何人何以堪此拜命以來夙夜兢惕懼不克稱以負大戾茫乎若渉淵水罔知津涯悵乎若適逺道罔知要路且行且思求得其道及取監誌反覆讀之乃見聖祖神宗睿諭良規浩浩乎其渾然示人約矣秩秩乎其燦然示人博矣如天之無不覆如地之無不載引而伸之觸類而長之以言乎教學之事備矣諸所見行有不容贅至于聖諭淵深不無未發之蘊良規寖久容有玩弛之虞臣伏覩求言之詔敢陳一得之愚謹條六事上聞一曰推聖學以明道術臣伏覩洪武十五年二月聖祖勅諭國學師徒有曰古今賢能首以學為本次特操持輔弼其所學斯二事既行則善名于兩間矣臣仰見聖祖之學與堯舜之精一孔子之博約𫝊説告髙宗學古知行之説異世同符蓋學也者知也操持也者行也知以覺之行以恒之聖學無餘藴矣又本年六月新建國學成勅太學生有曰致師于是來生徒以受業期在育君子必履仲尼之道以助後嗣共安天下蒼生今師徒皆至若不勅以學道之志明以亂常之憲則恐養非君子用非賢人臣又仰見大哉皇言實開一代道學之源而太宗文皇帝幸學勅諭亦稱太祖御筵講書守帝王之心法繼聖賢之道學臣竊惟聖祖之所謂道學者其志在於謙柔恭謹其道在於明倫理物其實在於孝弟忠信其用在於開物成務其藴在於聖經賢𫝊其踐履在於誠敬篤實由鄉人而可至於聖人之道平昜明白非有索隐行怪高逺難稽離於日用之常以為道也近時士異其習道徳不一而風俗不同辭華之士類訾守禮之人雖有後軰萌蘖之時生不能勝夫風雨之摧折殊不知祖宗之重道學如此盖逺宗先王非道不學非道不用之盛心也臣今論學或恐無徴不信請得以同司業率監丞博士六堂教官令諸生欽服聖訓以道學為標的以知行為工夫以文藝為華彩以事業為結果如木樹之有根本而華實乃成則所養所用皆君子賢才昌而天下安矣一曰示大公以孚生徒臣伏覩正統五年六月二十四日英宗皇帝勅諭北京國子監祭酒有曰南北諸生貧富不齊入監或一月或數月或一年二年即得撥諸司辦事亦有遂出身者利之能移人也有坐監十餘年貧不得出身使之艱難嗟怨其寧忍乎又與諸司交通凡辦事者一人有缺干求撥補簡帖動致一二十紙有勢力者終得之借曰為勢所逼何不執以奏師之所行如此何以表勵學者又曰撥厯事者必依資次不許􅍴越辦事者亦須公當不許狥私但有私相囑託輒便聽從不奏聞者必罪不恕臣謹因聖諭而推之撥厯一事為務甚小似無闗於師道而師道之行不行於此焉係夫師道之不行由於生徒心志之不孚奔競之不息夫心志不孚則言語不信言語不信則教訓不行奔競不息則禮讓不興禮譲不興則教化不浹二者師道之疚也其故由於祭酒撥厯自專而未嘗示以大公之法也故人得以私干之士得以私疑之此心志不孚奔競之所由􅁸也臣請於撥厯之時祭酒同司業召監丞博士六堂教官㑹集公所公同序撥先於諸生到監之日不徒序於壁而祭酒司業以至六堂教官又人各書簿以憑至曰序撥如有請託干求者各官即宻書於各簿本名之下監丞又明書於紀過之簿以為罰甚則欽依勅諭執奏是所謂示以大公之法也如此則心志孚奔競息而教化行矣一曰立隣朋以勵徳業臣竊惟生員坐堂講習有相親薫陶之義已有定規退或放逸常情有所不免臣更欲於各生居同號舍者簽立比隣十人為朋置為簿籍必使退堂之後出入相友徳業相師作事相法容止相觀進退相度疾病相恤有無相濟過失相規一人過惡發露九人連坐罰跪一人為善卓異九人連賞如此則進有公堂退有私居無非漸摩夾持之益若久行之士習當有變化一曰視生徒以恤病苦臣伏覩洪武十八年我聖祖頒降勅諭内一欵餓死生員其罪當坐親教之師金文徴誣言祭酒餓死監生祭酒本提大綱生員有疾親教之師必當存問飲食必書於簿疾重者以文上告藥餌尤經有司失於存問飲食藥餌不節或有傷生者罪坐親教臣仰見聖祖愛養諸生之盛典而尤欲寛貸崇重祭酒之盛心也竊惟民胞物與痛癢相闗况祭酒於諸生恩義兼重豈敢托于不知故公堂坐受請問跪拜義分之嚴也退而開諭委曲疾病存問恩禮之盡也二者並行而不悖然後師徒交孚而教訓可行臣欲欽依聖諭生員有疾令親教先徃問之甚則司業祭酒當臨視之軫其飲食節其醫藥不幸而死則臨歛之如例給具若親教不往而祭酒聞知亦當率先自徃以愧其心不嫌於違道干譽一曰慎升第以立勸懲臣伏覩洪武十六年學䂓内一欵定生員三等高下定六堂師範高下又曰凡生員通四書未通經者居正義崇志廣業堂一年之上文理條暢者許陞修道誠心堂坐堂一年半之上經史兼通文理俱優者陞率性堂又以坐堂實日多寡而陞外此又有積分之法至為精宻臣竊惟為師長者所以激勵人心鼔舞士風不可無進退抑揚以寓勸懲此聖祖所以立三等之法也近來雖有季考専以文藝而勤惰賢愚混而不分臣欲於已撥六堂者雖不能一旦更張而於諸生或季考其文藝以騐其心之精粗或於其坐堂踈數以察其學之勤惰或亷其行義觀其動止聽其講論以定其人之賢否而遞陞之其上等者堂長友長侍直有缺亦同司業博士六堂教官公推選之而其撥厯遲速一依序壁先後次第如此則聖祖之良規不廢而人心亦可勸懲士風庶乎可鼓動矣一曰署長材以備器使臣竊謂孔門之教同志於仁四科之賢因性成就故宋儒胡瑗教授亦分經義治事齋隨其材而造之也其教之必以徳行道藝為本不必悖時反古舉業徳行合為一事凡其讀書作文就宜收歛隨處體認不至䘮志以此立心涵養徳性藴之為徳行發之為事業出之於言詞皆是一貫此所謂二業合一之説也及其成也人各有長如四科之品其法每三嵗各學之長副㑹府州縣之正官即其所長而考核之為二等之法曰徳行材能某長某事如徳行則指為孝弟忠信之實材能則别其水利兵農之長署於各名之下如今内外官府考語之制以上於提學提學官又集一等之長而考核之各署其徳行材能如各學之制及有中舉嵗貢即以所署名下行能連逹於禮部禮部以下兩監其舉人監生之在兩監一年者祭酒司業據提學之所署又㑹監丞六堂之官而考核之各署其徳行材能與監學應者隨其材徳而噐用之不以枉其實雖終身遷秩而所署隨之如脚色之制署不尚實賄而容私後有敗露者坐其署主若所署有功徳顯卓者亦連賞之如是則所用必所養所養必所用用得其賢賢得其用此不違今日科舉之制而兼徳行道藝之教不違今日考察之法而寓鄉舉里選之意異時稍漸復古亦擴充此意而盡之如此則賢才自興善政自舉風俗自淳其視時之徒以舉業進身既入仕途無所用之判為二段殊昧祖宗立法之意者其為得失大有徑庭矣本集選師儒以敦教化疏謝存儒臣聞國家之休戚由風俗之盛衰闗學校之崇替故古之明君知其弊之所由振其機括以轉移之則俗尚正而治功可舉矣臣竊見數年之間上下臣僚亷恥道䘮名節不立以全身保位為賢以竭忠盡節為愚以峻刻集事為才以擎拳曲跽為恭假公平而飾詐縁義類而徇私祕貪奸以示亷籍威權而毒衆財賄交通於豪門虚偽矯罔於君上㨗給者與之為能端莊者嫉之為僻禮義銷亡風俗頽敝長此不革國何以昌凡此皆今日學校之政不修道義之實不著也夫太學者乃天下首善之地而風教之所由興近世師儒儀範不立開導無方惟知勾校簿書不復専精徳藝考課業仍其抄録計積分准其班資監生則茍度嵗時㳺玩博奕其幸而以學業自勤者則又揣摩剽竊以應時用僻裂輕艶理義支離不過假此以階顯榮其於立身行政曽未推行夫古之為學也將以正其性行明其經術而成其材能以待舉任於上也故當其時為士者以亷恥節義自著禮遜公正自植或臨危濵死甘蹈其節而不知悔者葢其學術素明而不疑亂於利害之私也今幸聖明燭知其習俗之弊特命憲臣嚴加考選以新厥服此正善惡邪正之幾安危治亂之由也臣愚以為宜因品擇之餘敷求碩儒闡明正學開以仁義禮樂之實勵以忠節亷恥之道以成周教人之法為課習登進之規必經明行修材能可任然後辨論其等差而命之秩或参以宋儒胡瑗教學蘓州則程立經義時務二齋使各以其性之相近俾人之勉修學業朝夕講明月朔則稽其勤惰召而教之嵗終則大㑹僚屬考其學行之修明者奬勸激勵之否則切責之三嵗則論其賢者能者於朝以備任使學荒以虧者則罷歸而斥之從役又以其法頒之天下使督學憲臣一以是為䂓則勿得即其浮詞而信其實行有經術疏通而蔑棄禮義者則罷斥之不齒其行檢端莊而學術踈淺者少待再校而論致太學以别議其任其分教天下須擇學術通明性行端潔者以典領之不使老鈍無恥者叅雜其間以壞士習如此則風俗自正而人勉於士君子之行平居則有羔羊正直之節立朝則有正色犯顔之風臨難則有仗節死義之士禮義修行而民俗丕變太平之風此其基也經世編乞定真儒從祀疏魏時亮欽惟國家道化旁洽迄今逾二百年士之生於其間遵道遵路淪肌浹髓固無非間出之英若求其足以克光昭代無忝人文在孔門則師心顔孟之𫝊在宋代可屈指周程之列實亦不數人耳是數人者天實生之所以助我國家之元化我明得之足以追躡前代之真儒又今没世既乆聲實既孚遭逢明聖茍不一為甄進表揚卒使聖門乏昭代之賢而國家虚崇尚之典凡侑坐俎豆者徒以前代稱盛焉則聖朝道化隠而不彰萬世人心將有不滿於今日者矣葢我皇上當重熈累洽之後值聖作物覩之初先朝所未舉者既有待於此時而新政所崇尚者又有闗於風教恭覩英廟新政命舉宋儒胡瑗蔡沈真徳秀從祀孔庭孝宗皇帝初年亦特命考正廟庭從祀逮我先皇帝廼復進歐陽修等數人無非以重道崇儒帝王首務然皆不及我朝者因先後儒臣沒俱未逺而先皇帝復有少俟將來之㫖正留待陛下以光今日之新政耳臣愚伏考理學名臣名姓甚多均可師法若求其學有真得如臣所謂師心顔孟屈指周程者惟三人為最著耳臣伏見河東薛瑄餘姚王守仁近該言官題請從祀該禮部覆議薛瑄則曰勵志聖賢之學修為多實踐之功潛心濓洛之𫝊造詣得精微之藴意雖不専於註述而片言隻簡動示楷模心雖不繫於事功而偉節恢猷皆可師法實禀乾坤之間氣足稱昭代之真儒至于王守仁則曰質本超凡理由妙悟學以致良知為本獨觀性命之原教以勤講習為功善發聖賢之㫖當時親炙者咸樂依歸迄今私淑者莫不尊信是亦百年之豪傑一代之儒宗也審如是則二臣顯昭代之人文真聖門之羽翼可以並列宋儒侑食孔廟葢無疑矣獨有生於薛瑄之後而崛起守仁之先者臣又得一人焉臣愚謹案嶺海陳獻章志聖學於壮年㑹心體於自得舞雩黙契見勿忘勿助之真萬古日星沛仁義江河之用學已造於至樂誠已足以動人故充養完粹來彭韶之薦章忠孝具陳動憲皇之親覽羅倫定交賀欽師事在姜麟則稱為活孟子在章懋則稱為第一流廼若去支離而全不測之虚靈即日用而見鳶魚之飛躍尤能逈邁與弼追躡濓溪是以風動廣南師範天下有臣如此與薛瑄王守仁後先相望焉信名世之大賢理學之深造聖明涵濡之功至此可為甚盛而上天生材之美至此可為獨優矣廼今薛瑄王守仁伏䝉聖㫖欽依下詹事府等衙門㑹議逮今數月囘奏未聞豈皇上崇儒之盛美可虚而二儒心得之真傳可冺耶夫薛瑄已經昔時公議一考可知若王守仁者破除俗學獨契本真悟孔氏之微言發後賢之未發良知與性善同功求仁與萬物為體雖其少年之豪邁有聞要亦横渠之臯比勇撤而顧可終掩之哉至於學守仁者之謬則固非守仁之過矣顧道旁之舍成之則難衆言之淆宜折諸聖伏乞催集公議取自聖裁但宜專責詹事府總集多官之論彚為一帙進覽然後議事有綱復奏有日至於陳獻章則素行毫無可訾而所學純乎自得仍乞勅令一併將獻章學行撰擬以聞昔學士何文淵編修某某等撰議大儒之學至今與大儒名論並傳彼宋末陳光之禁萬世罪之於晦菴元定何與焉故由今之世雖間有口談儒學而行不掩言者然不可舉一廢百而盡疵天下之正學也又不可由今議昔而並棄已徃之真儒也昔人謂讀書未到康成末敢高議漢儒若知道學聖儒者茍非身與頡頏實難評議鄒智有言乾坤誰執仲尼權便敢刪從己酉年葢謂獻章之詩無敢輕意刪定而况三儒之學又誰敢輕意軒輊其間乎倘䝉皇上軫念古今真儒難得此三儒者實萬世光我國家人文之㑹務速集朝議㫁自聖心早正從祀之䂓大慰明時之望則上可彰道化之隆下可開來學之盛前可紹徃古之追崇近可成聖朝之盛典而天下萬世人心鮮有不心悦而誠服者矣明奏疏類抄欽定國子監志卷五十五

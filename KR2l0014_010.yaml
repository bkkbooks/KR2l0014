front:
  text: 欽定四庫全書欽定國子監志卷十
  hash: sha256:b4270b668e9e095de2e3f1e1cd6f52fc6c22f98386fc7d731544fbf43f9da335
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_010-1a, image: WYG0600/WYG0600-0106a.png}
body:
  text: 廟制二建葺順治八年世祖章皇帝以武功耆定文教誕敷將於明年視學釋奠特諭禮部繕修聖廟順治十四年以西廡稍圯特發帑金三萬兩鳩工興作至十六年吿成康熙六年聖祖仁皇帝將舉臨雍釋奠大典諭禮部修先師廟俟工成日諏吉以聞康熙十八年修先師廟西廡及啟聖祠康熙四十二年特發内帑修先師廟命和碩理親王董其事至四十四年吿成先師神位移奉順天府學康熙五十二年祭酒臣徐日暄奏請修葺廟廡奉㫖交廣善庫動帑辦理先師神位移奉敬一亭中雍正元年世宗憲皇帝纘承丕緒將舉臨雍釋奠大典特諭禮部暨工部修葺文廟雍正八年國子監奏請修葺先師廟詔太常寺委員經理雍正十一年太常寺奏請修葺先師廟東西廡詔從之乾隆二年皇上初登大寳將以明年二月舉臨雍釋奠大典特飭太常寺預修文廟又特命大成殿大成門易黄瓦崇聖祠易綠瓦世宗憲謹案先是里皇帝命闕皇聖廟殿廡門垣易用黄琉璃瓦至是規制宜加崇上以國子監為首善觀瞻之地辟雍特命飾大成殿門易黄瓦部覆奏崇聖祠易緑瓦禮先師廟大門外屏垣均用黄瓦崇聖祠前中門均用緑瓦詔従之乾隆三十二年皇上以太學聖廟自改用黄瓦鼎新後閲年已乆宜重加修葺以昭美備特發帑金二十餘萬敬謹繕葺命大學士忠勇公傅恒等總理其事先師神位移奉彛倫堂中又命先師廟碑亭並易黄瓦大謹案墀成殿駿烈國朝建立碑亭九座凡黄瓦其康熙二十五年鴻功勒石太學者並覆聖祖御製孔子贊又二十八年先師御製四賢贊雍正六年三座均用緑瓦至是監臣陸宗世宗御製丁祭詩碑亭聖徳淵楷等言三亭舊覆緑瓦者皆深鳴謙協吉以爾時特文廟尚用綠瓦不欲特示尊崇也今自乾隆三年命列祖至聖殿庭改覆黄瓦宜並用黄瓦以符體制謨典自應益著輝煌詔從之乾隆三十三年先師廟工成皇上以門題殿榜向沿明臣張璁陋議特命詳考彛章宣示釐正改殿額為大成殿二門額為大成門增廟門額為先師廟並親書頒掲焉先謹案凡程由太常寺及國子監奏師廟工聞者或交内務府或交工部丁祭先時整飭止由國命下之日發帑興修至毎年子監於祀前一月移太常寺經理建葺附元至元四年作都城畫地宫城之東為廟學基程鉅夫雪樓集謹案時遷都北城營立廟學廷議紛雜功用弗成至元二十四年設國子監命立孔子廟吳澄文正公集謹案元史成宗紀云大徳十年正月營國子學于文宣王廟西據此則立廟應在建學之先然是時特設官以立教而未有定所故雖有立廟之命而規模亦未具也元貞元年詔立先聖廟久未集程鉅夫雪樓集大徳六年建文宣王廟於京師元史成宗紀十年廟成同上至正十六年命修葺孔子廟宇王圻續文獻通考明永樂初建廟於太學之東明史禮志謹案永樂九年廟成至十八年乃遷都宣徳四年修北京國子監大成殿前兩廡明宣宗實録正統八年修國子監先師廟明太學志謹案孫承澤學典正統元年吏部主事李賢請以佛寺之費修舉太學從之明史英宗紀孔正統九年新建太學成釋奠于八年工成于九子盖是役創議于元年下詔于年也𢎞治十四年詔文廟櫺星門外修屏墻以蔽之同上謹案時禮部侍郎謝鐸言櫺星門外有小巷横溝積穢宜髙築屏牆以為障蔽乃貿地東西廣七丈五尺深四尺築屏牆上覆青色琉璃瓦兩傍築小紅牆覆以筒瓦䕶以欄嘉靖九年改稱大成殿為先師廟大成門為廟門明史禮志先謹案時大學士張璁縁帝意言議乃改稱廟并聖祠宇宜稱廟不稱殿下諸臣易去大成之名萬厯二十八年文廟易以琉璃瓦春明夢餘録孔謹案兩京靑瓦至是従司業傅新徳請始易以子廟皆用琉璃瓦欽定國子監志卷十

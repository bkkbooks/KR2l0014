body:
  text: 樂六文謹案舞用以象文德自劉宋元嘉以來代有損廟佾益或六佾軒懸以擬上公或八佾宫懸以等王者其因革之故具詳樂制聖祖仁皇帝欽頒樂章定用六佾而舞節率沿舊制自乾隆六年皇上更定釋奠樂章凡迎神徹饌送神皆有歌無舞惟三獻有舞于是綴兆行列燦然大備兹取三獻樂章合舞之節列表如右舞節附明大成樂譜舞節表欽定國子監志卷二十五

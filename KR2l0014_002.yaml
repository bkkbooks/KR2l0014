  text: 欽定四庫全書欽定國子監志卷二聖諭二訓示世祖章皇帝諭㫖
  hash: sha256:47654470b0f39898db0a609653b73b8eee99f919fc66766c4ba0737750c08766
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_002-1a, image: WYG0600/WYG0600-0024a.png}
body:
  text: 順治九年敕諭國子監祭酒司業等官聖人之道如日中天上資之以圖治下學之以事君爾等當嚴督諸生盡心訓誨諸生當敬奉師教身體力行教有成效時惟師長之功學有實用方盡弟子之職如訓導不嚴怠肆失學爾師生俱難免咎尚其勉之又訓示生員曰朝廷建立學校選舉生員免除丁糧厚以廪糈設祭酒司業及㕔堂各官以教之各衙門官以禮相待全要養成賢才以供朝廷之用諸生皆當上報國恩下立人品所有教條開列於後一生員之家父母賢智者子當盡孝父母愚魯或有非為者子既讀書明理當再三懇告使父母不陷於危亡一生員立志當學為忠臣清官書史所載務須互相講究凡利國愛民之事更宜留心一生員居心忠厚正直讀書方有實用出仕必為良吏若一味邪刻讀書必無成就為官必取禍患行害人之事者往往自殺其身常宜思省一生員不可干求官長交結勢要希圖進身若果心善德全上天知之必加以福一生員當愛身忍性凡有司官衙門不可輕入即有切已之事止許家人代告不許干與他人詞訟他人亦不許牽連作證一為學當尊敬先生若講說皆須誠心聽受如有未明從容待問毋得蓄疑為師者亦須盡心教訓勿致怠惰一軍民一切利病不許生員上書陳言如有一言建白以違制論黜革問罪一生員不許糾黨多人立盟結社把持官府武斷鄉曲所作文字不許妄行刋刻違者聽提調官治罪諭㫖恭謹案碑於太學門左勒卧順治十六年諭入監官生滿洲官員子弟有願讀清書或讀漢書及漢官子弟有願讀清書者俱送入國子監仍設滿洲司業助教教習清書聖祖仁皇帝諭㫖康熙八年敕諭國子監祭酒司業等官朕惟聖人之道髙明廣大昭垂萬世所以興道致治敦倫善俗莫能外也朕纘承丕業文治誕敷景仰先聖至德令行辟雍釋奠之典將以鼓舞人材宣布教化爾監臣當嚴督諸生潛心肄業諸生亦宜身體力行朝夕勤勵若學業成立可禆實用則教育有功其或董率不嚴荒乃職業爾師生難辭厥咎尚其勉之毋忽康熙九年諭吏部兵部向來包衣佐領下官員子弟不准為廕生監生其筆帖式無有品級今思內外官員效力相同加恩豈宜有别包衣佐領官員子弟准為廕監及筆帖式給與品級之處爾部定議具奏謹案部臣遵議包衣下一品官子弟許其承廕二品至四品各廕一子入監讀書康熙二十一年諭大學士等國子監乃國家養育人材之所近聞司教之官不將監生嚴加約束教誨縱之游戲又其甚者閒雜之徒任行出入竟以國子監為游戲之地矣爾等傳諭祭酒司業等官嚴行禁止康熙二十三年諭吏部助教官員職掌教習廕監官生應選優於文學者補用若用文學庸劣之人何以表率生徒以後著吏部考取仍將試卷送內閣閲看具奏康熙二十七年諭禮部琉球國送到陪臣子弟三人入監讀書著安著得所康熙三十二年諭教習八旗官生幼童等幼童惟在訓迪茍加意教誨未有不成者騎射與文字原宜並重不可偏廢滿洲通文義官員即用之行間未嘗不可近見國子監教習官學生甚屬委靡大不及前即八旗教習幼童亦皆懈怠現在八旗幼童務宜選擇良師勤加訓誨爾等傳諭知之康熙五十一年諭禮部訓飭士子文若令各府州縣學宫一體勒石恐有不産石州縣地方或致借端擾派俟國子監勒石後以搨本彚頒各省轉發所屬各學康熙五十二年諭王大臣未入八分公以下鎮國將軍輔國將軍及宗室內為一二品大臣者俱准給廕生其廕生入監讀書之後即令隨旗行走世宗憲皇帝諭㫖雍正二年諭禮部等衙門邇年文教廣被由我聖祖仁皇帝壽考作人六十年來山陬海澨莫不讀書稽古直省應試童子人多額少有垂老不獲一襟者其令督撫㑹同學臣查明實在人文最盛之州縣題請小學改為中學中學改為大學大學照府學額數取録督撫等務宜秉公詳查不得狥私冒濫至鄉試解額聖祖仁皇帝屢次增廣乙酉戊子等科復於額外加中五經三名至五十六年而罷以其久而滋弊也嗣後各學臣及祭酒司業於録科時先加面試主考閲文果佳本監加中四名直𨽻各省大小不一某省應加中幾名著分别詳議定數具奏如無佳文寧缺勿濫㑹試臨時請㫖本監貢生監生本科鄉試中式著加增十八名朕臨雍講學雖率由舊章然必期於世道文教有益不蹈一切虛文諸生其各欽遵時世宗憲皇帝舉臨雍大典衍聖公次子候襲五經博士孔繼溥暨五氏後裔來京陪祀上召見諭曰爾等皆是聖賢後裔與衆不同然身為聖賢後裔之身必心為聖賢後裔之心恪守先聖先賢之訓方為不愧朕詣學大典爾等逺來特行召見願爾等慎修厥德以繼家聲勉之勉之又敕諭國子監祭酒司業等官朕惟聖人之道昭揭日月彌綸天地萬世帝王下逮公卿士庶罔不仰遵成憲率由教言我國家尊崇至聖逺邁前代朕纘承大統古訓是學惟日孜孜兹雍正二年三月朔日親詣辟雍祇謁先師孔子行釋奠禮思以鼓勵羣英丕隆文治爾監臣宜嚴督諸生善為導誘爾諸生亦當殫心肄業實踐躬行秉端方以立身敦忠孝以興誼勿營奔競勿事浮華文必貴乎明經學務期乎濟世俾品成詣進以副朕教育至意此爾多士之休亦惟爾監臣董率之功也慎勿怠荒職業以貽爾羞諸師生其共勉之故諭又諭禮部工部國子監進士題名之典始於唐時新進士榜後於慈恩寺塔下題名立碑自宋時以至我朝皆建碑於國學按諸進士甲第先後刻載姓名籍貫於上所以重科名也今太學聖廟㦸門外所立本朝歷科題名碑自順治丙戌科起至康熙戊戌科而止稽之㑹典諸進士釋菜後禮部題請工部給建碑銀一百兩交與國子監立石題名康熙三年輔政大臣裁省自後每科諸進士各自捐資立石我國家振興文教凡鄉試㑹試動用帑金數萬朕即位之始即開恩科誠以科目一途實用人取士之所係題名之典豈宜缺焉著工部動用正項錢糧令國子監將雍正癸卯甲辰兩科題名碑記速行建立康熙辛丑科亦宜補建嗣後每科仍照舊例題請庶士子觀覽此碑知讀書之可以榮名益勵其潛修上達之志爾該衙門即遵諭行雍正四年諭內閣助教一官有教訓士子之責若只考試繕寫則年少淺學但工寫字者皆可入選何能得人可傳諭各部院衙門將滿字筆帖式內為人老成有品行者保舉引見其應考翻譯者仍照例考試雍正五年諭禮部直省拔貢舊例十二年題請舉行一次後因各省學政不能秉公選取國子監未便照例請行於雍正元年特行一次朕思各州縣每年嵗貢較其食廩淺深挨次出貢內多年力衰邁之人欲得人材必須選拔著各省學臣於科考時照例府學拔取二名州縣學拔取一名寧缺勿濫務期學問優通品行端方才猷可用之人令其來京朕將親加考驗令入國子監肄業如有學問荒陋人品不端才具庸劣者將該學政嚴加議處嗣後六年選拔一次國子監届期題請候㫖雍正六年諭禮部各省考取拔貢原欲遴選儒生以宏教育向來之例俱於現考一二等生員內擇其文行兼優者以為選拔但恐作文有一日之長短而文理平通不列優等者其人或品行端方才識練達足備國家之用亦未可定若但論文去取則此等之人難以入選嗣後著各省學政不必拘一二等之生員俱准收考酌量試以時務䇿論其人果有識見才幹再訪其平日品行端方即正考未列優等亦准選拔伊到成均肄業仍可學習如此則文行兼收可以昭國家廣攬人材之典雍正七年諭內閣八旗之貢監生員已經考取小京官筆帖式者若願就鄉試俱准其與舉子等一同入場使片善寸長不致遺棄以副國家教養人材之典又諭禮部各省拔貢聞巳陸續來京伊等既不能應本省鄉試則當准其應試北闈俾得觀光盛典凡拔貢之有貢單者俱著該部咨送順天府令其應試再修書各館內從前有外省生員在館效力者若情願入場考試著取同鄉京官印結保送順天府亦准入場㫖准拔謹案是年監臣遵事等官印結仍由國子監查貢等取具同鄉主明録科移送順天府鄉試雍正八年諭吏部向來各處鹽政弊端甚多纍民蝕課難以清釐多因鹽場大使不得其人之所致是以定議於候補候選知縣等員之內揀選命往令司大使之事比時該部因人員不敷揀選遂將監生捐納職銜之人亦入於揀選之內今行之二年衆人漸起鑽營之念聞有央求同鄉京官出結而私相餽送者此風斷不可長嗣後鹽場大使之缺到部止准於候補候選人員內揀選引見不必用捐納職銜之人倘或候補候選人員不敷著將在部學習之人及留京之拔貢生令該部堂官及國子監祭酒等擇其為人謹慎有身家可以辦事者保送吏部以備揀選又諭內閣各省選拔生員到京朕俱特派大臣秉公考試分别等次進呈前據閲卷大臣奏稱湖北一卷文理荒疏請交部議後經部議革去選拔甚是及查其姓名則湖北應山縣生員楊可鏡也頃朕聞楊可鏡係明臣楊漣之元孫楊漣之子楊之易為江南松江府同知於順治四年遭松江府提督吳勝兆之叛捐軀殉難忠節凛然比䝉世祖章皇帝之恩優加贈恤此即楊可鏡之曽祖也朕思楊漣父子兩世忠義其後嗣子孫若稍能自立品行無虧雖文義不工亦當格外造就該學政將伊入於選拔之內未必不因此起見但不將緣由奏明是其辦事無識無才之處耳楊可鏡准作選拔赴國子監肄業仍著禮部帶領引見雍正九年諭內閣朕欲於在京官員人等內揀選老成明白者數十員命往陜西內地州縣辦理宣諭化導之事年餘可竣即著回京辦理若好加恩議叙著大學士㑹同該教習於庶吉士內揀選數貟各部堂官在本部學習人員內揀選一二十員國子監祭酒等在選拔貢生內揀選二三十員俱交送內閣帶領引見㫖揀謹案時監臣遵名引選拔貢生三十見協同庶吉士前往陜西宣諭化導雍正十三年諭禮部據國子監祭酒覺羅吳拜邵基奏稱直省貢監生録科時無論有無本籍地方官文書請俱令取具同鄉京官主事以上印結等語朕思各省地方大小不同在京同鄉官員有無多寡不能一轍若録科時槩令取具同鄉京官印結其中逺省貢監生無熟識之同鄉京官何從覔取印結勢必啓抑勒鑽營之弊所奏尚未允協此事原係給事中王瓚條奏在伊諒有所見著吳拜邵基㑹同詳細妥議具奏謹案覺羅吳拜等遵議嗣後鄉試不在監肄業之貢監生無論逺近省均取本地方官印結到監方准收考在京新捐貢監暫聽取同鄉京官印結收考皇上諭㫖乾隆元年諭禮部凡由捐納候選之貢監舉人例不得與鄉㑹試從前事例內有捐應鄉㑹試一欵今捐例已概行停止此等貢監舉人有志科名者勢皆不得援例與試矣朕思此等人員尚在需次選曹與既登仕籍者有間不得因捐資候選屏諸場屋之外直𨽻各省貢監生捐官願與鄉試舉人捐官願與㑹試者准令一體考試以示鼓舞人材之意乾隆三年皇上舉臨雍大典衍聖公孔廣棨暨十三氏後裔來京陪祀上命尚書任蘭枝孫嘉淦帶領引見諭曰爾等皆聖賢後裔因朕臨雍來京特行召見爾等既為聖賢之後即當心聖賢之心凡學聖賢者非徒讀其書而已必當躬行實踐事事求其無愧方為不負所學况身為聖賢子孫尤與凡人不同若不能實加體驗徒騖讀書之名實與祖德家風不能無忝爾等務須勤思勉勵克紹先傳以副朕諄切期望之意又敕諭國子監祭酒司業等官仰惟我朝列祖以聖人之道治天下用開太平洪業聖祖世宗重道隆師超越百代作人造士化洽寰區朕嗣守丕基勤求至道思所以廣勵學宮祇紹前烈越乾隆三年三月二日親詣辟雍釋奠於先師孔子升堂進講嘉與諸生闡明聖教之本原帝治之盛軌夫端教術育賢才厥惟師儒之功正身心修德業以為國家之用諸生其可弗勉哉詩曰古之人無斁譽髦斯士放勳曰使自得之又從而振德之我祖宗教澤涵濡薰陶長養百年於兹正學昭明揭若日月爾監臣欽承至訓振作而鼓舞之罔有怠斁諸生率乃攸行敦本務實希賢希聖夙夜罔愆俾國家文治光裕於億萬年懋哉懋哉特諭時十三氏後裔凡三十一人陪祀又諭禮部觀禮三十一人俱准入監讀書國子監本科鄉試照雍正二年例廣額十八名又諭內閣從前奉世宗憲皇帝諭㫖將聖祖仁皇帝御刻經史諸書頒發各省布政司敬謹刋刻准人印刷并聽坊間刷賣原欲士子人人誦習以廣教澤也近聞書板收貯藩庫士子及坊間刷印者甚少著各撫藩留心辦理將書板重加修整俾士民等易於刷印有願翻印者聽其自便無庸禁止如御纂諸書內有為士人所宜誦習而未經頒發者著該督撫奏請頒發刋板流布至於武英殿翰林院國子監皆有存貯書板亦應聽人刷印並從前內府所藏各書如滿漢官員有願購覓誦覽者概准刷印其如何辦理之處著禮部㑹同各該處定議請㫖曉諭遵行乾隆五年訓飭太學士子及司訓等官成均課士之道惟貴躬行實踐不在多立科條如視為具文雖再增條欵又復何補是惟在國子諸生自知黽勉則古稱先務為明體達用之儒勿役役於祿位功名之念而司訓課之責者又復善為誘掖切加勸懲則辟雍鐘鼓教化聿興而圭璋特達之士亦從此輩出矣又諭內閣士為四民之首而太學者教化所先四方於是觀型焉比者聚生徒而教育之董以師儒舉古人之成法規條亦既詳備矣獨是科名聲利之習深入人心積重難返士子所為汲汲皇皇者惟是之求而未嘗有志於聖賢之道不知國家以經義取士使多士由聖賢之言體聖賢之心欲使之為聖賢之徒而豈沾沾焉文藝之末哉朱子同安縣諭學者云學以為已今之世父所以詔其子兄所以勉其弟師所以教其弟子弟子之所以學舍科舉之業則無為也使古人之學止於如此則凡可以得志於科舉斯巳爾所以孜孜焉愛日不倦以至乎死而後己者果何為而然哉今之士唯不知此以為茍足以應有司之求矣則無事乎汲汲為也是以至於惰遊而不知返終身不能有志於學而君子以為非士之罪也使教素明於上而學素講於下則士者固將有以用其力而豈有不勉之患哉諸君茍能致思於科舉之外而知古人之所以為學則將有欲罷不能者矣觀朱子此言洵古今通患夫為已二字乃入聖之門知為已則所讀之書一一有益於身心而日用事物之間存養省察暗然自修世俗之紛華靡麗無足動念何患詞章聲譽之能奪志哉况即為科舉亦無礙於聖賢之學朱子云非是科舉纍人人纍科舉若髙見逺識之士讀聖賢之書據我所見為文以應之得失置之度外雖日日應舉亦不纍也居今之世雖孔子復生也不免應舉然豈能纍孔子耶朱子此言即是科舉中為己之學誠能為己則四書五經皆聖賢之精藴體而行之為聖賢而有餘不能為巳則雖舉經義治事而督課之亦糟粕陳言無禆實用浮僞與時文等耳故學者莫先於辨志志於為己者聖賢之徒也志於科名者世俗之陋也國家養育人材將用以致君澤民治國平天下而囿於積習不能奮然求至於聖賢豈不謬哉朕膺君師之任有厚望於諸生適讀朱子書見其言切中士習流弊故親切為諸生言之俾司教者知所以教而為學者知所以學乾隆十一年禮部疏請拔貢生驗到即㑹同國子監考試文理通者准為貢生留監肄業經侍郎管監事德沛奏肄業貢監向有額缺若准貢之人一概留監不免人浮於額請一體考到考驗録取肄業諭禮部所奏拔貢廷試一事朕已降㫖依議嗣後禮部國子監務須秉公考試其留監肄業者與每年相較不得加於從前之數任意濫收著禮部國子監存記又諭內閣國子監祭酒為成均司鐸之長有造就人才之責著吏部將應行開列及其次應升人員一併帶領引見謹案嗣是漢祭酒員缺部臣以開列應升之員引見請用定為例㫖簡乾隆十九年諭內閣國學以課訓士子為職現任國子監祭酒武極理係翻譯進士出身不宜司教之任著以對品京堂缺補用謹案嗣是滿祭酒員缺翻譯進士出身之員遂停開列之例乾隆二十三年諭禮部國家設立學校原欲教育人材乃自設立義學以來不過僅有設學之名而無教育人材之實且既設有咸安宫國子監官學復加恩於左右兩翼各設教訓世職官學則八旗有志讀書者儘可於此等官學內肄業似此有名無實之義學適足為貽誤旗人之地所有義學著即行裁去乾隆二十六年諭禮部各處教習三年期滿引見並無一二等之分惟國子監有之此例徒足開士子捷徑於實政殊無禆益將謂一等者為優則該列在二等者初不謂之劣而一則歸本班銓選一則留學以知縣即用且留學三年既以知縣即用而又預為聲明遇揀發時一體挑選是名為學校收課士之效而實為上下其手啓速化之門耳於教學用人俱無實濟嗣後此例著停止毋復滋僥幸其如何詳定章程之處該部議定具奏㫖議謹案時部臣遵滿出具考語帶領引覆嗣後教習期見恭候知縣教職用毋庸分别等第亦毋庸留學三欽定以年乾隆四十八年諭內閣稽古國學之制天子曰辟雍所以行禮樂宣德化昭文明而流教澤典至巨也此次釋奠禮成念國學為人文薈萃之地規制宜隆而辟雍之立自元明以來典尚闕如自應增建以臻美備著派禮部尚書德保工部尚書兼國子監劉墉侍郎德成敬謹前往閲視度地鳩工諏吉興建落成之日朕將舉行臨雍典禮以昭久道化成之盛乾隆四十九年諭內閣稽古明倫設教典重學官國學為首善之區橋門觀聽規制尤宜隆備前命尚書劉墉德保金簡侍郎德成鳩工庀材興建辟雍現在已届落成朕於明年仲春釋奠禮成即臨雍講學所有應行典禮著各該衙門詳議具奏欽定國子監志卷二

body:
  text: 樂二樂章親祀文廟導迎樂章回鑾奏佑平之章先聖垂軌千載是祗䖍奉師表景行行之奠兩楹神降之啟後人文在兹謹案凡祭祀未莅事尚係齋戒鼓吹陳而不作回鑾乃奏之昭其敬也餘慶典導迎樂則出入皆用之臨雍導迎樂章奏禧平之章崇聖尊道乾徳下交思樂多士化流芹藻鼓篋徵經術昭聽講環宏育陶朝制謹案前代導迎樂章郊社壇廟率多通用我作精詳一切樂章不相假借皇上復加更正為佑平禧平别製樂章謹録以冠卷文廟導迎定首釋奠樂章順治十三年欽頒釋奠樂章迎神奏咸平之曲大哉至聖峻徳宏功敷文衍化百王是崇典則有常昭兹辟雍有䖍簠簋有嚴鼓鐘奠帛初獻奏寧平之曲覺我生民陶鑄賢聖巍巍泰山實予景行禮備樂和豆籩惟静既述六經爰斟三正亞獻奏安平之曲至哉聖師天授明徳木鐸萬世式是羣辟清酒惟醑言觀秉翟太和常流英材斯植終獻奏景平之曲猗與素王示予物軌瞻之在前神其寧止酌彼金罍惟清且㫖登獻雖終弗遐有喜徹饌奏咸平之曲璧水淵淵崇牙嶪嶪既歆宣聖亦儀十哲金聲玉振告兹將徹鬷假有成羮牆靡愒送神奏咸平之曲煌煌學宫四方來宗甄陶胄子暨予㣲躬思皇多士膚奏厥功佐予永清三五是隆乾隆六年更定釋奠樂章迎神奏昭平之章大哉至聖徳盛道隆生民未有百王是崇典則昭垂式兹辟雍載䖍簠簋載嚴鼓鐘奠帛初獻奏宣平之章覺我生民陶鑄賢聖巍巍泰山實予景行禮備樂和豆籩嘉静既述六經爰斟三正亞獻奏秩平之章至哉聖師克明明徳木鐸萬年惟民之則清酒既醑言觀秉翟太和常流英才斯植終獻奏秩平之章猗歟素王示予物軌瞻之在前師表萬祀酌彼金罍我酒惟㫖登獻雖終弗遐有喜徹饌奏懿平之章璧水淵淵芹芳藻潔既歆宣聖亦儀十哲聲金振玉告兹將徹鬷假有成日月昭揭送神奏徳平之章煌煌辟雍四方來宗甄陶樂育多士景從如土斯埴如金在鎔佐予敷治俗美時雍謹案釋奠樂章昉於六朝至唐畧備宋元以來增損文字更定章句雖日益加詳而制作世祖章皇未臻極則我年帝順治十三欽頒國子監成歌章始用黄鍾為宫文廟大皇上乾隆六年春以夾鍾為宫秋以南吕為宫被音詔定釋奠樂章協律益臻美善直省釋奠則又頒撰樂章斟酌損益隆儀明備誠千古所罕覩者矣乾隆五十年詔建辟雍工成欽定臨雍樂章陞座奏盛平之章辟雍建規矩圓方復古自吾皇先聖宫牆千仞講學升堂於論鐘鼓鏗鏘春水圜橋流浩蕩作君師時萬億隆禮樂煥文章御殿羣臣行禮奏慶平之章禮成典樂辟水監姬章中天日月瞻顒卭宸儀有肅拜舞行夀考延昌聖化汪洋進茶奏仰君師之章仰君師兼道統集講席啟圜橋聴御論闡彞訓敷言盛五倫叙君仁臣敬家慈孝與國人交正誠不息維天之命體行健同徳大圓亹緝熙合符前聖一解向階前初聴講罷穆穆瞻天垣正二相趨黄髪服膺誠摳衣拜朝班黌席聖賢裔弟子青衿影一人學外王内聖五十載久道而成萬千嵗生民之盛二解况鴻儀彰盛典備四門學岐周竝王制云天子曰辟雍笑炎漢三雍非正訓辭著復古真王政泥古誣游談胥屏燕千叟新嵗禮行兄五更舊文論定三解告禮成晉玉茗霑渥賜敷茵共慶一規璧水長隨教澤生趨辭還宫奏道平之章聖人出天下文明玉振叶金聲日月江河昭法象自古經行講筵雝肅和平熙事純常茂典成覺辟黎敷五教彞倫叙萬拜寧臨雍謹案舊定導迎樂章儀注祇有皇上陞座至還宫俱未設樂詔建辟雍特定臨雍樂章以夾鐘為宫進茶清樂則與耕藉喜春光調同鉅典宣昭禮樂允臻美備樂章附元宣聖樂章十六首迎神奏凝安之曲黄鐘宫三成大哉宣聖道尊徳崇維持王化斯文是宗典祀有常精純並隆神其來格於昭盛容大吕角二成生而知之有教無私成均之祀威儀孔時惟兹初丁潔我盛粢永言其道萬世之師太蔟徴二成巍巍堂堂其道如天清明之象應物而然時維上丁備物薦誠維新禮典樂諧中聲應鐘羽二成聖王生知闡乃儒規詩書文教萬世昭垂良日惟丁靈承丕爽掲此精䖍神其來享初獻盥洗奏同安之曲姑洗宫右文興化憲古師今明祀有典吉日惟丁豐犧在俎雅奏在庭周陟降福祉是膺初獻升殿奏同安之曲降同南吕宫誕興斯文經天緯地功加于民實千萬世笙鏞和鳴粢盛豐備肅肅降登歆兹秩祀奠幣奏明安之曲南吕宫自生民來誰底其盛惟王神明度越前聖姿幣具成禮容斯稱黍稷非馨惟神之聴捧俎奏豐安之曲姑洗宫道同乎天人倫之至有享無窮其興萬世既潔斯牲粢明醑㫖不懈以忱神之來塈大成至聖文宣王位酌獻奏成安之曲南吕宫大哉聖王實天生徳作樂以崇時祀無斁清酤惟馨嘉牲孔碩薦羞神明庶㡬昭格兖國復聖公位酌獻奏成安之曲南吕宫庶㡬屢空淵源深矣亞聖宣猷百世宜祀吉蠲斯辰昭陳尊簋㫖酒欣欣神其來止郕國宗聖公酌獻奏成安之曲南吕宫心𫝊忠恕一以貫之爰述大學萬世訓􅂜惠我光明尊聞行知繼聖迪後是享是宜沂國述聖公酌獻奏成安之曲南吕宫公𫝊自曾盂𫝊自公有嫡緒承允得其宗提綱開蘊乃作中庸侑于元聖億載是崇鄒國亞聖公酌獻奏成安之曲南吕宫道之由興於皇宣聖惟公之𫝊人知趨正與饗在堂情文斯稱萬年承休假哉天命亞獻奏文安之曲終獻同姑洗宫百王宗師生民物軌瞻之洋洋神其寧止酌彼金罍惟清且㫖登獻惟三於嘻成禮飲福受胙與盥洗同惟國學釋奠親自用之攝事則不用外路州縣並用之徹豆奏娯安之曲南吕宫犧象在前豆籩在列以享以薦既芬既潔禮成樂備人和神悦祭則受福率遵無越送神奏凝安之曲黄鐘宫有嚴學宫四方來宗恪恭祭祀威儀雍雍歆兹惟馨馭回復明禋斯畢咸膺百福望瘞與盥洗同志元史禮樂謹案元志右釋奠樂章皆舊曲葢嘗擬譔易而未及用也今并附載於左迎神奏文明之曲天縱之聖集厥大成立言垂教萬世準程廟庭孔碩尊俎既盈神之格思景福來并盥洗奏昭明之曲神既寧止有孚顒若罍洗在庭載盥載濯匪惟潔修亦新厥徳對越在兹敬恭惟則升殿奏景明之曲降同大哉聖功薄海内外禮降秩宗光昭垂代陟降在庭攝齊委佩莫不肅雍洋洋如在奠幣奏徳明之曲圭衮尊崇佩紳列侑籩豆有楚樂具和奏式陳量幣駿奔左右天眷斯文繄神之祐文宣王酌獻奏誠明之曲惟聖監格享於克誠有樂在懸有碩斯牲奉醴以告嘉薦惟馨綏以多福永底隆平兖國公酌獻奏誠明之曲潛心好學不遑如愚用舎行藏乃與聖俱千載景行企厥步趨廟食作配祀典弗渝郕國公酌獻奏誠明之曲缺沂國公酌獻奏誠明之曲缺鄒國公酌獻奏誠明之曲洙泗之𫝊學窮性命力拒楊墨以承三聖遭時之季孰識其正髙風仰止莫不肅敬亞獻奏靈明之曲終獻同廟成奕奕祀事孔時三爵具舉是饗是宜於昭聖訓示我民彞紀徳報功配于兩儀送神奏慶明之曲禮成樂備靈馭其旋濟濟多士不懈益䖍文教兹首儒風是宣佑我缺明洪武六年定祀先師孔子樂章六首迎神奏咸和之曲大哉宣聖道徳尊崇維持王化斯民是宗典祀有常精純益隆神其來格於昭聖容奠幣奏寧和之曲自生民來誰底其盛惟王神明度越前聖粢帛具成禮容斯稱黍稷非馨惟神之聴惟曰王字後改惟師初獻奏安和之曲大哉聖師實天生徳作樂以崇時祀無斁清酤惟馨嘉牲孔碩薦羞神明庶㡬昭格亞終獻奏景和之曲百王宗師生民物軌瞻之洋洋神其寧止酌彼金罍惟清且㫖登獻惟三於嘻成禮徹饌奏咸和之曲犧象在前豆籩在列以享以薦既芬既潔禮成樂備人和神悦祭則受福率遵無越送神奏咸和之曲有嚴學宫四方來宗恪恭祀事威儀雍雍歆恪惟馨神馭旋復明禋斯畢咸膺百福明史樂志欽定國子監志卷二十一

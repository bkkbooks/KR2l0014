body:
  text: 禮七祭器皇帝親詣行禮祭器鎏金銀爵一鎏金銅爵一銀勺一鎏金銅爐一鎏金銅香靠一錫香盒一文廟常用祭器乾隆十三年欽定正位銅爵三登一鉶二簠二簋二籩十豆十俎一尊一配位四案銅爵各三鉶各二簠各二簋各二籩各八豆各八篚各一俎各一尊共二十二哲位六案銅爵各一鉶各一簠各一簋各一籩各四豆各四篚共二俎共二尊共二兩廡六十二案銅爵各一簠各一簋各一籩各四豆各四獻爵共六篚共二俎共二尊共六崇聖祠正位五案銅爵各二鉶各三簠各二簋各二籩各八豆各八篚各一俎各一尊各一配位四案銅爵各三簠各一簋各一籩各四豆各四篚各一俎共二尊共二兩廡三案銅爵五簠各一簋各一籩各四豆各四篚共二俎共二尊共二文廟謹案前此多仍往制器數皇上按器譜圖悉為釐正又以籩豆簠簋昭事神明前代充以盌盤磁爵未符典制重加審定於文廟是物燦然大備矣法乾隆十四年頒新造祭器於國子監銅登一銅尊二十銅爵一百九十八銅鉶三十六銅豆四百十四銅簠一百有三銅簋一百有三皇上以謹案乾隆三十三年重修親聖廟落成将詣行禮以特孔子志在從周范銅器鼎尊卣罍壺簠簋觚爵洗頒内府所藏周命陳設各一大成殿中用備禮器以非祀事所用恭詳載金石門兹不編入爵二一以銀為之鎏以金重三兩通髙三寸四分深一寸三分腹長三寸寛一寸一分兩柱髙六分三足相距各六分髙一寸六分素質無文一以銅為之鎏以金大小形制同廟中謹案以下各器恭貯遇皇帝親祀始行陳設敬繪于篇以昭殊禮勺銀為之重十兩口徑三寸深一寸一分柄長八寸素質無文柄端外曲為如意形孔子謹案唐制加勺宋制尊罍亦有之金制廟有顔子尊皆皇帝親勺二元制廟有龍勺二十七今惟祀始用之鑪笵銅為之鎏以金其形圓通髙一尺五分腹圓上束髙六寸五分三足相距各五寸五分髙三寸兩耳髙六寸上出口二寸六分口徑七寸深六寸素質無文不銜平套口徑六寸内半虛上插香靠以承柱香凡五峯中峯髙一尺四寸五分中綴圈下置盤鏤以雲紋左右次峯各髙一尺三寸三峯半以上横貫一道鏤以雲紋長九寸曲兩端向上為邊峯各髙一寸五分半以下横貫一道鏤以雲紋長五寸峯首各鏤雲紋香盒錫為之髤以丹不飾雲紋其形圓用盛瓣香通髙一寸六分底髙一寸四分盖髙五分深一寸三分登笵銅為之通髙六寸深二寸口徑四寸九分校圍六寸九分足徑四寸七分口為回紋中為雷紋柱為饕餮足為垂雲紋盖髙一寸六分徑四寸六分頂髙三分上為星紋中垂雲紋口亦回紋孔子謹案唐釋奠國學廟凡六登銅質明易以瓷顔子登各三元制正位登一配哲以下無登十三年又案以下各器均于乾隆欽定十四年春秋釋奠永為法守謹遵頒發國子監皇朝禮器圖式及篇大凊會典繪録于鉶笵銅為之髙四寸一分深四寸口徑五寸一分底徑三寸三分三足髙一寸三分兩耳為犧形口繪藻紋次回紋腹貝紋盖髙二寸二分頂有三峯髙一寸飾以雲紋足紋同孔子謹案唐制三宋初無鉶紹興中釋奠加鉶鼎顔子鉶各二元制鉶三明制正位鉶二四配鉶各二十哲鉶各一餘無鉶簠笵銅為之通髙四寸六分深二寸一分口縱六寸四分横八寸底縱五寸一分横六寸四分面為䕫龍紋束為回紋足為雲紋兩耳附以䕫龍盖髙一寸四分口縱横與器同上有稜四周縱四寸一分横六寸四分亦附以䕫龍耳孔子謹案唐制二從祀簠各一宋制如之金制正顔子簠各位簠二顔孟各如之元制廟共用簠一百一十有五明制用簠正位二四配位各二十哲壇各二兩廡壇各二簋笵銅為之髙四寸二分深二寸一分口徑七寸二分底徑六寸口為回紋腹雲紋束黻紋足星雲紋兩耳附以䕫鳳盖髙一寸八分徑與口同面雲紋口回紋上有稜四出髙一寸一分孔子謹案唐制二從祀簋各一宋制如之金制顔子簋各孔子簋二顔孟各如之元制廟共用簋一百十有五明制用簋七正位二四配位各二十哲壇各一兩廡壇各一籩編竹為之以絹飾裏頂及縁皆髤以漆紅色通髙五寸四分深八分口徑四寸六分足徑四寸盖髙一寸九分徑與口同頂正圓髙四分孔子謹案唐制十諸從祀各用一宋制籩正位配顔子籩各孔子位如唐制從祀各二金制一元制正位籩十籩十顔孟各如之從祀各配位用二從祀各如之計籩百十有五明制正位初用籩六後增為十配位各如之從祀各四豆笵銅為之通髙五寸五分深二寸口徑四寸九分校圍二寸足徑四寸七分腹為垂雲紋回紋校為波紋金鈑紋足為黻紋盖髙二寸二分徑與口同為波紋回紋頂為陶紐髙三分孔子謹案唐制十諸從祀各一宋制正位豆十配顔子豆各孔子位各如之從祀各二金制元制正位豆十配豆十顔孟如之從祀各一位二從祀如之共銅豆一百十有五明制正位初用六後増為十配位各如之從祀各四尊笵銅為之通髙八寸六分口徑五寸一分腹圍二尺四寸底徑四寸六分足髙二分兩耳為犧首形謹案尊制有七曰泰尊曰犧尊曰象尊曰山尊曰雷尊曰著尊曰壺尊今獻酌先師惟用著尊莫無泰尊宋設泰尊三于神位前又案唐釋孔子元設泰尊二于殿下唐制二著尊二壺尊六顔子山罍各二宋設山尊孔子于殿下元如之唐制宋設象尊四犧尊四于顔子象尊犧尊各二殿上象尊二犧尊二于殿下兩廡各設象尊二金制孔子象尊犧尊各一顔孟各如之兩廡如宋制元設象尊三犧尊三于殿上象尊一犧尊一于殿下兩廡各設象尊一明釋奠用象尊一犧尊一正位俎木為之髤以丹中區為三錫裏外銅環四足八有跗縱六尺有竒横三尺二寸通髙二尺六寸有竒配位俎中區為二錫裏加盖外左右各銅環二六足有跗縱三尺九寸横二尺八寸通髙二尺七寸有竒餘如正位制哲位從位崇聖祠各俎並如配位制孔子謹案唐制三從祀俎各一宋設俎二于籩前顔子俎各孔子設俎六于籩右配位如之從位俎各一金制俎二顔孟各如之俎席用莞元制正位配位俎各三從祀俎各一凡百三十有三俎明制正位俎三配位俎各二從位俎各一爵笵銅為之通髙四寸六分深二寸三分兩柱髙七分三足相距各一寸五分髙二寸腹為雷紋饕餮形孔子謹案唐制一宋制正位配位爵共四諸從祀顔子爵各各一金制廟中共用爵九十四元制廟共銅爵一百十有八明制正位爵三四配各如之諸從祀各一十哲壇三兩廡壇三篚編竹為之四周髤以漆丹飾髙五寸縱五寸横二尺二寸五分足髙一寸盖髙一寸七分謹案唐制篚在洗西南實以巾爵又設幣篚二各於尊坫之所宋制陳幣篚于神位左巾爵之篚如唐制金制廟用篚二元制幣篚三明制正位篚一配位篚各一哲位篚共二兩廡各一祝版木為之髙九寸廣一尺二寸外黝中質髤以朱漆祝文墨書白紙黄緣别有小几通髙七寸五分廣四寸五分長九寸五分附祝文式維乾隆年嵗次二八月朔越日丁皇帝遣致祭于至聖先師孔子曰惟師徳配天地道冠古今刪述六經垂憲萬世兹當仲春秋祗奉舊章謹以牲帛酒果致祭配以復聖顔子宗聖曾子述聖子思子亞聖孟子尚饗維乾隆年嵗次二八月朔越日皇帝遣致祭于肇聖王裕聖王詒聖王昌聖王啟聖王曰惟王誕生至聖為萬世王者之師功徳顯著兹因仲春秋謹以庶品之儀致祭配以先賢顔氏先賢曽氏先賢孔氏先賢孟孫氏尚饗謹案唐制版長一尺一分廣八寸厚二分其木梓楸設于坫燔於齋坊宋制長一尺二寸廣八寸梓楸或柏為之設于坫寘于瘞元制長一尺二寸廣八寸明制祝有案畫羃以絳繒為之方幅縱横二尺二寸中畫雲龍四周畫文彩四角綴金錢各一疏布羃以白疏布為之縱横一尺九寸兩廡各尊羃染以青謹案元制有籩巾二百四十有一簠簋巾二百四十有八俎巾百三十有三今惟尊用之餘皆不用廟中又案凡經祭器欽定者業遵式恭載於前此下盤羃坫案之屬凡祭皇朝禮器圖祀所需率循舊典未經更制者亦各繪圖著説於後至於執壺果匣等瑣屑之具向無定制隨宜製備不綴於篇坫斵木為之其形方置三爵者其形長中鑿孔亦如爵之數髤以漆飾紋惟宜先聖謹案唐制一坫尊及祝版各皆置坫宋制如先師爵置之金制惟尊有坫凡六元制廟用坫凡二十有八又宣和爵坫一今惟爵設之餘俱不用盥盤笵銅為之體圓素質無文大小隨宜下置頮架木為之大小視盤四足有跗髙下惟宜髤以漆謹案盥盤即古之洗也唐設于阼階東南亞獻之洗又于東南宋制設二洗于東階盥洗在東爵洗在西金制廟用洗二元制亦二殿上盥洗位在阼階之東兩廡盥洗位在階下明制正位設洗一于露臺下兩廡洗各一香盒錫為之其形圓亦多木質香几木為之所以承鑪方廣視鑪四足有跗髤以漆鐙笵銅為之或以錫或以鐵或以木重臺三足髙下視燭大小凡五等紋飾惟宜或用素質案以木為之髤以朱翹頭案正位髙三尺三寸廣三尺一寸長五尺九寸五分餘案尺寸隨宜視正位各有差平頭案正位及配位髙三尺二寸廣二尺九寸長四尺五寸哲位髙如之廣三尺長三尺九寸兩廡髙廣如哲位長六尺二寸崇聖祠各案如之均以木為之髤以朱祝版案髙二尺六寸廣二尺二寸長三尺三寸饌桌之制如之酒尊案髙二尺七寸廣二尺二寸長六尺二寸面鑿孔以置尊孔如尊數饌盤木為之其形方口侈口徑大小隨宜髤以丹盤磁為之其形圓口徑一尺六分紋飾惟宜路鐙木為之髤以朱架髙四尺五寸燈髙一尺五寸方一尺五寸正殿之鐙䝉以繒餘用紙上有方盤中置以簽架樹于地足為十字形下置以版香爐笵銅為之圓形中束通髙三尺耳髙一尺二寸口髙二寸腹髙一尺二寸足髙一尺三寸口圍五尺六寸腹圍七尺足圍九寸素質無文謹案以下各器均于乾隆三十四年二月添設大成殿正中承以石几在香案之前周范十器之後燭臺笵銅為之共一對髙三尺二寸小盤髙二寸四分大盤髙四寸七分中柱髙八寸五分足髙一尺六寸小盤周圍二尺一寸大盤周圍五尺九寸五分足圍五尺八寸五分素質無文花瓶笵銅為之共一對圓形頸束旁附兩耳各綴環一通髙三尺二寸口髙九寸腹髙一尺七寸足髙六寸口圍三尺三寸腹圍四尺九寸足圍三尺八寸五分素質無文附載現存祭器正殿鎏金銀爵一鎏金銅爵一銀勺一重十兩鎏金銅鑪一鎏金銅香靠一錫香盒一黄段拜褥一以上皇帝親詣行禮用常制所設者銅登一銅鉶二十有六銅簠簋各二十有二竹籩九十銅豆如之銅爵五十有一銅尊六有羃連三俎一連二俎六竹篚七銅大鑪一中圓鑪二小圓鑪十有六大銅登四小銅登三十有二銅香靠七古銅香鼎一古銅花瓶二錫盆大小各一錫照鐙十焚帛鑪一毛血磁盤三十有五錫執壺二木爵坫七祝版架一案一黄段案衣一香盒七饌盤七果匣七大翹頭案六小翹頭案二平頭案十有六酒尊案二紅段案衣二十有六新舊各一分饌桌七桌衣如之帳幔十有八新舊各一分棕毯九福胙匣一羊角鐙一路鐙十有四東廡銅簠簋各三十有二竹籩一百二十有八銅豆如之銅爵六十有八銅尊三有羃連二俎三竹篚二銅圓鑪二鐙四銅香靠二香盒二饌盤三十有二錫執壺二果匣八翹頭案二案衣二新舊各一分平頭案三十有二酒尊案一饌桌一帳幔六十有二新舊各一分棕毯二路鐙十有四西廡銅簠簋各三十有一竹籩一百二十有四銅豆如之銅爵六十有七平頭案三十有一帳幔六十有一新舊各一分餘如東廡崇聖祠銅鉶十銅簠簋各十有七竹籩六十有八銅豆如之銅爵三十有八銅尊八盖羃如之連二俎九竹篚十有一爵坫十有一錫盆一
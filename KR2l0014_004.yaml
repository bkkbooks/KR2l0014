front:
  text: 欽定四庫全書欽定國子監志卷四御製一文二世宗憲皇帝御製追封
  hash: sha256:03ca0cf5e4ce091517211d066ffb156d1b1fade76f4d927a4543062c135ccf95
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_004-1a, image: WYG0600/WYG0600-0044a.png}
body:
  text: 孔子五世祖木金父公册文右文稽古思統緒之相承重道尊師溯淵源於自逺舉千秋之曠典蘋藻維馨超五等之崇封絲綸式煥緬維先師孔子之五世祖木金父公系本殷朝居從魯國治維尚質傳朴素之舊風貴而彌恭守謙和之家法積功纍行聿𢎞育聖之基貽慶鍾祥遂極生民之盛朕初登大寶欽想前規欲申景仰之誠用議顯揚之制特追封為肇聖王錫之册命於戲克昌厥後永立人倫之宗有開必先並膺素王之號服兹嘉命垂示無窮御製追封孔子髙祖祈父公册文道髙聖域宜推師表之源恩浹儒宗用廣尊崇之典擬王封而晉秩禮軼古今定鴻號而加稱榮增洙泗緬維先師孔子之髙祖祈父公系出商宗望隆宋國姓分公族為孔氏之再傳瑞啓聖人逮宣尼而間出溯淵源於纍葉知德盛而世昌鍾靈秀於一人實教尊而功溥朕羮牆至聖寤寐前徽思敬禮之加隆必恩綸之及逺特追封為裕聖王錫之册命於戲衮衣端冕視躬桓蒲穀而彌尊春禴秋嘗與鳬繹龜蒙而並久膺兹寵命永荷鴻庥御製追封孔子曾祖防叔公册文聖人覺世道有開而必先王者尊師禮必隆於所自備顯揚之典用煥千秋申嚮往之誠特超五瑞緬維先師孔子之曾祖防叔公殷朝賢裔魯國儒宗潛德彌彰守髙曾之矩矱詒謀自逺藴詩禮之淵源聿開天縱之能四科立教爰啓時中之聖一貫傳心朕寶位初膺前徽是式溯儀刑而景仰加名號以褒崇特追封為詒聖王錫之册命於戲爼豆常新峻秩共尼山並峙絲綸誕賁恩光與泗水長流永荷寵嘉昭垂無斁御製追封孔子祖伯夏公册文化民善俗道首賴乎師資纍行積功誼應推夫祖德閲再傳而誕聖垂裕貽謀超五等而加封創興盛典緬維先師孔子之祖伯夏公東山育秀泗水鍾靈生秉禮守義之邦漸摩既久奉崇聖尊賢之訓牖迪尤深集慶在躬早兆四科之教克昌厥後遂開萬世之蒙朕寶厯初膺景行彌切推降祥之有自念顯號之宜加特追封為昌聖王錫之册命於戲溯尼山之世澤茂績丕昭崇闕里之家聲斯文益振服兹嘉命永示光榮御製追封孔子父叔梁公册文達天盡性溯道統之攸傳崇德報功體孝思之不匱惟誕生夫睿質遂永樹乎師模用賁徽章特升峻秩緬惟先師孔子之父叔梁公望重魯邦業傳鄹邑秉姿勇毅垂史傳之盛名積慶悠長衍家庭之令緒感殊祥於闕里兆啓素王徴靈應於尼山運鍾至聖粵從前代顯贈上公兹當纘緒之初更議推恩之典特追封為啓聖王錫之册命於戲澤惟裕後聿𢎞作述之規善則歸親宜極尊崇之禮儀型如在嘉命是承御製追封孔子五代告祭聖廟文道尊往聖宜錫類以推恩牒溯前徽乃緣情而制禮絲綸聿賁爼豆維新仰維先師孔子撰合乾坤名髙日月纂修刪定煥六籍之文明祖述憲章樹百王之儀範朕夙承庭訓嚮往實深誕紹丕基欽崇彌切惟德全而業盛知積厚而流光爰命廷臣式稽譜系詒謀式穀洵篤慶於一門育秀鍾靈宜上追於五代並躋祀典特晉王封體皇考敬師之心𢎞先聖顯親之孝於戲金聲玉振集今古之大成木本水源享蒸嘗之美報靈其不昧尚克來歆御製平定青海告成太學碑文我國家受天眷命撫臨八極日月所照罔不臣順遐邇乂安兆人蒙福乃有羅卜藏丹津者其先世固始汗自國初稽首歸命當時使臣建議畀以駐牧之地其居雜番羌密近甘涼我皇考聖祖仁皇帝睿慮深逺每厪於懷既親御六師平定朔漠威靈所加青海部落札什巴圖兒等震讋承命聖祖仁皇帝因沛殊恩封為親王兄弟八人咸賜爵祿羈縻包容示以寬大而狼心梟性不可以德義化三十年來包藏異志朕紹登寶位優之賜賚榮其封號尚冀革心輯寧部衆而羅卜藏丹津昏謬狂悖同黨吹拉克諾木齊阿爾布坦溫布藏巴札布等實為元惡謂國家方𢎞浩蕩之恩不設嚴密之備誕敢首造逆謀迫脅畨羌侵犯邊城反狀彰露用不可釋於天誅遂命川陜總督太保公年羮堯為撫逺大將軍聲罪致討以雍正元年十月師始出塞自冬涉春屢破其衆凡同叛之部落戈鋋所指應時榷敗招降數十萬衆又降其貝勒貝子台吉等二十餘人朕猶閔其蠢愚若悔禍思愆束手來歸尚可全宥而怙惡不悛負險抗違乃決翦滅之計以方略密付大將軍羮堯調度軍謀簡稽將士用四川提督嶽鍾琪為奮威將軍於仲春初旬禡牙徂征分道深入搗其窟穴電掃風驅搜剔巖阻賊徒蒼黃糜潰窮蹙失據羅卜藏丹津之母及謀逆渠魁悉就俘執擒獲賊衆纍萬牲畜軍械不可數計賊首逃遁我師踰險窮追獲其輜重人口殆盡羅卜藏丹津孑身易服竄匿荒山殘喘待斃自二月八日至二十有二日僅旬有五日軍士無久役之勞內地無轉輸之費克奏膚功永清西徼三月之朔奏凱旋旅鐃鼓喧轟士衆欣喜四月十有二日以倡逆之吹拉克諾木齊等三人獻俘廟社受俘之日臣民稱慶伏念聖祖仁皇帝威靈震於遐方福慶流於奕葉用克張皇六師殄滅狂賊行間將士亦由感激湛恩厚澤為朕踴躍用命斯役也芟夷凶悖綏靖番羌俾烽燧永息中外人民胥享安阜實成先志以懋有丕績廷臣上言稽古典禮出征而受成於學所以定兵謀也獻馘而釋奠於學所以告凱捷也宜刋諸珉石揭於太學用昭示於無極遂為之銘曰天有雷霆聖作弧矢輔仁而行威逺寧邇維此青海種類實繁錫之茅土列在藩垣被我寵光位崇祿富負其阻遐禍心潛搆恭惟聖祖慮逺智周眷念荒服綏撫懷柔朔野既清西陲攸震爵號洊加示之恩信如何凶狡造謀逆天鼓動昏憝冦侵於邊惟彼有罪自干天罰桓桓虎貔爰張九伐王師即路冬雪初零日耀組練雷響鼙鉦蠢兹不順敢逆戎旅奮張螳臂以當齊斧止如山嶽疾如雨風我戰則克賊壘其空彼昏終迷曾不悔戾當翦而滅斯焉決計厲兵簡將往搗其巢踰厯嶔嶇坦若坰郊賊棄其家我縶而獲牛馬谷量器仗山積蹇兔失窟何所逋逃枯魚遊釜假息煎熬師以順動神明所福旬日凱歸不疾而速殪彼逆謀懸首藁街獻俘成禮金鼓調諧西域所瞻此惟雄特天討既申羣酋惕息槖戈偃革告成辟雍聲教遐暨萬國來同惟我聖祖親平大漠巍功煥文邁桓軼酌流光悠久視此銘辭繼志述事念兹在兹御製文廟增定從祀告祭文道崇前聖尊萬世之師資緒啓後賢備千秋之祀典虔將蘋藻聿告几筵惟先師孔子德配乾坤心傳堯舜文垂六籍揭大義以昭明教設四科育英才而蔚盛雖微言漸逺難窺達天盡性之功而正脈相承不乏入室升堂之彥朕紹登寶位親詣辟雍爰因釋奠之時更切崇儒之念特頒諭旨博訪廷臣考自有周逮於昭代凡在傳經之哲咸躋從祀之班兹卜良辰以林放等二十六人新造牌位安奉兩廡以張載之父張迪新造牌位安奉崇聖祠於戲闡揚經術長歆爼豆之馨廣厲學宫益篤羮牆之慕仰惟聖鑒格享苾芬御製聖廟落成告祭文金聲玉振集神聖之大成霞蔚雲蒸表天人之上瑞肅將蘋藻奉告几筵仰惟先師孔子德邁皇王學該河洛綜五百年之傳緒聿峻宫牆立億萬代之師模永光爼豆自廟堂之重建準宫殿之鴻規盡誠敬以經營務尊崇其制度乃者將升畫棟選卜良辰忽睹卿雲光輝晴晝芝英爛漫映泗水以霏煙車蓋輪囷倚尼岡而結影當前期之二日有開必先瞻垂象者三時惟形則著絢於東國顯徴丹艧之祥耀彼南方𢎞闡文明之運上帝之凝休滋至先師之降鑒孔昭實感慶於衷懷用吉蠲而躬詣於戲羮牆如見彌殷重道之忱霄漢為章佑啓作人之化神其如在歆享苾芬御製太學文廟祭文金聲玉振開宇宙之文明日角珠庭垂聖神之儀範肅敷筵几聿薦藻蘋仰惟先師孔子學綜圖疇統承堯舜道超萬類喻海河泰嶽之崇深德服羣賢比江漢秋陽之皎潔溫良恭讓之度邦國共欽齋莊中正之容簡編備載新營廟貌虔製爼樽竭誠敬之心思極尊嚴之規制乃者嵗逢庚戌序屬仲秋上溯周朝近當今日推之長厯即尼山降誕之時卜以良辰是闕里增輝之會用稽徽典適協貞符於戲棟宇恢閎已慶雲霞之糾縵堂楹端儼重瞻日月之光華神鑒孔昭苾芬歆享欽定國子監志卷四

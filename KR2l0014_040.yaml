front:
  text: 欽定四庫全書欽定國子監志卷四十一
  hash: sha256:d55f3429675ee02603383580ecf317ef0e447a4d03cb7f75d5253455b48cfd2b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_040-1a, image: WYG0600/WYG0600-0453c.png}
body:
  text: 生徒七外藩入學外藩就學國子監者有琉球學有俄羅斯學俱不常設或該國王奏請奉㫖俞允乃令其所遣陪臣子弟入學讀書由監臣遴貢生為教習又派博士助教等官董之學成遣歸康熙二十三年冊封使臣汪楫林麟焻自琉球還疏言中山王臣尚貞親詣館舍懇為轉奏願令陪臣子弟四人赴京受業得㫖允行至二十七年琉球國王遣其子弟梁成楫鄭秉均阮維新蔡文溥四人隨貢使耳目官魏應伯至京詔許其入監讀書並命所司安置得所尋選取肄業貢生一人令其教習博士一員専司董率祭酒司業時為稽察俾之講習有成焉三十年琉球國王臣尚貞疏奏前陪臣子弟入學已久乞許歸養得㫖遣歸五十九年冊封使臣海寶等疏稱中山王臣尚敬願遣陪臣子弟入監讀書得㫖允行至雍正二年琉球國王遣其子弟鄭秉哲鄭謙蔡宏訓至監秉哲等自陳願學為四書五經義因遴拔貢生李著為教習以訓之時適博士缺員派學正顧䝉董率國子監堂上官以時稽察如舊制是年蔡宏訓病故特賜白金三百兩以二百兩交貢使附歸其家以一百兩交禮部官於近京地方營葬六年琉球官生鄭秉哲等以父毋衰老倚閭望切請得歸國終養經部議准前此琉球官生入監者由其國王疏請遣歸始令其馳驛還國今鄭秉哲等雖未經其國王疏請但懇乞歸養乃人子之孝思且情詞真摯可憫應請令其歸國續奉㫖照都通事例賞以大綵縀各一匹裏綢各一匹毛青布各四匹傔從二人亦賞毛藍布各四匹禮部筵宴一次給驛令同貢使毛汝龍等返國又是年俄羅斯遣其陪臣子弟魯喀佛多德宜畹喀喇西木米海拉等詣京懇請肄業詔即舊㑹同館設學命王大臣簡選助教引見以滿洲助教胡什圖漢助教陳憲祖専掌教事學成遣歸乾隆六年定俄羅斯遣陪臣子弟入學習讀清漢書國子監於滿漢助教內簡選二人専掌教事十五年定俄羅斯學滿漢助教遇有升遷事故應更換者由監臣揀選八旗六堂助教文理明白者派令管理咨明吏部理藩院存案二十二年冊封使臣全魁周煌自琉球還疏言臣等奉使將旋中山王臣尚穆詣館設宴送臣令陪臣通事向臣等致詞懇請許其遣陪臣子弟入學部議應如所請令於應貢之年來學至二十五年禮部劄送琉球國陪臣子弟鄭孝德梁允治蔡世昌金型入監本監選取拔貢生潘相為教習以訓迪之並派博士張鳯書助教林人櫆董率堂上官稽察如定制二十五年梁允治金型相繼病故詔從雍正二年例賙恤二十六年恭遇皇太后七旬萬夀聖節琉球官生鄭孝德等隨國子監肄業諸生恭進詩冊又呈請隨班迎駕時監臣為之代奏得㫖允行十一月二十五日皇上親奉安輿由圓明園還宫國子監官率諸生恭迎於西直門內時孝德等派助教二員率之跪於道左上霽顔顧問駕還宫特賜孝德等縀匹二十八年鄭孝德蔡世昌在學三年頗知文藝所作性理論並駢體文俱有可觀書法亦端楷時琉球國王臣尚穆遣耳目官馬國器正議大夫梁煌等賫表請㫖遣歸部議如所請詔賞賜筵宴如定制外藩入學附嘉靖五年琉球中山王遣官生蔡廷美等四人入學十一年歸國續文獻通考謹按元之啓疆最為遼濶逺譯之臣服者紛綸於史冊而遣子入學獨未之有故綴輯止自明始苐明自洪武初即有髙麗琉球中山王山南遣子入學其後來者絡繹又明史選舉志載日本暹羅皆有官生入學嗣後沿為故事以皆在南監肄業與今國子監無涉故不詳録嘉靖十七年琉球中山王遣梁等四人入國學至二十三年歸國同上嘉靖二十九年琉球來貢携陪臣子五人入國學明史外國𫝊謹按明永樂時滇蜀蠻官皆遣其子弟入監然徼內土官本屬聲教所暨則其向化來學分所應然而當時輒詫為盛事何所見之小也又其時太學前有交趾號舍蓋成祖設以處交趾官生者考永樂時南交曽為郡縣非外藩入學者比故並從刋削焉欽定國子監志卷四十一

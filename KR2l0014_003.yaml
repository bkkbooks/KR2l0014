  text: 欽定四庫全書欽定國子監志卷三御製
  hash: sha256:e77baaee04c383fdfc51a5037ddc0dbf508630608b23cc95c7c18c127bf94705
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_003-1a, image: WYG0600/WYG0600-0036a.png}
body:
  text: 臣等謹案詩書所載典學之丈如虞廷教胄周雅辟雍雖足昭示來兹然類由史官鋪叙臣下揄揚非有製出宸章體隆聖作者也洪惟我朝列聖相承作君作師文章性道合為一原謨訓所垂規天矩地於鑠哉真藝林之極軌矣恭錄列聖御集暨我皇上御製詩文有關國子監者敬謹編次為文三卷詩一卷御製一文一太宗文皇帝御製釋奠先師孔子文惟至聖徳配天地道貫古今刪述六經垂憲萬世昭宣文治厯代尊崇謹以楮帛牲醴庶品之儀式陳明薦冀歆享焉朝謹案我之前未入關太宗文皇帝首崇儒術親釋奠御製先師孔子此文今聖廟春秋二祭祝文尚遵用首四語爰恭錄卷首以見後聖先源之合云心聖祖仁皇帝御製學校論治天下者莫亟於正人心厚風俗其道在尚教化以先之學校者教化所從出將以納民於軌物者也是以古者家有塾黨有庠術有序國有學人生八嵗自王以下至於庶人之子弟皆入小學及其十有五年則自元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學蓋自家至於國莫不有學自天子至於庶人莫不學自幼至於長莫不皆學凡學有詩書禮樂以為之本干戈羽籥以為之文父子君臣長幼之道於是焉觀之六徳六行之教於是焉取之所以淑其耳目手足之舉措而養其心以復其性以為修己治人之大者可謂備至矣是以當時之君子履信思順以事其上小人亦皆樂循理而恥犯法侯撻不事而至治以興後世學校寖廣博士之途寖繁所以立教之方失先王之遺意士之遊其中者直以為利祿之階欲期道徳之一詎不難哉且夫今之所謂教者誦讀焉而已爾而又弗實致其力以防其放僻邪侈之心使氣之充而識之明以漸求復其性其何以為修己治人之道哉故曰教隆於上化成於下教不明於上而欲化成於下猶却行而求前也教化者為治之本學校者教化之原欲敦隆教化而興起學校者其道安在在務其本而不求其末尚其實而不務其華以内行為先不汲汲於聲譽以經術為要不屑屑於文辭如是則於聖人化民成俗之道庶乎其有當也夫御製小學課士説古者有大學小學尚書大𫝊謂十五入小學十八入大學班氏謂八嵗入小學十五入大學朱子作大學序取班氏之説書大傳之作先儒以為出於漢儒之附㑹理或然也今以童稚之年遽責以大學之事其於古人為學之方立教之序亦大不侔矣夫古者教學教耕之異其人左右春秋之異其地灑埽應對進退之詳其節禮樂射御書數之詳其文雖其制猶可考或有行於古難行於今者亦貴得其意而巳故小學之法求其參酌至當者莫如朱子所輯一書蓋取古者聖賢教人為學之言而參之以曲禮少儀内則之文與前言往行合以成編其内篇則所以培其根也其外篇則所以達其支也而其大義之所存則主於教敬蓋敬者為學之要領所以該本末貫精粗徹上徹下之道也朕自冲齡即已披覽服習嘗以為學者茍能身體而力行之則誠下學上達之功實與大學相為表裏不僅為初學佔畢課讀之書而巳近代以來有司不以之校士士子不以之誦習簡帙雖存束之髙閣朕每念於懐於是特頒諭㫖著為令甲俾天下士子於經書制舉業之外兼習是書有司臨試兼以命題課藝庶㡬天下學者誦其言習其行敦其事於日用居處極其理於修已治人近之盡乎人倫精之通乎性命静以淑其身動以措之世人才盛而風俗淳端在是矣御製至聖先師孔子贊并序蓋自三才建而天地不居其功一中傳而聖人代宣其藴有行道之聖得位以綏猷有明道之聖立言以垂憲此正學所以常明人心所以不冺也粤稽往緒仰溯前徽堯舜禹湯文武達而在上兼君師之寄行道之聖人也孔子不得位窮而在下秉刪述之權明道之聖人也行道者勲業炳於一時明道者教思周於百世堯舜文武之後不有孔子則學術紛淆仁義湮塞斯道之失傳也久矣後之人而欲探二帝三王之心法以為治國平天下之準其奚所取衷焉然則孔子之為萬古一人也審矣朕廵省東國謁祀闕里景仰滋深敬摛筆而為之贊曰清濁有氣剛柔有質聖人參之人極以立行著習察舎道莫由惟皇建極惟后綏猷作君作師垂統萬古曰惟堯舜禹湯文武五百餘嵗至聖挺生聲金振玉集厥大成序書刪詩定禮正樂既窮象繫亦嚴筆削上紹往緒下示來型道不終晦秩然大經百家紛紜殊途異趣日月無踰羮牆可晤孔子之道惟中與庸此心此理千聖所同孔子之徳仁義中正秉彛之好根本天性庶㡬夙夜朂哉令圖溯源洙泗景躅唐虞載厯庭除式觀禮器濡毫仰贊心焉遐企百世而上以聖為歸百世而下以聖為師非師夫子惟師於道統天御世惟道為寳泰山巖巖東海泱泱牆髙萬仞夫子之堂孰窺其藩孰窺其徑道不逺人克念作聖御製四子贊復聖顔子聖道早聞天資獨粹約禮博文不遷不貳一善服膺萬徳来萃能化而齊其樂一致禮樂四代治法兼備用行舎藏王佐之器宗聖曾子洙泗之傳魯以得之一貫曰唯聖學在兹明徳新民止善為期格致誠正均平以推至徳要道百行所基纂承統緒修明訓辭述聖子思子於穆天命道之大原静養動察庸徳庸言以育萬物以贊乾坤九經三重大法是存篤恭慎獨成徳之門卷之藏宻擴之無垠亞聖孟子哲人既萎楊墨昌熾子輿闢之曰仁曰義性善獨闡知言養氣道稱堯舜學屏功利煌煌七篇並垂六藝孔學攸𫝊禹功作配御製平定朔漠告成太學碑文維天盡所覆海内外日月所出入之區悉以卑予一人自踐阼迄今早夜殫思休養生息冀臻熈皥以克副維皇大徳好生之意庶㡬疆域無事得以偃兵息民乃厄魯特噶爾丹阻險北陲困此一方人既荼毒塞外輙狡焉肆其兇逆犯我邊鄙虐我臣服人用弗寜夫蕩冦所以息民攘外所以安内邊㓂不除則吾民不安此神人所共憤天討所必加豈憚一人之勞弗貽天下之逸於是斷自朕心躬臨朔漠欲使悔而革心故每許以不殺彼怙終不悛我師三出絶塞朕皆親御以行深入不毛屢渉寒暑勞苦艱難與偏禆士卒共之迨彼狂授首脅從歸誠荒外君長來享闕下西北萬里灌燧銷烽中外乂謐惟朕不得巳用兵以安民既告厥成事乃蠲釋眚災潔事禋望為億兆祈昇平之福而廷臣請紀功太學垂示来兹朕勞心於邦本嘗欲以文徳化成天下顧兹武畧廷臣僉謂所以建威消萌宜昭斯績於有永也朕不獲辭考之禮王制有曰天子將出征受成於學出征執有罪反釋奠於學以訊馘告而泮宫之詩亦曰矯矯虎臣在泮獻馘又禮王師大獻則奏愷樂大司樂掌其事則是古者文事武事為一折衝之用具在樽俎之間故受成獻馘一歸於學此文武之盛制也朕嚮意於三代故斯舉也出則告於神祗歸而遣祀闕里兹允廷臣之請猶禮先師以告克之遺意而於六經之㫖為相符合也爰取思樂泮水之義為詩以銘之以見取亂侮亡之師在朕有不得已而用之之實或者不戾於古帝王伐罪安民之意云爾銘曰巍巍先聖萬世之師敬信愛人治平所基煌煌聖言文武道一禮樂征伐自天子出朕臨域中逾兹三紀嘗見羮牆寤寐永矢下念民瘼上承帝謂四海無外盡𨽻候尉維彼兇醜瀆亂典常既梗聲教遂窺我疆譬之於農患在螟螣秉卑不施將害稼穡度彼游魂險逺是怙震以徳威可往而取朕志先定龜筮其依屬車萬乗建以龍旂祝融驂鸞風伯戒途宜暘而暘利我樵蘇大野水涸川瀆効靈泉忽自湧其甘如􅌬設為犄角一出其西一出其東中自將之絶域無人獸羣自掩五日窮追彼狂走險大殱於路波血其孥剪其黨孽俘彼卒徒衆烏晝號單馬宵遁恐久駐師重為民困慎固戍守還轅於京自夏徂冬雨雪其零載馳載驅我行至再蠢兹窮㓂昏惑不悔我邊我氓以休以助爰寜其居爰復其賦藩落老稚斯恬斯嬉嵗晏来歸春與之期春風飄翩揚我斾旓我今于邁如渉我郊言秣我馬狼居胥山登髙以眺閔彼彈丸天降兇罰孤雛就羈三駕三㨗封狼輿尸既腊梟獍既獮豺貙大漠西北解甲棄殳振旅凱入澤霈郊卜明禋肆赦用迓景福昔我往矣在泮飲酒陳師鞠旅誓屈羣醜今我来思在泮獻功有赫頌聲文軌來同采芹采藻頌興東魯車攻馬同亦鐫石鼓師在安民出非得己古人有作昭示斯㫖𬗟惟虞廷誕敷文徳聖如先師戰慎必克惟兵宜戢惟徳乃綏億萬斯年視此銘詞御製平定噶爾丹告祭先師孔子文朕服膺聖訓殫究遺文凡兹六籍所垂惟以安民為要臨御以来孜孜圖治綏乂蒸生逺邇中外視同一體乃有厄魯特噶爾丹荒陬狡㓂肆虐跳梁擾毒邊方稔惡巳極朕親統六師三臨絶塞宏彰撻伐克奏膚功逆孽就俘兇渠殄滅遐荒番部㒺不歸誠自兹永靖邊塵咸安生業惟是至聖先師黙相啟佑特遣專官敬申禋祀祗告成功伏惟昭鑒尚饗御製訓飭士子文國家建立學校原以興行教化作育人材典至渥也朕臨御以來隆重師儒加意庠序近復慎簡學使釐剔弊端務期風教修明賢才蔚起庶㡬棫樸作人之意乃比來士習未端儒教罕著雖因内外臣工奉行未能盡善亦由爾諸生積錮已久猝難改易之故也兹特親製訓言再加警飭爾諸生其敬聽之從來學者先立品行次及文學學術事功源委有叙爾諸生幼聞庭訓長列宫牆朝夕誦讀寧無講究必也躬修實踐砥礪亷隅敦孝順以事親秉忠貞以立志窮經考義勿雜荒誕之談取友親師悉化驕盈之氣文章歸於醇雅毋事浮華軌度式於規繩最防蕩軼子衿佻達自昔所譏茍行止有虧雖讀書何益若夫宅心弗淑行己多愆或蜚語流言脅制官長或隱糧包訟出入公門或唆撥奸猾欺孤凌弱或招呼朋類結社要盟乃如之人名教不容鄉黨不齒縱倖逃褫扑濫竊章縫返之於中能勿愧乎况乎鄉㑹科名乃掄才大典關係尤鉅士子果有真才實學何患困不逢年顧乃標榜虚名暗通聲氣夤縁詭遇㒺顧身家又或改竄鄉貫希圖進取囂凌騰沸網利營私種種情弊深可痛恨且夫士子出身之始尤貴以正若兹厥初拜獻便巳作奸犯科則異時敗檢踰閑何所不至又安望其秉公持正為國家宣猷樹績膺後先疏附之選哉朕用嘉惠爾等故不禁反復惓惓兹訓言頒到爾等務共體朕心恪遵明訓一切痛加改省争自濯磨積行勤學以圖上進國家三年登造束帛弓旌不特爾身有榮即爾祖父亦増光寵矣逢時得志寜俟他求若仍視為具文玩愒弗儆毁方躍冶暴棄自甘則是爾等㝠頑無知終不能率教也既負栽培復干咎戾王章具在朕亦不能為爾等寛矣自兹以往内而國學外而直省鄉校凡學臣師長皆有司鐸之責者並宜𫝊集諸生多方董勸以副朕懐否則職業弗修咎亦難逭勿謂朕言之不豫也爾多士尚敬聽之哉御製石鼓贊并序朕釋奠先師於國學觀石鼓於廟門之兩廡緬懐周宣迄今二千餘年而中興之烈岐陽之蒐俯仰如昨魯壁汲冡缺有間矣此文此石獨煥然與日月争光是三代法物之僅存者也今列在太學實斯文之盛嘗尋繹搨本推詳其遺義有㑹於心焉乃為贊曰猗與周宣纘緒文武一時從臣方叔召虎蒐於岐陽陳列斨弩鐫功告成伐石作鼓以歌以銘載規載矩豈備考擊致煩矇瞽鼓鼙思將義蓋有取厯二千年鑠日蝕土蝌蚪失傳剥落誰補車攻馬同麀鹿麌麌晨星缺月完句可數天門詄蕩岐山翔舞軒頡是班鍾王敢伍陳在泮宫設於廊廡是切是磋匪擊匪拊橋門觀禮如對簋簠庶㡬文治再見三古御製祭酒箴予敷文徳式禮辟雍允惟祭酒多士攸宗在昔有虞命䕫教胄洎乎成周升彼孝秀撫今區夏遵路陳常海域遣子願齒膠庠爾長乃司表率匪易木繩斯直玉琢斯器烝烝譽髦爾儀是型濟濟橋門爾訓是聆惟亷持躬惟慎率屬佻逹其懲戒董其朂皇矣謨典如鏗金鏞闡揚㒺盡則傚奚從毋矜而華導之誠正毋詭而趨範之孔孟王化丕盛視乎成均茍隳厥職曷明人倫儒行克臧汝績乃效黽勉詔􅍇助宣聲教欽定國子監志卷三

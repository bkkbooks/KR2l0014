front:
  text: 欽定四庫全書欽定國子監志卷二十八
  hash: sha256:590da7468697849ff1427be429e7e259545a4484bb5336723e4db47d118187a0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_028-1a, image: WYG0600/WYG0600-0279a.png}
body:
  text: 官師臣等謹案典樂教胄肇始虞廷自成周設師氏保氏大司樂樂師之屬制度加詳秦惟置博士一職至漢武帝置五經博士設弟子員而博士司教乃著於功令東漢又置博士祭酒選聰明威重者為之祭酒之名昉焉晉武帝立國子學改稱國子祭酒又設助教分肄生徒隋改學為監増置司業監丞而唐制因之後唐明宗天成三年更命宰臣判國子監事任彌重矣嗣是學正學録設於宋典簿典籍設於元洎乎前明多仍元舊聖朝君師首出建極宅中即肇新國子監董正治官襄以羣宷又置八旗官學分肄俊秀世宗憲皇帝又特命親王大臣兼管監事我皇上文思纘緒申諭學官首以躬行表率為訓凡釐績育才之規纎目宏綱至周且備煌煌乎唐虞振徳之命敬敷之典也海隅日出行省郡縣之秀悉升國學教而裁之繄師長是頼其敢不夙夜廪廩乎百餘年來官斯署者或姓氏僅泐豐碑或勲名爛於國史法鑒具在焉謹志設官一卷典守一卷儀制一卷銓除一卷題名一卷各以元明舊制附載其末為官師門官師一設官兼管國子監事大臣雍正三年設初順治元年設國子監祭酒以下各官監中事宜俱禮部總之十五年命監事専屬之國子監康熈二年復𨽻禮部十年仍専屬國子監至雍正三年世宗憲皇帝特命康親王果郡王領監事由是兼管大臣或用滿洲或用漢人並奉特㫖簡用見謹案乾隆三十年䝉古教習期滿引上詢以䝉古語奏對失次十七年復詔特派悟勒穆濟董之三命法福里兼管國子監䝉古司業並奉特簡後不常設謹附識於此祭酒順治元年設秩正四品初兼太常寺少卿銜後不兼滿洲漢人各一人司業順治元年設秩正六品初兼太常寺丞衘後不兼滿洲二人分左右二翼翼各一人䝉古一人漢人一人乾隆十三年裁滿洲司業一人以一人兼理左右翼監丞順治元年設秩正八品滿洲漢人各一人乾隆元年改秩正七品博士順治元年設秩正八品滿洲一人漢人三人十五年裁漢博士一人康熈五十二年復裁漢博士一人乾隆元年改秩從七品典簿順治元年設秩從八品滿洲漢人各一人典籍順治元年設秩從九品漢人一人助教順治元年設秩從八品漢人十有二人分莅率性修道誠心正誼崇志廣業六堂十五年裁助教六人乾隆元年改秩從七品學正順治元年設秩正九品漢人十有二人亦分莅六堂康熈三十八年裁學正六人五十六年復裁學正二人以四人分掌率性修道誠心正誼四堂乾隆元年改秩正八品學録順治元年設秩從九品漢人六人亦分莅六堂十五年裁學録四人以二人分掌崇志廣業二堂乾隆元年改秩正八品八旗官學助教順治元年設秩從八品滿洲十有六人清文八人清漢文八人䝉古八人十八年裁䝉古助教四人康熈五十七年裁滿洲助教四人雍正二年復設䝉古助教四人三年復設滿洲助教四人乾隆元年改秩與六堂助教同謹案雍正六年理藩院臣奏俄羅斯遣其陪臣子弟魯喀等七人來學詔王大臣簡選國子監滿漢助教引年見以滿洲漢人各一員専司教事九詔從祭酒鄂爾竒之請於六堂額外専設俄羅斯漢助教一人乾隆十五年祭酒吳逹善陸宗楷請嗣後漢助教照滿助教例不必額外専設祗令六堂助教兼理詔從之算學助教乾隆四年設秩正八品或滿洲或漢人一人先是算學統於八旗官學後改設於欽天監附近之地至是命改稱國子監算學専𨽻於監筆帖式順治元年設自七品至九品視其出身有差滿洲四人漢軍二人十八年増設䝉古筆帖式二人設官附元國子監至元初以許衡為集賢館大學士國子祭酒教國子與蒙古大姓四集賽人員至元二十四年始置監祭酒一員從三品司業二員正五品監丞一員正六品典簿一員元史百官志謹案典簿品秩元史闕國子學秩正七品置博士二員助教四員學正二員學録二員典給一員同上謹案元制國子監統於集賢院選舉志又云太宗六年設國子總教及提舉官而百官志不載盖草創之制非常設之員也國子監有司樂一員典籍一員管勾一員及侍儀舍人等官元史選舉志謹案元制國子監國子學外有蒙古國子監國子學俱統於蒙古翰林院所習者蒙古新字選舉志序稱當時仕進多岐出身於學校者有國子學監學又有䝉古字學回回國學其設官品秩亦與國子監學大約相同因與集賢院所統之國子監不相渉概不載入明國子監祭酒一人從四品司業一人正六品其屬繩愆㕔監丞一人正八品博士㕔五經博士一人從八品率性修道誠心正誼崇志廣業六堂助教十五人從八品學正十人正九品學録七人從九品典簿㕔典簿一人從八品典籍㕔典籍一人從九品掌饌㕔掌饌一人未入流明史職官志謹案此明太祖洪武二十四年所定成祖置北京國子監皆循是而稍加損益故具列於此永樂元年置國子監於北京設祭酒司業監丞典簿博士學正學録掌饌各一人助教二人同上永樂以後監中屬官増設不常助教至十五人學正至十一人學録至七人後裁助教二人學正四人學録二人萬厯二年又裁助教四人學録一人明史職官志宣徳九年省司業同上宏治十五年復設司業同上謹案晉以國子學教大臣子孫太學教凡民俊秀唐宋並以國子監統國子學太學元時監學本並設尚沿舊制其并學於監則自前明始朝因之而制度益加詳云欽定國子監志卷二十八

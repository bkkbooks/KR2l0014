  text: 欽定四庫全書欽定國子監志卷四十二
  hash: sha256:f09d042e63c71960203ff61876d243cf1b2949c64f31b92ae753905177eeacfa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_041-1a, image: WYG0600/WYG0600-0456c.png}
body:
  text: 經費臣等謹案辟廱制備成周而司禄籍亡樂正諸官受禄之制其詳不可得聞至士之升於學者亦苐不征於司徒未聞給廩餼也西漢置博士秩比六百石又置博士弟子復其身東漢光武幸太學賜學官弟子各有差而後世臨廱恩例昉焉梁武帝天監四年始給五經博士舘生徒餼廩嗣是厨米之賚肇於唐緡錢之賜起於宋至元而三監並有膳學錢糧洎乎明初規模益宻而中葉以還修舉無聞紀載亦略入膠庠者藉免科役而已我朝成均儲養制度秩如世宗憲皇帝復詔嵗賚帑金皇上作人育俊渥澤彌周錫賚有加出納底慎官有常禄士有常廩綱舉目張纎悉具備信可垂為彛典謹志經費為恩賚一卷嵗支一卷俸秩一卷廩給一卷經費一恩賚皇帝視學禮成賜王以下文武各官茶先期由禮部精膳司行文内務府轉行内茶房庀具翼日賜襄事諸臣宴於禮部衍聖公大學士内閣學士禮部太常寺翰林院詹事府官及國子監祭酒司業咸與宴亦先期禮部精膳司計人數移光禄寺具饌饌分上中下三等各視品秩為差乃頒賞衍聖公文貂朝冠朝服祭酒司業錦緣領袖紵絲袍服聖裔及五經博士文貂紵絲袍服助教以下官及孔顔諸氏生員紵絲袍服聴講進士舉人各學教習貢監生官學生等各白金一兩貂皮表裏由禮部行文内務府廣儲司支給銀由國子監行文户部福建司支給毎科新進士至國子監釋褐賜花紅筵宴銀十五兩先期由監行文户部福建司領銀庀具進士題名碑賜銀一百兩立石大成門外由禮部奏請國子監行文工部營繕司支領典簿㕔經理其事貢監生由國子監録送順天鄉試中式毎名賜旗扁銀二十兩由國子監行文户部福建司支領國子監毎嵗恩賞銀六千兩由監行文户部陜西司支領以為師生講課飯食及内外班肄業生膏火衣服奬賞之費其餘以備賙䘏有事故諸生本監設錢糧處遴滿員經理之凢動支恩賞銀均令具稿呈堂核發國子監官員承命差遣移咨兵部給與勘合其在任病故者恩凖津送還籍謹案以上各條俱照國子監現行則例開載所有歴年所定章程詳識於後順治九年世祖章皇帝視學禮成賜羣臣宴及冠服白金有差十年定國子監祭酒在任物故者給與勘合陸路夫十有六名馬四匹司業以下夫十有二名馬二匹水程各給舟一康熙八年聖祖仁皇帝視學禮成賜宴賞賚如定制雍正二年世宗憲皇帝視學禮成越二日賜宴時值齋期視學適故也宴設上席下席各三十筵中席二十筵他賞賚如定制又命發帑金建進士題名碑於國子監謹案進士題名碑舊由工部發帑建立康熙間議裁於是毎科皆進士捐資立石世宗憲皇帝以本朝題名自順治丙戌科至康熙戊戌科而正特命工部發帑交國子監補建康熙辛丑雍正癸卯甲辰三科題名碑嗣後毎科並由禮部奏請工部發銀付監立碑着為例八年祭酒孫嘉淦奏國子監肄業貢監講課之期請給與桌飯費毎嵗並照内教習例給與衣服銀懇毎年恩賚庫帑六千兩委員承辦所餘以備諸生事故量加賙䘏詔従之命嵗賜國子監銀六千兩著為例乾隆三年皇上視學禮成賜羣臣茶翼日賜宴詔廣與宴人數於舊例八十筵外加設一百三十六筵諸賞賚並如定制駕視謹案先是羣臣隨學者無賜茶禮上特行之又數俾同霑詔廣賜宴人渥澤焉四年定國子監祭酒司業奉差給予勘合廩給一分從役五名口糧五分馬七匹水程舟一監丞博士助教學正學録典簿典籍廩給一分従役二名口糧二分馬二匹水程舟一二十七年户部奏鄉試中式舉人人給旗扁銀二十兩向例各赴户部領取查各省貢監應順天鄉試者由國子監録送請令國子監於彚齊後行文咨領按名給予詔從之恩賚附元至正八年幸國子學賜衍聖公銀印升秩從二品元史順帝紀明國子監諸生嵗時賜布帛文綺襲衣巾鞾正旦元宵諸令節並賞節錢監中置紅倉養諸生之妻子歴事生末娶者賜錢婚聘及女衣二襲月米二石諸生在京師嵗久父母存者或父母亡而大父母伯叔父母存者俱遣歸省人賜衣一襲鈔五錠為道里費明史選舉志謹案此洪武時所定迄明世遵行之故備録於此永樂三年諭禮部凢監生免其家兩丁差徭南廱志永樂四年視學進講畢賜百官茶禮成祭酒等表謝帝御奉天門賜百官宴復賜祭酒司業紵絲羅衣各二襲學官三十五人各紵絲衣一襲監生三千餘人各鈔五錠明史禮志正統五年幸國子監禮畢賜公侯伯駙馬武官都督以上文官三品以上及翰林院學士至檢討國子監祭酒至學録宴同上謹案英宗實録是年學官諸生賞賚如舊制但史不具耳景泰二年視學前期禮部具奏儀注命講官并學官添與紗㡌及帶監生毎人添與絹一匹續文獻通考成化元年視學禮畢百官慶賀賜衣服賜宴襲封衍聖公紵絲衣一襲犀帶一條紗㡌一頂五經博士顔議孟希文俱紵絲一襲帶一條紗㡌一頂其餘族人各與素紵絲衣一襲講官學官監生賞賚如舊吏典毎名賞鈔二錠明憲宗實録謹案宏治以後視學錫賚並遵此例故不複述宏治十四年工部奏造保安堂五間以濟監生疾病醫士二名涿州一名良鄉一名毎嵗毎名觧工食銀三兩六錢典簿㕔收貯以備監生醫藥之用病故者國子監移文順天府給銀三兩以為殯殮之具兵部給以口糧脚力遞送還鄉明太學志嘉靖元年定視學禮畢衍聖公率三氏子孫祭酒率學官諸生上表謝恩皆賜宴於禮部明史禮志萬厯四年視學頒賞如舊免賜宴同上欽定國子監志卷四十二

front:
  text: 欽定四庫全書欽定國子監志卷二十
  hash: sha256:ee071356202b9bff22ece0bfe3207c16e96f65cd70795a529c2b82b29c35df2f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_020-1a, image: WYG0600/WYG0600-0192a.png}
body:
  text: 樂臣等謹案三代以上成均課士之法司成與樂正並重蓋掌樂之官即教士之官樂之與學非有兩事所以由小學之書以進於瞽宗之禮樂由瞽宗之禮樂而成之以東序之舞使人遊息其中日遷善而不自知養人才而致太平胥於是焉具漢制博士𨽻太常而不聞肄業及樂曹魏而後學校與協律始分科而治粵稽兩漢有祀先師之禮而聲歌未備魏唐舉釋奠而律吕未詳宋自景祐大觀漸見修復至大晟樂府新撰樂章音律聲器於是大備厯元及明雖或損益聲文更定章句大要倣大晟舊制而未見卓然有所改作也洪惟我朝列聖相承握制作之原契聲音之始爰定中和韶樂釋奠先師復頒六平之章垂為永制皇上考正宫律春用夾鍾秋用南宫乾隆七年特設樂部専典樂府協律之事於是文廟聲容集厥大成所謂金聲而玉振之者一名一物皆足發聖智之精藴不圖至斯之盛千載同符固不特學校人材聞而興起已也謹輯樂制一卷樂章一卷樂器一卷律吕表一卷舞器一卷舞節一卷為樂門而凡元明以來可考者仍附見卷末焉樂一樂制順治二年詔定釋奠先師樂章六奏用平字世祖章皇謹案鼎之初帝定詔定郊廟樂章改用平字均用中和韶樂至是釋奠先師亦並用之十三年欽頒釋奠文廟樂章六首迎神奏咸平之曲奠帛初獻奏寧平之曲亞獻奏安平之曲終獻奏景平之曲徹饌及送神俱奏咸平之曲又定釋奠先師舞用六佾三獻均進文德之舞謹案釋奠佾舞自宋元嘉以來俱用六佾於義為允唐開元時用八佾行之未久明成化間從周洪謨言復用八佾嘉靖以後仍改六佾當時言官紛紛陳請俱未得尊崇孔子之意我朝隆禮先師迥逾前代而佾舞之數獨仍舊制意深逺矣康熙五十四年頒中和韶樂器於國子監文廟先師謹案釋奠樂自順治二年始至是太常重造用中和韶頒於國子樂器告成監乾隆六年詔定祭先師廟樂律春以夾鍾為宫秋以南吕為宫迎神奏昭平奠帛初獻奏宣平亞獻奏秩平終獻奏敘平徹饌奏懿平送神奏德平詔定祭謹案是年律釋奠祀雅樂宫先師以春秋月律為宫本古法也三十年頒鎛鐘特磬於國子監文廟特命謹案先是江西獻古鎛鐘圖復樂部仿鑄適和闓已入版詔采玉以琢特磬至是告成乃依春秋釋奠月律頒夾鐘南吕鏄鐘特磬各二焉樂舞事宜凡春秋釋奠樂部前期率太常協律郎等設樂于殿外階上其樂舞生定額樂生五十二人文舞生三十六人均𨽻樂部壇謹案廟初獻舞武功之舞亞獻終獻舞文德之舞惟釋奠也先師止用文舞地冇所宜唐之釋奠用武舞非乾隆五十年詔建辟雍工成特定臨雍樂章皇上升座奏盛平羣臣行禮奏慶平茶奏清樂皇上還宫奏道平樂制附元成宗大德十年命江浙行省製先聖廟樂器以宋樂工施德仲審較應律運至京師秋八月用於廟祀先令翰林新撰樂章命樂工習之蓋舊曲也不果用元史禮樂志先謹案元代樂章樂名皆仍金舊而釋奠撰樂章師亦因宋之大晟無所更易雖嘗擬改迄不果用詳附下樂章卷明洪武元年定文廟樂生六十人編鐘編磬各十六琴十瑟四搏拊四柷敔各一塤四篪四簫八笙八笛四大鼓一明史樂志洪武四年禮部奏定釋奠先師樂生六十人舞生四十八人引舞二人凡一百一十人並請選京民之秀者充樂舞生太祖曰樂舞乃學者事况釋奠所以崇祀先師宜擇國子生及公卿子弟在學者預教肄之明史禮志洪武六年始命詹同樂韶鳯等更製樂章洪武十六年敕禮部同工部命曉音律之人集工製大成樂器以頒天下儒學樂志洪武二十六年頒大成樂器於天下禮志謹案大成名樂雖本宋之大晟然在宋為總名若賜宴辟雍貢士鹿鳴及聞喜宴俱得用之不文專為也元之大成為全樂總名明又取集大成廟用之義以為釋奠専用之樂於義較切永樂徙都燕京樂制悉同南雍無所更定故詳附明初制度以備參考成化十二年從祭酒周洪謨言釋奠增樂舞為八佾𢎞治九年增釋奠樂舞為七十二人如天子之制嘉靖九年改先師廟中籩豆十二為十樂用六佾先謹案時大學士張璁言聖人尊天與尊親同今師廟中籩豆十二牲用犢全用祀天儀非正禮宜更定御史黎貫等非之謂夫子之不可及猶天之不可階而升雖擬諸祀天不為過又言莫尊于天地亦莫尊于父師不應獨疑孔子為僭帝斥貫等從璁言欽定國子監志卷二十

front:
  text: 欽定四庫全書欽定國子監志卷七詣學
  hash: sha256:7b65bea502b4ccb037eb2e309ac7557c022b3333e64f61841ccf1c36a202a467
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_007-1a, image: WYG0600/WYG0600-0076a.png}
body:
  text: 臣等謹案戴記天子視學大昕鼓徴衆至然後天子至乃命有司行事興秩節祭先師先聖焉蓋禮之大也德之備也自漢以還臨雍饗射圜橋觀聼史册盛稱自是視學之典厯代舉行惟是酳饋受成敷揚景鑠而已至於春秋釋奠或委諸職守或遣官蒞祭書親祀者蓋僅覯焉洪惟我朝禮教隆備自我太宗肇興釋奠世祖聖祖躬舉臨雍典禮親授經義特頒敕諭訓勉師生迄為定制世宗憲皇帝親祀上丁登獻升香詔改幸學為詣學又增置先賢先儒博士俾與陪祀隆文懋典昭示來兹我皇上丕纘先緒躬行三獻鴻儀邁古恩賚有加所謂禮之大德之備者稽諸前載罕有比倫謹志親祀一卷臨雍一卷為詣學門而以元明以來臨雍之典附焉詣學一親祀順治十七年春正月庚辰以修葺先師廟工成世祖章皇帝親詣釋奠雍正二年夏六月戊戌以曲阜聖廟災世宗憲皇帝親詣國子監告祭先師孔子御素服不設鹵簿不鳴鐘不作樂王大臣以下陪祀諸臣並常服從事遣官惟謹案告祭例皆二年七年特舉親祀之禮故謹載于此云雍正四年秋八月丁亥世宗憲皇帝親詣先師廟釋奠特命以尚書四人分獻四配以侍郎四人分獻十一哲東西廡凡進帛爵于先師皆行跪獻禮雍正六年春二月丁酉世宗憲皇帝親詣先師廟釋奠雍正七年冬十二月辛酉以曲阜聖廟工成慶雲見于闕里世宗憲皇帝親詣國子監告祭先師孔子雍正十一年春二月丁巳世宗憲皇帝親詣先師廟釋奠始行三上香禮乾隆三年春二月丁酉聖廟易用黃瓦工成皇上親詣先師廟釋奠始行三獻禮乾隆五年秋八月丁未皇上親詣先師廟釋奠乾隆九年春二月丁亥皇上親詣先師廟釋奠乾隆十八年秋八月丁亥皇上親詣先師廟釋奠乾隆二十一年春二月丁未皇上親詣先師廟釋奠特命衍聖公孔昭煥陪祀臨雍謹案舊制惟期行取衍聖公等來京陪祀觀禮盛典部臣先覲故釋奠則否時孔昭煥適入有是命乾隆三十四年春二月丁亥大修先師廟工成皇上親詣釋奠乾隆四十八年春二月丁卯皇上親詣先師廟釋奠親祀儀注乾隆三年增先祭一日樂部設中和韶樂于大成殿外階上分左右懸至日五鼓鑾儀衛陳法駕鹵簿於午門外日出前六刻太常寺卿詣乾清門告屆時皇帝御祭服乘禮輿出宫引扈如常儀駕發警蹕午門鳴鐘法駕鹵簿前導不陪祀王公百官咸朝服跪送導迎鼓吹設而不作皇帝至廟門外降輿贊引太常寺卿二人恭導由中門入至更衣大次少憩太常寺卿奏請行禮皇帝出大次盥洗贊引官恭導皇帝入大成中門由中階入殿中門至拜位前北嚮立太常贊禮郎引分獻官至階下夾甬道立鴻臚寺官引陪祀王公位殿外階上百官位階下左右序立均北面典儀官贊樂舞生登歌執事官各供乃職以下自迎神至送神皆典儀官唱贊文舞六佾進贊引官奏就位皇帝就拜位立乃迎神司香官捧香盤進司樂官贊舉迎神樂奏昭平之章凡舉樂皆司樂官唱贊贊引官奏就上香位導皇帝詣先師香案前立司香官跪進香贊引官奏上香皇帝立上柱香次三上瓣香奏旋位皇帝旋位奏跪拜興以下行禮皆有奏皇帝行二跪六叩頭禮王公百官均隨行禮奠帛行初獻禮司帛官捧篚司爵官捧爵進奏宣平之章舞羽籥之舞司帛官詣先師位前跪獻三叩司爵官詣先師位前立獻奠正中皆退分獻官各詣四配十二哲兩廡先賢先儒位前上香奠獻如儀司祝至祝案前跪三叩奉祝版跪案左樂暫止皇帝跪羣臣皆跪司祝讀祝畢詣先師位前跪安於案上叩退樂作皇上率羣臣行三叩頭禮興行亞獻禮奏秩平之章舞同初獻司爵官詣先師位前獻爵奠於左儀如初獻行終獻禮奏敘平之章舞同亞獻司爵官詣先師位前獻爵奠於右儀如亞獻分獻官以次畢獻均如初樂止文德之舞退乃徹饌奏懿平之章徹饌畢送神奏德平之章皇帝率羣臣行二跪六叩頭禮有司奉祝次帛次饌次香恭送燎所皇帝轉立拜位旁西向候祝帛過復位樂作祝帛焚半奏禮成皇帝由大成中門出至廟門外升輿法駕如常儀崇聖祠承祭官分獻官于皇帝出大次時入祠上香奠獻如春秋釋奠儀謹案雍正四年所定儀注無上香禮爵止一獻餘同今儀各衙門承辦親祀事宜凡恭遇皇帝釋奠先師廟工部于祀前一日自先師廟門內至大成殿門外鋪設棕毯又恭設大次於大成門東其大成殿四配十二哲分獻官崇聖祠承祭官由太常寺前期奏派大成殿司香司帛司爵俱用太常寺官崇聖祠分獻官司香帛爵官大成殿兩廡崇聖祠兩廡分獻官司香帛爵生由國子監自行揀派移會太常寺餘與遣官釋奠同國子監承辦親祀事宜先期移文太常寺查取親祀典禮工部恭設大次並取鋪設棕毯工役于集賢門外柵欄門以內平墊黃土鑾儀衛領應差廟尸等紅駕衣二十件帽二十頂帶二十條翎二十根餘應行事宜並與丁祭同欽定國子監志卷七

  text: 欽定四庫全書欽定國子監志卷一聖諭
  hash: sha256:9520e72b45836e373d00fa584ffd7c6427f9e0d1813a6a3b06204ab848a093ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_001-1a, image: WYG0600/WYG0600-0012a.png}
body:
  text: 臣等伏惟褒崇聖道訓迪多士所以繼徃開来君師億兆是故三代之學義重明倫漢臨辟雍禮兼饗射至於唐宋典制遞加雖意主風厲而詞多粉飾欽惟世祖章皇帝定鼎京師首詔崇祀以著萬世道統之宗列聖崇儒典學隆儀疊舉煌煌綸綍教思無窮我皇上紹一貫之心傳綜百王之道法德音流播寰㝢嚮風國學承流近光尤切猗歟盛哉書所謂皇極敷言是彛是訓惟帝其訓者與恭輯聖諭為褒崇一卷訓示一卷聖諭一褒崇世祖章皇帝諭㫖順治元年山東巡撫方大猷奏請崇祀先師諭禮部先師為萬世道統之宗禮當崇祀昭朝廷尊師重道至意本内所開各欵俱應相沿期於優渥以成盛典著該部查照一體飭行順治二年國子監祭酒李若琳奏請加孔子諡號諭禮部工部先師諡號信宜尊崇著羣稽徃例確議具奏新牌就該監製造如議行禮工二部知道時禮科給事中龔鼎孳亦言宜從若琳請因復諭禮部孔廟諡號加稱大成至聖文宣先師孔子既監科考訂僉同准如議行一應禮儀還照明朝舊例不必更改該部知道先謹案位至順治十四年從給事中張文光請仍師神至稱先師孔子通行直省各學聖順治八年諭禮部釋奠大典允宜舉行其擇吉具儀以聞聖廟作速修理該部知道順治十四年諭工部文廟崇祀先師孔子所闗典禮甚重今已年久傾圯若不速為整理後漸頽壊葺治愈難因爾部錢糧匱乏所需工料未能措辦朕發内帑銀三萬兩特加修葺爾部即傳諭行聖祖仁皇帝諭㫖康熙六年諭禮部臨雍釋奠大典禮儀理宜舉行已有㫖修理聖廟國學俟完時該部擇吉具奏康熙二十五年諭大學士等先賢先儒從祀位次應視其道德為先後不可援師弟為定例其酌議奏聞康熙四十九年總兵馬見伯奏致祭文廟時武臣請照文臣一體行禮諭大學士等嗣後祭先師孔子時令武臣與文臣一體行禮於理甚合著照馬見伯所請行康熙五十一年諭大學士等朕自沖齡篤好讀書諸書無不覽誦毎見歴代文士著述即一句一字於義理稍有未安者輙為後人指摘惟宋儒朱子註釋羣經闡發道理凡所著作及編纂之書皆明白精確歸於大中至正經今五百餘年知學之人無敢疵議朕以為孔孟之後有禆斯文者朱子之功最為宏鉅應作何崇禮表彰著内閣九卿詹事科道㑹同詳議具奏大謹案時大學士等遵議成殿西序朱子升配詔從之世宗憲皇帝諭㫖雍正元年諭内閣禮部至聖先師孔子道冠古今德參天地樹百王之模範立萬世之宗師其為功於天下者至矣而水源木本積厚流光有開必先克昌厥後則聖人之祖考宜膺崇厚之褒封所以追溯前徽不忘所自也粤稽舊制孔子之父叔梁公宋真宗時追封啓聖公自宋以後歴代遵循而叔梁公以上則向来未加封號亦未奉祀祠庭朕仰體皇考崇儒重道之盛心敬修崇德報功之典禮意欲追封五代並享烝嘗用伸景仰之誠庶慰羮牆之慕内閣禮部可㑹同確議具奏時大學士等以應封公爵議上又諭禮部五常為百行之本天地君親師人所並重而天地君親之義又賴師教以明自古師道無過於孔子誠首出之聖也我皇考崇儒重道超軼千古凡尊崇之典無不備至朕䝉皇考教育自幼讀書心切景仰欲再加尊崇更無可増之處故勅部追封孔子先世五代今部議封公上考前代帝王皆有推崇之典唐明皇封孔子為文宣王宋真宗加封至聖文宣王封孔子父叔梁紇為齊國公元加封孔子為大成至聖文宣王加封齊國公為啓聖王至明嘉靖時猶以王係臣爵改稱為至聖先師孔子改啓聖王為啓聖公王公雖同屬尊稱朕意以王爵較尊孔子五世應否封王之處著詢問諸大臣具奏㫖議謹案時内閣禮部及諸大臣遵㫖允孔子五世俱封王爵得行又諭禮部孔子道冠古今為萬世師表薄海内外無不俎豆尊崇國學乃四方表率其制尤重聖祖仁皇帝臨雍釋奠典禮優隆朕纉承大統景仰先型羮牆如見念國學為造士之地聖教所被莫先於此恐歴嵗既久有應加修葺之處爾部㑹同工部詳加閲視凡文廟殿宇廊廡及講堂學舎務須整理周備俾廟貌聿新以申景慕朕將親詣焉雍正二年諭禮部帝王臨雍大典所以尊師重道為教化之本朕覽史冊所載多稱幸學近日奏章儀注相沿未改此臣下尊君之詞朕心有所未安今釋奠伊邇朕將親詣行禮嗣後一應奏章儀注稱幸非宜應改為詣字以申崇敬又諭禮部等衙門治天下之要以崇師重道廣厲澤宮為先務朕親詣太學釋奠先師禮畢進諸生於彛倫堂講經論學凡以明道術崇化源非徒飾圜橋之觀聽也惟孔子道髙德厚萬世奉為師表其祔享廟庭諸賢皆有羽翼聖經扶持名教之功然歴朝進退不一而賢儒代不乏人周程朱蔡外孰應升堂祔享者並先賢先儒之後孰當増置五經博士以昭崇報均闗大典九卿翰林國子監詹事科道㑹同詳考定議以聞時九卿等議復林放等十一人從祀又諭九卿等先儒從祀文廟闗係學術人心典至重也宜復宜増必詳加考證折衷盡善庶使萬世遵守永無異議爾等所議復祀諸儒雖皆有功經學然戴聖何休未為純儒鄭衆盧植服䖍范甯謹守一家言轉相𫝊述視鄭康成之淳質深通似乎有間至若唐之陸贄宋之韓琦勲業昭垂史􅁽自是千古名臣然於孔孟心傳果有授受而能表彰羽翼乎其他諸儒是否允協以及宰子冉有増置博士之處著再公同確議務期至當不易具奏謹案九卿遵議止復祀林放等六人遂為定制又諭内閣朕惟孔子道髙德厚為萬世師表所以維世教立人極者與天地同其悠久朕臨御以來思極尊崇之典用申仰止之忱今闕里聖廟被災豈朕尊師重道之誠有未至歟朕在諒隂之中素服齋居無庸更事減膳撤樂謹擬親諸國學文廟䖍申祭奠宣讀告文以展朕跼蹐不安之誠先期齋二日於二十七日不設鹵簿朕隨身素服前徃諸王大臣官員陪祀者亦皆常服從事仍遣官馳赴闕里祭告以慰神靈幸新建崇聖祠無恙聖像神牌不至露處朕心稍寕遣工部堂官一員㑹同該撫作速計材料工擇日興修務期規制復舊廟貌重新告成之日朕將親詣行禮該部遵㫖速行又諭禮部等衙門朕念先賢先儒扶持名教羽翼聖經有闗學術人心爰命九卿詳議今諸臣㕘考周詳評論公正甚合朕心著依議行又諭禮部等衙門先賢冉雍冉伯牛子張有若四人後裔均著増置五經博士一人予以世襲㫖議奏謹案時禮部等衙門遵増祀者二十人増入崇聖祠者一人増置博士者四人雍正三年諭内閣九卿古有諱名之禮所以昭誠敬致尊崇也朕臨御以来恐臣民過於拘謹屢降諭㫖凡與御名聲音相同字樣不必迴避近見各省地名以音同而改易者頗多朕為天下主而四海臣民竭誠盡敬如此况孔子德髙千古道冠百王正彛倫端風化為徃聖繼絶學為萬世開太平自天子以至於庶人皆受師資之益而直省郡邑之名有聖諱字在内者今古相沿未改朕心深為不安爾等㑹議凡直省地名有同聖諱者或改讀某音或另易他字至於常用之際於此字作何迴避一併詳議具奏時部臣議迴避聖諱凡遇姓氏俱加偏旁為邱字地名則更易他名至書寫常用之際則從古體􅉌字又諭禮部等衙門朕細思今文出於古文若改用􅉌字是仍未嘗迴避也此字本有期音查毛詩及古文作期音者甚多嗣後除四書五經外凡用此字並用邱字地名亦不必改易但加偏傍庶乎允協足副朕尊崇先師至聖之意雍正四年諭禮部儀注内開獻帛進酒皆不跪朕今跪獻非誤也若立獻於先師之前朕心有所不安可記檔案以後照此遵行雍正五年諭内閣三月十八日為皇考聖祖仁皇帝萬壽聖節舊例於是日䖍誠齋肅禁止屠宰今應永逺遵行至聖先師孔子師表萬世八月二十七日為聖誕之期亦應䖍肅致敬朕惟君師功德恩被億載普天率土尊親之戴永永不忘而於誕日尤當加謹以展恪恭思慕之忱非以佛誕為比擬也著内閣九卿㑹同確議具奏詔從之謹案時大學士等遵議請永著為令又諭禮部朕惟孔子以天縱之至德集羣聖之大成堯舜禹湯文武相傳之道具於經籍者賴孔子纂述修明之而魯論一書尤切於人生日用之實使萬世之倫紀以明萬世之名分以辨萬世之人心以正風俗以端若無孔子之教則人將忽於天秩天叙之經昧於民彛物則之理勢必以小加大以少陵長以賤妨貴尊卑倒置上下無等干名犯分越禮悖義所謂君不君臣不臣父不父子不子雖有粟吾得而食諸其為世道人心之害尚可勝言哉惟有孔子之教而人道之大經彛倫之至理昭然如日月之麗天江河之行地歴世愈久其道彌彰統智愚賢不肖之儔無有能越其範圍者綱維既立而人無踰閑蕩檢之事在君上尤受其益易曰君子以辨上下定民志禮運曰禮達而分定使非孔子立教垂訓則上下何以辨禮制何以達此孔子所以治萬世之天下而為生民以来所未有也使為君者不知尊崇孔子亦何以建極於上而表正萬邦乎人第知孔子之教在明倫紀辨名分正人心端風俗亦知倫紀既明名分既辨人心既正風俗既端而受其益者之尤在君上也哉朕故表而出之以見孔子之道之大而孔子之功之隆也雍正七年大學士等以闕里大成殿上梁慶雲呈現奏請宣付史館諭内閣朕平素尊崇先師至誠至敬雍正二年闕里文廟不戒於火比時廷臣援明代𢎞治前事為言而朕心悚懼不寜引過自責親詣太學文廟䖍誠告祭特發帑金命大臣等督工修建凡殿廡制度規模以至祭器儀物皆令繪圖呈覽朕親為指授遴選良工庀材興造䖍恪之心數年以来無時稍間今大成殿上樑前二日慶雲現於曲阜卿等歸美朕躬之詞朕不克當或者上帝先師鑒朕悚惕誠敬之心現兹雲物昭示瑞應朕不敢矜言祥瑞但能功過相抵朕之幸也應擇日躬詣太學文廟告祭以申感慶之衷一切禮儀著該部速議具奏朕躬被先師之福佑普天士子誦法服膺同受聖人之澤著將明年㑹試取中額數廣至四百名壬子科各省鄉試每正額十名加中一名其十名之外有零數者亦加中一名此朕體奉先師樂育之盛心特行造就人才之曠典諸士子其各興文敦行益加勉旃所請宣付史館之處知道了雍正十一年諭禮部朕詣文廟行禮應親自上香嗣後如何上香之處爾部㑹同大學士議奏謹案時禮部定議嗣是迎神後行三上香禮皇上諭㫖乾隆二年諭禮部至聖先師孔子天縱聖神師表萬世尊崇之典至我朝而極盛皇考世宗憲皇帝尊師重道禮敬尤隆闕里文廟特命易盖黄瓦鴻儀炳煥超越前模朕祇紹先猷羮牆念切思國子監為首善觀瞻之地辟雍規制宜加崇飾大成門大成殿著用黄瓦崇聖祠著用綠瓦以昭展敬至意又諭禮部先師孔子聖集大成教垂萬世我皇祖聖祖仁皇帝皇考世宗憲皇帝親詣辟雍登堂釋奠儒臣進講經書諸生圜橋觀聽雍雍濟濟典至盛也朕祇承丕緒嚮慕心殷國學文廟特命易盖黄瓦以展崇敬俟工程告竣之日朕躬詣釋奠用昭重道隆師作人造士至意應行典禮爾部詳議具奏乾隆三年諭内閣本年春祭文廟朕降㫖親詣行禮查文廟春秋二祭舊例俱是遣官我皇考尊師重道始定親祭之禮間年舉行乃從前所未有者今覽太常寺奏進儀注朕躬獻爵一次其亞獻三獻之爵預先陳設香案上朕思既行親祭仍當從三獻之儀著太常寺另繕儀注進呈乾隆十二年諭内閣翰林院檢討阮學浩所奏貢生閻若璩孔廟從祀末議十一條朕初加披閲大概多前人所已經議及非有卓然至當不易之論有禆典制必當見之施行者即如議樂舞宜用八佾籩豆宜用十二一條其意謂尊崇祀典宜用天子禮樂夫孔子道德髙厚與天地參即備天子禮樂以奉之亦未足以昭崇報我朝列聖隆禮致敬於先師至矣盡矣而樂佾仍用六佾非畧而未講也朕謂季氏八佾舞於庭孔子斥其是可忍也孰不可忍今顧以孔子所非者祀孔子是得為敬孔子乎在他人則議之在已則受之於聖人之心安乎謂孔子生未嘗為諸侯六佾亦豈所固有此乃本之宋臣王安石謂史記不當列孔子於世家不過文人翻新立説豈足據為定論且天子尊師所貴宣明德化敦叙彛倫實能行聖道以端治理明聖教以淑人心坐而言起而行使天下無一人不與被聖人之澤至於樂舞之儀文籩豆之度數其末節耳而以此為尊師首務豈所謂能知輕重者乎又所稱兩廡先賢先儒位次凌躐宜請釐正一條兩廡從祀諸人累朝互有出入盖書生習氣喜逞臆斷而訾典章其一偏一曲之見言人人殊考之前史甚至有迎合時事黨護鄉曲者漢臣議禮如聚訟之譏良有以也阮學浩所信者閻若璩之説而閻若璩此條如何釐正若者宜先若者宜後在閻若璩即無定論况孔廟祀典於雍正二年奉皇考世宗憲皇帝諭㫖令廷臣集議所有應増祀復祀之先賢先儒已經一一釐正閻若璩所謂西多於東者盖未釐正以前之舊今定從祀東廡六十二人西廡六十一人位次秩然初無凌躐現載大清㑹典閻若璩固未及見阮學浩何備官而亦未之聞耶祀典關係重大若祇慿其私心淺見率議更張忽進忽退忽東忽西成何政體以朕觀之此二條即不可施行是以明切曉諭令衆知之其餘各條或有應議之處大學士㑹同該部詳議具奏乾隆十八年諭太常寺春秋釋奠例應遣官朕自徃嵗恭謁孔廟行禮後已閲五年仰止宮牆心殷景慕此次親詣行禮崇聖祠遣史貽直行禮乾隆三十二年諭内閣太學文廟前經改用黄瓦楹桷鼎新迄今閲年已久宜重加丹雘式煥宫牆著交現在派修宮殿工程處諏日鳩工敬謹繕葺用副朕重道右文至意又諭内閣戴第元奏請増至聖誕辰祭祀一摺殊非正理誕辰之説出於二氏為經傳所不載國家尊師重道備極優崇釋奠二丁自有常制援据禮經實不同於尋常廟祀且昔人於孔子生日辨論紛如尤難臆定况孔子儒者之宗也尊孔子者當即以儒者所聞孔子之道尊之戴第元乃欲於彛典之外輕増一祭轉為䙝越而不足以昭隆禮士不通經所奏宜擯摺發還乾隆三十三年諭内閣修葺文廟現届落成太學規模式昭輪奐惟門題殿榜尚應詳考彛章用肅景仰向来正殿稱先師廟二門曰廟門而大門未有書額盖沿習明代舊文未加釐正夫廟門之號於禮經所稱祖廟既涉嫌疑而先師廟額揭諸殿楹名實尤多未稱應於大門増先師廟額其正殿改為大成殿二門改為大成門庶符㑹典定制朕親書牓字涓吉恭懸以彰崇道尊師之至意又諭内閣國學崇祀先師規制法程美備是飭我列聖右文重道尊禮有加朕臨御初即詔易黄瓦儀惟其隆邇以殿廡嵗久弗葺特發帑金二十餘萬鳩庀鼎新勅大臣董厥成輪奐視舊増益工就告蕆而門殿諸額向沿明張璁陋議非所以肅觀瞻明折中也既依㑹典定名躬為牓書並宣示釐正大指兹復親製碑記具修建原委且於幾暇手書付鋟表示鄭重将以明年仲春詣學釋奠落成之彰盛典焉遐稽闕里廟堂有後漢時犧象諸尊以為觀美爰擇内府所藏周笵銅鼎尊卣罍壺簠簋觚爵洗各一頒置太學陳之大成殿中用備禮器夫孔子志在從周楹間列姬朝法物於義惟允所司其敬凛将事典守勿替以克副朕意欽定國子監志卷一

body:
  text: 生徒五鄉試凡鄉試前一年國子監預咨各旗貢監生願應鄉試者取本旗文結並各省督撫轉飭州縣曉諭貢監生願赴京鄉試者取本籍文結均于鄉試年二月本生親賫到監肄業其閩粵滇黔四川湖南許展限于四月到監其在監肄業諸生即于四月中旬録科先期令各生報明年貌三代經書籍貫官民字號典簿㕔查驗貢單執照具册呈堂上官考試五月以後録八旗官學教習一次八旗貢監一次由貢監出身之候補候選各官一次武英殿校録各館謄録及各學教習一次候補候選各官由吏部送監録科校録謄録教習由各本處送監録科又小京官筆帖式由各衙門送監録科天文生由欽天監送監録科又各生肄業期滿及告假回籍為時未久者六堂官驗明親供互結一體録科均免考到其各省貢監生親賫本籍文結先行考到如係正途貢生及本年新捐貢監生取具同鄉六品京官印結雖無本籍文結亦許收考又各省督撫學政順天府府尹府丞咨送幕友京外各官咨送隨任讀書之子孫同胞兄弟同胞兄弟之子孫無論正途俊秀均許收考凡各項文結俱由典簿㕔收納㕔官驗明貢單執照呈滿漢司業輪次考到試以四子書藝經藝各一篇考到既取典簿㕔分撥諸生于六堂出榜曉示移付各堂諸生各具親供及同考五人互結呈各本堂官驗明存案付典簿㕔呈滿漢兼管監事大臣祭酒輪次録科試以四子書藝一篇五言八韻詩一首䇿一道録科之日各給親供格式一幅令本生自書三代年貌經書籍貫官民字號與試卷並交收卷官俟録科發榜之後典簿㕔核對無誤分省分旗分别官民字號詳列清册隨録隨送俱照定例于鄉試前十日送畢不得過限凡貢監生籍𨽻八旗者合八旗生員統計共中式三十四名滿洲䝉古試卷編滿字號漢軍編合字號奉天直𨽻山東河南山西陜西甘肅為北卷共中式三十六名試卷編北皿字號江南江西福建浙江湖南湖北為南卷共中式三十六名試卷編南皿字號四川廣東廣西雲南貴州為中卷每二十名中式一名試卷編中皿字號南卷北卷每中式舉人五名例中副榜一名文職京官各京堂科道翰林院官自編修檢討庶吉士以上詹事府官自中允贊善以上外官自藩臬以上武職京外各官二品以上其子孫同胞兄弟同胞兄弟之子均為官卷試卷編官字號仍分南北籍每十五名中式一名其不及十五名者仍歸民卷試卷與直省貢監生槩編民字號凡考到三次不取者不得復考録科不取者許録遺一次録遺不取者不得復考謹案鄉試各項事宜俱遵現行則例開載其厯年增定章程附志于後順治二年定國子監肄業貢監生俱聽監臣考選録送鄉試臨場不許改名改經是年敕直省甄文行兼優生員送監肄業禮部奏准聽監臣考課仍以貢監名色彚送鄉試又定國子監諸生鄉試中額八十六名謹案前明南北各有國子監北監生額中四十八名南監生額中三十八名我朝并南籍諸生中額于京師國子監故有是數八年世祖童皇帝視學廣本科順天鄉試國子監諸生中額十五名九年世祖章皇帝視學廣本科順天鄉試國子監諸生中額十五名十一年量定鄉試副榜名數以各省大小為額漢軍五名順天二十名江南十二名江西十一名福建浙江湖廣各十名山東河南各九名山西陜西四川廣東各八名廣西六名名次前列者送監充監生其前列以文字優長為主不拘經房仍將送監硃墨卷解部磨勘冒濫者考官參處十四年定各省監生在部候選各衙門厯事及恩拔嵗貢副榜官廕在監者一體科舉應試惟例監生于本年援納者不准應本年試又定國子監諸生中額照南北分卷直𨽻八府延慶保安二州遼東宣府山東山西河南陜西四川廣西為北卷試卷編北皿字號江南江西福建浙江湖廣廣東為南卷試卷編南皿字號照應試生多寡之數各定中額十六年定監生援納在前而部文劄監于科舉年方到者仍許應試十七年減順天鄉試中額國子監諸生中額祗存四十三名康熙八年聖祖仁皇帝視學廣本科順天鄉試南北皿字號中額八名三十二年定各省捐常平倉事例監生准應順天及本省鄉試三十五年稽察北闈冒籍先是在監肄業者願應鄉試取京官印結在吏部候選者由吏部送監仍取京官印結即許録科未免濫收滋弊至是部議准惟雲南貴州四川廣東廣西福建湖南甘肅八省仍取正印官印結或同鄉官保結許與録科其餘各省非取本籍地方官印結即不准收是年增順天鄉試南北皿字號中額十四名三十九年定各途貢監生由監鄉試者國子監收録分别官民卷又定各途貢監生有願在監入場者俱由監録取祭酒等力行考課之法平日考課不缺者方准鄉試若臨期始到不許入場四十一年增順天鄉試南北皿字號中額八名四十二年詔廣四十四年順天鄉試南北皿字號中額七名五十年增順天鄉試南北皿字號中額十三名五十三年定各省貢監生願赴京闈者于鄉試前一嵗取本籍印文到部劄監六十一年定貢監生自鄉試本年正月為始月課季考無缺仍取連名互結並本堂助教等官結狀方許入場有頂冒者事覺論如律雍正元年詔廣本科順天鄉試南北皿字號中額二十名謹按時中省廣額二十名順天鄉試南北皿視此二年世宗憲皇帝視學廣本科順天鄉試南北皿字號中額十八名兼習五經者復加中四名又定欽天監監生生員入貢監中編皿字號應鄉試六年禮部議准外省貢監生令本籍地方官取本生地鄰甘結加具印結付本生親賫到監倘由府司轉達恐各生守候需時應照定例令州縣核給印文七年命貢監生員考取小京官筆帖式者得一體鄉試又諭各省拔貢來京者准以貢單應北闈鄉試其各館修書願應試者取同鄉京官印結移送順天府鄉試續經監臣奏准拔貢等並取同鄉官印結送監查明録科移送順天府鄉試又禮部覆准生員俊秀援例入監或送監讀書或在籍准作監生其不應試者往往于鄉試年以監照借人頂名入場應飭各省于捐納後行文取結時即令其親書不應試三字于結以便查驗又酌定現在肄業生在雍正六年未經定例以前到監者仍照舊例取具同鄉官印結五生連名互結由監察核移送順天府鄉試八年增設闕里聖廟執事官定其品級命衍聖公于孔氏子孫內選擇人品端方威儀嫻雅者報部充補若屆鄉試之年有情願入場者准以監生入場應試九年户科給事中周祖榮奏准八旗貢監生僅取馬步箭合式即准應試誠恐文理荒疏者亦得幸進應令國子監𫝊示八旗貢監生照例録科十二年定貢監生願赴京闈者無論逺近各省俱照定例取具本籍地方官文結送監乾隆元年尚書兼管監事楊名時奏准本年在京新捐貢監生果係臨場期迫本籍途逺不能取地方官文結者應令取同鄉官印結並取同考五人互結録科送考又奏准應試諸生久寓京師覔館授徒勢難回籍起文嗣後如上科有本籍文結到監應過鄉試有案可稽者准令取具同鄉京官印結五生互結録送鄉試又定順天鄉試貢監向編皿字號者照㑹試分南北中卷奉天直𨽻山東河南山西陜西為北卷編北皿字號江南江西福建浙江湖廣廣東為南卷編南皿字號照舊額各中式三十九名外其四川廣西雲南貴州别為中卷編中皿字號每十五名取中一名零數過半許加中一名如綜計中卷人數不及十五名仍附入南卷毋庸别編中卷三年上親詣先師廟行釋奠禮廣國子監諸生本科鄉試中額十八名又定八旗官學生考取恩監者准録科應鄉試六年定漢算學生考取恩監者准録科應鄉試又左都御史兼管監事劉吳龍奏各省常平及陜甘二省遵例捐納之監生取有實收而捐册未經到部不及換照向無應鄉試之例今諸生多有賫本籍文結或同鄉京官印結赴監籲請者得㫖許其録科應鄉試嗣後例監得以實收應試又定順天鄉試廣東貢監生入中卷編中皿字號其中額照舊例計算九年酌減順天鄉試中額南北皿字號卷各減三名中卷皿字號向例每十五名取中一名酌改二十名取中一名又兵部侍郎舒赫德奏准貢監生録科應令國子監官嚴加甄别務擇三場俱優者方准録送不得冒濫十六年命明年二月舉行萬夀恩科侍郎兼管監事觀保奏准稍擴成例如諸生于乾隆十二年鄉試曽取本籍文結而十五年取同鄉官印結應試者恩科准仍取同鄉官印結録送至本年新捐各生途遙期迫向例准據京官印結送考今十六年在京新捐貢監生去明年三月鄉試為期亦近請如本年新捐生之例又諸生有依親就館不及回本籍起文者准取所在地方官文結録送其正科鄉試並不得援以為例萬夀恩謹案乾隆二十五年三十五年恭遇科均照此例十七年定順天鄉試官卷中額南皿字號二名北皿字號二名凡應試不及十人改入民卷十八年祭酒陸宗楷奏准順天直𨽻貢監生定例由學臣録科惟在監肄業者由監録送若一概收考恐見斥于學臣者復求録于監臣嗣後除肄業貢監生外應概不准收録二十年詔來嵗江蘇報捐生員俊秀有願應試者若必咨部換照方准入場往返動需經月著照乾隆十六年浙江事例准以實收應順天各省鄉試其各省赴江蘇報捐者亦如之二十一年平定凖噶爾回部詔廣本科順天鄉試南北皿字號中額七名又祭酒陸宗楷等奏准甘肅報捐生員俊秀例將實收換給部照由本籍起文赴監方准録送惟是貢監換照例須季册到部後始行給發逮册到換照闈期已促不及回籍起文請照在部新捐之例取同鄉官印結准得録科二十二年詔國子監官於諸生録科時嚴加察驗以杜假冒濫行收考者録送之官議處二十三年定順天鄉試官卷中額南北皿字號照中省以十五名取中一名三十五年禮部覆准廣西學政童鳯三奏舉貢監生改習經書之例永行停止嗣後貢生生員及捐納貢監生曾應本年鄉試者令各衙門查現年所習何經登册備案其新捐貢監及新進各生皆以初次進場録科册注某經為定如有私行改經者察出照例治罪鄉試附元皇慶二年中書省定科場條目國子監學嵗貢生員及伴讀出身並依舊制願試者聽中選者於監學合得資品上從優銓注元史選舉志謹案元初耶律楚材史天澤並請以科舉取士事俱中止是年始定科場條目明年舉行鄉試又明年舉行㑹試國子生例與天下舉人同試禮部不須鄉試也然其為科目進身則一故録之以存一代規制至正二年廷試舉人賜進士及第進士出身同進士出身凡七十八人內國子生員十八人䝉古人六名從六品出身色目人六名正七品出身漢人南人共六名從七品出身元史百官志附録謹案仁宗皇慶四年始行㑹試至順帝至元元年罷至正二年復行之是後㑹試榜額或有增損而所取國子生員並以十八人為定額惟至正二十六年㑹試國子生加取至二十人並優其除授品秩而元之設科亦止于是嵗矣又案㑹試額取國子生十八人係至正二年所定續文獻通考誤以為至元六年不知是年正罷行科目且紀元已改至正也至正三年詔國子生下第不中者同終場下第舉人例授山長學正元史順帝紀謹案續文獻通考載此制作至元六年亦誤至正八年中書省奏國子監學每嵗取及分生員四十人三年應貢㑹試者凡一百二十人除例取十八人外請再取副榜二十人內䝉古色目各四名前二名充司鑰下二名充侍儀舍人漢人取十二人前三名充學正司樂次四名充學録典簿管勾下五名充舍人不願者聽其還齊元史百官志附録謹案㑹試副榜選舉志謂之備榜明凡鄉試舉子擇國子生及府州縣學生員之學成者儒士之未仕者官之未入流者皆由有司申舉資性敦厚文行可稱者應之明史選舉志謹案此洪武十七年頒行之制訖明世遵行故首録之先是仁宗以近年科舉太濫命禮部翰林院議其額數至宣宗即位禮部奏定各省鄉試中額北京國子監及北直𨽻共中式五十人兩朝典故正統元年南京祭酒陳敬宗奏言前吏部考除教職監生多僥幸列選不稱師模今後乞量寬解額以乙榜補之庶幾誨導得人賢才無滯詔從之辟雍紀事成化四年詔天下嵗貢生提學官考一等者方許與科舉南雍志成化七年內閣吕原子㦂由廕監補中書舍人乞應順天鄉試給事中芮畿不可帝特允㦂請其後以廕授舍人者俱得應舉焉明史選舉志嘉靖六年始命嵗貢生授教職三年教有成效者得與鄉試每省毋過五人南雍志嘉靖二十二年禮科給事中陳樂請嚴順天冒籍之禁凡嵗貢援例監生止得一入京闈後但許本省應試而京闈鄉試如各省法唱名辨驗俾不得混冒明太學志隆慶元年御史凌儒疏奏順天解額一百三十五名百名以收生員三十名以收監生五名以收雜流雜流無人多歸於監遇有嵗貢常痛抑之致例生多而貢生少竟成偏重之弊今後不得以嵗貢多而故抑如無雜流以四名歸學一名歸監公同酌議勿徇已私帝可其奏辟雍紀事謹案洪熙元年定順天鄉試中額五十名宣德中增至八十名正統中增至一百名景泰四年增為一百三十五名明史選舉志云慶厯啓禎間直𨽻試額始增至一百三十餘人與辟雍紀事所載互異附志於此隆慶元年提學御史耿定向請監生勿用皿字號以杜關節下禮部議行是科秋試監生中式者僅八人諸生大譁遮典試王希烈孫鋌道驅之祭酒吕調陽及臺省各有疏參論諸生互有異同喧呶莫辨詔刑部尚書孫植鞫之植謂祭酒専職即所奏姓名僉同者坐戍遇詔赦宥各衙門屬風聞一無所問讞上從之祭酒調陽免究司業金達罰俸二月監生編號如初同上隆慶四年祭酒孫鋌請增解額命禮部確議之尋詔增順天中額十五名不為例鋌又請解額內監生例中三十名雜流例中五名如雜流無人請以監生補其額若監生已中三十五名更不許額外多取從之同上隆慶四年禮科都給事中周詩奏請諸曹監生俱由國子監祭酒考送鄉試明太學志萬厯二十二年增順天鄉試中額二十名二十五年又增順天鄉試中額十五名皆不為例辟雍紀事謹案時以選貢集太學者多也萬厯三十四年御史孫居相以監生頗有懷挾請令科舉如舊制考選精通三場者方許入試不得濫取充數從之同上萬厯四十三年禮部議增順天解額十名同上天啓元年增順天鄉試中額二十名後不為例同上謹案時以登極恩貢集太學者衆也天啓三年禮部議恩例副榜每生員中百名截二十名監生五十名截十名為副榜廩凖貢監監凖貢選不得溢額以滋幸濫從之同上欽定國子監志卷三十五

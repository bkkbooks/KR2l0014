front:
  text: 欽定四庫全書欽定國子監志卷十五
  hash: sha256:43cae6856fe63cc0aa00aabde6173b7b29fc0283d2cd37263092a0f77a4e66ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_015-1a, image: WYG0600/WYG0600-0152a.png}
body:
  text: 禮三釋褐順治二年定毎科新進士臚唱後擇吉日狀元率諸進士詣廟釋褐先行釋菜禮先師孔子及四配以一甲第一名主獻東西哲位以一甲第二名第三名分獻東西廡以二甲第一名三甲第一名各分獻諸進士俱隨班行禮禮畢釋褐更補服詣彛倫堂簪花飲酒如儀謹案諸進士俱帶鍍金三枝九葉頂冠不穿補服謁廟後更補服頂帶其一甲三名已經授職各服頂帶掛朝珠釋褐儀注是日清晨状元率諸進士至集賢門外下馬入持敬門詣致齋所贊引導由東角門入詣殿階下通贊贊排班班齊贊就位行謁見贊跪叩興三跪九叩畢通贊贊行釋菜禮禮畢由西角門出詣致齋所神庫前釋褐候祭酒司業朝服升堂諸進士由太學左門入至階下序立曾入監者升露臺四拜起立臺西未入監者露臺下兩拜祭酒司業俱坐受禮畢一甲三名由堂東門入執事者設食案于座前祭酒司業下座面南立一甲三名面北立執事者簪花斟酒一甲三名向上揖飲酒三爵出祭酒司業送至堂門内諸進士由堂西門入本監屬官接待簪花飲酒如前儀畢送出堂簷下釋褐事宜新進士釋褐先准禮部知㑹日期到監本監典簿具稿行文户部移取花紅香蠟酒果銀十五兩照例備辦屆期陳設與朔日同國子監則例釋褐附元中選進士賜恩榮宴於翰林國史院擇日詣先聖廟行舍菜禮第一人具祝文行事元史選舉志明萬厯二十三年定每科進士行釋菜禮先日太常寺備祭品兔醢棗栗蔬酒香燭于殿廡神位前是日清晨狀元率諸進士行四拜禮其巾服每襲巾一如唐制袍一用玉色羅為之木笏一靴一布襪一俱貯藏用所放榜前三日各赴監闗領釋菜畢乃解巾袍服官服謂之釋褐巾袍等送監騐収明史禮志崇禎十三年命將下第舉人與廷試貢士史惇等一百六十三人盡留特用於是惇等上疏請援進士例謁文廟行釋菜禮閣臣張四知以為不可上命如所請日下舊聞欽定國子監志卷十五

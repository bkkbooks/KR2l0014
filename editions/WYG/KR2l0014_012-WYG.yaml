邵雍司馬光朱熹張栻吕祖謙及故中書左丞許衡從祀孔子廟廷元史仁宗紀謹案周子等九人南宋俱經詔祀而復有是命者以元初制未祀也延祐三年秋七月詔春秋釋奠於先聖以顔子曽子子思孟子配饗元史祭祀志謹案曽子子思于南宋咸淳間雖躋配位而元初未用其制至是御史中丞趙世延言南北祭祀不宜冇異故有是詔至正十九年十一月浙江行省照磨胡瑜言揚時親得程門之傳李侗傳河洛之學以授朱子胡安國羽翼春秋蔡沈從學朱子發明書義真徳秀博學窮經踐履篤實俱應錫爵從祀廟廷二十一年七月下禮部及三院議至二十二年八月禮部定五先生俱贈太師不予從祀元史祭祀志明宣徳三年命禮部考正從祀先賢名位頒示天下從四川萬縣訓導李譯言也明史禮志謹案學典載此事于宣徳元年云山東徳平縣訓導年富言儒學文廟哲廡或置木牌或為塑像或封爵差訛或位次未序甚者闕而不置請依洪武定例重校刋布未知孰是正統元年夏閠六月丁卯正兩廡從祀名爵位次頒圖子天下學校南雍志謹案學典從忠州學訓導宋廣言也正統八年湖廣慈利縣教諭蔣明言吳澄不下許衡請予從祀下大學士楊士竒議行之明史禮志成化二年春正月追封從祀諸儒未有爵者南雍志謹案學典作三年六月從學士商輅之請今遵明史作是月追封者董仲舒胡安國蔡沈眞徳秀四人也成化三年二月浙江按察司僉事辛訪請以何基王柏金履祥許謙從祀下部議祀於鄉又六月侍讀學士劉定之以陳澔有功禮記請從祀不允學典𢎞治八年秋七月丁亥封宋儒楊時將樂伯從祀孔子廟庭明史孝宗紀謹案春明夢餘録作正統八年八月闗里文獻考作𢎞治九年者皆訛時祭酒謝鐸言楊時廢安石有功宜予從祀禮部尚書傅瀚沮之大學士徐溥力主鐸議乃祀于司馬光之次嘉靖九年四配神位改用木主髙一尺五寸廣三寸二分厚五分座髙四寸長六寸厚二寸八分赤地墨書題曰復聖顔子宗聖曽子述聖子思子亞聖孟子十哲神位木主髙一尺四寸廣二寸六分厚五分座髙二寸六分長四寸厚二寸赤地墨書題曰先賢某子某兩廡從祀先賢主同先儒主髙尺三寸四分廣二寸三分厚四分座髙二寸六分長四寸厚二寸赤地墨書題曰先儒某子某去一切封爵明史禮志謹案此改題神位之始又罷公伯寮秦冉顔何荀况戴聖劉向賈逵馬融何休王肅王弼杜預吳澄從祀明史禮志謹案洪武元年羅恢言公伯寮不宜從祀不報四年司業宋濓請黜荀况揚雄王弼賈逵杜預馬融從祀不允𢎞治元年八月科臣張九功言荀况馬融王弼揚雄得罪名教宜黜為禮官周洪謨所却翰林院侍讀學士程敏政亦言馬融劉向賈逵王弼何休戴聖王肅杜預八人雖有訓詁行不足稱公伯寮秦冉顔何與蘧瑗林放家語不載皆宜罷祀下禮部議侍郎倪岳言王弼之徒立身雖有可議然六經煨燼頼其講授經得復存七十二子名字自司馬遷來相沿已乆不可輕議十二年科臣吴英中亦請罷公伯寮馬融范寗荀况王弼之祀祭酒謝鐸又言吳澄不當從祀尚書傅瀚力詆之正徳元年何孟春又言公伯寮蘧伯玉不當從祀部議駁之至是大學士張璁縁帝意請正祀典下諸臣㑹議乃罷十三人從祀又祀林放蘧瑗盧植鄭衆鄭康成服䖍范寗於鄉仝上謹案𢎞治元年程敏政請祀鄭衆盧植鄭康成服䖍范寗五人于鄉蘧瑗亦宜祀于衛林放祀於魯張九功亦請罷瑗祀為周洪謨所却至是張璁請祀林放七人於鄉下諸臣議行又以申黨即申棖釐去其一仝上謹案正徳元年七月何孟春言史記有申黨家語有申績而皆字子周則績即黨也通典開元贈爵有申棖論語釋文鄭康成曰申棖蓋申續史記云申棠今棠為黨續為績訛冩無疑後漢王政碑云無申棠之欲是以棖為棠也索隱謂文翁圖有黨無棖是以黨為棖也二申並祀不已凟乎議上不允至是張璁言申棖宜去諸臣集議去黨而存棖焉又璔后蒼王通歐陽修胡瑗從祀仝上謹案洪武初王禕請歐陽修從祀不允𢎞治元年八月程敏政言后蒼有功于禮宜與王通胡瑗二人加爵從祀張九功亦言之為周洪謨所却至是張璁請四人與蔡元定從祀部議停蔡而祀四人焉又進陸九淵從祀仝上謹𢎞𢎞治十二年科臣吳英中請祀九淵於鄉至是從行人薛侃請從祀孔廟隆慶五年以薛瑄從祀仝上謹案𢎞治元年張九功請以瑄從祀詔祀于鄉嘉靖十九年御史楊瞻樊得仁又請從祀童承叙郭希顔沮之至是給事中韓楫御史馬三樂等交章請祀乃祀于吕祖謙下明史薛瑄𫝊作六年萬厯十二年十一月以王守仁陳獻章胡居仁從祀學典謹案先是言官屢請以三人從祀惟居仁衆議無異獻章守仁輿論不一禮臣陸樹聲持之甚力陶大臨議不能奪至是禮臣沈鯉請獨祀居仁而大學士申時行等内主守仁掲薦遂令三人併祀萬厯四十二年詔以羅從彦李侗從祀厯代祀典謹案學典先是三十七年福建學臣熊尚文請以二人從祀部議從之上命翰林院詹事府覆議至是始决羅祀東廡位朱子下李祀西廡位南軒上闕里文獻考作四十七年從福建廵撫丁繼宗之請崇禎十五年改左邱眀稱先賢明史禮志又改宋儒周敦頤程顥程頥朱熹邵雍張載六子稱先賢位七十子下漢唐諸儒上明史禮志謹案𢎞治十二年四月科臣楊亷請以宋五儒與聖門諸子接席于兩廡間超荀况等而處其上部議駁之至是詔議進六子之位僅於太學更置闕里廟庭及天下學宫未遑頒行也春明夢餘錄載是年十月部議以六子及董仲舒王通俱稱先賢禮志止稱六子不及仲舒通當從明史以上俱大成殿兩廡配饗從祀嘉靖九年定大成殿後别立室祀聖父叔梁紇以顔無繇曽㸃孔鯉孟孫氏配稱先賢某氏以程珦朱松蔡元定從祀稱先儒某氏仝上聖謹案此從祀之始先是宋洪邁元姚燧皆言顔父配饗路曽晳孔鯉廟庭之列次為失倫熊禾亦嘗建議宜别立一室以齊國公居中南靣顔路曾㸃孔鯉孟孫氏侑食之明洪武初宋濓王禕言顔子曽子子思配於殿而父坐庭廡子雖齊聖不宜先父解縉謝鐸程敏政先後言之皆不果行正統三年裴侃言文廟惟論傳道家廟宜正父子名分不正神不自安聖父元已進封於啟聖王請創殿大成殿西崇祀而顔孟之父俱封公惟伯魚子晳仍侯乞追封公爵偕顔孟之父俱配啟聖王殿帝命行之晳封號至是大學士張璁請闕里仍議加伯魚子大於殿後别立一室祀成聖父而以諸賢父配饗從祀詔可明年啟聖祠成從尚書李時言啟聖公祀儀視四配東西配位視十哲從祀視兩廡各列位次奉祀萬厯二十三年以宋儒周敦頥父輔成從祀啟聖祠明史禮志謹案從湖廣廵撫郭惟賢請祀於東廡先儒程珦之上以上俱啟聖祠兩廡配饗從祀欽定國子監志卷十二

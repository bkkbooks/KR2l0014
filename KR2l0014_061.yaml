  text: 欽定四庫全書欽定國子監志卷六十二
  hash: sha256:7a536c0745384996bea0a53005a1a664a78e6fd2e86558f0a627b77bba131997
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_061-1a, image: WYG0600/WYG0600-0747c.png}
body:
  text: 識餘二綴聞順徳人黄章年近四旬為博士弟子六旬餘試優補廩八十三嵗貢入太學康熈己夘北闈秋試年已百嵗大書百嵗觀場四字於燈令其曾孫為之前導順治間翰林王熙工國書後陞司業世祖恐其荒廢令與祭酒固爾嘉渾等皆以國語問答肄業生饒夢燕湖南人乾隆十年間假歸適遇苗匪滋事夢燕率郷兵殺賊有功湖廣總督叙功奏准加級謹案夢燕後以教習期滿選授縣令順天郷試由監錄送者有南皿北皿中皿字號第二名例取南皿中式名曰南元監中錄科取列第一名最利於郷試故有監元之稱國子監東西二㕔之下為六堂即諸生講習之所也雍正九年賜給方家衚衕官房一所題曰欽賜學舍在監之南故名南學而以衙署稱北學焉謹案國子監門逕自西而東由集賢左門進署自賜給南學後於前門照壁之左開便門以入南學尚未通車輿也乾隆二十三年重修國子監乃於照壁左右立柵欄門以通車輿又於集賢門左右牆間各立柵欄門自是從東直達署内不必由集賢左門進矣國子監兩廂官試俱在彞倫堂乾隆二十三年重修衙署遇郷試錄科在南學率性堂考試謹案乾隆二十三年就南學考試三十二年重修文廟堂正中安置彞倫先師神牌及四配十哲率性堂安東廡修道堂安西廡誠心堂收貯廟庫器物是年又遇郷試本監錄科季考月課俱在崇志堂康熈初裁兩坊衙門兼裁侍講翰林編檢必歴司業然後陞侍讀故是時為司業者率數月遷去康熈十四年復設坊局於是修撰編檢多陞中贊而司業與之較俸陞轉矣康熈間太學生周清原有詩名大學士馮溥見其雍試諸作目為竒才詩以贈之曰尊酒高齋話夕曛斗間佳氣識龍文十年閉户遲遊洛千里過都早不羣春草已看傳白傅飛花定見詔韓君九重側席今方切振筆蓬山為爾欣後清原果以博學鴻詞授翰林清原雍試諸作有太學白丁香詩句云月明有水皆為影風靜無塵别遞香一時傳誦都下上達宸聰比官翰林召見上猶誦其詩句奨之王士禎以順治庚子為江南同考官得崑山王朱玉後朱玉為博士有句云秋雨茂陵人獨卧西風汾水鴈還來士禎時為祭酒題其後云茂陵秋雨瀟瀟夜愛爾哦詩四壁秋多少長安苦吟客痩羊博士擅風流康熈己未遣太學生孫致彌往朝鮮采詩大抵律絶居十之九古詩歌行畧見梗概而已致彌後登戊辰進士官翰林文廟樹木俱太常寺種植彝倫堂甬路兩旁樹木則工部種植大成殿月臺甬路之東大柏樹二十六西大柏樹二十小柏樹一共四十七株大成門外東大柏樹四十五小柏樹三西大柏樹三十五小柏樹五共八十八株崇聖祠甬路東大柏樹三西大柏樹三小柏樹一大槐樹一共八株崇聖門外東大柏樹二西大柏樹一共三株土地祠柏樹一椿樹一桑樹一共三株彝倫堂月臺甬路之東大槐樹二小槐樹三大柏樹九小柏樹二十四西古槐一植自元時小槐樹三大柏樹七小柏樹三十九共八十八株敬一亭柏樹三槐樹四共七株東廂槐樹三紫藤一共四株南學率性堂槐樹二桑樹一修道堂後院桑樹一西院槐樹二誠心堂槐樹一桑樹一正義堂槐樹一公所槐樹二共十一株以上共二百五十九株綴聞附元延祐二年三月芝生國學大成殿五年七月芝生大成殿元史五行志至正二十年十月朔甘露降於國子監大成殿前柏木元史順帝紀國子監候日影到堂後梨樹散學金臺集明李時勉與陳敬宗同在翰林袁忠澈嘗相之敬宗儀觀魁梧時勉貌稍寢袁曳二人並列曰二公他日功名相將後二人同時為兩京祭酒明太學志徐有貞初名珵年十三謁國子祭酒胡儼儼時自矜重稱疾憑几見試珵詩即起循牀行大詫賞曰子自愛他日國器也名卿績紀國子博士徐楨卿神清體弱雙瞳燭人著交誡感暮二賦凌躐曹魏長宿驚歎稱為文雄國寳新編納粟一塗人輒輕之在庠士下乃羅圭峯七試有司不錄入貲北雍竟中解元會元人顧自立小試未足以定天下士也湧幢小品學正魏齡潮州人初至嘗侍祭酒李公時勉言曰昨聽選部中見羣衆相語但問某處地方好某地有出産不聞一人以施政教為言者皆若此天下安得治李聞其言甚善之謂予曰新學正有識能言諸人所不能言也魏後復姓李守官清白不受諸生贄禮果不負所知云彭文憲筆記丁夘冬湖廣永濟縣進須知官在途夢開黄榜第一名彭時國子監生其人至京言於永濟監生張本端本端訪知予姓名異之數與朋輩言之已而果然同上趙司成永號類菴京師人一日過魯學士鐸邸魯公曰公何之司成曰憶今日為西涯先生誕辰將往夀焉魯公曰吾當與公偕公以何為贄司成曰帕二方也魯公曰吾贄亦應如之入啟笥索帕無有躊躇良乆憶里中曾餽有枯魚令家人取之家人報已食僅存其半魯公度家無他物即載其半與趙俱往稱祝西涯烹魚沽酒以飲歡甚即事倡和而罷賢奕天啟四年八月署國子監祭酒禮部右侍郎蔡毅中監丞金維基博士門洞開鄧光舒王裕心助教張翰南徐伯徵姚士儒孫士裕董天允學正王永興蔣紹煃學錄聶翔杜士基典簿萬民憼典籍陳烈公疏劾魏忠賢上不問毅中既與璫忤四疏請告亦不許明史紀事本末天啟七年五月監生陸萬齡等請建魏忠賢祠於國學之旁謂孔子作春秋而忠賢作要典孔子誅少正夘而忠賢誅東林許之八月信王即皇帝位國子司業朱之俊劾監生陸萬齡等請祠魏忠賢國學宜罪命下獄同上上虞倪公元璐為祭酒時與温體仁忤將請告恵安鄭仰田者善拆字遇於官人席上初未通名倪取骰子中以緋飾四者予卜鄭曰京官四品而掌印者惟祭酒耳公其祭酒倪公耶公頷之復曰公必與當事者忤姓名中帶骨字者其人也骰子骨所成而四面稜角不能刓圓故知不合也又曰公意欲圖歸乎必得請矣骰體方類口四亦類口乃回字也後果然字觸欽定國子監志卷六十二

body:
  text: 藝文三論著太學祀典考序彭定求國家建興學校王祀夫子崇徳報功萬世無窮而淵源衍續舉夫羽翼經傳股肱大道者皆得與於見知聞知之列侑享光榮是以道統炳如日星學術炯於龜鑑固所稱六合同風九州共貫者然太學者四方之標準也王化之行自近者始辟廱典禮累朝崇重微獨楹桷樽俎軒懸佾舞之屬節文度數煌煌明備有非郡國之所埒即几筵之登降名號之異同遞經損益載在令典而四方猶未及周知志古學禮之士能不講明而究晰之歟仰惟聖天子稽古右文欽崇先師表章絶學俾四海萬年知所法程臣下幸際其時躬履其地夙夜祇承懼無以導揚萬一惟是顧瞻宫牆駿奔俎豆儼乎如接其人凜乎如親其範庶幾仰高景行之義而竊慮戛戛乎其難之也張君璿官典簿恂恂莊莊守職惟謹灌將祼獻之餘不獨循故事奉文書而已以祀典定於太學未有著為成書垂示藝林者因自先師以下遞及四配十哲先賢先儒按序臚陳綴集羣言裒輯􅍇蹟詳而有徵賾而有紀從此遐方近域得識聖朝化行首善禮制尊崇之盛且千載上下作述相承其所以正心修身牖民範俗者可以指掌而知披籍而在則凡為聖賢之徒臨之在上質之在旁宜何如其感發而興起也嗚呼今使志古學禮者盡如是亦誠足嘉尚矣哉余故於是書樂觀其成焉石鼓文跋朱彛尊石鼓籀文雖與大篆小異然離鐘鼎欵識未逺其為三代之物信矣而諸家或疑之馬子卿至謂宇文周所刻誠傖父之言也十鼓向闕其一皇祐間始得之歐陽永叔見之最早文存四百六十五字爾薛尚功則云歲月深逺缺蝕殆盡今欵識所載乃得之前人刻石者方之永叔僅多二字胡世將資古紹志録云所見者先世藏本在集古之前僅益九字至潘愜山作音訓時止存三百八十有六字而已楊用修謂從李賓之所得唐人拓本多至七百有二字又言及見東坡之本人多惑焉愚攷第三鼓潘氏音訓有􅏶衆既簡句古文苑脫􅏶字有衆字用修不取易以六師二字第四鼓潘本有四馬其冩六轡驁句驁上脱一字古文苑本驁作重文用修亦不取易以六轡沃若第五鼓霝雨上古文苑有二字薛氏施氏本則有天字用修亦不取増我來自東四字夫車攻狩於東故云駕言徂東東有甫草若岐陽在鎬京之西豈得云我來自東乎至於第六鼓因民間窪以為臼其上漫漶以諸鼓騐之毎行多者七字少者六字此鼓行僅四字上皆缺二三字用修每行增一字强之成文又如第七鼓用修增益徒御嘽嘽會同有繹或羣或友悉率左右以燕天子咸與小雅同文不知鼓文每行字有定數難以增益尢有異者鼓有文郭氏云恐是臭字古老反大白澤也用修遂以惡獸白澤入正文中其亦欺人甚矣攷賓之石鼓歌中云家藏舊本出梨棗楮墨輕虚不盈握拾殘補缺能幾何以一㳙埃禆海嶽夫以歐陽薛胡諸家所見止四百餘字若賓之本有七百餘字拾殘補缺亦已多矣賓之不應為是言也子瞻之詩曰韓公好古生已遲我今况又百年後强㝷偏旁推㸃畫時得一二遺八九糢糊半已似瘢胝詰曲猶能辨跟肘子由和之有云形骸偃蹇任苔蘚文字皴剥因風雨字形漫汗隨石缺蒼蛇生角龍折股夫用修之本既得自賓之傳自子瞻是子瞻克見其全子由亦得縱觀於子瞻子由又不應為是言也杜子美詩有曰陳倉石鼓久已訛韋蘇州詩有曰風雨缺譌苔蘚澀而韓吏部歌曰公從何處得紙本毫髪盡備無差訛又曰年深豈免有缺畫則石鼓在唐時已無全文故吏部見張生之紙本以為難得也吳立夫詩亦云岐右石鼓天下觀駱駝載歸石盡爛夫以唐宋元人未見其全者用修獨得見之此陸文裕亦不敢信由石鼓而推之用修他所考證吾亦不能已於疑無惑乎陳晦伯有正楊一編矣監本蘭亭跋朱彛尊書至右軍入聖右軍書至蘭亭而變化無方後人評品以定武本為最歐陽率更所臨也流𫝊有玉有石有棠梨板字有濶行有斵損有肥有痩有始肥終痩各本不同相傳石晉廣運中契丹輦歸棄之中道而榮次新言宋定國使金云在中京中京遼之南京金海陵改為中都即燕京也吾鄉沈先輩虎臣撰野獲編云萬厯乙酉丙戌間北雍治地得禊帖行欵肥痩與定武本畧同識者疑是廣運所棄石時長洲韓公存良官國子祭酒拓數百本遺友朋合之次新所述或即薛氏摹勒未可定耳石鼓記成徳予每過成均徘徊石鼓間輒竦然起敬曰此三代法物之僅存者逺方儒生或未多見身在輦轂時時摩挲其下豈非至幸惜其至唐始顯而遂至疑議之紛紛也元和志云石鼔在鳳翔府天興縣南二十里其數盈十蓋紀周宣王田於岐陽之事而字用大篆則史籀之所為作也自貞觀中蘇勉始誌其事而虞永興褚河南歐陽率更李嗣真張懷瓘韋蘇州韓昌黎諸公並稱其古妙無異議者迨歐陽文忠則疑自周宣至宋垂二千年理難獨存夫岣嶁之字岳麓之碑年代更逺尚在人間此不足疑一也程大昌則疑為成王之物因左傳成有岐陽之蒐而宣王未必逺狩豐西今蒐岐遺鼓既無經𫝊明文而帝王轍迹可西可東此不足疑二字至温彦威馬定國劉仁本皆疑為後周文帝所作蓋因史大統十一年西狩岐陽之故爾按古來能書如斯氷邕瑗無不著名豈有能書若此而不名乎况其詞尤非後周人口語韋李虞褚歐陽近在唐初亦不遽爾昧昧此不足疑三也至鄭夾漈王順伯皆疑五季之後鼓亡其一雖經補入未知真偽然向傳師早有跋云數内第十鼓不類訪之民間得一鼔字半缺者較騐甚真乃易置以足其數此不足疑四也鄭復疑靖康之變未知何在王復疑世傳北去棄之濟河嘗攷虞伯生嘗有記云金人徙鼓而北藏於王宣撫宅迨集言於時宰乃得移置國學此不足疑五也予是以斷然從元和志之說而并以幸其俱存無偽焉嘗歎三代文字經秦火後至數千百年雖尊彛鼎敦之器出於山巖屋壁隴畝墟墓之間苟有款識文字學者尚當寳惜而稽考之况石鼓為帝王之文列膠庠之内豈僅如一器一物供耳目奇異之玩者哉謹記其由來以告夫世之嗜古者祭酒司業題名記俞正健國家設學首重成均蓋化民成俗道莫先於此也欽惟世祖章皇帝尊崇儒術定鼎之初親臨講學我皇上右文重道御極之八載即躬幸辟雍又製訓飭士子文立碑太學雲漢天章作人壽考存神過化文治極隆時諸長貳於斯者率皆一代碩儒文章彬郁道德温醇故或入掌絲綸或出居方岳或鳳沼揚芳或鴻逵高漸數十年來麟麟炳炳照耀後先某等菲材承乏兹任喜遭異數永念恩榮謹輯國朝來兩廂姓名勒諸貞石以垂永久雖然名以官𫝊官以人重吾輩膺斯職者果克仰體聖天子育材至意正已率屬宏敷教化庶幾無忝師儒則名與官真堪不朽如或徒以官傳也後之覩斯石者稱斯人也其謂之何哉是則可警也已石鼓音訓跋李周望石鼓文本末諸家辨論甚詳唐貞觀以來蘇朂李嗣真張懷瓘竇䝉竇臮徐浩咸以為史籀手跡虞世南歐陽詢褚遂良皆有墨妙之稱杜甫八分小篆歌序歴代書亦厠之倉頡李斯之間韋應物石鼓歌云周宣大獵兮岐之陽刻石表功兮煒煌煌又云飛湍委蛇相糾錯乃是宣王之臣史籀作韓愈歌周綱陵遲四海沸宣王奮起揮天戈蒐於岐陽騁雄俊萬里禽獸皆遮羅鐫功勒成告萬世鑿石作鼓隳嵯峨梅堯臣呈祭酒吳公詩石鼓作自周宣王宣王發憤狩岐陽蘇軾詩舊聞石鼓今見之文字鬱律蛟龍走憶昔周宣歌鴻雁當時史籀變蝌蚪之數子皆好古名賢其言必有攷據朱子詩傳遺說曰石鼓有說成王時又有説宣王時然其辭有似車攻甫田恐是宣王時未可知由是觀之則石鼓為宣王獵碣史籀書迹無疑也始棄陳倉野中韓愈為博士時請祭酒以數槖駝輿至太學不果鄭餘慶遷之鳳翔文廟中經五代亂復散失司馬池知鳳翔輦至府學門廡下以木櫺䕶之而亡其一蓋散失後民有穴其中以臼者即今第六鼓也皇祐四年向傳師求得之十鼓乃足大觀中自鳳翔徙汴京徽宗以金填刻文初置辟雍後入保和殿靖康末金人輦至燕京剔取其金而置之王宣撫宅宅後即大興府學元大德十一年虞集為大都教授於泥土草萊中洗刷扶植皇慶元年集為助敎言於時宰置今太學大成門内左右各五為磚壇承之又為疎櫺扄鐍之三代金石遺文惟此而已崇實振雅二軒壁記李周望往予備員成均為司業方期振興文教修舉廢墜未期月遷翰林院侍講以去迨視學三楚事竣還朝復拜祭酒之命自甲午迄今屢膺教育人材之職異數有加其何以勝任而無負乎夫京師為首善要地師儒之官海内圭表典禮於是乎成賢才於是乎出而教習貢監諸生之執經請業者旅進旅退曾無憩息之所非所以居業也季試月考風雨寒暑授簡操筆未及卒業惴惴焉以禁城鎻鑰為憂非所以敬事也乃於彛倫堂後東廂左右構二楹焉其東軒曰崇實其西軒曰振雅明牕暖室筆牀茶竈几席簾幕之屬纎悉畢具諸生較藝角勝優游嘯咏思夫實則袪名雅則逺俗研精覃慮一以古人為準的而不屑屑於凡近則尋丈之地不為無補焉又懼人雜而事稠也更廣葺官舎而鼎新之使諸師分曹勤事庶幾各共厥職無相凌奪之意也昔宋儒胡翼之教授湖州設經義治事二齋俾之分居其中專心肄業其才皆可為世用後居太學其徒益衆太學不能容取旁官舎處之元儒許文正為祭酒亦大葺學舎令其子弟處各齋為之長儒教大興予何能方駕前賢惟是遭逢右文之世聖天子垂意辟雍樂育多士一時同官精白乃心協恭共濟予與諸生析疑訂義朝斯夕斯慶大化之有成也詎非承乏之幸歟若夫遵守規則久而弗替或加式廓焉則不能無望於後之君子國學禮樂錄序李周望成均典樂之職禮教之地也昉自虞廷其風尚矣周備四代之樂王畿之内號為辟廱蓋以明首善之義與鄉學不同秦火以後學校淪廢漢至元狩始議建於董生䇿中元成之世弟子增衆光武重興大學親臨講論立十四博士以授五經明帝習射養老章帝大㑹諸儒一時虎觀横經彬彬稱盛晉武雅尚儒術以賈馬鄭杜伏孔王何之徒分立八家儒學命張華劉實領之太常咸寧後乃立國子學以教貴游子弟東晉士夫習尚莊老流及六朝南北興廢無常至隋開皇國子寺始不𨽻於太常唐則六學皆歸國子宋增三館而學規之善莫或過於胡瑗焉三齋雜儀肇元許衡六堂考課沿明永樂日久漸弛僅屬空文皇朝定鼎京師振興文教世祖章皇帝視學釋奠百廢俱張我皇上生知好古重道崇儒御極之初即臨雍講學隆禮先師超越百代特製訓飭士子文立碑造就加意勸懲時際雍熙禮明樂備久道化成更修輯諸經闡晰性理辨别律吕審定元音集道統之大成作君師之極範近復升祔名儒増襲博士凡所以光輝俎豆鼓舞人材之典無所不至猗歟休哉士生金聲玉振之世獲漸菁莪棫樸之風良厚幸矣余自甲午承乏司業旋陞侍講即奉命校士全楚日與諸生撤幃講業務趨醇古以應昌期役竣復膺司成重任受恩汪渥報稱無由爰與方山謝公氷競共矢月吉宏宣聖訓督課惟勤而諸生文風亦日新月盛雖然國家儲賢養士豈徒以文章華國潤色鴻業云爾哉要求實行以資大用也余惟古之教士自小學以至大學既已身通六藝尤必陶養性情以為修齊治平之本春秋教以禮樂冬夏教以詩書入德有方修道有序興詩立禮成樂次第較然不可易也大史公適魯觀孔子廟堂車服禮器諸生以時習禮其家乃故事之可證者况國學賢關人材淵藪士列橋門之下而不辨禮儀樂奏之詳典祀損益之故又何以自立於儒雅之林備異日廟堂之選乎爰采志統諸書薙其繁冗少為編次録成一書以示諸生俾知國學禮樂所在斯須不可去身亟宜研窮義理考核名實禮以謹其節樂以發其和庶幾由博而約以漸臻乎希聖希賢之域仰承聖天子夀考作人之化行且比隆周室逺接虞廷漢唐以後曷足道哉是為序進士題名碑録序李周望科目用人由來舊矣周禮大司徒以鄉三物教萬民而賓興之又曰三年大比考其德行道藝獻賢能之書於王王拜受之登於天府誠慎之也誠重之也其人才則惟出於鄉國二學鄉學掌於鄉大夫而用之在大司徒國學掌於大樂正而用之在大司馬鄉士曰選士升於國曰造士大司馬所辨論則曰進士此三物賓興之典也漢世去古未逺舉士之制有三賢良孝廉博士弟子後世科目歲貢所由昉也隋大業時專以文辭試士曰進士唐用三科十九目其由學館者曰生徒由州縣者曰鄉貢皆升於有司而進退之其天子自詔者曰制舉所以待非常之才無常科也科目唐制亶其然乎天授初武后䇿貢士於洛城殿殿試昉於此宋進士諸科秋取解冬集禮部春考試合格者放榜於尚書省開寳六年殿試貢士遂為永制八年始分三甲熙寧貢舉新法罷詩賦專經義建炎以來兼用經義詩賦分作兩科元仁宗立經書取士法八月鄉試二月會試皆三場首場四書二經一二場詔誥賦表内科一道三場時務䇿一道書義用朱子章句集註而㫁以已意發明限三百字分左右榜䝉古色目為右漢人南人為左明洪武四年辛亥太祖始䇿問㑹試中式者於奉天殿賜一甲三人進士及第賜二甲進士出身賜三甲同進士出身以次授官十八年乙丑授一甲三人修撰編修俱入翰林使二三甲進士觀政於諸司其在翰林承勅監等衙門者曰庶吉士至永樂二年甲申選二十九人為庶吉士在文淵閣讀書後惟翰林院有庶吉士其以及第第一人為狀元第二人榜眼第三人探花則仿宋制而是時士大夫又通以二三甲第一為𫝊臚其會試第一者曰會元鄉試第一者曰解元鄉試以子午夘酉年會試以辰戌丑未年後雖條例數更其大綱固不易也聖朝定鼎京師聲教訖於四海世祖章皇帝裁定科舉法制大備我皇上道隆徳盛夀考作人鼓舞振興不遺餘力而且範之以聖學教之以帝文久道化成與天同照以故得士之盛直躋唐宋元明而上之躒漢嫓周無與讓也太學題名碑記元僅有存者明代石刻隨缺旋補本朝自順治丙戌至康熙戊戌凡二十有八科惟壬辰乙未分滿漢二榜各三鼎甲及二甲三甲自後歴科仍合為一榜未嘗分也士既釋褐登朝則必題名於學師師濟濟接踵彚征取士至今日而極盛無以加矣我皇上御極以來揭榜已二十有一次後更不知凡幾非算數所能測也猗歟休哉聖世樂育之英材遍列於槐棘大僚前二三十年間先帝之舊臣參錯在位迨於今日無一非對䇿敭言於我皇之清問者矣或一門之内祖孫父子兄弟相繼而登膴仕或異姓之交師長𫝊其子弟層累以降源逺未分而並登華貴者更不可勝數也設入成均遊橋門所見穹碑林立莫不摩挲指顧曰某某以徳行傳某某以功業顯某某以文章詞翰稱奎壁光華先後輝映豈非千載之勝覽哉余夙稟庭訓繼蹟科目承乏司成濫登宫尹不敢忘䇿名所自謹録國朝歴科題名碑姓氏為初集俟次第增益使多士觀感踴躍咸知我皇教澤深厚文治郅隆以垂示無窮而元明舊碑之在辟雍者并附録之備考鏡焉是為序國學禮樂録序謝履忠考成周教士之制鄉學有六藝太學有四術六藝者禮樂射御書數也四術者禮樂詩書也雖教之詳畧不同皆以禮樂為先務至於敦和别宜化民成俗動四氣之和以著萬物之理則禮樂明備天地官矣禮樂之為用大矣哉顧歴代制作互有損益其存而可考者獨萃於國學我皇上聰明聖哲久道化成希天之學日新崇正之功大闡廣勵學宫超越前古士生其時莫不沐浴元化涵泳聖涯况乎領師儒之官持教育之柄其為感激思奮而潤色鴻猷誠有不能自已者矣大司成李南屏先生嘗為國子司業又典三楚學政日以訓士為孜孜今之復領成均也穆然深念曰時教必有正業孰有大於禮樂者乎於是殫心研慮纂為國學禮樂録一書明先師之統系揚御製之褒崇綱領昭然矣序世家列𫝊所以濬禮樂之源詳祀典述經志繪圖譜陳儀注所以備禮樂之事附以石鼓音訓見三代之軌物而岐陽之狩亦禮也綴以題名碑記則皆奉行禮樂之人也蓋先生之為是書也採擇廣咨訪切辨正嚴序次確即謭陋如予通懷商搉析疑訂誤至再至三娓娓不倦於是見先生虚公之衷不僅用之掄才造士而陶淑人心之雅意方且通億載而為津也余於先生為後進鉛槧之間無能為役適以戊戌春後先受事六館規條詳加釐正至於剔弊屏浮除囂振雅予於先生去私見持大公毋激毋隨共盟此心同勷厥職兩年以來人知重廉恥習禮讓士亦相敦以實行而不騖聲華皆先生維挽之力而予與有榮焉然則是書之成足以範士心興民行敬承聖天子中和之徳以溥斯世於仁夀之域而凡有志於禮樂者由此悉其源流而探其本末其所禆益豈止一時一人而已哉是為序石鼓文鈔序孫岳頒蓋聞六書初肇始變蟲魚八法相生未離蝌蚪篆籀開自史游實著金鍼之奥冊書定於許慎式垂玉尺之文載在鐘彛𫝊乎金石斯則伏羲創卦之歲即有成書神禹鑄鼎之年非無古畫藏諸汲冢不委殘灰列彼明堂猶存舊物者矣自昔岐陽薄伐閱武于田姬室中興成功告廟爰鑿石以作鼓遂鐫筆而播詞車攻馬同懋紀行狩之盛建旄設旐侈陳獲醜之多圭璧於焉會朝玁狁因之作貢龍文螭篆備典核以盡神斗錯星盤肆縱横而極勢文詞則申甫而下書法則李斯以前既已珍比和鈞非徒玩同琬琰洎乎祚移洛鎬西京之俎豆淪胥燄起咸陽東魯之詩書焚棄蕢桴土鼓盡沒寒烟郜鼎商盤半歸茂草譬之磬沈泗水奚來大吕之音劍躍延津欲化干將之質縱稱神物共付刼塵而况陵谷無憑興亡遞禪秦皇戰壘金鏃徒遺漢主離宫珠盤還碎年年荆棘不少銅駝處處荒陵頗多玉盎於是星移物換石爛溟枯鳥跡終埋龜文盡蝕張華望氣漫識龍泉柯萼登山還逢石篆始從陳倉之野得此蟲凋蘚剥之餘亟遷清廟之中置於左鐘右虡之列龍蛇糾錯自創一家甲乙斑斕僅存九數猶幸夜光終還乎合浦連城不碎於秦庭信有鬼神之呵競為符璽之守迨夫大觀紀歲再徙汴河天子臨雍仍登璧水苔㾗駁落藉金質以為相風骨嶙峋比銀鈎而加陗無何塵飛遼海馬牧中原㸑下焦桐半填溝壑廟中欹器頓委坵墟駝載於市駿臺前僅剥黄金一篋沉淪於躍龍池畔誰捫緑字千言嗣是碣石開宫燕山作室摉羅鴻寳無煩博士之上書䕶惜殊珍願聽成均以從事虚廊素壁同藏柱下之遺荒碣殘碑並映斗間之氣以迄聖朝應運定鼎燕山皇上乗乾舞干堯陛盂銘几誡備采掖庭河圖洛書日陳講幄旌旗出獵長楊細栁之郊玉帛來同黥面文身之國宜其崇兹法物嫓彼宫懸詰曲龍章配六堂之鐘鼓蒼凉鳥䇿照四庫之典墳自古已然於今為烈嗟乎日銷月鑠徒留黒闥之名地老天荒孰辨赤文之字淵源可溯猶餘愈軾詩篇意格難尋豈有鍾王墨本雖復桓榮稽古已遺斷簡之什三束晳補亡遑輯殘編於一二然而見中郎之鳥篆則傳觀咸訝其精覩安道之雞碑則好事羣驚其妙糢糊隻字尚抵千緡滅沒雙鈎還聞二雅非慿闡繹曷恃揣摩爰有髙陽才子䢴水名流獵志墨池走衞瓘一臺之譽弋情碧篆習中正八體之書薤葉韭花兼工刻畫爛銅破玉不廢雕鏤躡屩擔囊仿士衡之入洛攜琴載筆效司馬之遊梁偶客金臺閒尋石鼓摩挲蒼緑疑為脈望之留捫摸丹青無復金躔之聚因而剜苔剔蘚漸捜蒼頡之踪補缺拾殘直煉女媧之石得字三百以外歴年二千有奇亥豕交訛既精剖析魯魚同異必慎參稽假以三冬彚為一卷懸之都市駕吕覽之春秋播厥洛陽並太沖之詞賦陸龜䝉之小名片録未足比其宏通李萬卿之說苑一編奚能方其淹洽遺文可讀長為鳳閣之奇書古學斯傳永識龍鱗之初體太學十詠序黄叔琳古者典學教胄子教以直温寛簡變化其氣質即導以歌詩言志涵養其性情蓋温柔敦厚之㫖流連諷詠可以陶淑身心而播諸清廟明堂遂以鼓吹休明表章風化信乎詩之為教綦重而斆學者之所宜先也錢塘王先生分教諸生於太學授受餘閒倡為十詠三舎生翕然賡和成帙蓋人文所聚其英華之氣必有所憑而發以鳴其盛而宣其豫望古遙集觸景興懷既原夫教胄言志之義又足以導揚盛美則勿謂斯編無關於國家文治也門人邵子屺雲攜以就正於予予迴憶貳長成均已四十餘年橋門蒼翠石鼓嵯峨讀諸詩直依然昨日耳邇來棫樸菁莪蒸蒸日盛諸生更從王先生涵泳優游勉其未至而進於古行且聽歌鐘鼓篋揚風扢雅而觀教化之成矣謹案大學十詠一曰周宣石鼔二曰元代老槐三曰柏庭翠蔭四曰石井甘泉五曰兩序書聲六曰六堂燈火七曰長廊步雨八曰射圃歸鴉九曰輦道月明十曰橋門雪霽學正王雲廷所撰共五言律詩十首一時和者有陳憲祖等十四人集刻為一卷續刻進士題名碑録序孫嘉淦皇上御極之八年歲在庚戌㑹試廣額至四百名余既奉命為副考官而兼職司成因得觀諸進士釋褐於太學尋循例刋題名碑樹於橋門外甚盛典也考唐進士自神龍以來杏園宴後皆於慈恩寺塔題名他時有將相者則朱書其下宋世進士諸科放榜後綴行期集列叙名氏鄉貫三代書之謂之小録俱未鋟諸石也明自永樂二年命工部建進士題名碑於南京國子監十三年會試天下貢士於北京登科考謂是年即命立石國子監然今無有有之自宣徳五年林震榜始本朝自順治丙戌迄今豐碑林立繼此者三年一增人才之盛不可紀極是豈徒備故事示觀美已哉夫士生聖世貴能有所樹立以垂不朽耳題名一碑將使歴年久逺而睹其姓氏以考其德行事功文章之實賢不賢之蹟一一可指數焉是勸懲由此興法戒由此備也顧碑石既多不能家拓而存之蔚州宗伯李渭湄先輩為國子祭酒時爰彚録諸碑而鏤之板凡若干卷迄今十有餘年士風日益遒上人文日益衆多於是庚戌諸子謀所以繼李公之志者而問叙於余余曰是可使天下後世之出是途者循名責實思自樹立以無負國家興賢育才之盛心也爰樂為之書其縁起如此進士題名碑録序宗室德沛夫學以從政臨事始不茍執古制名於後能永傳故詩稱濟濟多士文王以寧書以君為元首臣為股肱蓋一體相需而後成也沛少嗜讀書不為章句學遨遊於六經諸史之間垂老䇿名輒懼不能臨事天子以沛尚讀儒書以少宰而兼祭酒且命教習庶常則成均翰苑皆所執也何敢讓焉考太學進士題名録倡於蔚州李公逮庚戌續刻則合河孫公序之今乙丑諸子又補刻近科所闕敬録世宗憲皇帝上諭一道冠之端若康熙己未乾隆丙辰兩科博學鴻詞姓氏咸依次編載又得明貢舉志於錢塘王孫芸家遂增入洪武乙丑戊辰辛未甲戌丁丑建文庚辰永樂甲申丙戌甲辰凡九科而自有科目之制甲榜於斯乃備蓋前録所無也沛時方纂修國子監志覈題名碑見存橋門外者元三碑為本朝吳祭酒苑於啟聖祠土中得者明七十六碑始永樂十八年李騏榜訖崇禎十六年楊廷鑑榜或謂始於宣德五年林震榜殆誤也其缺者惟萬厯八年崇禎十年兩碑耳國朝三十九碑始順治三年傅以漸榜以至今錢維城榜往見日下舊聞及他刻皆舛誤難據於是依各碑行列詮次分編監志第九卷可覽焉今復續刻是録録與碑相為羽翼俾科名與載籍傳述無窮然蹟其人或臧或否或湮沒而無可稱豈天使為之哉蓋其自為之耳今之君子列是籍者當思風生虎變非徒奮起於一時而所自樹立於身之前後者是在内外匪懈以媚一人俾繼起諸君無可指其名以為口實其殆庶幾嗚呼是本也良可畏哉良可畏哉從祀考沈徳潛禮云始立學者釋奠於先聖先師釋者曰先聖謂如周公孔子也先師謂凡先代明書之師也唐武徳中以周公為先聖孔子配享貞觀二年用天子禮樂祀周公於武王廟而升孔子為先聖顏子配之二十年詔以左邱明等三十二人左邱明卜子夏公羊髙穀梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭元服䖍賈逵何休王肅王弼杜預范寗配享孔子廟堂凡以報其傳注之功所謂代用其書垂於國胄者也開元八年以四科弟子閔子騫等列享二十二賢之上而其他七十子之徒俱得從祀曾參大孝坐於十哲之次重其徳也宋元豐七年始進荀况揚雄韓愈三人說者謂祀三人者為王安石配享王雱從祀地也政和三年封王安石為舒王配享殿上王雱在諸賢之次欽宗時從楊時請即行罷黜後并黜荀揚二人寳慶三年進朱子一人淳祐元年祀周子惇頤程子顥程子頤張子載四人景定二年祀張子栻吕子祖謙二人咸淳三年更升顔曾思孟之配而進邵雍司馬光二人元文宗時進董仲舒一人明成化三年祀胡安國蔡沈陳澔三人嘉靖九年進歐陽修一人而黜戴聖以下十有三人戴聖劉向馬融賈逵何休王肅王弼杜預鄭衆盧植鄭元服䖍范寗後更進陸九淵一人後更進元儒許衡一人而明儒薛瑄胡居仁王守仁陳獻章亦並從祀我朝聖祖皇帝以朱子有功四書章句及易本義詩傳等書躋十哲之次而進范仲淹一人位歐陽修右聖皇濬哲非議禮諸儒所能見及者也竊按唐武徳以後歴代所定從祀俱為平允惟明嘉靖時聽張璁議黜戴聖諸人實有未安蓋經學遭秦火以後散亡藏匿不絶如綫諸儒抱遺經於灰燼之餘箋疏注釋轉相授受以待宋儒之興專門名家各有所長此雖品行未純亦不得而廢之而况十三人中馬融敗行而外即何休范寗之徒亦無多闕失者耶則貞觀之制不宜盡改也抑又思自漢以來表章經學未經從祀者授易如田何授詩如申培授書如大小歐陽授春秋如胡母生傳魯論如夏侯勝傳孝經如長孫氏俱應增祀而唐儒如孔穎達顔師古王恭之徒注疏羣經功與漢儒相埒今擇其行之無闕者亦宜並祀抑又思卜子夏既列十哲之中則先儒二十二人已缺其一而六典國子祭酒司業條仍稱二十二賢於數不符相應改正酌而行之不傷於濫不隣於苛增吾道之光正經學之𫝊是在為禮官者論著附元國子學先師廟碑程鉅夫皇慶二年春皇帝若曰我元繼百聖之統建萬民之極誕受厥命作之君師世祖混一區宇亟修文教成宗建廟學武宗追尊孔子所以崇化育材也朕纂丕圖監前人成憲期底於治可樹碑於廟詞臣文之臣鉅夫拜手稽首奉詔言曰臣聞邃古之初惟民生厚風氣漸靡聖人憂之越有庠序校學之制天下之治胥此出焉中統二年以儒臣許衡為國子祭酒選朝臣子弟充弟子員至元四年作都城畫地宫城之東為廟學基二十四年備置監學官元貞元年詔立先聖廟久未集大徳三年春丞相臣哈喇哈斯逹爾罕大懼無以祇徳意乃身任之飭五材鳩衆工責成工部郎中臣賈馴心計指授晨夕匪懈工師用勸十年秋廟成謀樹國子學御史臺臣復以為請制可至大元年冬學成廟度地頃之半殿四阿崇尺六十有五廣倍之深視崇之尺加十焉配享有位從祀有列重門脩廊齋廬庖庫為楹四百七十有八學在廟西地遜於廟者十之二中國子監東西六館自堂徂門環列鱗比通敎養之區為間百六十有七制加孔子大成之號祠以太牢贊釋奠雅樂江南復户四十𨽻之春秋二祀先期必命大臣攝事皇帝御極陞先儒周敦頤程顥程頤司馬光張載邵雍朱熹張栻吕祖謙許衡從祀選弟子員三百進庶民子弟之俊秀相觀而善業精行成者歲舉從政又詔天下三歲一大比興賢能於是崇宇陞陛陳器服冕聖師巍然如在其上敎有業息有居親師樂友諸生各安其學咸曰大哉天子之仁至哉相臣之賢工曹之勤其知政治之本原矣臣竊謂天地至神非風雨霜露罔成其功斯道至大非聖君賢相罔致其化人性至善非詩書禮樂罔就其器列聖相承謂天下可以武定不可以武治所以尊夫子建辟雍復科舉誠欲人人被服儒行為天下國家用耳然則黎民於變時雍顧不在兹乎於戲隆哉臣鉅夫謹拜手稽首而獻頌曰皇元受命誕惟作京以撫萬邦既訖武功載修文教登其俊良於穆宣聖垂範罔極道尊而彰曰爾胄子弗典於學曷風四方學以聚之廩之餼之日就月將大徳嗣服迺建孔廟迺經辟雍考制程材審時相宜遹成厥功辟雍洋洋冕服皇皇羣士景從聖道既明渙號既加我皇御天執中之道軌物牖民翼翼乾乾帝學益宏庶和惟和我化用宣躋祀儒師賓興羣材丕紹厥先相古盛時訏謨逺猷罔不由賢天錫皇祖神聖文武以有萬國威何不加令何不行何求不獲惟學是務惟材是育下民允迪越厥左右咸有一徳以匡乃辟維帝時憲惟臣克念濟濟茂碩禮明樂備永作神主播頌無斁雪樓集賈侯修廟學序吳澄世祖皇帝既一天下作京師於大興府之北其祖社朝市之位經緯塗軌之制宏規逺謀前代所未有也至元二十四年設國子學命立孔子廟暨順徳忠獻王哈喇哈斯相成宗始克繼先志成其事而工部郎中賈侯董其役廟在東北緯塗之南北東經塗之東殿四阿崇十有七仭南北五尋東西十筵者三左右翼之廣亦如之衡達於兩廡兩廡自北而南七十步中門崇九仭有四尺脩半之廣十有一步門東門西之廡各廣五十有二步外門左右為齋宿之室以間計各七殿而廡廡而門外至於外門内至於厨庫凡四百七十八楹肇謀於大徳三年之春訖功於大徳十年之秋於時設官教國子已二十年矣寄寓官舎不正其名丞相以為未稱興崇文教之實也乃營國學於廟之西中之堂為監前以公聚後以燕處旁有東西舎夾之東西各一堂以居博士東堂之東西堂之西有室東室之東西室之西有庫庫之前為六館東西嚮以居弟子員一館七室助教居中以莅之館南而東而西為兩塾以屬於門屋四周通百間踰年而成不獨聖師之宫巍然為天下之極而首善之學亦偉然聳天下之望逺邇來觀靡不驚駭歎美其高壯宏敞蓋微丞相其孰能贊聖天子之徳意而微賈侯亦孰能闡彰賢宰相之盛心哉侯之董役也晨夕督視不避風雨寒暑措置分畫一一心計指授工師莫能為焉陞本部侍郎又陞本部尚書出領他處營造事身雖在外心未能忘廟學也至大二年還朝拜户部尚書首詣廟學環匝瞻顧如其家然嗚呼世之居官者大率簿書期㑹刀筆筐篋是務知政治之有原名教之可宗者幾何人哉人咸以為迂而侯拳拳汲汲惟恐或後蓋其資識卓矣候少時為憲府屬憲長誣其副柄國者仇正直欲置之死數十人皆將連坐證左迫於拷掠悉附和以成其誣侯與在數中獨守正不阿狥淹繫三載卒不變移受誣者藉是得脫自户部尚書而參議省事也會有羅織之獄侯議詳讞大忤時宰幾與同罪賴救解以免嗚呼侯之為人如此宜其於聖道儒術深有契也非資識之過人而能之乎侯每以范文正期國學諸生澄聞而媿輒面赤汗下夫文正之為文正無他亦曰先天下之憂而憂後天下之樂而樂耳嗚呼安得人人不負侯之所期者哉侯名馴字致道濟南鄒平人將歸其鄉故著侯之所以有績於廟學者為頌至大四年三月朔國子監丞吳澄序詩曰於赫皇元澤彌八埏翼翼京師風化攸先孔道昌明千古日月帝曰廟之以對光烈顯允龎臣欽輔神孫祖訓是承往聖是遵相謂而馴而職而職乃基乃搆乃墁乃甓侯祇相言弗懈以䖍新宫巍巍有倬其騫宫牆之西學宫爰作我宏爾居爾懋爾學爾士來遊四方具瞻爾則匪遙像貌肅嚴恂恂賈侯克敦克敏孰挫其廉孰混其畛一正不阿百折不回族斯糾紛剸之恢恢廟學之崇天子之徳丞相之功賈侯之力草廬文集崇文閣碑吳澄國朝以神武定天下我世祖皇帝以武之不可偏尚也廣延四方耆碩之彦與共謀議遂能禆贊皇猷修舉百度文治浸浸興焉中統間命儒臣敎胄子至元中備監學官成宗皇帝光紹祖烈相臣哈喇哈斯欽承上意作孔子廟於京師御史臺言胄子之敎寄寓官舎隘陋非宜奏請孔廟之西營建國子監學以御史府所貯公帑充其費迨至仁宗皇帝文治日隆僉謂監學櫝藏經書宜得重屋以庋有㫖復令臺臣辦集其事乃於監學之北構架書閣閣四阿檐三重度以工師之引其崇四丈有一尺南北之深六尋有奇東西之廣倍差其深延祐四年夏經始六年冬績成材木瓦甓諸物之直工役飲食之費一皆出御史府雄偉壯麗煥然增監學之輝名其閣曰崇文英宗皇帝講行典禮賁飾大平文治極盛矣臺臣請勒石崇文閣下用紀告成之歲月制命詞臣撰文臣澄次當執筆今上皇帝丕纂聖緒動遵世祖成憲於崇儒重道惓惓也㤗定元年春誕降俞㫖國子監立碑如䑓臣所奏臣澄謹録所撰文以進臣聞若古有訓戡定禍亂曰武經緯天地曰文武之與文各適所用然戡定禍亂用於一時而已經緯天地則亘古亘今不可無也何也日月星辰天之文也山川草木地之文也人文與天地相為經緯則亦與天地相為長久而可一日無也哉我世祖匆匆用武日不暇給而汲汲崇文惟恐或後此其髙識深慮度越百王宏規逺範垂示後世以為聖子神孫法程夫豈常人所能測知蓋創業之初非武無以弭亂守成之後非文無以致治武猶毒藥之治病病除即止文猶五穀之養生無時可無也有文治之君必有文治之臣文治之臣茍非敎習之有素彼亦惘然孰知文之所以為文者故建學以興文敎暢文風涵育其人將與人主共治也斯文也内而修身齊家外而治國平天下言動之儀倫紀之序事物理義之則禮樂刑政之具凡燦然相接煥然可述皆文也古聖賢用世之文載在方䇿不考古人之所以用世不知今日之所以為世用者然則聖朝之崇文豈虚為是名也哉閣之所庋古聖賢之文也立之師使之以是而敎設弟子員使之以是而學敎之而成學之而能則游居監學者濟濟然彬彬然人人閑於言動之儀詧乎倫紀之叙博通乎事物理義之則詳究乎禮樂刑政之具他日輔翊吾君躋一世文治於堯舜三代之盛由此其選也夫如是其可謂不負聖天子崇文之明命休徳已若夫不能潛心方冊真有得於古聖賢之所謂文而涉獵乎淺末炫耀乎葩華曾是以為文乎上之所崇下之所以為世用者蓋不在此同上國子學告揭大成新匾文吳澄維京師立先聖廟既落成之二年今天子嗣位乃加封大成之號恭惟先聖道徳髙厚與天地參為萬世帝者師聖君賢相於位號廟祠務致崇極以風四方廟之堂曰大成之殿廟之門曰大成之門雖因前代之舊然大成二字實今天子所賜匾以斯名施之於今尤為宜稱日吉辰良爰揭新匾於殿之前門之外俾尊慕先聖入其門升其堂者得所瞻仰焉謹以潔牲醴齊用申䖍告同上國子監後圃賞梨花樂府序虞集至大庚戌之仲春大成殿登歌樂成時雨適至我司業先生樂雅樂之復古顧甘澤之及時於是乎賦喜雨之詩推本歸功於成均之和迺三月辛巳國子監後圃梨花盛開先生率僚吏席林亭之上尊有醴盤有蔬肴胾雜陳勸酬交錯飲且半命能琴者作古操一闋禽鳥翔舞雲風低徊先生於是歌木蘭之引以寓斯文之至樂而詠聖澤之無窮也明日僚友酌酒而賡之又明日諸生之長酌酒而賡之氣和詞暢洋洋乎盛哉虞集起言曰古之敎者必以樂故感其心也深而成其德也易命大夫者猶與之登髙賦詩而觀其能否兹事不聞久矣今吾師友僚佐乃得以講誦之暇從容咏歌庶幾乎樂而不淫者亦成均之義也命弟子輯録為卷以貽諸好事者可覽觀焉道園學古録崇文閣上梁文蒲道源我瞻四方京師為首善之地若稽三代國學乃宣化之原皇帝發政施仁仰繩祖武右文尚徳創設儒科政府揚休期大猷之是闡中臺集議懼缺典之未興以為教胄子既有成均尊聖經可無傑閣欽承上㫖大發積緡官不科需用咸資於素畫農無妨作役盡募以閒民朝士程功梓人奏伎前瞻離位後鎮坎宫雲漢昭回菁莪樂育圜橋門之冠帶藏闕里之詩書擇吉旦而舉虹梁協衆誠而修燕賀伏願上梁之後朝廷清謐禮樂興行洋洋藹絃誦之音濟濟登茹連之士本集國子監營繕官舎記陳旅至順三年春南陽富珠哩先生以集賢直學士兼國子祭酒監有隙地在居賢坊大徳中有司議以建學餘力築屋以舎師儒不果也明年五月以中統楮泉二萬餘緡筮吉日籌工度費除地東北畫為四區區各立屋五間中三間為居室旁兩間為肅官具饔之所宅之門以東西門之衖以南北衖北距通衢立大門衖南羨餘壤可藝蔬東浚井西置屋居𨽻者使掌大門之管以贏資治舊宅二區之在坊中者其西圯甚易敗桷腐菼補以新瓦而塈塗之旁起屋如北坊之制東宅西偏作室像舟可居琴書東南作見賓之室曰賓庵七月經始九月成安雅堂集明進士題名記楊榮永樂辛丑實皇上正大統之二十年先是上巡狩北京營建都邑至是告成春正月元日乃御奉天殿受朝萬國來同景命惟新而是歲適當會試貢士之期領鄉薦而萃京師者三千人禮部拔其尤者二百二人三月朢日上臨軒䇿試越二日以曾鶴齡為第一劉矩次之裴綸又㳄之賜進士及第餘賜進士出身有差掲黄榜於長安門外公卿大夫暨士庶人咸謂都邑肇建而人才彚進如此夫豈偶然哉莫不懽忻鼓舞以為目覩盛事誠曠世之嘉遇也有司復進題名於國子監上命臣榮為記臣惟昔周之武王遷都於鎬講學行禮以宣敎化以作新人才而其子孫傳緒至於永久蓋啟之者有其道也方今都邑告成之日聖天子諮詢治道登進賢良以隆文明之運迓千萬載之太平斯世斯人亦何幸歟諸君子遭際明時題名於太學太學賢才天下公論所自有其名宜有其實以副之詩曰古之人無斁譽髦斯士皇上之盛徳也又曰濟濟多士文王以寧是尚有望於諸君子其勉之哉臣榮謹記兩京類稿謹案明進士題名往往命閣臣作記亦有不撰記者即題名篆額之下今舊碑有記者凡五十四通命意大率相同無甚闋考證故不具録存此以例其餘國子監題名記張業職教太學者總之以祭酒貳之以司業弼之以監丞分之以博士助敎學正學録而典簿典籍掌饌則有司事也國朝自永樂中建兹太學官者非一人久而將泯其名氏乃成化丙戌秋河東邢公自翰林出為祭酒興廢舉墜昉刻示其名氏於石司業安成張業記之曰國家以賢才為元氣賢才盛則盛賢才衰則衰太學者賢才所由以盛衰者也果孰使而為之耶豈氣運之不齊人性之不一哉係於師道之賢否耳使為師者誠如古之太學所以敎人者先盡之已而後推以敎人又如學記所謂知敎之所由興廢道而弗牽强而弗抑開而弗達長善而救其失以是樂育天下之英才坐春風化時雨成徳達材相與薰陶於語言文字之外鼓舞於鳶飛魚躍之真則賢才之盛為何如也若乃老無所憲言不乞假模不模範不範蔑敎誨之本末計利禄之厚薄以是為納垢藏疾之所則朝廷將焉用之豈但為賢才之蠧已哉興言及此而不動心而内愧者何人也耶由今溯之自漢而下歴千餘載官太學者不可勝紀然祭酒如韓昌黎楊龜山許魯齋者幾人司業如孔憲公楊諫議吳草廬者幾人他官如胡安定孫泰山者幾人其垂芳青史足以激厲後世而挽迴頺波者良可慕也我朝官於是者其間固有立師道如韓楊諸君子者矣至為賢才之蠧而有愧於諸君子者亦豈少哉嗚呼後之視今猶今之視昔誠哉是言也自時厥後吾黨識此者其相與懲戒之哉碑文書國學羣書殘編後何喬新元有天下垂百年頗崇儒雅經籍之版藏於國子監者甚富天兵入燕百司安堵經籍庋置如故無毁棄者宣徳以來典守者不以為意蟲䑕蛀齧之餘膳奴監𨽻或竊以宿火殘脱磨滅百僅一二者存焉然其存者字畫既妙刻手亦精非今書坊鹵莽之比雖殘章㫁簡使人把玩不忍釋手今大司成京口費公惜其可寳而不完也乃模印裝禠共為一帙間以遺予予閱之如夏小正考儀禮逸經江文通文集皆今世所不傳者又其字偏傍多用古法精緻可愛因題其目曰國學羣書殘編時出而覽之亦足以佐嗜古之癖昔人有得漆簡者寳而藏之此編豈徒漆簡之比哉迺書以示後之人何喬新文集新立祭酒公館記林瀚自昔祭酒無公館先後任是官者皆僦屋以居宏治三年冬予以春坊諭徳拜命涖任亦就征南將軍黔國公第居焉歲入白金八兩以為常越五載甲寅秋乃以日膳之資積於公帑者百三十五兩購文廟第三巷郎雄指揮舊宅一區謀之司業安成劉公震委監丞林大猷經營其事復專令掌饌王永董其役撤舊而新之增以第二重三間逮落成計所費與所購之直等焉明年乙夘冬再建第五重三間又明年丙辰秋復建門樓二間所用視前購之直又等焉以間計二十有六深可二十丈許廣則前狹而後張東西界以垣前一槐則戊午春予手植東石橋亦是春給工五兩修焉予始遷而居公卿大夫多載酒落之曰盛哉此舉前所未有也己未秋余轉吏部侍郎庚申夏進南京吏部尚書當辭聖廟之任司業黄公珣方署太學印章命典籍徐英請記其事遂撮是館之始末用夀諸石俾後賢踵居者或遇敝漏則出膳資修葺以待後賢不必計所費而責償後賢又以此而待夫後賢則斯館當與廟學同存矣庸記此以起後賢之思林瀚文集跋吏部舉薦謝祭酒咨文吳寛台南謝方石先生在宏治初以翰林侍講擢南京國子祭酒一時以為得人未幾先生移疾去屏跡山中著書自樂絶意仕進而言者以先生學行純正宜表率當世薦章交上上深納之然不欲煩以吏事也前三年會祭酒缺吏部遂以先生擬上而先生具疏再辭不獲命始勉就道既至諸生皆以為得師而士大夫則賀朝廷之得賢也方先生起用時吏部有咨文三通其弟業從之來取其詞剪帖成卷持以相示寛覽之非特見先生之賢又以見下之見賢能舉上之得賢能用而式克欽承之意又於大臣見之嗚呼何其盛哉其謂之咨文者文移之體云爾初通有寛押字蓋寛時佐吏部也匏庵集成均觀善録序湛若水成均觀善録録觀善也曷為乎録觀善也記曰相觀而善之謂摩夫物不獨成成不獨善二物相摩然後至精至善者出焉夫物則亦有然者矣而况於人乎而况於為君子者乎甘泉子曰以吾觀於成均堂班之制以相習而知王道之易易也昔者帝王之世比屋可封人人有君子之行非其性成之也其習則然也比閭族黨之相習習而成之於變化也故變化之道自士習之風始矣夫成均之制有堂焉有班焉堂相觀於堂也班相觀於班也班相觀於堂堂相觀於師也而先王徳行道藝之敎成矣是以録之觀有八善焉出入觀其善相友也徳業觀其善相師也作事觀其善相法也容止觀其善相觀也進退觀其善相度也過失觀其善相規也氣質觀其善相薰陶也徳性觀其善相涵養也予故曰録之觀有八善焉此之謂也匪直八善已也觀善之録有四益焉有名有氏有祖考有籍貫焉曰何居退則觀其養焉仕則觀其行焉世則觀其顯揚焉居則觀其鄉里焉毋以退而索居離羣而所養之不今若也毋以仕而怠事盜貨而行之不今若也毋以弛於立身行道而遺父母羞辱玷斯録之世芳也毋以貨敗官他日不齒於其鄉里而忝斯録之籍貫也諸生行八善兼四益然則斯録者蓋相觀相厲以入於至善之歸聖賢之域者也六堂諸生仕藻等詣甘泉子請書於録之首簡甘泉子曰嘻諸生其共勉之予夙有所試矣甘泉集重修祭酒公館記張衮予自遷官太學舎旁有一宅蕪穢不治吏告予曰此祭酒公館也棟橈壁壞不可居矣予造觀焉壁間碑記前南京吏部尚書諡文安三山林公所撰公在宏治庚戌嘗為祭酒正已率物敎行化浹太學至今諷誦之堂乃公所别建非所居之舎也公記未嘗及此嘉靖甲午公子少司空廷㭿嘗一葺之未幾而堂以不守易壞予因謀諸司業王公同祖曰文安故迹聲望累朝教化所從以出可使棄弗治已乎於是召匠計庸審材闢土請於司空以舉事飭修太學之餘錢若干緡佐之甃基累址撤故從新肇工壬寅夏五月己亥訖於秋七月乙夘凡三閱月有奇重軒閎宇堅甓良材黝堊煥若加於舊觀前為門三楹繚以周垣堂之後為亭一座霤四角中虚而外厰賓客有位游息有所今所增飾也予嘗聞之髙明燕憩之具君子資焉皆足以發聪明而助内省宋儒張伯玉亦曰先王之敎化欲人易入也創物揆制郁乎聲名文采之盛先以聳觀其耳目然後清發其神明之府庶幾不勞而有功由是觀之堂構之葺與否若於敎化宜不甚急而政體所關意向所指予猶不敢或後况其所當先勉者乎堂既成羣公來歌來游舉酒落之予退而與諸生揖讓其中仰前人之遺矩風範若存而考徳辨業求不墜於聖人之道以思所謂髙明者則斯堂也亦有以警於予矣是役也大司空西蜀甘公為霖實興起之董其事以底於成者營繕郎中周君如砥也爰刻詞於石置諸右壁與林公碑記並傳云明太學志國子監祭酒司業題名記孫應鼇我太祖平元亂即於歲乙巳建國子學暨成祖定鼎北平南國子仍舊制弗革乃改北平學為國子監首命大學士胡公儼自内閣出領監事其崇厥任如此成化丙戌河東邢公讓列前人名氏俾有考凡監丞以下俱附入歲久石既盈隆慶丁夘鍾陵萬公浩又為碑續䥴嘉靖以來名氏石又盈於是謀諸新城沈公復戒工礱石裒二碑所載祭酒胡公儼始司業自趙公季通始補其遺正其訛彚稡二碑咸虚左方以俟來哲監丞以下官繁人夥不能盡紀故不與鐫告成予因再三覽鏡之凡諸長貳於斯間有聲光泯閼者不論迺如或以道徳聞或以節義著或以文章顯或以勲業楙彬彬然前修達軌實多其人皆予之願學未能者抑何盛也蓋是官之重久矣國家興治以人造人以師師得則得人人得則得治古今一揆未有能易粤稽人才最盛無踰唐虞亦無踰成周觀虞書司徒以五典敷敎典樂兼以四徳敎胄子周禮師氏以三徳三行敎國子保氏養國子以道敎之六藝六儀其立敎之慎如此則為之師必得其人可知也當是時成徳吉士彰且有常至百僚庶位如思齋所謂譽髦斯士成人小子莫不有徳有造其人才之盛如此則治化可知也肆我太祖諄切命國子師正心實學崇徳重義檢身飭行率屬訓士不專於文詞記誦成祖申諭師範務先正已講學漸磨以養心淑身斯其㫖與成周何異一時俊乂超軼前代有繇然矣顧邇年士習缺多靡薄儻􅛅不逮疇昔自予代匱來仰稽成憲毎廢格而不張俯察羣情率玩愒而難振即欲稍缺令期有以廣厲之恐本之則無終不克宣序化條缺職辦頃皇上幸臨詔官師諸生體行六經毖勔斆學屬望缺原翊贊文明之治甚篤風聲攸樹敬應自不缺莫能對揚休命誠願嗣至之大雅君子紬繹徳意率育英才共惇尚根實還二祖時作養之舊遹追虞周則予雖以不肖厠名兹石竊亦與有寵光矣碑文國子監奉㫖刋十三經注疏先進孝經跋陶望齡維天子懋學晞聖垂意於經術詔臣等校繙十三經注疏重刻之辟雍孝經最先竣謹頓首進御而䝉鄙謬為言附諸後曰昔孔子贊易刪詩書定春秋禮樂其閎者綱提政事考稽風謠釐舉名分極命於儀物等殺而精者苞陰陽之紀通神明之奥博大微渺至矣然猶退而托諸述者而後世尊經者由孔子亦未嘗名之曰孔子之經也其係孔子言斷然以經號者惟是書而已夫生而能之不詔而人喻焉此天下至邇甚易者也其博大微渺者夫子既附之刪述而取夫邇且易者自名其書聖人之所謂道其可識也上下異操逺近不同等故或有韋素之懿行而帝王同之者其以天子撫有四海之隆貴而術不必有加於士庶人則天之明因地之利至徳備焉又何其博大而微渺哉書言君陳惟孝友于兄弟克施于政而漢儒楊雄亦云孝莫大於寧親寧親莫大于寧神寧神莫大於得四海之懽心蓋施庭内而謂之政浹四表而謂之孝非二端也天子既以敦崇色養又身帥之正令為父子兄弟足垂萬世法於以寧兩宫懽四表所稱一人有慶兆民賴之者何以加於兹則今日刻經意也歇庵集兩雍議湯來賀程子曰治天下以得人才正風俗為本太學者人才之所由造而風俗之所由成也國朝舊制舉人貢士必入監肄業大司成率其屬月課而教導之肄業十年然後許其入官猶慮其弗嫻吏治也於考職之先又撥各衙門歴事數月勤習政事然後咨送銓部量才定職較之臨軒䇿士其法更詳詎非制之盡善者乎乃世人視為故事茍且塞責舉人入北雍者以白鏹七兩給與長班令之按期報名而肄業之規可以盡廢矣至謁選時又用數金而撥歴俱免嗚呼司成及各部其位與權不可謂不尊矣乃聽一長班之指使天下之可歎有甚於此者乎舊冬特奉有明綸舉人必入監肄業又許南北就近此大釐積弊真為聖朝之舉可以造士而維風矣愚生即遵㫖遄行初見雍中禮貌嚴肅躍然懽忭以為可以進徳也乃與月課者三所試者文焉而已司成接見諸士所議者亦文焉而已課文兼出小題課後數日列榜髙下若生童就郡縣試嗚呼何其小也夫八股之業童而習之何益於蒼生何禆於實用而煩司成之講究乎且舉人既以七藝獲售豈不能八股而猶待雍課乎大司成之造士如斯而已乎蓋數百年來積習相沿一時難以遽變耳今皇上特隆曠典諸士不憚跋涉逺者數千里近者亦數百里赴兹盛舉以為必講理學必籌經濟以備他年實用乃徒督課於八股斯已過矣且甫踰一月輸銀數兩即告假而歸仍習為故事矣不亦大負朝廷而輕當世之士哉夫治道莫先於敎化倘誠心力任未有不能行雖當積弛未有不可行者也昔程子為晉城令民有事至縣必告以孝悌忠信鄉必有校暇時親至召父老與之語兒童所讀書親為之正句讀張子為雲巖令以敦本善俗為先毎月吉具酒食召鄉人髙年㑹縣庭親勸酬之使人知養老事長之義朱子主同安簿兼領學事選邑秀民充弟子員訪求名士以為表率日與講說聖賢修已治人之道及差發南昌軍事數詣郡學與諸生質疑問難誨誘不倦其留心敎化何若斯之亟也他如陳襄之令仙居蔡襄之守泉州劉珙之知潭州皆以勸學興善為急務况司成之職專在敎人而可以自怠乎哉誠能專重徳行講求義理委曲敎導以化其氣質之偏而成其為有用之才則數十年後士風丕變而天下之賢才不可勝用矣然而未能者何哉悠忽不勤而委靡不振也記曰師嚴然後道尊又曰敎人必盡其誠使司成勿顧情面非父母果病及身負篤疾者不容告假即假歸者勒令速至而又殫精立誠以勤厥職日坐公堂與諸生講學不因寒暑而間所講經書之外必深繹性理及綱目通鑑而歸本於躬行必倣胡安定設經義治事二齋以勵實學間課以文亦必試論䇿試奏疏聽其盡力發揮而勿拘以成格則人才可得而知也又於雍中取其卓然實用者日加奬勵而特薦於朝廷以為諸士勸既勤親講又令諸生各攄所見以觀學術之淺深若能究心理學或具經濟異才者不拘資格必奬賞而薦拔之其有不在學宫而願來聽講者亦弗之禁如此則人才盛風俗美庶幾可不負皇上育才之盛心而天下之平可拱而俟之矣内省齋文集欽定國子監志卷五十九

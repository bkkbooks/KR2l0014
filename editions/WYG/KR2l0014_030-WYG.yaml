body:
  text: 官師三儀制朝賀班次國子監官為左班其立位總理大臣各視其本品為班而正從同班一品為第一班一品為第二班祭酒為第四班司業第六班監丞博士助教第七班典簿學正學録第八班典籍第九班筆帖式各視其本品亦正從同班拜位總理大臣亦各視其本品為班而正從異班正一品為第一班從一品為第二班正二品為第三班從二品為第四班祭酒第八班司業第十一班監丞第十三班博士助教第十四班學正學録第十五班典簿第十六班典籍第十八班筆帖式各視其本品亦正從異班謹案康熈十六年定祭酒為第三班司業為第四班乾隆十七年改如現行之制至左班之次雍正二年始定前此不分左右班也駕陞殿齊集班次國子監堂上官及其屬除有陞遷應謝恩者隨班行禮外餘俱具朝服齊集侍班與朝賀同頒朔每嵗十月一日頒來嵗之朔至期國子監堂上官率屬官咸具朝服赴午門隨班行禮畢祇領來年時憲書宣詔朝廷大慶宣恩詔於天安門樓國子監堂上官率其屬具朝服隨班行禮於金水橋南之東迎送駕皇上時巡秋獮國子監官留京辦事者率其屬具蟒袍補服隨班于聖駕所出禁門外跪送皇上回鑾國子監堂上官蟒袍補服隨班出郊跪迎救䕶日月國子監堂屬官具朝服徃赴救䕶日食在禮部月食在太常寺各隨班行禮國子監官俱隨吏部衙門在弟一班朔日祭酒率屬官詣先師廟行釋菜禮禮畢升堂就位各屬官及教習肄業諸生以次入揖如常儀六堂官亦設公座於本堂肄業諸生各就班位揖畢𫝊題課試課卷面繳望日司業詣廟行禮餘如朔日坐班每旬之五日堂上官率四㕔官徃坐班惟六堂官以訓課諸生特免大祀齋戒祭酒滿洲司業䝉古司業俱齋宿監署欽差㸃齋官赴查交職名届期陪祭行禮祭酒司業涖任先期國子監屬官呈送儀注祭酒則監丞親送司業則博士親送詢明上任之日繩愆㕔先期示知各官及諸生吏役届期各赴衙門俟至日祭酒司業至持敬門外下車入致齋所更朝服引贊生導由聖廟東掖門入至大成殿庭南階下贊行三跪九叩頭禮畢由西掖門出復詣崇聖祠行三跪九叩頭禮畢詣土地祠行一跪三叩頭禮畢祭酒則赴東廂司業則赴西廂諸生候於門外本監滿漢各屬俱公服分東西班立候於門内各迎揖祭酒司業答揖廼上堂北面立行拜印禮置印於髙座書吏贊行三跪九叩頭禮畢升公座用印及簽押訖書吏呈送本監各官職名手簡四㕔六堂八旗官學各官以次叅見皆三揖祭酒司業出座答揖次八旗教習六堂諸生世職官學生行四拜禮祭酒司業坐拱手答之次書吏叩頭廟戸皂𨽻階下叅叩畢遂更衣入堂後軒中屬官陪坐少頃退本衙門具公膳飯畢典簿㕔候送如是日值堂期祭酒司業堂上相見各三揖照定例坐次理事總理大臣莅任與祭酒同四㕔六堂各官莅任亦繩愆㕔先期示知至期莅任官至持敬門外下車詣致齋所更朝服引贊生導由聖廟東掖門入至大成殿庭南階下贊行三跪九叩頭禮畢由西掖門出復詣崇聖祠行三跪九叩頭禮畢詣土地祠行一跪三叩頭禮畢廼赴其所任之各㕔堂典簿有印行拜印禮餘官則北向行三跪九叩頭禮畢升座簽書監丞博士莅任在監諸生俱見行二拜禮監丞博士答揖六堂官莅任惟本堂諸生見行二拜禮本堂官答揖三日内新任官具履歴銜名手簡赴滿漢各堂上官私宅謁見初見服補服如莅任遇堂期則典簿㕔引新任官公服詣堂上以銜名履歴呈堂上官新任官向坐三揖堂上官避席答揖退若私宅燕見則新任官至大門外下車馬俟於門内閽人通名入見堂上官迎於階下詣聽事新任官當楣北面三揖堂上官東面答揖序坐新任官東位西面旅見則以次東西面堂上官位於西南東北面命坐揖茶至揖辭退三揖如初凡新任官揖堂上官皆答揖堂上官送於二門外新任官出大門稍逺乘車馬後此私宅燕見禮並如之開封印信滿漢四㕔六堂八學各官八旗教習弓箭教習及内外肄業諸生世職官學生各早至俟總理大臣祭酒司業至各屬官入謁如常儀設髙案供國子監印信堂上官率闔屬行三跪九叩頭禮畢升公座各屬官率諸生入賀如上任儀典簿開封印信於繩愆㕔同諸㕔官行禮凡開印先㕔而後堂上封印先堂上而後㕔堂期毎旬之一六日為堂期惟十六日改用十五日以拜廟也是日滿漢四㕔六堂八旗助教各早集俟總理大臣祭酒司業至擊雲板三升堂就公座各屬官以次赴堂序揖堂上官答揖各屬官復分列東西相向對揖次各堂貢監生序立恭揖凡應行事宜以次説堂畫行典簿率考到貢監生入謁北面三揖司業命題監丞率考驗貢監生入謁亦北面三揖總理大臣祭酒命題俱派四㕔六堂官一員監試八旗助教率官學生入謁候堂上官公同挑選理事畢六堂各官先退堂上官起仍擊雲板三赴後堂㑹膳如屬官有新任及陞任者堂期上堂三揖堂上官答揖朔望則合屬官皆上堂三揖堂上官答揖元旦次日謁聖廟畢禮生導總理大臣祭酒司業至廂升座各屬官先赴彛倫堂分東西就位滿漢生徒分立兩廡直日禮生揖於廂門外禀請升堂擊雲板三導堂上官揖讓以次入後堂各禮生先行四拜禮隨引導出赴彛倫堂御座香案前東西相向行二拜禮廼升座吏呈公座簿刷印匠廟户皂𨽻俱于墀下以次禀明叩頭次四㕔吏次兩廂吏俱於露臺上叩頭繩愆㕔皁𨽻擊鼓七聲直日禮生跪門外禀㕔堂官拜賀各官于公座前四揖堂上官出位答揖禮生唱教習拜賀教習於印案前行四拜禮堂上官坐受次唱六堂貢監八旗官學生行四拜禮俱坐受如前儀各生東西相向行二拜禮畢博士㕔皂𨽻鳴鐘㕔堂官各一揖退吏唱散班禮生禀堂儀畢有失儀者整班禮生糾舉繩愆㕔記過壓罰謹案此康熈三十四年祭酒張榕端所酌定附師生儀滿洲䝉古漢軍漢人各肄業生入監日首謁先師廟各生排列廟墀禮生贊行四拜禮畢赴彛倫堂露臺上序立謁見總理大臣祭酒司業行四拜禮隨詣各堂謁六堂官行二拜禮順治元年定堂上官暨監丞博士及本堂官每入署升堂就位肄業生序立恭揖禮畢退肄業期滿俱本生自行呈報上堂向總理大臣祭酒司業北面三揖八旗教習初補及報滿亦如之各生見師長初見弟子公服具名柬至監典簿引至堂上北面三揖師立受辭退北面三揖如初出若燕見於私宅通名竢於門内師召入迎於階上弟子升階揖竢師前行隨入堂當楣北面再拜師西面答揖師命坐弟子北面揖趨正師坐畢侍坐於側東位西面旅見則以次列坐以北為上師位于西南東北面請問揖茶至揖辭退北面三揖師皆答揖師出送前行弟子從及二門外弟子三揖竢師入乃退大清謹案以上各儀均遵㑹典及大清㑹典則例其節次增定禮儀及申飭規範並詳大清通禮載入列於後順治元年定國子監條規彛倫堂係車駕詣學御講之所本監堂上官不得中堂而坐中門出入王以下文武各官亦不得中門出入本監堂上官每入署升堂就位各屬官及諸生以次赴堂序揖本監屬官每赴堂禀議事務或質問經史皆須拱立聴受不得即便列坐又監生入監謁聖廟見祭酒司業俱行四拜禮見六堂官行二拜禮凡進監于大門外下馬不得乘馬出入今八旗教習亦如之滿洲漢人各廕監生途遇師長步行者旁立候過乘騎者逺下趨避有藐忽抗行者懲責康熈三十二年定國子監屬官進署于儀門外下馬乾隆二年總理監事尚書孫嘉淦疏奏諸生每朔望敬謹拜廟執事有恪俟堂上講書按班序揖後于本堂官公座肅揖至出入起居衣冠言動務循禮法如有拜廟不依班次朔望不上堂及不至本堂肅揖途遇師長直行不顧師長到堂查號衣冠不整慢不迎送或𫝊喚不到者皆分别記過經總理事務等衙門㑹議應如所請詔從之乾隆五年總理監事大學士趙國麟疏奏臣監職奉聖廟凡丁祭一應職事俱係堂官恭率監丞等官辦理不特祀事攸闗抑且禮典攸係請將陳設分獻執事之監丞助教等官照禮部光禄寺例賞掛素珠則儀制隆而觀瞻益肅詔從之儀制附元世祖至元二十四年許衡著諸生入學雜儀及日用節目元史選舉志仁宗延祐二年定國子監每月初二日早旦圓揖後博士助教面引應私試生員考試同上謹案此從趙孟頫元明善議也又案明太學志亦有圓揖之儀葢沿自有元者也明國子監每旦祭酒司業坐堂上屬官自監丞以下首領則典簿以次序立諸生揖畢質問經史拱立聴命惟朔望給假餘日升堂㑹饌乃㑹講復講背書輪課以為常每班選一人充齋長督諸生功課衣冠步履飲食必嚴飭中節夜必宿監有故而出必告本班教官令齋長帥之以白祭酒監丞置集愆簿有不遵者書之再三犯者決責四犯者至發遣安置明史選舉志洪武十五年定國子監規本監正官每晨升堂就座各屬官以次赴堂序立行揖禮正官坐受各屬官分東西對揖禮畢立竢各堂生員序列恭揖禮畢方退晩亦如之本監屬官每遇赴堂禀議事務質問經史皆須拱立聴受取次講説不得即便列坐其正官亦不得要求虚譽輙自起身有紊禮制務在紀綱秩然足為矜式明㑹典謹案明洪武所定制度遷都後北京國子監俱遵守之故節録於篇凡升監之儀祭酒司業晨至廟户撃雲板三禮生引入兩廂又擊雲板三禮生跪禀升監各引出廂鼓三鳴俱由後堂出至彛倫堂御座香案前東西對揖升座吏送公座簿押判守廟廵風廵倉庫官堂長號長及諸皂𨽻捧結狀報無事畢號長四人即充内外糾儀内糾儀二人入堂對籖案面北負柱立外糾儀二人執肅靜牌於露臺東西對立典簿典籍掌饌入揖吏堂外序叅畢典簿呈各衙門公文兩廂侍直友長二人取整齊嚴肅牌跪禀升監遂令六堂堂長及諸生序立露臺下㕔堂官入揖又分東西對揖習禮公侯伯立于堂外未襲封者立其後與諸生同揖又分班圓揖畢俱北面立䋲愆㕔廵視禮生二人禀六堂諸生各在班講習整齊嚴肅堂中禮生跪禀今日當行某事各屬官致恭而退祭酒司業掣籖畢習禮公侯伯退堂長以次領班生穿堂由東西門入東西邊門出凡諸生出入不敢中門足之左右循門以為先後吏舉公文呈禀簽押用印畢聖廟禮生二人領新進或復班告假撥歴撥差各生至東墀露臺下拜見拜辭内外糾儀諸生禀糾失儀者堂中禮生跪禀堂儀畢兩廂官下座復至香案前對揖禮生引由後堂還廂俟諸生各以事至廂禀白授業畢侍直友長仍執整齊嚴肅牌禀下監糾儀號長持牌領諸生至太學門隨于門内負屏立諸生出諠譁失次者糾儀摘所佩牌呈廂究治其繩愆㕔㸃名不到者本㕔禮生先禀西廂查明有假與否然後掲呈兩廂究治午晩升監同若雨雪或公務不及升監則懸免升監牌於集賢門凡㑹講之儀先期六堂官輪二人具講題撰講章送西廂改定是日設講座於露臺西南堂中禮生跪禀本日㑹講監丞坐堂東柱外博士助教學正學録坐堂西柱外鳴講鼓三供講案於堂門外階上引禮生二人引講官登座禮生取案上講章折旋送座習禮公侯駙馬伯另為一班序列臺上隨大班揖聴講講畢引禮生引講官復位復引一講官登座講經畢堂中禮生跪禀㑹講畢諸生跪揖謝教㕔堂各官列揖而退穿堂掣籖如常儀繩愆㕔㸃名不到者掲送兩廂壓撥一次凡㑹講先以大誥律令及為善隂隲孝順事實五倫書與四書五經兼講次性理通鑑綱目諸書凡講御製諸書講官立講正屬官立聴㕔堂内外禮生俱下墀同諸生跪聽餘則坐講諸生立聴凡復講之儀鳴講鼓供講案如㑹講儀侍直友長捧籖筒至公座前掣籖驗係某堂某班隨掣簽驗係某班某生先率性修道次誠心正義次崇志廣業先講書次講經並友長執簽𫝊喚諸生升堂跪揖立講講畢復跪揖友長還簽于筩堂中禮生二人跪禀復講畢穿堂掣簽如常儀䋲愆㕔㸃名不到者亦掲兩廂壓撥一次凡背書之儀本日侍直友長持簽筒至公座六堂各掣一簽各班生穿堂有簽者友長以籖授其班長引至四㕔逐名試背不熟與不到者掲送西廂摘背不熟不到者責明太學志洪武三十年定監規云一教官必當躬修禮節正其衣冠闒冗怠惰者許監丞糾舉一諸生衣巾務遵制度不許穿戴常人巾服與衆混淆一朔望行禮務隨班齊到不許怠惰失儀一諸生遇師長出入當端拱俟過有問即答毋得倨慢一㑹饌不得喧嘩坐起及私通膳夫打飯出外一早晩升堂務各官親自放牌㸃閘衣冠嚴肅步起中節不得攙越喧嘩一坐堂生員不許脫巾解衣諠譁嬉笑及徃來别班閒談一赴堂背書務照班序立抽籖背誦不得攙越諠閧一諸生不得夜飲乘醉諠閧明太祖實録本監以累經車駕臨視正官不敢中堂而坐及中門出入明㑹典祭酒司業上官用吉服諸生於集賢門外列班迎候諸屬官迎候於門内禮生導引由持敬門入謁先師廟啟聖祠贊行四拜禮謁土地祠行二拜禮畢升堂㕔堂官上堂揖畢禮生禀各屬官及諸生拜賀吏皂各役次第恭賀俱與元旦冬至同明太學志㕔堂官到任先謁聖廟啟聖祠土地祠畢候兩廂升座之後禮生跪禀新任某官見自執履歴呈送兩廂各行再拜禮出候兩廂還廂仍赴廂揖若監丞博士上官則堂儀後六堂諸生俱赴本㕔拜見若六堂官則本堂諸生俟還堂後拜見同上遇萬夀元旦冬至行慶賀禮俱前期祭酒率合屬官生員赴朝天宫隨班習儀行禮禮畢退至寓所易服各屬官進揖退生員列班於階下跪揖畢掣籖㸃名如常儀至期祭酒率合屬官生員三鼓赴朝房候長安門開入隨班朝賀諸生先出朝房外候収牌查㸃萬夀元旦冬至例賜折宴賞鈔錠俟禮部題本出示祭酒率屬官各具公服及生員吏典同赴午門前謝恩行五拜三叩頭禮慶成宴或宴或胙祭酒司業次日具公服謝恩同上洪武十六年詔定朝叅官坐次凡奉天門賜坐祭酒序於翰林院官諌官僉都御史之上坐於西角門東向華葢殿序坐亦如之坐於鹿頂外東西相向二十四年詔更定侍班官員惟國子監不與止朝朔望令得専心施教成化元年祭酒司馬恂等奏令本監博士助教等官懸帶牙牌朔望朝叅同上遇大慶頒詔𫝊制祭酒率屬官具朝服侍班諸生皆隨班行禮或止用吉服遇大典禮傳制祭酒率合屬官朝服侍班凡賜勅諭祭酒捧出置龍亭同諸生迎至太學開讀祭酒率屬官諸生以次列班於露臺下墀中行五拜三叩頭禮明日復赴朝謝恩同上嵗終頒湔除詔禮部遣歴事監生捧至太學門祭酒率屬官諸生迎於門内墀中禮生四人導使者由中道入至彛倫堂置香案上開讀禮生贊排班行五拜三叩頭禮畢退至堂後使者跪揖待茶畢遣禮生送之出同上每嵗立春日順天府進春祭酒司業率屬官具朝服侍班行禮同上每嵗十月朔頒厯祭酒率屬官及諸生具公服赴奉天門祇受行五拜三叩頭禮同上凡廂儀祭酒處東廂司業處西廂未升監各先造廂當該及火房吏叅見禮生跪揖升監畢還廂㕔堂官造揖屬官有新任及陞任者入廂揖有事闗白者同朔望則合屬官俱入揖同上元旦冬至拜賀是日謁廟畢升堂如常儀𨽻役於兩墀跪禀叩頭各吏於簷下行四拜禮諸生習禮公侯伯班于露臺上行四拜禮掌饌循門限中立行四拜禮典簿典籍再拜祭酒司業答拜兩㕔六堂官再拜祭酒司業答拜祭酒司業各下座東西相向再拜㕔堂官致恭而退諸生穿堂如常儀鳴鐘而散同上朔日謁聖廟各祠畢升堂如常儀禮生跪禀本日公假諸生跪揖掣籖穿堂如常儀惟不還班即鳴鐘而散望日不謁土地祠同上遇節假先期出示假滿日升監如常儀惟諸生揖後堂上禮生跪禀開假諸生跪揖以謝各屬官俟下監後詣兩廂揖謝同上洪武十五年左司業龔斆奏定正月年假初一至初五燈假十一至二十二月祭丁前二日後一日三月清明日五月初四初五日七月七夕節中元並前一日八月中秋並前一日九月初九日十一月冬至前三日後二日十二月年假大盡二十五日小盡二十四日又萬夀千秋節救䕶日月俱次一日朝賀習儀春秋考校各前後一日假同上洪武制國子監典簿㕔行六部用呈行應天府用平闗六部劄付本監典簿成化以後俱本監呈禮部禮部劄付本監其餘衙門俱典簿㕔具手本於司屬往來同上冬夏至大祀春秋祈報前期𫝊制畢祭酒率各屬官沐浴更衣祭酒司業宿于兩廂各屬及習禮公侯伯宿於退省號生員每日各入本班午後集於致齋所候欽差官㸃齋畢本監仍掣籖㸃名春秋丁祭先師齋宿同同上衍聖公襲封謁聖廟畢引贊引至彛倫堂西面立祭酒以下東面立通贊唱行二拜禮諸生各肅揖廼就東堂小讌畢引贊引衍聖公出通贊唱賓不顧矣同上公侯駙馬伯及戚畹子弟初入監謁先師廟畢赴彛倫堂露臺上序立謁祭酒司業行四拜禮監丞博士及六堂師儒序立於堂東公侯駙馬伯序立於堂西行相見二拜禮公侯駙馬伯赴階東序立六堂堂長赴階西序立行相見二拜禮若一二人進監則不當以寡煩衆須厯詣㕔堂相見止行揖禮各堂監生就堂相見行揖禮每日飯畢赴監從東來者過櫺星門下馬從西來者至本監下馬赴露臺上序立行揖禮分班揖畢赴東西二書堂讀書至晩升堂仍立班於露臺上六堂監生立班臺下皆揖又分班相揖依次升堂捲班而出明太學志凡監生初入監侵晨謁先師廟畢候升監諸生還堂之後禮生引赴祭酒司業公座東西㕔東西講堂各行四拜禮撥班後見本堂行四拜禮其給假撥差撥厯就教辭廂辭監儀俱同與本堂友長行兩拜禮明太學志監生每月朔望朝叅雨雪泥塗則免明㑹典諸生誦書並在師前立聴講解疑問則跪聴明太學志欽定國子監志卷三十

  text: 欽定四庫全書欽定國子監志卷十七
  hash: sha256:75100796775026bcee9381b44c4ec414576fa17ed6df8644ac61783189bff421
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_017-1a, image: WYG0600/WYG0600-0155c.png}
body:
  text: 禮五告祭康熙五十一年詔升配朱子于大成殿為十一哲遣官至國子監告祭先師孔子及朱子位前謹按朱子神位既改稱先賢升配殿上其舊供先儒神牌移奉御書樓中雍正元年詔封孔子先世五代為王遣大臣至國子監告祭乾隆二年詔國子監文廟易用黃瓦遣官告祭先師孔子三年詔升配有子于大成殿為十二哲遣大學士至國子監告祭先師孔子及有子位前三十二年詔大修國子監先師廟遣大學士告祭三十四年先師廟工成安奉神位遣大學士告祭謹按告祭之禮即古始立學之祭也漢世雖立學而斯禮無聞三國魏正始中以講經通孔子使太常釋奠告辟雍之始其後北魏有告諡是為遣官祭之典開元有册贈之文並令公卿持節奠祭見于史𫝊自宋及元褒封從祀典禮不絶而告祭無明文明洪武十五年太學易塑像為木主遣禮臣以太牢祭成化十三年增籩豆十二舞八佾遣尚書商輅告祭隆慶五年以薛瑄從祀遣祭酒馬自强告祭亦雜見于紀國朝載而正史不書加詳凡追崇升祔釐正典禮著為令典儀制遣官告祭及建葺落成並同所以妥神明者至矣儀與春秋釋奠欽定國子監志卷十七

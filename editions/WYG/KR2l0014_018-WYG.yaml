  text: 欽定四庫全書欽定國子監志卷十八
  hash: sha256:4627d3b3f809edf489e58a1f5394915e6d21f4409a55089c979c17b29d4b8af1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_018-1a, image: WYG0600/WYG0600-0157a.png}
body:
  text: 禮六祭品崇徳五年定春秋釋奠祭品聖位俎三犢一純黑九體體羊一豕一俱五登一太羮鉶一和羮簠二黍稷簋二稻粱籩十形鹽菱芡槀魚鹿脯棗餅白栗餅黑榛豆十菁菹醯醢芹菹笋菹鹿醢魚醢韭菹脾析兔醢豚胉爵三各有坫泰尊一盡羃山尊一盡羃兼貯配酒著尊一盡羃兼貯哲酒雲雷尊二盡羃貯初獻酒象尊二疏布羃貯亞獻酒犧尊二疏布羃貯終獻酒罍一制帛一白色有篚祝一有版并案勺大小十二棜一洗一庭燎八香鼎二鐙八配位四案毎案設俎二羊一五體豕一五體鉶二和羮簠二黍稷簋二稻粱籩八形鹽栗槀魚鹿脯棗芡菱榛豆八韭菹芹菹醯醢兔醢菁菹笋菹鹿醢魚醢爵三置一坫制帛一有篚鑪一鐙二十哲位二案每案設豕一分五體制帛一有篚獻爵一有玷分獻官總獻于五位之中鑪一鐙二毎位前設鉶一簠一簋一籩四形鹽鹿脯棗栗豆四菁菹芹菹鹿醢兔醢供爵一有玷兩廡每四位為一案東西廡各設豕三毎位一體盛以盤制帛一有篚獻爵一有玷分獻官總獻于毎廡中壺尊三疏布羃勺三禁一洗一鑪一鐙二毎案各設簠一簋一籩四豆四供爵四啓聖公俎二羊一豕一鉶一以下實如聖位制簠二簋二籩八豆八爵三祝一鑪一鐙二配位二位共一案牲盤一鉶一實如四配制簠一簋一籩八豆八爵三鑪一鐙二兩廡制如配位朝開謹案我創之始太宗文皇帝親定釋奠禮牲牢俎豆典制攸崇書所載國初以來遵循㒺替張安茂頖宫禮樂全特詳謹輯録以備㕘考順治二年定月朔釋菜祭品先師及配位哲位啟聖祠並同籩二棗栗豆一芹菹爵三清酒雍正元年世宗憲皇帝追封孔氏先世五代為王合祀于祠改名崇聖春秋釋奠毎神位前各一案皆如啟聖王例陳設是年冬命頒文廟祭品圗於天下始添設四配每位尊一定十一哲每位各一案東西各添豕首一共添尊一定兩廡每二位共一案改東西廡各豕三為各豕首一豕肉二添東西廡各尊三崇聖祠正位減俎二為一添鉶一為二每位各添帛一尊一定配位毎位一案東西各設豕首一豕肉一東西共添尊一各添帛一兩廡各添帛一共添尊一乾隆元年禮部議聖廟脯醢宜豐鹿脯鹿醢加增鹿二正位及四配崇聖祠正位仍用兔醢十一哲兩廡及崇聖祠配位兩廡易兔醢為醓醢加增豕二十一年增崇聖祠配位帛二爵六十八年禮部議遵十三年親祭闕里祀典十二哲兩廡俱去豕首肉改用少牢十二哲從崇聖祠四配例位各異帛兩廡各增香帛一文廟謹案自祭品國初至雍正元年雖屢經更訂頒行天下而國子監丁祭仍沿舊例哲位東西各豕首一毎位崇聖豕肉一盤兩廡東西各豕首六毎位豕肉一盤祠四配東西共豕首一兩廡毎位各豕肉一盤又十二哲東西各篚一帛一兩廡賢儒南北分列于中間空壁處設香帛一案至是禮詔從之部復請釐正丁祭需用祭品凡登鉶簠簋籩豆之實祝帛香燭薪炭之用均太常掌之毎祭禮神制帛三十有二端均白色正位用綾餘用絹長丈有八尺牛二一解五體供正位一作羮羊二十有二豕二十有五鹿三脯醢用兔十脯醢用大槀魚十小槀魚如之穀之屬以斗計者黍一粱一稷七斗五升六合稻如之以觔計者麥一蕎如之蔬果之屬以觔計者菁菜一百七十有六春用大秋用小芹一十有五韭九十有二栗二百有七榛十有六其竒為四兩紅棗百七十有二菱二十有七芡三十有二葱十有一其竒均為八兩鹽磚二十有二白鹽四其以兩計者糖四椒茴蒔蘿各五笋以片計凡二十鮮魚以觔計凡二十有五酒醴以瓶計獻酌者一百三十有六滌魚者二春視秋減一瓶香之屬以炷計者為圓柱降香凡三十有五其一長九寸徑八分餘均長七寸徑五分以兩計者為降香丁凡八其粗者凡一百九十有四以塊計者為細降香凡二十炬之屬重一觔者為大燭枝凡六重六兩者為中燭枝二十有八次中燭半之枝四十有四重二兩者為小燭枝二百八十有六次小者半之枝凡九燖牲之薪以觔計春用二千六百有一十秋用二千焚帛之葦以觔計一百有二十秋祭之氷以塊計一百一十有二春無之月朔釋菜需用祭品降真香十有二炷長七寸徑五分其成塊者二十有四兩炬重二兩者為大燭枝凡四十有八重一兩者為中燭枝凡九十有六又半者為小燭枝凡六百九十有六朢如之酒五瓶有竒紅棗核桃均九觔有十兩咸太常寺供焉先師位南向北為籩豆案襲以紅緞銷金衣案近北設爵三置以坫次為鐙二中為鑪登次之實以太羮左右為鉶實以和羮登之南為簠簋簠二居左實以黍稷簋二居右實以稻粱簠之左列籩十三行近簠為形鹽為槀魚其次為棗為栗為榛為菱又次為芡為鹿脯為白餅為黑餅簋之右列豆十三行近簋為韭菹為醓醢其次為菁菹為鹿醢為芹菹為兔醢又次為笋菹為魚醢為脾析為豚胉簠簋之南為篚實以帛籩豆案之南為俎一俎中區為三太牢居中解五體羊豕全列以左右俎之南為香燭案襲衣如籩豆案鑪一鐙二其右為祝案置祝版並架一襲以黄綾衣香燭案之東西各置尊案一案設尊三凡六尊左右列焉畫羃疏布羃錫勺二四配位東西向凡四案案設爵三前為鉶二其次簠簋各二簠之左列籩八近簠為形鹽為槀魚為棗為栗其次為榛為菱為芡為鹿脯簋之右列豆八近簋為韭菹為醓醢為笋菹為魚醢其次為芹菹為兔醢為笋菹為魚醢簠簋之前為篚實以帛案之前為俎俎中區為二羊左豕右俎前為香燭案鑪一鐙二十二哲位東西各六案案設供爵一次以香燭鑪一鐙二前為鉶鉶之前左為簠一實黍右為簋一實稷簠之左列籩四近簠為形鹽為棗次為栗為鹿脯簋之右列豆四近簋為菁菹為鹿醢次為芹菹為兔醢東西各俎一前設六案之中俎中區為二左羊右豕俎之前為香帛案亦東西各一案設獻爵三鑪一鐙二篚一實以帛各六端兩廡二位共一案東廡之案三十二西廡之案三十一案設供爵二次以香燭前為簠簋各一簠之左為籩四簋之右為豆四實如哲位東西廡各設俎三俎中區為二實以羊豕俎前為香帛案東西各二案設帛一獻爵三鑪一鐙二崇聖祠正位五案案設爵三前為鉶二次簠簋各二左右籩豆各八實如配位簠簋之前為篚實以帛其前為俎一中區為二左羊右豕又前為香燭案鑪一鐙二崇聖祠配位東西向凡四案案設爵三次以簠簋各一左右籩豆各四篚各一實如哲位東西各設俎一實以羊豕香燭案一鑪一鐙二崇聖祠兩廡東二案西一案案設爵一次以簠簋各一左右籩豆各四東西各俎一實以羊豕香帛案亦東西各一案設鑪一鐙二篚一實以帛一謹案圖像東廡制西廡二位止一案不另圖土地祠位南向供案一案設磁爵三磁盤二左實鹿脯右實兔醢牲盤一實以牛肉豕肉各一方其前炷香一燭二鑪一鐙二質用綠色琉璃祭品附元先師位前幣三用絹各長一丈八尺其牲齊噐皿之數用牛一羊五豕五以犧尊實汎齊象尊實醴齊皆三有上尊加羃有勺設堂上太尊實汎齊山罍實醴齊有上尊著尊實盎齊犧尊實醴齊象尊實沈齊壺尊實三酒皆有上尊設堂下盥洗位在阼階之東以象尊實醴齊有上尊加羃有勺設於兩廡近北盥洗位在階下近南籩十豆十簋二簠二登三鉶三俎三有毛血豆正配位同籩豆皆二簋簠俎各一從祀同元史祭祀志明洪武元年定禮神制帛先師廟正配皆白每位各一十哲兩廡東西各一有篚牲牢之數先師如帝王犢牛豕各一四配羊豕各一十哲東西各豕一分五兩廡東西各豕一後增為三明史禮志謹案洪武四年禮部奏改初制籩用竹其簠簋登鉶及豆初用木者悉易以瓷牲易以熟聖像又設高座噐物悉陳于座下至是始各置案初於其所又明制凡籩豆之實用十二者籩實以形鹽槀魚棗栗榛菱芡鹿脯白餅黑餅糗餌粉餈豆實以韭菹醓醢筍菹魚醢菁菹鹿醢芹菹兔醢脾析豚胉􅓞食糝食用十者籩則減糗餌粉餈豆則減􅓞食糝食用八者籩又減白黑餅豆又減脾析豚胉用四者籩則止實形鹽槀魚棗栗豆則止實芹菹兔醢菁菹鹿􅊽各二者籩實栗鹿脯豆實菁菹鹿臡簠簋各二者實以黍稷稻粱各一者實以黍稷登實以太羮鉶實以和羮嘉靖九年定正壇陳設之次先師位前奠帛次以三爵次以登鉶中設登左右以鉶次以簠簋黍稷居北稻粱居南左以十籩形鹽槀魚棗栗為一行居黍稷之左榛菱芡鹿脯為一行居左次白餅黑餅為一行居又次白餅之北為饌盤十豆居右韭菹醓醢菁菹鹿醢為一行居稷粱之右芹菹兔醢筍菹魚醢為一行居右次脾析豚胉為一行居又次籩豆之南中牛左羊右豕篚設於壇東南西向祝案設於壇西罍洗盥盆設於露臺下東西向四配為四壇每壇神位前奠帛次三爵次二鉶次簠簋簠簋之左右設如正壇惟饌盤設於豚胉之下籩豆之次左羊右豕十哲五位為一壇東西各一兩廡四位為一壇啓聖祠正位仝四配配位同十哲從祀仝兩廡學典釋菜祭品用活兔三棗栗各四觔菁菜八兩酒三瓶燭大者四枝小者二十八枝降香八兩其半存為望日用南雍志欽定國子監志卷十八

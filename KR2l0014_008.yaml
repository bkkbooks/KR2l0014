國子監儀如前視學之日樂設而不作禮畢百官慶賀賜衣服宴皆及孔顔孟三氏子孫𢎞治元年定先期致齊一日奠加幣牲用太牢改分獻官為分奠官嘉靖元年定衍聖公率三氏子孫祭酒率學官諸生上表謝恩皆賜宴於禮部十二年以先師祀典既正再視學命大臣致奠啓聖公祠萬厯四年定次日行慶賀禮頒賞如舊免賜宴初憲宗取三氏子孫赴京觀禮又命衍聖公分獻至世宗命衍聖公及顔孟二博士孔氏老成者五人顔孟各二人赴京陪祀明史禮志欽定國子監志卷八

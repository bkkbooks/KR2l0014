front:
  text: 欽定四庫全書欽定國子監志卷四十六
  hash: sha256:7c60fe944dc79871dd76c1e9e9d66c11e95d0ad7c682f513355e045e3e91f45c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_045-1a, image: WYG0600/WYG0600-0473c.png}
body:
  text: 金石一臣等謹案金石之文所以表章功徳垂示久逺匪特正經訓之譌補史𫝊之闕已也矧成均首善典章美備考證宜詳我皇上隆禮先師特頒周笵十器陳設殿庭自列聖以來尊師重道豐功偉烈紀實勒成於爍天章昭如雲漢他若策士題名自公賡詠咸著於錄用備參稽至於岐陽石鼓自元迄今諸家詮次附㑹鑿空毎多訛舛則就現存之文及元潘迪音訓加以訂釋别為標題焉謹誌金石門為欽頒彝器一卷御碑一卷題名一卷石鼓一卷金石一欽頒彝器右鼎髙八寸四分横六寸四分縱四寸三分耳髙一寸八分腹髙三寸三分足髙三寸五分四面鑄饕餮紋有銘在脣曰康侯手作寶罇六字按銘曰寶罇而名鼎者考宋薛尚功鐘鼎欵識所載商伯申鼎而銘為寶彞周師寏鼎銘為尊鉶正與此類曰康侯者從銘詞而名之也右尊為全犧形鑿背為尊口徑二寸八分身髙九寸横一尺三寸五分遍體雷紋右卣通髙一尺盖髙二寸一分頂髙一寸腹髙五寸二分足髙一寸九分梁髙五寸八分盖圍一尺四寸腹圍二尺三寸足圍一尺四寸通體有饕餮雷紋有銘在盖曰内言二字右罍髙一尺二寸四分口圍一尺七寸七分腹圍二尺二寸九分口髙一寸八分腹髙九寸八分足髙八分兩肩有犧首二各銜銅鐶一近足處亦餙犧首二右壺髙一尺四寸四分口髙四寸二分腹髙七寸七分足髙一寸九分口圍一尺八寸四分腹圍三尺八分足圍二尺五寸壺旁兩耳徧體雷紋右簠髙七寸七分盖髙三寸五分腹髙二寸四分足髙一寸八分盖寛九寸八分通體蟠螭紋盖腹合縫處四面各餙䕫首一兩旁各有䕫耳一按此器為簠而銘詞稱壺考宋薛尚功鐘鼎欵識載召仲考父壺銘詞三十七字亦與此同而形製大小體質輕重乃絶不相類或簠與壺兩物可通稱也右簋通髙七寸三分盖髙二寸四分足髙一寸七分周圍二尺三寸五分通體周鑄䕫紋旁出䕫耳二有銘在盖及底曰太師小子師盟作䵼彝九字按簋為飯器而銘曰䵼彝考宋薛尚功鐘鼎欵識䵼訓熟食簋盛黍稷熟乃可食義正相符又宣和博古圖載望簋銘文同此亦作䵼彝是其例矣右觚通髙七寸八分口圍一尺六寸腹圍三寸六分足圍九寸口髙三寸二分腹髙一寸八分足髙三寸腹足以下周鑄饕餮雷紋右爵通髙七寸七分口髙二寸五分腹徑一寸七分足髙三寸五分口有雷紋腹有饕餮雷紋右洗髙一寸五分周圍三尺詔頒内謹案乾隆三十四年曰尊曰卣曰罍曰壺曰府所藏周器十曰鼎大成簠曰簋曰觚曰爵曰洗陳設殿較闕里漢尊尤為典重敬繪圖分釋以冠金石之首云欽定國子監志卷四十六

front:
  text: 欽定四庫全書欽定國子監志卷六御製二詩世宗憲皇帝御製詣太學詩
  hash: sha256:1a8b111083d9c48100729c2f1ab322b1694b825053a2f106fe12b92063647cdd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0014_WYG_006-1a, image: WYG0600/WYG0600-0070c.png}
body:
  text: 禮樂牖民資大化國家造士在斯文臨雍觀禮崇儒切視學論經養俊殷濟濟橋門龍斾繞雍雍璧水鳯毛紛千官咸慶文明盛還佇同風率土忻御製仲丁詣祭文廟詩扶植綱常百代陳天將夫子覺斯民帝王師法成隆治兆庶遵由臻至淳道統長垂今與古文明共仰聖而神功能溯自生民後地闢天開第一人御製詣太學詩辟雍親莅止典禮重參稽管籥仍魚雅威儀自整齊禮門資至化義路牖羣黎永翊文明治休徵共受禔善俗禮為本仁民域可躋崇儒申術教造士列東西共式習如性咸成璋與珪興賢勤寤寐振徳日提撕皇上御製雍正己酉仲冬闕里文廟上梁前二日慶雲見上躬詣太學致祭恭紀二十四韻化洽文明世風登熙皡時車書九有共禮樂萬方綏至治乾坤應仁恩草木知崇儒欽往聖重道禮先師特舉臨雍典頻行釋奠儀宫墻新棟宇殿廡整罘罳文廟以雍正甲辰年重修軒爽盤青鳯觚稜卧赤螭桷成輝玉磶杗立焕松楣上瑞方呈日卿雲恰應期非烟籠紫閣似霧匝丹墀掞藻流光徧懸華曵曜竒鬱蓊承日麗糺縵布天垂文運重離炳嘉祥衆目窺守臣封表進大吏露章隨喜氣三宫滿歡聲九陌馳龍墀渙大號鳯詔凛如絲聖徳誠光被宸衷益慎持命期勤翠輦卜日展鸞旗詣學行殊典𢎞文答景禧因加登選額㑹試恩㫖明年加至四百名壬子科鄉試十名加一名用勵作新思藝苑薫風普膠庠膏雨滋唐虞風更洽洙泗道愈彌玉燭綿皇祚金甌鞏帝基萬年綏福履端拱樂無為御製石鼓詩橋門森矗兩蒼松翠䕶雕鐫舞鳯龍漫説晉臣精博物難稽周帝耀軍容銅駝已見藏荆棘石鼓依然鎮辟雍百里聲聞今試扣太平留此溯遐蹤御製庚申仲秋丁祭先師孔子詩法祖恢文徳崇儒禮素王晨光開輦輅露氣浥旂常寅祀心恒凜丁辰日正陽皇皇陳禮樂肅肅對宫牆言念百王後身登夫子堂君師誠有愧仰止志方長御製甲子二月上丁釋奠先師孔子詩靈春惟仲月吉日值丁辰禮樂遵先進詩書淑兆民宫牆増慕永俎豆薦馨新敢謂百王後能𫝊一脉真承筐將素幣獻爵列儒臣試問得門者誰為不愧人御製石鼓歌石鼓之數符天干千秋法物世已少况乎辟雍所羅列多士藉以資探討韓蘇傑作遥唱和近者徳潛詩亦好濡筆將吟復屢停蛇足今添笑絶倒昌黎建議雖不行至竟如言見誠蚤東坡寓意良獨深新法當時實滋擾徳潛力欲追二公横盤硬語抒文藻或文或宣辨已紛炱炱終莫考不獨議禮如聚訟千古訾黄率兹道我命金石譜以來觀之㕘半不能曉四馬六轡縱彷彿雲中如辨飛龍爪㸃畫音訓費推尋刻舟求劍識誠小憶昨幸魯入宫牆禮器惟見貽金卯此鼓上欲埒鼎彝存羊愛禮洵可表大觀金填誌鄭重金人輦至燕京肇韓意其然豈其然吾願興賢得真寳御製癸酉仲秋釋奠先師孔子詩髙居詎恃九重尊丁祭親承率駿奔山海從來欽出類宫牆何有得其門樂音六奏非鐘鼓禮器千年復簋罇經席昨臨今釋奠躬行未逮敢他論御製丙子仲春釋奠先師詩經筵昨甫過釋奠此親臨寧僅崇文典惟殷望道心衣冠集魚雅殿幕仰深沉道法參天地神依貫古今千年綿後裔聖裔襲封衍聖公孔昭煥是日適陪祭六佾協元音聖藻光楣梠大成殿内皆留皇祖皇考匾君師責並欽御製題國學瑞槐圖六韻有序國學古槐一株元臣許衡所植閲歳既乆枯而復榮當辛未一枝再茁之初適慈寧六旬萬夀之歳槐市諸生𫝊為瑞事大學士蔣溥繪圖以紀曾題六韻卷中監臣觀保等請勒石講堂垂示乆逺書以賜之黌宫嘉䕃樹遺蹟緬前賢初植至元歳重榮辛未年奇同曲阜檜靈紀易林乾徵瑞作人化符祥介夀筵辛未歳是槐聖母六旬大慶時適重榮喬柯應芹藻翠葉潤觚編右相非誇繪大學士蔣溥釋奠見之因繪圖并紀以詩由來事可𫝊謹案乾隆十六年國子監署古槐重榮越八年為乾隆二十四年大學士將溥恭繪進御呈䝉賜題復俞監臣之請石監中親灑宸翰勒御製己丑仲春上丁釋奠孔子并落成國學即事詩國學維新逮落成躬承丁祭致寅精經綸萬古歸陶冶道徳千秋示典程祗覺行難增以愧未能言贊出乎誠見近作重修國學碑記兩朝題額金章煥心法由來治法并子曰三年必有成虞𫝊惟一與惟精益滋宵旰寸心恧敢詡治安百世程周鼎載陳古如式釋奠前出内府所藏周笵鼎尊卣罍壺簠簋觚爵洗各一供大成殿中用備禮器春芹敬薦潔為誠試看陪禮來東魯時衍聖公孔昭煥聞命自曲阜先期赴京陪位將事教澤帡幪奕葉并御製癸卯仲春丁祭先師禮成述事詩月令徒聞釋上丁用丁義未著明經象心承丙前賢注内聖外王後世刑疏十四年増怵惕當春仲月敢稽停擬仍明嵗奠闕里重道猶應勵艾齡御製乙巳仲春釋奠先師孔子禮成有述詩考古今春舉辟雍䖍因釋奠致寅恭于焉敬對神如在遑不深思道所從實願樸莪作舟楫詎徒觀聴聳羔縫武公耄耋猶勤學予少於伊志敢慵御製上丁釋奠後臨新建辟雍講學得近體四首國學由來教化先北京建五百餘年空𫝊中統廟修矣案元史稱太祖平燕京以金樞宻院為宣聖廟又世祖紀中統三年修宣聖廟此皆言南城國子學葢瓦太祖初定燕京時所建也至選舉志稱至元二十四年遷都北城立國子學于國城之東又世祖紀二十四年閏二月設國子監乃今城東國子監之權輿也是以己丑年御製重修文廟碑記云國學始于元太祖置宣聖廟於燕京乃指燕京初設國子學之始而言兹城東之文廟國子監則世祖至元二十四年遷都北城所立而非中統所修矣向來紀載重叠每自相牴牾因為訂正明晰附識于此獨惜辟雍典闕然酌古準今圖以剙穿池引井璧成圓崇儒重遒心雖亹懼亦在兹記語宣古制天子之學曰辟雍請侯之學曰沣宫北京國學自元厯明以至本朝五百餘年有國學而無辟雍名實不稱雖有建議請復以乏水而格部議昨癸卯春始命酌古準今穿池引井新建圜水復親製碑文以復古而不可泥古諄切告誡詳見辟雍碑紀文放勲巍蕩未言學教胄命䕫始有虞夏序殷宗因遞述文豐武鎬豈相殊橋圜莫作徒觀者廷獻應為有用儒却憶永平稱億萬後漢紀稱明帝永平飬二年上始諭羣臣躬三老五更於辟雍饗射禮畢帝正坐自講諸儒執經問難于前冠帶搢紳之人圜橋門而觀聴者葢億萬計云云所記未免失實臨雍盛典觀聴雖多然搢紳冠帶何至億萬人之多且圜橋之間豈能容而人多擁擠亦必觀聴不及史𫝊之誙往往類是雖云善善却隣誣三五昔經著説詳謂他杜撰失荒唐三老五更之説不見詩書惟乾記出漢儒非孔子之言左傳始有三老凍餒之文注疏者紛紛不一而蔡邕獨斷遂有父事兄事之説白虎通直以為老更各一人且曰父一而已不宜有三其謬更甚杜佑通典亦宗其説真成杜撰矣向嘗著説闘之詳見三老五更説令命刻於辟雍碑隂祇宜養老示恩渥難並臨雍贊禮煌韓愈不甘弟子列蔡新或備伯兄行韓愈荅吕毉山人書謂世無孔子不當在弟子之列其見甚髙語甚正若今之羣臣孰可當老更之席者獨大學士蔡新長于予四嵗或可居兄事之列然恐其局趣弗敢當舉王導對晉元帝之語耳慮其驚懼謝無當去聲王導稱曽喻太陽晉書王導傳帝登尊號百官陪列命導升御牀導固辭曰若太陽下仝萬物蒼生何能仰照帝乃止祭毋欲數上丁逢釋奠禮成臨辟雍舉事率因待時節北京國子監自元迄今五百餘年而辟雍圜水之制未備癸夘春始命興建甲辰冬工竣此誠舉大事此亦必有時節之待也崇儒寧渠去聲在儀容五倫知止須勤朂一已自强切戒慵是日講章起大學為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信易經天行健君子以自强不息文質彬彬衆和樂重熙茂對志滋恭欽定國子監志卷六
